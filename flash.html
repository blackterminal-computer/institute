<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision Master v2.0 - BlackTerminal</title>
    <style>
        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --accent: linear-gradient(135deg, #6366f1, #a855f7);
            --success: #22c55e;
            --border: #334155;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Progress Bar Container */
        .progress-wrapper {
            width: 100%;
            max-width: 450px;
            background: rgba(30, 41, 59, 0.5);
            height: 6px;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
        }

        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 450px;
        }

        .stat-box {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-label { font-size: 11px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }
        .stat-value { font-size: 20px; font-weight: 800; display: block; margin-top: 4px; }

        /* The Flashcard */
        .card-container {
            perspective: 1000px;
            width: 100%;
            max-width: 450px;
            height: 250px;
            margin-bottom: 30px;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 24px;
            border: 2px solid var(--border);
            font-size: 22px;
            font-weight: 600;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-front { background: var(--card-bg); }
        .card-back {
            background: #061225;
            transform: rotateY(180deg);
            border-color: var(--success);
            color: var(--success);
        }

        .card-hint { font-size: 12px; color: var(--text-dim); margin-top: 15px; font-weight: normal; }

        /* Buttons & Actions */
        .controls { display: flex; gap: 15px; }

        button {
            padding: 16px 32px;
            border: none;
            border-radius: 14px;
            background: var(--accent);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        button:active { transform: translateY(0); }

        .shortcuts {
            margin-top: 40px;
            color: var(--text-dim);
            font-size: 12px;
            display: flex;
            gap: 15px;
        }

        kbd {
            background: #334155;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="progress-wrapper">
        <div id="progress-bar"></div>
    </div>

    <div class="stats-container">
        <div class="stat-box">
            <span class="stat-label">Daily XP</span>
            <span id="daily-xp" class="stat-value">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Current Rank</span>
            <span id="rank-display" class="stat-value" style="color: #38bdf8;">Beginner</span>
        </div>
    </div>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="main-card">
            <div class="card-face card-front">
                <span id="question-text">Loading...</span>
                <span class="card-hint">Click to reveal answer</span>
            </div>
            <div class="card-face card-back">
                <span id="answer-text">...</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="nextCard()">Next Question ➜</button>
    </div>

    <div class="shortcuts">
        <span><kbd>Space</kbd> Flip</span>
        <span><kbd>→</kbd> Next</span>
    </div>

    <script>
        const cards = [
            {q:"CPU full form?", a:"Central Processing Unit"},
            {q:"RAM kya hai?", a:"Temporary memory (Volatile)"},
            {q:"HTML use?", a:"Web page structure design"},
            {q:"WWW full form?", a:"World Wide Web"},
            {q:"Input device?", a:"Keyboard, Mouse, Scanner"},
            {q:"Output device?", a:"Monitor, Printer, Speaker"},
            {q:"HTTP full form?", a:"Hypertext Transfer Protocol"},
            {q:"Who is Father of Computer?", a:"Charles Babbage"},
            {q:"ROM full form?", a:"Read Only Memory"},
            {q:"1 Byte kitne bits ka hota hai?", a:"8 Bits"},
            {q:"URL full form?", a:"Uniform Resource Locator"},
            {q:"IP ka full form?", a:"Internet Protocol"},
            {q:"Excel extension?", a:".xlsx"},
            {q:"PowerPoint extension?", a:".pptx"},
            {q:"Social Media King?", a:"Facebook/Meta"},
            {q:"Latest Windows version?", a:"Windows 11"}
        ];

        let index = 0;
        let isFlipped = false;
        let sessionCount = 0;

        function init() {
            const today = new Date().toDateString();
            if (localStorage.getItem("last_visit") !== today) {
                localStorage.setItem("daily_xp", "0");
                localStorage.setItem("last_visit", today);
            }
            updateUI();
            renderCard();
        }

        function renderCard() {
            document.getElementById("question-text").innerText = "❓ " + cards[index].q;
            document.getElementById("answer-text").innerText = "💡 " + cards[index].a;
            
            // Progress Bar Logic (Cap at 100%)
            let prog = Math.min((sessionCount / 10) * 100, 100);
            document.getElementById("progress-bar").style.width = prog + "%";
        }

        function flipCard() {
            const card = document.getElementById("main-card");
            if (!isFlipped) {
                addXP(10);
                sessionCount++;
            }
            isFlipped = !isFlipped;
            card.classList.toggle('is-flipped', isFlipped);
        }

        function nextCard() {
            isFlipped = false;
            document.getElementById("main-card").classList.remove('is-flipped');
            
            setTimeout(() => {
                let newIndex;
                do { newIndex = Math.floor(Math.random() * cards.length); } 
                while (newIndex === index);
                index = newIndex;
                renderCard();
            }, 150);
        }

        function addXP(amt) {
            let daily = parseInt(localStorage.getItem("daily_xp")) || 0;
            let global = parseInt(localStorage.getItem("userXP")) || 0;
            
            localStorage.setItem("daily_xp", daily + amt);
            localStorage.setItem("userXP", global + amt);
            updateUI();
        }

        function updateUI() {
            let daily = parseInt(localStorage.getItem("daily_xp")) || 0;
            document.getElementById("daily-xp").innerText = daily;

            let rank = "Beginner";
            if(daily >= 50) rank = "Learner";
            if(daily >= 100) rank = "Pro";
            if(daily >= 200) rank = "Expert";
            document.getElementById("rank-display").innerText = rank;
        }

        // Keyboard Listeners
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); flipCard(); }
            if (e.code === 'ArrowRight') { nextCard(); }
        });

        init();
    </script>
</body>
</html>
