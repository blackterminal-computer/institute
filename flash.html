<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revision Master v3.0 | BlackTerminal</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg: #050810;
            --card-bg: #0f172a;
            --accent: #6366f1;
            --neon: #22d3ee;
            --success: #10b981;
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.05), transparent 30%),
                radial-gradient(circle at 90% 90%, rgba(34, 211, 238, 0.05), transparent 30%);
            color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }

        /* Header Stats */
        .top-bar { width: 100%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .streak-chip { background: rgba(251, 191, 36, 0.1); color: #fbbf24; padding: 6px 14px; border-radius: 50px; font-size: 12px; font-weight: 800; border: 1px solid rgba(251, 191, 36, 0.2); display: flex; align-items: center; gap: 5px; }

        .progress-container { width: 100%; max-width: 450px; margin-bottom: 25px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 800; }
        .bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.03); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--neon)); transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 10px rgba(99, 102, 241, 0.4); }

        .main-stats { display: flex; gap: 12px; width: 100%; max-width: 450px; margin-bottom: 30px; }
        .stat-card { flex: 1; background: var(--glass); border: 1px solid var(--border); padding: 15px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); }
        .stat-card i { color: var(--neon); font-size: 18px; margin-bottom: 5px; display: block; }
        .stat-card b { font-size: 20px; font-weight: 800; }
        .stat-card p { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-top: 2px; }

        /* Card 3.0 */
        .deck { perspective: 1000px; width: 100%; max-width: 450px; height: 280px; margin-bottom: 30px; }
        .card { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }

        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 32px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; border: 2px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        .front { background: #0f172a; }
        .back { background: linear-gradient(145deg, #061225, #020617); transform: rotateY(180deg); border-color: var(--neon); }

        .type-badge { position: absolute; top: 20px; background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 10px; font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; }
        .q-text { font-size: 24px; font-weight: 800; line-height: 1.2; margin-bottom: 15px; }
        .a-text { font-size: 22px; font-weight: 700; color: var(--neon); text-shadow: 0 0 15px rgba(34, 211, 238, 0.3); }
        .hint { font-size: 11px; color: var(--text-dim); font-style: italic; }

        /* Controls */
        .btn-next { background: white; color: black; border: none; padding: 18px 45px; border-radius: 20px; font-weight: 800; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .btn-next:active { transform: scale(0.95); }
        .btn-next i { font-size: 20px; }

        @keyframes xpPop { 0% { transform: scale(1); } 50% { transform: scale(1.1); color: var(--neon); } 100% { transform: scale(1); } }
        .pop { animation: xpPop 0.3s ease; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="streak-chip"><i class="ri-fire-fill"></i> <span id="streak">0</span> STREAK</div>
        <div style="font-size: 12px; font-weight: 800; color: var(--text-dim);">REV MASTER <span style="color:var(--accent)">V3.0</span></div>
    </div>

    <div class="progress-container">
        <div class="progress-label">
            <span>Daily Mastery</span>
            <span id="prog-text">0%</span>
        </div>
        <div class="bar-bg">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div class="main-stats">
        <div class="stat-card" id="xp-container">
            <i class="ri-flashlight-fill"></i>
            <b id="daily-xp">0</b>
            <p>Today's XP</p>
        </div>
        <div class="stat-card">
            <i class="ri-medal-fill"></i>
            <b id="rank-display" style="font-size: 15px;">Beginner</b>
            <p>Status</p>
        </div>
    </div>

    <div class="deck" onclick="flip()">
        <div class="card" id="card-obj">
            <div class="face front">
                <div class="type-badge" id="category">Computer Quiz</div>
                <div class="q-text" id="q">Loading Question...</div>
                <div class="hint">Tap to see answer</div>
            </div>
            <div class="face back">
                <div class="a-text" id="a">...</div>
                <div class="hint" style="margin-top: 20px;">Ready for next?</div>
            </div>
        </div>
    </div>

    <button class="btn-next" onclick="next()">
        Next Mission <i class="ri-arrow-right-line"></i>
    </button>

    <script>
        const cards = [
            {q:"SSD full form?", a:"Solid State Drive", t:"Hardware"},
            {q:"GPU full form?", a:"Graphics Processing Unit", t:"Hardware"},
            {q:"USB full form?", a:"Universal Serial Bus", t:"Connection"},
            {q:"VGA full form?", a:"Video Graphics Array", t:"Video"},
            {q:"BIOS full form?", a:"Basic Input Output System", t:"System"},
            {q:"DNS full form?", a:"Domain Name System", t:"Network"},
            {q:"ISP full form?", a:"Internet Service Provider", t:"Network"},
            {q:"SQL full form?", a:"Structured Query Language", t:"Database"},
            {q:"GUI full form?", a:"Graphical User Interface", t:"Software"},
            {q:"Virus full form?", a:"Vital Information Resources Under Siege", t:"Security"},
            {q:"1 KB mein kitne bytes?", a:"1024 Bytes", t:"Storage"},
            {q:"Task Manager shortcut?", a:"Ctrl + Shift + Esc", t:"Shortcuts"},
            {q:"Undo shortcut?", a:"Ctrl + Z", t:"Shortcuts"},
            {q:"World's first programmer?", a:"Ada Lovelace", t:"History"}
        ];

        let index = 0;
        let flipped = false;
        let streak = 0;
        let sessionXP = 0;

        function init() {
            const lastDate = localStorage.getItem("bt_rev_date");
            const today = new Date().toDateString();
            if(lastDate !== today) {
                localStorage.setItem("bt_rev_xp", "0");
                localStorage.setItem("bt_rev_date", today);
            }
            updateUI();
            loadCard();
        }

        function loadCard() {
            const data = cards[index];
            document.getElementById("q").innerText = data.q;
            document.getElementById("a").innerText = data.a;
            document.getElementById("category").innerText = data.t;
        }

        function flip() {
            if(flipped) return;
            flipped = true;
            document.getElementById("card-obj").classList.add("flipped");
            
            // Add XP & Effects
            addXP(10);
            streak++;
            document.getElementById("streak").innerText = streak;
            
            // Pulse effect
            const xpBox = document.getElementById("xp-container");
            xpBox.classList.add("pop");
            setTimeout(() => xpBox.classList.remove("pop"), 300);
        }

        function next() {
            if(!flipped) return;
            flipped = false;
            document.getElementById("card-obj").classList.remove("flipped");
            
            setTimeout(() => {
                index = Math.floor(Math.random() * cards.length);
                loadCard();
                updateProgress();
            }, 300);
        }

        function addXP(amt) {
            let daily = parseInt(localStorage.getItem("bt_rev_xp")) || 0;
            let total = parseInt(localStorage.getItem("userXP")) || 0;
            
            localStorage.setItem("bt_rev_xp", daily + amt);
            localStorage.setItem("userXP", total + amt);
            updateUI();
        }

        function updateUI() {
            let daily = parseInt(localStorage.getItem("bt_rev_xp")) || 0;
            document.getElementById("daily-xp").innerText = daily;
            
            // Rank Logic
            let rank = "Beginner";
            if(daily >= 50) rank = "Quick Learner";
            if(daily >= 150) rank = "Mastermind";
            if(daily >= 300) rank = "Grandmaster";
            document.getElementById("rank-display").innerText = rank;

            updateProgress();
        }

        function updateProgress() {
            let daily = parseInt(localStorage.getItem("bt_rev_xp")) || 0;
            let percent = Math.min((daily / 200) * 100, 100);
            document.getElementById("progress-bar").style.width = percent + "%";
            document.getElementById("prog-text").innerText = Math.floor(percent) + "%";
        }

        init();
    </script>
</body>
</html>
