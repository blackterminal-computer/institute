<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Refer & Earn</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #06b6d4; --bg: #020617; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .input-ui { width: 100%; padding: 15px; background: #000; border: 1px solid var(--accent); border-radius: 12px; color: white; margin: 10px 0; }
        .btn-ui { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card" style="text-align:center;">
        <p>Wallet Balance (Verified)</p>
        <h1 id="wallet-balance" style="color:var(--accent);">₹0</h1>
    </div>

    <div class="card">
        <h3>Manual Refer</h3>
        <select id="student-dropdown" class="input-ui"><option>Fetching...</option></select>
        <button onclick="processReferral()" class="btn-ui">SUBMIT FOR REVIEW</button>
    </div>

    <div class="card">
        <h3>Referral History</h3>
        <div id="referral-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, getDocs, setDoc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.firebasestorage.app",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        const student = localStorage.getItem("studentName") || "Guest";

        // Dropdown fix: Debugging ke saath
        async function loadStudents() {
            const dropdown = document.getElementById("student-dropdown");
            try {
                const snap = await getDocs(collection(db, "students"));
                console.log("Students found:", snap.size);
                
                dropdown.innerHTML = '<option value="">Select Student</option>';
                
                snap.forEach(d => {
                    if(d.id !== student) {
                        const opt = document.createElement("option");
                        opt.value = d.id;
                        opt.textContent = d.id;
                        dropdown.appendChild(opt);
                    }
                });
            } catch (err) {
                console.error("Firebase Error:", err);
                dropdown.innerHTML = '<option value="">Error (Check Console)</option>';
            }
        }

        // Wallet & History Logic
        onSnapshot(doc(db, "students", student), (d) => {
            if(d.exists()) document.getElementById('wallet-balance').innerText = `₹${d.data().wallet || 0}`;
        });

        async function loadReferralHistory() {
            const listDiv = document.getElementById("referral-list");
            const q = query(collection(db, "students"), where("referred_by", "==", student));
            const snap = await getDocs(q);
            
            listDiv.innerHTML = snap.empty ? '<p style="font-size:12px; opacity:0.5;">No referrals yet.</p>' : "";
            snap.forEach(d => {
                const data = d.data();
                listDiv.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:12px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between;">
                    <span>${d.id}</span>
                    <span style="color:${data.status === 'verified' ? '#22c55e' : '#facc15'}">${data.status || 'pending'}</span>
                </div>`;
            });
        }

        loadStudents();
        loadReferralHistory();

        window.processReferral = async () => {
            const refName = document.getElementById("student-dropdown").value;
            if(!refName) return alert("Select student!");
            await setDoc(doc(db, "students", refName), { referred_by: student, status: "pending" }, { merge: true });
            alert("Referral Submitted!");
            loadReferralHistory();
        };
    </script>
</body>
</html>
