<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Refer & Earn</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #06b6d4; --bg: #020617; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 16px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 16px; margin-bottom: 16px; backdrop-filter: blur(10px); }
        .input-ui { width: 100%; padding: 12px; background: #000; border: 1px solid var(--accent); border-radius: 10px; color: white; margin: 8px 0; }
        .btn-ui { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card" style="text-align:center;">
        <p style="font-size: 12px; opacity: 0.7;">Wallet Balance (Verified)</p>
        <h1 id="wallet-balance" style="color:var(--accent); margin: 5px 0;">₹0</h1>
    </div>

    <div class="card">
        <h3 style="font-size:14px; margin-bottom:10px;">Referral History</h3>
        <div id="referral-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, updateDoc, increment, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.firebasestorage.app",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        const student = localStorage.getItem("studentName") || "Guest";

        // 1. Balance Update (Real-time)
        onSnapshot(doc(db, "students", student), (d) => {
            if(d.exists()) {
                document.getElementById('wallet-balance').innerText = `₹${d.data().wallet || 0}`;
            }
        });

        // 2. History & Status Logic (Verify referral + Add Balance)
        async function loadReferralHistory() {
            const listDiv = document.getElementById("referral-list");
            const q = query(collection(db, "students"), where("referred_by", "==", student));
            const snap = await getDocs(q);
            
            listDiv.innerHTML = snap.empty ? '<p style="font-size:11px; opacity:0.5;">No referrals yet.</p>' : "";
            
            snap.forEach(d => {
                const data = d.data();
                const isVerified = data.status === 'verified';
                
                listDiv.innerHTML += `
                <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:12px;">${d.id}</span>
                    <button onclick="verifyReferral('${d.id}', '${isVerified}')" style="font-size:9px; padding:4px 8px; border-radius:4px; border:none; background:${isVerified ? '#065f46' : '#854d0e'}; color:#fff; cursor:pointer;">
                        ${data.status || 'pending'}
                    </button>
                </div>`;
            });
        }

        // 3. Verify Function (Naya Feature: Status verify karte hi balance badhega)
        window.verifyReferral = async (refId, alreadyVerified) => {
            if(alreadyVerified === 'true') return alert("Already Verified!");
            
            // Status update
            await updateDoc(doc(db, "students", refId), { status: "verified" });
            
            // Balance Increment (100)
            await updateDoc(doc(db, "students", student), { wallet: increment(100) });
            
            alert("Referral Verified! ₹100 added.");
            loadReferralHistory();
        };

        loadReferralHistory();
    </script>
</body>
</html>
