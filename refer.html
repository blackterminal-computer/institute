<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Refer Pro v3.0</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; --accent: #06b6d4; --bg: #050810; 
            --glass: rgba(255, 255, 255, 0.03); --success: #10b981; --gold: #f59e0b;
            --tier-color: var(--primary);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', system-ui; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; padding: 15px; max-width: 480px; margin: auto; 
            background-image: radial-gradient(circle at top left, rgba(99,102,241,0.15), transparent 40%);
            padding-bottom: 50px;
        }

        .header-title { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; margin-top: 10px; }
        .header-title i { background: var(--glass); padding: 8px; border-radius: 12px; color: var(--accent); }

        /* Wallet Section v3 */
        .wallet-card { 
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.08); padding: 30px 20px; border-radius: 32px; 
            margin-bottom: 25px; text-align: center; position: relative; overflow: hidden;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .wallet-card.tier-vip { border-color: var(--gold); box-shadow: 0 0 30px rgba(245, 158, 11, 0.1); }
        .wallet-card.tier-pro { border-color: var(--accent); }

        .tier-pill { 
            position: absolute; top: 15px; right: 15px; background: var(--tier-color); 
            color: #000; padding: 5px 12px; border-radius: 12px; font-size: 10px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        .earnings-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 10px; }
        .balance { font-size: 52px; font-weight: 800; color: #fff; letter-spacing: -2px; }
        .balance span { color: var(--accent); }

        /* Jackpot Arena */
        .arena-card { 
            background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.2); 
            padding: 20px; border-radius: 28px; margin-bottom: 25px;
        }
        .arena-info h4 { font-size: 14px; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        
        /* Milestone Bar */
        .m-container { display: flex; justify-content: space-between; margin-top: 25px; position: relative; padding: 0 5px; }
        .m-line { position: absolute; top: 11px; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .m-progress { position: absolute; top: 11px; left: 0; height: 3px; background: var(--accent); width: 0%; transition: 1s ease; box-shadow: 0 0 10px var(--accent); }
        .node { width: 26px; height: 26px; border-radius: 50%; background: #0f172a; border: 2px solid rgba(255,255,255,0.1); position: relative; z-index: 2; transition: 0.4s; font-size: 10px; font-weight: 800; display: grid; place-items: center; }
        .node.done { background: var(--accent); border-color: #fff; color: #000; }
        .node.gift { background: #000; border-color: var(--gold); color: var(--gold); }
        .node.gift.done { background: var(--gold); color: #000; }

        /* Input Styles */
        .refer-box { background: var(--glass); border-radius: 28px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .input-wrap { margin-top: 15px; position: relative; }
        .custom-select { width: 100%; padding: 16px; background: #000; border: 1px solid var(--primary); border-radius: 16px; color: #fff; appearance: none; font-size: 14px; font-weight: 600; }
        .btn-submit { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 18px; font-weight: 800; font-size: 15px; margin-top: 15px; cursor: pointer; transition: 0.2s; }
        .btn-submit:active { transform: scale(0.96); }

        /* Copy Link Section */
        .copy-chip { background: #000; border: 1px solid rgba(255,255,255,0.05); padding: 12px 18px; border-radius: 50px; display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .copy-chip code { font-size: 11px; color: var(--accent); font-weight: 600; }
        .copy-chip i { cursor: pointer; color: #94a3b8; transition: 0.2s; }
        .copy-chip i:hover { color: #fff; }

        /* List Section */
        .referral-list-header { font-size: 12px; font-weight: 800; color: #475569; margin: 30px 0 15px 10px; letter-spacing: 1px; }
        .ref-item { background: var(--glass); padding: 18px; border-radius: 20px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid var(--accent); }
        .ref-item.pending { border-left-color: var(--gold); opacity: 0.8; }
        .ref-meta b { font-size: 15px; display: block; }
        .ref-meta small { font-size: 10px; color: #64748b; font-weight: 700; text-transform: uppercase; }
        .status-badge { font-size: 10px; font-weight: 800; padding: 5px 10px; border-radius: 8px; background: rgba(16, 185, 129, 0.1); color: var(--success); }
    </style>
</head>
<body>

    <div class="header-title">
        <i class="ri-user-heart-line"></i>
        <h3 style="font-weight: 800;">Referral Dashboard</h3>
    </div>

    <div class="wallet-card" id="wallet">
        <div id="tier-tag"><span class="tier-pill">Tier 1</span></div>
        <div class="earnings-label">Available Earnings</div>
        <div class="balance">₹<span id="wallet-balance">0</span></div>
        <p id="reward-info" style="font-size: 12px; color: var(--success); font-weight: 700; margin-top: 5px;"><i class="ri-checkbox-circle-fill"></i> ₹100 Per Invite</p>
    </div>

    <div class="arena-card">
        <div class="arena-info">
            <h4><i class="ri-vip-diamond-fill" style="color:var(--gold)"></i> Referral Jackpot</h4>
            <p style="font-size: 11px; opacity: 0.6;">Unlock 5 referrals to get <b>₹500 Instant Bonus</b></p>
        </div>
        
        <div class="m-container">
            <div class="m-line"></div>
            <div id="m-fill" class="m-progress"></div>
            <div class="node" id="n1">1</div>
            <div class="node" id="n2">2</div>
            <div class="node" id="n3">3</div>
            <div class="node" id="n4">4</div>
            <div class="node gift" id="n5"><i class="ri-gift-fill"></i></div>
        </div>
        <p id="prog-status" style="text-align:center; font-size: 11px; margin-top: 20px; color: #94a3b8; font-weight: 600;">Loading milestones...</p>
    </div>

    <div class="refer-box">
        <h4 style="font-weight: 800; font-size: 14px;">Invite a Friend</h4>
        <div class="input-wrap">
            <select id="student-dropdown" class="custom-select"><option>Loading...</option></select>
        </div>
        <button onclick="processReferral()" class="btn-submit">SUBMIT INVITE <i class="ri-sparkling-fill"></i></button>
        
        <div class="copy-chip">
            <code id="share-url">blackterminal.io/invite</code>
            <i class="ri-file-copy-2-line" onclick="copyLink()"></i>
        </div>
    </div>

    <h3 class="referral-list-header">RECENT REFERRALS</h3>
    <div id="referral-list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, getDocs, setDoc, query, where, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.firebasestorage.app",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const currentStudent = localStorage.getItem("studentName") || "Guest";

        onSnapshot(query(collection(db, "students"), where("referred_by", "==", currentStudent)), (snap) => {
            const listDiv = document.getElementById("referral-list");
            listDiv.innerHTML = "";
            let verifiedCount = 0;

            snap.forEach(d => {
                const data = d.data();
                const isVerified = data.status === 'verified';
                if(isVerified) verifiedCount++;
                
                listDiv.innerHTML += `
                <div class="ref-item ${!isVerified ? 'pending' : ''}">
                    <div class="ref-meta">
                        <b>${d.id}</b>
                        <small>${isVerified ? 'Verified Account' : 'Action Required'}</small>
                    </div>
                    <span class="status-badge" style="${!isVerified ? 'background:rgba(245,158,11,0.1); color:var(--gold)' : ''}">
                        ${data.status?.toUpperCase() || 'PENDING'}
                    </span>
                </div>`;
            });

            // LOGIC v3
            let rewardPerRef = 100;
            let tierName = "Tier 1";
            let walletClass = "";
            
            if(verifiedCount > 20) {
                rewardPerRef = 500;
                tierName = "Tier 3 (VIP)";
                walletClass = "tier-vip";
                document.documentElement.style.setProperty('--tier-color', '#f59e0b');
            } else if(verifiedCount > 10) {
                rewardPerRef = 200;
                tierName = "Tier 2 (Pro)";
                walletClass = "tier-pro";
                document.documentElement.style.setProperty('--tier-color', '#06b6d4');
            } else {
                document.documentElement.style.setProperty('--tier-color', '#6366f1');
            }

            let totalEarnings = verifiedCount * rewardPerRef;
            if(verifiedCount >= 5) totalEarnings += 500;

            // UI UPDATES
            const balanceEl = document.getElementById('wallet-balance');
            balanceEl.innerText = totalEarnings.toLocaleString();
            document.getElementById('wallet').className = `wallet-card ${walletClass}`;
            document.getElementById('tier-tag').innerHTML = `<span class="tier-pill">${tierName}</span>`;
            document.getElementById('reward-info').innerHTML = `<i class="ri-checkbox-circle-fill"></i> ₹${rewardPerRef} Per Verified Friend`;

            // Milestone
            const progress = Math.min((verifiedCount / 5) * 100, 100);
            document.getElementById('m-fill').style.width = `${progress}%`;
            for(let i=1; i<=5; i++) {
                const node = document.getElementById(`n${i}`);
                if(i <= verifiedCount) node.classList.add('done');
                else node.classList.remove('done');
            }
            
            const rem = 5 - verifiedCount;
            document.getElementById('prog-status').innerHTML = rem > 0 
                ? `Bring <b>${rem} more</b> friends to claim your ₹500 Bonus!` 
                : "🎉 JACKPOT UNLOCKED: Bonus added to balance";
        });

        async function loadStudents() {
            const dropdown = document.getElementById("student-dropdown");
            const snap = await getDocs(collection(db, "students"));
            dropdown.innerHTML = '<option value="">Choose Friend</option>';
            snap.forEach(d => { 
                if(d.id !== currentStudent) dropdown.innerHTML += `<option value="${d.id}">${d.id}</option>`; 
            });
        }

        window.processReferral = async () => {
            const refName = document.getElementById("student-dropdown").value;
            if(!refName) return alert("Please select a student!");
            await setDoc(doc(db, "students", refName), { referred_by: currentStudent, status: "pending" }, { merge: true });
            alert("Invitation Sent! 🚀 Wait for verification.");
        };

        window.copyLink = () => {
            navigator.clipboard.writeText(`https://blackterminal-computer.github.io/institute/login.html`);
            alert("Invite link copied to clipboard!");
        };

        loadStudents();
    </script>
</body>
</html>
