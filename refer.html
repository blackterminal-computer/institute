<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Refer & Earn Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #06b6d4; --bg: #020617; --glass: rgba(255, 255, 255, 0.05); --success: #22c55e; --gold: #fbbf24; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 24px; margin-bottom: 20px; backdrop-filter: blur(10px); position: relative; }
        
        /* Jackpot Animation */
        .jackpot-card { background: linear-gradient(145deg, rgba(99,102,241,0.1), rgba(6,182,212,0.1)); border: 1px solid var(--gold); }
        
        .tier-badge { background: var(--gold); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 900; text-transform: uppercase; }
        
        .input-ui { width: 100%; padding: 15px; background: #000; border: 1px solid var(--accent); border-radius: 12px; color: white; margin: 10px 0; box-sizing: border-box; }
        .btn-ui { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }

        /* Multi-Step Progress Bar */
        .milestone-container { display: flex; justify-content: space-between; margin-top: 20px; position: relative; }
        .node { width: 25px; height: 25px; border-radius: 50%; background: #1e293b; border: 2px solid rgba(255,255,255,0.1); z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: 0.4s; }
        .node.active { background: var(--accent); border-color: #fff; box-shadow: 0 0 10px var(--accent); color: #000; }
        .m-line { position: absolute; top: 12px; left: 0; height: 2px; background: rgba(255,255,255,0.1); width: 100%; z-index: 1; }
        .m-fill { position: absolute; top: 12px; left: 0; height: 2px; background: var(--accent); width: 0%; z-index: 1; transition: 0.4s; }
        
        .hot-tag { background: #ef4444; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); font-weight: bold; }
    </style>
</head>
<body>

    <div class="card" style="text-align:center;">
        <div class="hot-tag">🔥 REWARDS BOOSTED</div>
        <div style="position: absolute; top: 15px; right: 15px;" id="tier-tag"><span class="tier-badge">Tier 1</span></div>
        <p style="opacity: 0.7; font-size: 14px; margin-top: 5px;">Total Earnings</p>
        <h1 id="wallet-balance" style="color:var(--accent); font-size: 45px; margin: 10px 0;">₹0</h1>
        <p id="reward-info" style="font-size:12px; color:var(--success); font-weight: bold;">₹100 Per Verified Friend</p>
    </div>

    <div class="card jackpot-card">
        <h4 style="margin:0; font-size: 14px; color: var(--gold);"><i class="ri-fire-fill"></i> 5th REF SPECIAL BONUS</h4>
        <p style="font-size: 11px; opacity: 0.8; margin: 5px 0 15px 0;">Reach 5 referrals to get an instant <b>₹500 Jackpot!</b></p>
        
        <div class="milestone-container">
            <div class="m-line"></div>
            <div id="m-fill" class="m-fill"></div>
            <div class="node" id="n1">1</div>
            <div class="node" id="n2">2</div>
            <div class="node" id="n3">3</div>
            <div class="node" id="n4">4</div>
            <div class="node" id="n5" style="background:var(--gold); border-color:#fff;">🎁</div>
        </div>
        <p id="prog-status" style="text-align: center; font-size: 12px; margin-top: 15px; color: var(--accent);">Waiting for your first referral...</p>
    </div>

    <div class="card">
        <h3 style="margin:0 0 15px 0; font-size: 16px;">Quick Refer</h3>
        <select id="student-dropdown" class="input-ui"><option>Loading Students...</option></select>
        <button onclick="processReferral()" class="btn-ui">SUBMIT REFERRAL <i class="ri-send-plane-fill"></i></button>
        <div style="margin-top:15px; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px; border:1px dashed var(--accent); display:flex; justify-content:space-between; align-items:center;">
            <code id="share-url" style="font-size:11px; color:var(--accent);">https://blackterminal-computer.github.io/institute/login.html</code>
            <i class="ri-file-copy-line" onclick="copyLink()" style="cursor:pointer; color:var(--accent);"></i>
        </div>
    </div>

    <div id="referral-list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, getDocs, setDoc, query, where, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.firebasestorage.app",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const currentStudent = localStorage.getItem("studentName") || "Guest";

        onSnapshot(query(collection(db, "students"), where("referred_by", "==", currentStudent)), (snap) => {
            const listDiv = document.getElementById("referral-list");
            listDiv.innerHTML = "";
            let verifiedCount = 0;

            snap.forEach(d => {
                const data = d.data();
                if(data.status === 'verified') verifiedCount++;
                listDiv.innerHTML += `
                <div class="card" style="padding:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div><b style="font-size:14px;">${d.id}</b><br><small style="opacity:0.5;">Verified User</small></div>
                    <span style="color:${data.status === 'verified' ? 'var(--success)' : 'var(--gold)'}; font-size:12px; font-weight:bold;">${data.status?.toUpperCase() || 'PENDING'}</span>
                </div>`;
            });

            // TIERED LOGIC (As requested)
            let rewardPerRef = 100;
            let tierName = "Tier 1";
            
            if(verifiedCount > 20) {
                rewardPerRef = 500;
                tierName = "Tier 3 (VIP)";
            } else if(verifiedCount > 10) {
                rewardPerRef = 200;
                tierName = "Tier 2 (Pro)";
            }

            // Calculation
            let totalEarnings = verifiedCount * rewardPerRef;
            if(verifiedCount >= 5) totalEarnings += 500; // Extra Jackpot bonus

            // UI UPDATES
            document.getElementById('wallet-balance').innerText = `₹${totalEarnings}`;
            document.getElementById('tier-tag').innerHTML = `<span class="tier-badge">${tierName}</span>`;
            document.getElementById('reward-info').innerText = `₹${rewardPerRef} Per Verified Friend`;

            // Milestone Tracker (For first 5)
            const progress = Math.min((verifiedCount / 5) * 100, 100);
            document.getElementById('m-fill').style.width = `${progress}%`;
            for(let i=1; i<=5; i++) {
                if(i <= verifiedCount) document.getElementById(`n${i}`).classList.add('active');
            }
            
            const rem = 5 - verifiedCount;
            document.getElementById('prog-status').innerHTML = rem > 0 ? `Only <b>${rem} more</b> to unlock ₹500 bonus!` : "<b>🎉 JACKPOT UNLOCKED!</b>";
        });

        // Load Students for Dropdown
        async function loadStudents() {
            const dropdown = document.getElementById("student-dropdown");
            const snap = await getDocs(collection(db, "students"));
            dropdown.innerHTML = '<option value="">Select Friend</option>';
            snap.forEach(d => { 
                if(d.id !== currentStudent) dropdown.innerHTML += `<option value="${d.id}">${d.id}</option>`; 
            });
        }

        window.processReferral = async () => {
            const refName = document.getElementById("student-dropdown").value;
            if(!refName) return alert("Select a friend!");
            await setDoc(doc(db, "students", refName), { referred_by: currentStudent, status: "pending" }, { merge: true });
            alert("Referral Submitted! 🎉");
        };

        window.copyLink = () => {
            navigator.clipboard.writeText(`https://blackterminal-computer.github.io/institute/login.html`);
            alert("Link Copied!");
        };

        loadStudents();
    </script>
</body>
</html>
