<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BT | Refer & Earn</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Wallet Balance</h3>
        <h1 id="wallet-balance">₹0</h1>
    </div>

    <div class="card">
        <h3>Referral History</h3>
        <div id="referral-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.firebasestorage.app",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        const student = localStorage.getItem("studentName") || "Guest";

        // Wallet Balance Real-time update
        onSnapshot(doc(db, "students", student), (d) => {
            if(d.exists()) document.getElementById('wallet-balance').innerText = `₹${d.data().wallet || 0}`;
        });

        // Referral List Real-time update
        onSnapshot(query(collection(db, "students"), where("referred_by", "==", student)), (snap) => {
            const listDiv = document.getElementById("referral-list");
            listDiv.innerHTML = "";
            snap.forEach(d => {
                listDiv.innerHTML += `<div>${d.id} - ${d.data().status}</div>`;
            });
        });
    </script>
</body>
</html>
