<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Refer & Earn Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #06b6d4; --bg: #020617; --glass: rgba(255, 255, 255, 0.05); --success: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 500px; margin: auto; line-height: 1.5; }
        
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 24px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        
        .input-ui { width: 100%; padding: 15px; background: #000; border: 1px solid var(--accent); border-radius: 12px; color: white; margin: 10px 0; box-sizing: border-box; outline: none; }
        
        .btn-ui { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-ui:active { transform: scale(0.95); }

        .tier-badge { background: var(--accent); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        
        .ref-link-box { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px; border: 1px dashed var(--accent); display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        
        #referral-list { max-height: 250px; overflow-y: auto; margin-top: 10px; }
        .ref-item { background: rgba(255,255,255,0.03); padding: 12px; margin-bottom: 8px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        
        .status-pill { font-size: 11px; padding: 4px 10px; border-radius: 8px; font-weight: 600; text-transform: capitalize; }
    </style>
</head>
<body>

    <div class="card" style="text-align:center; position: relative;">
        <div style="position: absolute; top: 15px; right: 15px;" id="tier-tag"><span class="tier-badge">Tier 1</span></div>
        <p style="opacity: 0.6; font-size: 14px; margin-bottom: 5px;">Wallet Balance</p>
        <h1 id="wallet-balance" style="color:var(--accent); font-size: 48px; margin: 0;">₹0</h1>
        <p id="reward-info" style="font-size:12px; color:var(--success); margin-top: 10px;">Earn ₹100 per verified friend</p>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
            <span id="milestone-text" style="font-size:13px; font-weight:bold;">0 Referrals</span>
            <span id="next-tier-info" style="font-size:11px; opacity: 0.5;">Next Tier: 10 Refs</span>
        </div>
        <div style="height:12px; background:rgba(0,0,0,0.5); border-radius:10px; display:flex; gap:4px; padding: 3px;">
            <div id="progress-bar-container" style="display:contents;"></div>
        </div>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0; font-size: 16px;"><i class="ri-links-line"></i> Your Referral Link</h3>
        <div class="ref-link-box">
            <code id="share-url" style="font-size: 11px; color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%;">loading...</code>
            <button onclick="copyLink()" style="background:none; border:none; color:var(--accent); cursor:pointer; padding:5px;">
                <i class="ri-file-copy-2-line" style="font-size: 20px;"></i>
            </button>
        </div>
    </div>

    <div class="card">
        <h3 style="margin:0 0 5px 0; font-size: 16px;"><i class="ri-user-add-line"></i> Manual Refer</h3>
        <select id="student-dropdown" class="input-ui"><option>Loading students...</option></select>
        <button onclick="processReferral()" class="btn-ui">SUBMIT FOR REVIEW</button>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0; font-size: 16px;">History</h3>
        <div id="referral-list">
            <p style="text-align:center; opacity:0.4; font-size: 13px; padding: 20px;">No history found.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, getDocs, setDoc, query, where, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.firebasestorage.app",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const currentStudent = localStorage.getItem("studentName") || "Guest";
        
        // Dynamic Link Generation
        const baseUrl = window.location.origin; 
        const fullLink = `${baseUrl}/signup.html?ref=${encodeURIComponent(currentStudent)}`;
        document.getElementById('share-url').innerText = fullLink;

        // Build 10 Progress Segments
        const progBox = document.getElementById('progress-bar-container');
        for(let i=1; i<=10; i++) {
            progBox.innerHTML += `<div id="m${i}" style="flex:1; background:rgba(255,255,255,0.05); border-radius:10px; transition: 0.4s ease;"></div>`;
        }

        // Main Listener
        onSnapshot(query(collection(db, "students"), where("referred_by", "==", currentStudent)), (snap) => {
            const listDiv = document.getElementById("referral-list");
            listDiv.innerHTML = "";
            let verifiedCount = 0;

            if (snap.empty) {
                listDiv.innerHTML = `<p style="text-align:center; opacity:0.4; font-size:13px; padding:20px;">No referrals yet. Share your link!</p>`;
            }

            snap.forEach(d => {
                const data = d.data();
                if(data.status === 'verified') verifiedCount++;
                
                const statusColor = data.status === 'verified' ? '#22c55e' : '#facc15';
                const statusBg = data.status === 'verified' ? 'rgba(34,197,94,0.1)' : 'rgba(250,204,21,0.1)';

                listDiv.innerHTML += `
                <div class="ref-item">
                    <span style="font-weight:600;">${d.id}</span>
                    <span class="status-pill" style="background:${statusBg}; color:${statusColor}">${data.status || 'pending'}</span>
                </div>`;
            });

            // Rewards Calculation
            const tier = Math.min(3, Math.floor(verifiedCount / 10) + 1);
            const rewardPerRef = (tier === 1) ? 100 : (tier === 2) ? 200 : 300;
            const progress = verifiedCount % 10;

            document.getElementById('wallet-balance').innerText = `₹${verifiedCount * rewardPerRef}`;
            document.getElementById('tier-tag').innerHTML = `<span class="tier-badge">Tier ${tier}</span>`;
            document.getElementById("milestone-text").innerText = `${verifiedCount} Verified Referrals`;
            document.getElementById("reward-info").innerText = `Current Rate: ₹${rewardPerRef} per referral`;
            
            // Update Progress Segments
            for(let i = 1; i <= 10; i++) {
                const el = document.getElementById(`m${i}`);
                if(i <= progress) {
                    el.style.background = 'var(--accent)';
                    el.style.boxShadow = '0 0 8px var(--accent)';
                } else {
                    el.style.background = 'rgba(255,255,255,0.1)';
                    el.style.boxShadow = 'none';
                }
            }
        });

        // Copy Function with Fallback
        window.copyLink = async () => {
            const link = document.getElementById('share-url').innerText;
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(link);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = link;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                }
                alert("Link Copied! Share it with your friends.");
            } catch (err) {
                alert("Failed to copy. Please select the text and copy manually.");
            }
        };

        // Manual Referral
        window.processReferral = async () => {
            const refName = document.getElementById("student-dropdown").value;
            if(!refName || refName === "Select Student") return alert("Please select a student!");
            
            await setDoc(doc(db, "students", refName), { 
                referred_by: currentStudent, 
                status: "pending",
                updatedAt: new Date()
            }, { merge: true });
            alert("Referral Submitted! It will show in history as pending.");
        };

        // Dropdown Loader
        const loadStudents = async () => {
            const dropdown = document.getElementById("student-dropdown");
            const snap = await getDocs(collection(db, "students"));
            dropdown.innerHTML = '<option value="">Select Student</option>';
            snap.forEach(d => { 
                if(d.id !== currentStudent) dropdown.innerHTML += `<option value="${d.id}">${d.id}</option>`; 
            });
        };

        loadStudents();
    </script>
</body>
</html>
