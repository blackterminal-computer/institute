<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Refer & Earn</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --gold: #facc15; --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #f8fafc; padding-bottom: 120px; 
            background-image: radial-gradient(circle at bottom left, #1e1b4b, transparent);
            min-height: 100vh;
        }

        header { padding: 25px 20px 10px; display: flex; align-items: center; gap: 15px; }
        .back-btn { width: 42px; height: 42px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; display: flex; align-items: center; justify-content: center; text-decoration: none; color: white; }

        .hero-section { text-align: center; padding: 30px 20px; }
        .gift-icon { font-size: 80px; color: var(--gold); filter: drop-shadow(0 0 20px rgba(250, 204, 21, 0.4)); animation: bounce 2s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .reward-box { background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(6, 182, 212, 0.1)); border: 1px solid var(--glass-border); margin: 0 20px; padding: 25px; border-radius: 30px; text-align: center; backdrop-filter: blur(10px); }
        .reward-amt { font-size: 48px; font-weight: 800; color: var(--gold); margin: 5px 0; }

        .share-card { background: var(--glass); border: 1px solid var(--glass-border); margin: 20px; padding: 25px; border-radius: 28px; }
        .code-area { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px dashed var(--accent); margin: 15px 0; }
        .refer-code { font-size: 20px; font-weight: 800; letter-spacing: 2px; color: var(--accent); }
        
        .whatsapp-btn { background: #25d366; color: white; width: 100%; padding: 16px; border-radius: 18px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-weight: 800; margin-top: 10px; }

        /* Milestone & List Styles */
        .milestone-bar { margin: 20px; padding: 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; }
        .progress-track { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; }
        .log-card { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--glass); border-radius: 15px; margin: 0 20px 10px 20px; border: 1px solid var(--glass-border); }
        
        .bottom-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-radius: 24px; display: flex; justify-content: space-around; padding: 12px; border: 1px solid var(--glass-border); z-index: 1000; }
        .nav-link { color: #64748b; text-decoration: none; text-align: center; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 22px; display: block; }
        .nav-link span { font-size: 10px; font-weight: 700; display: block; }
    </style>
</head>
<body>

    <header>
        <a href="courses.html" class="back-btn"><i class="ri-arrow-left-s-line"></i></a>
        <div><h1 style="font-size: 20px;">Refer & <span style="color:var(--gold)">Earn</span></h1></div>
    </header>

    <div class="hero-section">
        <i class="ri-gift-2-fill gift-icon"></i>
        <h2 style="margin-top:10px;">Invite Friends</h2>
        <p style="opacity:0.6; font-size:13px;" id="refer-desc">Get rewards for every new enrollment</p>
    </div>

    <div class="milestone-bar">
        <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:800; opacity:0.8;">
            <span>TOTAL EARNINGS</span> <span id="total-earned" style="color:var(--gold)">₹0</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="p-bar"></div></div>
        <p id="milestone-status" style="font-size:10px; color:var(--accent);">0 Referrals</p>
    </div>

    <div class="reward-box">
        <p style="font-size: 11px; font-weight: 800; opacity: 0.6; letter-spacing: 1px;">CURRENT TIER REWARD</p>
        <div class="reward-amt">₹<span id="reward-amt">0</span></div>
        <p style="font-size: 12px; opacity: 0.8;">Per successful referral</p>
    </div>

    <div class="share-card">
        <label style="font-size: 11px; font-weight: 800; opacity: 0.5;">YOUR UNIQUE CODE</label>
        <div class="code-area">
            <span class="refer-code" id="user-code">BT-7742</span>
            <i class="ri-file-copy-line" style="color:var(--accent)" onclick="copyCode()"></i>
        </div>
        <a href="#" id="wa-share" class="whatsapp-btn"><i class="ri-whatsapp-line"></i> SHARE ON WHATSAPP</a>
    </div>

    <div style="margin: 20px;">
        <h3 style="font-size: 14px; margin-bottom: 10px;">Referred Students</h3>
        <div id="referral-list"></div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link"><i class="ri-home-5-line"></i><span>Home</span></a>
        <a href="daily-test.html" class="nav-link"><i class="ri-edit-line"></i><span>Exams</span></a>
        <a href="refer.html" class="nav-link active"><i class="ri-gift-fill"></i><span>Refer</span></a>
        <a href="courses.html" class="nav-link"><i class="ri-mac-fill"></i><span>Courses</span></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-line"></i><span>Profile</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { /* Apna Config Wahi Hai */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const student = localStorage.getItem("studentName");

        // Logic for Tiered Earnings
        function calcEarnings(refs) {
            let total = 0, r = refs, t = 1;
            while(r > 0) {
                let c = Math.min(r, 10);
                total += c * (t * 100);
                r -= c; t++;
            }
            return total;
        }

        onSnapshot(doc(db, "students", student), (d) => {
            if(d.exists()){
                const data = d.data();
                const refs = data.total_referrals || 0;
                document.getElementById('total-earned').innerText = `₹${calcEarnings(refs)}`;
                document.getElementById('reward-amt').innerText = (Math.floor(refs/10)+1)*100;
                document.getElementById('p-bar').style.width = `${(refs%10)*10}%`;
                document.getElementById('milestone-status').innerText = `${refs} Referrals - Next tier at ${Math.floor(refs/10)*10 + 10}`;
            }
        });

        // List Fetch
        const q = query(collection(db, "students"), where("referred_by", "==", student));
        getDocs(q).then(snap => {
            const list = document.getElementById('referral-list');
            snap.forEach(d => {
                list.innerHTML += `<div class="log-card"><i class="ri-user-3-line"></i> <span>${d.id}</span></div>`;
            });
        });

        window.copyCode = () => { navigator.clipboard.writeText(document.getElementById('user-code').innerText); alert("Copied!"); }
    </script>
</body>
</html>
