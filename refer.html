<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Refer & Earn</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #06b6d4; --bg: #020617; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .input-ui { width: 100%; padding: 15px; background: #000; border: 1px solid var(--accent); border-radius: 12px; color: white; margin: 10px 0; }
        .btn-ui { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card" style="text-align:center;">
        <p>Wallet Balance (Verified)</p>
        <h1 id="wallet-balance" style="color:var(--accent);">₹0</h1>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span style="font-size:12px; font-weight:bold;">Milestone Progress</span>
            <span id="milestone-text" style="font-size:12px; color:var(--accent);">0 / 10 Referrals</span>
        </div>
        
        <div style="height:8px; background:#000; border-radius:10px; display:flex; gap:2px; margin-bottom:15px;">
            <div id="m1" style="flex:1; background:rgba(255,255,255,0.1); border-radius:10px;"></div>
            <div id="m2" style="flex:1; background:rgba(255,255,255,0.1); border-radius:10px;"></div>
            <div id="m3" style="flex:1; background:rgba(255,255,255,0.1); border-radius:10px;"></div>
            <div id="m4" style="flex:1; background:rgba(255,255,255,0.1); border-radius:10px;"></div>
            <div id="m5" style="flex:1; background:rgba(255,255,255,0.1); border-radius:10px;"></div>
            <div id="m6" style="flex:1; background:rgba(255,255,255,0.1); border-radius:10px;"></div>
            <div id="m7" style="flex:1; background:rgba(255,255,255,0.1); border-radius:10px;"></div>
            <div id="m8" style="flex:1; background:rgba(255,255,255,0.1); border-radius:10px;"></div>
            <div id="m9" style="flex:1; background:rgba(255,255,255,0.1); border-radius:10px;"></div>
            <div id="m10" style="flex:1; background:rgba(255,255,255,0.1); border-radius:10px;"></div>
        </div>
        <p id="reward-info" style="font-size:10px; text-align:center; opacity:0.7;">Next Reward: ₹100 per referral</p>
    </div>

    <div class="card">
        <h3>Manual Refer</h3>
        <select id="student-dropdown" class="input-ui"><option>Fetching...</option></select>
        <button onclick="processReferral()" class="btn-ui">SUBMIT FOR REVIEW</button>
    </div>

    <div class="card">
        <h3>Referral History</h3>
        <div id="referral-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, getDocs, setDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.firebasestorage.app",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        const student = localStorage.getItem("studentName") || "Guest";

        // Auto-refresh logic (2 seconds)
        setInterval(() => {
            loadReferralHistory();
            loadStudents(); 
        }, 2000);

        async function updateMilestone(count) {
            let progress = count % 10;
            let tier = Math.floor(count / 10);
            
            for(let i = 1; i <= 10; i++) {
                document.getElementById(`m${i}`).style.background = (i <= progress) ? 'var(--accent)' : 'rgba(255,255,255,0.1)';
            }
            
            document.getElementById("milestone-text").innerText = `${progress} / 10 Referrals`;
            document.getElementById("reward-info").innerText = `Current Reward: ₹${(tier + 1) * 100} per referral`;
        }

        async function loadStudents() {
            const dropdown = document.getElementById("student-dropdown");
            const snap = await getDocs(collection(db, "students"));
            // Keep current value if possible, or just refresh list
            const currentVal = dropdown.value;
            dropdown.innerHTML = '<option value="">Select Student</option>';
            snap.forEach(d => { if(d.id !== student) dropdown.innerHTML += `<option value="${d.id}">${d.id}</option>`; });
            dropdown.value = currentVal;
        }

        async function loadReferralHistory() {
            const listDiv = document.getElementById("referral-list");
            const q = query(collection(db, "students"), where("referred_by", "==", student));
            const snap = await getDocs(q);
            
            updateMilestone(snap.size); 
            
            listDiv.innerHTML = snap.empty ? '<p style="font-size:12px; opacity:0.5;">No referrals yet.</p>' : "";
            snap.forEach(d => {
                const data = d.data();
                listDiv.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:12px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between;">
                    <span>${d.id}</span>
                    <span style="color:${data.status === 'verified' ? '#22c55e' : '#facc15'}">${data.status || 'pending'}</span>
                </div>`;
            });
        }

        loadStudents();
        loadReferralHistory();

        onSnapshot(doc(db, "students", student), (d) => {
            if(d.exists()) document.getElementById('wallet-balance').innerText = `₹${d.data().wallet || 0}`;
        });

        window.processReferral = async () => {
            const refName = document.getElementById("student-dropdown").value;
            if(!refName) return alert("Select student!");
            await setDoc(doc(db, "students", refName), { referred_by: student, status: "pending" }, { merge: true });
            alert("Referral Submitted!");
            loadReferralHistory();
        };
    </script>
</body>
</html>
