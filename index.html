<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Elite Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="shoutoutBubble">
        <img src="" id="bAvatar" class="b-av">
        <div>
            <span style="font-size:8px; color:var(--accent); font-weight:900;" id="bUser">SYSTEM</span>
            <p style="font-size:11px; font-weight:600;" id="bMsg">Waiting for signals...</p>
        </div>
    </div>

    <div id="overlay-blur" onclick="togglePanel()"></div>
    
    <div id="activityPanel">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; position:sticky; top:0; background:#0b0f1a; padding-bottom:10px; z-index:10;">
            <h3 style="font-family:'Orbitron', sans-serif; font-size:14px; color:var(--accent);">SIGNAL ARCHIVE</h3>
            <i class="ri-close-line" onclick="togglePanel()" style="font-size:24px; color:var(--danger);"></i>
        </div>
        <div id="logList"></div>
    </div>

    <div class="shout-trigger" onclick="togglePanel()"><i class="ri-history-line"></i></div>
    <div id="adminAlert">
        <div style="display:flex; align-items:center; gap:12px;">
            <i class="ri-error-warning-fill" style="font-size:24px; color:var(--gold);"></i>
            <div>
                <b style="font-size:12px; color:var(--accent); text-transform:uppercase;">System Message</b>
                <p id="alertText" style="font-size:14px; font-weight:600; margin-top:2px;"></p>
            </div>
        </div>
    </div>

    <a href="attendence.html" id="att-pill" class="float-att pulse">
        <i class="ri-fingerprint-fill" id="att-pill-icon"></i>
        <span id="att-pill-text">Attendance</span>
    </a>

    <header class="premium-header">
        <div class="user-meta">
            <div class="avatar-box"><img id="uAvatar" src="" alt="Avatar"></div>
            <div>
                <div id="rankBadge" class="rank-badge">Elite Rank</div>
                <p id="greetText" style="font-size: 10px; opacity: 0.5; font-weight: 800; text-transform: uppercase;">Syncing...</p>
                <h2 id="uName" style="font-size: 18px; font-weight: 800;">Student</h2>
                <div id="onlineStatus" style="font-size: 9px; color: var(--success); font-weight: 800; display: flex; align-items: center; gap: 4px;">
                    <span style="width:6px; height:6px; background:var(--success); border-radius:50%;"></span>
                    <span id="onlineCount">0</span> Online
                </div>
            </div>
        </div>
        <div id="sCount" style="background:rgba(255,100,0,0.1); color:#ff6400; padding:8px 15px; border-radius:15px; font-weight:800; font-size:12px;">🔥 0 Days</div>
    </header>

    <div class="marquee-container">
        <div class="marquee-content" id="marqueeMsg">Syncing with terminal...</div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link active"><i class="ri-home-5-fill"></i><span>Home</span></a>
        </nav>

    <script type="module" src="app.js"></script>
    
</body>
</html>
