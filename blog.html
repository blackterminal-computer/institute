<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Archive | Black Terminal</title>
    <style>
        :root { --bg: #020617; --accent: #06b6d4; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); color: #f8fafc; font-family: sans-serif; padding: 20px; max-width: 700px; margin: auto; }
        .blog-post { background: var(--glass); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        .blog-title { color: var(--accent); font-size: 20px; font-weight: 800; }
    </style>
</head>
<body>
    <div id="container">Loading archive...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const container = document.getElementById("container");

        // Real-time listener
        const q = query(collection(db, "blogs"), orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snapshot) => {
            container.innerHTML = ""; // Clear existing
            
            if (snapshot.empty) {
                container.innerHTML = "No posts found in database.";
                return;
            }

            snapshot.forEach((doc) => {
                const b = doc.data();
                // Safe mapping of content
                const contentText = Array.isArray(b.content) ? b.content.join(" ") : "No content";
                
                container.innerHTML += `
                    <div class="blog-post">
                        <div class="blog-title">${b.title || "Untitled"}</div>
                        <p style="opacity:0.7;">${contentText.substring(0, 100)}...</p>
                    </div>
                `;
            });
        }, (err) => {
            console.error("Critical Firebase Error:", err);
            container.innerHTML = "Connection Error: Check Console (F12).";
        });
    </script>
</body>
</html>
