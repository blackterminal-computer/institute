<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive | Black Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --accent: #6366f1; --border: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; padding: 40px 20px; margin: 0; }
        .wrapper { max-width: 650px; margin: auto; }
        
        .post { backdrop-filter: blur(10px); background: rgba(15, 23, 42, 0.5); padding: 30px; border-radius: 24px; margin-bottom: 30px; border: 1px solid var(--border); }
        h3 { font-size: 22px; margin-top: 0; }
        
        .para { line-height: 1.7; color: #cbd5e1; margin-bottom: 20px; white-space: pre-wrap; font-size: 16px; }
        
        .code-block { position: relative; margin: 20px 0; }
        pre { background: #000; padding: 20px; border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; white-space: pre; font-family: 'Courier New', monospace; color: #a5b4fc; font-size: 14px; }
        
        .copy-btn { position: absolute; top: 10px; right: 10px; background: #1e293b; color: white; border: none; padding: 5px 10px; border-radius: 6px; font-size: 10px; cursor: pointer; }
        
        .btn { cursor: pointer; padding: 12px 25px; border-radius: 12px; font-weight: 600; border: 1px solid var(--accent); background: transparent; color: var(--accent); transition: 0.3s; width: 100%; }
        .btn:hover { background: var(--accent); color: white; }
    </style>
</head>
<body>
    <div class="wrapper" id="container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        onSnapshot(query(collection(db, "blogs"), orderBy("createdAt", "desc")), (snap) => {
            const container = document.getElementById("container"); container.innerHTML = "";
            snap.forEach(doc => {
                const b = doc.data();
                if(b.status !== 'published') return;
                
                const card = document.createElement('div'); card.className = 'post';
                card.innerHTML = `<h3>${b.title}</h3><div id="body-${doc.id}" style="display:none;"></div><button class="btn" onclick="toggle('${doc.id}', this)">READ LOG</button>`;
                container.appendChild(card);
                
                const bodyDiv = document.getElementById(`body-${doc.id}`);
                b.content.forEach(item => {
                    const isCode = typeof item === 'object' && item.isCode;
                    const text = typeof item === 'object' ? item.text : item;
                    if(isCode) {
                        const wrapper = document.createElement('div'); wrapper.className = 'code-block';
                        wrapper.innerHTML = `<button class="copy-btn">COPY</button><pre></pre>`;
                        wrapper.querySelector('pre').textContent = text;
                        wrapper.querySelector('.copy-btn').onclick = (e) => {
                            navigator.clipboard.writeText(text);
                            e.target.innerText = "COPIED";
                            setTimeout(() => e.target.innerText = "COPY", 2000);
                        };
                        bodyDiv.appendChild(wrapper);
                    } else {
                        const p = document.createElement('p'); p.className = 'para'; p.textContent = text;
                        bodyDiv.appendChild(p);
                    }
                });
            });
        });

        window.toggle = (id, btn) => {
            const el = document.getElementById(`body-${id}`);
            const isHidden = el.style.display === 'none';
            el.style.display = isHidden ? 'block' : 'none';
            btn.innerText = isHidden ? "CLOSE LOG" : "READ LOG";
        };
    </script>
</body>
</html>
