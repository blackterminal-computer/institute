<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Archive | Black Terminal</title>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: sans-serif; padding: 40px 20px; }
        .post { background: #0f172a; padding: 30px; border-radius: 20px; margin-bottom: 30px; border: 1px solid #1e293b; }
        
        /* OLD CSS SAME HAI, BAS YE EK LINE ADD KI HAI */
        .para { line-height: 1.6; margin-bottom: 15px; white-space: pre-wrap; } 
        
        pre { background: #000; padding: 20px; border-radius: 12px; border: 1px solid #333; overflow-x: auto; white-space: pre; font-family: 'Courier New', monospace; color: #a5b4fc; }
        .btn { cursor: pointer; padding: 10px 20px; border-radius: 10px; background: #6366f1; border: none; color: white; }
    </style>
</head>
<body>
    <div id="container"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({ /* CONFIG DATA SAME */ }));

        onSnapshot(query(collection(db, "blogs"), orderBy("createdAt", "desc")), (snap) => {
            const container = document.getElementById("container"); container.innerHTML = "";
            snap.forEach(doc => {
                const b = doc.data();
                if(b.status !== 'published') return;
                
                const card = document.createElement('div'); card.className = 'post';
                card.innerHTML = `<h3>${b.title}</h3><div id="body-${doc.id}" style="display:none;"></div><button class="btn" onclick="toggle('${doc.id}', this)">READ LOG</button>`;
                container.appendChild(card);
                
                const bodyDiv = document.getElementById(`body-${doc.id}`);
                b.content.forEach(item => {
                    const isCode = typeof item === 'object' && item.isCode;
                    const text = typeof item === 'object' ? item.text : item;
                    if(isCode) {
                        const pre = document.createElement('pre'); pre.textContent = text;
                        bodyDiv.appendChild(pre);
                    } else {
                        const p = document.createElement('p'); p.className = 'para'; p.textContent = text;
                        bodyDiv.appendChild(p);
                    }
                });
            });
        });
        window.toggle = (id, btn) => {
            const el = document.getElementById(`body-${id}`);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
            btn.innerText = el.style.display === 'none' ? "READ LOG" : "CLOSE LOG";
        };
    </script>
</body>
</html>
