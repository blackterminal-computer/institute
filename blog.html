<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive | Black Terminal</title>
    <style>
        :root { --bg: #020617; --accent: #06b6d4; }
        body { background: var(--bg); color: #f8fafc; font-family: sans-serif; padding: 20px; margin: 0; }
        
        /* Container Setup for Responsiveness */
        .wrapper { max-width: 800px; margin: auto; }
        .post { background: #0f172a; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1e293b; }
        .title { color: var(--accent); font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .date { font-size: 12px; opacity: 0.5; margin-bottom: 10px; display: block; }
        
        /* Responsive Design */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .title { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h2 style="text-align: center;">Archive</h2>
        <div id="container">Loading archive...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        onSnapshot(collection(db, "blogs"), (snapshot) => {
            const container = document.getElementById("container");
            container.innerHTML = "";
            
            if (snapshot.empty) {
                container.innerHTML = "<p style='text-align:center;'>Database empty hai.</p>";
                return;
            }

            snapshot.forEach((doc) => {
                const b = doc.data();
                // Timestamp handling
                const date = b.createdAt ? new Date(b.createdAt.seconds * 1000).toLocaleString() : "Date unknown";
                
                container.innerHTML += `
                    <div class="post">
                        <span class="date">${date}</span>
                        <div class="title">${b.title || "Untitled"}</div>
                        <p>${b.content ? b.content[0] : ""}</p>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
