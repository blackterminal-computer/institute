<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wade Warren - Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --wa-light-green: #89c191;
            --msg-bg-me: #89c191;
            --msg-bg-them: #f2f2f2;
            --text-main: #1a1a1a;
            --text-sub: #999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { background: #e8f3e9; height: 100vh; display: flex; justify-content: center; align-items: center; }

        .phone-container {
            background: white; width: 100%; max-width: 400px; height: 92vh;
            border-radius: 45px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        /* Top Header */
        .chat-header {
            padding: 20px 20px 15px; display: flex; align-items: center;
            border-bottom: 0.5px solid #eee; background: white; z-index: 10;
        }
        .back-btn { font-size: 20px; margin-right: 15px; cursor: pointer; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .user-meta { flex: 1; margin-left: 12px; }
        .user-meta h4 { font-size: 15px; font-weight: 700; color: var(--text-main); }
        .user-meta span { font-size: 12px; color: var(--wa-light-green); font-weight: 500; }
        .header-actions { display: flex; gap: 20px; font-size: 20px; color: #333; }

        /* Message Area */
        .messages-box {
            flex: 1; overflow-y: auto; padding: 20px;
            background: white; display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: none;
        }

        .date-divider {
            text-align: center; margin: 10px 0;
        }
        .date-divider span {
            padding: 6px 16px; background: #f9f9f9; border-radius: 20px;
            font-size: 12px; color: #aaa; border: 0.5px solid #eee;
        }

        .bubble {
            max-width: 75%; padding: 12px 16px; font-size: 14px; line-height: 1.4;
            position: relative;
        }
        
        .them {
            background: var(--msg-bg-them); color: #444;
            align-self: flex-start; border-radius: 18px 18px 18px 4px;
        }

        .me {
            background: var(--msg-bg-me); color: white;
            align-self: flex-end; border-radius: 18px 18px 4px 18px;
        }

        .msg-time {
            display: block; font-size: 10px; margin-top: 5px; opacity: 0.7;
        }
        .me .msg-time { text-align: right; }
        .ri-check-double-line { font-size: 12px; margin-left: 4px; }

        /* Bottom Input */
        .input-area {
            padding: 15px 20px 25px; background: white;
            display: flex; align-items: center; gap: 10px;
        }
        .input-wrap {
            flex: 1; background: #f6f6f6; height: 50px; border-radius: 25px;
            display: flex; align-items: center; padding: 0 15px;
        }
        .input-wrap input {
            flex: 1; border: none; background: transparent; outline: none;
            padding-left: 10px; font-size: 14px;
        }
        .mic-btn {
            width: 50px; height: 50px; background: #000; color: white;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }

        .swipe-hint {
            position: absolute; bottom: 8px; width: 100%; text-align: center;
            font-size: 10px; color: #ccc;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="chat-header">
        <i class="ri-arrow-left-s-line back-btn"></i>
        <img src="https://i.pravatar.cc/100?u=wade" class="user-avatar">
        <div class="user-meta">
            <h4>Wade Warren</h4>
            <span>Online</span>
        </div>
        <div class="header-actions">
            <i class="ri-phone-line"></i>
            <i class="ri-more-2-line"></i>
        </div>
    </div>

    <div class="messages-box" id="msgBox">
        <div class="bubble me">
            OK. I will.
            <span class="msg-time">9:25 AM <i class="ri-check-double-line"></i></span>
        </div>

        <div class="date-divider"><span>Today</span></div>

        <div class="bubble them">
            Hello
            <span class="msg-time">9:25 AM</span>
        </div>

        <div class="bubble me">
            Hi, Warren
            <span class="msg-time">9:25 AM <i class="ri-check-double-line"></i></span>
        </div>

        <div class="bubble them">
            Can you come here today?
            <span class="msg-time">9:26 AM</span>
        </div>

        <div class="bubble me">
            Yes, of course dude
            <span class="msg-time">9:26 AM <i class="ri-check-double-line"></i></span>
        </div>

        <div class="bubble me">
            But i will bring my dog with me
            <span class="msg-time">9:26 AM <i class="ri-check-double-line"></i></span>
        </div>

        <div class="bubble them">
            Okay, i don't mind
            <span class="msg-time">9:27 AM</span>
        </div>

        <div class="bubble me">
            Great, see you soon.
            <span class="msg-time">9:27 AM <i class="ri-check-double-line"></i></span>
        </div>

        <div class="bubble them">
            Yup...Good bye.
            <span class="msg-time">9:27 AM</span>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrap">
            <i class="ri-emotion-line" style="color:#aaa;"></i>
            <input type="text" placeholder="Message...">
        </div>
        <div class="mic-btn">
            <i class="ri-mic-line"></i>
        </div>
    </div>

    <div class="swipe-hint">Swipe up to explore area —</div>
</div>

<script>
    // Scroll to bottom of chat automatically
    const box = document.getElementById('msgBox');
    box.scrollTop = box.scrollHeight;
</script>

</body>
</html>
