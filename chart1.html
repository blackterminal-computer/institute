<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat App - Live</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --p-green: #89c191; --bg-green: #7ebf88; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #e0eadd; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .phone { background-color: var(--bg-green); width: 100%; max-width: 414px; height: 95vh; border-radius: 45px; position: relative; overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.15); border: 8px solid #222; }

        /* Screens */
        #welcome { height: 100%; display: flex; flex-direction: column; }
        .welcome-card { background: white; flex: 1; border-radius: 60px 0 0 0; padding: 50px 35px; text-align: center; }
        .btn-start { width: 100%; height: 60px; background: var(--p-green); color: white; border: none; border-radius: 20px; font-size: 18px; font-weight: 600; margin-top: 30px; cursor: pointer; }

        #chats-page { display: none; height: 100%; background: white; padding: 45px 20px 20px; overflow-y: auto; }

        /* List Styling */
        .search-bar { background: #f6f6f6; border-radius: 15px; padding: 12px 15px; display: flex; align-items: center; margin: 20px 0; }
        .search-bar input { border: none; background: transparent; outline: none; margin-left: 10px; width: 100%; }

        .chat-row { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; animation: fadeIn 0.5s ease; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; background: #eee; }
        .details { flex: 1; }
        .msg { font-size: 13px; color: #888; }
        .typing { color: var(--p-green); font-weight: 700; }
        .badge { background: var(--p-green); color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }

        .nav-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; height: 65px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="phone">
    <div id="welcome">
        <div style="flex: 1.2; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 20px;">
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/female-character-holding-speech-bubble-illustration-4715124.png" style="width: 70%;">
        </div>
        <div class="welcome-card">
            <h1 style="font-size: 32px;">Hello, Let's Chat</h1>
            <p style="color:#999; margin-top:10px;">Connect with your friends</p>
            <button class="btn-start" onclick="startApp()">Get Started</button>
        </div>
    </div>

    <div id="chats-page">
        <h2 style="font-size:28px; font-weight: 800;">Chats</h2>
        <div class="search-bar">
            <i class="ri-search-line" style="color:#ccc;"></i>
            <input type="text" placeholder="Search friends...">
        </div>
        <div id="student-list">
            <p style="text-align: center; color: #ccc; margin-top: 50px;">Fetching students...</p>
        </div>
        <div class="nav-bar">
            <i class="ri-chat-3-fill" style="font-size:24px; color: #333;"></i>
            <i class="ri-phone-line" style="font-size:24px; color: #ccc;"></i>
            <i class="ri-user-line" style="font-size:24px; color: #ccc;"></i>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Your Live Config
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.startApp = () => {
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('chats-page').style.display = 'block';
        
        // Fetch from 'students' node
        const studentsRef = ref(db, 'students');
        onValue(studentsRef, (snapshot) => {
            const listContainer = document.getElementById('student-list');
            const data = snapshot.val();
            listContainer.innerHTML = '';

            if (data) {
                Object.keys(data).forEach(key => {
                    const s = data[key];
                    const isTyping = s.lastMsg === "Typing...";
                    listContainer.innerHTML += `
                        <div class="chat-row">
                            <img src="${s.photo || 'https://via.placeholder.com/50'}" class="avatar">
                            <div class="details">
                                <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                                    <span style="font-weight:700;">${s.name}</span>
                                    <span style="font-size:11px; color:#bbb;">${s.time}</span>
                                </div>
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <span class="${isTyping ? 'typing' : 'msg'}">${s.lastMsg}</span>
                                    ${s.unread > 0 ? `<div class="badge">${s.unread}</div>` : ''}
                                </div>
                            </div>
                        </div>`;
                });
            } else {
                listContainer.innerHTML = '<p style="text-align:center; color:#888;">No students found in DB.</p>';
            }
        });
    };
</script>
</body>
</html>
