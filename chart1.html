<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome - Lets Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --p-green: #89c191; --bg-green: #7ebf88; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f0f0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .phone { background: var(--bg-green); width: 100%; max-width: 400px; height: 92vh; border-radius: 45px; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .header-ui { position: absolute; top: 25px; width: 100%; padding: 0 25px; display: flex; justify-content: space-between; z-index: 10; }
        .btn-r { width: 40px; height: 40px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; }
        .hero { flex: 1.3; display: flex; justify-content: center; align-items: flex-end; }
        .hero img { width: 85%; z-index: 2; }
        .card { background: white; flex: 1; border-radius: 80px 0 0 0; padding: 45px 35px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .dots { display: flex; gap: 6px; margin-bottom: 25px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #eee; }
        .dot.active { width: 25px; height: 8px; border-radius: 10px; background: var(--p-green); }
        h1 { font-size: 32px; margin-bottom: 10px; }
        p { color: #888; font-size: 15px; margin-bottom: 40px; }
        .btn-start { width: 100%; height: 60px; background: var(--p-green); color: white; border: none; border-radius: 20px; font-size: 18px; font-weight: 600; cursor: pointer; box-shadow: 0 10px 20px rgba(137,193,145,0.3); }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header-ui"><div class="btn-r">✕</div><div class="btn-r">•••</div></div>
        <div class="hero"><img src="https://cdni.iconscout.com/illustration/premium/thumb/female-character-holding-speech-bubble-illustration-download-in-svg-png-gif-file-formats--chatting-messages-pack-people-illustrations-4715124.png"></div>
        <div class="card">
            <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot active"></div></div>
            <h1>Hello, Lets Chat</h1>
            <p>Having lots of friends will make your life more colorful</p>
            <button class="btn-start" onclick="location.href='chats.html'">Get Started</button>
        </div>
    </div>
</body>
</html>
