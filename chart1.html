<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat App Final - 100% Ditto</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --p-green: #89c191; --bg-green: #7ebf88; --light-grey: #f8faf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #e0eadd; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .phone { background-color: var(--bg-green); width: 100%; max-width: 414px; height: 95vh; border-radius: 45px; position: relative; overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.15); }

        /* Welcome Screen */
        #welcome { height: 100%; display: flex; flex-direction: column; background-image: radial-gradient(rgba(255,255,255,0.1) 1.5px, transparent 1.5px); background-size: 25px 25px; }
        .welcome-card { background: white; flex: 1; border-radius: 80px 0 0 0; padding: 50px 35px; text-align: center; }
        .btn-start { width: 100%; height: 65px; background: var(--p-green); color: white; border: none; border-radius: 22px; font-size: 18px; font-weight: 600; margin-top: 40px; cursor: pointer; }

        /* Chat List Screen */
        #chats-page { display: none; height: 100%; background: white; padding: 45px 20px 20px; }
        .search-bar { background: #f6f6f6; border-radius: 18px; padding: 12px 15px; display: flex; align-items: center; margin: 20px 0; }
        .search-bar input { border: none; background: transparent; outline: none; margin-left: 10px; width: 100%; }

        /* List Items */
        .chat-row { display: flex; align-items: center; gap: 15px; margin-bottom: 22px; cursor: pointer; border-bottom: 0.5px solid #f9f9f9; padding-bottom: 12px; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; }
        .details { flex: 1; }
        .msg { font-size: 13px; color: #888; }
        .typing { color: var(--p-green); font-weight: 600; }
        .badge { background: var(--p-green); color: white; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }

        /* Floating Nav Bar */
        .nav-bar { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; height: 65px; background: rgba(0,0,0,0.05); backdrop-filter: blur(20px); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { font-size: 24px; color: #888; }
        .nav-item.active { color: #000; }
    </style>
</head>
<body>

<div class="phone">
    <div id="welcome">
        <div style="flex: 1.2; display: flex; justify-content: center; align-items: flex-end;">
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/female-character-holding-speech-bubble-illustration-download-in-svg-png-gif-file-formats--chatting-messages-pack-people-illustrations-4715124.png" style="width: 80%;">
        </div>
        <div class="welcome-card">
            <h1 style="font-size: 32px;">Hello, Lets Chat</h1>
            <p style="color:#888; margin-top:10px;">Connect with friends instantly</p>
            <button class="btn-start" onclick="startApp()">Get Started</button>
        </div>
    </div>

    <div id="chats-page">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-size:28px;">Chats</h2>
            <i class="ri-edit-box-line" style="font-size:22px;"></i>
        </div>
        <div class="search-bar">
            <i class="ri-search-line" style="color:#ccc;"></i>
            <input type="text" placeholder="Search here...">
        </div>
        <div id="student-list">
            <p style="text-align: center; color: #ccc; margin-top: 50px;">Syncing with Database...</p>
        </div>
        <div class="nav-bar">
            <div class="nav-item active"><i class="ri-chat-3-fill"></i></div>
            <div class="nav-item"><i class="ri-phone-line"></i></div>
            <div class="nav-item"><i class="ri-user-line"></i></div>
            <img src="https://i.pravatar.cc/100?u=me" style="width:30px; height:30px; border-radius:50%;">
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 1. Navigation Logic
    window.startApp = () => {
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('chats-page').style.display = 'block';
        injectData(); // Runs once to ensure your DB is not empty
    };

    // 2. Data Injector (Taaki "No students found" kabhi na aaye)
    function injectData() {
        const initialData = {
            "s1": { name: "John Smith", lastMsg: "How are you?", time: "Just Now", photo: "https://i.pravatar.cc/150?u=1", unread: 0 },
            "s2": { name: "Richard Wright", lastMsg: "Will you come to party?", time: "20 min ago", photo: "https://i.pravatar.cc/150?u=2", unread: 3 },
            "s3": { name: "Wade Warren", lastMsg: "Typing...", time: "9:27 AM", photo: "https://i.pravatar.cc/150?u=3", unread: 0 },
            "s4": { name: "Amanda Parkers", lastMsg: "Wanna go outside?", time: "11:02 AM", photo: "https://i.pravatar.cc/150?u=4", unread: 1 }
        };
        set(ref(db, 'students'), initialData);
    }

    // 3. Live Fetch Logic
    onValue(ref(db, 'students'), (snapshot) => {
        const data = snapshot.val();
        const listContainer = document.getElementById('student-list');
        listContainer.innerHTML = '';

        if (data) {
            Object.values(data).forEach(s => {
                const isTyping = s.lastMsg === "Typing...";
                listContainer.innerHTML += `
                    <div class="chat-row">
                        <img src="${s.photo}" class="avatar">
                        <div class="details">
                            <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                                <span style="font-weight:700;">${s.name}</span>
                                <span style="font-size:11px; color:#bbb;">${s.time}</span>
                            </div>
                            <div style="display:flex; justify-content:space-between;">
                                <span class="${isTyping ? 'typing' : 'msg'}">${s.lastMsg}</span>
                                ${s.unread > 0 ? `<div class="badge">${s.unread}</div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    });
</script>

</body>
</html>
