<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ditto Chat App</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --p-green: #89c191; --bg-green: #7ebf88; --light-grey: #f8faf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #e0eadd; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* App Frame */
        .phone { background-color: white; width: 100%; max-width: 414px; height: 95vh; border-radius: 45px; position: relative; overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.15); border: 8px solid #000; }

        /* Chats List UI */
        #chats { height: 100%; background: white; padding: 40px 20px 20px; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h2 { font-size: 28px; font-weight: 700; }
        
        .search-bar { background: #f6f6f6; border-radius: 15px; padding: 12px 15px; display: flex; align-items: center; margin-bottom: 25px; }
        .search-bar input { border: none; background: transparent; outline: none; margin-left: 10px; width: 100%; color: #999; }

        /* Student List Styling */
        .student-list-container { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .chat-row { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; cursor: pointer; border-bottom: 0.5px solid #f2f2f2; padding-bottom: 15px; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; }
        .details { flex: 1; }
        .name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .name { font-weight: 700; font-size: 16px; color: #1a1a1a; }
        .time { font-size: 11px; color: #bbb; }
        .msg { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .typing { color: var(--p-green); font-weight: 600; }

        /* Floating Nav Bar */
        .nav-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; height: 65px; background: rgba(0,0,0,0.05); backdrop-filter: blur(20px); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { font-size: 24px; color: #888; }
        .nav-item.active { color: #000; }
    </style>
</head>
<body>

<div class="phone">
    <div id="chats">
        <div class="header">
            <h2>Chats</h2>
            <i class="ri-edit-box-line" style="font-size: 22px;"></i>
        </div>

        <div class="search-bar">
            <i class="ri-search-line" style="color: #bbb;"></i>
            <input type="text" placeholder="Search here...">
        </div>

        <div class="student-list-container" id="student-list">
            <p style="text-align: center; color: #999; margin-top: 100px;">Fetching Students...</p>
        </div>

        <div class="nav-bar">
            <div class="nav-item active"><i class="ri-chat-3-fill"></i></div>
            <div class="nav-item"><i class="ri-phone-line"></i></div>
            <div class="nav-item"><i class="ri-user-line"></i></div>
            <div class="nav-item"><img src="https://i.pravatar.cc/100?u=me" style="width: 30px; height: 30px; border-radius: 50%;"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 1. Firebase Config
    const firebaseConfig = { 
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com/" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 2. Fetch Students
    // NOTE: Path ko 'students' rakha hai, agar aapka data 'chats' ke andar hai toh use 'chats' kar dein
    const studentRef = ref(db, 'students'); 

    onValue(studentRef, (snapshot) => {
        const data = snapshot.val();
        const listArea = document.getElementById('student-list');
        listArea.innerHTML = ''; 

        if (data) {
            Object.keys(data).forEach(id => {
                const student = data[id];
                const isTyping = student.lastMsg === "Typing...";
                
                const row = `
                    <div class="chat-row">
                        <img src="${student.photo || 'https://i.pravatar.cc/150'}" class="avatar">
                        <div class="details">
                            <div class="name-row">
                                <span class="name">${student.name}</span>
                                <span class="time">${student.time || 'Just Now'}</span>
                            </div>
                            <div class="msg ${isTyping ? 'typing' : ''}">${student.lastMsg || 'Hello!'}</div>
                        </div>
                    </div>
                `;
                listArea.innerHTML += row;
            });
        } else {
            listArea.innerHTML = '<p style="text-align: center; color: #999; margin-top: 100px;">No students found in Database.</p>';
        }
    });
</script>

</body>
</html>
