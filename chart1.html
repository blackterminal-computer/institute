<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat App - Live Firebase</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --p-green: #89c191; --bg-green: #7ebf88; --light-grey: #f8faf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #e0eadd; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .phone { background-color: var(--bg-green); width: 100%; max-width: 414px; height: 95vh; border-radius: 45px; position: relative; overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.15); border: 8px solid #222; }

        /* Screens */
        #welcome { height: 100%; display: flex; flex-direction: column; transition: 0.5s; }
        .welcome-card { background: white; flex: 1; border-radius: 60px 0 0 0; padding: 50px 35px; text-align: center; }
        .btn-start { width: 100%; height: 60px; background: var(--p-green); color: white; border: none; border-radius: 20px; font-size: 18px; font-weight: 600; margin-top: 30px; cursor: pointer; transition: 0.3s; }
        .btn-start:active { transform: scale(0.95); opacity: 0.9; }

        #chats-page { display: none; height: 100%; background: white; padding: 45px 20px 20px; overflow-y: auto; }

        /* Search & List */
        .search-bar { background: #f6f6f6; border-radius: 15px; padding: 12px 15px; display: flex; align-items: center; margin: 20px 0; }
        .search-bar input { border: none; background: transparent; outline: none; margin-left: 10px; width: 100%; font-size: 15px; }

        .chat-row { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; cursor: pointer; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; background: #eee; }
        .details { flex: 1; }
        .msg { font-size: 13px; color: #888; display: block; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .typing { color: var(--p-green); font-weight: 700; font-size: 13px; }
        .badge { background: var(--p-green); color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }

        /* Navbar */
        .nav-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; height: 65px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .nav-item { font-size: 24px; color: #ccc; cursor: pointer; }
        .nav-item.active { color: #333; }
    </style>
</head>
<body>

<div class="phone">
    <div id="welcome">
        <div style="flex: 1.2; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 20px;">
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/female-character-holding-speech-bubble-illustration-download-in-svg-png-gif-file-formats--chatting-messages-pack-people-illustrations-4715124.png" style="width: 70%;">
        </div>
        <div class="welcome-card">
            <h1 style="font-size: 32px; color: #333;">Hello, Let's Chat</h1>
            <p style="color:#999; margin-top:10px; line-height: 1.5;">Stay connected with your classmates and friends in real-time.</p>
            <button class="btn-start" onclick="startApp()">Get Started</button>
        </div>
    </div>

    <div id="chats-page">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-size:28px; font-weight: 800;">Chats</h2>
            <i class="ri-edit-box-line" style="font-size:24px; color: #555;"></i>
        </div>
        
        <div class="search-bar">
            <i class="ri-search-line" style="color:#bbb;"></i>
            <input type="text" placeholder="Search friends...">
        </div>

        <div id="student-list">
            <p style="text-align: center; color: #ccc; margin-top: 50px;">Connecting to Firebase...</p>
        </div>

        <div class="nav-bar">
            <div class="nav-item active"><i class="ri-chat-3-fill"></i></div>
            <div class="nav-item"><i class="ri-phone-line"></i></div>
            <div class="nav-item"><i class="ri-user-line"></i></div>
            <img src="https://i.pravatar.cc/100?u=myprofile" style="width:32px; height:32px; border-radius:50%; border: 2px solid var(--p-green);">
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // UPDATED CONFIG: Replace YOUR_API_KEY with the key from Project Settings
    const firebaseConfig = {
        apiKey: "AIzaSy... (Your Key Here)", 
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com/",
        projectId: "black-terminal-f2c91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Toggle Pages
    window.startApp = () => {
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('chats-page').style.display = 'block';
    };

    // Listen for Realtime Changes
    const studentsRef = ref(db, 'students');
    onValue(studentsRef, (snapshot) => {
        const listContainer = document.getElementById('student-list');
        listContainer.innerHTML = '';
        
        const data = snapshot.val();
        
        if (!data) {
            listContainer.innerHTML = '<p style="text-align:center; color:#888;">No data found in database.</p>';
            return;
        }

        // Loop through keys (u1, u2, etc.)
        Object.keys(data).forEach(key => {
            const student = data[key];
            const isTyping = student.lastMsg === "Typing...";
            
            const row = `
                <div class="chat-row">
                    <img src="${student.photo}" class="avatar" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="details">
                        <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                            <span style="font-weight:700; color: #333;">${student.name}</span>
                            <span style="font-size:11px; color:#bbb;">${student.time}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="${isTyping ? 'typing' : 'msg'}">${student.lastMsg}</span>
                            ${student.unread > 0 ? `<div class="badge">${student.unread}</div>` : ''}
                        </div>
                    </div>
                </div>
            `;
            listContainer.innerHTML += row;
        });
    });
</script>

</body>
</html>
