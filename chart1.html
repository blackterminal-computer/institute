<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

<style>
    body { font-family: 'Segoe UI', Arial; background: #0e0f13; color: white; text-align: center; padding: 20px; }
    .box { background: #171821; padding: 30px; border-radius: 20px; display: inline-block; width: 100%; max-width: 350px; margin-top: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #22c55e; margin-bottom: 15px; object-fit: cover; }
    button { width: 100%; padding: 15px; border: none; color: white; border-radius: 12px; margin-top: 15px; cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.3s; }
    button:active { transform: scale(0.98); }
    .btn-logout { background: transparent; border: 1px solid #ef4444; color: #ef4444; margin-top: 30px; }
</style>
</head>

<body>

<div class="box">
    <img id="user-photo" src="https://via.placeholder.com/100" class="profile-img">
    
    <h2>Welcome</h2>
    <h1 id="name">Loading...</h1>
    <p style="color: #888; font-size: 14px;">Black Terminal Practice Dashboard</p>

    <br>

    <a href="daily-exam.html"><button style="background:#22c55e"><i class="ri-book-open-line"></i> Start Daily Exam</button></a>
    <a href="leaderboard.html"><button style="background:#f59e0b"><i class="ri-trophy-line"></i> View Leaderboard</button></a>
    <a href="battle.html"><button style="background:#ef4444">⚔️ 1 vs 1 Battle</button></a>

    <button class="btn-logout" onclick="logout()">Logout</button>
</div>

<script type="module">
    // Firebase SDK Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Aapka Provide kiya gaya Config
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 1. Check if User ID exists in LocalStorage (Login page se aana chahiye)
    // Maan lijiye login ke waqt aapne "userId" save kiya tha (u1, u2, etc.)
    let userId = localStorage.getItem("userId") || "u1"; // Default u1 for testing

    if(!userId){
        window.location="login.html";
    }

    // 2. Database se specific student fetch karein
    const userRef = ref(db, 'students/' + userId);
    
    onValue(userRef, (snapshot) => {
        const data = snapshot.val();
        if(data) {
            document.getElementById("name").innerHTML = data.name;
            document.getElementById("user-photo").src = data.photo || "https://via.placeholder.com/100";
            
            // LocalStorage update kar dein future use ke liye
            localStorage.setItem("studentName", data.name);
        } else {
            document.getElementById("name").innerHTML = "User Not Found";
        }
    });

    // Logout Function
    window.logout = function(){
        localStorage.clear();
        window.location="login.html";
    }
</script>

</body>
</html>
