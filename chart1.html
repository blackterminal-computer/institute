<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ditto Chat App - Firebase Loaded</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --p-green: #89c191; --bg-green: #7ebf88; --light-grey: #f8faf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #e0eadd; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .phone { background-color: var(--bg-green); width: 100%; max-width: 414px; height: 95vh; border-radius: 50px; position: relative; overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.15); }

        /* Welcome Screen */
        #welcome { height: 100%; display: flex; flex-direction: column; background-image: radial-gradient(rgba(255,255,255,0.1) 1.5px, transparent 1.5px); background-size: 25px 25px; }
        .welcome-card { background: white; flex: 1; border-radius: 80px 0 0 0; padding: 50px 35px; text-align: center; }
        .get-started-btn { width: 100%; height: 65px; background: var(--p-green); color: white; border: none; border-radius: 22px; font-size: 18px; font-weight: 600; margin-top: 40px; cursor: pointer; }

        /* Chat List Screen */
        #chats { display: none; height: 100%; background: var(--light-grey); padding: 30px 20px; }
        .chat-row { display: flex; align-items: center; gap: 15px; margin-bottom: 22px; cursor: pointer; animation: fadeIn 0.5s ease; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .details { flex: 1; border-bottom: 1px solid #f0f2f0; padding-bottom: 12px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Personal Chat Screen */
        #personal-chat { display: none; height: 100%; background: white; flex-direction: column; }
        .p-header { padding: 20px; display: flex; align-items: center; border-bottom: 1px solid #f5f5f5; }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #fff; }
        .bubble { max-width: 75%; padding: 12px 16px; font-size: 14px; border-radius: 18px; }
        .them { background: #f2f2f2; align-self: flex-start; border-bottom-left-radius: 4px; }
        .me { background: var(--p-green); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        /* Input Bar */
        .input-bar { padding: 15px 20px 30px; display: flex; align-items: center; gap: 10px; }
        .input-field { flex: 1; background: #f6f6f6; height: 50px; border-radius: 25px; display: flex; align-items: center; padding: 0 15px; }
        .input-field input { border: none; background: transparent; outline: none; flex: 1; padding-left: 10px; }
        .mic-icon { width: 50px; height: 50px; background: #000; color: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; }
        
        /* Floating Nav */
        .bottom-nav { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; height: 65px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="phone" id="phone-ui">
    <div id="welcome">
        <div style="flex: 1.2; display: flex; justify-content: center; align-items: flex-end;">
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/female-character-holding-speech-bubble-illustration-download-in-svg-png-gif-file-formats--chatting-messages-pack-people-illustrations-4715124.png" style="width: 80%;">
        </div>
        <div class="welcome-card">
            <h1>Hello, Lets Chat</h1>
            <p style="color:#888; margin-top:10px;">Connect with your friends instantly</p>
            <button class="get-started-btn" onclick="showChats()">Get Started</button>
        </div>
    </div>

    <div id="chats">
        <h2 style="margin-bottom: 20px;">Chats</h2>
        <div id="student-list">
            <p style="text-align: center; color: #999; margin-top: 50px;">Loading Students...</p>
        </div>
        <div class="bottom-nav">
            <i class="ri-chat-3-fill" style="font-size: 24px;"></i>
            <i class="ri-phone-line" style="color: #ccc; font-size: 24px;"></i>
            <i class="ri-user-line" style="color: #ccc; font-size: 24px;"></i>
        </div>
    </div>

    <div id="personal-chat">
        <div class="p-header">
            <i class="ri-arrow-left-s-line" style="font-size: 24px; cursor: pointer;" onclick="showChats()"></i>
            <img id="chat-user-img" src="" style="width: 45px; height: 45px; border-radius: 50%; margin-left: 10px;">
            <div style="flex: 1; margin-left: 12px;">
                <h4 id="chat-user-name">Name</h4>
                <span style="font-size: 12px; color: var(--p-green);">Online</span>
            </div>
        </div>
        <div class="msg-area">
            <div class="bubble them">Hello! How can I help you today?</div>
            <div class="bubble me">I'm checking the Firebase integration.</div>
        </div>
        <div class="input-bar">
            <div class="input-field"><input type="text" placeholder="Type a message..."></div>
            <div class="mic-icon"><i class="ri-mic-line"></i></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Configuration
    const firebaseConfig = { databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Navigation
    window.showChats = () => {
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('personal-chat').style.display = 'none';
        document.getElementById('chats').style.display = 'block';
    };

    window.openChat = (name, img) => {
        document.getElementById('chats').style.display = 'none';
        document.getElementById('personal-chat').style.display = 'flex';
        document.getElementById('chat-user-name').innerText = name;
        document.getElementById('chat-user-img').src = img;
    };

    // 100% Working Firebase Logic: Load Students
    const studentRef = ref(db, 'chats'); // Yahan aapka database path 'chats' ya 'students' jo bhi hai use karein
    onValue(studentRef, (snapshot) => {
        const data = snapshot.val();
        const list = document.getElementById('student-list');
        list.innerHTML = ''; // Clear loading text

        if (data) {
            Object.values(data).forEach(student => {
                const row = document.createElement('div');
                row.className = 'chat-row';
                // Student Name and Photo (profilePic) load ho raha hai
                row.onclick = () => openChat(student.name, student.profilePic);
                
                row.innerHTML = `
                    <img src="${student.profilePic}" class="avatar" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="details">
                        <div style="display:flex; justify-content:space-between;">
                            <span style="font-weight:700;">${student.name}</span>
                            <span style="font-size:11px; color:#bbb;">${student.time || 'Just now'}</span>
                        </div>
                        <p style="font-size:13px; color:#888;">${student.lastMsg || 'Tap to chat'}</p>
                    </div>
                `;
                list.appendChild(row);
            });
        } else {
            list.innerHTML = '<p style="text-align:center;">No students found in Database.</p>';
        }
    });
</script>

</body>
</html>
