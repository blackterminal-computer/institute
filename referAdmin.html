<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Admin Terminal</title>
    <style>
        :root { --bg: #020617; --card: rgba(17, 24, 39, 0.7); --accent: #6366f1; --danger: #ef4444; --success: #22c55e; --text: #f3f4f6; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .table-card { background: var(--card); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        th { color: #94a3b8; font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; padding: 10px 16px; text-align: left; }
        td { padding: 16px; background: rgba(30, 41, 59, 0.3); border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }
        tr td:first-child { border-radius: 16px 0 0 16px; border-left: 1px solid rgba(255,255,255,0.05); font-weight: bold; color: var(--accent); }
        tr td:last-child { border-radius: 0 16px 16px 0; border-right: 1px solid rgba(255,255,255,0.05); text-align: right; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .status-verified { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .status-pending { background: rgba(234, 179, 8, 0.2); color: #facc15; }
        .btn { padding: 8px 14px; border-radius: 10px; border: none; cursor: pointer; font-size: 11px; font-weight: 600; transition: 0.3s; margin: 2px; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="container">
        <h2>Referral Terminal</h2>
        <div class="table-card">
            <table>
                <thead><tr><th>Referrer</th><th>Student</th><th>Wallet</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="admin-tbody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, getDoc, setDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.firebasestorage.app",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        onSnapshot(collection(db, "students"), async (snap) => {
            const tbody = document.getElementById("admin-tbody");
            tbody.innerHTML = "";
            for (const d of snap.docs) {
                const data = d.data();
                if (data.referred_by) {
                    const refDoc = await getDoc(doc(db, "students", data.referred_by));
                    const wallet = refDoc.exists() ? (refDoc.data().wallet || 0) : 0;
                    const statusClass = data.status === 'verified' ? 'status-verified' : 'status-pending';
                    
                    tbody.innerHTML += `<tr>
                        <td>${data.referred_by}</td>
                        <td>${d.id}</td>
                        <td><span style="font-weight:bold;">₹${wallet}</span> <button onclick="editWallet('${data.referred_by}', ${wallet})" class="btn" style="background:#475569; color:white;">Edit</button></td>
                        <td><span class="status-badge ${statusClass}">${data.status || 'pending'}</span></td>
                        <td>
                            ${data.status !== 'verified' 
                                ? `<button onclick="verify('${d.id}', '${data.referred_by}')" class="btn" style="background:var(--success); color:white;">Verify</button>` 
                                : `<button onclick="updateReferralStatus('${d.id}', 'pending')" class="btn" style="background:var(--danger); color:white;">Unverify</button>`}
                            <button onclick="clearHistory('${d.id}')" class="btn" style="background:#475569; color:white;">Clear</button>
                            <button onclick="resetMilestone('${data.referred_by}')" class="btn" style="background:var(--danger); color:white;">Reset</button>
                        </td>
                    </tr>`;
                }
            }
        });

        window.updateReferralStatus = async (sid, newStatus) => {
            await updateDoc(doc(db, "students", sid), { status: newStatus });
        };

        window.verify = async (sid, ref) => {
            const q = query(collection(db, "students"), where("referred_by", "==", ref), where("status", "==", "verified"));
            const snap = await getDocs(q);
            const count = snap.size;
            let amount = (count >= 20) ? 300 : (count >= 10) ? 200 : 100;
            await updateDoc(doc(db, "students", sid), { status: 'verified' });
            await updateDoc(doc(db, "students", ref), { wallet: increment(amount) });
        };

        window.clearHistory = async (sid) => {
            if(confirm("Clear this referral?")) await updateDoc(doc(db, "students", sid), { status: "pending" });
        };

        window.resetMilestone = async (ref) => {
            if(confirm("Reset all referrals for " + ref + "?")) {
                const q = query(collection(db, "students"), where("referred_by", "==", ref));
                const snap = await getDocs(q);
                snap.forEach(d => updateDoc(doc(db, "students", d.id), { status: "pending" }));
            }
        };

        window.editWallet = async (ref, current) => {
            const newBal = prompt("Enter new balance:", current);
            if(newBal !== null) await setDoc(doc(db, "students", ref), { wallet: parseInt(newBal) }, { merge: true });
        };
    </script>
</body>
</html>
