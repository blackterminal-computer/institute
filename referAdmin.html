<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Admin Command Center</title>
    <style>
        :root { 
            --bg: #020617; 
            --card-bg: rgba(30, 41, 59, 0.4); 
            --accent: #6366f1; 
            --success: #22c55e;
            --warning: #facc15;
        }
        
        body { 
            background: var(--bg); 
            color: #f8fafc; 
            font-family: 'Inter', system-ui, sans-serif; 
            padding: 20px; 
            margin: 0;
        }

        .header-section { margin-bottom: 30px; }
        
        /* Dashboard Stats */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        .stat-card { 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-val { font-size: 24px; font-weight: 800; display: block; }
        .stat-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        .section-wrapper { margin-bottom: 40px; animate: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .referrer-header { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-bottom: 15px; 
            padding-left: 5px;
        }
        .badge { 
            background: var(--accent); 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-size: 10px; 
            font-weight: 700;
        }

        /* Horizontal Scroll Logic */
        .scroll-container { 
            display: flex; 
            gap: 16px; 
            overflow-x: auto; 
            padding: 10px 5px; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        /* Card Styling */
        .ref-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.1); 
            min-width: 160px; 
            padding: 20px; 
            border-radius: 24px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .ref-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent); 
            background: rgba(30, 41, 59, 0.7);
        }

        .student-id { font-weight: 700; font-size: 13px; margin-bottom: 4px; color: #fff; overflow: hidden; text-overflow: ellipsis; }
        .status-pill { 
            font-size: 10px; 
            font-weight: 800;
            padding: 4px 10px; 
            border-radius: 20px; 
            background: rgba(0,0,0,0.2); 
            margin-bottom: 15px; 
            display: inline-block;
            text-transform: uppercase;
        }

        button { 
            width: 100%; 
            padding: 10px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 11px; 
            font-weight: 700; 
            background: #334155; 
            color: white; 
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        button.verify-btn:hover { background: var(--success); }
        button.unverify-btn:hover { background: #ef4444; }
    </style>
</head>
<body>

    <div class="header-section">
        <h1 style="font-size: 24px; margin-bottom: 5px;">Admin Command Center</h1>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">Black Terminal Referral Management</p>
        
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Total Referrals</span>
                <span class="stat-val" id="stat-total">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Pending</span>
                <span class="stat-val" id="stat-pending" style="color: var(--warning);">0</span>
            </div>
        </div>
    </div>

    <div id="admin-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.firebasestorage.app",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Real-time Listener
        onSnapshot(collection(db, "students"), (snap) => {
            const container = document.getElementById("admin-container");
            const totalEl = document.getElementById("stat-total");
            const pendingEl = document.getElementById("stat-pending");
            
            container.innerHTML = "";
            let totalCount = 0;
            let pendingCount = 0;
            const groups = {};

            snap.forEach(d => {
                const data = d.data();
                totalCount++;
                if (data.status !== 'verified') pendingCount++;

                if (data.referred_by) {
                    if (!groups[data.referred_by]) groups[data.referred_by] = [];
                    groups[data.referred_by].push({ id: d.id, ...data });
                }
            });

            totalEl.innerText = totalCount;
            pendingEl.innerText = pendingCount;

            for (const referrer in groups) {
                const section = document.createElement("div");
                section.className = "section-wrapper";
                section.innerHTML = `
                    <div class="referrer-header">
                        <span style="font-weight:800; font-size:18px;">${referrer}</span>
                        <span class="badge">${groups[referrer].length}</span>
                    </div>
                    <div class="scroll-container" id="row-${referrer}"></div>
                `;
                container.appendChild(section);

                const scroll = document.getElementById(`row-${referrer}`);
                groups[referrer].forEach(ref => {
                    const isVerified = ref.status === 'verified';
                    const card = document.createElement("div");
                    card.className = "ref-card";
                    card.innerHTML = `
                        <div>
                            <div class="student-id">${ref.id}</div>
                            <div class="status-pill" style="color:${isVerified ? 'var(--success)' : 'var(--warning)'}">
                                ${ref.status || 'pending'}
                            </div>
                        </div>
                        <button class="${isVerified ? 'unverify-btn' : 'verify-btn'}" 
                                onclick="toggleStatus('${ref.id}', '${ref.status}')">
                            ${isVerified ? 'REVOKE' : 'VERIFY'}
                        </button>
                    `;
                    scroll.appendChild(card);
                });
            }
        });

        // Global function for the buttons
        window.toggleStatus = async (sid, currentStatus) => {
            const newStatus = currentStatus === 'verified' ? 'pending' : 'verified';
            try {
                const docRef = doc(db, "students", sid);
                await updateDoc(docRef, { status: newStatus });
                if (window.navigator.vibrate) window.navigator.vibrate(40);
            } catch (err) {
                console.error("Update failed:", err);
                alert("Error updating status. Check console.");
            }
        };
    </script>
</body>
</html>
