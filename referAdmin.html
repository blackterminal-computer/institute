<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .item { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .actions { margin-top: 10px; display: flex; gap: 5px; flex-wrap: wrap; }
        button { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <h2>Referral List</h2>
    <div id="list-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, getDoc, setDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.firebasestorage.app",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        onSnapshot(collection(db, "students"), async (snap) => {
            const container = document.getElementById("list-container");
            container.innerHTML = "";
            
            for (const d of snap.docs) {
                const data = d.data();
                if (data.referred_by) {
                    const refDoc = await getDoc(doc(db, "students", data.referred_by));
                    const wallet = refDoc.exists() ? (refDoc.data().wallet || 0) : 0;

                    const div = document.createElement("div");
                    div.className = "item";
                    div.innerHTML = `
                        <div class="header">
                            <span>${data.referred_by} → ${d.id}</span>
                            <span>₹${wallet}</span>
                        </div>
                        <div>Status: <b>${data.status || 'pending'}</b></div>
                        <div class="actions">
                            ${data.status !== 'verified' 
                                ? `<button style="background:green; color:white;" onclick="verify('${d.id}', '${data.referred_by}')">Verify</button>` 
                                : `<button style="background:red; color:white;" onclick="updateStatus('${d.id}', 'pending')">Unverify</button>`}
                            <button onclick="editWallet('${data.referred_by}', ${wallet})">Edit Wallet</button>
                            <button style="background:gray; color:white;" onclick="clearStatus('${d.id}')">Clear</button>
                        </div>
                    `;
                    container.appendChild(div);
                }
            }
        });

        // Global functions
        window.updateStatus = async (sid, status) => await updateDoc(doc(db, "students", sid), { status });
        window.clearStatus = async (sid) => await updateDoc(doc(db, "students", sid), { status: "pending" });
        window.editWallet = async (ref, current) => {
            const val = prompt("New Wallet Balance:", current);
            if(val) await setDoc(doc(db, "students", ref), { wallet: parseInt(val) }, { merge: true });
        };
        window.verify = async (sid, ref) => {
            const q = query(collection(db, "students"), where("referred_by", "==", ref), where("status", "==", "verified"));
            const snap = await getDocs(q);
            const count = snap.size;
            let amount = (count >= 20) ? 300 : (count >= 10) ? 200 : 100;
            await updateDoc(doc(db, "students", sid), { status: 'verified' });
            await updateDoc(doc(db, "students", ref), { wallet: increment(amount), total_lifetime_earnings: increment(amount) });
        };
    </script>
</body>
</html>
