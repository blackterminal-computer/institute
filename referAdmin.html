<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Admin Terminal</title>
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #6366f1; --danger: #ef4444; --success: #22c55e; --text: #f3f4f6; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .table-card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        th { color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; padding: 10px; text-align: left; }
        td { padding: 18px; background: rgba(30, 41, 59, 0.4); border-top: 1px solid rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; }
        
        tr td:first-child { border-left: 1px solid rgba(255,255,255,0.03); border-radius: 16px 0 0 16px; font-weight: bold; color: var(--accent); }
        tr td:last-child { border-right: 1px solid rgba(255,255,255,0.03); border-radius: 0 16px 16px 0; }

        .btn { padding: 8px 16px; border-radius: 10px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; transition: all 0.2s; margin-left: 5px; }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.2); }
        .btn-verify { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-secondary { background: #334155; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Referral Terminal</h2>
        </div>
        <div class="table-card">
            <table>
                <thead><tr><th>Referrer</th><th>Student</th><th>Wallet</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="admin-tbody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, getDoc, setDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.firebasestorage.app",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        onSnapshot(collection(db, "students"), async (snap) => {
            const tbody = document.getElementById("admin-tbody");
            tbody.innerHTML = "";
            for (const d of snap.docs) {
                const data = d.data();
                if (data.referred_by) {
                    const refDoc = await getDoc(doc(db, "students", data.referred_by));
                    const wallet = refDoc.exists() ? (refDoc.data().wallet || 0) : 0;
                    tbody.innerHTML += `<tr>
                        <td>${data.referred_by}</td>
                        <td>${d.id}</td>
                        <td>₹${wallet} <button onclick="editWallet('${data.referred_by}', ${wallet})" class="btn btn-secondary">Edit</button></td>
                        <td>${data.status || 'pending'}</td>
                        <td>
                            ${data.status !== 'verified' 
                                ? `<button onclick="verify('${d.id}', '${data.referred_by}')" class="btn btn-verify">Verify</button>` 
                                : `<button onclick="updateReferralStatus('${d.id}', 'pending')" class="btn btn-danger">Unverify</button>`}
                            <button onclick="clearHistory('${d.id}')" class="btn btn-secondary">Clear</button>
                            <button onclick="resetMilestone('${data.referred_by}')" class="btn btn-danger">Reset</button>
                        </td>
                    </tr>`;
                }
            }
        });

        window.updateReferralStatus = async (sid, newStatus) => {
            await updateDoc(doc(db, "students", sid), { status: newStatus });
        };

        window.verify = async (sid, ref) => {
            const q = query(collection(db, "students"), where("referred_by", "==", ref), where("status", "==", "verified"));
            const snap = await getDocs(q);
            const count = snap.size;
            let amount = (count >= 20) ? 300 : (count >= 10) ? 200 : 100;
            
            await updateDoc(doc(db, "students", sid), { status: 'verified' });
            await updateDoc(doc(db, "students", ref), { wallet: increment(amount) });
        };

        window.clearHistory = async (sid) => {
            if(confirm("Clear this referral?")) await updateDoc(doc(db, "students", sid), { status: "pending" });
        };

        window.resetMilestone = async (ref) => {
            if(confirm("Reset all referrals for " + ref + "?")) {
                const q = query(collection(db, "students"), where("referred_by", "==", ref));
                const snap = await getDocs(q);
                snap.forEach(d => updateDoc(doc(db, "students", d.id), { status: "pending" }));
            }
        };

        window.editWallet = async (ref, current) => {
            const newBal = prompt("Enter new balance:", current);
            if(newBal !== null) await setDoc(doc(db, "students", ref), { wallet: parseInt(newBal) }, { merge: true });
        };
    </script>
</body>
</html>
