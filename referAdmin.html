<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BT | Admin Dashboard</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: #0f172a; }
        th, td { padding: 12px; border: 1px solid #1e293b; text-align: left; }
        .btn { padding: 5px 10px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Admin Dashboard</h2>
    <table>
        <thead><tr><th>Referrer</th><th>Student</th><th>Wallet</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="admin-tbody"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, getDoc, setDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.firebasestorage.app",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        onSnapshot(collection(db, "students"), async (snap) => {
            const tbody = document.getElementById("admin-tbody");
            tbody.innerHTML = "";
            for (const d of snap.docs) {
                const data = d.data();
                if (data.referred_by) {
                    const refDoc = await getDoc(doc(db, "students", data.referred_by));
                    const wallet = refDoc.exists() ? (refDoc.data().wallet || 0) : 0;
                    tbody.innerHTML += `<tr>
                        <td>${data.referred_by}</td><td>${d.id}</td><td>₹${wallet}</td>
                        <td>${data.status || 'pending'}</td>
                        <td>
                            ${data.status !== 'verified' ? `<button class="btn" style="background:#22c55e" onclick="verify('${d.id}', '${data.referred_by}')">Verify</button>` : '✅'}
                            <button class="btn" onclick="resetMilestone('${data.referred_by}')">Reset</button>
                        </td>
                    </tr>`;
                }
            }
        });

        window.verify = async (sid, ref) => {
            await updateDoc(doc(db, "students", sid), { status: 'verified' });
            await updateDoc(doc(db, "students", ref), { wallet: increment(100) });
        };

        window.resetMilestone = async (ref) => {
            const q = query(collection(db, "students"), where("referred_by", "==", ref));
            const snap = await getDocs(q);
            snap.forEach(d => updateDoc(doc(db, "students", d.id), { status: "pending" }));
        };
    </script>
</body>
</html>
