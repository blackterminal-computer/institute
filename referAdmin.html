<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #6366f1; --danger: #ef4444; --warning: #facc15; --success: #22c55e; }
        body { background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; padding: 10px; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        .table-card { background: var(--card); border-radius: 16px; padding: 15px; border: 1px solid #1e293b; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px; border-bottom: 1px solid #1e293b; font-size: 14px; }
        .btn { padding: 6px 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; margin: 2px; }
        .action-group { display: flex; gap: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Referral Dashboard</h2>
        <div class="table-card">
            <table>
                <thead><tr><th>Referrer</th><th>Student</th><th>Wallet</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="admin-tbody"><tr><td colspan="5">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.firebasestorage.app",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        onSnapshot(collection(db, "students"), async (snap) => {
            const tbody = document.getElementById("admin-tbody");
            tbody.innerHTML = "";
            
            for (const d of snap.docs) {
                const data = d.data();
                if (data.referred_by) {
                    const refDoc = await getDoc(doc(db, "students", data.referred_by));
                    const wallet = refDoc.exists() ? (refDoc.data().wallet || 0) : 0;

                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${data.referred_by}</td>
                        <td>${d.id}</td>
                        <td>₹${wallet} <button onclick="editWallet('${data.referred_by}', ${wallet})" class="btn" style="background:#475569">Edit</button></td>
                        <td><span class="btn">${data.status || 'pending'}</span></td>
                        <td class="action-group">
                            ${data.status !== 'verified' ? `<button onclick="updateStatus('${d.id}', 'verified')" class="btn" style="background:var(--success)">Verify</button>` : '✅'}
                            <button onclick="clearHistory('${d.id}')" class="btn" style="background:#64748b">Clear History</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                }
            }
        });

        // Verify Status
        window.updateStatus = async (sid, status) => {
            await updateDoc(doc(db, "students", sid), { status: status });
        };

        // Clear Referral Status
        window.clearHistory = async (sid) => {
            if(confirm("Clear this referral status?")) {
                await updateDoc(doc(db, "students", sid), { status: "pending" });
            }
        };

        // Edit Wallet Manual
        window.editWallet = async (ref, current) => {
            const newBal = prompt("Enter new wallet balance:", current);
            if(newBal !== null) {
                await setDoc(doc(db, "students", ref), { wallet: parseInt(newBal) }, { merge: true });
            }
        };
    </script>
</body>
</html>
