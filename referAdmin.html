<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Admin Command Center</title>
    <style>
        :root { --bg: #020617; --card-bg: rgba(30, 41, 59, 0.5); --accent: #6366f1; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; padding: 20px; }
        
        .section-wrapper { margin-bottom: 40px; }
        .referrer-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .badge { background: var(--accent); padding: 4px 10px; border-radius: 6px; font-size: 10px; text-transform: uppercase; }
        
        /* Premium Horizontal Scroll */
        .scroll-container { display: flex; gap: 16px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .scroll-container::-webkit-scrollbar { display: none; }
        
        /* Glassmorphism Cards */
        .ref-card { 
            background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); 
            min-width: 140px; padding: 16px; border-radius: 20px; transition: 0.3s;
        }
        .ref-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        
        .student-name { font-weight: 700; font-size: 14px; margin-bottom: 8px; }
        .status-pill { font-size: 10px; padding: 4px 8px; border-radius: 20px; background: rgba(0,0,0,0.3); margin-bottom: 10px; display: inline-block;}
        
        button { 
            width: 100%; padding: 8px; border: none; border-radius: 8px; cursor: pointer; 
            font-size: 11px; font-weight: 600; background: #334155; color: white; transition: 0.2s;
        }
        button:hover { background: var(--accent); }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 30px;">Admin Command Center</h2>
    <div id="admin-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.firebasestorage.app",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        onSnapshot(collection(db, "students"), (snap) => {
            const container = document.getElementById("admin-container");
            container.innerHTML = "";
            const groups = {};
            snap.forEach(d => {
                const data = d.data();
                if (data.referred_by) {
                    if (!groups[data.referred_by]) groups[data.referred_by] = [];
                    groups[data.referred_by].push({ id: d.id, ...data });
                }
            });

            for (const referrer in groups) {
                const section = document.createElement("div");
                section.className = "section-wrapper";
                section.innerHTML = `
                    <div class="referrer-header">
                        <span style="font-weight:800; font-size:20px;">${referrer}</span>
                        <span class="badge">${groups[referrer].length} Referrals</span>
                    </div>
                    <div class="scroll-container" id="row-${referrer}"></div>
                `;
                container.appendChild(section);

                const scroll = document.getElementById(`row-${referrer}`);
                groups[referrer].forEach(ref => {
                    const card = document.createElement("div");
                    card.className = "ref-card";
                    const isVerified = ref.status === 'verified';
                    card.innerHTML = `
                        <div class="student-name">${ref.id}</div>
                        <div class="status-pill" style="color:${isVerified ? '#22c55e' : '#facc15'}">${ref.status || 'pending'}</div>
                        <button onclick="toggleStatus('${ref.id}', '${ref.status}')">
                            ${isVerified ? 'UNVERIFY' : 'VERIFY'}
                        </button>
                    `;
                    scroll.appendChild(card);
                });
            }
        });

        window.toggleStatus = async (sid, status) => {
            await updateDoc(doc(db, "students", sid), { status: status === 'verified' ? 'pending' : 'verified' });
        };
    </script>
</body>
</html>
