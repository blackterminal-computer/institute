<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Lounge v12</title>
    <style>
        :root { --bg: #000; --accent: #007aff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        .header { padding: 20px; text-align: center; font-weight: bold; }
        .online-bar { display: flex; gap: 15px; padding: 15px; overflow-x: auto; border-bottom: 1px solid #333; }
        .online-user { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); }
        .u-label { font-size: 10px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">Student Lounge v12</div>
    <div id="onlineBar" class="online-bar"></div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        // ... Firebase Config (Wahi purana) ...
        const db = getFirestore(initializeApp({/*...config...*/}));
        const student = localStorage.getItem("studentName");

        // Online List Renderer
        onSnapshot(query(collection(db, "students"), where("isOnline", "==", true)), (snap) => {
            const bar = document.getElementById("onlineBar");
            bar.innerHTML = "";
            snap.forEach(d => {
                if(d.id !== student) {
                    bar.innerHTML += `
                        <div class="online-user" onclick="localStorage.setItem('chatWith', '${d.id}'); window.location.href='chat.html'">
                            <img src="${d.data().photo || 'https://api.dicebear.com/7.x/bottts/svg?seed='+d.id}" class="avatar">
                            <span class="u-label">${d.id}</span>
                        </div>`;
                }
            });
        });
    </script>
</body>
</html>
