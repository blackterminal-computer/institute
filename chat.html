<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hello Lets Chat - Final UI</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary-green: #89c191;
            --bg-green: #7ebf88;
            --text-black: #1a1a1a;
            --text-grey: #808080;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background-color: #f0f0f0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .phone-shell {
            background-color: var(--bg-green);
            width: 100%;
            max-width: 414px; /* iPhone size */
            height: 94vh;
            border-radius: 50px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
            /* Background Doodle Pattern */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.05) 0%, transparent 20%),
                url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
        }

        /* Top Bar */
        .header-ui {
            position: absolute;
            top: 25px;
            width: 100%;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }

        .btn-round {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Image Section */
        .hero-container {
            flex: 1.4;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
        }

        /* Illustration overlay chat bubbles (CSS only) */
        .hero-container::before {
            content: '';
            position: absolute;
            top: 20%; left: 10%;
            width: 80%; height: 60%;
            background: url('https://www.transparenttextures.com/patterns/diagonal-striped-brick.png');
            opacity: 0.1;
        }

        .hero-img {
            width: 85%;
            z-index: 2;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.1));
        }

        /* White Bottom Card - 100% Ditto Curve */
        .white-card {
            background: white;
            flex: 1;
            border-radius: 80px 0 0 0; /* Signature Curve */
            padding: 45px 35px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.05);
        }

        .dots-row {
            display: flex;
            gap: 6px;
            margin-bottom: 30px;
        }

        .dot-ui { width: 8px; height: 8px; border-radius: 50%; background: #efefef; }
        .dot-ui.active { width: 28px; height: 8px; border-radius: 10px; background: var(--primary-green); }

        h1 {
            font-size: 34px;
            color: var(--text-black);
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .desc {
            color: var(--text-grey);
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 45px;
            max-width: 260px;
        }

        .btn-get-started {
            width: 100%;
            height: 64px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 22px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(137, 193, 145, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-get-started:active { transform: scale(0.96); }

        .footer-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 11px;
            opacity: 0.8;
            letter-spacing: 1px;
            text-transform: capitalize;
        }
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="header-ui">
        <div class="btn-round"><i class="ri-close-line"></i></div>
        <div class="btn-round"><i class="ri-more-fill"></i></div>
    </div>

    <div class="hero-container">
        <img src="https://cdni.iconscout.com/illustration/premium/thumb/female-character-holding-speech-bubble-illustration-download-in-svg-png-gif-file-formats--chatting-messages-pack-people-illustrations-4715124.png" class="hero-img" alt="Chat Intro">
    </div>

    <div class="white-card">
        <div class="dots-row">
            <div class="dot-ui"></div>
            <div class="dot-ui"></div>
            <div class="dot-ui active"></div>
        </div>

        <h1>Hello, Lets Chat</h1>
        <p class="desc">Having lots of friends will make your life more colorful</p>

        <button class="btn-get-started" onclick="startApp()">Get Started</button>
    </div>

    <div class="footer-hint">Swipe up to explore area —</div>
</div>

<script>
    function startApp() {
        // Redirection to your main chat page
        window.location.href = "chat.html";
    }
</script>

</body>
</html>
