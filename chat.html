<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Student Lounge: Pulse v12</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #007aff;
            --bubble-mine: #007aff;
            --bubble-other: #1c1c1e;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            padding: 15px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 0.5px solid #333;
            text-align: center;
            z-index: 10;
        }

        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* MESSAGE STYLING */
        .msg-wrap { display: flex; flex-direction: column; gap: 4px; }
        .msg-wrap.mine { align-items: flex-end; }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 16px;
            background: var(--bubble-other);
            position: relative;
            word-wrap: break-word;
            transition: transform 0.1s ease;
        }

        .mine .bubble { background: var(--bubble-mine); }

        .u-name { font-size: 11px; color: var(--text-dim); margin: 0 5px; }

        /* INPUT AREA */
        .input-footer {
            padding: 15px;
            background: #000;
            border-top: 0.5px solid #333;
            padding-bottom: max(15px, env(safe-area-inset-bottom));
        }

        .input-row {
            display: flex;
            background: #1c1c1e;
            border-radius: 25px;
            padding: 5px 5px 5px 15px;
            align-items: center;
            border: 1px solid transparent;
            transition: border 0.3s;
        }

        .input-row:focus-within { border-color: var(--accent); }

        #mIn {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 10px 0;
            outline: none;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* STATUS INDICATORS */
        .status { font-size: 9px; color: var(--text-dim); margin-top: 2px; }

    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 700;">Student Lounge v12</div>
    <div style="font-size: 11px; color: #32d74b;">● System Active</div>
</div>

<div id="chatBox"></div>

<div class="input-footer">
    <div class="input-row">
        <input id="mIn" placeholder="Type a message..." autocomplete="off">
        <button class="send-btn" id="sendBtn" onclick="send()">↑</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limitToLast } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Setup User
    if(!localStorage.getItem("studentName")) {
        localStorage.setItem("studentName", "Student_" + Math.floor(Math.random()*999));
    }
    const student = localStorage.getItem("studentName");

    const chatBox = document.getElementById("chatBox");
    const mIn = document.getElementById("mIn");

    // RENDER LOGIC
    onSnapshot(query(collection(db, "global_chat"), orderBy("time"), limitToLast(30)), (snap) => {
        const isAtBottom = chatBox.scrollHeight - chatBox.scrollTop <= chatBox.clientHeight + 100;
        chatBox.innerHTML = "";
        
        snap.forEach(d => {
            const data = d.data();
            const isMine = data.name === student;
            
            chatBox.innerHTML += `
                <div class="msg-wrap ${isMine ? 'mine' : ''}">
                    <span class="u-name">${isMine ? 'You' : data.name}</span>
                    <div class="bubble">${data.msg}</div>
                </div>`;
        });

        if (isAtBottom) chatBox.scrollTop = chatBox.scrollHeight;
    });

    // IMPROVED SEND LOGIC
    window.send = async () => {
        const text = mIn.value.trim();
        if (!text) return;

        mIn.value = ""; // Clear input immediately for feel
        mIn.focus();

        try {
            await addDoc(collection(db, "global_chat"), {
                name: student,
                msg: text,
                time: Date.now()
            });
            // Success Feedback
            document.getElementById("sendBtn").style.boxShadow = "0 0 15px #32d74b";
            setTimeout(() => document.getElementById("sendBtn").style.boxShadow = "none", 500);
        } catch (e) {
            console.error("Send Error:", e);
            mIn.value = text; // Return text if it failed
            alert("Connection error. Try again!");
        }
    };

    // Key Listener for reliability
    mIn.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            send();
        }
    });

</script>
</body>
</html>
