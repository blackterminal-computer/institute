<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Student Connect - Login</title>
    <style>
        :root {
            --bg-blue: #4d5ef5;
            --text-dark: #1a1a1a;
            --text-gray: #7a7a7a;
            --btn-blue: #4285F4;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0;
        }

        body {
            background-color: var(--bg-blue);
            background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 20%),
                              radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1) 0%, transparent 20%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        .main-card {
            background: white;
            width: 100%;
            max-width: 400px;
            height: 90vh;
            max-height: 800px;
            border-radius: 40px;
            padding: 35px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
        }

        /* Responsive Title */
        h1 {
            font-size: clamp(24px, 7vw, 32px);
            font-weight: 700;
            color: var(--text-dark);
            text-align: center;
            line-height: 1.2;
        }

        .emoji-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: inline-block;
            vertical-align: middle;
            margin: 0 2px;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .subtitle {
            color: var(--text-gray);
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            padding: 0 10px;
            line-height: 1.5;
        }

        /* Chat Preview - Hidden on very small screens to save space */
        .chat-preview-container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
        }

        .chat-row {
            background: white;
            padding: 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            width: 92%;
            position: relative;
            border: 1px solid #f8f8f8;
        }

        .chat-row.right { align-self: flex-end; }
        .chat-row.left { align-self: flex-start; }

        .profile-pic { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .chat-details { flex: 1; }
        .chat-name { font-weight: 700; font-size: 13px; color: #333; }
        .chat-msg { font-size: 11px; color: #888; margin-top: 2px; }
        
        .status-badge { 
            width: 18px; height: 18px; background: #60d394; 
            border-radius: 50%; position: absolute; right: 12px; bottom: 12px;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 9px;
        }

        /* Buttons Section */
        .btn-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-btn {
            width: 100%;
            height: 62px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px 0 25px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: transform 0.2s, opacity 0.2s;
        }

        .action-btn:active { transform: scale(0.98); opacity: 0.9; }

        .btn-phone { background-color: #f5f6f8; color: #555; }
        .btn-google { background-color: var(--btn-blue); color: white; }

        .icon-circle {
            width: 46px; height: 46px; border-radius: 50%;
            background: white; display: flex; align-items: center; justify-content: center;
        }

        .phone-icon-circle { background-color: #ffca28; }

        .footer-line {
            width: 40px; height: 4px; background: #eee;
            border-radius: 2px; margin-top: 20px;
        }

        /* Loading Overlay */
        #loader {
            display: none;
            position: absolute;
            background: rgba(255,255,255,0.8);
            width: 100%; height: 100%; border-radius: 40px;
            z-index: 10; justify-content: center; align-items: center;
            font-weight: bold; color: var(--bg-blue);
        }
    </style>
</head>
<body>

<div class="main-card">
    <div id="loader">Signing in...</div>

    <h1>
        Chat And Connect <img src="https://i.pravatar.cc/100?u=1" class="emoji-avatar"> With Your <img src="https://i.pravatar.cc/100?u=2" class="emoji-avatar"> Batchmates Easily
    </h1>
    
    <p class="subtitle">Join your student community today to share notes and grow together!</p>

    <div class="chat-preview-container">
        <div class="chat-row left">
            <img src="https://i.pravatar.cc/100?u=9" class="profile-pic">
            <div class="chat-details">
                <div class="chat-name">Adam Kepler</div>
                <div class="chat-msg">Physics notes share kardo bro...</div>
            </div>
            <div class="status-badge">1</div>
        </div>

        <div class="chat-row right">
            <img src="https://i.pravatar.cc/100?u=12" class="profile-pic">
            <div class="chat-details">
                <div class="chat-name">Julia Robinson</div>
                <div class="chat-msg">Exam rankings are out! 🏆</div>
            </div>
            <div class="status-badge">1</div>
        </div>
    </div>

    <div class="btn-container">
        <button class="action-btn btn-phone" onclick="alert('Phone login coming soon!')">
            Sign up with phone number
            <div class="icon-circle phone-icon-circle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M6.62,10.79C8.06,13.62 10.38,15.94 13.21,17.38L15.41,15.18C15.69,14.9 16.08,14.82 16.43,14.93C17.55,15.3 18.75,15.5 20,15.5A1,1 0 0,1 21,16.5V20A1,1 0 0,1 20,21A17,17 0 0,1 3,4A1,1 0 0,1 4,3H7.5A1,1 0 0,1 8.5,4C8.5,5.25 8.7,6.45 9.07,7.57C9.18,7.92 9.1,8.31 8.82,8.59L6.62,10.79Z"/></svg>
            </div>
        </button>

        <button class="action-btn btn-google" id="googleLogin">
            Sign up with Google account
            <div class="icon-circle">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="22">
            </div>
        </button>
    </div>

    <div class="footer-line"></div>
</div>

<script type="module">
    // Firebase Integration
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginBtn = document.getElementById('googleLogin');
    const loader = document.getElementById('loader');

    loginBtn.onclick = async () => {
        loader.style.display = 'flex';
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
            
            // User ka naam save karna chat ke liye
            localStorage.setItem("studentName", user.displayName);
            localStorage.setItem("studentPhoto", user.photoURL);
            
            // Chat page par bhejna (agar aapka chat file 'chat.html' hai)
            window.location.href = "chat.html"; 
            
        } catch (error) {
            console.error("Login Failed:", error);
            alert("Login failed! Please try again.");
        } finally {
            loader.style.display = 'none';
        }
    };
</script>

</body>
</html>
