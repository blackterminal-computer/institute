<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Lounge</title>
    <style>
        :root { --bg: #050505; --accent: #007aff; --card: #1c1c1e; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        /* Online Bar */
        #onlineBar { display: flex; gap: 10px; padding: 15px; border-bottom: 1px solid #333; overflow-x: auto; }
        .u-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .u-item img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); }
        .u-item span { font-size: 10px; }

        /* Chat */
        #chatBox { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .bubble { background: var(--card); padding: 12px 16px; border-radius: 18px; max-width: 80%; align-self: flex-start; }
        .mine { background: var(--accent); align-self: flex-end; }
        
        /* Input */
        .footer { padding: 15px; background: #1c1c1e; display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: none; color: white; padding: 12px; border-radius: 20px; }
    </style>
</head>
<body>

    <div style="padding:10px; text-align:center;">Total Online: <b id="totalOnline">0</b></div>
    <div id="onlineBar"></div>
    <div id="chatBox"></div>
    
    <div class="footer">
        <input id="mIn" placeholder="Message...">
        <button onclick="send()">➤</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, limitToLast, addDoc, doc, updateDoc, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const student = localStorage.getItem("studentName") || "User_" + Math.floor(Math.random()*999);

    // 1. Online List Fetching
    onSnapshot(query(collection(db, "students"), where("isOnline", "==", true)), (snap) => {
        const bar = document.getElementById("onlineBar");
        document.getElementById("totalOnline").innerText = snap.size;
        bar.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            bar.innerHTML += `
                <div class="u-item">
                    <img src="${data.photo || 'https://via.placeholder.com/50'}">
                    <span>${data.displayName || d.id}</span>
                </div>`;
        });
    });

    // 2. Chat Fetching (Last 12 messages)
    onSnapshot(query(collection(db, "global_chat"), orderBy("time"), limitToLast(12)), (snap) => {
        const box = document.getElementById("chatBox");
        box.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            box.innerHTML += `<div class="bubble ${data.name === student ? 'mine' : ''}">${data.msg}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    });

    window.send = async () => {
        const input = document.getElementById("mIn");
        await addDoc(collection(db, "global_chat"), { name: student, msg: input.value, time: Date.now() });
        input.value = "";
    };
</script>
</body>
</html>
