<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Lounge v12</title>
    </head>
<body>
    <div id="header">
        <span>Total Online: <b id="totalOnline">0</b></span>
    </div>
    <div id="onlineBar"></div>
    <div id="chatBox"></div>
    <div class="footer">
        <input id="mIn" placeholder="Type...">
        <input type="file" id="fileInput" hidden>
        <button onclick="document.getElementById('fileInput').click()">📁</button>
        <button onclick="send()">Send</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limitToLast, doc, updateDoc, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = { /* Apna Config */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    
    // User Info (Fetched from Firestore based on ID in localStorage)
    const studentId = localStorage.getItem("studentName"); 
    let userData = { name: "Guest", photo: "" };

    // 1. Fetch User Data from 'students' collection
    onSnapshot(doc(db, "students", studentId), (snap) => {
        if(snap.exists()) userData = snap.data();
    });

    // 2. Update Total Online & Render Bar
    onSnapshot(query(collection(db, "students"), where("isOnline", "==", true)), (snap) => {
        document.getElementById("totalOnline").innerText = snap.size;
        const bar = document.getElementById("onlineBar");
        bar.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            bar.innerHTML += `
                <div class="user-item">
                    <img src="${data.photo}" class="avatar">
                    <span>${data.displayName}</span>
                </div>`;
        });
    });

    // 3. File Upload Logic
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        const storageRef = ref(storage, 'uploads/' + Date.now() + file.name);
        await uploadBytes(storageRef, file);
        const url = await getDownloadURL(storageRef);
        await addDoc(collection(db, "global_chat"), { name: userData.displayName, msg: `<img src="${url}" width="100">`, time: Date.now() });
    };

    window.send = async () => {
        const input = document.getElementById("mIn");
        await addDoc(collection(db, "global_chat"), { name: userData.displayName, msg: input.value, time: Date.now() });
        input.value = "";
    };
</script>
</body>
</html>
