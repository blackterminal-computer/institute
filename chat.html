<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Chat</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .top { background: #0f172a; padding: 16px; text-align: center; font-weight: bold; position: fixed; top: 0; width: 100%; border-bottom: 1px solid #1e293b; }
        
        /* LOGIN OVERLAY */
        #overlay { position: fixed; inset: 0; background: #020617; z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #overlay input { padding: 14px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; width: 80%; outline: none; }
        #overlay button { padding: 12px 30px; border-radius: 10px; border: none; background: #6366f1; color: white; font-weight: bold; cursor: pointer; }

        /* CHAT AREA */
        #chatBox { position: fixed; top: 60px; bottom: 80px; left: 0; right: 0; overflow-y: auto; padding: 15px; }
        .student-card { display: flex; align-items: center; gap: 12px; background: #111827; padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #1e293b; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #1e293b; }
        .info { flex: 1; }
        .name-row { display: flex; justify-content: space-between; align-items: center; }
        .s-name { font-weight: bold; color: #22c55e; font-size: 16px; }
        .s-time { font-size: 11px; color: #94a3b8; }
        .s-msg { font-size: 14px; color: #cbd5e1; margin-top: 4px; display: block; }

        /* SEND BOX */
        .sendBox { position: fixed; bottom: 0; width: 100%; background: #0f172a; padding: 15px; display: flex; gap: 10px; box-sizing: border-box; }
        .sendBox input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: #1e293b; color: white; outline: none; }
        .sendBox button { background: #06b6d4; border: none; color: white; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" style="display: none;">
        <h2 style="margin-bottom:20px;">Student Profile</h2>
        <input type="text" id="nameInp" placeholder="Enter full name...">
        <button onclick="registerStudent()">Join Lounge</button>
    </div>

    <div class="top">💬 Student Lounge</div>
    <div id="chatBox"></div>

    <div class="sendBox">
        <input id="msgInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()">➤</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, onValue, get, update } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com/",
        projectId: "black-terminal-f2c91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Get existing student info from local storage
    let currentSID = localStorage.getItem("studentID");
    let currentName = localStorage.getItem("studentName");

    if(!currentSID) {
        document.getElementById('overlay').style.display = 'flex';
    }

    // Register new student (s1, s2, s3 format)
    window.registerStudent = async () => {
        let name = document.getElementById('nameInp').value.trim();
        if(!name) return alert("Please enter your name");

        const snapshot = await get(ref(db, 'students'));
        let count = 0;
        if(snapshot.exists()) {
            count = Object.keys(snapshot.val()).length;
        }
        
        let newID = "s" + (count + 1);
        let photoURL = `https://i.pravatar.cc/150?u=${newID}`;

        // Initial entry as per your image format
        await set(ref(db, 'students/' + newID), {
            name: name,
            photo: photoURL,
            lastMsg: "Joined the chat",
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            unread: 0
        });

        localStorage.setItem("studentID", newID);
        localStorage.setItem("studentName", name);
        location.reload();
    };

    // SEND MESSAGE logic
    window.send = async () => {
        let text = document.getElementById("msgInput").value.trim();
        if(!text || !currentSID) return;

        // Update existing node as per your image structure
        await update(ref(db, 'students/' + currentSID), {
            lastMsg: text,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });

        document.getElementById("msgInput").value = "";
    };

    // REALTIME LISTENER
    onValue(ref(db, 'students'), (snap) => {
        let html = "";
        if(snap.exists()){
            const data = snap.val();
            // Show all students s1, s2, s3...
            Object.keys(data).forEach(key => {
                let s = data[key];
                html += `
                <div class="student-card">
                    <img class="avatar" src="${s.photo}" alt="user">
                    <div class="info">
                        <div class="name-row">
                            <span class="s-name">${s.name}</span>
                            <span class="s-time">${s.time}</span>
                        </div>
                        <span class="s-msg">${s.lastMsg}</span>
                    </div>
                </div>`;
            });
        }
        document.getElementById("chatBox").innerHTML = html;
        let box = document.getElementById("chatBox");
        box.scrollTop = box.scrollHeight;
    });

</script>
</body>
</html>
