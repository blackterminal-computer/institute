<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --bg: #020617; --accent: #06b6d4; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        .post-box { margin: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        textarea { width: 100%; background: transparent; color: white; border: none; height: 60px; outline: none; resize: none; }
        button { width: 100%; background: var(--accent); border: none; padding: 12px; border-radius: 12px; font-weight: 800; color: white; cursor: pointer; }
        .feed-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 16px; margin: 15px 20px; border: 1px solid rgba(255,255,255,0.1); }
        .feed-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feed-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .action-bar { display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .action-btn { color: #94a3b8; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; }
    </style>
</head>
<body>

<div class="post-box">
    <textarea id="postInput" placeholder="What's on your mind, Elite?"></textarea>
    <button onclick="publishPost()">POST TO FEED</button>
</div>

<div id="liveFeedContainer"></div>



<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const student = localStorage.getItem("studentName") || "Elite User";

    // 1. Post Logic (Fetch Real Profile Pic)
    window.publishPost = async () => {
        const input = document.getElementById("postInput");
        if(!input.value.trim()) return;
        
        let userPhoto = "https://api.dicebear.com/7.x/adventurer/svg?seed=" + student;
        try {
            const userDoc = await getDoc(doc(db, "students", student));
            if(userDoc.exists() && userDoc.data().photo) userPhoto = userDoc.data().photo;
        } catch(e) { console.log("Default pic used"); }

        await addDoc(collection(db, "posts"), {
            user: student,
            content: input.value,
            userPhoto: userPhoto,
            likes: 0,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };

    // 2. Interaction Logic
    window.toggleLike = async (id) => await updateDoc(doc(db, "posts", id), { likes: increment(1) });

    window.addComment = async (id) => {
        const text = prompt("Comment likhein:");
        if(!text) return;
        await addDoc(collection(db, "posts", id, "comments"), {
            user: student,
            text: text,
            timestamp: serverTimestamp()
        });
    };

    // 3. Render Logic
    onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
        const feed = document.getElementById("liveFeedContainer");
        feed.innerHTML = "";
        snap.forEach((doc) => {
            const p = doc.data();
            if ((Date.now() - p.timestamp?.toMillis()) < 172800000) {
                feed.innerHTML += `
                    <div class="feed-card">
                        <div class="feed-header">
                            <img src="${p.userPhoto}" class="feed-avatar">
                            <div><div style="font-weight:800;">${p.user}</div></div>
                        </div>
                        <div style="font-size:14px; margin-bottom:10px;">${p.content}</div>
                        <div class="action-bar">
                            <div class="action-btn" onclick="toggleLike('${doc.id}')"><i class="ri-heart-line"></i> ${p.likes || 0}</div>
                            <div class="action-btn" onclick="addComment('${doc.id}')"><i class="ri-chat-3-line"></i> Comment</div>
                        </div>
                    </div>`;
            }
        });
    });
</script>
</body>
</html>
