<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Lounge</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .top { background: #0f172a; padding: 16px; text-align: center; font-weight: bold; position: fixed; top: 0; width: 100%; border-bottom: 1px solid #1e293b; z-index: 10; }
        #chatBox { position: fixed; top: 60px; bottom: 80px; left: 0; right: 0; overflow-y: auto; padding: 15px; }
        
        /* Message Card Style */
        .student-card { display: flex; align-items: center; gap: 12px; background: #111827; padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #1e293b; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .info { flex: 1; }
        .name-row { display: flex; justify-content: space-between; }
        .s-name { font-weight: bold; color: #22c55e; }
        .s-time { font-size: 11px; color: #94a3b8; }
        .s-msg { font-size: 14px; color: #cbd5e1; display: block; margin-top: 4px; }

        /* Input Area */
        .sendBox { position: fixed; bottom: 0; width: 100%; background: #0f172a; padding: 15px; display: flex; gap: 10px; box-sizing: border-box; }
        .sendBox input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #1e293b; color: white; outline: none; }
        .sendBox button { background: #06b6d4; border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }

        /* Overlay */
        #overlay { position: fixed; inset: 0; background: #020617; z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #overlay input { padding: 12px; border-radius: 10px; width: 80%; margin-bottom: 15px; background: #0f172a; color: white; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div id="overlay" style="display: none;">
        <h2>Enter Your Name</h2>
        <input type="text" id="nameInp" placeholder="Your Name...">
        <button onclick="registerStudent()" style="padding: 10px 25px; background: #6366f1; border-radius: 8px; border: none; color: white;">Join</button>
    </div>

    <div class="top">💬 Student Lounge</div>
    <div id="chatBox"></div>

    <div class="sendBox">
        <input id="msgInput" placeholder="Type a message...">
        <button onclick="send()">➤</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, onValue, get, update } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com/",
        projectId: "black-terminal-f2c91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let mySID = localStorage.getItem("studentID");

    // Agar user naya hai toh overlay dikhao
    if(!mySID) {
        document.getElementById('overlay').style.display = 'flex';
    }

    // 1. REGISTER (Sirf ek baar sID create hogi)
    window.registerStudent = async () => {
        let name = document.getElementById('nameInp').value.trim();
        if(!name) return;

        const snap = await get(ref(db, 'students'));
        let nextNumber = 1;
        if(snap.exists()) {
            nextNumber = Object.keys(snap.val()).length + 1;
        }
        
        let newID = "s" + nextNumber;
        let photo = `https://i.pravatar.cc/150?u=${newID}`;

        await set(ref(db, 'students/' + newID), {
            name: name,
            photo: photo,
            lastMsg: "Joined the chat",
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            unread: 0
        });

        localStorage.setItem("studentID", newID);
        location.reload();
    };

    // 2. SEND (Purani ID ko hi update karega, repeat nahi hoga)
    window.send = async () => {
        let text = document.getElementById("msgInput").value.trim();
        if(!text || !mySID) return;

        // Sirf existing student node update hoga
        await update(ref(db, 'students/' + mySID), {
            lastMsg: text,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });

        document.getElementById("msgInput").value = "";
    };

    // 3. LISTEN (Realtime display)
    onValue(ref(db, 'students'), (snap) => {
        let html = "";
        if(snap.exists()){
            const data = snap.val();
            // Object ko array mein convert karke reverse dikhayenge (Latest niche)
            Object.keys(data).forEach(key => {
                let s = data[key];
                html += `
                <div class="student-card">
                    <img class="avatar" src="${s.photo}">
                    <div class="info">
                        <div class="name-row">
                            <span class="s-name">${s.name}</span>
                            <span class="s-time">${s.time}</span>
                        </div>
                        <span class="s-msg">${s.lastMsg}</span>
                    </div>
                </div>`;
            });
        }
        document.getElementById("chatBox").innerHTML = html;
        document.getElementById("chatBox").scrollTop = 99999;
    });
</script>
</body>
</html>
