<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Lounge</title>
    <style>
        :root { --bg: #121212; --accent: #0a84ff; --bubble: #1c1c1e; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header & Online Bar */
        .top-section { background: #1c1c1e; padding: 15px; border-bottom: 1px solid #333; }
        #onlineBar { display: flex; gap: 12px; padding: 10px 0; overflow-x: auto; }
        .u-item { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 55px; }
        .u-item img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); }
        .u-item span { font-size: 9px; }

        /* Chat Window */
        #chatBox { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { background: var(--bubble); padding: 12px 16px; border-radius: 18px; max-width: 75%; align-self: flex-start; }
        .bubble.mine { background: var(--accent); align-self: flex-end; }

        /* Footer Input */
        .footer { background: #1c1c1e; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #000; border: none; color: white; padding: 12px; border-radius: 20px; }
        button { background: var(--accent); border: none; color: white; padding: 10px 15px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-section">
        <div style="font-size: 12px; opacity: 0.7;">TOTAL ONLINE: <b id="totalOnline">0</b></div>
        <div id="onlineBar"></div>
    </div>

    <div id="chatBox"></div>

    <div class="footer">
        <button onclick="document.getElementById('fileInput').click()">📁</button>
        <input type="file" id="fileInput" hidden>
        <input id="mIn" placeholder="Type a message...">
        <button onclick="send()">Send</button>
    </div>

<script type="module">

    // Ensure karein ki chatBox aur onlineBar elements ID se target ho rahe hain.
</script>
</body>
</html>
