<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #000000; --card-bg: #0a0a0a; --text: #f8fafc; --border: #1e293b; 
            --neon-magenta: #ff007f; --neon-cyan: #00f2fe; --neon-lime: #39ff14; --neon-yellow: #ffff00; --neon-purple: #9d00ff;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; }
        
        #notificationToast { position: fixed; top: 20px; right: 20px; background: #111; border: 1px solid var(--neon-cyan); color: white; padding: 12px 20px; border-radius: 16px; z-index: 2000; display: none; font-size: 13px; font-weight: 600; box-shadow: 0 10px 25px rgba(0,242,254,0.2); }

        #profileModal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .profile-card { background: #111; padding: 40px; border-radius: 32px; text-align: center; border: 1px solid var(--border); width: 100%; max-width: 320px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .profile-card img { width: 100px; height: 100px; border-radius: 28px; margin-bottom: 20px; border: 3px solid var(--border); object-fit: cover; }
        
        .border-cyan { border-color: var(--neon-cyan) !important; box-shadow: 0 0 15px rgba(0,242,254,0.2); }
        .border-magenta { border-color: var(--neon-magenta) !important; box-shadow: 0 0 15px rgba(255,0,127,0.2); }
        .border-lime { border-color: var(--neon-lime) !important; box-shadow: 0 0 15px rgba(57,255,20,0.2); }
        .border-yellow { border-color: var(--neon-yellow) !important; box-shadow: 0 0 15px rgba(255,255,0,0.2); }
        .border-purple { border-color: var(--neon-purple) !important; box-shadow: 0 0 15px rgba(157,0,255,0.2); }

        .xp-container { margin-top: 15px; background: #000; border-radius: 20px; padding: 10px; border: 1px solid var(--border); }
        .xp-bar-bg { width: 100%; height: 12px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 6px; }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--neon-magenta), var(--neon-cyan)); width: 0%; transition: width 0.4s ease-in-out; }

        .feed-controls { margin: 24px auto; max-width: 600px; display: flex; justify-content: center; gap: 12px; }
        .toggle-feed-btn { background: #111; border: 1px solid var(--border); padding: 12px 24px; border-radius: 16px; color: #cbd5e1; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .toggle-feed-btn.active { background: linear-gradient(135deg, var(--neon-magenta), var(--neon-purple)); color: #fff; border: none; box-shadow: 0 0 20px rgba(255, 0, 127, 0.4); }
        
        .post-box, .feed-card { margin: 20px auto; max-width: 600px; background: var(--card-bg); padding: 24px; border-radius: 28px; border: 1px solid var(--border); }
        .feed-avatar { width: 48px; height: 48px; border-radius: 16px; cursor: pointer; border: 2px solid var(--border); object-fit: cover; transition: transform 0.2s; }
        .feed-avatar:hover { transform: scale(1.08); }
        
        textarea { width: 100%; background: #000; color: white; border: 1px solid var(--border); height: 90px; padding: 16px; border-radius: 16px; box-sizing: border-box; outline: none; transition: border-color 0.3s; resize: none;}
        textarea:focus { border-color: var(--neon-magenta); }
        
        .badge { font-size: 11px; background: rgba(255,255,255,0.05); color: var(--text); padding: 4px 10px; border-radius: 20px; font-weight: 700; border: 1px solid var(--border); display: inline-block; }
        .follow-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: #e2e8f0; padding: 6px 14px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .follow-btn:hover { background: rgba(255, 255, 255, 0.15); }
        .follow-btn.following { background: linear-gradient(45deg, var(--neon-magenta), var(--neon-purple)); color: #fff; border: none; }
        
        .meta-tag { font-size: 11px; color: #64748b; background: rgba(255,255,255,0.03); padding: 3px 8px; border-radius: 8px; display: inline-block; margin-top: 6px; border: 1px solid var(--border); }
        
        .session-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
        .session-btn { padding: 16px; border-radius: 16px; font-weight: 800; font-size: 13px; cursor: pointer; border: none; transition: all 0.2s; text-align: center; }
        .session-btn:active { transform: scale(0.96); }
        
        .checkin-btn { background: #052e16; border: 1px solid #10b981; color: #34d399; }
        .checkin-btn:hover { background: #064e3b; color: #6ee7b7; }
        
        .checkout-btn { background: #450a0a; border: 1px solid #f43f5e; color: #fb7185; }
        .checkout-btn:hover { background: #7f1d1d; color: #fda4af; }
        .checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; border-color: #475569; color: #94a3b8; background: #1e293b; }
    </style>
</head>
<body>

<div id="notificationToast">Notification</div>

<div id="profileModal" onclick="this.style.display='none'">
    <div class="profile-card" onclick="event.stopPropagation()">
        <img id="modalAvatar" src="" alt="Profile">
        <h2 id="modalName" style="margin-bottom:4px; color:#fff;">User</h2>
        <span id="modalRank" class="badge" style="margin-bottom:15px;">Novice</span>
        <div id="modalFollowBackStatus" class="badge" style="display:none; background:#1e293b; border-color:#475569; color:#94a3b8; margin-bottom:15px;"></div>
        <div id="modalStats" style="display:flex; gap:20px; justify-content:center; margin-top:10px;"></div>
        <div class="xp-container">
            <div style="font-size: 12px; font-weight: 600; color: #94a3b8;">XP Progress</div>
            <div class="xp-bar-bg"><div id="modalXpBar" class="xp-bar-fill"></div></div>
            <div id="modalXpText" style="font-size: 12px; margin-top: 6px; font-weight: 700; color:#fff;">0 / 100 XP</div>
        </div>
    </div>
</div>

<div class="feed-controls">
    <button class="toggle-feed-btn active" id="feedGlobal" onclick="switchFeedMode('global')">Global Feed</button>
    <button class="toggle-feed-btn" id="feedFollowing" onclick="switchFeedMode('following')">Following Feed</button>
</div>

<div class="post-box">
    <textarea id="postInput" placeholder="What's on your mind, Cyber-Runner?"></textarea>
    
    <div class="session-grid">
        <button class="session-btn checkin-btn" onclick="publishSessionPost('Checked-In')">🟢 Checked-In</button>
        <button class="session-btn checkout-btn" id="checkOutBtn" onclick="publishSessionPost('Checked-Out')">🔴 Checked-Out</button>
    </div>
</div>

<div id="liveFeedContainer"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, onSnapshot, serverTimestamp, doc, getDoc, setDoc, deleteDoc, where, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const student = localStorage.getItem("studentName") || "Elite User";
    let currentFeedMode = "global";
    let followingList = new Set();
    let currentUserPhoto = "https://cdn-icons-png.flaticon.com/512/149/149071.png"; // Default fallback

    // Fetch user's profile picture from main students profile database on load
    async function fetchMainProfilePhoto() {
        try {
            const studentDoc = await getDoc(doc(db, "students", student));
            if(studentDoc.exists() && studentDoc.data().photo) {
                currentUserPhoto = studentDoc.data().photo;
            }
        } catch(e) {
            console.error("Profile photo load fallback:", e);
        }
    }
    fetchMainProfilePhoto();

    const neonColors = ["cyan", "magenta", "lime", "yellow", "purple"];
    function getNeonClass(seed) {
        let hash = 0;
        for (let i = 0; i < seed.length; i++) hash = seed.charCodeAt(i) + ((hash << 5) - hash);
        return "border-" + neonColors[Math.abs(hash) % neonColors.length];
    }

    function showToast(message) {
        const toast = document.getElementById("notificationToast");
        toast.innerText = message;
        toast.style.display = "block";
        setTimeout(() => { toast.style.display = "none"; }, 4000);
    }

    onSnapshot(collection(db, "students", student, "notifications"), (snap) => {
        snap.docChanges().forEach(change => {
            if (change.type === "added") {
                const data = change.doc.data();
                if (!data.read) showToast(data.message);
            }
        });
    });

    function getLevelDetails(xp) {
        if (xp < 100) return { rank: "Novice", max: 100 };
        if (xp < 300) return { rank: "Terminal Cadet", max: 300 };
        if (xp < 600) return { rank: "Elite Coder", max: 600 };
        if (xp < 1000) return { rank: "System Architect", max: 1000 };
        return { rank: "Legendary Hacker", max: xp + 500 };
    }

    async function addXP(username, amount) {
        const userXpRef = doc(db, "users_xp", username);
        await runTransaction(db, async (transaction) => {
            const docSnap = await transaction.get(userXpRef);
            let currentXp = docSnap.exists() ? (docSnap.data().xp || 0) : 0;
            transaction.set(userXpRef, { xp: currentXp + amount }, { merge: true });
        });
    }

    function parse12HourTime(timeStr) {
        if (!timeStr) return new Date();
        try {
            const [datePart, timePart] = timeStr.split(', ');
            const [dd, mm, yyyy] = datePart.split('/');
            const [time, modifier] = timePart.split(' ');
            let [hours, minutes] = time.split(':');
            
            if (hours === '12') hours = '0';
            if (modifier && modifier.toUpperCase() === 'PM') {
                hours = parseInt(hours, 10) + 12;
            }
            
            const date = new Date(yyyy, mm - 1, dd);
            date.setHours(parseInt(hours, 10), parseInt(minutes, 10), 0, 0);
            return date;
        } catch(e) {
            console.error("Time parsing fallback:", e);
            return new Date();
        }
    }

    function calculateDuration(entryStr, exitStr) {
        const entryDate = parse12HourTime(entryStr);
        const exitDate = parse12HourTime(exitStr);
        let differenceMs = exitDate - entryDate;
        
        if (differenceMs < 0) differenceMs += 24 * 60 * 60 * 1000;
        
        const hrs = Math.floor(differenceMs / (1000 * 60 * 60));
        const mins = Math.floor((differenceMs % (1000 * 60 * 60)) / (1000 * 60));
        return { hrs, mins };
    }

    async function getCheckInTimesToday() {
        const todayStr = new Date().toISOString().split('T')[0];
        const q = query(
            collection(db, "posts"), 
            where("user", "==", student),
            where("sessionTag", "==", "Checked-In")
        );
        const querySnapshot = await getDocs(q);
        const checkInTimestamps = [];
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            if(data.uploadTimestamp) {
                const postDate = data.uploadTimestamp.toDate().toISOString().split('T')[0];
                if(postDate === todayStr && data.badgeTimestamp) {
                    checkInTimestamps.push({
                        timestamp: data.badgeTimestamp,
                        millis: data.uploadTimestamp.toMillis()
                    });
                }
            }
        });
        
        checkInTimestamps.sort((a, b) => b.millis - a.millis);
        return checkInTimestamps;
    }

    async function validateCheckOutOption() {
        const checkInTimes = await getCheckInTimesToday();
        const checkOutBtn = document.getElementById("checkOutBtn");
        if(checkOutBtn) {
            checkOutBtn.disabled = checkInTimes.length === 0;
        }
    }
    validateCheckOutOption();

    async function getLatestEntryTime() {
        const checkInTimes = await getCheckInTimesToday();
        if(checkInTimes.length > 0) {
            return checkInTimes[0].timestamp;
        }
        return null;
    }

    // Modal Profile Viewer
    window.openProfile = async (username) => {
        const modal = document.getElementById("profileModal");
        modal.style.display = "flex";
        
        const avatarImg = document.getElementById("modalAvatar");
        avatarImg.className = `feed-avatar ${getNeonClass(username)}`;
        
        document.getElementById("modalName").innerText = username;
        
        // Match live synced profile picture if viewing own profile
        if (username === student) {
            avatarImg.src = currentUserPhoto;
        } else {
            const targetUserDoc = await getDoc(doc(db, "students", username));
            avatarImg.src = (targetUserDoc.exists() && targetUserDoc.data().photo) 
                ? targetUserDoc.data().photo 
                : `https://api.dicebear.com/7.x/bottts/svg?seed=${username}`;
        }
        
        const xpSnap = await getDoc(doc(db, "users_xp", username));
        const userXp = xpSnap.exists() ? (xpSnap.data().xp || 0) : 0;
        const levelInfo = getLevelDetails(userXp);
        const progressPercentage = Math.min((userXp / levelInfo.max) * 100, 100);

        document.getElementById("modalRank").innerText = levelInfo.rank;
        document.getElementById("modalXpBar").style.width = `${progressPercentage}%`;
        document.getElementById("modalXpText").innerText = `${userXp} / ${levelInfo.max} XP`;
        
        const followers = await getDocs(collection(db, "students", username, "followers"));
        const posts = await getDocs(query(collection(db, "posts"), where("user", "==", username)));
        document.getElementById("modalStats").innerHTML = `<div><b>${posts.size}</b><br>Posts</div><div><b>${followers.size}</b><br>Followers</div>`;

        const followBackBadge = document.getElementById("modalFollowBackStatus");
        if (username !== student) {
            const checkSnap = await getDoc(doc(db, "students", username, "following", student));
            followBackBadge.style.display = "inline-block";
            followBackBadge.innerText = checkSnap.exists() ? "Following You Back" : "Doesn't Follow Back";
        } else {
            followBackBadge.style.display = "none";
        }
    };

    window.switchFeedMode = (mode) => {
        currentFeedMode = mode;
        document.getElementById("feedGlobal").classList.toggle("active", mode === "global");
        document.getElementById("feedFollowing").classList.toggle("active", mode === "following");
        setupFeedListener();
    };

    window.toggleFollow = async (targetUser) => {
        if (targetUser === student) return;
        const isFollowing = followingList.has(targetUser);
        const myRef = doc(db, "students", student, "following", targetUser);
        const targetFollowerRef = doc(db, "students", targetUser, "followers", student);
        const notificationRef = collection(db, "students", targetUser, "notifications");

        if (isFollowing) {
            await deleteDoc(myRef);
            await deleteDoc(targetFollowerRef);
        } else {
            await setDoc(myRef, { timestamp: serverTimestamp() });
            await setDoc(targetFollowerRef, { timestamp: serverTimestamp() });
            
            await addDoc(notificationRef, {
                message: `${student} ne aapko follow kiya!`,
                from: student, read: false, timestamp: serverTimestamp()
            });
        }
        setupFeedListener();
    };

    window.publishSessionPost = async (sessionStatus) => {
        const content = document.getElementById("postInput").value.trim();
        
        if(sessionStatus === "Checked-Out") {
            const checkInTimes = await getCheckInTimesToday();
            if(checkInTimes.length === 0) {
                alert("⚠️ Alert: You cannot log Checked-Out without a Checked-In badge for today!");
                return;
            }
        }

        if(sessionStatus === "Checked-In") {
            const checkInTimes = await getCheckInTimesToday();
            if(checkInTimes.length > 0) {
                const confirmOverride = confirm("ℹ️ Note: You have already Checked-In today. Proceeding will log another Check-In record.");
                if(!confirmOverride) return;
            }
        }

        const now = new Date();
        const dateStr = now.toLocaleDateString('en-GB');
        timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
        const currentTimeStamp = `${dateStr}, ${timeStr}`;

        await addXP(student, 15);

        let entryTimeLog = null;
        let exitTimeLog = null;
        let durationLog = null;

        if(sessionStatus === 'Checked-In') {
            entryTimeLog = currentTimeStamp;
        } else if(sessionStatus === 'Checked-Out') {
            entryTimeLog = await getLatestEntryTime();
            exitTimeLog = currentTimeStamp;
            
            if (entryTimeLog) {
                const dur = calculateDuration(entryTimeLog, exitTimeLog);
                durationLog = `${dur.hrs} hrs ${dur.mins} mins`;
            }
        }
        
        await addDoc(collection(db, "posts"), {
            user: student,
            userPhoto: currentUserPhoto, // Use the dynamically updated profile image
            content: content || (sessionStatus === 'Checked-In' ? "Logging entry at institute." : "Class completed, leaving institute."),
            uploadTimestamp: serverTimestamp(),
            badgeTimestamp: currentTimeStamp,
            sessionTag: sessionStatus,
            entryTime: entryTimeLog,
            exitTime: exitTimeLog,
            classDuration: durationLog
        });

        document.getElementById("postInput").value = "";
        validateCheckOutOption();
        showToast(`Status updated: ${sessionStatus}!`);
    };

    function setupFeedListener() {
        onSnapshot(collection(db, "posts"), (snap) => {
            const feed = document.getElementById("liveFeedContainer");
            feed.innerHTML = "";

            const allPosts = [];
            snap.forEach(docSnap => {
                allPosts.push({ id: docSnap.id, ...docSnap.data() });
            });

            allPosts.sort((a, b) => {
                const timeA = a.uploadTimestamp ? a.uploadTimestamp.toMillis() : 0;
                const timeB = b.uploadTimestamp ? b.uploadTimestamp.toMillis() : 0;
                return timeB - timeA;
            });

            allPosts.forEach(p => {
                if (currentFeedMode === "following" && !followingList.has(p.user) && p.user !== student) return;
                
                const isFoll = followingList.has(p.user);
                const neonClass = getNeonClass(p.user);
                const profileImgSrc = p.userPhoto || `https://api.dicebear.com/7.x/bottts/svg?seed=${p.user}`;
                
                let displayTimeLabel = '';
                if(p.sessionTag === 'Checked-In' && p.entryTime) {
                    displayTimeLabel = `<i class="ri-time-line"></i> Entry: ${p.entryTime}`;
                } else if(p.sessionTag === 'Checked-Out' && p.entryTime && p.exitTime) {
                    displayTimeLabel = `<i class="ri-time-line"></i> Entry: ${p.entryTime} | Exit: ${p.exitTime}`;
                } else if(p.badgeTimestamp) {
                    displayTimeLabel = `<i class="ri-time-line"></i> Logged at: ${p.badgeTimestamp}`;
                }

                let durationBadge = '';
                if (p.sessionTag === 'Checked-Out' && p.classDuration) {
                    durationBadge = `<div class="meta-tag" style="margin-left:6px; border-color:var(--neon-purple);"><i class="ri-book-open-line"></i> Duration: ${p.classDuration}</div>`;
                }
                
                const card = document.createElement('div');
                card.className = 'feed-card';
                card.innerHTML = `
                    <div style="display:flex; align-items:center; justify-content:space-between;">
                        <div style="display:flex; align-items:center; gap:16px;">
                            <img src="${profileImgSrc}" class="feed-avatar ${neonClass}" onclick="openProfile('${p.user}')">
                            <div>
                                <div style="font-weight:800; color:#fff;">${p.user}</div>
                            </div>
                        </div>
                        ${p.user !== student ? `
                            <button class="follow-btn ${isFoll ? 'following' : ''}" onclick="toggleFollow('${p.user}')">
                                ${isFoll ? 'Unfollow' : 'Follow'}
                            </button>` : ''}
                    </div>
                    <div style="margin:16px 0; line-height:1.6; color:#cbd5e1;">${p.content}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
                        <div style="display:flex; align-items:center;">
                            ${displayTimeLabel ? `<div class="meta-tag">${displayTimeLabel}</div>` : ''}
                            ${durationBadge}
                        </div>
                        ${p.sessionTag ? `<div class="badge" style="margin-top:6px; font-size:11px; ${p.sessionTag === 'Checked-In' ? 'border-color:var(--neon-lime); color:#39ff14;' : 'border-color:var(--neon-magenta); color:#ff007f;'}">${p.sessionTag}</div>` : ''}
                    </div>
                `;
                feed.appendChild(card);
            });
        }, (error) => {
            console.warn("Firestore Listener Warning:", error);
        });
    }

    onSnapshot(collection(db, "students", student, "following"), snap => {
        followingList.clear();
        snap.docs.forEach(d => followingList.add(d.id));
        setupFeedListener();
    });
</script>
</body>
</html>
