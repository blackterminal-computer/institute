<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite Dashboard</title>
    <style>
        body { background: #020617; color: white; font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 50px; }
        .label-tag { font-size: 10px; font-weight: 800; color: #06b6d4; text-transform: uppercase; margin: 20px; }
        .post-box { margin: 20px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); }
        textarea { width: 100%; background: transparent; border: none; color: white; height: 60px; outline: none; resize: none; font-size: 13px; }
        button { width: 100%; background: #06b6d4; border: none; padding: 10px; border-radius: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .feed-container { padding: 0 20px; display: flex; flex-direction: column; gap: 15px; }
        .feed-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 16px; backdrop-filter: blur(10px); }
        .feed-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #06b6d4; }
    </style>
</head>
<body>

    <p class="label-tag">Elite News Feed</p>
    
    <div class="post-box">
        <textarea id="postInput" placeholder="What's on your mind, Elite?"></textarea>
        <button onclick="publishPost()">Post to Feed</button>
    </div>

    <div id="liveFeedContainer" class="feed-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const student = localStorage.getItem("studentName") || "Elite User";

        // Post Publish Logic
        window.publishPost = async () => {
            const input = document.getElementById("postInput");
            if(!input.value.trim()) return;
            await addDoc(collection(db, "posts"), {
                user: student,
                content: input.value,
                avatar: `https://api.dicebear.com/7.x/bottts/svg?seed=${student}`,
                timestamp: serverTimestamp()
            });
            input.value = "";
        };

        // Real-time Feed with 48-Hour Filter
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"), limit(20));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById("liveFeedContainer");
            feed.innerHTML = "";
            const twoDaysInMs = 48 * 60 * 60 * 1000;
            const now = Date.now();

            snapshot.forEach((doc) => {
                const p = doc.data();
                if (!p.timestamp) return;

                const postTime = p.timestamp.toDate().getTime();
                // Check: Agar post 48 ghante se nayi hai, tabhi dikhayein
                if (now - postTime < twoDaysInMs) {
                    feed.innerHTML += `
                        <div class="feed-card">
                            <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
                                <img src="${p.avatar}" class="feed-avatar">
                                <div>
                                    <div style="font-size:12px; font-weight:800; color:#06b6d4;">${p.user}</div>
                                    <div style="font-size:9px; opacity:0.5;">${p.timestamp.toDate().toLocaleTimeString()}</div>
                                </div>
                            </div>
                            <div style="font-size:13px; color:#e2e8f0;">${p.content}</div>
                        </div>
                    `;
                }
            });
        });
    </script>
</body>
</html>
