<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hello Lets Chat - Final Fix</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary-green: #89c191;
            --bg-green: #7ebf88;
            --text-black: #1a1a1a;
            --text-grey: #808080;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: #f0f0f0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .phone-shell {
            background-color: var(--bg-green);
            width: 100%;
            max-width: 414px;
            height: 94vh;
            border-radius: 50px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
            /* Pattern overlay like screenshot */
            background-image: radial-gradient(rgba(255,255,255,0.15) 1.5px, transparent 1.5px);
            background-size: 25px 25px;
        }

        .header-ui {
            position: absolute;
            top: 25px;
            width: 100%;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }

        .btn-round {
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 22px; cursor: pointer;
        }

        .hero-container {
            flex: 1.4;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            padding-bottom: 0;
        }

        /* Fixed Image - Yellow Girl Illustration */
        .hero-img {
            width: 80%;
            height: auto;
            z-index: 2;
            object-fit: contain;
            /* Filter to make it pop */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        .white-card {
            background: white;
            flex: 1;
            border-radius: 80px 0 0 0; 
            padding: 45px 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 5;
        }

        .dots-row { display: flex; gap: 6px; margin-bottom: 25px; }
        .dot-ui { width: 8px; height: 8px; border-radius: 50%; background: #efefef; }
        .dot-ui.active { width: 28px; height: 8px; border-radius: 10px; background: var(--primary-green); }

        h1 { font-size: 32px; color: var(--text-black); font-weight: 700; margin-bottom: 12px; }
        .desc { color: var(--text-grey); font-size: 15px; margin-bottom: 40px; max-width: 250px; }

        .btn-get-started {
            width: 100%; height: 62px;
            background-color: var(--primary-green);
            color: white; border: none; border-radius: 20px;
            font-size: 18px; font-weight: 600; cursor: pointer;
            box-shadow: 0 12px 25px rgba(137, 193, 145, 0.4);
        }

        .footer-hint {
            position: absolute; bottom: 15px; width: 100%;
            text-align: center; color: white; font-size: 11px; opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="header-ui">
        <div class="btn-round"><i class="ri-close-line"></i></div>
        <div class="btn-round"><i class="ri-more-fill"></i></div>
    </div>

    <div class="hero-container">
        <img src="https://cdni.iconscout.com/illustration/premium/thumb/female-character-holding-speech-bubble-illustration-download-in-svg-png-gif-file-formats--chatting-messages-pack-people-illustrations-4715124.png" class="hero-img" alt="Chat UI">
    </div>

    <div class="white-card">
        <div class="dots-row">
            <div class="dot-ui"></div>
            <div class="dot-ui"></div>
            <div class="dot-ui active"></div>
        </div>

        <h1>Hello, Lets Chat</h1>
        <p class="desc">Having lots of friends will make your life more colorful</p>

        <button class="btn-get-started" onclick="location.href='chart1.html'">Get Started</button>
    </div>

    <div class="footer-hint">Swipe up to explore area —</div>
</div>

</body>
</html>
