<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #020617; color: white; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
        .post-box { background: #0f172a; padding: 20px; border-radius: 20px; border: 1px solid #1e293b; margin-bottom: 20px; }
        textarea { width: 100%; background: transparent; color: white; border: none; height: 60px; outline: none; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #06b6d4; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; color: white; margin-top: 10px; }
        .feed-card { background: #1e293b; padding: 16px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #334155; }
        .feed-user { font-weight: 800; color: #06b6d4; font-size: 12px; }
        .feed-text { margin: 8px 0; font-size: 14px; }
    </style>
</head>
<body>

<div class="post-box">
    <textarea id="postInput" placeholder="What's on your mind, Elite?"></textarea>
    <button onclick="publishPost()">POST TO FEED</button>
</div>

<div id="liveFeedContainer"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. Post Logic
    window.publishPost = async () => {
        const input = document.getElementById("postInput");
        if(!input.value.trim()) return alert("Kuch toh likho!");
        
        try {
            await addDoc(collection(db, "posts"), {
                text: input.value,
                user: "Elite User",
                timestamp: serverTimestamp()
            });
            input.value = "";
        } catch (e) {
            console.error("Error:", e);
            alert("Database Error! Console check karein.");
        }
    };

    // 2. Feed Logic
    const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById("liveFeedContainer");
        feed.innerHTML = "";
        snapshot.forEach((doc) => {
            const p = doc.data();
            feed.innerHTML += `
                <div class="feed-card">
                    <div class="feed-user">${p.user}</div>
                    <div class="feed-text">${p.text}</div>
                </div>
            `;
        });
    });
</script>
</body>
</html>
