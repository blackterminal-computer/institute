<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Student Lounge v2.1</title>
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --accent: linear-gradient(135deg, #6366f1, #a855f7);
            --text: #f8fafc;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 16px;
            text-align: center;
            font-weight: 800;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* CHAT AREA */
        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* MESSAGES */
        .msg {
            background: var(--card);
            padding: 10px 14px;
            border-radius: 15px 15px 15px 2px;
            max-width: 75%;
            position: relative;
            transition: transform 0.2s;
            user-select: none;
        }

        .msg.mine {
            align-self: flex-end;
            background: var(--accent);
            border-radius: 15px 15px 2px 15px;
        }

        .name { font-size: 0.7rem; font-weight: bold; color: #4ade80; display: block; margin-bottom: 3px; }
        .msg.mine .name { color: #e0e7ff; }

        .reaction {
            position: absolute;
            bottom: -10px;
            right: 10px;
            background: #334155;
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* TYPING INDICATOR */
        #typing {
            padding: 5px 20px;
            font-size: 0.8rem;
            color: #94a3b8;
            font-style: italic;
            height: 20px;
        }

        /* INPUT AREA */
        .input-wrap {
            padding: 15px;
            background: #0f172a;
            display: flex;
            gap: 10px;
            padding-bottom: max(15px, env(safe-area-inset-bottom));
        }

        input {
            flex: 1;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 12px 18px;
            border-radius: 25px;
            outline: none;
        }

        button {
            background: var(--accent);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">💬 Student Lounge</div>

<div id="chatBox"></div>
<div id="typing"></div>

<div class="input-wrap">
    <input id="msgInput" type="text" placeholder="Message..." autocomplete="off">
    <button onclick="send()">➤</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, setDoc, deleteDoc, getDocs } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const student = localStorage.getItem("studentName") || "Student_" + Math.floor(Math.random()*999);
    if(!localStorage.getItem("studentName")) localStorage.setItem("studentName", student);

    // 1. TYPING LOGIC
    const input = document.getElementById("msgInput");
    input.addEventListener("input", () => {
        setDoc(doc(db, "status", student), { typing: true, time: Date.now() });
        setTimeout(() => setDoc(doc(db, "status", student), { typing: false }), 3000);
    });

    onSnapshot(collection(db, "status"), (snap) => {
        let typers = [];
        snap.forEach(d => {
            if(d.id !== student && d.data().typing && (Date.now() - d.data().time < 4000)) {
                typers.push(d.id);
            }
        });
        document.getElementById("typing").innerText = typers.length ? `${typers.join(', ')} is typing...` : "";
    });

    // 2. SEND MESSAGE
    window.send = async function() {
        const text = input.value.trim();
        if(!text) return;
        input.value = "";
        await addDoc(collection(db, "global_chat"), {
            name: student,
            msg: text,
            time: Date.now(),
            likes: 0
        });
    };

    input.addEventListener("keypress", (e) => e.key === "Enter" && send());

    // 3. RENDER & REACTIONS
    onSnapshot(query(collection(db, "global_chat"), orderBy("time")), (snap) => {
        const chatBox = document.getElementById("chatBox");
        chatBox.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            const msgDiv = document.createElement("div");
            msgDiv.className = `msg ${data.name === student ? 'mine' : ''}`;
            msgDiv.innerHTML = `<span class="name">${data.name}</span>${data.msg}${data.likes > 0 ? `<div class="reaction">❤️ ${data.likes}</div>` : ''}`;
            
            // Double tap to like
            msgDiv.addEventListener("dblclick", () => {
                updateDoc(doc(db, "global_chat", d.id), { likes: (data.likes || 0) + 1 });
            });

            chatBox.appendChild(msgDiv);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    // 4. DAILY CLEANUP (Messages older than 24 hours)
    async function cleanup() {
        const cutoff = Date.now() - (24 * 60 * 60 * 1000);
        const snap = await getDocs(collection(db, "global_chat"));
        snap.forEach(d => { if(d.data().time < cutoff) deleteDoc(doc(db, "global_chat", d.id)); });
    }
    cleanup();

</script>
</body>
</html>
