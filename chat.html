<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .post-box { margin: 20px; padding: 15px; border: 1px solid #334155; border-radius: 15px; }
        textarea { width: 100%; background: transparent; color: white; border: none; height: 50px; outline: none; }
        button { width: 100%; padding: 10px; background: #06b6d4; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .card { border: 1px solid #1e293b; padding: 15px; border-radius: 15px; margin: 15px 20px; }
        .actions { display: flex; gap: 20px; margin-top: 10px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="post-box">
    <textarea id="postInput" placeholder="What's on your mind?"></textarea>
    <button onclick="publishPost()">POST TO FEED</button>
</div>
<div id="feed"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { 
        /* APNA CONFIG YAHAN DALEIN */
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // POSTING LOGIC
    window.publishPost = async () => {
        const text = document.getElementById("postInput").value;
        if(!text.trim()) return alert("Khali post mat karo!");
        
        await addDoc(collection(db, "posts"), {
            text: text,
            timestamp: serverTimestamp(),
            user: "Elite User"
        });
        document.getElementById("postInput").value = "";
    };

    // LIVE FEED LOGIC
    const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById("feed");
        feed.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            // 48 Ghante ka check
            if ((Date.now() - data.timestamp?.toMillis()) < 172800000) {
                feed.innerHTML += `
                    <div class="card">
                        <div style="font-weight:bold">${data.user}</div>
                        <div style="margin:10px 0">${data.text}</div>
                        <div class="actions">
                            <span onclick="alert('Liked!')">LIKE</span>
                            <span onclick="alert('Comment!')">COMMENT</span>
                        </div>
                    </div>
                `;
            }
        });
    });
</script>
</body>
</html>
