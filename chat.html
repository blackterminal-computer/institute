<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --accent: #06b6d4; --card-bg: rgba(30, 41, 59, 0.7); --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        /* Post Box Styling */
        .post-box { margin: 20px; background: var(--card-bg); backdrop-filter: blur(12px); padding: 20px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        textarea { width: 100%; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.05); height: 80px; outline: none; resize: none; font-size: 15px; border-radius: 16px; padding: 12px; box-sizing: border-box; }
        .post-btn { width: 100%; background: linear-gradient(135deg, #06b6d4, #3b82f6); border: none; padding: 14px; border-radius: 16px; font-weight: 800; color: white; cursor: pointer; transition: transform 0.2s; margin-top: 12px; }
        .post-btn:active { transform: scale(0.98); }

        /* Feed Cards */
        .feed-card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; margin: 20px; border: 1px solid rgba(255,255,255,0.1); animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .feed-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .feed-avatar { width: 44px; height: 44px; border-radius: 14px; border: 2px solid var(--accent); object-fit: cover; background: #1e293b; }
        .ts { font-size: 11px; color: #94a3b8; font-weight: 400; }

        /* Actions & Reactions */
        .action-bar { display: flex; gap: 12px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; position: relative; }
        .action-btn { color: #cbd5e1; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; background: rgba(255,255,255,0.05); padding: 8px 14px; border-radius: 12px; transition: 0.2s; }
        .action-btn:hover { background: rgba(255,255,255,0.1); }
        
        .reaction-panel { position: absolute; bottom: 55px; left: 0; background: #1e293b; border: 1px solid #334155; border-radius: 40px; padding: 8px 15px; display: none; gap: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 100; animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .like-container:hover .reaction-panel { display: flex; }
        .reaction-panel span { font-size: 22px; cursor: pointer; transition: transform 0.2s; }
        .reaction-panel span:hover { transform: scale(1.3); }

        /* Comments */
        .comment-section { margin-top: 15px; display: none; background: rgba(0,0,0,0.2); border-radius: 18px; padding: 15px; }
        .comment-input-area { display: flex; gap: 10px; margin-bottom: 12px; }
        .comment-input-area input { flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 15px; color: white; outline: none; font-size: 13px; }
        .single-comment { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; margin-bottom: 8px; font-size: 13px; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

<div class="post-box">
    <textarea id="postInput" placeholder="What's on your mind, Elite?"></textarea>
    <button class="post-btn" onclick="publishPost()">POST TO FEED</button>
</div>

<div id="liveFeedContainer"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const student = localStorage.getItem("studentName") || "Elite User";

    // Helper: Time Ago Function
    function timeAgo(date) {
        if(!date) return "Just now";
        const seconds = Math.floor((new Date() - date) / 1000);
        let interval = seconds / 31536000;
        if (interval > 1) return Math.floor(interval) + "y ago";
        interval = seconds / 2592000;
        if (interval > 1) return Math.floor(interval) + "mo ago";
        interval = seconds / 86400;
        if (interval > 1) return Math.floor(interval) + "d ago";
        interval = seconds / 3600;
        if (interval > 1) return Math.floor(interval) + "h ago";
        interval = seconds / 60;
        if (interval > 1) return Math.floor(interval) + "m ago";
        return "Just now";
    }

    window.publishPost = async () => {
        const input = document.getElementById("postInput");
        if(!input.value.trim()) return;
        
        let photo = `https://api.dicebear.com/7.x/bottts/svg?seed=${student}`;
        try {
            const userDoc = await getDoc(doc(db, "students", student));
            if(userDoc.exists() && userDoc.data().photo) photo = userDoc.data().photo;
        } catch(e) { console.error("Photo fetch error", e); }

        await addDoc(collection(db, "posts"), {
            user: student, userPhoto: photo, content: input.value, timestamp: serverTimestamp()
        });
        input.value = "";
    };

    window.handleReaction = async (postId, emoji) => {
        const ref = doc(db, "posts", postId, "reactions", student);
        const snap = await getDoc(ref);
        if (snap.exists() && snap.data().type === emoji) { await deleteDoc(ref); }
        else { await setDoc(ref, { type: emoji }); }
    };

    window.deletePost = async (postId, author) => {
        if(author === student && confirm("Delete this post?")) { await deleteDoc(doc(db, "posts", postId)); }
        else if (author !== student) { alert("Only the author can delete this!"); }
    };

    window.submitComment = async (id) => {
        const input = document.getElementById(`input-${id}`);
        if(!input.value.trim()) return;
        await addDoc(collection(db, "posts", id, "comments"), {
            user: student, text: input.value, timestamp: serverTimestamp()
        });
        input.value = "";
    };

    window.toggleComments = (id) => {
        const box = document.getElementById(`cbox-${id}`);
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    };

    // Main Feed Listener
    onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
        const feed = document.getElementById("liveFeedContainer");
        feed.innerHTML = "";
        snap.forEach((postDoc) => {
            const p = postDoc.data();
            const postId = postDoc.id;
            const card = document.createElement('div');
            card.className = 'feed-card';
            card.innerHTML = `
                <div class="feed-header">
                    <img src="${p.userPhoto}" class="feed-avatar">
                    <div>
                        <div style="font-weight:800; font-size:15px;">${p.user}</div>
                        <div class="ts">${timeAgo(p.timestamp?.toDate())}</div>
                    </div>
                </div>
                <div style="font-size:14px; line-height:1.5; color:#e2e8f0;">${p.content}</div>
                <div class="action-bar">
                    <div class="like-container">
                        <div class="reaction-panel">
                            <span onclick="handleReaction('${postId}', '👍')">👍</span>
                            <span onclick="handleReaction('${postId}', '🔥')">🔥</span>
                            <span onclick="handleReaction('${postId}', '❤️')">❤️</span>
                            <span onclick="handleReaction('${postId}', '😂')">😂</span>
                        </div>
                        <div class="action-btn" id="btn-${postId}"><i class="ri-heart-line"></i> React</div>
                    </div>
                    <div class="action-btn" onclick="toggleComments('${postId}')"><i class="ri-chat-3-line"></i> Comment</div>
                    ${p.user === student ? `<div class="action-btn" style="margin-left:auto; color:#f87171;" onclick="deletePost('${postId}', '${p.user}')"><i class="ri-delete-bin-7-line"></i></div>` : ''}
                </div>
                <div class="comment-section" id="cbox-${postId}">
                    <div class="comment-input-area">
                        <input type="text" id="input-${postId}" placeholder="Share your thoughts...">
                        <button style="background:none; border:none; color:var(--accent); font-size:20px;" onclick="submitComment('${postId}')"><i class="ri-send-plane-fill"></i></button>
                    </div>
                    <div id="list-${postId}"></div>
                </div>`;
            feed.appendChild(card);

            // Sub-listener for Reactions
            onSnapshot(collection(db, "posts", postId, "reactions"), (rSnap) => {
                const btn = document.getElementById(`btn-${postId}`);
                if(btn) {
                    const count = rSnap.size;
                    btn.innerHTML = `<i class="ri-heart-fill" style="color:#ef4444;"></i> ${count > 0 ? count : ''} React`;
                }
            });

            // Sub-listener for Comments
            onSnapshot(query(collection(db, "posts", postId, "comments"), orderBy("timestamp", "asc")), (cSnap) => {
                const list = document.getElementById(`list-${postId}`);
                if(list) {
                    list.innerHTML = "";
                    cSnap.forEach(cDoc => {
                        list.innerHTML += `<div class="single-comment"><b>${cDoc.data().user}</b>: ${cDoc.data().text}</div>`;
                    });
                }
            });
        });
    });
</script>
</body>
</html>
