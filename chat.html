<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --accent: #06b6d4; --card-bg: rgba(30, 41, 59, 0.7); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; }
        .post-box { margin: 20px; background: var(--card-bg); backdrop-filter: blur(12px); padding: 20px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        textarea { width: 100%; background: rgba(0,0,0,0.2); color: white; border: none; height: 60px; outline: none; resize: none; font-size: 15px; border-radius: 12px; padding: 10px; }
        .post-btn { width: 100%; background: linear-gradient(135deg, #06b6d4, #3b82f6); border: none; padding: 14px; border-radius: 16px; font-weight: 800; color: white; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .feed-card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; margin: 20px; border: 1px solid rgba(255,255,255,0.1); animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
        .feed-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feed-avatar { width: 48px; height: 48px; border-radius: 16px; border: 2px solid var(--accent); object-fit: cover; }
        .ts { font-size: 10px; color: #94a3b8; }
        .action-bar { display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; position: relative; }
        .action-btn { color: #94a3b8; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 12px; }
        .reaction-panel { position: absolute; bottom: 50px; left: 0; background: #0f172a; border: 1px solid #334155; border-radius: 40px; padding: 10px; display: none; gap: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 100; }
        .like-container:hover .reaction-panel { display: flex; }
        .reaction-panel span { font-size: 22px; cursor: pointer; transition: 0.2s; }
        .comment-section { margin-top: 10px; display: none; background: rgba(0,0,0,0.3); border-radius: 16px; padding: 12px; }
        .comment-input-area { display: flex; gap: 8px; margin-bottom: 10px; }
        .comment-input-area input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 8px 15px; color: white; outline: none; font-size: 12px; }
        .single-comment { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 15px; margin-bottom: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div class="post-box">
    <textarea id="postInput" placeholder="What's on your mind, Elite?"></textarea>
    <button class="post-btn" onclick="publishPost()">POST TO FEED</button>
</div>
<div id="liveFeedContainer"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const student = localStorage.getItem("studentName") || "Elite User";

    window.publishPost = async () => {
        const input = document.getElementById("postInput");
        if(!input.value.trim()) return;
        
        let photo = "https://api.dicebear.com/7.x/adventurer/svg?seed=" + student;
        try {
            const userDoc = await getDoc(doc(db, "students", student));
            if(userDoc.exists() && userDoc.data().photo) photo = userDoc.data().photo;
        } catch(e) {}

        await addDoc(collection(db, "posts"), {
            user: student, userPhoto: photo, content: input.value, timestamp: serverTimestamp()
        });
        input.value = "";
    };

    window.handleReaction = async (postId, emoji) => {
        const ref = doc(db, "posts", postId, "reactions", student);
        const snap = await getDoc(ref);
        if (snap.exists() && snap.data().type === emoji) { await deleteDoc(ref); }
        else { await setDoc(ref, { type: emoji }); }
    };

    window.deletePost = async (postId, author) => {
        if(author === student) { await deleteDoc(doc(db, "posts", postId)); }
        else { alert("Only the author can delete this post!"); }
    };

    window.submitComment = async (id) => {
        const input = document.getElementById(`input-${id}`);
        if(!input.value.trim()) return;
        await addDoc(collection(db, "posts", id, "comments"), {
            user: student, text: input.value, timestamp: serverTimestamp()
        });
        input.value = "";
    };

    onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
        const feed = document.getElementById("liveFeedContainer");
        feed.innerHTML = "";
        snap.forEach((postDoc) => {
            const p = postDoc.data();
            const postId = postDoc.id;
            const postDate = p.timestamp?.toDate();

            const card = document.createElement('div');
            card.className = 'feed-card';
            card.innerHTML = `
                <div class="feed-header">
                    <img src="${p.userPhoto}" class="feed-avatar">
                    <div style="display:flex; flex-direction:column;">
                        <div style="font-weight:800; font-size:14px;">${p.user}</div>
                        <div class="ts">Just now</div>
                    </div>
                </div>
                <div style="font-size:14px; margin-bottom:10px;">${p.content}</div>
                <div class="action-bar">
                    <div class="like-container" style="position:relative;">
                        <div class="reaction-panel">
                            <span onclick="handleReaction('${postId}', '👍')">👍</span>
                            <span onclick="handleReaction('${postId}', '❤️')">❤️</span>
                            <span onclick="handleReaction('${postId}', '😂')">😂</span>
                        </div>
                        <div class="action-btn" id="btn-${postId}"><i class="ri-thumb-up-line"></i> Like</div>
                    </div>
                    <div class="action-btn" onclick="document.getElementById('cbox-${postId}').style.display='block'"><i class="ri-chat-3-line"></i> Comment</div>
                    ${p.user === student ? `<div class="action-btn" onclick="deletePost('${postId}', '${p.user}')"><i class="ri-delete-bin-line"></i></div>` : ''}
                </div>
                <div class="comment-section" id="cbox-${postId}">
                    <div class="comment-input-area">
                        <input type="text" id="input-${postId}" placeholder="Write a comment...">
                        <i class="ri-send-plane-2-fill" style="color:var(--accent); cursor:pointer;" onclick="submitComment('${postId}')"></i>
                    </div>
                    <div id="list-${postId}"></div>
                </div>`;
            feed.appendChild(card);

            onSnapshot(collection(db, "posts", postId, "reactions"), (rSnap) => {
                const btn = document.getElementById(`btn-${postId}`);
                if(btn) btn.innerHTML = `<i class="ri-thumb-up-fill"></i> React (${rSnap.size})`;
            });

            onSnapshot(query(collection(db, "posts", postId, "comments"), orderBy("timestamp", "asc")), (cSnap) => {
                const list = document.getElementById(`list-${postId}`);
                if(list) {
                    list.innerHTML = "";
                    cSnap.forEach(cDoc => {
                        list.innerHTML += `<div class="single-comment"><b>${cDoc.data().user}</b> ${cDoc.data().text}</div>`;
                    });
                }
            });
        });
    });
</script>
</body>
</html>
