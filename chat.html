<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Student Lounge: Pulse v12</title>
    <style>
        :root { --bg: #000000; --accent: #007aff; --bubble-mine: #007aff; --bubble-other: #1c1c1e; --text-main: #ffffff; --text-dim: #8e8e93; }
        body { background-color: var(--bg); color: var(--text-main); font-family: -apple-system, system-ui, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        .header { padding: 15px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 0.5px solid #333; text-align: center; z-index: 10; }
        
        /* Online Bar */
        .online-bar { display: flex; gap: 12px; padding: 10px 20px; background: #0d0d0d; border-bottom: 0.5px solid #333; overflow-x: auto; }
        .online-user { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 50px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .u-label { font-size: 8px; color: var(--text-dim); text-transform: uppercase; white-space: nowrap; }

        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg-wrap { display: flex; flex-direction: column; gap: 4px; }
        .msg-wrap.mine { align-items: flex-end; }
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 16px; background: var(--bubble-other); }
        .mine .bubble { background: var(--bubble-mine); }
        .u-name { font-size: 11px; color: var(--text-dim); margin: 0 5px; }

        .input-footer { padding: 15px; background: #000; border-top: 0.5px solid #333; }
        .input-row { display: flex; background: #1c1c1e; border-radius: 25px; padding: 5px 15px; align-items: center; }
        #mIn { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; outline: none; }
        .send-btn { background: var(--accent); border: none; width: 35px; height: 35px; border-radius: 50%; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 700;">Student Lounge v12</div>
</div>

<div id="onlineBar" class="online-bar"></div>

<div id="chatBox"></div>

<div class="input-footer">
    <div class="input-row">
        <input id="mIn" placeholder="Type a message..." autocomplete="off">
        <button class="send-btn" id="sendBtn" onclick="send()">↑</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limitToLast, doc, updateDoc, where } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const student = localStorage.getItem("studentName") || "Guest_" + Math.floor(Math.random()*999);

    // Online Status Handler
    const userRef = doc(db, "students", student);
    await updateDoc(userRef, { isOnline: true });
    window.addEventListener("beforeunload", async () => await updateDoc(userRef, { isOnline: false }));

    // Render Online Bar
    onSnapshot(query(collection(db, "students"), where("isOnline", "==", true)), (snap) => {
        const bar = document.getElementById("onlineBar");
        bar.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            bar.innerHTML += `
                <div class="online-user">
                    <img src="${data.photo || 'https://api.dicebear.com/7.x/bottts/svg?seed='+d.id}" class="avatar">
                    <span class="u-label">${d.id}</span>
                </div>`;
        });
    });

    // Chat Logic
    onSnapshot(query(collection(db, "global_chat"), orderBy("time"), limitToLast(30)), (snap) => {
        const chatBox = document.getElementById("chatBox");
        chatBox.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            chatBox.innerHTML += `
                <div class="msg-wrap ${data.name === student ? 'mine' : ''}">
                    <span class="u-name">${data.name === student ? 'You' : data.name}</span>
                    <div class="bubble">${data.msg}</div>
                </div>`;
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    window.send = async () => {
        const text = document.getElementById("mIn").value.trim();
        if (!text) return;
        document.getElementById("mIn").value = "";
        await addDoc(collection(db, "global_chat"), { name: student, msg: text, time: Date.now() });
    };
</script>
</body>
</html>
