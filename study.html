<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BlackTerminal AI</title>
    <style>
        body { background: #020617; color: #e2e8f0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Courier New', monospace; }
        #timer { font-size: 70px; color: #06b6d4; margin: 20px 0; text-shadow: 0 0 15px rgba(6, 182, 212, 0.5); }
        .btn { background: #06b6d4; border: none; padding: 15px 40px; border-radius: 6px; font-weight: bold; cursor: pointer; color: #020617; }
        .ai-box { width: 90%; max-width: 450px; border: 1px solid #1e293b; padding: 15px; border-radius: 8px; background: #050a1f; }
        #aiResponse { font-size: 13px; color: #94a3b8; height: 100px; overflow-y: auto; margin-bottom: 10px; }
        #aiInput { width: 100%; background: transparent; border: none; color: #06b6d4; outline: none; font-family: monospace; }
    </style>
</head>
<body>

    <div id="timer">00:00</div>
    <button id="btn" class="btn">START FOCUS</button>

    <div class="ai-box">
        <div class="ai-header">> BLACKTERMINAL_AI // SYSTEM_READY</div>
        <div id="aiResponse">>> Enter /ask [question]</div>
        <input type="text" id="aiInput" placeholder="/ask...">
    </div>

    <script>
        // 1. API Key Delete karke nayi generate karo
        const API_KEY = "YAHAN_APNI_NAYI_API_KEY_PASTE_KARO";
        const aiInput = document.getElementById('aiInput');
        const aiResponse = document.getElementById('aiResponse');
        
        aiInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const query = aiInput.value.replace('/ask ', '');
                aiInput.value = "";
                aiResponse.innerText = ">> Processing...";
                
                try {
                    // Ye fetch request ab sahi format mein hai
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Strict cyberpunk study assistant: " + query }] }]
                        })
                    });
                    const data = await res.json();
                    const text = data.candidates[0].content.parts[0].text;
                    aiResponse.innerText = ">> " + text;
                } catch(err) { 
                    aiResponse.innerText = ">> Error: Check API Key or Network."; 
                    console.log(err);
                }
            }
        });
    </script>
</body>
</html>
