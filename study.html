<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deep Focus Portal</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #timerDisplay { font-size: 64px; color: #06b6d4; margin: 20px 0; font-family: monospace; }
        .focus-btn { background: #06b6d4; border: none; padding: 15px 40px; border-radius: 20px; font-weight: 900; cursor: pointer; color: #000; }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <h3 style="opacity: 0.5;">DEEP STUDY SESSION</h3>
        <div id="timerDisplay">00:00</div>
        <button id="toggleBtn" class="focus-btn">START FOCUS</button>
        <p style="margin-top: 20px;"><a href="index.html" style="color:white; opacity:0.5;">Exit to Terminal</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Firebase Config (Yahan apna config daalein)
        const app = initializeApp({ /* ... */ });
        const db = getFirestore(app);

        let isRunning = false;
        let seconds = 0;
        let timerInterval;

        const btn = document.getElementById('toggleBtn');
        const display = document.getElementById('timerDisplay');

        // Click Event ko script ke andar hi listen karein (ye best practice hai)
        btn.addEventListener('click', () => {
            if (!isRunning) {
                isRunning = true;
                btn.innerText = "STOP SESSION";
                timerInterval = setInterval(() => {
                    seconds++;
                    let m = Math.floor(seconds / 60);
                    let s = seconds % 60;
                    display.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                }, 1000);
            } else {
                clearInterval(timerInterval);
                isRunning = false;
                btn.innerText = "START FOCUS";
                const mins = Math.floor(seconds / 60);
                if (mins >= 1) syncToFirebase(mins);
                seconds = 0;
                display.innerText = "00:00";
            }
        });

        async function syncToFirebase(mins) {
            const student = localStorage.getItem("studentName");
            if (student) {
                const userRef = doc(db, "students", student);
                await updateDoc(userRef, { "quests.studyMinutes": increment(mins) });
                alert(`Session Synced! ${mins} minutes added to your quest.`);
            }
        }
    </script>
</body>
</html>
