<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Study</title>
    <style>
        body { background: #020617; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        #timer { font-size: 60px; margin: 20px 0; color: #06b6d4; }
        button { background: #06b6d4; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h3>DEEP STUDY SESSION</h3>
    <div id="timer">00:00</div>
    <button id="btn">START FOCUS</button>
    <p style="margin-top: 20px;"><a href="index.html" style="color: gray;">Back to Terminal</a></p>

    <script>
        let seconds = 0;
        let running = false;
        let interval;
        const display = document.getElementById('timer');
        const btn = document.getElementById('btn');

        btn.addEventListener('click', () => {
            if (!running) {
                // Start
                running = true;
                btn.innerText = "STOP FOCUS";
                interval = setInterval(() => {
                    seconds++;
                    let m = Math.floor(seconds / 60);
                    let s = seconds % 60;
                    display.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                }, 1000);
            } else {
                // Stop
                running = false;
                btn.innerText = "START FOCUS";
                clearInterval(interval);
                alert("Session Finished! You studied for " + Math.floor(seconds / 60) + " minutes.");
                seconds = 0;
                display.innerText = "00:00";
            }
        });
    </script>
</body>
</html>
