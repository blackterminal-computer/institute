<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #020617; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: monospace; }
        #timer { font-size: 80px; color: #06b6d4; margin: 20px 0; text-shadow: 0 0 20px rgba(6, 182, 212, 0.5); }
        .btn { background: #06b6d4; border: none; padding: 20px 50px; border-radius: 15px; font-weight: bold; cursor: pointer; color: #020617; }
        .ai-box { width: 80%; max-width: 400px; margin-top: 30px; border: 1px solid #06b6d4; padding: 15px; border-radius: 10px; background: #050a1f; }
    </style>
</head>
<body>
    <div id="timer">00:00</div>
    <button id="btn" class="btn">START FOCUS</button>
    
    <div class="ai-box">
        <div id="aiResponse" style="font-size: 12px; color: #cbd5e1;">>> AI Ready. Type /ask [question]</div>
        <input type="text" id="aiInput" placeholder="/ask..." style="width: 100%; background: transparent; border: none; color: #06b6d4; outline: none;">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Firebase Setup (Try-Catch block lagaya hai taki crash na ho)
        let db;
        try {
            const firebaseConfig = { /* APNA CONFIG YAHAN DALEIN */ };
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        } catch (e) { console.warn("Firebase not loaded, running in Offline Mode."); }

        // Timer Logic
        let seconds = 0, running = false, interval;
        const display = document.getElementById('timer');
        const btn = document.getElementById('btn');

        btn.addEventListener('click', () => {
            if (!running) {
                running = true;
                btn.innerText = "STOP FOCUS";
                interval = setInterval(() => {
                    seconds++;
                    let m = Math.floor(seconds/60), s = seconds%60;
                    display.innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                }, 1000);
            } else {
                running = false;
                btn.innerText = "START FOCUS";
                clearInterval(interval);
                alert("Session finished: " + Math.floor(seconds/60) + " mins");
                seconds = 0; display.innerText = "00:00";
            }
        });

        // AI Logic
        const aiInput = document.getElementById('aiInput');
        aiInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const query = aiInput.value.replace('/ask ', '');
                aiInput.value = "";
                document.getElementById('aiResponse').innerText = ">> Thinking...";
                
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyAWxW568KTSCG-BYSH_hLL2WflkyW9aFZs`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: query }] }] })
                });
                const data = await res.json();
                document.getElementById('aiResponse').innerText = data.candidates[0].content.parts[0].text;
            }
        });
    </script>
</body>
</html>
