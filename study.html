<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #020617; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #timer { font-size: 60px; color: #06b6d4; margin: 20px 0; }
        .btn { background: #06b6d4; border: none; padding: 15px 40px; border-radius: 15px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <div id="timer">00:00</div>
    <button id="btn" class="btn">START FOCUS</button>

    <script>
        // Module hata diya hai taaki koi scope error na ho
        let seconds = 0, running = false, interval;
        const display = document.getElementById('timer');
        const btn = document.getElementById('btn');

        btn.addEventListener('click', function() {
            if (!running) {
                running = true;
                btn.innerText = "STOP FOCUS";
                interval = setInterval(() => {
                    seconds++;
                    let m = Math.floor(seconds / 60);
                    let s = seconds % 60;
                    display.innerText = (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
                }, 1000);
            } else {
                running = false;
                btn.innerText = "START FOCUS";
                clearInterval(interval);
                alert("Session Stopped at " + Math.floor(seconds / 60) + " minutes.");
                seconds = 0;
                display.innerText = "00:00";
            }
        });
    </script>
</body>
</html>
