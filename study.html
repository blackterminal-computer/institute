<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BlackTerminal AI</title>
    <style>
        body { background: #020617; color: #e2e8f0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Courier New', monospace; }
        #timer { font-size: 70px; color: #06b6d4; margin: 20px 0; }
        .btn { background: #06b6d4; padding: 15px 40px; border-radius: 6px; cursor: pointer; border: none; }
        .ai-box { width: 90%; max-width: 450px; border: 1px solid #1e293b; padding: 15px; background: #050a1f; }
        #aiResponse { font-size: 13px; color: #94a3b8; height: 100px; overflow-y: auto; }
        #aiInput { width: 100%; background: transparent; border: none; color: #06b6d4; outline: none; }
    </style>
</head>
<body>

    <div id="timer">00:00</div>
    <button id="btn" class="btn">START FOCUS</button>

    <div class="ai-box">
        <div id="aiResponse">>> Enter /ask [question] to initiate analysis.</div>
        <input type="text" id="aiInput" placeholder="/ask...">
    </div>

    <script>
        const aiInput = document.getElementById('aiInput'), aiResponse = document.getElementById('aiResponse');
        
        aiInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const query = aiInput.value.replace('/ask ', '');
                aiInput.value = "";
                aiResponse.innerText = ">> Processing...";
                
                try {
                    const res = await fetch("YOUR_FUNCTION_URL_HERE", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ query: query })
                    });
                    const data = await res.json();
                    aiResponse.innerText = ">> " + (data.candidates?.[0]?.content?.parts?.[0]?.text || "System Error.");
                } catch(e) { aiResponse.innerText = ">> Connection Failed."; }
            }
        });
    </script>
</body>
</html>
