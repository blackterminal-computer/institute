<!DOCTYPE html>
<html lang="en" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaveSmart | Debt & Bill Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .bill-row { border-left: 4px solid #ef4444; transition: all 0.3s; }
        .paid-row { border-left-color: #22c55e !important; opacity: 0.6; background-color: #f0fdf4 !important; }
        .timer-badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 99px; font-weight: bold; }
        .target-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-left: 5px solid #3b82f6; }
        .progress-container { background: rgba(255,255,255,0.1); border-radius: 10px; height: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: #22c55e; transition: width 0.5s ease; }
        .payment-pill { background: #f0fdf4; border: 1px solid #dcfce7; font-size: 11px; padding: 2px 8px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;}
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900">Finance <span class="text-blue-600">Command Center</span></h1>
                <p class="text-slate-500 font-medium">Monthly Admissions & Bill Tracker</p>
            </div>
            <button onclick="saveMonthlyData()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg">💾 Save Month</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-3xl card-shadow">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-slate-800">💳 CC Bill (12th)</h3>
                    <span id="ccTimer" class="timer-badge bg-red-100 text-red-600">15 days left</span>
                </div>
                
                <div class="mb-4">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Total Bill Amount</label>
                    <input type="number" id="ccBill" placeholder="₹ 25000" oninput="calculate()" class="w-full p-3 rounded-xl bg-slate-50 border-2 border-slate-100 focus:border-blue-500 outline-none font-bold text-xl">
                </div>

                <div class="bg-green-50 p-4 rounded-2xl mb-4 border border-green-100">
                    <label class="text-[10px] font-bold text-green-600 uppercase">Add Payment (Today)</label>
                    <div class="flex gap-2 mt-1">
                        <input type="number" id="ccPartialInput" placeholder="₹ Amount" class="flex-1 p-2 rounded-lg border-none outline-none font-bold text-sm">
                        <button onclick="addCCPayment()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold">Add</button>
                    </div>
                    
                    <div id="ccPaymentList" class="mt-3 max-h-32 overflow-y-auto pt-2 border-t border-green-200">
                        </div>
                </div>

                <div class="flex justify-between items-center px-1">
                    <p class="text-xs text-slate-500">Paid: <span id="ccTotalPaidDisplay" class="font-bold text-green-600">₹0</span></p>
                    <p class="text-xs text-slate-500">Due: <span id="ccBalanceDisplay" class="font-bold text-red-500">₹0</span></p>
                </div>
            </div>

            <div class="bg-slate-900 text-white p-6 rounded-3xl card-shadow flex flex-col justify-center border-b-4 border-red-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest text-center">Net Amount To Earn</p>
                <h2 id="totalLiability" class="text-5xl font-black text-red-400 mt-2 text-center">₹0</h2>
                <div class="mt-4 pt-4 border-t border-white/10 flex justify-between items-center text-[10px] opacity-60 px-2">
                    <span>History Average: <b id="lastMonthVal">₹0</b></span>
                    <span id="todayDate">Date</span>
                </div>
            </div>
        </div>

        <div class="target-card text-white p-8 rounded-[2.5rem] shadow-2xl mb-8">
            <div class="flex justify-between items-end mb-4">
                <h3 class="font-extrabold text-blue-400 uppercase tracking-tighter text-sm">Admissions Required</h3>
                <span id="progressText" class="text-[10px] font-bold text-slate-400">0% Covered</span>
            </div>
            <div class="grid grid-cols-2 gap-6 mb-6">
                <div class="text-center p-4 bg-white/5 rounded-3xl border border-white/10">
                    <p class="text-slate-400 text-[10px] uppercase font-bold mb-1">Driving</p>
                    <div class="text-4xl font-black text-orange-400" id="reqDriving">0</div>
                </div>
                <div class="text-center p-4 bg-white/5 rounded-3xl border border-white/10">
                    <p class="text-slate-400 text-[10px] uppercase font-bold mb-1">Computer</p>
                    <div class="text-4xl font-black text-purple-400" id="reqComp">0</div>
                </div>
            </div>
            <div class="progress-container mb-2"><div id="progressBar" class="progress-bar" style="width: 0%"></div></div>
            <p id="aiSolution" class="text-sm font-medium italic text-slate-300 text-center"></p>
        </div>

        <div class="bg-white p-6 rounded-3xl card-shadow mb-8 border-2 border-slate-100">
            <h3 class="text-lg font-bold mb-6">✅ Done Admissions</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="p-4 bg-orange-50 rounded-2xl flex justify-between items-center border border-orange-100">
                    <span class="font-bold">Driving</span>
                    <div class="flex items-center gap-3">
                        <button onclick="updateCount('driving', -1)" class="w-8 h-8 bg-white rounded-full shadow font-bold">-</button>
                        <span id="drivingCount" class="text-2xl font-black">0</span>
                        <button onclick="updateCount('driving', 1)" class="w-8 h-8 bg-orange-500 text-white rounded-full shadow font-bold">+</button>
                    </div>
                </div>
                <div class="p-4 bg-purple-50 rounded-2xl flex justify-between items-center border border-purple-100">
                    <span class="font-bold">Computer</span>
                    <div class="flex items-center gap-3">
                        <button onclick="updateCount('computer', -1)" class="w-8 h-8 bg-white rounded-full shadow font-bold">-</button>
                        <span id="computerCount" class="text-2xl font-black">0</span>
                        <button onclick="updateCount('computer', 1)" class="w-8 h-8 bg-purple-500 text-white rounded-full shadow font-bold">+</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl card-shadow">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">📅 Other Fixed Bills</h3>
                <button onclick="toggleAddBill()" class="text-blue-600 text-xs font-bold">+ New</button>
            </div>
            <div id="addBillForm" class="hidden mb-6 p-4 bg-slate-50 rounded-2xl border-2 border-dashed">
                <div class="grid grid-cols-3 gap-2">
                    <input type="text" id="newName" placeholder="Name" class="p-2 border rounded text-xs">
                    <input type="number" id="newAmount" placeholder="₹" class="p-2 border rounded text-xs">
                    <input type="number" id="newDate" placeholder="Date" class="p-2 border rounded text-xs">
                </div>
                <button onclick="addNewBill()" class="mt-2 w-full bg-blue-600 text-white p-2 rounded text-xs font-bold">Add</button>
            </div>
            <div id="billContainer" class="space-y-3"></div>
        </div>
    </div>

    <script>
        let counts = { driving: 0, computer: 0 };
        // Initializing state with History Tracking for CC Payments
        let bills = JSON.parse(localStorage.getItem('ss_bills')) || [
            { id: 1, name: 'iPhone EMI', amount: 8000, date: 1, color: 'blue-500', paid: false },
            { id: 2, name: 'Android EMI', amount: 5000, date: 1, color: 'blue-400', paid: false }
        ];
        
        // NEW: Load CC Payments from Local Storage
        let ccPayments = JSON.parse(localStorage.getItem('ss_cc_payments')) || [];
        let historyData = JSON.parse(localStorage.getItem('ss_history')) || [0];

        function addCCPayment() {
            const input = document.getElementById('ccPartialInput');
            const amt = parseFloat(input.value);
            if(amt > 0) {
                const now = new Date();
                const dateStr = `${now.getDate()} ${now.toLocaleString('default', { month: 'short' })}`;
                ccPayments.push({ id: Date.now(), amount: amt, date: dateStr });
                localStorage.setItem('ss_cc_payments', JSON.stringify(ccPayments));
                input.value = '';
                calculate();
            }
        }

        function removeCCPayment(id) {
            ccPayments = ccPayments.filter(p => p.id !== id);
            localStorage.setItem('ss_cc_payments', JSON.stringify(ccPayments));
            calculate();
        }

        function toggleAddBill() { document.getElementById('addBillForm').classList.toggle('hidden'); }

        function addNewBill() {
            const n = document.getElementById('newName').value, a = document.getElementById('newAmount').value, d = document.getElementById('newDate').value;
            if(n && a && d) {
                bills.push({ id: Date.now(), name: n, amount: parseFloat(a), date: parseInt(d), color: 'slate-400', paid: false });
                localStorage.setItem('ss_bills', JSON.stringify(bills));
                calculate();
                toggleAddBill();
            }
        }

        function removeBill(id) {
            bills = bills.filter(b => b.id !== id);
            localStorage.setItem('ss_bills', JSON.stringify(bills));
            calculate();
        }

        function getDaysLeft(targetDay) {
            const today = new Date();
            let targetDate = new Date(today.getFullYear(), today.getMonth(), targetDay);
            if (today.getDate() > targetDay) targetDate = new Date(today.getFullYear(), today.getMonth() + 1, targetDay);
            const diff = Math.ceil((targetDate - today) / (1000 * 60 * 60 * 24));
            return diff === 0 ? "Due Today!" : `${diff} days left`;
        }

        function updateCount(t, v) { 
            counts[t] = Math.max(0, counts[t] + v); 
            document.getElementById(t+'Count').innerText = counts[t];
            calculate(); 
        }

        function togglePaid(idx) { 
            bills[idx].paid = !bills[idx].paid; 
            localStorage.setItem('ss_bills', JSON.stringify(bills));
            calculate(); 
        }

        function calculate() {
            document.getElementById('todayDate').innerText = new Date().toDateString();
            
            // CC Logic
            const totalCC = parseFloat(document.getElementById('ccBill').value) || 0;
            const totalPaidCC = ccPayments.reduce((sum, p) => sum + p.amount, 0);
            const ccBalance = Math.max(0, totalCC - totalPaidCC);
            
            document.getElementById('ccTotalPaidDisplay').innerText = `₹${totalPaidCC.toLocaleString()}`;
            document.getElementById('ccBalanceDisplay').innerText = `₹${ccBalance.toLocaleString()}`;
            document.getElementById('ccTimer').innerText = getDaysLeft(12);

            // Render Payment List
            const listContainer = document.getElementById('ccPaymentList');
            listContainer.innerHTML = ccPayments.length ? '' : '<p class="text-[10px] text-slate-400 text-center">No payments added yet</p>';
            ccPayments.forEach(p => {
                listContainer.innerHTML += `
                    <div class="payment-pill">
                        <span><b>₹${p.amount}</b> on ${p.date}</span>
                        <button onclick="removeCCPayment(${p.id})" class="text-red-500 font-bold ml-2">×</button>
                    </div>
                `;
            });

            // Bills Logic
            let unpaidBills = 0;
            let totalLiabilityAll = totalCC;
            const container = document.getElementById('billContainer');
            container.innerHTML = '';
            bills.forEach((b, i) => {
                totalLiabilityAll += b.amount;
                if(!b.paid) unpaidBills += b.amount;
                container.innerHTML += `
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl bill-row border-${b.color} ${b.paid ? 'paid-row' : ''}">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" ${b.paid ? 'checked' : ''} onchange="togglePaid(${i})" class="w-5 h-5 accent-green-600">
                            <div><p class="font-bold text-sm">${b.name}</p><p class="text-[10px] text-slate-400 font-bold">${getDaysLeft(b.date)}</p></div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-black text-slate-700 text-sm">₹${b.amount.toLocaleString()}</span>
                            <button onclick="removeBill(${b.id})" class="text-red-300">×</button>
                        </div>
                    </div>`;
            });

            const netLiability = unpaidBills + ccBalance;
            const currentEarned = (counts.driving * 4500) + (counts.computer * 500);
            const remaining = Math.max(0, netLiability - currentEarned);

            document.getElementById('totalLiability').innerText = `₹${remaining.toLocaleString()}`;
            
            const rD = Math.ceil(remaining / 4500), rC = Math.ceil(remaining / 500);
            document.getElementById('reqDriving').innerText = remaining > 0 ? rD : 0;
            document.getElementById('reqComp').innerText = remaining > 0 ? rC : 0;
            
            const prog = totalLiabilityAll > 0 ? Math.min(100, (currentEarned / totalLiabilityAll) * 100) : 0;
            document.getElementById('progressBar').style.width = prog + '%';
            document.getElementById('progressText').innerText = Math.round(prog) + '% Covered';
            document.getElementById('aiSolution').innerText = remaining > 0 ? `Target: ₹${remaining.toLocaleString()} via admissions.` : "You're all set!";
        }

        calculate();
    </script>
</body>
</html>
