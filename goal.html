<!DOCTYPE html>
<html lang="en" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaveSmart v3.0 | Predictive Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: rgba(30, 41, 59, 0.5);
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            color: #f8fafc;
            background-image: radial-gradient(circle at top right, #1e293b, #020617);
            min-height: 100vh;
        }
        .glass-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 28px;
        }
        .neo-progress { background: rgba(255,255,255,0.05); border-radius: 12px; height: 12px; overflow: hidden; }
        .neo-bar { height: 100%; background: linear-gradient(90deg, #3b82f6, #4ade80); transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .bill-row { border-left: 4px solid #ef4444; transition: all 0.3s; background: rgba(255,255,255,0.03); }
        .paid-row { border-left-color: #22c55e !important; opacity: 0.4; filter: grayscale(0.5); }
        input { background: rgba(15, 23, 42, 0.8) !important; color: white !important; border: 1px solid #334155 !important; }
        .velocity-badge { background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.2); color: #38bdf8; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-10 flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">Finance <span class="text-sky-400">v3.0</span></h1>
                <p class="text-slate-400 text-sm font-medium">Predictive Velocity Tracking</p>
            </div>
            <div class="text-right">
                <div id="freedomBadge" class="velocity-badge px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider mb-1">Calculating...</div>
                <p id="todayDate" class="text-[10px] text-slate-500 font-bold uppercase"></p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="md:col-span-2 glass-card p-8 neo-shadow flex flex-col justify-center border-b-4 border-sky-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Net Target to Earn</p>
                <h2 id="totalLiability" class="text-6xl font-black text-white mt-2 tracking-tighter">₹0</h2>
                <div class="mt-6 flex gap-4">
                    <div class="bg-white/5 p-3 rounded-2xl flex-1">
                        <p class="text-[10px] text-slate-400 uppercase font-bold">Daily Velocity</p>
                        <p id="dailyVelocity" class="text-lg font-bold text-sky-400">₹0</p>
                    </div>
                    <div class="bg-white/5 p-3 rounded-2xl flex-1">
                        <p class="text-[10px] text-slate-400 uppercase font-bold">Est. Days Left</p>
                        <p id="daysToFreedom" class="text-lg font-bold text-green-400">—</p>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6">
                <h3 class="text-sm font-bold text-slate-300 mb-4">💳 Credit Card (1st)</h3>
                <input type="number" id="ccBill" oninput="calculate()" class="w-full p-4 rounded-2xl outline-none font-bold text-xl mb-4" placeholder="₹ Total Bill">
                <div class="space-y-2 mb-4" id="ccPaymentList"></div>
                <div class="flex gap-2">
                    <input type="number" id="ccPartialInput" placeholder="Add ₹" class="w-full p-2 rounded-xl text-sm">
                    <button onclick="addCCPayment()" class="bg-sky-600 px-4 rounded-xl font-bold text-sm">+</button>
                </div>
            </div>
        </div>

        <div class="glass-card p-8 mb-8 border-l-8 border-green-500">
            <div class="flex justify-between items-end mb-4">
                <h3 class="font-bold text-sm uppercase tracking-widest text-slate-400">Admission Coverage</h3>
                <span id="progressText" class="text-xs font-bold text-green-400">0%</span>
            </div>
            <div class="neo-progress mb-6"><div id="progressBar" class="neo-bar" style="width: 0%"></div></div>
            
            <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                <div class="bg-white/5 p-4 rounded-3xl border border-white/5">
                    <p class="text-slate-500 text-[10px] uppercase font-bold">Driving Goals</p>
                    <div class="text-3xl font-black text-orange-400" id="reqDriving">0</div>
                </div>
                <div class="bg-white/5 p-4 rounded-3xl border border-white/5">
                    <p class="text-slate-500 text-[10px] uppercase font-bold">Computer Goals</p>
                    <div class="text-3xl font-black text-purple-400" id="reqComp">0</div>
                </div>
            </div>
            <p id="aiSolution" class="text-sm text-center text-slate-300 italic"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-card p-6">
                <h3 class="text-lg font-bold mb-4">🔥 Admissions Done</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl">
                        <span class="font-bold text-orange-400">Driving</span>
                        <div class="flex items-center gap-4">
                            <button onclick="updateCount('driving', -1)" class="w-10 h-10 bg-white/10 rounded-full font-bold hover:bg-white/20">-</button>
                            <span id="drivingCount" class="text-2xl font-black">0</span>
                            <button onclick="updateCount('driving', 1)" class="w-10 h-10 bg-orange-500 rounded-full font-bold hover:bg-orange-600">+</button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl">
                        <span class="font-bold text-purple-400">Computer</span>
                        <div class="flex items-center gap-4">
                            <button onclick="updateCount('computer', -1)" class="w-10 h-10 bg-white/10 rounded-full font-bold hover:bg-white/20">-</button>
                            <span id="computerCount" class="text-2xl font-black">0</span>
                            <button onclick="updateCount('computer', 1)" class="w-10 h-10 bg-purple-500 rounded-full font-bold hover:bg-purple-600">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold italic">📅 Fixed Bills</h3>
                    <button onclick="toggleAddBill()" class="text-sky-400 text-xs font-bold">+ Add New</button>
                </div>
                <div id="addBillForm" class="hidden mb-4 p-4 bg-white/5 rounded-2xl border border-white/10">
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input type="text" id="newName" placeholder="Name" class="p-2 rounded-lg text-xs">
                        <input type="number" id="newAmount" placeholder="₹" class="p-2 rounded-lg text-xs">
                    </div>
                    <button onclick="addNewBill()" class="w-full bg-sky-600 p-2 rounded-lg text-xs font-bold">Save Bill</button>
                </div>
                <div id="billContainer" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        let counts = { driving: 0, computer: 0 };
        let bills = JSON.parse(localStorage.getItem('ss_bills_v3')) || [
            { id: 1, name: 'iPhone EMI', amount: 8000, date: 1, paid: false },
            { id: 2, name: 'Android EMI', amount: 5000, date: 1, paid: false },
            { id: 3, name: 'Rent', amount: 7000, date: 1, paid: false },
            { id: 4, name: 'Car', amount: 8500, date: 1, paid: false }
        ];
        let ccPayments = JSON.parse(localStorage.getItem('ss_cc_payments_v3')) || [];

        function addCCPayment() {
            const val = parseFloat(document.getElementById('ccPartialInput').value);
            if(val > 0) {
                ccPayments.push({ id: Date.now(), amount: val, date: new Date().toLocaleDateString('en-IN', {day:'numeric', month:'short'}) });
                localStorage.setItem('ss_cc_payments_v3', JSON.stringify(ccPayments));
                document.getElementById('ccPartialInput').value = '';
                calculate();
            }
        }

        function removeCCPayment(id) {
            ccPayments = ccPayments.filter(p => p.id !== id);
            localStorage.setItem('ss_cc_payments_v3', JSON.stringify(ccPayments));
            calculate();
        }

        function updateCount(t, v) { 
            counts[t] = Math.max(0, counts[t] + v); 
            document.getElementById(t+'Count').innerText = counts[t];
            calculate(); 
        }

        function togglePaid(idx) { 
            bills[idx].paid = !bills[idx].paid; 
            localStorage.setItem('ss_bills_v3', JSON.stringify(bills));
            calculate(); 
        }

        function toggleAddBill() { document.getElementById('addBillForm').classList.toggle('hidden'); }

        function addNewBill() {
            const n = document.getElementById('newName').value, a = document.getElementById('newAmount').value;
            if(n && a) {
                bills.push({ id: Date.now(), name: n, amount: parseFloat(a), date: 1, paid: false });
                localStorage.setItem('ss_bills_v3', JSON.stringify(bills));
                calculate(); toggleAddBill();
            }
        }

        function removeBill(id) {
            bills = bills.filter(b => b.id !== id);
            localStorage.setItem('ss_bills_v3', JSON.stringify(bills));
            calculate();
        }

        function calculate() {
            // Persist CC Main Input
            const ccMain = document.getElementById('ccBill');
            if(ccMain.value) localStorage.setItem('ss_cc_main_v3', ccMain.value);
            else ccMain.value = localStorage.getItem('ss_cc_main_v3') || '';

            const today = new Date();
            document.getElementById('todayDate').innerText = today.toDateString();

            const totalCC = parseFloat(ccMain.value) || 0;
            const totalPaidCC = ccPayments.reduce((s, p) => s + p.amount, 0);
            const ccBalance = Math.max(0, totalCC - totalPaidCC);

            // Render CC Payments
            const ccList = document.getElementById('ccPaymentList');
            ccList.innerHTML = ccPayments.map(p => `
                <div class="flex justify-between text-[10px] bg-white/5 p-2 rounded-lg border border-white/5">
                    <span>₹${p.amount} (${p.date})</span>
                    <button onclick="removeCCPayment(${p.id})" class="text-red-400">×</button>
                </div>
            `).join('');

            // Bills
            let unpaidFixed = 0;
            let totalPossibleLiability = totalCC;
            const billContainer = document.getElementById('billContainer');
            billContainer.innerHTML = '';
            bills.forEach((b, i) => {
                totalPossibleLiability += b.amount;
                if(!b.paid) unpaidFixed += b.amount;
                billContainer.innerHTML += `
                    <div class="flex justify-between items-center p-3 rounded-2xl bill-row ${b.paid ? 'paid-row' : ''}">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" ${b.paid ? 'checked' : ''} onchange="togglePaid(${i})" class="w-5 h-5 accent-green-500">
                            <span class="text-sm font-bold">${b.name}</span>
                        </div>
                        <div class="flex items-center gap-3 text-sm">
                            <span class="font-black">₹${b.amount}</span>
                            <button onclick="removeBill(${b.id})" class="text-slate-500 hover:text-red-500">×</button>
                        </div>
                    </div>`;
            });

            // Velocity & Predictive Logic
            const currentEarned = (counts.driving * 4500) + (counts.computer * 500);
            const remaining = Math.max(0, (unpaidFixed + ccBalance) - 0); // Logic for remaining debt
            const netLiability = (unpaidFixed + ccBalance) - currentEarned;
            const finalRemaining = Math.max(0, netLiability);

            const dayOfMonth = today.getDate();
            const velocity = currentEarned / dayOfMonth;
            const daysLeft = velocity > 0 ? Math.ceil(finalRemaining / velocity) : '—';

            // UI Update
            document.getElementById('totalLiability').innerText = `₹${finalRemaining.toLocaleString()}`;
            document.getElementById('dailyVelocity').innerText = `₹${Math.round(velocity).toLocaleString()}`;
            document.getElementById('daysToFreedom').innerText = finalRemaining > 0 ? `${daysLeft} Days` : '0 Days';
            document.getElementById('freedomBadge').innerText = finalRemaining > 0 ? 'In Debt' : 'Financial Freedom';
            document.getElementById('freedomBadge').className = `velocity-badge px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider mb-1 ${finalRemaining > 0 ? 'text-orange-400 border-orange-400/20 bg-orange-400/10' : 'text-green-400 border-green-400/20 bg-green-400/10'}`;

            document.getElementById('reqDriving').innerText = Math.ceil(finalRemaining / 4500);
            document.getElementById('reqComp').innerText = Math.ceil(finalRemaining / 500);
            
            const prog = totalPossibleLiability > 0 ? Math.min(100, (currentEarned / totalPossibleLiability) * 100) : 0;
            document.getElementById('progressBar').style.width = prog + '%';
            document.getElementById('progressText').innerText = `${Math.round(prog)}% Cleared`;
            document.getElementById('aiSolution').innerHTML = finalRemaining > 0 
                ? `Strategy: Complete <b>${Math.ceil(finalRemaining/4500)}</b> Driving admissions to clear balance.`
                : "All goals met. Next admission is pure profit.";
        }
        calculate();
    </script>
</body>
</html>
