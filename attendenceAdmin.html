<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Admin Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --primary: #6366f1;
            --bg: #030712;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --danger: #f43f5e;
            --warning: #f59e0b;
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 15px; overflow-x: hidden;
        }

        .container { max-width: 450px; margin: 0 auto; }
        
        /* Header & Refresh Styling */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
        }

        .refresh-btn {
            background: var(--card-bg); border: 1px solid var(--border);
            color: #fff; width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .refresh-btn:active { transform: rotate(180deg) scale(0.9); }
        .spinning { animation: spin 0.8s linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Floating Indicator Animation */
        .floating-indicator {
            position: fixed;
            pointer-events: none;
            font-weight: 800;
            font-size: 20px;
            z-index: 10000;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }

        .search-box {
            width: 100%; background: var(--card-bg); border: 1px solid var(--border);
            padding: 14px; border-radius: 12px; color: white; margin-bottom: 20px;
            outline: none; box-sizing: border-box; transition: 0.3s;
        }

        /* Requests Section Styles */
        .section-title { font-size: 14px; font-weight: 800; letter-spacing: 1px; color: var(--warning); margin: 15px 0 10px; display: flex; align-items: center; gap: 6px; }
        
        .request-card {
            background: rgba(245, 158, 11, 0.03); border: 1px dashed rgba(245, 158, 11, 0.2);
            border-radius: 20px; padding: 16px; margin-bottom: 12px;
        }
        .req-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .req-name { font-size: 15px; font-weight: 800; margin: 0; color: #fff; }
        .req-reason { font-size: 12px; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 8px; margin: 8px 0; color: #cbd5e1; border: 1px solid var(--border); }
        .req-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }

        /* Student Card Styles */
        .student-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 24px; padding: 20px; margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .name { font-size: 18px; font-weight: 800; margin: 0; }
        .perc-badge { font-size: 18px; font-weight: 800; }

        .progress-container { 
            width: 100%; height: 8px; background: rgba(255,255,255,0.05); 
            border-radius: 10px; margin: 15px 0; overflow: hidden;
        }
        .progress-fill { height: 100%; border-radius: 10px; transition: 0.8s ease; }

        .controls { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; 
            margin-top: 20px; padding-top: 15px; border-top: 1px dashed var(--border);
        }

        .btn {
            border: none; padding: 12px 5px; border-radius: 14px; 
            font-weight: 800; cursor: pointer; font-size: 12px;
            display: flex; align-items: center; justify-content: center; gap: 5px; color: #fff;
            transition: 0.2s;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2 style="margin:0;">BT Admin</h2>
            <span id="countDisplay" style="font-size: 10px; opacity: 0.5;">SYNCING...</span>
        </div>
        <button class="refresh-btn" id="refreshIcon" onclick="window.manualRefresh()">
            <i class="ri-refresh-line"></i>
        </button>
    </div>

    <div id="requestsContainer" style="display: none;">
        <div class="section-title"><i class="ri-git-pull-request-line"></i> PENDING REQUESTS</div>
        <div id="requestsList"></div>
    </div>

    <div class="section-title" style="color: var(--primary); margin-top: 25px;"><i class="ri-team-line"></i> AGENT ROSTER</div>
    <input type="text" id="search" class="search-box" placeholder="Search agent name..." oninput="window.filterItems()">

    <div id="studentList">
        <p style="text-align:center; opacity:0.5; padding:50px;">Connecting to Terminal...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, getDoc, updateDoc, addDoc, getDocs, query, where, deleteDoc, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let studentsData = [];
    let unsubscribeStudents = null;
    let unsubscribeRequests = null;

    // --- REFRESH LOGIC ---
    window.manualRefresh = () => {
        const icon = document.getElementById("refreshIcon");
        icon.classList.add("spinning");
        if(unsubscribeStudents) unsubscribeStudents();
        if(unsubscribeRequests) unsubscribeRequests();
        startAdminSync();
        setTimeout(() => icon.classList.remove("spinning"), 800);
    };

    // --- FLOATING INDICATOR ENGINE ---
    window.showFloatingText = (e, text, color) => {
        const el = document.createElement("span");
        el.innerText = text;
        el.className = "floating-indicator";
        el.style.left = `${e.clientX}px`;
        el.style.top = `${e.clientY}px`;
        el.style.color = color;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    };

    function startAdminSync() {
        // 1. Sync Requests real-time
        unsubscribeRequests = onSnapshot(collection(db, "attendance_requests"), (snap) => {
            const reqContainer = document.getElementById("requestsContainer");
            const reqList = document.getElementById("requestsList");
            reqList.innerHTML = "";

            if(snap.empty) {
                reqContainer.style.display = "none";
            } else {
                reqContainer.style.display = "block";
                snap.docs.forEach(rDoc => {
                    const rData = rDoc.data();
                    const rId = rDoc.id;
                    
                    const div = document.createElement("div");
                    div.className = "request-card";
                    div.innerHTML = `
                        <div class="req-top">
                            <h4 class="req-name">${rData.studentName}</h4>
                            <span style="font-size:10px; color:var(--warning); font-weight:700;">${rData.date}</span>
                        </div>
                        <div class="req-reason"><strong>Reason:</strong> ${rData.reason}</div>
                        <div class="req-actions">
                            <button class="btn" style="background:var(--success)" onclick="window.processRequest(event, '${rId}', '${rData.studentName}', '${rData.date}', 'accept')"><i class="ri-check-line"></i> Accept</button>
                            <button class="btn" style="background:var(--danger)" onclick="window.processRequest(event, '${rId}', '${rData.studentName}', '${rData.date}', 'reject')"><i class="ri-close-line"></i> Reject</button>
                        </div>
                    `;
                    reqList.appendChild(div);
                });
            }
        });

        // 2. Sync Student Profiles real-time
        unsubscribeStudents = onSnapshot(collection(db, "students"), async (snap) => {
            studentsData = [];
            const listEl = document.getElementById("studentList");
            listEl.innerHTML = "";

            for (const sDoc of snap.docs) {
                const data = sDoc.data();
                const id = sDoc.id;
                const attSnap = await getDocs(query(collection(db, "attendance"), where("userName", "==", id)));
                const count = attSnap.size;

                studentsData.push({ id, ...data, attCount: count });
                renderStudentUI(id, data, count);
            }
            document.getElementById("countDisplay").innerText = `${snap.size} AGENTS REGISTERED`;
        });
    }

    function renderStudentUI(id, data, count) {
        // Direct conversion bina kisi multiplier (* 30) ke
        const totalDays = parseInt(data.courseDuration) || 365; 
        const perc = Math.min(Math.round((count / totalDays) * 100), 100);
        const color = perc < 70 ? 'var(--danger)' : (perc < 85 ? 'var(--warning)' : 'var(--success)');

        const card = document.createElement("div");
        card.className = "student-card";
        card.innerHTML = `
            <div class="card-top">
                <div><h3 class="name">${id}</h3><p style="font-size:10px; opacity:0.4; margin:0;">${data.currentCourse || 'N/A'}</p></div>
                <div class="perc-badge" style="color:${color}">${perc}%</div>
            </div>
            <div class="progress-container"><div class="progress-fill" style="width:${perc}%; background:${color}"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:700; opacity:0.7;">
                <span>DAYS: ${count} / ${totalDays}</span>
                <span>XP: ${data.xp || 0}</span>
            </div>
            <div class="controls">
                <button class="btn" style="background:var(--success)" onclick="window.updateTotalDays(event, '${id}')"><i class="ri-calendar-event-line"></i> Update Total Days</button>
                <button class="btn" style="background:var(--primary)" onclick="window.handleXP(event, '${id}')"><i class="ri-flashlight-fill"></i> Update XP</button>
            </div>
        `;
        document.getElementById("studentList").appendChild(card);
    }

    // --- REQUEST PROCESS ENGINE ---
    window.processRequest = async (e, reqId, studentName, dateStr, decision) => {
        const targetBtn = e.currentTarget;
        targetBtn.disabled = true;

        try {
            if (decision === 'accept') {
                window.showFloatingText(e, "Approved", "var(--success)");
                
                await setDoc(doc(db, "attendance", `${studentName}_${dateStr}`), { 
                    studentName: studentName, 
                    userName: studentName, 
                    date: dateStr, 
                    timestamp: serverTimestamp() 
                });

                const sRef = doc(db, "students", studentName);
                const sSnap = await getDoc(sRef);
                let newStreak = 1;
                
                if (sSnap.exists()) {
                    const d = sSnap.data();
                    const last = d.lastAttendanceDate;
                    if (last) {
                        const t = new Date(dateStr);
                        const lDate = new Date(last);
                        const yest = new Date(t);
                        yest.setDate(t.getDate() - 1);
                        
                        if (lDate.toDateString() === yest.toDateString()) newStreak = (d.streak || 0) + 1;
                        else if (lDate.toDateString() === t.toDateString()) newStreak = d.streak;
                    }
                    await updateDoc(sRef, { streak: newStreak, lastAttendanceDate: dateStr });
                }
            } else {
                window.showFloatingText(e, "Rejected", "var(--danger)");
            }

            await deleteDoc(doc(db, "attendance_requests", reqId));

        } catch (err) {
            alert("Error processing request!");
            targetBtn.disabled = false;
        }
    };

    // --- DIRECTLY UPDATE TOTAL DAYS FIELD ---
    window.updateTotalDays = async (e, id) => {
        const currentStudent = studentsData.find(s => s.id === id);
        const currentTotalDays = currentStudent ? (parseInt(currentStudent.courseDuration) || 365) : 365;
        
        const newTotalDaysInput = prompt(`Agent: ${id}\nCurrent Total Days Target: ${currentTotalDays}\nEnter NEW Target Total Days:`, currentTotalDays);
        if (newTotalDaysInput === null || newTotalDaysInput === "") return;
        
        const targetDaysValue = parseInt(newTotalDaysInput);
        if (isNaN(targetDaysValue) || targetDaysValue <= 0) {
            alert("Invalid entry! Please enter a number greater than 0.");
            return;
        }

        try {
            window.showFloatingText(e, "Saving Days...", "var(--warning)");
            await updateDoc(doc(db, "students", id), { courseDuration: targetDaysValue });
            window.showFloatingText(e, `Total Days: ${targetDaysValue}`, "var(--success)");
        } catch (err) {
            console.error("Total Days update failed: ", err);
            alert("Database write error while updating Total Days.");
        }
    };

    // --- DIRECTLY UPDATE TOTAL XP FIELD ---
    window.handleXP = async (e, id) => {
        const currentStudent = studentsData.find(s => s.id === id);
        const currentXP = currentStudent ? (currentStudent.xp || 0) : 0;
        
        const newXPInput = prompt(`Agent: ${id}\nCurrent XP: ${currentXP}\nEnter NEW Total XP:`, currentXP);
        if (newXPInput === null || newXPInput === "") return;
        
        const targetXPValue = parseInt(newXPInput);
        if (isNaN(targetXPValue) || targetXPValue < 0) {
            alert("Invalid entry! Please enter a valid number.");
            return;
        }

        try {
            window.showFloatingText(e, "Saving XP...", "var(--warning)");
            await updateDoc(doc(db, "students", id), { xp: targetXPValue });
            window.showFloatingText(e, `XP Set to ${targetXPValue}`, "var(--success)");
        } catch (err) {
            console.error("XP update failed: ", err);
            alert("Database write error while updating XP.");
        }
    };

    window.filterItems = () => {
        const term = document.getElementById("search").value.toLowerCase();
        document.getElementById("studentList").innerHTML = "";
        studentsData.filter(s => s.id.toLowerCase().includes(term)).forEach(s => renderStudentUI(s.id, s, s.attCount));
    };

    startAdminSync();
</script>
</body>
</html>
