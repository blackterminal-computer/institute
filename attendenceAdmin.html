<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Admin Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --primary: #6366f1;
            --bg: #030712;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --danger: #f43f5e;
            --warning: #f59e0b;
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 15px; overflow-x: hidden;
        }

        .container { max-width: 450px; margin: 0 auto; }
        
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
        }

        .refresh-btn {
            background: var(--card-bg); border: 1px solid var(--border);
            color: #fff; width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .refresh-btn:active { transform: rotate(180deg) scale(0.9); }
        .spinning { animation: spin 0.8s linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .floating-indicator {
            position: fixed; pointer-events: none; font-weight: 800; font-size: 20px; z-index: 10000;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }

        .search-box {
            width: 100%; background: var(--card-bg); border: 1px solid var(--border);
            padding: 14px; border-radius: 12px; color: white; margin-bottom: 20px;
            outline: none; box-sizing: border-box; transition: 0.3s;
        }

        .section-title { font-size: 14px; font-weight: 800; letter-spacing: 1px; color: var(--warning); margin: 15px 0 10px; display: flex; align-items: center; gap: 6px; }
        
        .request-card {
            background: rgba(245, 158, 11, 0.03); border: 1px dashed rgba(245, 158, 11, 0.2);
            border-radius: 20px; padding: 16px; margin-bottom: 12px;
        }
        .req-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .req-name { font-size: 15px; font-weight: 800; margin: 0; color: #fff; }
        .req-reason { font-size: 12px; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 8px; margin: 8px 0; color: #cbd5e1; border: 1px solid var(--border); }
        .req-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }

        .student-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 24px; padding: 20px; margin-bottom: 16px; backdrop-filter: blur(10px);
        }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .name { font-size: 18px; font-weight: 800; margin: 0; }
        .perc-badge { font-size: 18px; font-weight: 800; }

        .progress-container { 
            width: 100%; height: 8px; background: rgba(255,255,255,0.05); 
            border-radius: 10px; margin: 15px 0; overflow: hidden;
        }
        .progress-fill { height: 100%; border-radius: 10px; transition: 0.8s ease; }

        .controls { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border);
        }

        .btn {
            border: none; padding: 12px 5px; border-radius: 14px; 
            font-weight: 800; cursor: pointer; font-size: 11px;
            display: flex; align-items: center; justify-content: center; gap: 5px; color: #fff;
            transition: 0.2s;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2 style="margin:0;">BT Admin</h2>
            <span id="countDisplay" style="font-size: 10px; opacity: 0.5;">SYNCING...</span>
        </div>
        <button class="refresh-btn" id="refreshIcon" onclick="window.manualRefresh()">
            <i class="ri-refresh-line"></i>
        </button>
    </div>

    <div id="requestsContainer" style="display: none;">
        <div class="section-title"><i class="ri-git-pull-request-line"></i> PENDING REQUESTS</div>
        <div id="requestsList"></div>
    </div>

    <div class="section-title" style="color: var(--primary); margin-top: 25px;"><i class="ri-team-line"></i> AGENT ROSTER</div>
    <input type="text" id="search" class="search-box" placeholder="Search agent name..." oninput="window.filterItems()">

    <div id="studentList">
        <p style="text-align:center; opacity:0.5; padding:50px;">Connecting to Terminal...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, getDoc, updateDoc, getDocs, query, where, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let studentsData = [];
    let unsubscribeStudents = null;
    let unsubscribeRequests = null;

    window.manualRefresh = () => {
        const icon = document.getElementById("refreshIcon");
        icon.classList.add("spinning");
        if(unsubscribeStudents) unsubscribeStudents();
        if(unsubscribeRequests) unsubscribeRequests();
        startAdminSync();
        setTimeout(() => icon.classList.remove("spinning"), 800);
    };

    window.showFloatingText = (clientX, clientY, text, color) => {
        const el = document.createElement("span");
        el.innerText = text; el.className = "floating-indicator";
        el.style.left = `${clientX}px`; el.style.top = `${clientY}px`; el.style.color = color;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    };

    function startAdminSync() {
        unsubscribeRequests = onSnapshot(collection(db, "attendance_requests"), (snap) => {
            const reqContainer = document.getElementById("requestsContainer");
            const reqList = document.getElementById("requestsList");
            reqList.innerHTML = "";

            if(snap.empty) {
                reqContainer.style.display = "none";
            } else {
                reqContainer.style.display = "block";
                snap.docs.forEach(rDoc => {
                    const rData = rDoc.data(); const rId = rDoc.id;
                    const div = document.createElement("div");
                    div.className = "request-card";
                    div.innerHTML = `
                        <div class="req-top">
                            <h4 class="req-name">${rData.studentName}</h4>
                            <span style="font-size:10px; color:var(--warning); font-weight:700;">${rData.date}</span>
                        </div>
                        <div class="req-reason"><strong>Reason:</strong> ${rData.reason}</div>
                        <div class="req-actions">
                            <button class="btn" style="background:var(--success)" onclick="window.processRequest(event, '${rId}', '${rData.studentName}', '${rData.date}', 'accept')"><i class="ri-check-line"></i> Accept</button>
                            <button class="btn" style="background:var(--danger)" onclick="window.processRequest(event, '${rId}', '${rData.studentName}', '${rData.date}', 'reject')"><i class="ri-close-line"></i> Reject</button>
                        </div>
                    `;
                    reqList.appendChild(div);
                });
            }
        });

        unsubscribeStudents = onSnapshot(collection(db, "students"), async (snap) => {
            document.getElementById("countDisplay").innerText = `${snap.size} AGENTS REGISTERED`;
            
            const fetchPromises = snap.docs.map(async (sDoc) => {
                const data = sDoc.data(); const id = sDoc.id;
                const attSnap = await getDocs(query(collection(db, "attendance"), where("userName", "==", id)));
                return { id, ...data, attCount: attSnap.size };
            });

            studentsData = await Promise.all(fetchPromises);
            renderFilteredUI();
        });
    }

    function renderFilteredUI() {
        const listEl = document.getElementById("studentList");
        listEl.innerHTML = "";
        const term = document.getElementById("search").value.toLowerCase();
        
        const filtered = studentsData.filter(s => s.id.toLowerCase().includes(term));
        if(filtered.length === 0) {
            listEl.innerHTML = `<p style="text-align:center; opacity:0.5; padding:50px;">No matching records found.</p>`;
            return;
        }

        filtered.forEach(student => {
            const totalDays = parseInt(student.courseDuration) || 365; 
            const perc = Math.min(Math.round((student.attCount / totalDays) * 100), 100);
            const color = perc < 70 ? 'var(--danger)' : (perc < 85 ? 'var(--warning)' : 'var(--success)');
            const totalPaid = student.totalPaidAmount || 0;

            const card = document.createElement("div");
            card.className = "student-card";
            card.innerHTML = `
                <div class="card-top">
                    <div><h3 class="name">${student.id}</h3><p style="font-size:10px; opacity:0.4; margin:0;">${student.currentCourse || 'N/A'}</p></div>
                    <div class="perc-badge" style="color:${color}">${perc}%</div>
                </div>
                <div class="progress-container"><div class="progress-fill" style="width:${perc}%; background:${color}"></div></div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; font-size:11px; font-weight:700; opacity:0.8;">
                    <div>DAYS: <span style="color:#fff" id="days-${student.id}">${student.attCount} / ${totalDays}</span></div>
                    <div style="text-align:right;">XP: <span style="color:#fff">${student.xp || 0}</span></div>
                    <div style="grid-column: span 2; margin-top:4px; color:var(--success);">PAID AMOUNT: ₹${totalPaid}</div>
                </div>

                <div class="controls" style="grid-template-columns: 1fr 1fr;">
                    <button class="btn" style="background:var(--success); grid-column: span 2; padding: 14px;" onclick="window.directAttendance(event, '${student.id}')"><i class="ri-checkbox-circle-fill"></i> Add Attendance</button>
                    <button class="btn" style="background:var(--success)" onclick="window.updateTotalDays(event, '${student.id}')"><i class="ri-calendar-event-line"></i> Total Days</button>
                    <button class="btn" style="background:var(--primary)" onclick="window.handleXP(event, '${student.id}')"><i class="ri-flashlight-fill"></i> Update XP</button>
                    <button class="btn" style="background:var(--warning); color:#000;" onclick="window.updatePaidAmount(event, '${student.id}')"><i class="ri-money-dollar-circle-line"></i> Update Paid</button>
                    <button class="btn" style="background:var(--danger)" onclick="window.deleteStudent('${student.id}')"><i class="ri-delete-bin-6-line"></i> Delete Agent</button>
                </div>
            `;
            listEl.appendChild(card);
        });
    }

    window.processRequest = async (e, reqId, studentName, dateStr, decision) => {
        const targetBtn = e.currentTarget; targetBtn.disabled = true;
        try {
            if (decision === 'accept') {
                window.showFloatingText(e.clientX, e.clientY, "Approved", "var(--success)");
                await setDoc(doc(db, "attendance", `${studentName}_${dateStr}`), { 
                    studentName: studentName, userName: studentName, date: dateStr, timestamp: serverTimestamp() 
                });

                const sRef = doc(db, "students", studentName); const sSnap = await getDoc(sRef);
                let newStreak = 1;
                if (sSnap.exists()) {
                    const d = sSnap.data(); const last = d.lastAttendanceDate;
                    if (last) {
                        const t = new Date(dateStr); const lDate = new Date(last);
                        const yest = new Date(t); yest.setDate(t.getDate() - 1);
                        if (lDate.toDateString() === yest.toDateString()) newStreak = (d.streak || 0) + 1;
                        else if (lDate.toDateString() === t.toDateString()) newStreak = d.streak;
                    }
                    await updateDoc(sRef, { streak: newStreak, lastAttendanceDate: dateStr });
                }
                
                // Real-time counter increments locally
                const student = studentsData.find(s => s.id === studentName);
                if(student) {
                    student.attCount += 1;
                    renderFilteredUI();
                }
            } else { window.showFloatingText(e.clientX, e.clientY, "Rejected", "var(--danger)"); }
            await deleteDoc(doc(db, "attendance_requests", reqId));
        } catch (err) { alert("Error processing request!"); targetBtn.disabled = false; }
    };

    window.directAttendance = async (e, id) => {
        if(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        const todayStr = new Date().toISOString().split('T')[0];
        const dateInput = prompt(`Add Direct Attendance for Agent: ${id}\nEnter Date (YYYY-MM-DD):`, todayStr);
        if (!dateInput) return;

        const dateRegex = /^\d{4}-\d{2}-\d{2}$/;
        if (!dateRegex.test(dateInput)) return alert("Invalid date format! Use YYYY-MM-DD.");

        const targetBtn = e ? e.currentTarget : null;
        if(targetBtn) targetBtn.disabled = true;

        try {
            if(e) window.showFloatingText(e.clientX, e.clientY, "Marking...", "var(--warning)");
            
            // 1. Database insertion
            await setDoc(doc(db, "attendance", `${id}_${dateInput}`), { 
                studentName: id, userName: id, date: dateInput, timestamp: serverTimestamp() 
            });

            const sRef = doc(db, "students", id); 
            const sSnap = await getDoc(sRef);
            let newStreak = 1;
            
            if (sSnap.exists()) {
                const d = sSnap.data(); 
                const last = d.lastAttendanceDate;
                if (last) {
                    const t = new Date(dateInput); 
                    const lDate = new Date(last);
                    const yest = new Date(t); 
                    yest.setDate(t.getDate() - 1);
                    if (lDate.toDateString() === yest.toDateString()) newStreak = (d.streak || 0) + 1;
                    else if (lDate.toDateString() === t.toDateString()) newStreak = d.streak;
                }
                await updateDoc(sRef, { streak: newStreak, lastAttendanceDate: dateInput });
            }

            // 2. CRITICAL FIX: Update local data array and trigger immediate UI re-render
            const targetStudent = studentsData.find(s => s.id === id);
            if (targetStudent) {
                targetStudent.attCount = (targetStudent.attCount || 0) + 1;
                renderFilteredUI(); // Instant update numbers and progress bars!
            }

            if(e) window.showFloatingText(e.clientX, e.clientY, "Present Marked!", "var(--success)");
        } catch (err) { 
            console.error(err);
            alert("Database Error marking attendance!"); 
        } finally {
            if(targetBtn) targetBtn.disabled = false;
        }
    };

    window.updateTotalDays = async (e, id) => {
        const currentStudent = studentsData.find(s => s.id === id);
        const currentTotalDays = currentStudent ? (parseInt(currentStudent.courseDuration) || 365) : 365;
        const newTotalDaysInput = prompt(`Agent: ${id}\nCurrent Days: ${currentTotalDays}\nEnter NEW Days Target:`, currentTotalDays);
        if (!newTotalDaysInput) return;
        const targetDaysValue = parseInt(newTotalDaysInput);
        if (isNaN(targetDaysValue) || targetDaysValue <= 0) return alert("Invalid Input!");

        try {
            window.showFloatingText(e.clientX, e.clientY, "Saving...", "var(--warning)");
            await updateDoc(doc(db, "students", id), { courseDuration: targetDaysValue });
            
            if(currentStudent) {
                currentStudent.courseDuration = targetDaysValue;
                renderFilteredUI();
            }
            window.showFloatingText(e.clientX, e.clientY, `Saved!`, "var(--success)");
        } catch (err) { alert("Database error!"); }
    };

    window.handleXP = async (e, id) => {
        const currentStudent = studentsData.find(s => s.id === id);
        const currentXP = currentStudent ? (currentStudent.xp || 0) : 0;
        const newXPInput = prompt(`Agent: ${id}\nCurrent XP: ${currentXP}\nEnter NEW Total XP:`, currentXP);
        if (newXPInput === null || newXPInput === "") return;
        const targetXPValue = parseInt(newXPInput);
        if (isNaN(targetXPValue) || targetXPValue < 0) return alert("Invalid Input!");

        try {
            window.showFloatingText(e.clientX, e.clientY, "Saving...", "var(--warning)");
            await updateDoc(doc(db, "students", id), { xp: targetXPValue });
            
            if(currentStudent) {
                currentStudent.xp = targetXPValue;
                renderFilteredUI();
            }
            window.showFloatingText(e.clientX, e.clientY, `XP Updated`, "var(--success)");
        } catch (err) { alert("Database error!"); }
    };

    window.updatePaidAmount = async (e, id) => {
        const currentStudent = studentsData.find(s => s.id === id);
        const currentPaid = currentStudent ? (currentStudent.totalPaidAmount || 0) : 0;
        const newPaidInput = prompt(`Agent: ${id}\nCurrent Total Paid: ₹${currentPaid}\nEnter NEW Total Paid Amount (₹):`, currentPaid);
        if (newPaidInput === null || newPaidInput === "") return;
        const targetPaidValue = parseInt(newPaidInput);
        if (isNaN(targetPaidValue) || targetPaidValue < 0) return alert("Invalid Amount!");

        try {
            window.showFloatingText(e.clientX, e.clientY, "Updating Balance...", "var(--warning)");
            await updateDoc(doc(db, "students", id), { totalPaidAmount: targetPaidValue });
            
            if(currentStudent) {
                currentStudent.totalPaidAmount = targetPaidValue;
                renderFilteredUI();
            }
            window.showFloatingText(e.clientX, e.clientY, `₹${targetPaidValue} Saved`, "var(--success)");
        } catch (err) { alert("Database write error!"); }
    };

    window.deleteStudent = async (id) => {
        const confirmation = confirm(`🚨 CRITICAL ACTION!\nAre you completely sure you want to permanently delete Agent "${id}" from Black Terminal? This cannot be undone.`);
        if (!confirmation) return;
        
        try {
            await deleteDoc(doc(db, "students", id));
            alert(`Agent "${id}" successfully terminated.`);
        } catch (err) { alert("Error trying to delete student document."); }
    };

    window.filterItems = () => {
        renderFilteredUI();
    };

    startAdminSync();
</script>
</body>
</html>
