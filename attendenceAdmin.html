<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Admin Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --primary: #6366f1;
            --bg: #030712;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --danger: #f43f5e;
            --warning: #f59e0b;
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 15px; overflow-x: hidden;
        }

        .container { max-width: 450px; margin: 0 auto; }
        
        /* Header & Refresh Styling */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
        }

        .refresh-btn {
            background: var(--card-bg); border: 1px solid var(--border);
            color: #fff; width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .refresh-btn:active { transform: rotate(180deg) scale(0.9); }
        .spinning { animation: spin 0.8s linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Floating Indicator Animation */
        .floating-indicator {
            position: fixed;
            pointer-events: none;
            font-weight: 800;
            font-size: 20px;
            z-index: 10000;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }

        .search-box {
            width: 100%; background: var(--card-bg); border: 1px solid var(--border);
            padding: 14px; border-radius: 12px; color: white; margin-bottom: 20px;
            outline: none; box-sizing: border-box; transition: 0.3s;
        }

        .student-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 24px; padding: 20px; margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .name { font-size: 18px; font-weight: 800; margin: 0; }
        .perc-badge { font-size: 18px; font-weight: 800; }

        .progress-container { 
            width: 100%; height: 8px; background: rgba(255,255,255,0.05); 
            border-radius: 10px; margin: 15px 0; overflow: hidden;
        }
        .progress-fill { height: 100%; border-radius: 10px; transition: 0.8s ease; }

        .controls { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            margin-top: 20px; padding-top: 15px; border-top: 1px dashed var(--border);
        }

        .btn {
            border: none; padding: 12px 5px; border-radius: 14px; 
            font-weight: 800; cursor: pointer; font-size: 11px;
            display: flex; align-items: center; justify-content: center; gap: 5px; color: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2 style="margin:0;">BT Admin</h2>
            <span id="countDisplay" style="font-size: 10px; opacity: 0.5;">SYNCING...</span>
        </div>
        <button class="refresh-btn" id="refreshIcon" onclick="window.manualRefresh()">
            <i class="ri-refresh-line"></i>
        </button>
    </div>

    <input type="text" id="search" class="search-box" placeholder="Search agent name..." oninput="window.filterItems()">

    <div id="studentList">
        <p style="text-align:center; opacity:0.5; padding:50px;">Connecting to Terminal...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, getDocs, query, where, deleteDoc, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let studentsData = [];
    let unsubscribe = null;

    // --- REFRESH LOGIC ---
    window.manualRefresh = () => {
        const icon = document.getElementById("refreshIcon");
        icon.classList.add("spinning");
        if(unsubscribe) unsubscribe();
        startAdminSync();
        setTimeout(() => icon.classList.remove("spinning"), 800);
    };

    // --- FLOATING INDICATOR ENGINE ---
    window.showFloatingText = (e, text, color) => {
        const el = document.createElement("span");
        el.innerText = text;
        el.className = "floating-indicator";
        el.style.left = `${e.clientX}px`;
        el.style.top = `${e.clientY}px`;
        el.style.color = color;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    };

    function startAdminSync() {
        unsubscribe = onSnapshot(collection(db, "students"), async (snap) => {
            studentsData = [];
            const listEl = document.getElementById("studentList");
            listEl.innerHTML = "";

            for (const sDoc of snap.docs) {
                const data = sDoc.data();
                const id = sDoc.id;
                const attSnap = await getDocs(query(collection(db, "attendance"), where("userName", "==", id)));
                const count = attSnap.size;

                studentsData.push({ id, ...data, attCount: count });
                renderStudentUI(id, data, count);
            }
            document.getElementById("countDisplay").innerText = `${snap.size} AGENTS REGISTERED`;
        });
    }

    function renderStudentUI(id, data, count) {
        const totalDays = (parseInt(data.courseDuration) || 1) * 30;
        const perc = Math.min(Math.round((count / totalDays) * 100), 100);
        const color = perc < 70 ? 'var(--danger)' : (perc < 85 ? 'var(--warning)' : 'var(--success)');

        const card = document.createElement("div");
        card.className = "student-card";
        card.innerHTML = `
            <div class="card-top">
                <div><h3 class="name">${id}</h3><p style="font-size:10px; opacity:0.4; margin:0;">${data.currentCourse || 'N/A'}</p></div>
                <div class="perc-badge" style="color:${color}">${perc}%</div>
            </div>
            <div class="progress-container"><div class="progress-fill" style="width:${perc}%; background:${color}"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:700; opacity:0.7;">
                <span>DAYS: ${count} / ${totalDays}</span>
                <span>XP: ${data.xp || 0}</span>
            </div>
            <div class="controls">
                <button class="btn" style="background:var(--success)" onclick="window.handleAtt(event, '${id}', 'plus')"><i class="ri-add-line"></i> Present</button>
                <button class="btn" style="background:var(--danger)" onclick="window.handleAtt(event, '${id}', 'minus')"><i class="ri-subtract-line"></i> Absent</button>
                <button class="btn" style="background:var(--primary)" onclick="window.handleXP('${id}')"><i class="ri-flashlight-fill"></i> XP</button>
            </div>
        `;
        document.getElementById("studentList").appendChild(card);
    }

    window.handleAtt = async (e, name, mode) => {
        if (mode === 'plus') {
            window.showFloatingText(e, "+1 Day", "var(--success)");
            await addDoc(collection(db, "attendance"), { userName: name, timestamp: Date.now() });
        } else {
            window.showFloatingText(e, "-1 Day", "var(--danger)");
            const q = query(collection(db, "attendance"), where("userName", "==", name), limit(1));
            const snap = await getDocs(q);
            if (!snap.empty) await deleteDoc(doc(db, "attendance", snap.docs[0].id));
        }
    };

    window.handleXP = async (id) => {
        const amount = prompt("Enter XP:");
        if (!amount) return;
        const currentXP = studentsData.find(s => s.id === id).xp || 0;
        await updateDoc(doc(db, "students", id), { xp: parseInt(currentXP) + parseInt(amount) });
    };

    window.filterItems = () => {
        const term = document.getElementById("search").value.toLowerCase();
        document.getElementById("studentList").innerHTML = "";
        studentsData.filter(s => s.id.toLowerCase().includes(term)).forEach(s => renderStudentUI(s.id, s, s.attCount));
    };

    startAdminSync();
</script>
</body>
</html>
