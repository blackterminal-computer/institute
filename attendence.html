<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #06b6d4; --bg: #020617; --card: #0f172a; --glass: rgba(255, 255, 255, 0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .att-container { width: 100%; max-width: 400px; background: var(--card); padding: 40px 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .loc-icon { width: 80px; height: 80px; background: rgba(99, 102, 241, 0.1); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; border: 2px dashed var(--primary); }
        .status-box { background: var(--glass); padding: 15px; border-radius: 18px; margin-bottom: 25px; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #checkin-btn { width: 100%; padding: 18px; border: none; border-radius: 18px; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; font-weight: 800; cursor: pointer; transition: 0.3s; }
        #checkin-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="att-container">
        <div class="loc-icon"><i class="ri-map-pin-user-fill"></i></div>
        <h2>Smart Attendance</h2>
        <div id="status" class="status-box"><i class="ri-loader-4-line ri-spin"></i> Verifying Location...</div>
        <button id="checkin-btn" onclick="markAttendance()" disabled>MARK ATTENDANCE <i class="ri-fingerprint-line"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI", authDomain: "black-terminal-f2c91.firebaseapp.com", projectId: "black-terminal-f2c91", storageBucket: "black-terminal-f2c91.appspot.com", messagingSenderId: "552489994197", appId: "1:552489994197:web:7662331264c334ffbadf5c" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        const student = localStorage.getItem('studentName');
        const btn = document.getElementById('checkin-btn');
        const statusBox = document.getElementById('status');

        window.markAttendance = async () => {
            btn.disabled = true; btn.innerHTML = 'Processing...';
            const tStr = new Date().toISOString().split('T')[0];
            try {
                const sRef = doc(db, "students", student);
                const attRef = doc(db, "attendance", `${student}_${tStr}`);
                
                // Attendance Record + XP + Streak
                await setDoc(attRef, { studentName: student, date: tStr, timestamp: serverTimestamp() });
                await updateDoc(sRef, { xp: increment(100), lastAttendanceDate: tStr });
                await addDoc(collection(db, "shoutouts"), {
                    user: "SYSTEM", text: `✨ ${student} marked attendance & earned 100 XP!`,
                    avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=system", time: Date.now()
                });
                location.href = "index.html";
            } catch(e) { alert("Error!"); btn.disabled = false; }
        };
        // (Add location logic here as before)
    </script>
</body>
</html>
