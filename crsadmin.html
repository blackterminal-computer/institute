<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT Admin | Command Center</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; --accent: #06b6d4; --danger: #f43f5e; 
            --bg: #030712; --card: rgba(255,255,255,0.03); --success: #10b981; --gold: #facc15;
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #f8fafc; 
            background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 40%);
            min-height: 100vh; padding-bottom: 100px;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .admin-profile { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--accent); }

        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); border: 1px solid var(--glass-border); padding: 20px; border-radius: 28px; backdrop-filter: blur(10px); }
        .stat-card i { font-size: 24px; color: var(--accent); margin-bottom: 10px; display: block; }
        .stat-card h2 { font-size: 24px; font-weight: 800; }
        .stat-card p { font-size: 10px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .tab-nav { 
            background: rgba(255,255,255,0.02); padding: 8px; border-radius: 24px; 
            display: flex; gap: 5px; border: 1px solid var(--glass-border); margin-bottom: 30px;
            position: sticky; top: 15px; z-index: 1000; backdrop-filter: blur(20px);
        }
        .tab-link { flex: 1; border: none; background: none; color: #64748b; padding: 12px; border-radius: 18px; font-size: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tab-link i { font-size: 20px; }
        .tab-link.active { background: white; color: black; box-shadow: 0 10px 25px rgba(255,255,255,0.1); }

        .panel-section { display: none; animation: fadeIn 0.5s ease; }
        .panel-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-form { background: var(--card); border: 1px solid var(--glass-border); padding: 25px; border-radius: 35px; margin-bottom: 20px; }
        .input-box { margin-bottom: 20px; }
        .input-box label { display: block; font-size: 10px; font-weight: 800; color: var(--accent); margin-bottom: 8px; letter-spacing: 1px; padding-left: 5px; }
        .input-box input, .input-box select, .input-box textarea { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid #334155; padding: 16px; border-radius: 18px; color: white; outline: none; transition: 0.3s; font-size: 14px; }

        .btn-glow { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            color: white; font-weight: 800; font-size: 15px; cursor: pointer;
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
        }

        .live-item { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); padding: 15px; border-radius: 24px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; position: relative; }
        .live-img { width: 50px; height: 50px; background: #1e293b; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .live-img img { width: 100%; height: 100%; object-fit: cover; }
        .live-info { flex: 1; }
        .live-info h4 { font-size: 14px; font-weight: 800; margin-bottom: 2px; }
        .action-btns { display: flex; gap: 8px; }
        .action-btn { width: 35px; height: 35px; border-radius: 10px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
        .edit-btn { background: rgba(6, 182, 212, 0.1); color: var(--accent); }
        .del-btn { background: rgba(244, 63, 94, 0.1); color: var(--danger); }
        .wa-btn { background: rgba(37, 211, 102, 0.1); color: #25d366; }

        .order-badge { position: absolute; top: -5px; left: -5px; background: var(--primary); color: white; font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 800; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="admin-profile">
            <div class="avatar"><i class="ri-shield-user-line"></i></div>
            <div>
                <h3 style="font-size: 16px; font-weight: 800; letter-spacing: 1px;">BT COMMAND</h3>
                <p style="font-size: 10px; color: var(--success); font-weight: 800;">● SYSTEM ROOT ACCESS</p>
            </div>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;"><i class="ri-refresh-line"></i></button>
    </header>

    <div class="grid-stats">
        <div class="stat-card">
            <i class="ri-book-open-line"></i>
            <h2 id="total-courses">0</h2>
            <p>Live Courses</p>
        </div>
        <div class="stat-card">
            <i class="ri-user-follow-line"></i>
            <h2 id="total-refers">0</h2>
            <p>Total Refers</p>
        </div>
    </div>

    <nav class="tab-nav">
        <button class="tab-link active" onclick="showTab('add', this)"><i class="ri-add-circle-line"></i>Add</button>
        <button class="tab-link" onclick="showTab('live', this)"><i class="ri-broadcast-line"></i>Live</button>
        <button class="tab-link" onclick="showTab('refer', this)"><i class="ri-hand-coin-line"></i>Refer</button>
        <button class="tab-link" onclick="showTab('settings', this)"><i class="ri-settings-5-line"></i>Panel</button>
    </nav>

    <div id="add" class="panel-section active">
        <div class="card-form">
            <h3 id="form-title" style="margin-bottom: 20px;"><i class="ri-rocket-fill" style="color:var(--primary)"></i> Deploy Program</h3>
            <input type="hidden" id="edit-id">
            
            <div class="grid-stats" style="margin-bottom:20px">
                <div class="input-box" style="margin-bottom:0">
                    <label>COURSE NAME</label>
                    <input type="text" id="c-name" placeholder="e.g. Cyber Security">
                </div>
                <div class="input-box" style="margin-bottom:0">
                    <label>ORDER (INDEX)</label>
                    <input type="number" id="c-order" placeholder="1" value="1">
                </div>
            </div>

            <div class="input-box">
                <label>COURSE IMAGE URL (Comma for Multi-Image)</label>
                <input type="text" id="c-img" placeholder="link1.jpg, link2.jpg">
            </div>
            <div class="input-box">
                <label>YOUTUBE PREVIEW LINK</label>
                <input type="text" id="c-yt" placeholder="https://youtube.com/watch?v=...">
            </div>
            <div class="grid-stats" style="margin-bottom:0">
                <div class="input-box">
                    <label>OLD PRICE</label>
                    <input type="number" id="c-old" placeholder="2999">
                </div>
                <div class="input-box">
                    <label>OFFER PRICE</label>
                    <input type="number" id="c-new" placeholder="499">
                </div>
            </div>

            <div class="input-box">
                <label>COURSE DURATION</label>
                <input type="text" id="c-duration" placeholder="e.g. 6 Months / Lifetime">
            </div>

            <div class="input-box">
                <label>OFFER ENDS AT (TIMER)</label>
                <input type="datetime-local" id="c-timer">
            </div>
            <div class="input-box">
                <label>CHOOSE ULTRA MODERN BADGE</label>
                <select id="c-tag">
                    <option value="">No Badge</option>
                    <option value="HOT">🔥 HOT SELLING</option>
                    <option value="NEW">✨ NEWLY ADDED</option>
                    <option value="TRENDING">📈 TRENDING</option>
                    <option value="FREE">🎁 FREE COURSE</option>
                </select>
            </div>
            <button class="btn-glow" id="submit-btn" onclick="addOrUpdateCourse()">DEPLOY TO TERMINAL</button>
            <button id="cancel-edit" onclick="resetForm()" style="display:none; width: 100%; background: none; border: none; color: #94a3b8; margin-top: 15px; font-weight: 700; cursor:pointer;">Cancel Edit</button>
        </div>
    </div>

    <div id="live" class="panel-section">
        <div id="live-list"></div>
    </div>

    <div id="refer" class="panel-section">
        <div class="card-form">
            <h3><i class="ri-gift-2-line"></i> Referral Rewards</h3>
            <div class="input-box" style="margin-top:15px">
                <label>AMOUNT PER REFER (₹)</label>
                <input type="number" id="ref-amt">
            </div>
            <button class="btn-glow" style="background: var(--success);" onclick="updateRefer()">SYNC REWARD</button>
        </div>
    </div>

    <div id="settings" class="panel-section">
        <div class="card-form">
            <h3><i class="ri-notification-3-line"></i> Global Banner</h3>
            <div class="input-box" style="margin-top:15px">
                <label>BANNER STATUS</label>
                <select id="ann-show">
                    <option value="true">SHOW BANNER</option>
                    <option value="false">HIDE BANNER</option>
                </select>
            </div>
            <div class="input-box">
                <label>MESSAGE</label>
                <textarea id="ann-text" rows="3"></textarea>
            </div>
            <button class="btn-glow" onclick="updateAnn()">UPDATE LIVE APP</button>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, getDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.showTab = (id, btn) => {
        document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-link').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    };

    window.addOrUpdateCourse = async () => {
        const id = document.getElementById('edit-id').value;
        const data = {
            name: document.getElementById('c-name').value,
            order: parseInt(document.getElementById('c-order').value) || 1,
            image: document.getElementById('c-img').value,
            ytLink: document.getElementById('c-yt').value,
            oldPrice: document.getElementById('c-old').value,
            newPrice: document.getElementById('c-new').value,
            duration: document.getElementById('c-duration').value, // Duration Data
            tag: document.getElementById('c-tag').value,
            expiryDate: document.getElementById('c-timer').value,
            timestamp: serverTimestamp()
        };

        if(!data.name || !data.newPrice) return alert("Fill Name and Price!");

        try {
            if(id) {
                await setDoc(doc(db, "courses", id), data, { merge: true });
                alert("Course Updated!");
            } else {
                await addDoc(collection(db, "courses"), data);
                alert("Course Added!");
            }
            resetForm();
        } catch(e) { alert("Error: " + e.message); }
    };

    window.resetForm = () => {
        document.getElementById('edit-id').value = "";
        document.getElementById('form-title').innerHTML = `<i class="ri-rocket-fill" style="color:var(--primary)"></i> Deploy Program`;
        document.getElementById('submit-btn').innerText = "DEPLOY TO TERMINAL";
        document.getElementById('cancel-edit').style.display = "none";
        ['c-name', 'c-img', 'c-yt', 'c-old', 'c-new', 'c-timer', 'c-duration'].forEach(i => document.getElementById(i).value = "");
        document.getElementById('c-order').value = "1";
        document.getElementById('c-tag').value = "";
        showTab('add', document.querySelector('.tab-link'));
    };

    window.editCourse = (id, dataStr) => {
        const data = JSON.parse(decodeURIComponent(dataStr));
        document.getElementById('edit-id').value = id;
        document.getElementById('c-name').value = data.name;
        document.getElementById('c-order').value = data.order || 1;
        document.getElementById('c-img').value = data.image || "";
        document.getElementById('c-yt').value = data.ytLink || "";
        document.getElementById('c-old').value = data.oldPrice || "";
        document.getElementById('c-new').value = data.newPrice || "";
        document.getElementById('c-duration').value = data.duration || ""; // Load Duration
        document.getElementById('c-timer').value = data.expiryDate || "";
        document.getElementById('c-tag').value = data.tag || "";
        
        document.getElementById('form-title').innerText = "📝 Edit Program";
        document.getElementById('submit-btn').innerText = "UPDATE COURSE";
        document.getElementById('cancel-edit').style.display = "block";
        showTab('add', document.querySelectorAll('.tab-link')[0]);
    };

    window.shareWA = (name, price) => {
        const msg = `🔥 *New Course Alert!*%0A🚀 *Course:* ${name}%0A💰 *Price:* ₹${price}%0A%0AJoin Now: ${window.location.origin}`;
        window.open(`https://wa.me/?text=${msg}`);
    };

    const q = query(collection(db, "courses"), orderBy("order", "asc"));
    onSnapshot(q, (snap) => {
        document.getElementById('total-courses').innerText = snap.size;
        const list = document.getElementById('live-list');
        list.innerHTML = snap.docs.map(d => {
            const data = d.data();
            const dataStr = encodeURIComponent(JSON.stringify(data));
            return `
            <div class="live-item">
                <div class="order-badge">#${data.order || 0}</div>
                <div class="live-img">${data.image ? `<img src="${data.image.split(',')[0]}">` : `<i class="ri-book-fill"></i>`}</div>
                <div class="live-info">
                    <h4>${data.name}</h4>
                    <p style="font-size:10px; color:#94a3b8;">${data.duration || 'No duration set'}</p>
                    <p style="font-size:11px; color:var(--accent); font-weight:800;">₹${data.newPrice}</p>
                </div>
                <div class="action-btns">
                    <button class="action-btn wa-btn" onclick="shareWA('${data.name}', '${data.newPrice}')"><i class="ri-whatsapp-line"></i></button>
                    <button class="action-btn edit-btn" onclick="editCourse('${d.id}', '${dataStr}')"><i class="ri-edit-box-line"></i></button>
                    <button class="action-btn del-btn" onclick="deleteCourse('${d.id}')"><i class="ri-delete-bin-line"></i></button>
                </div>
            </div>`;
        }).join('');
    });

    window.deleteCourse = async (id) => confirm("Delete this course?") && await deleteDoc(doc(db, "courses", id));
    window.updateRefer = async () => await setDoc(doc(db, "settings", "referral"), { amount: document.getElementById('ref-amt').value });
    window.updateAnn = async () => await setDoc(doc(db, "settings", "announcement"), { text: document.getElementById('ann-text').value, show: document.getElementById('ann-show').value === "true" });
    getDoc(doc(db, "settings", "referral")).then(s => { if(s.exists()) document.getElementById('ref-amt').value = s.data().amount; });
    getDoc(doc(db, "settings", "announcement")).then(s => { if(s.exists()){ document.getElementById('ann-text').value = s.data().text; document.getElementById('ann-show').value = s.data().show.toString(); } });
    onSnapshot(collection(db, "referrals"), snap => { document.getElementById('total-refers').innerText = snap.size; });
</script>
</body>
</html>
