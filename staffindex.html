<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staff Terminal | Black Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --apple-blue: #0A84FF; --apple-green: #30D158; --apple-red: #FF453A;
            --apple-orange: #FF9F0A; --cyber-purple: #BF5AF2; --bg: #06060A;
            --glass: rgba(16, 16, 24, 0.7); --text-main: #FFFFFF; --text-muted: #8E8E93;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px 16px; min-height: 100vh; }
        .container { max-width: 455px; margin: auto; }

        /* Salman Khan Banner with Blinking Effect */
        .ambassador-banner {
            background: linear-gradient(135deg, #101018 0%, #1a1a2e 100%);
            border: 1px solid rgba(10, 132, 255, 0.3); border-radius: 16px;
            padding: 12px 16px; margin-bottom: 22px; height: 85px;
            position: relative; display: flex; align-items: center; overflow: hidden;
        }
        .banner-content { z-index: 2; width: 60%; }
        .banner-tag { font-size: 9px; font-weight: 800; color: var(--apple-blue); text-transform: uppercase; margin-bottom: 4px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .banner-title { font-size: 15px; font-weight: 800; color: #FFF; margin: 2px 0; animation: blink 1.5s infinite; }
        .ambassador-img { position: absolute; right: 0; bottom: 0; height: 110%; z-index: 1; pointer-events: none; }

        /* Original Styles */
        .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .slider-track { width: 100%; height: 58px; background: rgba(255, 255, 255, 0.05); border-radius: 18px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .slider-handle { width: 50px; height: 48px; background: #FFF; border-radius: 14px; position: absolute; left: 4px; display: flex; align-items: center; justify-content: center; cursor: grab; z-index: 2; transition: transform 0.1s; }
        .slider-text { font-size: 13px; font-weight: 700; color: var(--text-muted); z-index: 1; }
    </style>
</head>
<body>
<div class="container">
    
    <!-- Salman Khan Banner Added Here -->
    <div class="ambassador-banner">
        <div class="banner-content">
            <div class="banner-tag"><i class="fas fa-star"></i> BRAND AMBASSADOR</div>
            <h4 class="banner-title">Swag Se Punch In Karo!</h4>
            <p style="font-size: 10px; color: #AEAEB2; margin: 0;">Earn continuous payouts daily.</p>
        </div>
        <img src="https://i.ibb.co/RrHyVyr/salman-khan.png" alt="Salman Khan" class="ambassador-img">
    </div>

    <!-- Original Attendance Card -->
    <div class="card">
        <h3 style="font-size: 12px; color: var(--text-muted); margin: 0 0 15px 0;">ATTENDANCE</h3>
        <div class="slider-track" id="sl-track">
            <div class="slider-handle" id="sl-handle"><i class="fas fa-fingerprint" style="color: var(--apple-blue);"></i></div>
            <span class="slider-text" id="sl-text">SLIDE TO PUNCH IN</span>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { /* Apna config yahan add karein */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Slider Logic
    const handle = document.getElementById('sl-handle');
    const track = document.getElementById('sl-track');
    
    let isDragging = false;
    handle.addEventListener('mousedown', () => isDragging = true);
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const limit = track.clientWidth - handle.clientWidth - 8;
        let x = e.clientX - track.getBoundingClientRect().left - 25;
        if (x > 0 && x < limit) handle.style.transform = `translateX(${x}px)`;
        if (x >= limit - 10) { handle.style.background = "#30D158"; }
    });
    window.addEventListener('mouseup', () => { isDragging = false; });
</script>
</body>
</html>
