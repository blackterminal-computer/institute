<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staff Terminal | Black Terminal</title>
    
    <!-- External Libraries -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-green: #34C759;
            --apple-red: #FF3B30;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text-sec: #A1A1A6;
            --accent-gradient: linear-gradient(135deg, #007AFF, #00C7FF);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 122, 255, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(52, 199, 89, 0.1) 0%, transparent 35%);
            color: white;
            margin: 0;
            padding: env(safe-area-inset-top) 16px 40px 16px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 480px; margin: auto; }

        /* Header Styling */
        .header { margin: 40px 0 25px 8px; position: relative;}
        .header h1 { font-size: 34px; margin: 0; font-weight: 800; letter-spacing: -1.5px; background: linear-gradient(#fff, #999); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--apple-blue); font-size: 13px; margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
        
        .streak-badge {
            position: absolute; right: 0; top: 10px;
            background: rgba(255, 159, 10, 0.15);
            color: #FF9F0A; padding: 8px 16px; border-radius: 50px;
            font-size: 13px; font-weight: 800; border: 1px solid rgba(255, 159, 10, 0.3);
            box-shadow: 0 0 20px rgba(255, 159, 10, 0.1);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        /* Bento Grid Style Cards */
        .card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 30px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            transition: transform 0.3s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .bento-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .bento-item { background: rgba(255,255,255,0.03); padding: 18px; border-radius: 24px; border: 1px solid var(--border); }

        h3 { font-size: 11px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; color: var(--text-sec); letter-spacing: 1px; font-weight: 700; text-transform: uppercase;}

        /* Modern Progress Bar */
        .progress-container { background: rgba(255,255,255,0.05); height: 10px; border-radius: 20px; margin: 20px 0; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .progress-bar { height: 100%; background: var(--accent-gradient); width: 0%; border-radius: 20px; box-shadow: 0 0 15px rgba(0, 122, 255, 0.5); transition: 2s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .stat-val { font-size: 26px; font-weight: 800; letter-spacing: -1px; display: block; margin-top: 5px; }
        .stat-label { font-size: 10px; color: var(--text-sec); font-weight: 600; }

        /* Modern Buttons */
        .btn {
            width: 100%; padding: 20px; border-radius: 22px; border: none;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            position: relative; overflow: hidden;
        }
        .btn-punch { background: var(--apple-blue); color: white; box-shadow: 0 12px 24px rgba(0, 122, 255, 0.3); }
        .btn-main { background: #fff; color: #000; box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1); }
        .btn:active { transform: scale(0.94); }
        .btn:disabled { opacity: 0.5; filter: grayscale(1); transform: scale(1); }

        /* Skeleton Loading Animation */
        .skeleton { background: linear-gradient(90deg, #1c1c1e 25%, #2c2c2e 50%, #1c1c1e 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 10px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Strict Day Styling */
        .strict-container { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .strict-date-card {
            min-width: 75px; background: rgba(255, 59, 48, 0.08); border: 1px solid rgba(255, 59, 48, 0.2);
            border-radius: 20px; padding: 15px 10px; text-align: center;
        }
        .strict-date-card.today { background: var(--apple-red); box-shadow: 0 8px 20px rgba(255, 59, 48, 0.4); border: none; }

        /* List Items */
        .att-item, .task-item { 
            background: rgba(255,255,255,0.03); padding: 16px; border-radius: 22px; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 10px; border: 1px solid var(--border);
        }
        .task-dot { height: 10px; width: 10px; background: var(--apple-blue); border-radius: 50%; box-shadow: 0 0 10px var(--apple-blue); }

        .wa-action {
            background: #25D366; color: #fff; width: 42px; height: 42px;
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }

        input {
            width: 100%; padding: 18px; margin-bottom: 12px; background: rgba(255,255,255,0.04);
            border: 1px solid var(--border); border-radius: 18px; color: white; font-size: 15px; transition: 0.3s;
        }
        input:focus { background: rgba(255,255,255,0.08); border-color: var(--apple-blue); outline: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <p id="current-date">--</p>
        <h1 id="user-display">Terminal</h1>
        <div class="streak-badge"><i class="fas fa-fire"></i> <span id="streak-val">0</span> DAYS</div>
    </div>

    <!-- EARNINGS (Bento Style) -->
    <div class="card">
        <h3><i class="fas fa-chart-line"></i> Performance Metrics</h3>
        <div class="bento-grid">
            <div class="bento-item">
                <span class="stat-label uppercase">DAILY RATE</span>
                <span id="daily-rate" class="stat-val">₹0</span>
            </div>
            <div class="bento-item">
                <span class="stat-label uppercase">BALANCE</span>
                <span id="total-earning" class="stat-val" style="color: var(--apple-green);">₹0</span>
            </div>
        </div>
        
        <div class="progress-container">
            <div id="salary-progress" class="progress-bar"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-sec); font-weight: 600;">
            <span>Cycle Progress</span>
            <span id="cycle-days">-- days left</span>
        </div>
        <br>
        <button id="att-btn" class="btn btn-punch" onclick="markAttendance()">
            <i class="fas fa-fingerprint"></i> PUNCH IN SYSTEM
        </button>
    </div>

    <!-- STRICT DAYS -->
    <div id="strict-card" class="card" style="display: none; border-left: 5px solid var(--apple-red);">
        <h3 style="color: var(--apple-red);"><i class="fas fa-calendar-check"></i> Strict Days</h3>
        <div id="strict-days-list" class="strict-container"></div>
    </div>

    <!-- STUDENT LIST -->
    <div class="card">
        <h3><i class="fas fa-users"></i> Live Students ( <span id="present-count" style="color: var(--apple-green);">0</span> )</h3>
        <div id="attendance-list">
            <div class="skeleton" style="height: 50px; margin-bottom: 10px;"></div>
            <div class="skeleton" style="height: 50px;"></div>
        </div>
    </div>

    <!-- TASKS -->
    <div class="card">
        <h3><i class="fas fa-bolt"></i> Priority Tasks</h3>
        <div id="task-list">
            <p style="text-align: center; font-size: 12px; opacity: 0.4; padding: 20px;">No pending tasks</p>
        </div>
    </div>

    <!-- LEAD ENTRY -->
    <div class="card" style="background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);">
        <h3><i class="fas fa-plus-circle"></i> Quick Lead Entry</h3>
        <input type="text" id="l-name" placeholder="Full Name">
        <input type="tel" id="l-phone" placeholder="WhatsApp Number">
        <input type="text" id="l-course" placeholder="Course Name">
        <button class="btn btn-main" onclick="submitLead()">SUBMIT LEAD <i class="fas fa-arrow-right"></i></button>
    </div>

    <p style="text-align: center; color: var(--text-sec); font-size: 11px; font-weight: 600; letter-spacing: 1px; opacity: 0.4; margin-top: 30px;">BLACK TERMINAL • VERSION 3.0 • 2026</p>
</div>

<script>
    // --- DATABASE CONFIG (SAME AS OLD) ---
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();  
    const fs = firebase.firestore(); 

    const staffId = localStorage.getItem('bt_staff_id');
    const staffName = localStorage.getItem('bt_staff_name') || "Staff";

    if(!staffId) window.location.href = "index.html";
    document.getElementById('user-display').innerText = `Hi, ${staffName.split(' ')[0]}`;
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    async function initSystem() {
        const todayStr = new Date().toISOString().split('T')[0];
        
        // Attendance Check
        db.ref(`attendance/${staffId}/${todayStr}`).once('value', snap => {
            if(snap.exists()) {
                const btn = document.getElementById('att-btn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-check-circle"></i> SYSTEM ACTIVE';
                btn.style.background = "var(--apple-green)";
                btn.style.boxShadow = "0 10px 20px rgba(52, 199, 89, 0.2)";
            }
        });

        // Stats Sync
        db.ref(`staff/${staffId}`).on('value', snap => {
            const val = snap.val() || {};
            document.getElementById('daily-rate').innerText = `₹${val.perDayWage || 500}`;
            document.getElementById('total-earning').innerText = `₹${val.salary || 0}`;
            document.getElementById('streak-val').innerText = val.streak || 0;
            const target = (val.perDayWage || 500) * 25;
            const percent = Math.min(((val.salary || 0) / target) * 100, 100);
            document.getElementById('salary-progress').style.width = percent + "%";
        });

        const now = new Date();
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        document.getElementById('cycle-days').innerText = `${lastDay - now.getDate()} days remaining`;

        loadTasks();
        listenStudentAttendance(); 
        listenStrictDays();
    }

    // --- LOGIC FUNCTIONS (SAME AS OLD) ---

    function markAttendance() {
        const btn = document.getElementById('att-btn');
        if (!navigator.geolocation) return alert("GPS not supported.");
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> SYNCING GPS...';
        btn.disabled = true;

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, 21.9403651, 86.7376570);
                if (dist <= 100) { 
                    const todayStr = new Date().toISOString().split('T')[0];
                    db.ref(`attendance/${staffId}/${todayStr}`).set({ time: new Date().toLocaleTimeString(), status: "Present", name: staffName }).then(() => {
                        db.ref(`staff/${staffId}`).transaction(s => { 
                            if (s) { s.salary = (s.salary || 0) + (s.perDayWage || 500); s.streak = (s.streak || 0) + 1; } 
                            return s; 
                        });
                        // NEW: Confetti Effect
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#007AFF', '#34C759', '#ffffff'] });
                        setTimeout(() => location.reload(), 2000);
                    });
                } else {
                    alert(`ACCESS DENIED. You are ${Math.round(dist)}m away from office.`);
                    btn.innerHTML = '<i class="fas fa-fingerprint"></i> PUNCH IN SYSTEM'; btn.disabled = false;
                }
            },
            () => { alert("Turn on High Accuracy GPS."); btn.disabled = false; }, { enableHighAccuracy: true }
        );
    }

    function listenStudentAttendance() {
        const todayStr = new Date().toISOString().split('T')[0];
        const listDiv = document.getElementById('attendance-list');
        const countSpan = document.getElementById('present-count');

        fs.collection("attendance").where("date", "==", todayStr).onSnapshot(async (snapshot) => {
            listDiv.innerHTML = "";
            countSpan.innerText = snapshot.size;
            if (snapshot.empty) {
                listDiv.innerHTML = '<p style="text-align:center; font-size:12px; opacity:0.3;">No check-ins yet</p>';
                return;
            }
            snapshot.docs.forEach(doc => {
                const data = doc.data();
                const name = data.userName || data.studentName || "Student";
                let phone = data.userPhone || data.phoneNumber || "910000000000";
                
                listDiv.innerHTML += `
                    <div class="att-item">
                        <div>
                            <div style="font-weight:700; font-size:15px;">${name}</div>
                            <div style="font-size:10px; color:var(--apple-green); font-weight:700; margin-top:2px;">• ONLINE</div>
                        </div>
                        <div class="wa-action" onclick="window.open('https://wa.me/${phone}', '_blank')">
                            <i class="fab fa-whatsapp"></i>
                        </div>
                    </div>`;
            });
        });
    }

    function listenStrictDays() {
        const strictCard = document.getElementById('strict-card');
        const strictList = document.getElementById('strict-days-list');
        const todayStr = new Date().toISOString().split('T')[0];

        db.ref('strictDays').on('value', snap => {
            if (snap.exists()) {
                strictList.innerHTML = "";
                let count = 0;
                snap.forEach(child => {
                    const dateVal = child.val();
                    if (dateVal >= todayStr) {
                        count++;
                        const isToday = dateVal === todayStr;
                        const d = new Date(dateVal);
                        strictList.innerHTML += `
                            <div class="strict-date-card ${isToday ? 'today' : ''}">
                                <div style="font-size:10px; font-weight:800; opacity:0.8;">${isToday ? 'TODAY' : d.toLocaleDateString('en-GB', {month:'short'})}</div>
                                <div style="font-size:20px; font-weight:800;">${d.getDate()}</div>
                            </div>`;
                    }
                });
                strictCard.style.display = count > 0 ? "block" : "none";
            }
        });
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
        const Δφ = (lat2 - lat1) * Math.PI / 180, Δλ = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    function loadTasks() {
        db.ref(`tasks/${staffId}`).on('value', snap => {
            const container = document.getElementById('task-list');
            if(!snap.exists()) return;
            container.innerHTML = "";
            snap.forEach(child => {
                const t = child.val();
                container.innerHTML += `
                    <div class="task-item">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <div class="task-dot"></div>
                            <div>
                                <div style="font-size:14px; font-weight:600;">${t.task}</div>
                                <div style="font-size:10px; color:var(--text-sec);">${new Date(t.date).toLocaleDateString()}</div>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right" style="font-size:10px; opacity:0.3;"></i>
                    </div>`;
            });
        });
    }

    function submitLead() {
        const n = document.getElementById('l-name').value, p = document.getElementById('l-phone').value, c = document.getElementById('l-course').value;
        if(!n || p.length < 10) return alert("Enter valid details");
        db.ref('leads').push({ name: n, phone: p, course: c, staff: staffName, timestamp: Date.now() }).then(() => { 
            confetti({ particleCount: 100, spread: 50, origin: { y: 0.8 } });
            alert("Lead Captured!"); 
            document.getElementById('l-name').value = ""; document.getElementById('l-phone').value = "";
        });
    }

    initSystem();
</script>
</body>
</html>
