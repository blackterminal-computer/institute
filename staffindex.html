<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --apple-blue: #0A84FF; --apple-green: #30D158; --bg: #06060A; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 455px; margin: auto; }
        /* Fixed Banner CSS */
        .salman-banner { background: #1a1a2e; border-radius: 20px; padding: 15px; margin-bottom: 20px; height: 90px; display: flex; align-items: center; position: relative; overflow: hidden; border: 1px solid rgba(10, 132, 255, 0.3); }
        .s-content { width: 60%; z-index: 2; }
        .s-img { position: absolute; right: 0; bottom: 0; height: 110%; }
        /* Grid Fix */
        .ads-grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .pro-ad-card { background: #101018; padding: 12px; border-radius: 14px; border: 1px solid #333; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="salman-banner">
        <div class="s-content">
            <div style="font-size: 8px; color: var(--apple-blue); font-weight: 800;">OFFICIAL PERFORMANCE PARTNER</div>
            <h4 style="margin: 5px 0; font-size: 14px;">Swag Se Punch In Karo!</h4>
        </div>
        <img src="https://i.ibb.co/RrHyVyr/salman-khan.png" class="s-img">
    </div>

    <div class="header">
        <p id="current-date" style="color: #BF5AF2; font-size: 12px; font-weight: 700; text-transform: uppercase;">--</p>
        <h1 id="user-display" style="font-size: 32px; margin: 5px 0;">Staff Terminal</h1>
    </div>
    <div class="ads-grid-container">
        <div class="pro-ad-card"><div style="font-size: 9px; color: var(--apple-green);">EARN TARGET</div><h4 style="font-size: 12px; margin: 4px 0;">Up To ₹20,000 / Mo.</h4></div>
        <div class="pro-ad-card"><div style="font-size: 9px; color: var(--apple-orange);">STREAK BONUS</div><h4 style="font-size: 12px; margin: 4px 0;">Continuous Payouts</h4></div>
    </div>

    <div class="card">
        <h3><i class="fas fa-chart-pie"></i> Earnings & Stats</h3>
        <div style="display: flex; justify-content: space-between;">
            <div><small style="font-size: 10px;">DAILY WAGE</small><br><b id="daily-rate">₹0</b></div>
            <div style="text-align: right;"><small style="font-size: 10px;">BALANCE</small><br><b id="total-earning">₹0</b></div>
        </div>
        <button id="att-btn" style="width: 100%; padding: 12px; margin-top: 15px; background: var(--apple-blue); border: none; border-radius: 12px; color: #fff;">PUNCH IN</button>
    </div>
    <div class="card">
        <h3>Quick Lead Entry</h3>
        <input type="text" id="l-name" placeholder="Full Name" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box;">
        <input type="tel" id="l-phone" placeholder="WhatsApp Number" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box;">
        <button onclick="submitLead()" style="width: 100%; padding: 12px; background: #fff; border-radius: 12px;">SUBMIT</button>
    </div>
</div>
<script>
    // Apni purani JavaScript yahan copy kar dein
    document.getElementById('current-date').innerText = new Date().toDateString();
</script>
</body>
</html>
