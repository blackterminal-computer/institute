<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staff Terminal | Black Terminal</title>
    <!-- Firebase Compat Libraries -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-green: #34C759;
            --bg: #000000;
            --glass: rgba(28, 28, 30, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --text-sec: #8E8E93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, #1c1c1e 0%, #000 50%);
            color: white;
            margin: 0;
            padding: env(safe-area-inset-top) 20px 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 450px; margin: auto; }

        .header { margin: 30px 0; padding-left: 5px; position: relative;}
        .header h1 { font-size: 28px; margin: 0; font-weight: 700; letter-spacing: -0.5px; }
        .header p { color: var(--apple-blue); font-size: 14px; margin: 5px 0; font-weight: 600; text-transform: uppercase; }
        
        .streak-badge {
            position: absolute; right: 0; top: 10px;
            background: rgba(255, 159, 10, 0.15);
            color: #FF9F0A; padding: 6px 12px; border-radius: 20px;
            font-size: 13px; font-weight: 700; border: 1px solid rgba(255, 159, 10, 0.3);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 22px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h3 { font-size: 13px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; color: var(--text-sec); letter-spacing: 0.5px; }

        .progress-container { background: rgba(255,255,255,0.05); height: 6px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--apple-blue); width: 0%; transition: 1s ease-out; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .stat-box b { font-size: 22px; font-weight: 700; }

        .btn {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-punch { background: var(--apple-blue); color: white; }
        .btn-main { background: #fff; color: #000; }

        /* ATTENDANCE LIST STYLES */
        #attendance-list { display: flex; flex-direction: column; gap: 10px; }
        .att-item { 
            background: rgba(255,255,255,0.05); 
            padding: 12px 16px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid var(--border);
        }
        .att-name { font-size: 14px; font-weight: 600; flex: 1; }
        
        /* WHATSAPP BUTTON */
        .wa-action {
            background: rgba(34, 197, 94, 0.15);
            color: #22C55E;
            width: 35px;
            height: 35px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .wa-action:active { transform: scale(0.8); background: #22C55E; color: #fff; }

        .att-tag { font-size: 11px; color: var(--apple-green); font-weight: 700; }

        input {
            width: 100%; padding: 16px; margin-bottom: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 16px; color: white; outline: none; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <p id="current-date">--</p>
        <h1 id="user-display">Staff Terminal</h1>
        <div class="streak-badge"><i class="fas fa-fire"></i> <span id="streak-val">0</span> Day Streak</div>
    </div>

    <div class="card">
        <h3><i class="fas fa-chart-line"></i> PERFORMANCE & WAGES</h3>
        <div class="stat-grid">
            <div class="stat-box">
                <small style="color:var(--text-sec); font-size:10px;">TODAY'S RATE</small><br>
                <b id="daily-rate">₹0</b>
            </div>
            <div class="stat-box" style="text-align: right;">
                <small style="color:var(--text-sec); font-size:10px;">TOTAL EARNED</small><br>
                <b id="total-earning">₹0</b>
            </div>
        </div>
        <div class="progress-container"><div id="salary-progress" class="progress-bar"></div></div>
        <button id="att-btn" class="btn btn-punch" onclick="markAttendance()">PUNCH IN</button>
    </div>

    <div class="card">
        <h3><i class="fas fa-users"></i> STUDENT ATTENDANCE ( <span id="present-count">0</span> )</h3>
        <div id="attendance-list"></div>
    </div>

    <div class="card">
        <h3><i class="fas fa-paper-plane"></i> LEAD GENERATOR</h3>
        <input type="text" id="l-name" placeholder="Student Name">
        <input type="tel" id="l-phone" placeholder="WhatsApp Number">
        <input type="text" id="l-course" placeholder="Interest">
        <button class="btn btn-main" onclick="submitLead()">SUBMIT LEAD</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();  
    const fs = firebase.firestore(); 

    const staffId = localStorage.getItem('bt_staff_id');
    const staffName = localStorage.getItem('bt_staff_name') || "Staff";

    function listenStudentAttendance() {
        const todayStr = new Date().toISOString().split('T')[0];
        const listDiv = document.getElementById('attendance-list');
        
        fs.collection("attendance").where("date", "==", todayStr)
          .onSnapshot((snapshot) => {
            listDiv.innerHTML = "";
            document.getElementById('present-count').innerText = snapshot.size;

            snapshot.forEach((doc) => {
                const data = doc.data();
                const name = data.userName || data.studentName || "Unknown";
                const rawPhone = data.userPhone || data.phoneNumber || data.phone || "";
                
                // Phone Number Cleaning & WA Link
                const cleanPhone = rawPhone.toString().replace(/\D/g, '');
                let waBtn = "";
                
                if(cleanPhone.length >= 10) {
                    const finalPhone = cleanPhone.startsWith('91') ? cleanPhone : '91' + cleanPhone;
                    const msg = encodeURIComponent(`Hi ${name}, this is a reminder from Black Terminal regarding your pending fees. Please clear it today. Thank you!`);
                    waBtn = `<div class="wa-action" onclick="window.open('https://wa.me/${finalPhone}?text=${msg}', '_blank')"><i class="fab fa-whatsapp"></i></div>`;
                } else {
                    waBtn = `<div class="wa-action" style="opacity:0.2" onclick="alert('No valid number found for this student.')"><i class="fab fa-whatsapp"></i></div>`;
                }

                listDiv.innerHTML += `
                    <div class="att-item">
                        <span class="att-name">${name}</span>
                        ${waBtn}
                        <span class="att-tag"><i class="fas fa-check-circle"></i> PRESENT</span>
                    </div>`;
            });
        });
    }

    // Standard mark attendance function
    function markAttendance() {
        const dateStr = new Date().toISOString().split('T')[0];
        db.ref(`attendance/${staffId}/${dateStr}`).set({ time: new Date().toLocaleTimeString(), status: "Present", name: staffName })
          .then(() => {
            db.ref(`staff/${staffId}`).transaction(s => { if(s){ s.salary=(s.salary||0)+(s.perDayWage||200); s.streak=(s.streak||0)+1; } return s; });
            location.reload();
          });
    }

    // Load initial data
    document.getElementById('user-display').innerText = `Hi, ${staffName}`;
    document.getElementById('current-date').innerText = new Date().toDateString();
    
    db.ref(`staff/${staffId}`).on('value', snap => {
        const v = snap.val() || {};
        document.getElementById('daily-rate').innerText = `₹${v.perDayWage || 200}`;
        document.getElementById('total-earning').innerText = `₹${v.salary || 0}`;
        document.getElementById('streak-val').innerText = v.streak || 0;
    });

    listenStudentAttendance();
</script>
</body>
</html>
