<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Terminal v3.2 | Black Terminal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --apple-blue: #0A84FF;
            --apple-green: #30D158;
            --danger: #FF453A;
            --warning: #FF9F0A;
            --bg: #000000;
            --card-bg: rgba(28, 28, 30, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-sec: #8E8E93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1c1c1e 0%, #000 80%);
            color: white;
            margin: 0;
            padding: calc(20px + env(safe-area-inset-top)) 16px 120px 16px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 450px; margin: auto; }

        /* Header UI */
        .status-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .time-group h2 { font-size: 42px; margin: 0; font-weight: 800; letter-spacing: -2px; }
        .time-group p { margin: 0; color: var(--apple-blue); font-weight: 700; font-size: 12px; text-transform: uppercase; }

        .streak-pill {
            background: rgba(255, 159, 10, 0.1);
            border: 1px solid rgba(255, 159, 10, 0.3);
            padding: 8px 14px; border-radius: 40px;
            display: flex; align-items: center; gap: 6px; color: var(--warning);
        }

        /* Card System */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        h3 { font-size: 11px; margin: 0 0 18px 0; color: var(--text-sec); letter-spacing: 1.5px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }

        /* Strict Scroll */
        .strict-row { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .strict-row::-webkit-scrollbar { display: none; }
        .strict-item {
            min-width: 80px; background: rgba(255, 69, 58, 0.1); border: 1px solid rgba(255, 69, 58, 0.2);
            border-radius: 20px; padding: 15px 5px; text-align: center;
        }
        .strict-item b { font-size: 22px; display: block; color: #fff; }
        .strict-item small { font-size: 10px; color: var(--danger); font-weight: 800; text-transform: uppercase; }

        /* Buttons */
        .btn-punch {
            background: #fff; color: #000; width: 100%; padding: 20px; border-radius: 22px;
            font-size: 18px; font-weight: 800; border: none; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-punch:disabled { background: var(--apple-green); color: white; opacity: 1; }
        .btn-punch:active { transform: scale(0.96); }

        /* Inputs */
        .input-box {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 18px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center;
        }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; font-size: 16px; }

        .progress-bar { height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--apple-blue), #5AC8FA); transition: 1.5s ease; width: 0%; }

        /* Penalty Alert */
        .penalty-badge { background: var(--danger); color: white; padding: 4px 10px; border-radius: 10px; font-size: 10px; font-weight: 800; margin-left: auto; }

        /* Bottom Nav */
        .nav-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(20px);
            border-radius: 35px; padding: 16px; display: flex; justify-content: space-around;
            border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .nav-bar i { font-size: 22px; color: var(--text-sec); }
        .nav-bar i.active { color: var(--apple-blue); }
    </style>
</head>
<body>

<div class="container">
    <div class="status-header">
        <div class="time-group">
            <p id="header-date">--</p>
            <h2 id="clock">00:00</h2>
        </div>
        <div class="streak-pill">
            <i class="fas fa-fire"></i> <span id="streak-count">0</span>
        </div>
    </div>

    <!-- MANDATORY DAYS -->
    <div class="card" id="strict-card" style="display:none;">
        <h3><i class="fas fa-exclamation-circle" style="color: var(--danger);"></i> Strict Days (Penalty ₹200)</h3>
        <div class="strict-row" id="strict-list"></div>
    </div>

    <!-- PERFORMANCE -->
    <div class="card">
        <h3><i class="fas fa-wallet"></i> Earnings & Attendance</h3>
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <small style="color: var(--text-sec); font-size: 10px;">BALANCE</small>
                <span style="font-size: 34px; font-weight: 800; display: block;" id="total-earning">₹0</span>
            </div>
            <div style="text-align: right;">
                <span id="cycle-info" style="color: var(--apple-blue); font-weight: 700; font-size: 12px;">--</span>
            </div>
        </div>
        
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>

        <button id="att-btn" class="btn-punch" onclick="markAttendance()">PUNCH IN</button>
        <p id="strict-warn" style="color: var(--danger); font-size: 11px; text-align: center; font-weight: 800; margin-top: 15px; display: none; animation: pulse 2s infinite;">⚠️ MANDATORY SHIFT TODAY</p>
    </div>

    <!-- STUDENT LIST -->
    <div class="card">
        <h3><i class="fas fa-users"></i> Students Today ( <span id="student-count">0</span> )</h3>
        <div id="student-list"></div>
    </div>

    <!-- LEAD SUBMISSION -->
    <div class="card" id="lead-section">
        <h3><i class="fas fa-user-plus"></i> New Lead</h3>
        <div class="input-box"><i class="fas fa-user"></i><input type="text" id="l-name" placeholder="Name"></div>
        <div class="input-box"><i class="fab fa-whatsapp"></i><input type="tel" id="l-phone" placeholder="WhatsApp"></div>
        <div class="input-box"><i class="fas fa-graduation-cap"></i><input type="text" id="l-course" placeholder="Course"></div>
        <button class="btn-punch" style="background: var(--apple-blue); color: white;" onclick="submitLead()">SAVE LEAD</button>
    </div>

    <p style="text-align: center; opacity: 0.2; font-size: 10px; padding-bottom: 40px;">V3.2 • CLOUD SECURE</p>
</div>

<div class="nav-bar">
    <i class="fas fa-home active"></i>
    <i class="fas fa-plus-circle" onclick="document.getElementById('lead-section').scrollIntoView({behavior:'smooth'})"></i>
    <i class="fas fa-sign-out-alt" onclick="logout()"></i>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();  
    const fs = firebase.firestore(); 

    const staffId = localStorage.getItem('bt_staff_id');
    const staffName = localStorage.getItem('bt_staff_name') || "Staff";
    const todayStr = new Date().toISOString().split('T')[0];

    if(!staffId) window.location.href = "index.html";

    function updateClock() {
        const d = new Date();
        document.getElementById('clock').innerText = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        document.getElementById('header-date').innerText = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function init() {
        // 1. Check Previous Day Penalty
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yestStr = yesterday.toISOString().split('T')[0];

        const sDays = await db.ref('strictDays').once('value');
        const attYest = await db.ref(`attendance/${staffId}/${yestStr}`).once('value');
        const penaltyKey = `penalty_${yestStr}`;
        const hasPenaltyProcessed = await db.ref(`staff/${staffId}/processed_penalties/${penaltyKey}`).once('value');

        let isStrictYest = false;
        sDays.forEach(d => { if(d.val() === yestStr) isStrictYest = true; });

        // If yesterday was strict and staff missed it and hasn't been charged yet
        if (isStrictYest && !attYest.exists() && !hasPenaltyProcessed.exists()) {
            db.ref(`staff/${staffId}`).transaction(s => {
                if (s) {
                    s.salary = (parseInt(s.salary) || 0) - 200;
                    if(!s.processed_penalties) s.processed_penalties = {};
                    s.processed_penalties[penaltyKey] = true;
                    s.streak = 0; // Reset streak on miss
                }
                return s;
            });
            alert("⚠️ Penalty: ₹200 deducted for missing Mandatory Day (" + yestStr + ")");
        }

        // 2. Attendance & UI Setup
        db.ref(`attendance/${staffId}/${todayStr}`).on('value', snap => {
            if(snap.exists()) {
                const btn = document.getElementById('att-btn');
                btn.disabled = true;
                btn.innerText = "PUNCHED IN";
            }
        });

        db.ref('strictDays').on('value', snap => {
            const list = document.getElementById('strict-list');
            if(snap.exists()) {
                document.getElementById('strict-card').style.display = "block";
                list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    const dt = new Date(d);
                    if(d === todayStr) document.getElementById('strict-warn').style.display = "block";
                    list.innerHTML += `<div class="strict-item"><b>${dt.getDate()}</b><small>${dt.toLocaleDateString('en-US',{month:'short'})}</small></div>`;
                });
            }
        });

        db.ref(`staff/${staffId}`).on('value', snap => {
            const v = snap.val() || {};
            document.getElementById('total-earning').innerText = `₹${v.salary || 0}`;
            document.getElementById('streak-count').innerText = v.streak || 0;
            const prog = ((v.salary || 0) / ((v.perDayWage || 500) * 25)) * 100;
            document.getElementById('progress-fill').style.width = Math.min(prog, 100) + "%";
        });

        const daysLeft = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate() - new Date().getDate();
        document.getElementById('cycle-info').innerText = `${daysLeft} DAYS LEFT`;

        listenStudents();
    }

    async function markAttendance() {
        const btn = document.getElementById('att-btn');
        btn.innerText = "PUNCHING...";
        
        db.ref(`attendance/${staffId}/${todayStr}`).set({
            time: new Date().toLocaleTimeString(),
            status: "Present",
            name: staffName
        }).then(() => {
            db.ref(`staff/${staffId}`).transaction(s => {
                if (s) {
                    s.salary = (parseInt(s.salary) || 0) + (parseInt(s.perDayWage) || 500);
                    s.streak = (parseInt(s.streak) || 0) + 1;
                }
                return s;
            });
        });
    }

    function listenStudents() {
        fs.collection("attendance").where("date", "==", todayStr).onSnapshot(snap => {
            const list = document.getElementById('student-list');
            document.getElementById('student-count').innerText = snap.size;
            list.innerHTML = snap.empty ? '<p style="text-align:center; opacity:0.3; font-size:12px; padding:20px;">No students yet</p>' : '';
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.05);">
                        <div style="display:flex; align-items:center; gap:12px">
                            <div style="width:32px; height:32px; background:#3a3a3c; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--apple-blue);">${d.userName.charAt(0)}</div>
                            <span style="font-weight:600; font-size:14px;">${d.userName}</span>
                        </div>
                        <i class="fab fa-whatsapp" style="color:var(--apple-green); font-size:18px;" onclick="window.open('https://wa.me/91${d.userPhone}')"></i>
                    </div>`;
            });
        });
    }

    function submitLead() {
        const n = document.getElementById('l-name').value, p = document.getElementById('l-phone').value, c = document.getElementById('l-course').value;
        if(n && p) {
            db.ref('leads').push({ name: n, phone: p, course: c, staff: staffName, timestamp: Date.now() }).then(() => {
                alert("Lead Logged!");
                document.querySelectorAll('input').forEach(i => i.value = "");
            });
        }
    }

    function logout() { if(confirm("Logout?")) { localStorage.clear(); window.location.href = "index.html"; } }

    init();
</script>
</body>
</html>
