<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staff Terminal | Black Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --apple-blue: #0A84FF;
            --apple-green: #30D158;
            --apple-red: #FF453A;
            --bg: #06060A;
            --text-main: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px 16px;
        }

        .container { max-width: 455px; margin: auto; }

        /* --- SALMAN KHAN BRAND AMBASSADOR BANNER --- */
        .ambassador-banner {
            background: linear-gradient(135deg, #101018 0%, #1a1a2e 100%);
            border: 1px solid rgba(10, 132, 255, 0.3);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 22px;
            height: 85px;
            position: relative;
            display: flex;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .banner-content {
            z-index: 2;
            width: 60%;
        }

        .banner-tag {
            font-size: 9px;
            font-weight: 800;
            color: var(--apple-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        /* Blink Animation */
        @keyframes blink-animation {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .banner-title {
            font-size: 15px;
            font-weight: 800;
            color: #FFF;
            margin: 0;
            line-height: 1.2;
            animation: blink-animation 1.5s infinite; /* Text blinking effect */
        }

        .banner-desc {
            font-size: 10px;
            color: #AEAEB2;
            margin: 2px 0 0 0;
        }

        .ambassador-img {
            position: absolute;
            right: 0;
            bottom: 0;
            height: 110%;
            z-index: 1;
            pointer-events: none;
            filter: drop-shadow(-5px 0px 10px rgba(0,0,0,0.8));
        }

    </style>
</head>
<body>
<div class="container">
    
    <div class="ambassador-banner">
        <div class="banner-content">
            <div class="banner-tag"><i class="fas fa-star"></i> OFFICIAL BRAND AMBASSADOR</div>
            <h4 class="banner-title">Swag Se Punch In Karo!</h4>
            <p class="banner-desc">Earn continuous payouts daily.</p>
        </div>
        <img src="https://i.ibb.co/RrHyVyr/salman-khan.png" alt="Salman Khan" class="ambassador-img">
    </div>

</div>
</body>
</html>
