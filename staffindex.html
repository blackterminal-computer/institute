<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | Black Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #00d4ff; --bg: #030508; --card: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 500px; margin: auto; }
        
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        h3 { margin-top: 0; color: var(--accent); font-size: 1.1rem; }
        
        .stat-box { display: flex; justify-content: space-between; margin: 10px 0; font-size: 0.9rem; }
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-att { background: #2ecc71; color: white; }
        .btn-att:disabled { background: #34495e; cursor: not-allowed; }
        .btn-lead { background: var(--accent); color: #000; }
        .btn-download { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--accent); }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; box-sizing: border-box; }
        .countdown { font-size: 0.8rem; color: #ffadad; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h2 id="welcome-name">Welcome, Staff</h2>
    <p style="font-size: 0.8rem; opacity: 0.6;">Black Terminal Management System</p>
</div>

<div class="grid">
    <div class="card">
        <h3>Earnings & Attendance</h3>
        <div class="stat-box"><span>Daily Wage:</span> <b id="per-day-income">₹0</b></div>
        <div class="stat-box"><span>Total Salary:</span> <b id="total-salary">₹0</b></div>
        <div class="countdown" id="salary-timer">Next payday in: -- days</div>
        
        <button id="att-btn" class="btn btn-att" onclick="markAttendance()">MARK ATTENDANCE</button>
        <p id="att-msg" style="font-size: 0.7rem; color: #ffadad; display: none; margin-top: 10px;"></p>
    </div>

    <div class="card">
        <h3>New Lead Entry</h3>
        <input type="text" id="lead-name" placeholder="Student Full Name">
        <input type="text" id="lead-course" placeholder="Course Name">
        <input type="tel" id="lead-phone" placeholder="Valid Mobile Number">
        <button class="btn btn-lead" onclick="submitLead()">SEND TO ADMIN</button>
    </div>

    <div class="card">
        <h3>Documents</h3>
        <button class="btn btn-download" onclick="downloadDoc('Terms_Condition.pdf')">Terms & Conditions</button>
        <button class="btn btn-download" onclick="downloadDoc('Monthly_Agreement.pdf')">Monthly Agreement</button>
    </div>
</div>

<script>
    // Firebase Config (Must be same as login page)
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const staffId = localStorage.getItem('bt_staff_id');
    const staffName = localStorage.getItem('bt_staff_name');
    const PER_DAY_WAGE = 500; // Yahan aap per day salary set karein

    if(!staffId) window.location.href = "index.html";
    document.getElementById('welcome-name').innerText = `Hi, ${staffName}`;

    // --- 1 & 2. Attendance & Salary Logic ---
    function checkAttendanceStatus() {
        const today = new Date();
        const dateStr = today.toISOString().split('T')[0];
        const day = today.getDay(); // 0 = Sun, 6 = Sat

        // Disable on Weekends
        if(day === 0 || day === 6) {
            document.getElementById('att-btn').disabled = true;
            document.getElementById('att-btn').innerText = "WEEKEND OFF";
            return;
        }

        // Check if already marked today
        db.ref(`attendance/${staffId}/${dateStr}`).once('value', snap => {
            if(snap.exists()) {
                document.getElementById('att-btn').disabled = true;
                document.getElementById('att-btn').innerText = "ATTENDANCE MARKED";
            }
        });

        // Load Salary Data
        db.ref(`staff/${staffId}`).on('value', snap => {
            const data = snap.val();
            document.getElementById('total-salary').innerText = `₹${data.salary || 0}`;
            document.getElementById('per-day-income').innerText = `₹${PER_DAY_WAGE}`;
            updateCountdown();
        });
    }

    function markAttendance() {
        const today = new Date();
        const dateStr = today.toISOString().split('T')[0];
        
        db.ref(`attendance/${staffId}/${dateStr}`).set({
            timestamp: Date.now(),
            status: "Present"
        }).then(() => {
            // Update Salary in Staff Node
            db.ref(`staff/${staffId}/salary`).transaction(current => (current || 0) + PER_DAY_WAGE);
            alert("Attendance marked successfully!");
            location.reload();
        });
    }

    function updateCountdown() {
        const now = new Date();
        const lastDayOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        const diff = lastDayOfMonth.getDate() - now.getDate();
        document.getElementById('salary-timer').innerText = `${diff} days remaining until salary cycle.`;
    }

    // --- 3. Lead Management ---
    function submitLead() {
        const name = document.getElementById('lead-name').value;
        const course = document.getElementById('lead-course').value;
        const phone = document.getElementById('lead-phone').value;

        if(!name || !course || phone.length < 10) return alert("Please fill correct lead details!");

        db.ref('leads').push({
            studentName: name,
            course: course,
            phone: phone,
            submittedBy: staffName,
            staffId: staffId,
            status: "Pending",
            date: Date.now()
        }).then(() => {
            alert("Lead sent to Admin!");
            document.getElementById('lead-name').value = "";
            document.getElementById('lead-course').value = "";
            document.getElementById('lead-phone').value = "";
        });
    }

    // --- 4. Document Download ---
    function downloadDoc(fileName) {
        // Asali file path yahan aayega, abhi ke liye alert hai
        alert("Downloading " + fileName + "...");
        // window.open('your_storage_link/' + fileName);
    }

    checkAttendanceStatus();
</script>

</body>
</html>
