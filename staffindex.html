<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | Black Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root { 
            --accent: #00d4ff; 
            --bg: #05070a; 
            --glass: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --neon-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, #102030 0%, #05070a 100%);
            color: white; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 35px; }
        .header h2 { letter-spacing: 2px; font-weight: 800; margin-bottom: 5px; }
        .header span { color: var(--accent); font-size: 0.8rem; opacity: 0.8; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 450px; margin: auto; }
        
        .card { 
            background: var(--glass); 
            padding: 25px; 
            border-radius: 28px; 
            border: 1px solid var(--card-border); 
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h3 { margin-top: 0; font-size: 1rem; color: #fff; border-left: 3px solid var(--accent); padding-left: 12px; margin-bottom: 20px; }
        
        /* Stats Styling */
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .stat-label { opacity: 0.6; font-size: 0.85rem; }
        .stat-value { font-weight: 600; font-size: 1.1rem; }
        .stat-value.highlight { color: var(--accent); text-shadow: var(--neon-shadow); }

        /* Input Styling */
        input { 
            width: 100%; padding: 14px; margin: 8px 0; 
            background: rgba(0,0,0,0.5); 
            border: 1px solid var(--card-border); 
            border-radius: 14px; 
            color: white; 
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; box-shadow: var(--neon-shadow); }

        /* Buttons */
        .btn { 
            width: 100%; padding: 15px; border-radius: 14px; border: none; 
            font-weight: 700; cursor: pointer; transition: 0.4s; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem;
        }
        .btn-att { background: linear-gradient(135deg, #00d4ff, #0072ff); color: white; }
        .btn-att:disabled { background: #1a1c20; color: #444; border: 1px solid #333; cursor: not-allowed; }
        
        .btn-lead { background: #fff; color: #000; }
        .btn-lead:hover { background: var(--accent); }

        .btn-download { 
            background: transparent; color: #fff; border: 1px solid var(--card-border); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-download:hover { background: rgba(255,255,255,0.05); border-color: #fff; }

        .countdown { 
            background: rgba(255, 173, 173, 0.1); color: #ffadad; 
            padding: 8px 15px; border-radius: 10px; font-size: 0.75rem; 
            display: inline-block; margin-top: 10px; 
        }

    </style>
</head>
<body>

<div class="header">
    <span id="date-now"></span>
    <h2 id="welcome-name">STAFF TERMINAL</h2>
</div>

<div class="grid">
    <div class="card">
        <h3>FINANCE & ATTENDANCE</h3>
        <div class="stat-row">
            <span class="stat-label">Daily Wage</span>
            <span class="stat-value" id="per-day-income">₹0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Current Balance</span>
            <span class="stat-value highlight" id="total-salary">₹0</span>
        </div>
        
        <button id="att-btn" class="btn btn-att" onclick="markAttendance()">PUNCH IN TODAY</button>
        <center><div class="countdown" id="salary-timer">Loading cycle...</div></center>
    </div>

    <div class="card">
        <h3>LEAD GENERATION</h3>
        <input type="text" id="lead-name" placeholder="Student Name">
        <input type="text" id="lead-course" placeholder="Interest Course">
        <input type="tel" id="lead-phone" placeholder="WhatsApp Number">
        <button class="btn btn-lead" onclick="submitLead()">SUBMIT LEAD TO ADMIN</button>
    </div>

    <div class="card">
        <h3>RESOURCES</h3>
        <button class="btn btn-download" onclick="downloadDoc('Terms')">
            TERMS & CONDITIONS <span>→</span>
        </button>
        <button class="btn btn-download" onclick="downloadDoc('Agreement')">
            MONTHLY AGREEMENT <span>→</span>
        </button>
    </div>
</div>

<script>
    // [Firebase Config remains same as before]
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const staffId = localStorage.getItem('bt_staff_id');
    const staffName = localStorage.getItem('bt_staff_name');
    const PER_DAY_WAGE = 500; 

    if(!staffId) window.location.href = "index.html";
    document.getElementById('welcome-name').innerText = staffName.toUpperCase();
    document.getElementById('date-now').innerText = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric'});

    // --- Core Logic ---

    function checkStatus() {
        const today = new Date();
        const dateStr = today.toISOString().split('T')[0];
        const day = today.getDay(); 

        if(day === 0 || day === 6) {
            const btn = document.getElementById('att-btn');
            btn.disabled = true;
            btn.innerText = "WEEKEND REST";
            btn.style.background = "#1a1c20";
        }

        db.ref(`attendance/${staffId}/${dateStr}`).once('value', snap => {
            if(snap.exists()) {
                const btn = document.getElementById('att-btn');
                btn.disabled = true;
                btn.innerText = "ALREADY PUNCHED";
            }
        });

        db.ref(`staff/${staffId}`).on('value', snap => {
            const data = snap.val();
            document.getElementById('total-salary').innerText = `₹${data.salary || 0}`;
            document.getElementById('per-day-income').innerText = `₹${PER_DAY_WAGE}`;
            updateTimer();
        });
    }

    function markAttendance() {
        const dateStr = new Date().toISOString().split('T')[0];
        db.ref(`attendance/${staffId}/${dateStr}`).set({
            time: new Date().toLocaleTimeString(),
            status: "Present"
        }).then(() => {
            db.ref(`staff/${staffId}/salary`).transaction(c => (c || 0) + PER_DAY_WAGE);
            alert("Attendance Success!");
            location.reload();
        });
    }

    function updateTimer() {
        const now = new Date();
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const rem = lastDay - now.getDate();
        document.getElementById('salary-timer').innerText = `Next Cycle: ${rem} Days Left`;
    }

    function submitLead() {
        const n = document.getElementById('lead-name').value;
        const c = document.getElementById('lead-course').value;
        const p = document.getElementById('lead-phone').value;

        if(!n || !c || p.length < 10) return alert("Invalid Details!");

        db.ref('leads').push({
            name: n, course: c, phone: p,
            staff: staffName, date: new Date().toLocaleString()
        }).then(() => {
            alert("Lead Shared!");
            ["lead-name", "lead-course", "lead-phone"].forEach(id => document.getElementById(id).value = "");
        });
    }

    function downloadDoc(type) {
        alert(type + " download starting...");
    }

    checkStatus();
</script>
</body>
</html>
