<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staff Terminal | Black Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-green: #34C759;
            --apple-red: #FF3B30;
            --bg: #000000;
            --glass: rgba(28, 28, 30, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text-sec: #8E8E93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1c1c1e 0%, #000 80%);
            color: white;
            margin: 0;
            padding: env(safe-area-inset-top) 20px 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 450px; margin: auto; }

        .header { margin: 40px 0 30px 0; position: relative;}
        .header h1 { font-size: 32px; margin: 0; font-weight: 700; letter-spacing: -1px; }
        .header p { color: var(--apple-blue); font-size: 13px; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        .streak-badge {
            position: absolute; right: 0; top: 10px;
            background: rgba(255, 159, 10, 0.12);
            color: #FF9F0A; padding: 6px 14px; border-radius: 50px;
            font-size: 12px; font-weight: 700; border: 1px solid rgba(255, 159, 10, 0.2);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        h3 { font-size: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; color: var(--text-sec); letter-spacing: 0.8px; font-weight: 600; text-transform: uppercase;}

        .progress-container { background: rgba(255,255,255,0.08); height: 6px; border-radius: 10px; margin: 18px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #007AFF, #00C7FF); width: 0%; transition: 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 5px; }
        .stat-box small { display: block; font-size: 10px; color: var(--text-sec); margin-bottom: 6px; font-weight: 500; }
        .stat-box b { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }

        .btn {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-punch { background: var(--apple-blue); color: white; box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3); }
        .btn-main { background: #fff; color: #000; }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        .btn:disabled { opacity: 0.3; filter: grayscale(1); }

        .strict-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 12px; margin-top: 5px; }
        .strict-date-card {
            background: rgba(255, 59, 48, 0.08);
            border: 1px solid rgba(255, 59, 48, 0.15);
            border-radius: 16px; padding: 10px; text-align: center;
            display: flex; flex-direction: column; align-items: center; min-width: 65px;
        }
        .strict-date-card .mon { font-size: 10px; font-weight: 800; color: var(--apple-red); text-transform: uppercase; }
        .strict-date-card .day { font-size: 18px; font-weight: 700; color: #fff; margin: 2px 0; }
        .strict-date-card.today { background: var(--apple-red); border: none; box-shadow: 0 4px 12px rgba(255, 59, 48, 0.3); }
        .strict-date-card.today .mon, .strict-date-card.today .day { color: white; }

        .att-item { 
            background: rgba(255,255,255,0.04); 
            padding: 14px 18px; border-radius: 18px; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 10px; border: 1px solid var(--border);
        }
        .att-name { font-size: 14px; font-weight: 600; color: #efeff4; }

        .wa-action {
            background: rgba(52, 199, 89, 0.12);
            color: #34C759; width: 38px; height: 38px;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .wa-action:active { background: #34C759; color: #fff; transform: scale(0.9); }

        .task-item {
            background: rgba(255,255,255,0.04);
            padding: 18px; border-radius: 22px; margin-top: 12px;
            border: 1px solid var(--border);
            display: flex; align-items: center; gap: 15px;
        }
        .task-dot { height: 8px; width: 8px; background: var(--apple-blue); border-radius: 50%; }

        .pay-tag {
            font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; margin-left: 8px;
        }

        input {
            width: 100%; padding: 18px; margin-bottom: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 18px; color: white; outline: none; box-sizing: border-box;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <p id="current-date">--</p>
        <h1 id="user-display">Staff Terminal</h1>
        <div class="streak-badge"><i class="fas fa-fire"></i> <span id="streak-val">0</span> DAYS</div>
    </div>

    <div class="card">
        <h3><i class="fas fa-chart-pie"></i> Earnings & Stats</h3>
        <div class="stat-grid">
            <div class="stat-box">
                <small>DAILY WAGE</small>
                <b id="daily-rate">₹0</b>
            </div>
            <div class="stat-box" style="text-align: right;">
                <small>BALANCE</small>
                <b id="total-earning">₹0</b>
            </div>
        </div>
        <div class="progress-container">
            <div id="salary-progress" class="progress-bar"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--text-sec);">
            <span>Cycle Progress</span>
            <span id="cycle-days">-- days left</span>
        </div>
        <br>
        <button id="att-btn" class="btn btn-punch" onclick="markAttendance()">
            <i class="fas fa-fingerprint"></i> PUNCH IN
        </button>
    </div>

    <div class="card" id="strict-card" style="display: none; border-left: 4px solid var(--apple-red);">
        <h3 style="color: var(--apple-red);"><i class="fas fa-calendar-check"></i> Strict Attendance Days</h3>
        <div id="strict-days-list" class="strict-container"></div>
    </div>

    <div class="card">
        <h3><i class="fas fa-user-check"></i> Students Present ( <span id="present-count" style="color: var(--apple-green);">0</span> )</h3>
        <div id="attendance-list">
            <p style="text-align:center; font-size:12px; opacity:0.4;">Syncing...</p>
        </div>
    </div>

    <div class="card">
        <h3><i class="fas fa-bolt"></i> Priority Assignments</h3>
        <div id="task-list">
            <div style="text-align: center; padding: 20px; opacity: 0.4;"><p style="font-size: 12px;">No active tasks</p></div>
        </div>
    </div>

    <div class="card">
        <h3><i class="fas fa-paper-plane"></i> Quick Lead Entry</h3>
        <input type="text" id="l-name" placeholder="Full Name">
        <input type="tel" id="l-phone" placeholder="WhatsApp Number">
        <input type="text" id="l-course" placeholder="Target Course">
        <button class="btn btn-main" onclick="submitLead()">SUBMIT LEAD <i class="fas fa-chevron-right"></i></button>
    </div>

    <p style="text-align: center; color: var(--text-sec); font-size: 10px; opacity: 0.5;">TERMINAL v2.9 • PAYMENT SYNC</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();  
    const fs = firebase.firestore(); 

    const staffId = localStorage.getItem('bt_staff_id');
    const staffName = localStorage.getItem('bt_staff_name') || "Staff";

    if(!staffId) window.location.href = "index.html";
    document.getElementById('user-display').innerText = `Hi, ${staffName.split(' ')[0]}`;
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    async function initSystem() {
        const todayStr = new Date().toISOString().split('T')[0];
        db.ref(`attendance/${staffId}/${todayStr}`).once('value', snap => {
            if(snap.exists()) {
                const btn = document.getElementById('att-btn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-check-circle"></i> ATTENDANCE MARKED';
                btn.style.background = "var(--apple-green)";
            }
        });

        db.ref(`staff/${staffId}`).on('value', snap => {
            const val = snap.val() || {};
            document.getElementById('daily-rate').innerText = `₹${val.perDayWage || 500}`;
            document.getElementById('total-earning').innerText = `₹${val.salary || 0}`;
            document.getElementById('streak-val').innerText = val.streak || 0;
            const target = (val.perDayWage || 500) * 25;
            const percent = Math.min(((val.salary || 0) / target) * 100, 100);
            document.getElementById('salary-progress').style.width = percent + "%";
        });

        const now = new Date();
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        document.getElementById('cycle-days').innerText = `${lastDay - now.getDate()} days remaining`;

        loadTasks();
        listenStudentAttendance(); 
        listenStrictDays();
    }

    function listenStudentAttendance() {
        const todayStr = new Date().toISOString().split('T')[0];
        const currentMonth = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
        const listDiv = document.getElementById('attendance-list');
        const countSpan = document.getElementById('present-count');

        fs.collection("attendance").where("date", "==", todayStr).onSnapshot(async (snapshot) => {
            listDiv.innerHTML = "";
            countSpan.innerText = snapshot.size;
            if (snapshot.empty) {
                listDiv.innerHTML = '<p style="text-align:center; font-size:12px; opacity:0.3; padding:10px;">No students checked in</p>';
                return;
            }

            for (const attDoc of snapshot.docs) {
                const data = attDoc.data();
                const displayName = data.userName || data.studentName || "Unknown";
                const rowId = `student-${displayName.replace(/\s+/g, '')}`;
                
                listDiv.innerHTML += `
                    <div class="att-item" id="${rowId}">
                        <div style="display:flex; align-items:center;">
                            <span class="att-name">${displayName}</span>
                            <span class="pay-tag" id="tag-${rowId}" style="background:rgba(255,255,255,0.1); color:#888;">...</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:12px;" id="actions-${rowId}">
                            <i class="fas fa-circle-notch fa-spin" style="font-size:10px; opacity:0.5;"></i>
                        </div>
                    </div>`;

                updateStudentStatus(displayName, rowId, currentMonth);
            }
        });
    }

    async function updateStudentStatus(name, rowId, month) {
        let phone = "";
        let isPaid = false;
        try {
            const payDoc = await fs.collection("payments").doc(name).collection("months").doc(month).get();
            if(payDoc.exists && payDoc.data().status === "Paid") isPaid = true;

            const studentProfile = await fs.collection("students").doc(name).get();
            if(studentProfile.exists) {
                phone = studentProfile.data().phoneNumber || studentProfile.data().phone || "";
            }

            const tag = document.getElementById(`tag-${rowId}`);
            const actionArea = document.getElementById(`actions-${rowId}`);

            if(tag) {
                tag.innerText = isPaid ? "PAID" : "UNPAID";
                tag.style.background = isPaid ? "rgba(52, 199, 89, 0.2)" : "rgba(255, 59, 48, 0.2)";
                tag.style.color = isPaid ? "var(--apple-green)" : "var(--apple-red)";
            }

            const cleanPhone = phone.toString().replace(/\D/g, '');
            let waBtn = "";
            if(cleanPhone.length >= 10) {
                const finalNum = cleanPhone.startsWith('91') ? cleanPhone : '91' + cleanPhone;
                const msg = encodeURIComponent(`Hi ${name}, your fees for ${month} is currently ${isPaid ? 'Paid' : 'Unpaid'}. Please ignore if already cleared.`);
                waBtn = `<div class="wa-action" onclick="window.open('https://api.whatsapp.com/send?phone=${finalNum}&text=${msg}', '_blank')"><i class="fab fa-whatsapp"></i></div>`;
            } else {
                waBtn = `<div class="wa-action" style="opacity:0.2" onclick="alert('No phone found')"><i class="fab fa-whatsapp"></i></div>`;
            }

            if(actionArea) {
                actionArea.innerHTML = `${waBtn} <span style="font-size:10px; color:var(--apple-green); font-weight:700;">PRESENT</span>`;
            }
        } catch(e) { console.log(e); }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
        const Δφ = (lat2 - lat1) * Math.PI / 180, Δλ = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    function markAttendance() {
        const btn = document.getElementById('att-btn');
        if (!navigator.geolocation) return alert("Location not supported.");
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> LOCATING...';
        btn.disabled = true;

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, 21.9403651, 86.7376570);
                // Range updated to 100 meters
                if (dist <= 100) { 
                    const todayStr = new Date().toISOString().split('T')[0];
                    db.ref(`attendance/${staffId}/${todayStr}`).set({ time: new Date().toLocaleTimeString(), status: "Present", name: staffName }).then(() => {
                        db.ref(`staff/${staffId}`).transaction(s => { if (s) { s.salary = (s.salary || 0) + (s.perDayWage || 500); s.streak = (s.streak || 0) + 1; } return s; });
                        location.reload();
                    });
                } else {
                    alert(`Access Denied! You are ${Math.round(dist)}m away from Center.`);
                    btn.innerHTML = '<i class="fas fa-fingerprint"></i> PUNCH IN'; btn.disabled = false;
                }
            },
            () => { alert("Enable GPS."); btn.disabled = false; }, { enableHighAccuracy: true }
        );
    }

    function loadTasks() {
        db.ref(`tasks/${staffId}`).on('value', snap => {
            const container = document.getElementById('task-list');
            if(!snap.exists()) return;
            container.innerHTML = "";
            snap.forEach(child => {
                const t = child.val();
                container.innerHTML += `<div class="task-item"><div class="task-dot"></div><div class="task-info"><p>${t.task}</p><small>${new Date(t.date).toLocaleDateString('en-GB')}</small></div></div>`;
            });
        });
    }

    function listenStrictDays() {
        const strictList = document.getElementById('strict-days-list');
        const todayStr = new Date().toISOString().split('T')[0];
        db.ref('strictDays').on('value', snap => {
            if (snap.exists()) {
                strictList.innerHTML = "";
                let count = 0;
                snap.forEach(child => {
                    const dateVal = child.val();
                    if (dateVal >= todayStr) {
                        count++;
                        const isToday = dateVal === todayStr;
                        const d = new Date(dateVal);
                        strictList.innerHTML += `<div class="strict-date-card ${isToday ? 'today' : ''}"><span class="mon">${isToday ? 'NOW' : d.toLocaleDateString('en-GB', {month:'short'})}</span><span class="day">${d.getDate()}</span></div>`;
                    }
                });
                document.getElementById('strict-card').style.display = count > 0 ? "block" : "none";
            }
        });
    }

    function submitLead() {
        const n = document.getElementById('l-name').value, p = document.getElementById('l-phone').value, c = document.getElementById('l-course').value;
        if(!n || p.length < 10) return alert("Check details");
        db.ref('leads').push({ name: n, phone: p, course: c, staff: staffName, timestamp: Date.now() }).then(() => { alert("Success!"); location.reload(); });
    }

    initSystem();
</script>
</body>
</html>
