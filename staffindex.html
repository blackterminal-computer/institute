<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Enterprise Terminal | Black Terminal Gold</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-green: #34C759;
            --apple-red: #FF3B30;
            --apple-orange: #FF9F0A;
            --premium-gold: #D4AF37;
            --bg: #0A0A0C;
            --glass: rgba(22, 22, 26, 0.75);
            --border: rgba(255, 255, 255, 0.09);
            --text-sec: #98989D;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -30%, #1e1e24 0%, #0a0a0c 80%);
            color: white;
            margin: 0;
            padding: env(safe-area-inset-top) 18px 50px 18px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 460px; margin: auto; }

        .header { margin: 35px 0 25px 0; display: flex; align-items: center; justify-content: space-between; position: relative;}
        .header-meta h1 { font-size: 26px; margin: 0; font-weight: 800; letter-spacing: -1px; color: #fff; }
        .header-meta p { color: var(--apple-blue); font-size: 11px; margin: 0 0 5px 0; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
        
        .profile-cluster { display: flex; align-items: center; gap: 12px; }
        .avatar-badge {
            width: 44px; height: 44px; background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)); 
            border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-weight: 700; color: var(--premium-gold); font-size: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .streak-badge {
            background: rgba(255, 159, 10, 0.1); color: #FF9F0A; padding: 5px 12px; border-radius: 50px;
            font-size: 11px; font-weight: 700; border: 1px solid rgba(255, 159, 10, 0.18); display: inline-flex; align-items: center; gap: 5px;
        }
        .tier-badge {
            background: rgba(212, 175, 55, 0.1); color: var(--premium-gold); padding: 5px 12px; border-radius: 50px;
            font-size: 11px; font-weight: 700; border: 1px solid rgba(212, 175, 55, 0.2); display: inline-flex; align-items: center; gap: 5px;
        }

        .card {
            background: var(--glass); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border-radius: 26px; padding: 22px; margin-bottom: 18px; border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative; overflow: hidden; transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .card:active { transform: scale(0.99); }

        h3 { font-size: 11px; margin-top: 0; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; color: var(--text-sec); letter-spacing: 1px; font-weight: 700; text-transform: uppercase;}

        .toggle-btn {
            margin-left: auto; background: rgba(255,255,255,0.07); border: none;
            color: var(--apple-blue); font-size: 10px; padding: 5px 11px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .toggle-btn:active { background: rgba(255,255,255,0.15); }

        .progress-container { background: rgba(255,255,255,0.06); height: 7px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--apple-blue), #5AC8FA); width: 0%; transition: 1.5s cubic-bezier(0.1, 0.9, 0.2, 1); }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-box small { display: block; font-size: 10px; color: var(--text-sec); margin-bottom: 5px; font-weight: 600; letter-spacing: 0.5px; }
        .stat-box b { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }

        .live-counter-panel {
            background: rgba(52, 199, 89, 0.05); border: 1px solid rgba(52, 199, 89, 0.12);
            border-radius: 20px; padding: 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        .timer-digits { font-family: -apple-system, BlinkMacSystemFont, monospace; font-size: 24px; font-weight: 700; color: var(--apple-green); letter-spacing: 0.5px; }

        .slider-wrapper {
            position: relative; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            height: 64px; border-radius: 22px; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .slider-text { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.35); pointer-events: none; z-index: 2; text-transform: uppercase; letter-spacing: 0.5px; }
        .slider-bg { position: absolute; left: 0; top: 0; bottom: 0; background: var(--apple-blue); width: 0; z-index: 1; }
        .slider-handle {
            position: absolute; left: 4px; width: 56px; height: 56px; background: #fff;
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            color: #000; cursor: grab; z-index: 3; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .slider-wrapper.disabled { opacity: 0.3; pointer-events: none; }
        .slider-wrapper.success-state { background: var(--apple-green) !important; border-color: transparent; }
        .slider-wrapper.success-state .slider-text { color: #fff; opacity: 1; }
        .slider-wrapper.out-state { background: var(--apple-red) !important; border-color: transparent; }
        .slider-wrapper.out-state .slider-text { color: #fff; opacity: 1; }

        .btn-main { width: 100%; padding: 16px; border-radius: 18px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }

        .strict-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 10px; margin-top: 5px; }
        .strict-date-card {
            background: rgba(255, 59, 48, 0.06); border: 1px solid rgba(255, 59, 48, 0.12);
            border-radius: 16px; padding: 8px; text-align: center; display: flex; flex-direction: column; align-items: center;
        }
        .strict-date-card .mon { font-size: 9px; font-weight: 800; color: var(--apple-red); text-transform: uppercase; }
        .strict-date-card .day { font-size: 16px; font-weight: 700; color: #fff; margin: 1px 0; }
        .strict-date-card.today { background: var(--apple-red); border: none; box-shadow: 0 4px 15px rgba(255, 59, 48, 0.3); }
        .strict-date-card.today .mon, .strict-date-card.today .day { color: white; }

        .att-item { 
            background: rgba(255,255,255,0.03); padding: 12px 15px; border-radius: 18px; 
            margin-bottom: 10px; border: 1px solid var(--border);
        }
        .att-row-top { display: flex; justify-content: space-between; align-items: center; }
        .att-name { font-size: 14px; font-weight: 600; color: #fff; }
        
        .crm-cluster { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); }
        .crm-select {
            background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: #fff;
            font-size: 11px; padding: 6px 10px; border-radius: 10px; outline: none; cursor: pointer; flex-grow: 1;
        }

        .wa-action {
            background: rgba(52, 199, 89, 0.12); color: #34C759; width: 34px; height: 34px;
            border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .wa-action:active { background: #34C759; color: #fff; transform: scale(0.9); }

        .hr-leave-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
        .leave-pill {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 12px;
            border-radius: 16px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .leave-pill:active { background: rgba(255,255,255,0.08); transform: scale(0.97); }
        .leave-pill b { display: block; font-size: 18px; margin-top: 2px; color: var(--apple-blue); }

        .task-item { background: rgba(255,255,255,0.03); padding: 14px; border-radius: 18px; margin-top: 10px; border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .task-dot { height: 8px; width: 8px; background: var(--apple-blue); border-radius: 50%; }

        input, select.global-input {
            width: 100%; padding: 15px; margin-bottom: 12px; background: rgba(255,255,255,0.04);
            border: 1px solid var(--border); border-radius: 16px; color: white; outline: none; box-sizing: border-box; font-size: 14px;
        }

        .warning-banner {
            background: rgba(255, 59, 48, 0.12); border: 1px solid rgba(255, 59, 48, 0.22);
            border-radius: 16px; padding: 12px; font-size: 11px; color: #FF453A; text-align: center; margin-bottom: 15px; line-height: 1.4; font-weight: 600; display: none;
        }
    </style>
</head>
