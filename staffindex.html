<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staff Terminal | Black Terminal</title>
    <!-- Firebase Compat Libraries -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-green: #34C759;
            --bg: #000000;
            --glass: rgba(28, 28, 30, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --text-sec: #8E8E93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, #1c1c1e 0%, #000 50%);
            color: white;
            margin: 0;
            padding: env(safe-area-inset-top) 20px 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 450px; margin: auto; }

        .header { margin: 30px 0; padding-left: 5px; position: relative;}
        .header h1 { font-size: 28px; margin: 0; font-weight: 700; letter-spacing: -0.5px; }
        .header p { color: var(--apple-blue); font-size: 14px; margin: 5px 0; font-weight: 600; text-transform: uppercase; }
        
        .streak-badge {
            position: absolute; right: 0; top: 10px;
            background: rgba(255, 159, 10, 0.15);
            color: #FF9F0A; padding: 6px 12px; border-radius: 20px;
            font-size: 13px; font-weight: 700; border: 1px solid rgba(255, 159, 10, 0.3);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 22px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h3 { font-size: 13px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; color: var(--text-sec); letter-spacing: 0.5px; }

        .progress-container { background: rgba(255,255,255,0.05); height: 6px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--apple-blue); width: 0%; transition: 1s ease-out; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .stat-box small { display: block; font-size: 10px; color: var(--text-sec); margin-bottom: 4px; }
        .stat-box b { font-size: 22px; font-weight: 700; }

        .btn {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-main { background: #fff; color: #000; }
        .btn-main:active { transform: scale(0.97); opacity: 0.8; }
        .btn-punch { background: var(--apple-blue); color: white; }
        .btn:disabled { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }

        .task-item {
            background: rgba(255,255,255,0.03);
            padding: 16px; border-radius: 20px; margin-top: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: flex-start; gap: 12px;
        }
        .task-dot { 
            height: 10px; width: 10px; background: var(--apple-blue); 
            border-radius: 50%; margin-top: 4px; 
            box-shadow: 0 0 10px var(--apple-blue);
            animation: pulse-task 2s infinite; 
        }
        .task-info p { margin: 0; font-size: 14px; font-weight: 500; }
        .task-info small { color: var(--text-sec); font-size: 11px; margin-top: 5px; display: block; }

        /* ATTENDANCE STYLES */
        #attendance-list { display: flex; flex-direction: column; gap: 10px; max-height: 250px; overflow-y: auto; }
        .att-item { 
            background: rgba(255,255,255,0.05); 
            padding: 12px 16px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .att-name { font-size: 14px; font-weight: 600; flex: 1; }
        .att-tag { font-size: 11px; color: var(--apple-green); font-weight: 700; display: flex; align-items: center; gap: 4px; }
        
        /* WHATSAPP ACTION */
        .whatsapp-action {
            background: rgba(34, 197, 94, 0.1);
            color: #22C55E;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .whatsapp-action:active { transform: scale(0.9); background: #22C55E; color: white; }

        input {
            width: 100%; padding: 16px; margin-bottom: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 16px; color: white; outline: none; box-sizing: border-box;
            font-size: 15px; transition: 0.3s;
        }
        input:focus { border-color: var(--apple-blue); background: rgba(255,255,255,0.1); }

        .footer-note { text-align: center; color: var(--text-sec); font-size: 11px; margin-top: 30px; opacity: 0.6; }

        @keyframes pulse-task {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 122, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 122, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 122, 255, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <p id="current-date">--</p>
        <h1 id="user-display">Staff Terminal</h1>
        <div class="streak-badge"><i class="fas fa-fire"></i> <span id="streak-val">0</span> Day Streak</div>
    </div>

    <!-- Wage Card -->
    <div class="card">
        <h3><i class="fas fa-chart-line"></i> PERFORMANCE & WAGES</h3>
        <div class="stat-grid">
            <div class="stat-box">
                <small>TODAY'S RATE</small>
                <b id="daily-rate">₹0</b>
            </div>
            <div class="stat-box" style="text-align: right;">
                <small>TOTAL EARNED</small>
                <b id="total-earning">₹0</b>
            </div>
        </div>
        <div class="progress-container">
            <div id="salary-progress" class="progress-bar"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--text-sec);">
            <span>Cycle Progress</span>
            <span id="cycle-days">-- days left</span>
        </div>
        <br>
        <button id="att-btn" class="btn btn-punch" onclick="markAttendance()">
            <i class="fas fa-fingerprint"></i> PUNCH IN
        </button>
    </div>

    <!-- Student Attendance List -->
    <div class="card">
        <h3><i class="fas fa-users"></i> STUDENT ATTENDANCE ( <span id="present-count">0</span> )</h3>
        <div id="attendance-list">
            <p style="text-align:center; font-size:12px; opacity:0.4;">Loading attendance...</p>
        </div>
    </div>

    <!-- Tasks -->
    <div class="card">
        <h3><i class="fas fa-list-check"></i> PRIORITY TASKS</h3>
        <div id="task-list">
            <div style="text-align: center; padding: 20px; opacity: 0.4;">
                <i class="fas fa-moon fa-2x"></i>
                <p style="font-size: 12px; margin-top: 10px;">All caught up!</p>
            </div>
        </div>
    </div>

    <!-- Lead Gen -->
    <div class="card">
        <h3><i class="fas fa-paper-plane"></i> LEAD GENERATOR</h3>
        <input type="text" id="l-name" placeholder="Student Name">
        <input type="tel" id="l-phone" placeholder="WhatsApp Number">
        <input type="text" id="l-course" placeholder="Interest (e.g. Python, AI)">
        <button class="btn btn-main" onclick="submitLead()">
            SUBMIT TO ADMIN <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <p class="footer-note">TERMINAL V2.6 • SECURED BY BLACK TERMINAL CLOUD</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();  
    const fs = firebase.firestore(); 

    const staffId = localStorage.getItem('bt_staff_id');
    const staffName = localStorage.getItem('bt_staff_name') || "Staff";

    if(!staffId) window.location.href = "index.html";

    document.getElementById('user-display').innerText = `Hi, ${staffName.split(' ')[0]}`;
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

    async function initSystem() {
        const today = new Date();
        const dateStr = today.toISOString().split('T')[0];
        
        db.ref(`attendance/${staffId}/${dateStr}`).once('value', snap => {
            if(snap.exists()) {
                const btn = document.getElementById('att-btn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-check-circle"></i> PUNCHED IN';
                btn.style.background = "var(--apple-green)";
            }
        });

        db.ref(`staff/${staffId}`).on('value', snap => {
            const val = snap.val() || {};
            const rate = val.perDayWage || 500;
            const total = val.salary || 0;
            
            document.getElementById('daily-rate').innerText = `₹${rate}`;
            document.getElementById('total-earning').innerText = `₹${total}`;
            document.getElementById('streak-val').innerText = val.streak || 0;

            const target = rate * 25;
            const percent = Math.min((total / target) * 100, 100);
            document.getElementById('salary-progress').style.width = percent + "%";
        });

        const now = new Date();
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        document.getElementById('cycle-days').innerText = `${lastDay - now.getDate()} days left`;

        loadTasks();
        listenStudentAttendance(); 
    }

    // LIST ATTENDANCE WITH WHATSAPP BUTTON
    function listenStudentAttendance() {
        const todayStr = new Date().toISOString().split('T')[0];
        const listDiv = document.getElementById('attendance-list');
        const countSpan = document.getElementById('present-count');

        fs.collection("attendance")
          .where("date", "==", todayStr)
          .onSnapshot((snapshot) => {
            listDiv.innerHTML = "";
            let count = 0;

            if (snapshot.empty) {
                listDiv.innerHTML = '<p style="text-align:center; font-size:12px; opacity:0.4; padding:10px;">No students present yet</p>';
                countSpan.innerText = "0";
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                count++;
                
                const displayName = data.userName || data.studentName || "Unknown Student";
                const phone = data.userPhone || data.phoneNumber || "";

                // Message Template
                const waMsg = encodeURIComponent(`Hi ${displayName}, this is a reminder from Black Terminal regarding your pending fees/dues. Please clear it at the earliest. Thank you!`);
                const waLink = phone ? `https://wa.me/91${phone}?text=${waMsg}` : `javascript:alert('Phone number not found in database')`;

                listDiv.innerHTML += `
                    <div class="att-item">
                        <span class="att-name">${displayName}</span>
                        <div class="whatsapp-action" onclick="window.open('${waLink}', '_blank')">
                            <i class="fab fa-whatsapp"></i>
                        </div>
                        <span class="att-tag"><i class="fas fa-check-circle"></i> PRESENT</span>
                    </div>
                `;
            });

            countSpan.innerText = count;
        });
    }

    function markAttendance() {
        const dateStr = new Date().toISOString().split('T')[0];
        const btn = document.getElementById('att-btn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROCESSING...';

        db.ref(`attendance/${staffId}/${dateStr}`).set({
            time: new Date().toLocaleTimeString(),
            status: "Present",
            name: staffName
        }).then(() => {
            db.ref(`staff/${staffId}`).transaction(staff => {
                if (staff) {
                    staff.salary = (staff.salary || 0) + (staff.perDayWage || 500);
                    staff.streak = (staff.streak || 0) + 1;
                }
                return staff;
            });
            alert("Attendance Marked! 🔥");
            location.reload();
        });
    }

    function loadTasks() {
        db.ref(`tasks/${staffId}`).on('value', snap => {
            const container = document.getElementById('task-list');
            if(!snap.exists()) return;
            container.innerHTML = "";
            snap.forEach(child => {
                const t = child.val();
                container.innerHTML += `
                    <div class="task-item">
                        <div class="task-dot"></div>
                        <div class="task-info">
                            <p>${t.task}</p>
                            <small>${new Date(t.date).toLocaleDateString()}</small>
                        </div>
                    </div>
                `;
            });
        });
    }

    function submitLead() {
        const n = document.getElementById('l-name').value;
        const p = document.getElementById('l-phone').value;
        const c = document.getElementById('l-course').value;

        if(!n || p.length < 10) return alert("Please enter valid details.");

        db.ref('leads').push({
            name: n, phone: p, course: c,
            staff: staffName, staffId: staffId,
            timestamp: Date.now()
        }).then(() => {
            alert("Lead sent to Admin! 🚀");
            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    }

    initSystem();
</script>
</body>
</html>
