<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Defaulters List | Black Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-green: #34C759;
            --apple-red: #FF3B30;
            --apple-orange: #FF9F0A;
            --bg: #08080C;
            --glass: rgba(18, 18, 24, 0.75);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-sec: #A1A1A6;
            --text-muted: #6E6E73;
            --accent-glow: radial-gradient(circle at 50% -20%, rgba(255, 159, 10, 0.12) 0%, transparent 65%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            background-image: var(--accent-glow);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: calc(env(safe-area-inset-top) + 24px) 20px 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 480px; margin: auto; }

        .back-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            color: var(--text-sec);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.12); color: #FFF; }

        .header h1 { 
            font-size: 32px; margin: 0 0 5px 0; font-weight: 800; letter-spacing: -1px;
            background: linear-gradient(180deg, #FFFFFF 30%, #C5C5C7 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { color: var(--apple-orange); font-size: 13px; margin: 0 0 24px 0; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-radius: 24px; padding: 24px; border: 1px solid var(--border);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        .count-badge {
            background: rgba(255, 159, 10, 0.15);
            color: var(--apple-orange);
            padding: 4px 10px; border-radius: 8px; font-weight: 700; font-size: 14px;
        }

        .att-item { 
            background: rgba(255,255,255,0.03); padding: 14px 16px; border-radius: 16px; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 12px; border: 1px solid var(--border);
        }
        .att-name { font-size: 15px; font-weight: 600; color: #F2F2F7; }
        .action-group { display: flex; align-items: center; gap: 8px; }

        .wa-action, .phone-action {
            width: 38px; height: 38px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease;
        }
        .wa-action { background: rgba(52, 199, 89, 0.12); color: var(--apple-green); border: 1px solid rgba(52, 199, 89, 0.15); }
        .wa-action:hover { background: var(--apple-green); color: #fff; }
        .phone-action { background: rgba(0, 122, 255, 0.12); color: var(--apple-blue); border: 1px solid rgba(0, 122, 255, 0.15); }
        .phone-action:hover { background: var(--apple-blue); color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <a href="javascript:history.back()" class="back-btn">
        <i class="fas fa-chevron-left"></i> Dashboard
    </a>

    <div class="header">
        <h1>Absence Logs</h1>
        <p><i class="fas fa-shield-alt"></i> Security & Tracking Terminal</p>
    </div>

    <div class="card" style="border-left: 4px solid var(--apple-orange);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <span style="font-weight: 700; font-size: 13px; color: var(--text-sec); letter-spacing: 0.5px; text-transform: uppercase;">Defaulter Tracking Tree</span>
            <span id="defaulter-count" class="count-badge">0</span>
        </div>
        
        <div id="defaulter-list">
            <p style="text-align:center; font-size:13px; opacity:0.5; padding:20px;">
                <i class="fas fa-spinner fa-spin" style="margin-right: 5px;"></i> Analyzing attendance buffers...
            </p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    firebase.initializeApp(firebaseConfig);
    const fs = firebase.firestore(); 

    async function generateDefaultersList() {
        const listContainer = document.getElementById('defaulter-list');
        const countSpan = document.getElementById('defaulter-count');
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const todayStr = today.toISOString().split('T')[0];

        const d1 = new Date(); d1.setDate(d1.getDate() - 1); const yesterdayStr = d1.toISOString().split('T')[0];
        const d2 = new Date(); d2.setDate(d2.getDate() - 2); const dayBeforeStr = d2.toISOString().split('T')[0];

        // Safe query optimization window (Last 30 Days)
        const limitDate = new Date();
        limitDate.setDate(limitDate.getDate() - 30);
        const limitDateStr = limitDate.toISOString().split('T')[0];

        try {
            const allStudentsSnap = await fs.collection("students").get();
            if(allStudentsSnap.empty) {
                listContainer.innerHTML = '<p style="text-align:center; font-size:13px; opacity:0.4; padding:10px;">No student logs found.</p>';
                return;
            }

            // Windowed single collection fetch
            const allAttendanceSnap = await fs.collection("attendance")
                .where("date", ">=", limitDateStr)
                .get();
            
            const studentAttendanceMap = {};
            const presentToday = new Set();
            const presentYesterday = new Set();
            const presentDayBefore = new Set();

            allAttendanceSnap.forEach(doc => {
                const data = doc.data();
                const identity = data.studentName || data.userName;
                const attDate = data.date;

                if (identity && attDate) {
                    const key = identity.trim().toLowerCase();
                    
                    if (!studentAttendanceMap[key]) {
                        studentAttendanceMap[key] = [];
                    }
                    studentAttendanceMap[key].push(attDate);

                    if (attDate === todayStr) presentToday.add(key);
                    if (attDate === yesterdayStr) presentYesterday.add(key);
                    if (attDate === dayBeforeStr) presentDayBefore.add(key);
                }
            });

            let defaulterCount = 0; 
            let listHtml = "";

            for (const studentDoc of allStudentsSnap.docs) {
                const sName = studentDoc.id; 
                const sData = studentDoc.data();
                const normalizedName = sName.trim().toLowerCase();

                if (presentToday.has(normalizedName)) continue;
                if (presentYesterday.has(normalizedName) && presentDayBefore.has(normalizedName)) continue;

                defaulterCount++;
                let totalAbsentDays = 2; 

                const studentDates = studentAttendanceMap[normalizedName];

                if (studentDates && studentDates.length > 0) {
                    studentDates.sort((a, b) => new Date(b) - new Date(a));
                    const lastPresentDate = new Date(studentDates[0]); 
                    lastPresentDate.setHours(0,0,0,0);
                    
                    const dayDiff = Math.floor((today.getTime() - lastPresentDate.getTime()) / (1000 * 60 * 60 * 24));
                    if (dayDiff > 0) totalAbsentDays = dayDiff;
                } else if (sData.createdAt) {
                    const createdDate = new Date(sData.createdAt); 
                    createdDate.setHours(0,0,0,0);
                    const regDiff = Math.floor((today.getTime() - createdDate.getTime()) / (1000 * 60 * 60 * 24));
                    if(regDiff > 2) totalAbsentDays = regDiff;
                } else {
                    totalAbsentDays = "30+";
                }

                let rawPhone = sData.phoneNumber || sData.phone || "";
                const cleanPhone = rawPhone.toString().replace(/\D/g, '');
                let callHtml = "", waHtml = "";

                if(cleanPhone.length >= 10) {
                    const finalNum = cleanPhone.startsWith('91') ? cleanPhone : '91' + cleanPhone;
                    const msg = encodeURIComponent(`Hi ${sName}, you have been continuously absent from Black Terminal for the last ${totalAbsentDays} days.`);
                    callHtml = `<a href="tel:${cleanPhone}" class="phone-action"><i class="fas fa-phone"></i></a>`;
                    waHtml = `<div class="wa-action" onclick="window.open('https://wa.me/${finalNum}?text=${msg}', '_blank')"><i class="fab fa-whatsapp"></i></div>`;
                } else {
                    callHtml = `<div class="phone-action" style="opacity:0.2"><i class="fas fa-phone"></i></div>`;
                    waHtml = `<div class="wa-action" style="opacity:0.2"><i class="fab fa-whatsapp"></i></div>`;
                }

                listHtml += `
                    <div class="att-item" style="background: rgba(255, 159, 10, 0.03); border-color: rgba(255, 159, 10, 0.15);">
                        <span class="att-name"><i class="fas fa-user-slash" style="color:var(--apple-orange); font-size:12px; margin-right:8px;"></i>${sName}</span>
                        <div class="action-group">
                            ${callHtml} ${waHtml}
                            <span style="font-size:11px; color:var(--apple-red); font-weight:700; background:rgba(255,59,48,0.12); padding:5px 10px; border-radius:10px;">${totalAbsentDays} DAYS ABSENT</span>
                        </div>
                    </div>`;
            }

            countSpan.innerText = defaulterCount;
            listContainer.innerHTML = defaulterCount === 0 ? '<p style="text-align:center; font-size:13px; opacity:0.4; color:var(--apple-green);">All students are synchronized.</p>' : listHtml;
        } catch (error) { 
            console.error("Error loading defaulters:", error); 
            listContainer.innerHTML = '<p style="text-align:center; font-size:13px; color:var(--apple-red);">Failed to compile logs. View console.</p>';
        }
    }

    generateDefaultersList();
</script>
</body>
</html>
