<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staff Terminal | Black Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --apple-blue: #0A84FF; --apple-green: #30D158; --apple-red: #FF453A; --apple-orange: #FF9F0A; --cyber-purple: #BF5AF2; --bg: #06060A; --glass: rgba(16, 16, 24, 0.7); --border: rgba(255, 255, 255, 0.06); --text-main: #FFFFFF; --text-muted: #8E8E93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px 16px; min-height: 100vh; box-sizing: border-box; }
        .container { max-width: 455px; margin: auto; }
        .salman-banner { background: linear-gradient(135deg, #101018 0%, #1a1a2e 100%); border: 1px solid rgba(10, 132, 255, 0.3); border-radius: 20px; padding: 15px; margin-bottom: 22px; height: 90px; position: relative; display: flex; align-items: center; overflow: hidden; }
        .s-content { z-index: 2; width: 65%; }
        .s-tag { font-size: 9px; font-weight: 800; color: var(--apple-blue); text-transform: uppercase; margin-bottom: 4px; }
        .s-title { font-size: 16px; font-weight: 800; color: #FFF; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .s-img { position: absolute; right: -10px; bottom: 0; height: 110%; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="salman-banner animate__animated animate__fadeIn">
        <div class="s-content">
            <div class="s-tag"><i class="fas fa-crown"></i> OFFICIAL PERFORMANCE PARTNER</div>
            <h4 class="s-title">Swag Se Punch In Karo!</h4>
        </div>
        <img src="https://i.ibb.co/RrHyVyr/salman-khan.png" alt="Partner" class="s-img">
    </div>
    <div class="header">
        <p id="current-date">--</p>
        <h1 id="user-display">Staff Terminal</h1>
        <div class="streak-badge"><i class="fas fa-fire"></i> <span id="streak-val">0</span> DAYS</div>
    </div>
    <div class="ads-grid-container">
        <div class="pro-ad-card ad-flash-green"><span class="ad-mini-tag green">EARN TARGET</span><h4 class="ad-main-title">Up To ₹20,000 / Mo.</h4></div>
        <div class="pro-ad-card ad-flash-orange"><span class="ad-mini-tag orange">STREAK BONUS</span><h4 class="ad-main-title">Continuous Payouts</h4></div>
    </div>
    <div class="card" style="border-top: 3px solid var(--apple-blue);">
        <h3><i class="fas fa-chart-pie"></i> Earnings & Stats</h3>
        <div class="stat-grid">
            <div class="stat-box"><small>DAILY WAGE</small><b id="daily-rate" style="color: var(--apple-blue);">₹0</b></div>
            <div class="stat-box" style="text-align: right;"><small>BALANCE</small><b id="total-earning" style="color: var(--apple-green);">₹0</b></div>
        </div>
        <button id="att-btn" class="btn btn-punch" onclick="markAttendance()">PUNCH IN</button>
    </div>
    <div class="card">
        <h3><i class="fas fa-paper-plane"></i> Quick Lead Entry</h3>
        <input type="text" id="l-name" placeholder="Full Name">
        <input type="tel" id="l-phone" placeholder="WhatsApp Number">
        <button class="btn btn-main" onclick="submitLead()">SUBMIT</button>
    </div>
<script>
    const firebaseConfig = { /* Apna config yahan dalein */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const staffId = localStorage.getItem('bt_staff_id');
    const staffName = localStorage.getItem('bt_staff_name') || "Staff";
    
    function markAttendance() { /* Attendance Logic */ }
    function submitLead() { /* Lead Logic */ }
    
    // UI Updates
    document.getElementById('user-display').innerText = `Hi, ${staffName.split(' ')[0]}`;
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
</script>
</div>
</body>
</html>
