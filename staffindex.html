<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staff Terminal | Black Terminal</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-green: #34C759;
            --danger: #FF3B30;
            --warning: #FF9F0A;
            --bg: #000000;
            --glass: rgba(28, 28, 30, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-sec: #8E8E93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 20% 20%, #1c1c1e 0%, #000 60%);
            color: white;
            margin: 0;
            padding: env(safe-area-inset-top) 20px 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 450px; margin: auto; }

        .header { margin: 30px 0; position: relative;}
        .header h1 { font-size: 32px; margin: 0; font-weight: 700; letter-spacing: -1px; }
        .header p { color: var(--apple-blue); font-size: 14px; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; }
        
        .streak-badge {
            position: absolute; right: 0; top: 5px;
            background: rgba(255, 159, 10, 0.15);
            color: #FF9F0A; padding: 8px 15px; border-radius: 25px;
            font-size: 13px; font-weight: 700; border: 1px solid rgba(255, 159, 10, 0.3);
            display: flex; align-items: center; gap: 6px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        h3 { font-size: 12px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; color: var(--text-sec); letter-spacing: 1px; text-transform: uppercase; }

        .strict-scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 5px;
            scrollbar-width: none;
        }
        .strict-scroll-container::-webkit-scrollbar { display: none; }

        .strict-card-mini {
            flex: 0 0 100px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 25px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .strict-day-num { font-size: 28px; font-weight: 700; display: block; color: white; }
        .strict-month-name { font-size: 11px; font-weight: 600; color: var(--danger); }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box b { font-size: 24px; font-weight: 800; display: block; }
        .stat-box small { color: var(--text-sec); font-size: 10px; }

        .progress-container { background: rgba(255,255,255,0.05); height: 6px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--apple-blue); width: 0%; transition: 1.5s cubic-bezier(0.1, 0, 0, 1); }

        .btn {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-punch { background: var(--apple-blue); color: white; box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3); }
        .btn-main { background: white; color: black; }

        .att-item { background: rgba(255,255,255,0.05); padding: 14px 18px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid var(--border); }
        .task-item { background: rgba(255,255,255,0.03); padding: 16px; border-radius: 20px; margin-top: 10px; display: flex; gap: 15px; border: 1px solid var(--border); }
        .task-dot { width: 8px; height: 8px; background: var(--apple-blue); border-radius: 50%; margin-top: 6px; }

        input { width: 100%; padding: 16px; margin-bottom: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 18px; color: white; box-sizing: border-box; font-size: 15px; outline: none; }
        .footer-note { text-align: center; color: var(--text-sec); font-size: 10px; margin-top: 40px; text-transform: uppercase; letter-spacing: 2px; }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
        .penalty-warning {
            font-size: 11px; color: var(--danger); margin-top: 15px; text-align: center; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            animation: pulse 2s infinite ease-in-out;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <p id="current-date">--</p>
        <h1 id="user-display">Hi, Staff</h1>
        <div class="streak-badge"><i class="fas fa-fire"></i> <span id="streak-val">0</span> Day Streak</div>
    </div>

    <div class="card" id="strict-card" style="display:none; border: none; background: transparent; padding: 10px 0; box-shadow: none; backdrop-filter: none;">
        <h3 style="color: var(--text-sec); padding-left: 10px;"><i class="fas fa-calendar-alt"></i> Mandatory Work Days</h3>
        <div id="strict-days-list" class="strict-scroll-container"></div>
    </div>

    <div class="card">
        <h3><i class="fas fa-chart-pie"></i> Activity & Earnings</h3>
        <div class="stat-grid">
            <div class="stat-box">
                <small>DAILY RATE</small>
                <b id="daily-rate">₹0</b>
            </div>
            <div class="stat-box" style="text-align: right;">
                <small>NET EARNED</small>
                <b id="total-earning">₹0</b>
            </div>
        </div>
        <div class="progress-container">
            <div id="salary-progress" class="progress-bar"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--text-sec);">
            <span id="cycle-days">-- days left</span>
            <span>Target: 25 Days</span>
        </div>
        <br>
        <button id="att-btn" class="btn btn-punch" onclick="markAttendance()">
            <i class="fas fa-fingerprint"></i> PUNCH IN
        </button>
        
        <p id="strict-warning" style="display:none;" class="penalty-warning">
            <i class="fas fa-exclamation-triangle"></i> MANDATORY ATTENDANCE TODAY (PENALTY ₹200)
        </p>
    </div>

    <div class="card">
        <h3><i class="fas fa-users"></i> Student Tracker ( <span id="present-count">0</span> )</h3>
        <div id="attendance-list"></div>
    </div>

    <div class="card">
        <h3><i class="fas fa-tasks"></i> Pending Tasks</h3>
        <div id="task-list"></div>
    </div>

    <div class="card">
        <h3><i class="fas fa-user-plus"></i> Lead Drop</h3>
        <input type="text" id="l-name" placeholder="Name">
        <input type="tel" id="l-phone" placeholder="WhatsApp Number">
        <input type="text" id="l-course" placeholder="Interest">
        <button class="btn btn-main" onclick="submitLead()">SUBMIT LEAD</button>
    </div>

    <p class="footer-note">Black Terminal Cloud • V2.8</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();  
    const fs = firebase.firestore(); 

    const staffId = localStorage.getItem('bt_staff_id');
    const staffName = localStorage.getItem('bt_staff_name') || "Staff Member";
    const todayStr = new Date().toISOString().split('T')[0];

    // --- COORDINATES SETTINGS ---
    const TARGET_LAT = 21.940573;
    const TARGET_LON = 86.737408;
    const RADIUS_KM = 0.3; 

    if(!staffId) window.location.href = "index.html";

    document.getElementById('user-display').innerText = `Hi, ${staffName.split(' ')[0]}`;
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

    async function init() {
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yestStr = yesterday.toISOString().split('T')[0];

        const sDaysSnap = await db.ref('strictDays').once('value');
        const attYestSnap = await db.ref(`attendance/${staffId}/${yestStr}`).once('value');
        const penaltyCheck = await db.ref(`staff/${staffId}/penalties/${yestStr}`).once('value');

        let wasStrictYesterday = false;
        sDaysSnap.forEach(d => { if(d.val() === yestStr) wasStrictYesterday = true; });

        if (wasStrictYesterday && !attYestSnap.exists() && !penaltyCheck.exists()) {
            db.ref(`staff/${staffId}`).transaction(s => {
                if (s) {
                    s.salary = (parseInt(s.salary) || 0) - 200;
                    s.streak = 0; 
                    if(!s.penalties) s.penalties = {};
                    s.penalties[yestStr] = true; 
                }
                return s;
            });
            alert("⚠️ Penalty: ₹200 deducted for missing Mandatory Day (" + yestStr + ")");
        }

        db.ref('holidays').on('value', hSnap => {
            let isHoliday = false;
            hSnap.forEach(h => { if(h.val() === todayStr) isHoliday = true; });

            db.ref(`attendance/${staffId}/${todayStr}`).on('value', snap => {
                const btn = document.getElementById('att-btn');
                if(isHoliday) {
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-umbrella-beach"></i> OFFICE CLOSED';
                    btn.style.background = "#333";
                } else if(snap.exists()) {
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-check-circle"></i> PUNCHED IN';
                    btn.style.background = "var(--apple-green)";
                }
            });
        });

        db.ref('strictDays').on('value', snap => {
            const list = document.getElementById('strict-days-list');
            const card = document.getElementById('strict-card');
            const warning = document.getElementById('strict-warning');
            list.innerHTML = "";
            if(snap.exists()) {
                card.style.display = "block";
                snap.forEach(child => {
                    const d = child.val();
                    const dObj = new Date(d);
                    if(d === todayStr) warning.style.display = "flex";
                    list.innerHTML += `<div class="strict-card-mini"><span class="strict-day-num">${dObj.getDate()}</span><span class="strict-month-name">${dObj.toLocaleDateString('en-US', {month:'short'})}</span></div>`;
                });
            }
        });

        db.ref(`staff/${staffId}`).on('value', snap => {
            const v = snap.val() || {};
            document.getElementById('daily-rate').innerText = `₹${v.perDayWage || 500}`;
            document.getElementById('total-earning').innerText = `₹${v.salary || 0}`;
            document.getElementById('streak-val').innerText = v.streak || 0;
            const progress = ((v.salary || 0) / ((v.perDayWage || 500) * 25)) * 100;
            document.getElementById('salary-progress').style.width = Math.min(progress, 100) + "%";
        });

        const now = new Date();
        const daysLeft = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() - now.getDate();
        document.getElementById('cycle-days').innerText = `${daysLeft} days left`;

        loadTasks();
        listenStudentAttendance();
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
    }

    async function markAttendance() {
        const btn = document.getElementById('att-btn');
        const hSnap = await db.ref('holidays').once('value');
        let isH = false;
        hSnap.forEach(h => { if(h.val() === todayStr) isH = true; });

        if(isH) return alert("Office is closed today.");

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-location-arrow fa-spin"></i> VERIFYING LOCATION...';

        if (!navigator.geolocation) {
            alert("Geolocation is not supported by your browser.");
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-fingerprint"></i> PUNCH IN';
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const userLat = position.coords.latitude;
                const userLon = position.coords.longitude;
                const distance = getDistance(TARGET_LAT, TARGET_LON, userLat, userLon);

                if (distance <= RADIUS_KM) {
                    db.ref(`attendance/${staffId}/${todayStr}`).set({
                        time: new Date().toLocaleTimeString(),
                        status: "Present",
                        name: staffName,
                        verified: true
                    }).then(() => {
                        db.ref(`staff/${staffId}`).transaction(s => {
                            if (s) {
                                s.salary = (parseInt(s.salary) || 0) + (parseInt(s.perDayWage) || 500);
                                s.streak = (parseInt(s.streak) || 0) + 1;
                            }
                            return s;
                        });
                    });
                } else {
                    alert(`Access Denied: Outside office premises (${(distance).toFixed(2)} km away).`);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-fingerprint"></i> PUNCH IN';
                }
            },
            (error) => {
                alert("Location Error: Please enable GPS access.");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-fingerprint"></i> PUNCH IN';
            },
            { enableHighAccuracy: true }
        );
    }

    function listenStudentAttendance() {
        fs.collection("attendance").where("date", "==", todayStr).onSnapshot(snap => {
            const list = document.getElementById('attendance-list');
            document.getElementById('present-count').innerText = snap.size;
            list.innerHTML = snap.empty ? '<p style="text-align:center; font-size:12px; opacity:0.3;">No entries today</p>' : '';
            snap.forEach(doc => {
                const d = doc.data();
                const reminderMsg = encodeURIComponent(`Hi ${d.userName}, This is a reminder regarding your pending fees at Black Terminal. Please clear it soon. Thank you!`);
                
                list.innerHTML += `
                    <div class="att-item">
                        <span><b>${d.userName}</b></span>
                        <div style="display:flex; align-items:center; gap:10px">
                            <i class="fab fa-whatsapp" style="color:var(--apple-green); cursor:pointer;" onclick="window.open('https://wa.me/91${d.userPhone}?text=${reminderMsg}')"></i>
                            <span style="font-size:11px; color:var(--apple-green)">● PRESENT</span>
                        </div>
                    </div>`;
            });
        });
    }

    function loadTasks() {
        db.ref(`tasks/${staffId}`).on('value', snap => {
            const list = document.getElementById('task-list');
            list.innerHTML = snap.exists() ? '' : '<p style="text-align:center; opacity:0.3; font-size:12px;">All caught up!</p>';
            snap.forEach(child => {
                const t = child.val();
                list.innerHTML += `<div class="task-item"><div class="task-dot"></div><div><p style="margin:0; font-size:14px">${t.task}</p><small style="color:var(--text-sec); font-size:11px">${new Date(t.date).toLocaleDateString()}</small></div></div>`;
            });
        });
    }

    function submitLead() {
        const n = document.getElementById('l-name').value, p = document.getElementById('l-phone').value, c = document.getElementById('l-course').value;
        if(n && p) {
            db.ref('leads').push({ name: n, phone: p, course: c, staff: staffName, timestamp: Date.now() }).then(() => {
                alert("Lead Logged!");
                document.querySelectorAll('input').forEach(i => i.value = "");
            });
        }
    }

    init();
</script>
</body>
</html>
