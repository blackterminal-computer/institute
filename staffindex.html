<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Terminal v3.1 | Black Terminal</title>
    
    <!-- Firebase Legacy SDK (Optimized for Speed) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --apple-blue: #0A84FF;
            --apple-green: #30D158;
            --danger: #FF453A;
            --warning: #FF9F0A;
            --bg: #000000;
            --card-bg: rgba(28, 28, 30, 0.65);
            --border: rgba(255, 255, 255, 0.1);
            --text-sec: #8E8E93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1c1c1e 0%, #000 70%);
            color: white;
            margin: 0;
            padding: calc(20px + env(safe-area-inset-top)) 16px 120px 16px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 450px; margin: auto; }

        /* Clock & Header */
        .status-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .time-group h2 { font-size: 42px; margin: 0; font-weight: 800; letter-spacing: -2px; }
        .time-group p { margin: 0; color: var(--apple-blue); font-weight: 700; font-size: 12px; text-transform: uppercase; }

        .streak-pill {
            background: rgba(255, 159, 10, 0.15);
            border: 1px solid rgba(255, 159, 10, 0.3);
            padding: 8px 14px; border-radius: 40px;
            display: flex; align-items: center; gap: 6px; color: var(--warning);
        }

        /* Modern Card Styling */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 22px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        h3 { font-size: 11px; margin: 0 0 18px 0; color: var(--text-sec); letter-spacing: 1.5px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }

        /* Strict Days Row */
        .strict-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .strict-row::-webkit-scrollbar { display: none; }
        .strict-item {
            min-width: 80px; background: rgba(255, 69, 58, 0.1); border: 1px solid rgba(255, 69, 58, 0.2);
            border-radius: 18px; padding: 12px 5px; text-align: center;
        }
        .strict-item b { font-size: 20px; display: block; }
        .strict-item small { font-size: 10px; color: var(--danger); font-weight: 700; }

        /* Punch Button */
        .btn-punch {
            background: #fff; color: #000; width: 100%; padding: 18px; border-radius: 18px;
            font-size: 17px; font-weight: 800; border: none; transition: 0.3s;
            box-shadow: 0 10px 25px rgba(255,255,255,0.1);
        }
        .btn-punch:disabled { background: var(--apple-green); color: white; opacity: 0.8; }
        
        /* Stats & Inputs */
        .stat-val { font-size: 28px; font-weight: 800; display: block; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--apple-blue); transition: 1s ease; }

        .input-box {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 15px; padding: 14px; margin-bottom: 10px; display: flex; align-items: center;
        }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }

        /* List Items */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .avatar { width: 32px; height: 32px; background: #3a3a3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--apple-blue); }

        /* Navigation */
        .nav-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 15px; display: flex; justify-content: space-around;
            border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .nav-bar i { font-size: 20px; color: var(--text-sec); }
        .nav-bar i.active { color: var(--apple-blue); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .warning-text { color: var(--danger); font-size: 11px; text-align: center; font-weight: 700; animation: pulse 2s infinite; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-header">
        <div class="time-group">
            <p id="header-date">--</p>
            <h2 id="clock">00:00</h2>
        </div>
        <div class="streak-pill">
            <i class="fas fa-fire"></i> <span id="streak-count">0</span>
        </div>
    </div>

    <div style="margin-bottom: 30px;">
        <h1 id="welcome-msg" style="margin:0; font-size: 26px;">Hi, Staff</h1>
        <small style="color: var(--text-sec);">Terminal Session Active</small>
    </div>

    <!-- STRICT DAYS -->
    <div class="card" id="strict-card" style="display:none; border-color: rgba(255,69,58,0.2);">
        <h3><i class="fas fa-calendar-check"></i> Mandatory Work Days</h3>
        <div class="strict-row" id="strict-list"></div>
    </div>

    <!-- MAIN ACTION -->
    <div class="card">
        <h3><i class="fas fa-chart-line"></i> Performance</h3>
        <div style="display: flex; justify-content: space-between;">
            <div>
                <small style="color: var(--text-sec); font-size: 10px;">TOTAL EARNED</small>
                <span class="stat-val" id="total-earning">₹0</span>
            </div>
            <div style="text-align: right;">
                <small style="color: var(--text-sec); font-size: 10px;">CYCLE STATUS</small>
                <div id="cycle-info" style="color: var(--apple-blue); font-weight: 700; font-size: 13px; margin-top: 5px;">--</div>
            </div>
        </div>
        
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>

        <button id="att-btn" class="btn-punch" onclick="markAttendance()">PUNCH IN</button>
        <div id="strict-warn" class="warning-text">⚠️ ATTENDANCE COMPULSORY TODAY</div>
    </div>

    <!-- STUDENTS -->
    <div class="card">
        <h3><i class="fas fa-users"></i> Student Traffic ( <span id="student-count">0</span> )</h3>
        <div id="student-list"></div>
    </div>

    <!-- LEADS -->
    <div class="card" id="lead-box">
        <h3><i class="fas fa-user-plus"></i> Lead Drop</h3>
        <div class="input-box"><i class="fas fa-user"></i><input type="text" id="l-name" placeholder="Full Name"></div>
        <div class="input-box"><i class="fab fa-whatsapp"></i><input type="tel" id="l-phone" placeholder="WhatsApp Number"></div>
        <div class="input-box"><i class="fas fa-book"></i><input type="text" id="l-course" placeholder="Interest"></div>
        <button class="btn-punch" style="background: var(--apple-blue); color: white;" onclick="submitLead()">SUBMIT LEAD</button>
    </div>
</div>

<div class="nav-bar">
    <i class="fas fa-home active"></i>
    <i class="fas fa-plus-square" onclick="document.getElementById('lead-box').scrollIntoView({behavior:'smooth'})"></i>
    <i class="fas fa-power-off" onclick="logout()"></i>
</div>

<script>
    // Config
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();  
    const fs = firebase.firestore(); 

    const staffId = localStorage.getItem('bt_staff_id');
    const staffName = localStorage.getItem('bt_staff_name') || "User";
    const todayStr = new Date().toISOString().split('T')[0];

    if(!staffId) window.location.href = "index.html";

    // UI Updates
    function updateClock() {
        const d = new Date();
        document.getElementById('clock').innerText = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        document.getElementById('header-date').innerText = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function init() {
        document.getElementById('welcome-msg').innerText = `Hi, ${staffName.split(' ')[0]}`;

        // 1. Check Attendance
        db.ref(`attendance/${staffId}/${todayStr}`).on('value', snap => {
            if(snap.exists()) {
                const btn = document.getElementById('att-btn');
                btn.disabled = true;
                btn.innerText = "PUNCHED IN";
            }
        });

        // 2. Strict Days Logic
        db.ref('strictDays').on('value', snap => {
            const list = document.getElementById('strict-list');
            if(snap.exists()) {
                document.getElementById('strict-card').style.display = "block";
                list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    const dt = new Date(d);
                    if(d === todayStr) document.getElementById('strict-warn').style.display = "block";
                    list.innerHTML += `<div class="strict-item"><b>${dt.getDate()}</b><small>${dt.toLocaleDateString('en-US',{month:'short'})}</small></div>`;
                });
            }
        });

        // 3. Stats & Salary
        db.ref(`staff/${staffId}`).on('value', snap => {
            const v = snap.val() || {};
            document.getElementById('total-earning').innerText = `₹${v.salary || 0}`;
            document.getElementById('streak-count').innerText = v.streak || 0;
            const prog = ((v.salary || 0) / ((v.perDayWage || 500) * 25)) * 100;
            document.getElementById('progress-fill').style.width = Math.min(prog, 100) + "%";
        });

        // Cycle Info
        const now = new Date();
        const daysLeft = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() - now.getDate();
        document.getElementById('cycle-info').innerText = `${daysLeft}d REMAINING`;

        listenStudents();
    }

    async function markAttendance() {
        const btn = document.getElementById('att-btn');
        btn.innerText = "SYNCING...";
        
        db.ref(`attendance/${staffId}/${todayStr}`).set({
            time: new Date().toLocaleTimeString(),
            status: "Present",
            name: staffName
        }).then(() => {
            db.ref(`staff/${staffId}`).transaction(s => {
                if (s) {
                    s.salary = (parseInt(s.salary) || 0) + (parseInt(s.perDayWage) || 500);
                    s.streak = (parseInt(s.streak) || 0) + 1;
                }
                return s;
            });
        });
    }

    function listenStudents() {
        fs.collection("attendance").where("date", "==", todayStr).onSnapshot(snap => {
            const list = document.getElementById('student-list');
            document.getElementById('student-count').innerText = snap.size;
            list.innerHTML = snap.empty ? '<p style="text-align:center; opacity:0.3; font-size:12px;">Waiting for arrivals...</p>' : '';
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="list-item">
                        <div style="display:flex; align-items:center; gap:12px">
                            <div class="avatar">${d.userName.charAt(0)}</div>
                            <span style="font-weight:600; font-size:14px;">${d.userName}</span>
                        </div>
                        <i class="fab fa-whatsapp" style="color:var(--apple-green); font-size:18px;" onclick="window.open('https://wa.me/91${d.userPhone}')"></i>
                    </div>`;
            });
        });
    }

    function submitLead() {
        const n = document.getElementById('l-name').value, p = document.getElementById('l-phone').value, c = document.getElementById('l-course').value;
        if(n && p) {
            db.ref('leads').push({ name: n, phone: p, course: c, staff: staffName, timestamp: Date.now() }).then(() => {
                alert("Lead Logged!");
                document.querySelectorAll('input').forEach(i => i.value = "");
            });
        }
    }

    function logout() {
        if(confirm("Exit Terminal?")) { localStorage.clear(); window.location.href = "index.html"; }
    }

    init();
</script>
</body>
</html>
