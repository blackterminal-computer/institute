<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staff Terminal | Black Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --apple-blue: #0A84FF; --apple-green: #30D158; --apple-red: #FF453A;
            --apple-orange: #FF9F0A; --cyber-purple: #BF5AF2; --bg: #06060A;
            --glass: rgba(16, 16, 24, 0.7); --border: rgba(255, 255, 255, 0.06);
            --text-main: #FFFFFF; --text-muted: #8E8E93;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px 16px; min-height: 100vh; }
        .container { max-width: 455px; margin: auto; }

        /* --- SALMAN KHAN BRAND AMBASSADOR BANNER --- */
        .ambassador-banner {
            background: linear-gradient(135deg, #101018 0%, #1a1a2e 100%);
            border: 1px solid rgba(10, 132, 255, 0.3); border-radius: 16px;
            padding: 12px 16px; margin-bottom: 22px; height: 85px;
            position: relative; display: flex; align-items: center; overflow: hidden;
        }
        .banner-content { z-index: 2; width: 60%; }
        .banner-tag { font-size: 9px; font-weight: 800; color: var(--apple-blue); text-transform: uppercase; margin-bottom: 4px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .banner-title { font-size: 15px; font-weight: 800; color: #FFF; margin: 2px 0; animation: blink 1.5s infinite; }
        .ambassador-img { position: absolute; right: 0; bottom: 0; height: 110%; z-index: 1; pointer-events: none; }

        /* --- EXISTING STYLES --- */
        .header { margin: 15px 0 24px 0; position: relative; }
        .card { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 18px; border: 1px solid var(--border); }
        .btn { width: 100%; padding: 15px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; }
        .btn-punch { background: linear-gradient(135deg, var(--apple-blue) 0%, #0056B3 100%); color: white; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 14px; color: white; box-sizing: border-box; }
    </style>
</head>
<body>
<div class="container">
    
    <!-- Salman Khan Banner -->
    <div class="ambassador-banner animate__animated animate__fadeIn">
        <div class="banner-content">
            <div class="banner-tag"><i class="fas fa-star"></i> OFFICIAL BRAND AMBASSADOR</div>
            <h4 class="banner-title">Swag Se Punch In Karo!</h4>
            <p style="font-size: 10px; color: #AEAEB2; margin: 0;">Earn continuous payouts daily.</p>
        </div>
        <img src="https://i.ibb.co/RrHyVyr/salman-khan.png" alt="Salman Khan" class="ambassador-img">
    </div>

    <!-- Header & Original Cards remain unchanged below -->
    <div class="header animate__animated animate__fadeIn">
        <p id="current-date">--</p>
        <h1 id="user-display">Staff Terminal</h1>
    </div>

    <!-- ... (Baaki pura original code yahan rahega) ... -->
    
    <!-- (Note: Maine yahan place-holder rakha hai, aap apna original HTML yahan paste rakhein) -->
    
</div>
</body>
</html>
