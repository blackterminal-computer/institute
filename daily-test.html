<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Terminal Exam</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --primary: #8b5cf6; --secondary: #ec4899; --accent: #22d3ee; --bg: #030712; --glass: rgba(17, 24, 39, 0.7); --success: #22c55e; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }
        body { background: radial-gradient(circle at top right, #1e1b4b, #030712); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { width: 100%; max-width: 650px; background: var(--glass); padding: 40px; border-radius: 30px; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
        .opt { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; cursor: pointer; text-align: center; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .opt:hover { border-color: var(--primary); }
        .correct { background: var(--success) !important; }
        .wrong { background: var(--danger) !important; }
        .btn-primary { width: 100%; margin-top: 30px; padding: 18px; border-radius: 16px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; cursor: pointer; font-weight: 800; }
        .btn-primary:disabled { opacity: 0.2; }
    </style>
</head>
<body>

    <div class="card" id="examBox">
        <div id="q-num" style="color: var(--accent); font-weight: 800; font-size: 12px;">LOADING...</div>
        <h3 id="q" style="margin: 20px 0;"></h3>
        <div class="options-grid" id="options"></div>
        <button id="nextBtn" class="btn-primary" disabled>NEXT SEQUENCE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({ apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI", projectId: "black-terminal-f2c91" }));
        
        // 30 Questions in the exact format required
        const questions = [
            {question: "What does CPU stand for?", a: "Central Process Unit", b: "Central Processing Unit", c: "Core Processing Unit", d: "Central Power Unit", correct: "B"},
            {question: "Which language is for web styling?", a: "HTML", b: "CSS", c: "Python", d: "SQL", correct: "B"},
            {question: "What does RAM stand for?", a: "Random Access Memory", b: "Read Access Memory", c: "Run Access Memory", d: "Rapid Access Memory", correct: "A"},
            {question: "Which company created Java?", a: "Microsoft", b: "Oracle", c: "Sun Microsystems", d: "Google", correct: "C"},
            {question: "Which of these is a database?", a: "React", b: "MongoDB", c: "Express", d: "Node", correct: "B"},
            {question: "What is the default port for HTTP?", a: "21", b: "80", c: "443", d: "22", correct: "B"},
            {question: "Which protocol is secure?", a: "HTTP", b: "HTTPS", c: "FTP", d: "SMTP", correct: "B"},
            {question: "What is the 'Brain' of a computer?", a: "GPU", b: "RAM", c: "CPU", d: "ROM", correct: "C"},
            {question: "Which tag is for a hyperlink?", a: "<a>", b: "<link>", c: "<url>", d: "<href>", correct: "A"},
            {question: "What is Git?", a: "IDE", b: "Compiler", c: "Version Control", d: "Database", correct: "C"},
            {question: "Which is a programming language?", a: "HTML", b: "CSS", c: "Python", d: "JSON", correct: "C"},
            {question: "What does API stand for?", a: "App Program Interface", b: "Application Programming Interface", c: "Applied Protocol Integration", d: "Auto Process Input", correct: "B"},
            {question: "Which tag is for the biggest heading?", a: "<h1>", b: "<h6>", c: "<header>", d: "<head>", correct: "A"},
            {question: "What is used to style web pages?", a: "HTML", b: "CSS", c: "XML", d: "SQL", correct: "B"},
            {question: "Symbol for single-line comments in JS?", a: "//", b: "/*", c: "##", d: "--", correct: "A"},
            {question: "What does DNS stand for?", a: "Data Name System", b: "Domain Name System", c: "Digital Network Service", d: "Dynamic Name Storage", correct: "B"},
            {question: "Which is a client-side language?", a: "PHP", b: "Python", c: "JavaScript", d: "Ruby", correct: "C"},
            {question: "What is a loop in programming?", a: "Error", b: "Variable", c: "Control flow", d: "Function", correct: "C"},
            {question: "Which OS is Linux-based?", a: "Windows", b: "macOS", c: "Android", d: "iOS", correct: "C"},
            {question: "What does JSON stand for?", a: "Java Object Notation", b: "JavaScript Object Notation", c: "Joint System Object Node", d: "None", correct: "B"},
            {question: "Which command lists files in Linux?", a: "dir", b: "ls", c: "list", d: "show", correct: "B"},
            {question: "What is an IDE?", a: "Input Device Engine", b: "Integrated Development Environment", c: "Internal Data Entry", d: "None", correct: "B"},
            {question: "Which tag is for a list item?", a: "<li>", b: "<ul>", c: "<ol>", d: "<list>", correct: "A"},
            {question: "What is 'npm'?", a: "Node Process Manager", b: "Node Package Manager", c: "New Program Module", d: "None", correct: "B"},
            {question: "Which is not a browser?", a: "Chrome", b: "Firefox", c: "Python", d: "Safari", correct: "C"},
            {question: "Which is a backend framework?", a: "React", b: "Angular", c: "Express", d: "Vue", correct: "C"},
            {question: "What does SQL stand for?", a: "Structured Query Language", b: "Simple Query Layer", c: "System Query Level", d: "Standard Query List", correct: "A"},
            {question: "Which key refreshes a browser?", a: "F5", b: "F1", c: "F12", d: "Esc", correct: "A"},
            {question: "What is a 'Bug'?", a: "Hardware", b: "Error", c: "Software", d: "Virus", correct: "B"},
            {question: "What does URL stand for?", a: "Uniform Resource Locator", b: "United Resource Link", c: "Universal Record Locator", d: "None", correct: "A"}
        ];

        let index = 0, locked = false;
        const student = localStorage.getItem("studentName") || "Root_User";

        // Lock Logic
        if (localStorage.getItem("daily_done_" + student) === new Date().toDateString()) {
            document.getElementById("examBox").innerHTML = `<h2>TERMINAL LOCKED</h2><p>Come back tomorrow.</p>`;
        } else {
            showQ();
        }

        function showQ() {
            if (index >= questions.length) return finish();
            locked = false;
            document.getElementById("nextBtn").disabled = true;
            const q = questions[index];
            document.getElementById("q-num").innerText = `SEQUENCE ${index + 1} / ${questions.length}`;
            document.getElementById("q").innerText = q.question;
            document.getElementById("options").innerHTML = ['A','B','C','D'].map(id => `
                <div class="opt" onclick="window.select('${id}', this)">${q[id.toLowerCase()]}</div>
            `).join('');
        }

        window.select = (v, el) => {
            if (locked) return;
            locked = true;
            if (v === questions[index].correct) el.classList.add("correct");
            else el.classList.add("wrong");
            document.getElementById("nextBtn").disabled = false;
        };

        document.getElementById("nextBtn").onclick = () => { index++; showQ(); };

        async function finish() {
            localStorage.setItem("daily_done_" + student, new Date().toDateString());
            try { await updateDoc(doc(db, "students", student), { xp: increment(100) }); } catch(e) {}
            document.getElementById("examBox").innerHTML = `<h2>SYNC COMPLETE</h2><p>100XP Added.</p>`;
            confetti();
        }
    </script>
</body>
</html>
