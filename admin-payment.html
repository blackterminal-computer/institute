<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BT | Smart Fee Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .admin-box { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); max-width: 450px; margin: 40px auto; backdrop-filter: blur(10px); }
        h2 { text-align: center; color: #6366f1; margin-bottom: 25px; font-size: 24px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        select, input { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #1e293b; background: #0f172a; color: white; font-size: 15px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-paid { background: linear-gradient(90deg, #22c55e, #16a34a); color: white; }
        .btn-unpaid { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .info-note { font-size: 11px; color: #64748b; margin-top: 15px; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2><i class="ri-shield-user-line"></i> Fee Manager</h2>
        
        <label>Select Student ID</label>
        <select id="studentList">
            <option value="">Loading students...</option>
        </select>
        
        <label>Month</label>
        <input type="text" id="targetMonth" value="February 2026">

        <button class="btn btn-paid" onclick="processFee('Paid')">MARK AS PAID & PROCESS XP</button>
        <button class="btn btn-unpaid" onclick="processFee('Pending')">MARK AS PENDING (-200 XP)</button>

        <div class="info-note">
            <b>XP Logic:</b><br>
            1-10 Tarik: +100 XP Bonus <br>
            After 10th: -200 XP Penalty
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Dropdown mein Students Load karna ---
        async function loadStudents() {
            const dropdown = document.getElementById('studentList');
            const querySnapshot = await getDocs(collection(db, "students"));
            dropdown.innerHTML = '<option value="">-- Choose Student --</option>';
            
            querySnapshot.forEach((doc) => {
                const option = document.createElement('option');
                option.value = doc.id;
                option.textContent = doc.id; // Student Name/ID
                dropdown.appendChild(option);
            });
        }

        // --- Fee & XP Processing ---
        window.processFee = async (status) => {
            const studentId = document.getElementById('studentList').value;
            const month = document.getElementById('targetMonth').value;
            const today = new Date().getDate(); // Aaj ki tarik (1-31)

            if(!studentId) return alert("Bhai, pehle student toh select karo!");

            try {
                const sRef = doc(db, "students", studentId);
                let xpChange = 0;

                if(status === 'Paid') {
                    // Logic: 1-10 tarik tak +100, uske baad -200
                    if(today <= 10) {
                        xpChange = 100;
                        alert("Time par payment! +100 XP Reward diya gaya.");
                    } else {
                        xpChange = -200;
                        alert("Late payment! -200 XP Penalty lag gayi.");
                    }
                } else {
                    // Pending status par seedha penalty
                    xpChange = -200;
                    alert("Status Pending: -200 XP Penalty apply ho gayi.");
                }

                await updateDoc(sRef, {
                    paymentStatus: status,
                    lastPaymentMonth: month,
                    xp: increment(xpChange)
                });

                alert("Database Updated Successfully!");
            } catch (e) {
                console.error(e);
                alert("Kucch gadbad hui! Database check karein.");
            }
        };

        loadStudents();
    </script>
</body>
</html>
