<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Elite Admin Console v9</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1);
            --success: #22c55e; --danger: #ef4444;
        }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; max-width: 1200px; margin: 20px auto; }
        
        .admin-box { 
            background: var(--glass); padding: 22px; border-radius: 24px; 
            border: 1px solid var(--glass-border); backdrop-filter: blur(10px);
        }

        h2 { color: var(--primary); margin: 0 0 15px 0; font-size: 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        
        select, input, textarea { 
            width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; 
            border: 1px solid #1e293b; background: #0f172a; color: white; font-size: 13px; outline: none; box-sizing: border-box;
        }

        .btn { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 800; 
            cursor: pointer; transition: 0.2s; font-size: 11px; text-transform: uppercase;
        }
        .btn-course { background: var(--primary); color: white; }
        .btn-paid { background: var(--success); color: #052e16; }
        .btn-unpaid { background: var(--danger); color: white; }
        .btn-create { background: #facc15; color: black; margin-bottom: 15px; }
        
        .info-tag { font-size: 10px; color: #94a3b8; background: #1e293b; padding: 5px 10px; border-radius: 8px; margin-bottom: 15px; display: inline-block; }
    </style>
</head>
<body>

    <div style="text-align: center; margin-top: 20px;">
        <h1 style="font-size: 24px; font-weight: 800; margin: 0;">BT Admin Console</h1>
        <p style="color: #64748b; font-size: 12px;">Master Control for Student Data</p>
    </div>

    <div class="admin-grid">
        <div class="admin-box" style="grid-column: 1 / -1;">
            <h2><i class="ri-user-add-line"></i> Step 1: Select or Create Student</h2>
            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; align-items: end;">
                <div>
                    <label>Existing Students</label>
                    <select id="studentList" style="margin-bottom:0;"><option>Loading students...</option></select>
                </div>
                <div>
                    <label>New ID</label>
                    <input type="text" id="newRegName" placeholder="Student ID" style="margin-bottom: 0;">
                </div>
                <div>
                    <label>Adm. Date</label>
                    <input type="date" id="admDate" style="margin-bottom: 0;">
                </div>
                <button class="btn btn-create" style="width: auto; margin-bottom: 0;" onclick="createNewStudent()">Register</button>
            </div>
        </div>

        <div class="admin-box">
            <h2><i class="ri-book-open-line"></i> Course Details</h2>
            <label>Course Name</label>
            <select id="courseSelect">
                <option value="">-- Choose Course --</option>
                <option value="Tally ERP 9">Tally ERP 9</option>
                <option value="PGDCA">PGDCA</option>
                <option value="DCA">DCA</option>
            </select>
            <input type="text" id="newCourseName" placeholder="Or type naya course name...">

            <label>Duration</label>
            <select id="courseDuration">
                <option value="1 Month">1 Month</option>
                <option value="2 Months">2 Months</option>
                <option value="3 Months">3 Months</option>
                <option value="6 Months">6 Months</option>
                <option value="12 Months">12 Months</option>
            </select>
            <button class="btn btn-course" onclick="assignCourse()">Assign Course</button>
        </div>

        <div class="admin-box">
            <h2><i class="ri-money-dollar-circle-line"></i> Fee & XP System</h2>
            <div class="info-tag">Rule: 1-10 Date (+100 XP) | Late (-200 XP)</div>
            
            <label>Month Name</label>
            <input type="text" id="targetMonth" value="February 2026">

            <label>Fee Amount</label>
            <input type="number" id="feeAmt" placeholder="Amount (e.g. 500)" value="500">

            <div style="display: flex; gap: 10px;">
                <button class="btn btn-paid" onclick="processFee('Paid')">Mark Paid</button>
                <button class="btn btn-unpaid" onclick="processFee('Pending')">Pending</button>
            </div>

            <label style="margin-top: 15px;">Manual XP Adjust</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="manualXP" placeholder="Amount" style="margin-bottom:0;">
                <button class="btn btn-course" style="width:80px;" onclick="adjustXP()">Add</button>
            </div>
        </div>

        <div class="admin-box">
            <h2><i class="ri-notification-3-line"></i> Personal Alert</h2>
            <textarea id="popupMsg" rows="3" placeholder="Message for student dashboard..."></textarea>
            
            <div style="display: flex; gap: 10px;">
                <div style="flex:1">
                    <label>Alert Style</label>
                    <select id="popupType">
                        <option value="info">Info (Blue)</option>
                        <option value="success">Success (Green)</option>
                        <option value="warning">Warning (Gold)</option>
                        <option value="danger">Danger (Red)</option>
                    </select>
                </div>
                <div style="flex:1">
                    <label>Duration</label>
                    <select id="popupDuration">
                        <option value="5000">5 Sec</option>
                        <option value="10000" selected>10 Sec</option>
                        <option value="30000">30 Sec</option>
                        <option value="999999">Until Closed</option>
                    </select>
                </div>
            </div>
            
            <button class="btn btn-course" style="background: var(--accent); color: #083344;" onclick="sendPopup()">Send Now</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, updateDoc, setDoc, increment, collection, getDocs, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Load List ---
        async function loadStudents() {
            const list = document.getElementById('studentList');
            try {
                const snap = await getDocs(collection(db, "students"));
                list.innerHTML = '<option value="">-- Select Student --</option>';
                snap.forEach(d => { list.innerHTML += `<option value="${d.id}">${d.id}</option>`; });
            } catch (e) { console.error(e); }
        }

        // --- Register New Student ---
        window.createNewStudent = async () => {
            const name = document.getElementById('newRegName').value.trim();
            const date = document.getElementById('admDate').value;
            if(!name) return alert("Naam likho!");
            
            await setDoc(doc(db, "students", name), {
                xp: 0,
                streak: 0,
                paymentStatus: "Pending",
                bio: "New Student at Black Terminal",
                admissionDate: date || "Not Set",
                history: []
            }, { merge: true });
            
            alert("Student Created!");
            loadStudents();
        };

        // --- Assign Course ---
        window.assignCourse = async () => {
            const id = document.getElementById('studentList').value;
            const course = document.getElementById('newCourseName').value || document.getElementById('courseSelect').value;
            const dur = document.getElementById('courseDuration').value;
            
            if(!id || !course) return alert("Student aur Course select karein!");

            await updateDoc(doc(db, "students", id), {
                currentCourse: course,
                courseDuration: dur
            });
            alert("Course Assigned!");
        };

        // --- Process Payment ---
        window.processFee = async (status) => {
            const id = document.getElementById('studentList').value;
            const month = document.getElementById('targetMonth').value;
            const amt = document.getElementById('feeAmt').value;
            const dateObj = new Date();
            const date = dateObj.getDate();
            const fullDate = dateObj.toLocaleDateString();

            if(!id) return alert("Student select karein!");

            let xp = (status === 'Paid') ? (date <= 10 ? 100 : -200) : -200;

            const updatePayload = {
                paymentStatus: status,
                lastPaymentMonth: month,
                xp: increment(xp)
            };

            // Paid hone par history mein add karein
            if(status === 'Paid') {
                updatePayload.history = arrayUnion({
                    month: month,
                    amount: amt,
                    date: fullDate
                });
            }

            await updateDoc(doc(db, "students", id), updatePayload);
            alert(`Updated! XP Change: ${xp}`);
        };

        // --- Manual XP ---
        window.adjustXP = async () => {
            const id = document.getElementById('studentList').value;
            const val = parseInt(document.getElementById('manualXP').value);
            if(!id || isNaN(val)) return alert("Missing details!");
            await updateDoc(doc(db, "students", id), { xp: increment(val) });
            alert("XP Updated!");
        };

        // --- Popup ---
        window.sendPopup = async () => {
            const id = document.getElementById('studentList').value;
            const msg = document.getElementById('popupMsg').value;
            const type = document.getElementById('popupType').value;
            const duration = document.getElementById('popupDuration').value;
            
            if(!id || !msg) return alert("Details missing!");

            await updateDoc(doc(db, "students", id), {
                popup: { 
                    msg, 
                    type, 
                    show: true, 
                    time: Date.now(),
                    duration: parseInt(duration) 
                }
            });
            alert("Popup sent to student!");
        };

        loadStudents();
    </script>
</body>
</html>
