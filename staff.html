<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Staff Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --apple-blue: #007AFF;
            --bg-color: #000000;
            --card-bg: rgba(28, 28, 30, 0.7);
            --input-bg: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-sec: #8E8E93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1c1c1e, #000000);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 85%;
            max-width: 360px;
            padding: 40px 24px;
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 38px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        .logo-area {
            margin-bottom: 40px;
        }

        .logo-area h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .logo-area p {
            color: var(--text-sec);
            font-size: 13px;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 18px;
            margin-bottom: 12px;
            background: var(--input-bg);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px; /* Prevents iOS zoom on focus */
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 2px var(--apple-blue);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
            margin-top: 10px;
        }

        .btn-main {
            background-color: var(--apple-blue);
            color: white;
        }

        .btn:active {
            transform: scale(0.97);
            opacity: 0.8;
        }

        .toggle-link {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-sec);
            cursor: pointer;
            display: block;
        }

        .toggle-link b {
            color: var(--apple-blue);
            font-weight: 500;
        }

        /* Smooth UI Transitions */
        #login-ui, #register-ui {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <h1>Black Terminal</h1>
        <p>Staff Portal</p>
    </div>

    <div id="login-ui">
        <div class="input-group">
            <input type="tel" id="login-phone" placeholder="Mobile Number" inputmode="tel">
            <input type="password" id="login-pass" placeholder="Passcode">
        </div>
        <button class="btn btn-main" onclick="handleLogin()">Sign In</button>
        <span class="toggle-link" onclick="toggleAuth(true)">New here? <b>Create Account</b></span>
    </div>

    <div id="register-ui" style="display:none;">
        <div class="input-group">
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="tel" id="reg-phone" placeholder="Mobile Number" inputmode="tel">
            <input type="password" id="reg-pass" placeholder="6-Digit Passcode" maxlength="6" inputmode="numeric">
        </div>
        <button class="btn btn-main" onclick="handleRegister()">Register</button>
        <span class="toggle-link" onclick="toggleAuth(false)">Already have access? <b>Login</b></span>
    </div>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function toggleAuth(isReg) {
        document.getElementById('login-ui').style.display = isReg ? 'none' : 'block';
        document.getElementById('register-ui').style.display = isReg ? 'block' : 'none';
    }

    function handleRegister() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const pass = document.getElementById('reg-pass').value;

        if(!name || !phone || pass.length < 4) {
            alert("Please fill all details correctly.");
            return;
        }

        db.ref('staff').orderByChild('phone').equalTo(phone).once('value', snap => {
            if(snap.exists()) {
                alert("Number already registered!");
            } else {
                db.ref('staff').push({
                    name: name,
                    phone: phone,
                    passcode: pass,
                    salary: 0,
                    joinedOn: Date.now()
                }).then(() => {
                    alert("Registration Successful!");
                    toggleAuth(false);
                });
            }
        });
    }

    function handleLogin() {
        const phone = document.getElementById('login-phone').value;
        const pass = document.getElementById('login-pass').value;

        db.ref('staff').orderByChild('phone').equalTo(phone).once('value', snap => {
            if(snap.exists()) {
                let userFound = false;
                snap.forEach(child => {
                    if(child.val().passcode === pass) {
                        userFound = true;
                        localStorage.setItem('bt_staff_id', child.key);
                        localStorage.setItem('bt_staff_name', child.val().name);
                        window.location.href = "home.html";
                    }
                });
                if(!userFound) alert("Invalid Passcode");
            } else {
                alert("User not found");
            }
        });
    }
</script>
</body>
</html>
