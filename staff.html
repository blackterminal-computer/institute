<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | Black Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --apple-blue: #007AFF;
            --bg: #000000;
            --card-bg: rgba(28, 28, 30, 0.7);
            --text-sec: #8E8E93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1c1c1e, #000000);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 380px; padding: 20px; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 38px;
            padding: 40px 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .logo-area h1 { font-size: 26px; margin: 0; font-weight: 700; letter-spacing: -1px; }
        .logo-area p { color: var(--apple-blue); font-size: 13px; margin: 5px 0 30px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }

        input {
            width: 100%; padding: 18px; margin-bottom: 12px; 
            background: rgba(255, 255, 255, 0.08);
            border: none; border-radius: 16px; color: white; 
            font-size: 16px; outline: none; box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { background: rgba(255, 255, 255, 0.12); box-shadow: 0 0 0 2px var(--apple-blue); }

        .btn {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            font-size: 17px; font-weight: 600; cursor: pointer; transition: 0.2s;
            margin-top: 10px;
        }
        .btn-main { background: var(--apple-blue); color: white; }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }

        .toggle-link { margin-top: 25px; font-size: 14px; color: var(--text-sec); display: block; cursor: pointer; }
        .toggle-link b { color: var(--apple-blue); }

        #login-box, #signup-box { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="logo-area">
            <h1>Black Terminal</h1>
            <p>Staff Portal</p>
        </div>

        <div id="login-box">
            <input type="tel" id="login-phone" placeholder="Mobile Number" inputmode="tel">
            <input type="password" id="login-pass" placeholder="Passcode">
            <button class="btn btn-main" onclick="handleLogin()">Sign In</button>
            <span class="toggle-link" onclick="toggleAuth(true)">New member? <b>Create Account</b></span>
        </div>

        <div id="signup-box" style="display: none;">
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="tel" id="reg-phone" placeholder="Mobile Number" inputmode="tel">
            <input type="password" id="reg-pass" placeholder="Create Passcode">
            <button class="btn btn-main" onclick="handleRegister()">Register</button>
            <span class="toggle-link" onclick="toggleAuth(false)">Have an account? <b>Login</b></span>
        </div>
    </div>
</div>

<script>
    // Firebase Config (Aapka same config)
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function toggleAuth(isSignup) {
        document.getElementById('login-box').style.display = isSignup ? 'none' : 'block';
        document.getElementById('signup-box').style.display = isSignup ? 'block' : 'none';
    }

    // --- Signup Logic ---
    function handleRegister() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const pass = document.getElementById('reg-pass').value;

        if(!name || !phone || !pass) return alert("Please fill all fields");

        db.ref('staff').orderByChild('phone').equalTo(phone).once('value', snap => {
            if(snap.exists()) {
                alert("Mobile number already registered!");
            } else {
                db.ref('staff').push({
                    name: name,
                    phone: phone,
                    passcode: pass,
                    salary: 0,
                    perDayWage: 500, // Default wage
                    joinedOn: Date.now()
                }).then(() => {
                    alert("Registration Success! Please Login.");
                    toggleAuth(false);
                });
            }
        });
    }

    // --- Login Logic & Redirect ---
    function handleLogin() {
        const phone = document.getElementById('login-phone').value;
        const pass = document.getElementById('login-pass').value;

        if(!phone || !pass) return alert("Enter credentials");

        db.ref('staff').orderByChild('phone').equalTo(phone).once('value', snap => {
            if(snap.exists()) {
                let success = false;
                snap.forEach(child => {
                    const user = child.val();
                    if(user.passcode === pass) {
                        success = true;
                        // Save session
                        localStorage.setItem('bt_staff_id', child.key);
                        localStorage.setItem('bt_staff_name', user.name);
                        
                        // Redirect to staffindex.html
                        window.location.href = "staffindex.html";
                    }
                });
                if(!success) alert("Wrong Passcode!");
            } else {
                alert("User not found!");
            }
        });
    }
</script>

</body>
</html>
