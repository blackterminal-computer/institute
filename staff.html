<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Terminal | BlackTerminal 2.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #00d4ff; 
            --bg: #0b0f15; 
            --card: #161b22; 
            --text: #e6edf3; 
            --success: #238636; 
            --border: rgba(255,255,255,0.1);
            --accent: #f2994a;
            --danger: #ff4d4d;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; padding: 20px; line-height: 1.5; }
        .app-container { width: 100%; max-width: 450px; }
        .glass-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; position: relative; overflow: hidden; }
        
        .step { display: none; } 
        .active { display: block; animation: fadeIn 0.4s ease-in-out; }
        
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; box-sizing: border-box; font-size: 1rem; transition: 0.2s; }
        input { background: #0d1117; color: white; border: 1px solid #30363d; }
        input:focus { border-color: var(--primary); outline: none; }
        
        .btn-premium { background: linear-gradient(135deg, #00d4ff, #0072ff); color: white; font-weight: 600; cursor: pointer; }
        .btn-premium:disabled { background: #30363d !important; cursor: not-allowed; opacity: 0.7; color: #8b949e; }

        .dp-box { width: 120px; height: 120px; border-radius: 50%; border: 2px dashed #30363d; margin: 0 auto 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .dp-box img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        .task-alert { 
            background: linear-gradient(135deg, #f2994a, #f2c94c); 
            color: #000; padding: 15px; border-radius: 15px; 
            margin-bottom: 20px; display: none;
            animation: shake 0.5s ease-in-out infinite;
        }

        .batch-badge { background: #0d1117; padding: 10px; border-radius: 12px; border: 1px solid #333; text-align: center; flex: 1; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <header style="text-align: center; margin-bottom: 30px;">
        <h1 style="margin:0; font-size: 1.8rem; letter-spacing: 1px;">BLACK<span style="color:var(--primary)">TERMINAL</span></h1>
        <small style="color: #8b949e; text-transform: uppercase;">Staff Interface V2.0</small>
    </header>

    <div id="task-box" class="task-alert">
        <h4 style="margin:0">📢 ADMIN BROADCAST</h4>
        <p id="task-text" style="margin: 8px 0; font-size: 0.9rem; font-weight: bold;"></p>
        <button onclick="acceptTask()" style="background:#000; color:#fff; padding:8px; margin:0; font-size:0.8rem; width: auto;">Confirm & Accept</button>
    </div>

    <div id="step1" class="glass-card step active">
        <h3>Staff Authentication</h3>
        <input type="text" id="staff_name" placeholder="Full Name">
        <button class="btn-premium" onclick="validateStep1()">Verify Identity</button>
    </div>

    <div id="step2" class="glass-card step">
        <h3>Identity Verification</h3>
        <div class="dp-box" onclick="document.getElementById('fileInput').click()">
            <span id="plus" style="font-size: 0.7rem; color: #8b949e;">Click to upload Photo</span>
            <img id="profileImg" style="display:none;">
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleImage(event)">
        <input type="number" id="staff_id" placeholder="12-Digit ID Number">
        <button class="btn-premium" onclick="submitKYC()">Submit</button>
    </div>

    <div id="step3" class="step">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <div class="batch-badge"><small>🌅 Morning</small><div id="m-time">--:--</div></div>
            <div class="batch-badge"><small>🌆 Evening</small><div id="e-time">--:--</div></div>
        </div>

        <div class="glass-card" style="text-align: center;">
            <div id="welcome-msg" style="font-weight: 600; margin-bottom: 10px;">Welcome!</div>
            <button class="btn-premium" id="attBtn" onclick="markAttendance()" style="background: var(--success); margin:0;">Punch In (GPS)</button>
            <p id="att-msg" style="font-size: 0.8rem; color: #8b949e; margin-top: 8px;"></p>
        </div>

        <div class="glass-card" style="border-left: 4px solid var(--accent);">
            <h4 style="margin:0; color: var(--accent); font-size: 0.8rem;">PAYROLL LIVE</h4>
            <div style="display: flex; justify-content: space-between; margin-top: 15px;">
                <div><small>Earned</small><div id="earned-sal" style="font-size: 1.3rem; font-weight: bold; color: var(--primary);">₹0</div></div>
                <div style="text-align: right;"><small>Monthly</small><div id="total-sal" style="font-size: 1.3rem; font-weight: bold;">₹0</div></div>
            </div>
            <div id="att-stats" style="font-size: 0.75rem; color: #8b949e; margin-top: 10px; border-top: 1px solid #333; padding-top: 5px;">Present: 0 Days</div>
        </div>

        <div class="glass-card">
            <h3>New Lead Entry</h3>
            <input type="text" id="inq_name" placeholder="Student Name">
            <input type="tel" id="inq_phone" placeholder="Phone Number">
            <button class="btn-premium" onclick="sendInquiry()">Register Lead</button>
        </div>
    </div>

    <div id="step4" class="glass-card step" style="text-align: center;">
        <h2 style="color: var(--accent);">Pending...</h2>
        <button class="btn-premium" onclick="location.reload()" style="background: #30363d;">Check Status</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let staffID = "";
    let compressedDP = "";

    function showStep(s) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
    }

    function validateStep1() {
        if(document.getElementById('staff_name').value.trim().length < 3) return alert("Enter Full Name");
        showStep(2);
    }

    function handleImage(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 300; canvas.height = 300;
                canvas.getContext('2d').drawImage(img, 0, 0, 300, 300);
                compressedDP = canvas.toDataURL('image/jpeg', 0.6);
                document.getElementById('profileImg').src = compressedDP;
                document.getElementById('profileImg').style.display = "block";
                document.getElementById('plus').style.display = "none";
            }
        }
    }

    function submitKYC() {
        const name = document.getElementById('staff_name').value.trim();
        const id = document.getElementById('staff_id').value;
        if(id.length !== 12 || !compressedDP) return alert("Fill all details!");
        const key = name.replace(/\s/g, '').toLowerCase();
        db.ref('staff/' + key).set({ name, id, photo: compressedDP, status: 'pending', salary: 12000, bonus: 0 })
        .then(() => { localStorage.setItem('bt_staff', key); showStep(4); });
    }

    function syncDashboard(data, key) {
        staffID = key;
        document.getElementById('welcome-msg').innerText = "Hi, " + data.name;
        
        // Lock Attendance if already punched today
        checkTodayAttendance();

        db.ref('attendance').orderByChild('staff').equalTo(key).on('value', snap => {
            const days = snap.numChildren();
            const earned = ((data.salary / 30) * days) + (data.bonus || 0);
            document.getElementById('earned-sal').innerText = "₹" + Math.round(earned);
            document.getElementById('total-sal').innerText = "₹" + (data.salary + data.bonus);
            document.getElementById('att-stats').innerText = `Present: ${days} Days`;
        });

        db.ref('institute/batches').on('value', snap => {
            const b = snap.val();
            if(b) {
                document.getElementById('m-time').innerText = b.morning || "--:--";
                document.getElementById('e-time').innerText = b.evening || "--:--";
            }
        });

        db.ref('institute/tasks').on('value', snap => {
            const tasks = snap.val();
            if(tasks) {
                const keys = Object.keys(tasks);
                const latestKey = keys[keys.length - 1];
                if(!localStorage.getItem('accepted_' + latestKey)) {
                    document.getElementById('task-box').style.display = 'block';
                    document.getElementById('task-text').innerText = tasks[latestKey].text;
                    document.getElementById('task-box').setAttribute('data-key', latestKey);
                }
            }
        });
    }

    // --- 🔒 ATTENDANCE LOCK LOGIC ---
    function checkTodayAttendance() {
        const today = new Date().toLocaleDateString(); // Format: "MM/DD/YYYY"
        db.ref('attendance').orderByChild('staff').equalTo(staffID).once('value', snap => {
            let alreadyDone = false;
            snap.forEach(child => {
                const punchDate = new Date(child.val().timestamp).toLocaleDateString();
                if(punchDate === today) alreadyDone = true;
            });

            if(alreadyDone) {
                const btn = document.getElementById('attBtn');
                btn.disabled = true;
                btn.style.background = "#30363d";
                btn.innerText = "Already Marked Today ✅";
                document.getElementById('att-msg').innerText = "Come back tomorrow!";
            }
        });
    }

    function markAttendance() {
        const btn = document.getElementById('attBtn');
        btn.disabled = true; btn.innerText = "Verifying Location...";
        
        navigator.geolocation.getCurrentPosition(pos => {
            const dist = Math.sqrt(Math.pow(pos.coords.latitude - 21.93, 2) + Math.pow(pos.coords.longitude - 86.75, 2));
            if(dist < 0.05) {
                db.ref('attendance').push({ 
                    staff: staffID, 
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    dateStr: new Date().toLocaleDateString() 
                }).then(() => {
                    alert("Attendance Success!");
                    checkTodayAttendance();
                });
            } else {
                alert("Location Error: You are not at the office!");
                btn.disabled = false; btn.innerText = "Punch In (GPS)";
            }
        }, () => {
            alert("Please enable GPS!");
            btn.disabled = false;
        });
    }

    function acceptTask() {
        const key = document.getElementById('task-box').getAttribute('data-key');
        localStorage.setItem('accepted_' + key, 'true');
        document.getElementById('task-box').style.display = 'none';
    }

    function sendInquiry() {
        const n = document.getElementById('inq_name').value;
        const p = document.getElementById('inq_phone').value;
        if(n && p.length >= 10) {
            db.ref('inquiries').push({ student: n, phone: p, staff: staffID })
            .then(() => { alert("Lead Registered!"); document.getElementById('inq_name').value = ""; document.getElementById('inq_phone').value = ""; });
        }
    }

    window.onload = () => {
        const key = localStorage.getItem('bt_staff');
        if(key) {
            db.ref('staff/' + key).on('value', snap => {
                const data = snap.val();
                if(data && data.status === 'active') { showStep(3); syncDashboard(data, key); }
                else if(data) { showStep(4); }
            });
        }
    };
</script>
</body>
</html>
