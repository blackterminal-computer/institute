<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Terminal | BlackTerminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00d4ff; --bg: #0b0e14; --card: #1a1f26; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border-left: 4px solid var(--primary); margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        input { background: #252b33; color: white; }
        .btn-premium { background: linear-gradient(135deg, #00d4ff, #0056b3); color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>BlackTerminal <span style="font-weight: 200;">Staff</span></h1>

    <div class="card">
        <h2>📍 Mark Attendance</h2>
        <button class="btn-premium" onclick="markAttendance()">Punch In</button>
        <p id="att-status" style="font-size: 0.8rem;"></p>
    </div>

    <div class="card">
        <h2>📞 New Inquiry</h2>
        <input type="text" id="inq_name" placeholder="Student Name">
        <input type="text" id="inq_phone" placeholder="Phone Number">
        <button class="btn-premium" onclick="sendInquiry()" style="background: #ffaa00; color: black;">Send to Admin</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.firebasestorage.app",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Send Inquiry to Admin
        function sendInquiry() {
            const name = document.getElementById('inq_name').value;
            const phone = document.getElementById('inq_phone').value;
            if(name && phone) {
                db.ref('inquiries').push({ name, phone, date: new Date().toLocaleString() });
                alert("Inquiry Sent to Owner!");
                document.getElementById('inq_name').value = '';
                document.getElementById('inq_phone').value = '';
            }
        }

        // Attendance with Geofencing
        function markAttendance() {
            navigator.geolocation.getCurrentPosition((pos) => {
                const officeLat = 21.93, officeLon = 86.75; // Edit your location
                const dist = Math.sqrt(Math.pow(pos.coords.latitude - officeLat, 2) + Math.pow(pos.coords.longitude - officeLon, 2));
                
                if (dist < 0.01) {
                    db.ref('attendance').push({ staff: "Rahul", time: new Date().toLocaleString(), status: "Present" });
                    document.getElementById('att-status').innerText = "✅ Attendance Success!";
                } else {
                    alert("You are not at the institute!");
                }
            });
        }
    </script>
</body>
</html>
