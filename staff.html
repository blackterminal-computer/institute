<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Terminal | Staff Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --accent: #00d4ff; --bg: #030508; --glass: rgba(255, 255, 255, 0.03); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container { width: 90%; max-width: 380px; padding: 35px; background: var(--glass); border-radius: 35px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); text-align: center; }
        .logo { font-size: 1rem; letter-spacing: 6px; opacity: 0.5; margin-bottom: 30px; }
        
        input { width: 100%; padding: 16px; margin: 10px 0; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; color: white; text-align: center; outline: none; }
        
        .btn { width: 100%; padding: 16px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-main { background: linear-gradient(135deg, #00d4ff, #0072ff); color: white; }
        
        .toggle-link { margin-top: 20px; font-size: 0.8rem; opacity: 0.6; cursor: pointer; display: block; }
        .toggle-link b { color: var(--accent); }
    </style>
</head>
<body>

<div class="container" id="auth-box">
    <div class="logo">BLACK TERMINAL</div>

    <div id="login-ui">
        <input type="tel" id="login-phone" placeholder="Registered Mobile Number">
        <input type="password" id="login-pass" placeholder="Your Passcode">
        <button class="btn btn-main" onclick="handleLogin()">ACCESS SYSTEM</button>
        <span class="toggle-link" onclick="toggleAuth(true)">Don't have access? <b>Register Now</b></span>
    </div>

    <div id="register-ui" style="display:none;">
        <h3 style="margin-top:0">New Staff Registration</h3>
        <input type="text" id="reg-name" placeholder="Full Name">
        <input type="tel" id="reg-phone" placeholder="Mobile Number">
        <input type="password" id="reg-pass" placeholder="Create 6-Digit Passcode" maxlength="6">
        <button class="btn btn-main" onclick="handleRegister()">CREATE ACCOUNT</button>
        <span class="toggle-link" onclick="toggleAuth(false)">Already a member? <b>Login</b></span>
    </div>
</div>

<script>
    // Firebase Config (Keep your existing config here)
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function toggleAuth(isReg) {
        document.getElementById('login-ui').style.display = isReg ? 'none' : 'block';
        document.getElementById('register-ui').style.display = isReg ? 'block' : 'none';
    }

    function handleRegister() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const pass = document.getElementById('reg-pass').value;

        if(!name || !phone || pass.length < 4) return alert("Please fill all fields!");

        // Check if phone already exists
        db.ref('staff').orderByChild('phone').equalTo(phone).once('value', snap => {
            if(snap.exists()) {
                alert("This number is already registered!");
            } else {
                const newStaffRef = db.ref('staff').push();
                newStaffRef.set({
                    name: name,
                    phone: phone,
                    passcode: pass,
                    salary: 0,
                    joinedOn: Date.now()
                }).then(() => {
                    alert("Registration Successful! Please Login.");
                    toggleAuth(false);
                });
            }
        });
    }

    function handleLogin() {
        const phone = document.getElementById('login-phone').value;
        const pass = document.getElementById('login-pass').value;

        db.ref('staff').orderByChild('phone').equalTo(phone).once('value', snap => {
            if(snap.exists()) {
                let userFound = false;
                snap.forEach(child => {
                    if(child.val().passcode === pass) {
                        userFound = true;
                        localStorage.setItem('bt_staff_id', child.key);
                        localStorage.setItem('bt_staff_name', child.val().name);
                        window.location.href = "home.html"; // Redirect to your homepage
                    }
                });
                if(!userFound) alert("Incorrect Passcode!");
            } else {
                alert("Mobile number not registered!");
            }
        });
    }
</script>
</body>
</html>
