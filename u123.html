<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Cyber Titan Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root {
            --primary: #6366f1; --bg: #020617; --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08); --success: #10b981; --danger: #f43f5e; --zen: #38bdf8;
        }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* Animations */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes floatUp { 0% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -100px); opacity: 0; } }
        @keyframes streakPop { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }

        .shake { animation: shake 0.3s ease-in-out; }
        .sad-emoji { position: absolute; font-size: 50px; left: 50%; top: 20%; animation: floatUp 1.2s forwards; pointer-events: none; z-index: 100; }
        .streak-msg { position: fixed; top: 40%; font-size: 40px; font-weight: 900; color: #fbbf24; text-shadow: 0 0 20px rgba(251,191,36,0.5); z-index: 4000; animation: streakPop 1s forwards; pointer-events: none; }

        /* Intro & Overlay */
        #intro-overlay { position: fixed; inset: 0; z-index: 6000; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .intro-text { font-size: 20px; font-weight: 700; color: var(--zen); margin-bottom: 20px; display: none; }
        #countdown-box { font-size: 120px; font-weight: 900; color: var(--primary); display: none; }

        /* Milestone Tracker */
        .milestone-wrap { width: 100%; max-width: 650px; background: rgba(255,255,255,0.05); height: 12px; border-radius: 20px; position: fixed; top: 0; z-index: 3000; display:none; }
        #ms-correct-bar { height: 100%; width: 0%; background: linear-gradient(to right, #6366f1, #38bdf8); border-radius: 20px; transition: 0.5s; box-shadow: 0 0 15px var(--primary); }
        #ms-time-dot { position: absolute; top: -4px; left: 0%; width: 20px; height: 20px; background: var(--danger); border: 3px solid var(--bg); border-radius: 50%; transition: 1s linear; }

        /* UI Components */
        #auth-screen { position: fixed; inset: 0; z-index: 5000; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { max-width: 400px; width: 100%; padding: 40px 30px; border-radius: 28px; background: var(--card); border: 1px solid var(--border); text-align: center; }
        .terminal-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 18px; border-radius: 15px; color: var(--zen); text-align: center; margin: 25px 0; outline: none; font-size: 16px; }
        .container { width: 100%; max-width: 650px; margin-top: 30px; }
        .header-card { background: var(--card); border: 1px solid var(--border); padding: 15px 20px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 25px; z-index: 1000; backdrop-filter: blur(20px); }
        .q-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .opt-label { display: flex; align-items: center; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 16px; border-radius: 14px; margin-top: 10px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .opt-label.locked { pointer-events: none; opacity: 0.6; }
        .opt-label.correct-glow { border-color: var(--success) !important; background: rgba(16, 185, 129, 0.2) !important; font-weight: 700; }
        .opt-label.wrong-glow { border-color: var(--danger) !important; background: rgba(244, 63, 94, 0.2) !important; }
        
        .btn-submit { width: 100%; padding: 20px; background: var(--primary); border: none; border-radius: 20px; color: #fff; font-weight: 800; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
        .rank-tag { display: inline-block; padding: 5px 15px; border-radius: 50px; background: var(--primary); font-size: 12px; font-weight: 800; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="intro-overlay">
    <div id="p1" class="intro-text">🚀 Welcome to the Future of Learning.</div>
    <div id="p2" class="intro-text">🔥 Speed, Accuracy, and Focus.</div>
    <div id="p3" class="intro-text">💻 Show them who's the real Cyber Titan!</div>
    <div id="countdown-box">10</div>
</div>

<div id="auth-screen">
    <div class="auth-card">
        <i class="ri-user-star-line" style="font-size: 50px; color: var(--primary);"></i>
        <h2>IDENTITY VERIFICATION</h2>
        <input type="text" id="agent-callsign" class="terminal-input" placeholder="AGENT NAME..." maxlength="15">
        <button class="btn-submit" onclick="startCountdown()">I'M READY. START MISSION</button>
    </div>
</div>

<div id="ms-container" class="milestone-wrap">
    <div id="ms-correct-bar"></div>
    <div id="ms-time-dot"></div>
</div>

<div class="container" id="exam-screen" style="display:none;">
    <div class="header-card">
        <div id="display-name" style="font-weight: 800; color: var(--zen);">Agent</div>
        <div style="font-weight:800; color: var(--danger);"><i class="ri-flashlight-line"></i> <span id="time-left">30:00</span></div>
    </div>
    <div id="questions-box"></div>
    <button class="btn-submit" id="final-btn" onclick="finishExam()">UPLOAD FINAL DATA</button>
</div>

<div class="container" id="result-screen" style="display:none; text-align:center; padding:40px 15px;">
    <div id="rank-display" class="rank-tag">SECURITY TRAINEE</div>
    <h1 id="final-score" style="font-size: 70px; margin: 10px 0; color: var(--primary);">0/40</h1>
    <p id="accuracy-stat" style="font-weight: 800; color: var(--zen);"></p>
    
    <button class="btn-submit" style="background:#22c55e" onclick="shareScore()"><i class="ri-whatsapp-line"></i> SHARE WITH FRIENDS</button>
    <button class="btn-submit" style="background:#334155" onclick="showReview()"><i class="ri-book-open-line"></i> REVIEW SESSION</button>

    <div class="leaderboard-card" style="background:rgba(255,255,255,0.03); padding:20px; border-radius:20px; margin-top:30px; text-align:left;">
        <h3 style="margin:0 0 15px 0;"><i class="ri-medal-fill" style="color:#fbbf24"></i> TOP AGENTS</h3>
        <div id="lb-body"></div>
    </div>
</div>

<script>
    const questions = [
        { q: "Octal (74) to Hexadecimal:", a: "3C", o: ["3C", "4D", "3B", "4C"] },
        { q: "Octal (127) to Hexadecimal:", a: "57", o: ["57", "67", "A7", "5F"] },
        { q: "Hexadecimal (1A) to Octal:", a: "32", o: ["32", "26", "42", "30"] },
        { q: "Hexadecimal (FF) to Octal:", a: "377", o: ["377", "255", "400", "366"] },
        { q: "Decimal (45) to Binary:", a: "101101", o: ["101101", "110011", "101010", "111001"] },
        { q: "Decimal (10) to Binary:", a: "1010", o: ["1010", "1100", "1001", "1011"] },
        { q: "Decimal (25) to Binary:", a: "11001", o: ["11001", "10101", "11100", "11011"] },
        { q: "Decimal (64) to Octal:", a: "100", o: ["100", "70", "110", "64"] },
        { q: "Decimal (92) to Octal:", a: "134", o: ["134", "124", "144", "114"] },
        { q: "Decimal (255) to Hexadecimal:", a: "FF", o: ["FF", "FE", "EF", "F0"] },
        { q: "Decimal (165) to Hexadecimal:", a: "A5", o: ["A5", "B5", "A6", "95"] },
        { q: "Binary (111000) to Octal:", a: "70", o: ["70", "60", "77", "50"] },
        { q: "Binary (101011) to Octal:", a: "53", o: ["53", "43", "63", "55"] },
        { q: "Binary (11011110) to Hexadecimal:", a: "DE", o: ["DE", "BE", "CE", "FE"] },
        { q: "Binary (10101010) to Hexadecimal:", a: "AA", o: ["AA", "BB", "A1", "A0"] },
        { q: "CMD: Command to change color?", a: "color", o: ["color", "setcolor", "paint", "chr"] },
        { q: "CMD: Command to create folder?", a: "mkdir", o: ["mkdir", "newdir", "create", "folder"] },
        { q: "CMD: Command to rename folder?", a: "ren", o: ["ren", "rename", "move", "name"] },
        { q: "CMD: Command to delete folder?", a: "rd", o: ["rd", "del", "remove", "erase"] },
        { q: "CMD: Command to delete file?", a: "del", o: ["del", "remove", "erase", "kill"] },
        { q: "CMD: Command to shutdown?", a: "shutdown /s", o: ["shutdown /s", "stop", "exit", "off"] },
        { q: "CMD: Command to copy file?", a: "copy", o: ["copy", "cp", "move", "duplicate"] },
        { q: "CMD: Command to move file?", a: "move", o: ["move", "mv", "transfer", "shift"] },
        { q: "CMD: Command system information?", a: "systeminfo", o: ["systeminfo", "sysconfig", "specs", "about"] },
        { q: "CMD: Command check IP?", a: "ipconfig", o: ["ipconfig", "ifconfig", "myip", "netstat"] },
        { q: "CMD: Command clear screen?", a: "cls", o: ["cls", "clear", "clean", "reset"] },
        { q: "CMD: Command list files?", a: "dir", o: ["dir", "ls", "list", "show"] },
        { q: "CMD: Command ping server?", a: "ping", o: ["ping", "connect", "trace", "link"] },
        { q: "What is a Computer?", a: "An electronic device that processes data", o: ["An electronic device that processes data", "A mechanical machine", "A typing tool", "None"] },
        { q: "Full Form of COMPUTER?", a: "Commonly Operated Machine Particularly Used for Technical and Educational Research", o: ["Commonly Operated Machine Particularly Used for Technical and Educational Research", "Central Operating Machine", "None"] },
        { q: "Full Form of ASCII?", a: "American Standard Code for Information Interchange", o: ["American Standard Code for Information Interchange", "All Standard Code", "None"] },
        { q: "Father of Computer?", a: "Charles Babbage", o: ["Charles Babbage", "Alan Turing", "Bill Gates", "Tesla"] },
        { q: "Smallest unit of data?", a: "Bit", o: ["Bit", "Byte", "KB", "Nibble"] },
        { q: "1 Byte is equal to?", a: "8 Bits", o: ["8 Bits", "4 Bits", "1024 Bits", "16 Bits"] },
        { q: "Brain of Computer?", a: "CPU", o: ["CPU", "RAM", "HDD", "Monitor"] },
        { q: "Binary system base?", a: "2", o: ["2", "10", "8", "16"] },
        { q: "Octal system base?", a: "8", o: ["8", "10", "2", "16"] },
        { q: "Hexadecimal system base?", a: "16", o: ["16", "8", "10", "2"] },
        { q: "CMD exit command?", a: "exit", o: ["exit", "close", "bye", "quit"] },
        { q: "Full form of CPU:", a: "Central Processing Unit", o: ["Central Processing Unit", "Central Power Unit", "Computer Unit", "None"] }
    ];

    let timer, timeLeft = 1800, correctCount = 0, currentAgent = "", answered = new Set(), streak = 0;

    window.onload = () => {
        const pArr = ["p1", "p2", "p3"];
        pArr.forEach((id, i) => {
            setTimeout(() => {
                if(i > 0) document.getElementById(pArr[i-1]).style.display = 'none';
                document.getElementById(id).style.display = 'block';
            }, i * 2000);
        });
        setTimeout(() => {
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
        }, 6000);
    };

    function startCountdown() {
        currentAgent = document.getElementById('agent-callsign').value.trim();
        if(!currentAgent) return alert("Enter Agent Name!");
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('intro-overlay').style.display = 'flex';
        document.getElementById('p3').style.display = 'none';
        let box = document.getElementById('countdown-box');
        box.style.display = 'block';
        let count = 10;
        let intv = setInterval(() => {
            count--; box.innerText = count;
            if(count <= 0) { clearInterval(intv); initExam(); }
        }, 1000);
    }

    function initExam() {
        document.getElementById('intro-overlay').style.display = 'none';
        document.getElementById('exam-screen').style.display = 'block';
        document.getElementById('ms-container').style.display = 'block';
        document.getElementById('display-name').innerText = "AGENT: " + currentAgent.toUpperCase();
        renderQuestions();
        timer = setInterval(updateProgress, 1000);
    }

    function renderQuestions() {
        const box = document.getElementById('questions-box');
        questions.forEach((q, i) => {
            const shuffled = [...q.o].sort(() => Math.random() - 0.5);
            box.innerHTML += `
                <div class="q-card" id="qb-${i}">
                    <p style="font-size:10px; color:var(--primary); font-weight:800;">DATA_NODE_${i+1}</p>
                    <p style="font-weight:700; margin:10px 0;">${q.q}</p>
                    <div id="opts-${i}">
                        ${shuffled.map(opt => `<label class="opt-label" onclick="handleSel(this, ${i}, '${opt}')">${opt}</label>`).join('')}
                    </div>
                </div>`;
        });
    }

    function handleSel(el, i, sel) {
        if(answered.has(i)) return;
        answered.add(i);
        const correct = questions[i].a;
        const qCard = document.getElementById(`qb-${i}`);
        document.getElementById(`opts-${i}`).querySelectorAll('.opt-label').forEach(l => l.classList.add('locked'));
        
        if(sel === correct) {
            correctCount++; streak++;
            el.classList.add('correct-glow');
            confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 }, colors:['#6366f1', '#38bdf8'] });
            if(streak === 3) showStreak("🔥 TRIPLE KILL!");
            if(streak === 5) showStreak("⚡ UNSTOPPABLE!");
        } else {
            streak = 0;
            el.classList.add('wrong-glow');
            qCard.classList.add('shake');
            const sad = document.createElement('div'); sad.className = "sad-emoji"; sad.innerText = "😢";
            qCard.appendChild(sad);
            setTimeout(() => sad.remove(), 1200);
        }
        document.getElementById('ms-correct-bar').style.width = (correctCount / 40 * 100) + "%";
    }

    function showStreak(msg) {
        const div = document.createElement('div'); div.className = "streak-msg"; div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 1000);
    }

    function updateProgress() {
        if(timeLeft <= 0) finishExam();
        let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        document.getElementById('time-left').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        document.getElementById('ms-time-dot').style.left = `calc(${((1800-timeLeft)/1800)*100}% - 10px)`;
        timeLeft--;
    }

    function finishExam() {
        clearInterval(timer);
        document.getElementById('exam-screen').style.display = 'none';
        document.getElementById('ms-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        const score = correctCount;
        document.getElementById('final-score').innerText = `${score}/40`;
        document.getElementById('accuracy-stat').innerText = `SYSTEM ACCURACY: ${Math.round(score/40*100)}%`;
        
        // Rank Assignment
        let rank = "SECURITY TRAINEE";
        if(score >= 35) rank = "🛡️ CYBER OVERLORD";
        else if(score >= 25) rank = "⚡ DATA NINJA";
        else if(score >= 15) rank = "👨‍💻 CODE APPRENTICE";
        document.getElementById('rank-display').innerText = rank;

        saveScore(); showLeaderboard(); window.scrollTo(0,0);
    }

    function showReview() {
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('exam-screen').style.display = 'block';
        document.getElementById('final-btn').style.display = 'none';
        questions.forEach((q, i) => {
            const labels = document.getElementById(`opts-${i}`).querySelectorAll('.opt-label');
            labels.forEach(l => {
                l.classList.add('locked');
                if(l.innerText.trim() === q.a) {
                    l.style.borderColor = "var(--success)";
                    l.style.background = "rgba(16, 185, 129, 0.1)";
                    l.innerHTML += ' <i class="ri-check-double-line"></i>';
                }
            });
        });
    }

    function saveScore() {
        let s = JSON.parse(localStorage.getItem('ct_scores') || '[]');
        s.push({name: currentAgent, score: correctCount});
        s.sort((a,b) => b.score - a.score);
        localStorage.setItem('ct_scores', JSON.stringify(s.slice(0,5)));
    }

    function showLeaderboard() {
        const s = JSON.parse(localStorage.getItem('ct_scores') || '[]');
        document.getElementById('lb-body').innerHTML = s.map((x, i) => `
            <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05);">
                <span>${i+1}. ${x.name}</span><span style="color:var(--zen); font-weight:800;">${x.score}/40</span>
            </div>`).join('');
    }

    function shareScore() {
        const text = `🏆 MISSION ACCOMPLISHED!\n👤 Agent: ${currentAgent}\n✅ Score: ${correctCount}/40\n🎖️ Rank: ${document.getElementById('rank-display').innerText}\nCan you beat my score?`;
        navigator.clipboard.writeText(text);
        alert("Result Copied! Paste on WhatsApp.");
    }
</script>
</body>
</html>
