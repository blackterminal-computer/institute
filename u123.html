<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Cyber Titan Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --primary: #6366f1; --bg: #020617; --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08); --success: #10b981; --danger: #f43f5e; --xp: #fbbf24;
            --zen: #38bdf8;
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; -webkit-tap-highlight-color: transparent;
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);
        }

        /* --- New Auth Screen Style --- */
        #auth-screen {
            position: fixed; inset: 0; z-index: 5000; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .auth-card {
            max-width: 400px; width: 100%; padding: 40px 30px; border-radius: 28px;
            background: var(--card); border: 1px solid var(--border); text-align: center; backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .terminal-input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 18px; border-radius: 15px; color: var(--zen); font-family: 'JetBrains Mono';
            text-align: center; margin: 25px 0; outline: none; box-sizing: border-box; font-size: 16px;
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
        .panic-mode { animation: glitch 0.2s infinite; border: 1px solid var(--danger) !important; }

        .progress-container { width: 100%; height: 5px; background: rgba(255,255,255,0.05); position: fixed; top: 0; left: 0; z-index: 2000; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(to right, var(--zen), var(--primary)); transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .container { width: 100%; max-width: 650px; box-sizing: border-box; }

        .header-card { 
            background: var(--card); border: 1px solid var(--border); padding: 15px 20px; 
            border-radius: 20px; margin: 20px 0; display: flex; justify-content: space-between; 
            align-items: center; position: sticky; top: 15px; z-index: 1000; backdrop-filter: blur(20px);
        }

        .timer-box { 
            font-weight: 800; font-size: 14px; display: flex; align-items: center; gap: 8px; 
            background: rgba(56, 189, 248, 0.1); color: var(--zen); padding: 8px 16px; border-radius: 12px; border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .timer-warn { background: rgba(244, 63, 94, 0.2); color: var(--danger); border-color: var(--danger); animation: pulse 0.5s infinite; }

        .q-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 15px; transition: 0.3s; position: relative; overflow: hidden; }
        
        .opt-label { 
            display: flex; align-items: center; background: rgba(255,255,255,0.02); 
            border: 1px solid var(--border); padding: 16px; border-radius: 14px; 
            margin-top: 10px; cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        .opt-label.locked { cursor: not-allowed; opacity: 0.4; pointer-events: none; }
        .opt-label.selected { border-color: var(--zen); background: rgba(56, 189, 248, 0.1); opacity: 1 !important; color: var(--zen); font-weight: 800; }

        .admin-btn { opacity: 0.1; cursor: pointer; transition: 0.3s; }
        .admin-btn:hover { opacity: 1; color: var(--danger); }
        .delete-icon { color: var(--danger); margin-left: 10px; cursor: pointer; display: none; }
        .admin-active .delete-icon { display: inline-block; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 12px 25px; border-radius: 50px; font-weight: 800; font-size: 11px; display: none; z-index: 3000; box-shadow: 0 0 20px var(--primary); letter-spacing: 1px; }

        .xp-val { font-size: 70px; font-weight: 900; color: var(--xp); margin: 10px 0; }
        .btn-submit { width: 100%; padding: 20px; background: var(--primary); border: none; border-radius: 20px; color: #fff; font-weight: 800; cursor: pointer; margin-top: 10px; font-size: 16px; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <i class="ri-shield-keyhole-line" style="font-size: 50px; color: var(--zen);"></i>
        <h2 style="letter-spacing:1px; margin: 15px 0 5px;">ACCESS TERMINAL</h2>
        <p style="font-size: 10px; opacity: 0.5; font-weight: 800;">ENTER CALLSIGN TO INITIALIZE SESSION</p>
        <input type="text" id="agent-callsign" class="terminal-input" placeholder="YOUR NAME..." maxlength="20" autocomplete="off">
        <button class="btn-submit" onclick="initializeSession()">INITIALIZE SYSTEM</button>
    </div>
</div>

<div id="toast">SYSTEM INITIALIZED</div>
<div class="progress-container"><div id="progress-bar"></div></div>

<div class="container" id="exam-screen" style="display:none;">
    <div class="header-card" id="main-header">
        <div><h2 id="display-name" style="margin:0; font-size: 16px;">Agent</h2><p style="margin:0; font-size:9px; opacity:0.6; font-weight:800;">STATUS: ACTIVE • NO RETAKES</p></div>
        <div id="t-box" class="timer-box"><i class="ri-pulse-line"></i> <span id="time-left">30:00</span></div>
    </div>
    <div id="questions-box"></div>
    <button class="btn-submit" onclick="window.submitExam()">UPLOAD DATA & SYNC XP</button>
</div>

<div class="container" id="result-screen" style="display:none; text-align:center; padding:50px 15px;">
    <div id="final-rank" style="border:1px solid var(--xp); color:var(--xp); padding:5px 15px; border-radius:50px; font-size:10px; font-weight:800; display:inline-block;">RANK</div>
    <div class="xp-val" id="final-xp">0</div>
    <h2 style="margin:0; letter-spacing:1px;">MISSION DEBRIEF</h2>
    <p id="accuracy-stat" style="opacity:0.6; font-weight:700; margin: 10px 0 30px 0;"></p>
    <button class="btn-submit" onclick="location.reload()" style="background:rgba(255,255,255,0.05); margin-bottom:40px;">RE-INITIATE SESSION</button>
    <div id="review-box" style="text-align:left;"></div>
</div>

<div class="container leaderboard" id="leaderboard-section">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0; font-size: 16px;"><i class="ri-fire-fill" style="color:var(--xp)"></i> Hall of Cyber Titans</h3>
        <i class="ri-settings-4-line admin-btn" onclick="unlockAdmin()"></i>
    </div>
    <table class="l-table" style="width:100%; margin-top:15px; border-collapse:collapse;"><tbody id="l-body"></tbody></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI", authDomain: "black-terminal-f2c91.firebaseapp.com", projectId: "black-terminal-f2c91", appId: "1:552489994197:web:7662331264c334ffbadf5c" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const questions = [
        { q: "Convert Decimal (43) to Binary:", a: "101011", o: ["101011", "110101", "101101", "100111"], e: "43/2 gives remainders 1,1,0,1,0,1." },
        { q: "Convert Decimal (125) to Hexadecimal:", a: "7D", o: ["7D", "8A", "7B", "FD"], e: "125/16 = 7 rem 13 (D)." },
        { q: "Convert Decimal (98) to Octal:", a: "142", o: ["142", "122", "162", "100"], e: "98/8 = 12 rem 2; 12/8 = 1 rem 4." },
        { q: "Convert Binary (11011) to Decimal:", a: "27", o: ["25", "27", "29", "31"], e: "16+8+0+2+1 = 27." },
        { q: "Convert Binary (101110) to Hexadecimal:", a: "2E", o: ["2E", "3E", "2A", "2F"], e: "Binary split 10-1110 = 2E." },
        { q: "Convert Binary (111001) to Octal:", a: "71", o: ["61", "71", "51", "77"], e: "111-001 = 71." },
        { q: "Convert Octal (52) to Hexadecimal:", a: "2A", o: ["2A", "3B", "2B", "32"], e: "Octal 52 = Dec 42 = Hex 2A." },
        { q: "Convert Octal (127) to Binary:", a: "001010111", o: ["001010111", "11010111", "001111000", "111000111"], e: "1=001, 2=010, 7=111." },
        { q: "Convert Octal (64) to Decimal:", a: "52", o: ["52", "64", "48", "50"], e: "6*8 + 4 = 52." },
        { q: "Convert Hexadecimal (3C) to Octal:", a: "74", o: ["74", "64", "312", "70"], e: "3C = 60 Dec = 74 Oct." },
        { q: "Convert Hexadecimal (1F) to Binary:", a: "00011111", o: ["00011111", "11111000", "00010001", "11111111"], e: "1=0001, F=1111." },
        { q: "Convert Hexadecimal (A5) to Decimal:", a: "165", o: ["165", "105", "155", "175"], e: "10*16 + 5 = 165." },
        { q: "Convert Decimal (15) to Binary:", a: "1111", o: ["1111", "1010", "1100", "1110"], e: "All bits ON." },
        { q: "Full Form of COMPUTER?", a: "Commonly Operated Machine Particularly Used for Technical and Educational Research", o: ["Commonly Operated Machine Particularly Used for Technical and Educational Research", "Commonly Oriented Machine Part Used for Trade and Education", "Central Operating Machine Particularly Under Technical Education", "None"], e: "Standard tech definition." },
        { q: "Full Form of ASCII?", a: "American Standard Code for Information Interchange", o: ["American Standard Code for Information Interchange", "All Standard Code for Info Input", "American Scientific Code for Interchange", "None"], e: "Encoding standard." },
        { q: "Full Form of CPU?", a: "Central Processing Unit", o: ["Central Processing Unit", "Computer Processing Unit", "Central Program Utility", "Control Processing Unit"], e: "The brain." },
        { q: "CMD command to create a new directory:", a: "mkdir", o: ["mkdir", "newdir", "md-folder", "create"], e: "Make Directory." },
        { q: "CMD command to clear screen:", a: "cls", o: ["cls", "clear", "wipe", "reset"], e: "Clear Screen." },
        { q: "CMD command to change color:", a: "color", o: ["color", "setcolor", "paint", "theme"], e: "Color change." },
        { q: "CMD command to shutdown:", a: "shutdown", o: ["shutdown", "stop", "exit /s", "poweroff"], e: "Power off." },
        { q: "Decimal (16) in Hex:", a: "10", o: ["10", "A", "F", "16"], e: "16/16 = 1 rem 0." },
        { q: "Base of Hexadecimal:", a: "16", o: ["16", "10", "8", "2"], e: "16 symbols." },
        { q: "Binary (101010) to Decimal:", a: "42", o: ["42", "40", "44", "38"], e: "32+8+2 = 42." },
        { q: "Octal (20) to Decimal:", a: "16", o: ["16", "20", "18", "22"], e: "2*8 = 16." },
        { q: "Hex (10) to Binary:", a: "00010000", o: ["00010000", "1010", "1111", "00000001"], e: "1=0001, 0=0000." },
        { q: "Convert Octal (10) to Decimal:", a: "8", o: ["8", "10", "12", "16"], e: "1*8 = 8." },
        { q: "Binary (100) + Binary (100) Dec:", a: "8", o: ["8", "4", "200", "1000"], e: "4+4=8." },
        { q: "Octal (77) Dec:", a: "63", o: ["63", "77", "70", "64"], e: "7*8+7=63." },
        { q: "Convert Hex (B) to Binary:", a: "1011", o: ["1011", "1100", "1010", "1111"], e: "B=11=1011." },
        { q: "CMD command to delete directory:", a: "rmdir", o: ["rmdir", "deldir", "remove", "erase"], e: "Remove Directory." }
    ];

    let currentAgent = "";
    let time = 1800;
    let timerInt;

    // --- Start Session Logic ---
    window.initializeSession = () => {
        const nameInput = document.getElementById('agent-callsign').value.trim();
        if(nameInput.length < 2) {
            alert("Identification required. Enter a valid name.");
            return;
        }
        currentAgent = nameInput;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('exam-screen').style.display = 'block';
        document.getElementById('display-name').innerText = currentAgent.toUpperCase();
        
        renderQuestions();
        startTimer();
        showToast("Access Granted. Good Luck.");
    };

    function renderQuestions() {
        const qBox = document.getElementById('questions-box');
        questions.sort(() => Math.random() - 0.5).forEach((item, i) => {
            qBox.innerHTML += `
                <div class="q-card" id="card-${i}">
                    <div style="font-weight:800; color:var(--zen); font-size:10px; margin-bottom:10px;">SECTOR ${i+1}</div>
                    <div style="font-weight:700; font-size:15px; margin-bottom:15px;">${item.q}</div>
                    <div id="opts-${i}">
                        ${item.o.map(opt => `
                            <label class="opt-label" onclick="lockAndShake(this, ${i})">
                                <input type="radio" name="q${i}" value="${opt}" style="display:none;">
                                <span>${opt}</span>
                            </label>`).join('')}
                    </div>
                </div>`;
        });
    }

    window.lockAndShake = (el, qIdx) => {
        const parent = document.getElementById(`opts-${qIdx}`);
        if(parent.classList.contains('locked')) return;

        parent.classList.add('locked');
        parent.querySelectorAll('.opt-label').forEach(l => l.classList.add('locked'));
        el.classList.remove('locked');
        el.classList.add('selected');
        el.querySelector('input').checked = true;

        document.getElementById(`card-${qIdx}`).style.animation = "glitch 0.3s ease";
        
        const answered = document.querySelectorAll('.locked').length / 2;
        document.getElementById('progress-bar').style.width = (answered / 30 * 100) + "%";

        const scareQuotes = ["Target Locked.", "No Going Back.", "Brain Scan Complete.", "Choice Encrypted.", "Data Synchronized.", "Security Alert!"];
        if(answered % 5 === 0) showToast(scareQuotes[Math.floor(Math.random()*scareQuotes.length)]);
    };

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function startTimer() {
        timerInt = setInterval(() => {
            let m = Math.floor(time / 60); let s = time % 60;
            document.getElementById('time-left').innerText = `${m}:${s<10?'0':''}${s}`;
            if(time < 300) { 
                document.getElementById('t-box').classList.add('timer-warn');
                document.getElementById('main-header').classList.add('panic-mode');
            }
            if(time-- <= 0) { clearInterval(timerInt); window.submitExam(); }
        }, 1000);
    }

    window.submitExam = async () => {
        let correct = 0;
        const reviewBox = document.getElementById('review-box');
        reviewBox.innerHTML = "<h3 style='text-align:center; color:var(--zen)'>ENCRYPTED LOG ANALYSIS</h3>";

        questions.forEach((item, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            const isCorrect = sel && sel.value === item.a;
            if(isCorrect) correct++;
            reviewBox.innerHTML += `<div class="q-card" style="border-left: 5px solid ${isCorrect?'var(--success)':'var(--danger)'}">
                <div style="font-weight:700; font-size:14px;">${item.q}</div>
                <div style="font-size:12px; margin-top:5px; color:${isCorrect?'var(--success)':'var(--danger)'}">
                    ${isCorrect ? '✓ VALIDATED' : '✗ SYSTEM ERROR'}: ${sel ? sel.value : 'NULL'}
                </div>
                ${!isCorrect ? `<div style="font-size:11px; opacity:0.6;">Key: ${item.a}</div>` : ''}
            </div>`;
        });

        const xp = correct * 500;
        let rank = xp > 14000 ? "CYBER TITAN" : "ROOKIE";

        document.getElementById('exam-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-rank').innerText = rank;
        document.getElementById('accuracy-stat').innerText = `HITS: ${correct}/30 | XP: ${xp}`;

        let c = 0; const cInt = setInterval(() => {
            if(c >= xp) { c = xp; clearInterval(cInt); }
            document.getElementById('final-xp').innerText = c.toLocaleString();
            c += Math.ceil(xp/40);
        }, 25);

        await addDoc(collection(db, "exam_results"), { name: currentAgent, score: xp, rank, time: Date.now() });
        clearInterval(timerInt); window.scrollTo(0,0);
    };

    window.unlockAdmin = () => {
        if(prompt("ADMIN PASSWORD:") === "admin") {
            document.getElementById('leaderboard-section').classList.add('admin-active');
            alert("ADMIN OVERRIDE GRANTED");
        }
    };

    window.purgeData = async (id) => {
        if(confirm("Purge this entity from the system?")) await deleteDoc(doc(db, "exam_results", id));
    };

    onSnapshot(query(collection(db, "exam_results"), orderBy("score", "desc"), limit(15)), (s) => {
        const b = document.getElementById('l-body'); b.innerHTML = "";
        s.forEach(d => {
            const data = d.data();
            b.innerHTML += `
                <tr style="border-bottom:1px solid var(--border)">
                    <td style="padding:12px 5px;">
                        <b>${data.name}</b> <i class="ri-delete-bin-6-line delete-icon" onclick="purgeData('${d.id}')"></i>
                        <br><small style="opacity:0.5">${data.rank || 'ROOKIE'}</small>
                    </td>
                    <td style="text-align:right; color:var(--xp); font-weight:800;">${(data.score || 0).toLocaleString()} XP</td>
                </tr>`;
        });
    });
</script>
</body>
</html>
