<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin | Student Fees Ledger</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap');

        :root { 
            --accent: #ef4444; 
            --bg: #090d16; 
            --card: #111827;
            --card-light: #1f2937;
            --border: #1f2937;
            --border-focus: #3b82f6;
            --success: #10b981;
            --info: #6366f1;
            --orange: #f59e0b;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px 15px; 
            line-height: 1.5;
        }

        .container { max-width: 650px; margin: auto; }

        .header-flex { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
            border-bottom: 1px solid var(--border);
            padding-bottom: 18px;
        }
        
        h1 { font-size: 1.3rem; letter-spacing: 2px; font-weight: 800; margin: 0; color: #fff; }
        h1 span { color: var(--info); }

        .back-btn { 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.08); border-color: var(--text-muted); }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .summary-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 12px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .summary-box small {
            display: block;
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .summary-box span { font-size: 1.1rem; font-weight: 800; color: #fff; }
        .summary-box.highlight {
            border-color: rgba(16, 185, 129, 0.2);
            background: linear-gradient(180deg, var(--card) 0%, rgba(16, 185, 129, 0.03) 100%);
        }
        .summary-box.highlight span { color: var(--success); }

        .card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            width: 100%; 
            margin-bottom: 25px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        h2 { font-size: 1rem; color: #fff; margin-top: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-weight: 700; }

        .fee-list { max-height: 45vh; overflow-y: auto; padding-right: 4px; }
        .fee-list::-webkit-scrollbar { width: 5px; }
        .fee-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .fee-row {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 14px 16px; 
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px; 
            margin-bottom: 12px; 
            border: 1px solid var(--border);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .fee-row:hover { transform: translateY(-1px); border-color: #374151; }
        .fee-row.border-paid { border-left: 4px solid var(--success); }
        .fee-row.border-unpaid { border-left: 4px solid var(--accent); }

        .student-meta b { font-size: 0.9rem; color: #fff; display: block; font-weight: 600; }
        .student-meta small { font-size: 0.75rem; color: var(--text-muted); display: inline-flex; align-items: center; gap: 5px; margin-top: 4px; }

        .actions-flex { display: flex; align-items: center; gap: 10px; }

        .status-badge {
            padding: 8px 16px; 
            border-radius: 8px; 
            font-size: 11px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: opacity 0.2s ease;
        }
        .status-badge:hover { opacity: 0.9; }
        .status-paid { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-unpaid { background: rgba(239, 68, 68, 0.15); color: var(--accent); border: 1px solid rgba(239, 68, 68, 0.3); }

        .invoice-btn {
            background: #25d366; color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; box-shadow: 0 2px 4px rgba(37, 211, 102, 0.2);
        }

        .form-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 5px; }
        .input-row { display: flex; gap: 10px; }
        .add-student-input {
            flex: 1; padding: 12px 14px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); border-radius: 10px; color: #fff; font-size: 0.85rem; outline: none; transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .add-student-input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        .add-student-btn {
            background: var(--info); color: #fff; border: none; padding: 0 20px; border-radius: 10px; font-size: 0.85rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2); transition: opacity 0.2s ease;
        }
        .add-student-btn:hover { opacity: 0.9; }

        .paid-table-wrapper { max-height: 35vh; overflow-y: auto; border-radius: 12px; border: 1px solid var(--border); }
        .paid-table { width: 100%; border-collapse: collapse; text-align: left; background: rgba(255, 255, 255, 0.01); font-size: 0.85rem; }
        .paid-table th { background: rgba(255, 255, 255, 0.03); color: var(--text-muted); padding: 12px 16px; font-weight: 700; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        .paid-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text-main); }
        .paid-table tr:last-child td { border-bottom: none; }
        .date-badge { background: rgba(16, 185, 129, 0.12); color: var(--success); padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 0.75rem; border: 1px solid rgba(16, 185, 129, 0.2); }

        #loading { text-align: center; color: var(--info); padding: 30px; font-size: 0.9rem; font-weight: 500; }
        #student-search:focus { border-color: var(--info) !important; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i> CONTROL PANEL</a>
    <div class="header-flex">
        <h1>BLACK<span>TERMINAL</span> FEES</h1>
    </div>

    <div class="summary-grid">
        <div class="summary-box">
            <small>Total Students</small>
            <span id="total-count">0</span>
        </div>
        <div class="summary-box">
            <small>Paid Ratio</small>
            <span id="paid-ratio">0/0</span>
        </div>
        <div class="summary-box highlight">
            <small>Total Received</small>
            <span id="total-amount">₹0</span>
        </div>
    </div>

    <div class="card" style="border-left: 4px solid var(--info);">
        <h2><i class="fas fa-user-plus" style="color: var(--info);"></i> Add Permanent Student</h2>
        <div class="form-group">
            <div class="input-row">
                <input type="text" id="new-student-name" class="add-student-input" placeholder="Enter Full Name...">
            </div>
            <div class="input-row">
                <input type="tel" id="new-student-phone" class="add-student-input" placeholder="Phone Number (Optional)...">
                <button id="add-student-submit" class="add-student-btn"><i class="fas fa-plus"></i> ADD</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-wallet" style="color: var(--orange);"></i> Student Fees Ledger (<span id="cur-month">--</span>)</h2>
        <div style="position: relative; margin-bottom: 20px;">
            <i class="fas fa-search" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem;"></i>
            <input type="text" id="student-search" placeholder="Search student name..." style="width: 100%; padding: 12px 14px 12px 40px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 10px; color: #fff; font-size: 0.85rem; outline: none; transition: all 0.2s ease;">
        </div>
        <div id="loading"><i class="fas fa-spinner fa-spin"></i> SYNCING DATABASE LOGS...</div>
        <div class="fee-list" id="payment-body"></div>
    </div>

    <div class="card">
        <h2><i class="fas fa-circle-check" style="color: var(--success);"></i> Paid Students Log</h2>
        <div class="paid-table-wrapper">
            <table class="paid-table">
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th style="text-align: right;">Payment Date</th>
                    </tr>
                </thead>
                <tbody id="paid-students-table-body">
                    <tr>
                        <td colspan="2" style="text-align: center; color: var(--text-muted); opacity: 0.5; padding: 25px;">No payment records found for this month.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const currentMonth = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
    document.getElementById('cur-month').innerText = currentMonth;

    let globalStudentDirectory = [];
    let attendanceNames = [];
    let currentPaymentStatuses = {}; 
    let paymentDates = {}; 

    function cleanString(str) {
        if (!str) return '';
        return str.toString().toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "").replace(/\s+/g, "").trim();
    }

    function sanitizePhoneNumber(phone) {
        if (!phone) return "";
        let pureDigits = phone.toString().replace(/\D/g, "");
        if (pureDigits.length > 10) pureDigits = pureDigits.slice(-10);
        return pureDigits.length === 10 ? "91" + pureDigits : "";
    }

    function formatPaymentDate(timestamp) {
        if (!timestamp) return new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        const date = new Date(timestamp);
        return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    }

    function updateFeeCalculations(totalStudentsCount) {
        const totalStudents = totalStudentsCount;
        let paidCount = 0;
        let tableRowsHtml = "";
        const paidStudentsList = [];

        Object.keys(currentPaymentStatuses).forEach(name => {
            if (currentPaymentStatuses[name] === "Paid") {
                paidCount++;
                paidStudentsList.push({ name: name, dateStr: paymentDates[name] || formatPaymentDate(null) });
            }
        });

        const totalAmountCollected = paidCount * 500;
        document.getElementById('total-count').innerText = totalStudents;
        document.getElementById('paid-ratio').innerText = `${paidCount}/${totalStudents}`;
        document.getElementById('total-amount').innerText = `₹${totalAmountCollected}`;

        const tableBody = document.getElementById('paid-students-table-body');
        if (paidStudentsList.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="2" style="text-align: center; color: var(--text-muted); opacity: 0.5; padding: 25px;">No payment records found for this month.</td></tr>`;
        } else {
            paidStudentsList.forEach(student => {
                tableRowsHtml += `<tr><td style="font-weight: 600; color: #fff;">${student.name}</td><td style="text-align: right;"><span class="date-badge">${student.dateStr}</span></td></tr>`;
            });
            tableBody.innerHTML = tableRowsHtml;
        }
    }

    function listenToDataSources() {
        onSnapshot(collection(db, "students"), (snapshot) => {
            globalStudentDirectory = [];
            snapshot.forEach((studentDoc) => {
                const data = studentDoc.data();
                globalStudentDirectory.push({
                    rawDocId: studentDoc.id, rawFieldName: data.name || studentDoc.id,
                    cleanDocId: cleanString(studentDoc.id), cleanFieldName: cleanString(data.name || studentDoc.id),
                    phone: sanitizePhoneNumber(data.phoneNumber)
                });
            });
            combineAndLoadLedger();
        });

        onSnapshot(collection(db, "attendance"), (snapshot) => {
            attendanceNames = [...new Set(snapshot.docs.map(docSnap => docSnap.data().userName || docSnap.data().studentName))].filter(Boolean);
            combineAndLoadLedger();
        });
    }
    function combineAndLoadLedger() {
        const payBody = document.getElementById('payment-body');
        const loadingDiv = document.getElementById('loading');
        loadingDiv.style.display = "none";

        const directoryNames = globalStudentDirectory.map(s => s.rawFieldName);
        const finalStudentNames = [...new Set([...directoryNames, ...attendanceNames])].filter(Boolean);

        if(finalStudentNames.length === 0) {
            payBody.innerHTML = '<div style="text-align:center; padding:20px; color: var(--text-muted); opacity:0.5;">No logs found.</div>';
            updateFeeCalculations(0);
            return;
        }

        const getSafeId = (name) => `row-${name.replace(/[^a-zA-Z0-9]/g, '')}`;

        const currentRenderedNames = new Set(finalStudentNames);
        Array.from(payBody.children).forEach(child => {
            const rowNameAttr = child.getAttribute('data-name');
            if(rowNameAttr && !currentRenderedNames.has(rowNameAttr)){ child.remove(); }
        });

        finalStudentNames.forEach((name) => {
            const rowId = getSafeId(name);
            let row = document.getElementById(rowId);

            if (!row) {
                row = document.createElement('div');
                row.id = rowId;
                row.setAttribute('data-name', name);
                row.className = "fee-row border-unpaid";
                row.innerHTML = `
                    <div class="student-meta">
                        <b>${name}</b>
                        <small><i class="fas fa-shield-halved" style="color:var(--info);"></i> Secure Profile</small>
                    </div>
                    <div class="actions-flex" id="actions-${rowId}">
                        <button class="status-badge status-unpaid" id="btn-${rowId}">UNPAID</button>
                    </div>
                `;
                payBody.appendChild(row);
            }

            const docRef = doc(db, "payments", name, "months", currentMonth);
            onSnapshot(docRef, (pDoc) => {
                const status = (pDoc.exists() && pDoc.data().status === "Paid") ? "Paid" : "Unpaid";
                currentPaymentStatuses[name] = status;
                
                if(pDoc.exists() && pDoc.data().updatedAt) {
                    paymentDates[name] = formatPaymentDate(pDoc.data().updatedAt);
                } else { paymentDates[name] = formatPaymentDate(null); }
                
                updateFeeCalculations(finalStudentNames.length);

                const badgeClass = status === "Paid" ? "status-badge status-paid" : "status-badge status-unpaid";
                const borderClass = status === "Paid" ? "fee-row border-paid" : "fee-row border-unpaid";
                
                const currentRow = document.getElementById(rowId);
                const actionsDiv = document.getElementById(`actions-${rowId}`);
                
                if (currentRow && actionsDiv) {
                    currentRow.className = borderClass;
                    actionsDiv.innerHTML = ""; 
                    
                    if(status === "Paid") {
                        const invBtn = document.createElement('button');
                        invBtn.className = "invoice-btn";
                        invBtn.innerHTML = `<i class="fab fa-whatsapp"></i> INVOICE`;
                        invBtn.onclick = () => generateAndSendInvoice(name);
                        actionsDiv.appendChild(invBtn);
                    }
                    
                    const statusBtn = document.createElement('button');
                    statusBtn.className = badgeClass;
                    statusBtn.id = `btn-${rowId}`;
                    statusBtn.innerText = status.toUpperCase();
                    statusBtn.onclick = () => toggleStatus(name, status);
                    actionsDiv.appendChild(statusBtn);
                }
            });
        });

        const searchInput = document.getElementById('student-search');
        searchInput.oninput = (e) => {
            const term = e.target.value.toLowerCase().trim();
            finalStudentNames.forEach((name) => {
                const rowId = getSafeId(name);
                const rowElement = document.getElementById(rowId);
                if (rowElement) { rowElement.style.display = name.toLowerCase().includes(term) ? "flex" : "none"; }
            });
        };
    }

    async function toggleStatus(name, currentStatus) {
        const newStatus = currentStatus === "Paid" ? "Unpaid" : "Paid";
        const docRef = doc(db, "payments", name, "months", currentMonth);
        try { await setDoc(docRef, { status: newStatus, updatedAt: Date.now() }, { merge: true }); } catch(e) { console.error(e); }
    }

    async function addNewStudentToPermanentDirectory() {
        const nameInput = document.getElementById('new-student-name');
        const phoneInput = document.getElementById('new-student-phone');
        const nameValue = nameInput.value.trim();
        const phoneValue = phoneInput.value.trim();

        if(!nameValue) { alert("Please enter a valid student name."); return; }

        try {
            const studentDocRef = doc(db, "students", nameValue);
            await setDoc(studentDocRef, { name: nameValue, phoneNumber: phoneValue || "", createdAt: Date.now() }, { merge: true });
            alert(`"${nameValue}" permanently added to database. Will appear every month!`);
            nameInput.value = ""; phoneInput.value = "";
        } catch (error) { console.error(error); alert("Error adding student."); }
    }

    document.getElementById('add-student-submit').onclick = addNewStudentToPermanentDirectory;

    function generateAndSendInvoice(studentName) {
        const attendanceClean = cleanString(studentName);
        let phoneNum = "";
        const match = globalStudentDirectory.find(s => s.cleanDocId === attendanceClean || s.cleanFieldName === attendanceClean || attendanceClean.includes(s.cleanDocId) || s.cleanDocId.includes(attendanceClean));

        if (match && match.phone) { phoneNum = match.phone; } else {
            let manualInput = prompt(`Enter 10-digit Phone Number for "${studentName}":`);
            if (!manualInput) return;
            phoneNum = sanitizePhoneNumber(manualInput);
        }
        if (!phoneNum) { alert("Invalid format."); return; }

        try {
            const { jsPDF } = window.jspdf;
            const docPdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a6" });
            docPdf.setFillColor(2, 6, 23); docPdf.rect(0, 0, 105, 148, "F");
            docPdf.setFillColor(99, 102, 241); docPdf.rect(0, 0, 105, 4, "F");
            docPdf.setTextColor(255, 255, 255); docPdf.setFont("Helvetica", "bold"); docPdf.setFontSize(13);
            docPdf.text("BLACKTERMINAL LOGS", 10, 18);
            docPdf.setFontSize(7.5); docPdf.setFont("Helvetica", "normal"); docPdf.setTextColor(148, 163, 184);
            docPdf.text("SECURE DATABASE TRANSACTION LEDGER", 10, 23);
            docPdf.setDrawColor(30, 41, 59); docPdf.line(10, 28, 95, 28);
            docPdf.setFontSize(10); docPdf.text(`Student: ${studentName}`, 10, 40);
            
            const txnID = `BT-${Math.floor(100000 + Math.random() * 900000)}`;
            docPdf.setFontSize(9); docPdf.setTextColor(148, 163, 184);
            docPdf.text(`Billing Cycle: ${currentMonth}`, 10, 47);
            docPdf.text(`TXN Reference: #${txnID}`, 10, 53);
            docPdf.text(`Date Issued: ${new Date().toLocaleDateString()}`, 10, 59);
            
            docPdf.setFillColor(34, 197, 94); docPdf.rect(10, 68, 32, 8, "F");
            docPdf.setTextColor(255, 255, 255); docPdf.setFont("Helvetica", "bold"); docPdf.text("STATUS: PAID", 14, 73.5);
            docPdf.save(`${studentName.replace(/[^a-zA-Z0-9]/g, '_')}_Invoice.pdf`);

            const messageText = `⚡ *BLACKTERMINAL LEDGER* ⚡\n\nHello *${studentName}*,\nYour fees transaction ledger log for *${currentMonth}* has been verified!\n\n✅ *Status:* PAID\n🔒 *Txn ID:* #${txnID}\n📅 *Date:* ${new Date().toLocaleDateString()}\n\n⚠️ *Reminder:* Please note, fees must be paid before the 10th of every month.`;
            window.open(`https://api.whatsapp.com/send?phone=${phoneNum}&text=${encodeURIComponent(messageText)}`, '_blank');
        } catch (error) { alert("Error rendering module layout."); }
    }

    listenToDataSources();
</script>
</body>
</html>
