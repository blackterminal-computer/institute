<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin | Student Fees Ledger</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600;700;800&display=swap');

        :root { 
            --accent: #ff3e3e; 
            --bg: #030508; 
            --card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --success: #2ecc71;
            --info: #3498db;
            --orange: #ff9f0a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: #e0e0e0; 
            margin: 0; 
            padding: 15px; 
            line-height: 1.4;
        }

        .container { max-width: 600px; margin: auto; }

        .header-flex { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
        }
        
        h1 { font-size: 1.2rem; letter-spacing: 3px; font-weight: 800; margin: 0; }
        h1 span { color: var(--accent); }

        .back-btn { 
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }

        .card { 
            background: var(--card); 
            padding: 18px; 
            border-radius: 22px; 
            border: 1px solid var(--border); 
            width: 100%; 
        }

        h2 { 
            font-size: 0.95rem; 
            color: #fff; 
            margin-top: 0; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }

        .fee-list { 
            max-height: 70vh; 
            overflow-y: auto; 
            padding-right: 2px;
        }
        
        .fee-list::-webkit-scrollbar { width: 4px; }
        .fee-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* Staff Attendance / Row-style Match */
        .fee-row {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 14px; 
            background: rgba(255,255,255,0.02);
            border-radius: 12px; 
            margin-bottom: 8px; 
            border: 1px solid rgba(255,255,255,0.01);
            transition: 0.2s;
        }
        
        /* Status Dynamic Left Border Highlights like Staff Profiles */
        .fee-row.border-paid { border-left: 3px solid var(--success); }
        .fee-row.border-unpaid { border-left: 3px solid var(--accent); }
        
        .fee-row:hover {
            background: rgba(255,255,255,0.04);
            transform: translateX(2px);
        }
        
        .student-meta b { font-size: 0.8rem; color: #fff; display: block; }
        .student-meta small { font-size: 0.65rem; opacity: 0.5; display: inline-flex; align-items: center; gap: 4px; margin-top: 2px; }

        /* Strict/Badge Button Framework Match */
        .status-badge {
            padding: 6px 14px; 
            border-radius: 8px; 
            font-size: 9px; 
            font-weight: 800; 
            cursor: pointer; 
            border: none; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.1s ease, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .status-badge:active { transform: scale(0.95); }
        
        .status-paid { background: var(--success); color: #000; }
        .status-unpaid { background: var(--accent); color: #fff; }

        #loading { text-align: center; opacity: 0.5; padding: 30px; font-size: 0.75rem; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i> CONTROL PANEL</a>

    <div class="header-flex">
        <h1>BLACK<span>TERMINAL</span> FEES</h1>
        <div style="display:flex; gap:10px;">
            <div id="att-count" style="font-size: 0.65rem; background: var(--info); color: white; padding: 6px 15px; border-radius: 20px; font-weight: 800; text-transform: uppercase;">TOTAL: <span id="total-count">0</span></div>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-wallet" style="color: var(--orange);"></i> Student Fees Ledger (<span id="cur-month">--</span>)</h2>
        
        <div id="loading"><i class="fas fa-spinner fa-spin"></i> FETCHING DATABASE LOGS...</div>
        
        <div class="fee-list" id="payment-body">
            </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    firebase.initializeApp(firebaseConfig);
    const fs = firebase.firestore();

    const currentMonth = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
    document.getElementById('cur-month').innerText = currentMonth;

    function loadStudentPayments() {
        const payBody = document.getElementById('payment-body');
        const totalCountSpan = document.getElementById('total-count');
        const loadingDiv = document.getElementById('loading');
        
        fs.collection("attendance").onSnapshot(async (snapshot) => {
            const studentNames = [...new Set(snapshot.docs.map(doc => doc.data().userName || doc.data().studentName))].filter(Boolean);
            
            totalCountSpan.innerText = studentNames.length;
            loadingDiv.style.display = "none";
            
            if(studentNames.length === 0) {
                payBody.innerHTML = '<div style="text-align:center; padding:20px; opacity:0.4; font-size:12px;">No student logs mapped to ledger nodes.</div>';
                return;
            }

            for (const name of studentNames) {
                fs.collection("payments").doc(name).collection("months").doc(currentMonth)
                .onSnapshot((pDoc) => {
                    const status = (pDoc.exists && pDoc.data().status === "Paid") ? "Paid" : "Unpaid";
                    const badgeClass = status === "Paid" ? "status-badge status-paid" : "status-badge status-unpaid";
                    const borderClass = status === "Paid" ? "fee-row border-paid" : "fee-row border-unpaid";
                    
                    let row = document.getElementById(`row-${name.replace(/\s+/g, '')}`);
                    
                    const rowHtml = `
                        <div class="student-meta">
                            <b>${name}</b>
                            <small><i class="fas fa-shield-halved" style="color:var(--info);"></i> Secure Ledger Profile</small>
                        </div>
                        <button class="${badgeClass}" onclick="toggleOneTabStatus('${name}', '${status}')">
                            ${status}
                        </button>
                    `;

                    if(row) {
                        row.className = borderClass;
                        row.innerHTML = rowHtml;
                    } else {
                        const div = document.createElement('div');
                        div.id = `row-${name.replace(/\s+/g, '')}`;
                        div.className = borderClass;
                        div.innerHTML = rowHtml;
                        payBody.appendChild(div);
                    }
                });
            }
        });
    }

    async function toggleOneTabStatus(name, currentStatus) {
        const newStatus = currentStatus === "Paid" ? "Unpaid" : "Paid";
        try {
            await fs.collection("payments").doc(name).collection("months").doc(currentMonth).set({
                status: newStatus,
                updatedAt: Date.now()
            }, { merge: true });
        } catch(e) { 
            console.error("Write execution crash:", e); 
        }
    }

    loadStudentPayments();
</script>
</body>
</html>
