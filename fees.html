<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin | Student Fees Ledger</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600;700;800&display=swap');

        :root { 
            --accent: #ff3e3e; 
            --bg: #020617; 
            --card: #0f172a;
            --border: #1e293b;
            --success: #22c55e;
            --info: #6366f1;
            --orange: #fbbf24;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Segoe UI', 'Inter', sans-serif; 
            background: var(--bg); 
            color: #e0e0e0; 
            margin: 0; 
            padding: 15px; 
            line-height: 1.4;
        }

        .container { max-width: 600px; margin: auto; }

        .header-flex { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }
        
        h1 { font-size: 1.2rem; letter-spacing: 2px; font-weight: 800; margin: 0; color: #fff; }
        h1 span { color: var(--info); }

        .back-btn { 
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        /* Summary Dashboard Grid Layout */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .summary-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 10px;
            text-align: center;
        }

        .summary-box small {
            display: block;
            font-size: 0.65rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .summary-box span {
            font-size: 1rem;
            font-weight: 800;
            color: #fff;
        }

        .summary-box.highlight span {
            color: var(--success);
        }

        .card { 
            background: var(--card); 
            padding: 18px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            width: 100%; 
        }

        h2 { 
            font-size: 0.95rem; 
            color: #fff; 
            margin-top: 0; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }

        .fee-list { max-height: 70vh; overflow-y: auto; }

        .fee-row {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 14px; 
            background: #020617;
            border-radius: 8px; 
            margin-bottom: 10px; 
            border: 1px solid var(--border);
        }
        
        .fee-row.border-paid { border-left: 4px solid var(--success); }
        .fee-row.border-unpaid { border-left: 4px solid var(--accent); }

        .student-meta b { font-size: 0.85rem; color: #fff; display: block; }
        .student-meta small { font-size: 0.7rem; opacity: 0.6; display: inline-flex; align-items: center; gap: 4px; margin-top: 2px; }

        .actions-flex { display: flex; align-items: center; gap: 8px; }

        .status-badge {
            padding: 6px 14px; 
            border-radius: 6px; 
            font-size: 10px; 
            font-weight: 800; 
            cursor: pointer; 
            border: none; 
            text-transform: uppercase;
        }
        
        .status-paid { background: var(--success); color: #fff; }
        .status-unpaid { background: var(--accent); color: #fff; }

        .invoice-btn {
            background: #25d366;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 10px;
            cursor: pointer;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        #loading { text-align: center; color: var(--info); padding: 30px; font-size: 0.85rem; }
        #student-search:focus { border-color: var(--info) !important; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i> CONTROL PANEL</a>

    <div class="header-flex">
        <h1>BLACK<span>TERMINAL</span> FEES</h1>
    </div>

    <div class="summary-grid">
        <div class="summary-box">
            <small>Total Students</small>
            <span id="total-count">0</span>
        </div>
        <div class="summary-box">
            <small>Paid Ratio</small>
            <span id="paid-ratio">0/0</span>
        </div>
        <div class="summary-box highlight">
            <small>Total Received</small>
            <span id="total-amount">₹0</span>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-wallet" style="color: var(--orange);"></i> Student Fees Ledger (<span id="cur-month">--</span>)</h2>
        
        <div style="position: relative; margin-bottom: 15px;">
            <i class="fas fa-search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3); font-size: 0.85rem;"></i>
            <input type="text" id="student-search" placeholder="Search student name..." style="width: 100%; padding: 10px 12px 10px 35px; background: #020617; border: 1px solid var(--border); border-radius: 8px; color: #fff; font-size: 0.85rem; outline: none; transition: border-color 0.2s;">
        </div>

        <div id="loading"><i class="fas fa-spinner fa-spin"></i> FETCHING DATABASE LOGS...</div>
        <div class="fee-list" id="payment-body"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const currentMonth = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
    document.getElementById('cur-month').innerText = currentMonth;

    let globalStudentDirectory = [];
    let currentPaymentStatuses = {}; 

    function cleanString(str) {
        if (!str) return '';
        return str.toString().toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "").replace(/\s+/g, "").trim();
    }

    function sanitizePhoneNumber(phone) {
        if (!phone) return "";
        let pureDigits = phone.toString().replace(/\D/g, "");
        if (pureDigits.length > 10) pureDigits = pureDigits.slice(-10);
        return pureDigits.length === 10 ? "91" + pureDigits : "";
    }
    // Live automatic calculations function
    function updateFeeCalculations(totalStudentsCount) {
        const totalStudents = totalStudentsCount;
        let paidCount = 0;

        Object.values(currentPaymentStatuses).forEach(status => {
            if (status === "Paid") paidCount++;
        });

        const totalAmountCollected = paidCount * 500;

        document.getElementById('total-count').innerText = totalStudents;
        document.getElementById('paid-ratio').innerText = `${paidCount}/${totalStudents}`;
        document.getElementById('total-amount').innerText = `₹${totalAmountCollected}`;
    }

    function listenToStudentDirectory() {
        onSnapshot(collection(db, "students"), (snapshot) => {
            globalStudentDirectory = [];
            snapshot.forEach((studentDoc) => {
                const data = studentDoc.data();
                globalStudentDirectory.push({
                    rawDocId: studentDoc.id,
                    rawFieldName: data.name || '',
                    cleanDocId: cleanString(studentDoc.id),
                    cleanFieldName: cleanString(data.name),
                    phone: sanitizePhoneNumber(data.phoneNumber)
                });
            });
            loadStudentPayments();
        });
    }

    function loadStudentPayments() {
        const payBody = document.getElementById('payment-body');
        const loadingDiv = document.getElementById('loading');
        
        onSnapshot(collection(db, "attendance"), (snapshot) => {
            const studentNames = [...new Set(snapshot.docs.map(docSnap => docSnap.data().userName || docSnap.data().studentName))].filter(Boolean);
            loadingDiv.style.display = "none";
            
            if(studentNames.length === 0) {
                payBody.innerHTML = '<div style="text-align:center; padding:20px; opacity:0.4;">No logs found.</div>';
                updateFeeCalculations(0);
                return;
            }

            const getSafeId = (name) => `row-${name.replace(/[^a-zA-Z0-9]/g, '')}`;

            studentNames.forEach((name) => {
                const rowId = getSafeId(name);
                let row = document.getElementById(rowId);

                if (!row) {
                    row = document.createElement('div');
                    row.id = rowId;
                    row.className = "fee-row border-unpaid";
                    row.innerHTML = `
                        <div class="student-meta">
                            <b>${name}</b>
                            <small><i class="fas fa-shield-halved" style="color:var(--info);"></i> Secure Profile</small>
                        </div>
                        <div class="actions-flex" id="actions-${rowId}">
                            <button class="status-badge status-unpaid" id="btn-${rowId}">UNPAID</button>
                        </div>
                    `;
                    payBody.appendChild(row);
                }

                const docRef = doc(db, "payments", name, "months", currentMonth);
                onSnapshot(docRef, (pDoc) => {
                    const status = (pDoc.exists() && pDoc.data().status === "Paid") ? "Paid" : "Unpaid";
                    
                    currentPaymentStatuses[name] = status;
                    updateFeeCalculations(studentNames.length);

                    const badgeClass = status === "Paid" ? "status-badge status-paid" : "status-badge status-unpaid";
                    const borderClass = status === "Paid" ? "fee-row border-paid" : "fee-row border-unpaid";
                    
                    const currentRow = document.getElementById(rowId);
                    const actionsDiv = document.getElementById(`actions-${rowId}`);
                    
                    if (currentRow && actionsDiv) {
                        currentRow.className = borderClass;
                        actionsDiv.innerHTML = ""; 
                        
                        if(status === "Paid") {
                            const invBtn = document.createElement('button');
                            invBtn.className = "invoice-btn";
                            invBtn.innerHTML = `<i class="fab fa-whatsapp"></i> INVOICE`;
                            invBtn.onclick = () => generateAndSendInvoice(name);
                            actionsDiv.appendChild(invBtn);
                        }
                        
                        const statusBtn = document.createElement('button');
                        statusBtn.className = badgeClass;
                        statusBtn.id = `btn-${rowId}`;
                        statusBtn.innerText = status.toUpperCase();
                        statusBtn.onclick = () => toggleStatus(name, status);
                        actionsDiv.appendChild(statusBtn);
                    }
                });
            });

            const searchInput = document.getElementById('student-search');
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase().trim();
                studentNames.forEach((name) => {
                    const rowId = getSafeId(name);
                    const rowElement = document.getElementById(rowId);
                    if (rowElement) {
                        rowElement.style.display = name.toLowerCase().includes(term) ? "flex" : "none";
                    }
                });
            });
        });
    }

    async function toggleStatus(name, currentStatus) {
        const newStatus = currentStatus === "Paid" ? "Unpaid" : "Paid";
        const docRef = doc(db, "payments", name, "months", currentMonth);
        try {
            await setDoc(docRef, { status: newStatus, updatedAt: Date.now() }, { merge: true });
        } catch(e) { console.error(e); }
    }

    function generateAndSendInvoice(studentName) {
        const attendanceClean = cleanString(studentName);
        let phoneNum = "";

        const match = globalStudentDirectory.find(s => 
            s.cleanDocId === attendanceClean || s.cleanFieldName === attendanceClean ||
            attendanceClean.includes(s.cleanDocId) || s.cleanDocId.includes(attendanceClean)
        );

        if (match && match.phone) {
            phoneNum = match.phone;
        } else {
            let manualInput = prompt(`Database couldn't auto-map phone for "${studentName}".\nPlease type the 10-digit Mobile Number manually:`);
            if (!manualInput) return;
            phoneNum = sanitizePhoneNumber(manualInput);
        }

        if (!phoneNum) {
            alert("Invalid phone number format. Action aborted.");
            return;
        }

        try {
            const { jsPDF } = window.jspdf;
            const docPdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a6" });

            docPdf.setFillColor(2, 6, 23); docPdf.rect(0, 0, 105, 148, "F");
            docPdf.setFillColor(99, 102, 241); docPdf.rect(0, 0, 105, 4, "F");
            docPdf.setTextColor(255, 255, 255); docPdf.setFont("Helvetica", "bold"); docPdf.setFontSize(13);
            docPdf.text("BLACKTERMINAL LOGS", 10, 18);
            docPdf.setFontSize(7.5); docPdf.setFont("Helvetica", "normal"); docPdf.setTextColor(148, 163, 184);
            docPdf.text("SECURE DATABASE TRANSACTION LEDGER", 10, 23);
            docPdf.setDrawColor(30, 41, 59); docPdf.line(10, 28, 95, 28);
            docPdf.setFontSize(10); docPdf.setTextColor(255, 255, 255);
            docPdf.text(`Student: ${studentName}`, 10, 40);
            
            const txnID = `BT-${Math.floor(100000 + Math.random() * 900000)}`;
            const currentTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            docPdf.setFontSize(9); docPdf.setTextColor(148, 163, 184);
            docPdf.text(`Billing Cycle: ${currentMonth}`, 10, 47);
            docPdf.text(`TXN Reference: #${txnID}`, 10, 53);
            docPdf.text(`Date Issued: ${new Date().toLocaleDateString()}`, 10, 59);
            docPdf.text(`Time Issued: ${currentTime}`, 10, 65);
            
            docPdf.setFillColor(34, 197, 94); docPdf.rect(10, 73, 32, 8, "F");
            docPdf.setTextColor(255, 255, 255); docPdf.setFont("Helvetica", "bold"); docPdf.text("STATUS: PAID", 14, 78.5);

            docPdf.setFontSize(6.8); docPdf.setFont("Helvetica", "bold"); docPdf.setTextColor(255, 62, 62);
            docPdf.text("NOTE: Fees must be paid before the 10th of every month.", 10, 92);

            docPdf.save(`${studentName.replace(/[^a-zA-Z0-9]/g, '_')}_Invoice.pdf`);

            const currentTimeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const messageText = `⚡ *BLACKTERMINAL LEDGER* ⚡\n\nHello *${studentName}*,\nYour fees transaction ledger log for *${currentMonth}* has been verified!\n\n✅ *Status:* PAID\n🔒 *Txn ID:* #${txnID}\n📅 *Date:* ${new Date().toLocaleDateString()}\n🕒 *Time:* ${currentTimeStr}\n\n⚠️ *Important Reminder:* Please note, fees must be paid before the 10th of every month.`;
            
            const whatsappUrl = `https://api.whatsapp.com/send?phone=${phoneNum}&text=${encodeURIComponent(messageText)}`;
            window.open(whatsappUrl, '_blank');
        } catch (error) {
            alert("Error rendering receipt module layout.");
        }
    }

    listenToStudentDirectory();
</script>
</body>
</html>
