<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL v3 | Hyper Elite</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #00f2ff; --bg: #05070a;
            --card-bg: rgba(15, 23, 42, 0.4); --glass: rgba(255, 255, 255, 0.03);
            --gold: #ffb800; --danger: #ff2d55; --success: #00ffa3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; padding-bottom: 120px; overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.15), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.1), transparent 40%);
        }

        /* --- Header & Profile --- */
        .header-elite { padding: 40px 20px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .profile-hex { position: relative; width: 70px; height: 70px; padding: 3px; background: linear-gradient(45deg, var(--primary), var(--accent)); border-radius: 22px; transform: rotate(-5deg); transition: 0.5s; }
        .profile-hex img { width: 100%; height: 100%; object-fit: cover; border-radius: 19px; border: 3px solid var(--bg); }
        .user-info h2 { font-family: 'Syncopate', sans-serif; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }
        .rank-pill { font-size: 9px; font-weight: 800; background: rgba(0, 242, 255, 0.1); color: var(--accent); padding: 4px 12px; border-radius: 100px; border: 1px solid rgba(0, 242, 255, 0.3); display: inline-block; }

        /* --- Notification Bubble --- */
        #shoutoutBubble {
            position: fixed; top: 20px; left: 15px; right: 15px; z-index: 10000;
            background: rgba(10, 15, 25, 0.9); border: 1px solid var(--glass);
            border-radius: 24px; padding: 15px; display: flex; align-items: center; gap: 15px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            transform: translateY(-150%); transition: 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #shoutoutBubble.active { transform: translateY(0); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

        /* --- XP System --- */
        .xp-master-card { margin: 15px 20px; background: var(--card-bg); border: 1px solid var(--glass); border-radius: 35px; padding: 25px; position: relative; overflow: hidden; }
        .progress-container { position: relative; height: 12px; background: rgba(255,255,255,0.03); border-radius: 100px; margin: 20px 0; border: 1px solid var(--glass); }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 100px; width: 0%; box-shadow: 0 0 15px var(--accent); transition: 1.5s cubic-bezier(0.17, 0.85, 0.32, 1.27); }

        /* --- Bento Grid --- */
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .bento-box { background: var(--card-bg); border: 1px solid var(--glass); border-radius: 30px; padding: 20px; position: relative; transition: 0.3s; overflow: hidden; text-decoration: none; color: white; }
        .bento-box:active { background: rgba(255,255,255,0.05); transform: translateY(4px); }
        .bento-box i { font-size: 28px; color: var(--accent); }
        .bento-box.wide { grid-column: span 2; }
        .bento-box.gold { border-color: rgba(255, 184, 0, 0.3); background: linear-gradient(135deg, rgba(255, 184, 0, 0.05), transparent); }

        /* --- UI Elements --- */
        .float-att { position: fixed; top: 110px; right: 20px; z-index: 999; background: #fff; color: #000; padding: 10px 20px; border-radius: 100px; font-weight: 800; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); text-decoration: none; }
        .float-att.done { background: var(--success); }
        .nav-dock { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(10, 15, 25, 0.85); backdrop-filter: blur(25px); border: 1px solid var(--glass); border-radius: 35px; display: flex; justify-content: space-around; padding: 15px; z-index: 9999; }
        .nav-item { color: #52525b; text-decoration: none; position: relative; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 26px; }

        /* Slider */
        .slider-wrap { margin-top: 10px; padding: 0 20px; }
        .slider-inner { border-radius: 35px; overflow: hidden; border: 1px solid var(--glass); aspect-ratio: 16/9; position: relative; }
        .slider-track { display: flex; transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1); height: 100%; }
        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="shoutoutBubble">
        <div id="bAvatarCont" style="padding: 2px; background: var(--accent); border-radius: 15px;">
            <img src="" id="bAvatar" style="width: 45px; height: 45px; border-radius: 13px; display: block; object-fit: cover;">
        </div>
        <div style="flex:1">
            <p id="bUser" style="font-size: 10px; color: var(--accent); font-weight: 800; text-transform: uppercase;"></p>
            <p id="bMsg" style="font-size: 14px; font-weight: 600; color: #fff;"></p>
        </div>
    </div>

    <a href="attendence.html" id="att-pill" class="float-att"><i class="ri-fingerprint-line"></i> <span id="att-pill-text">Verify Link</span></a>

    <header class="header-elite">
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="profile-hex"><img id="uAvatar" src=""></div>
            <div class="user-info">
                <div id="rankBadge" class="rank-pill">SYNCING...</div>
                <h2 id="uName">Loading...</h2>
            </div>
        </div>
        <div id="sCount" style="text-align: right;">
            <p style="font-size: 10px; opacity: 0.5; font-weight: 800;">STREAK</p>
            <h3 id="streakVal" style="color: #ff6400; font-family: 'Syncopate';">🔥 0</h3>
        </div>
    </header>

    <div class="xp-master-card">
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <p id="uLevelBadge" style="font-size: 10px; font-weight: 800; color: var(--accent);">PROTOCOL 01</p>
                <h3 id="uNameXP" style="font-size: 22px; font-weight: 800;">User</h3>
            </div>
            <div style="text-align: right;">
                <h3 id="xpVal" style="font-family: 'Syncopate'; font-size: 20px;">0</h3>
                <p style="font-size: 9px; opacity: 0.4;">TOTAL XP</p>
            </div>
        </div>
        <div class="progress-container"><div class="progress-bar" id="xpBar"></div></div>
    </div>

    <div class="slider-wrap" id="sliderRoot" style="display: none;">
        <div class="slider-inner"><div class="slider-track" id="sliderTrack"></div></div>
    </div>

    <p style="padding: 25px 20px 10px; font-family: 'Syncopate'; font-size: 10px; color: var(--accent); opacity: 0.6;">Protocol_Menu</p>
    <div class="bento-grid">
        <div class="bento-box" onclick="triggerChallenge()"><i class="ri-sword-fill" style="color: var(--danger);"></i><h3 style="margin-top:10px;">RAID</h3><p>Extract XP</p></div>
        <div class="bento-box" onclick="buyFocusWall()"><i id="shieldIcon" class="ri-shield-flash-fill"></i><h3 style="margin-top:10px;">SHIELD</h3><p id="wallStatus">Offline</p></div>
        
        <div class="bento-box wide" style="display:flex; gap:15px; align-items:center;">
            <input type="text" id="shoutInput" placeholder="Broadcast signal..." style="background:none; border:none; color:#fff; flex:1; font-weight:600; outline:none;">
            <button onclick="sendSignal()" style="background:var(--accent); color:#000; border:none; padding:10px 20px; border-radius:15px; font-weight:900; font-size:10px;">SEND</button>
        </div>

        <a href="daily-test.html" class="bento-box"><i class="ri-terminal-window-line"></i><h3 style="margin-top:10px;">EXAMS</h3></a>
        <a href="leaderboard.html" class="bento-box gold"><i class="ri-medal-2-fill" style="color: var(--gold);"></i><h3 style="margin-top:10px;">RANKS</h3><p id="instRank">#--</p></a>
    </div>

    <nav class="nav-dock">
        <a href="index.html" class="nav-item active"><i class="ri-home-smile-2-fill"></i></a>
        <a href="daily-test.html" class="nav-item"><i class="ri-command-line"></i></a>
        <a href="chat.html" class="nav-item"><i class="ri-message-3-line"></i></a>
        <a href="profile.html" class="nav-item"><i class="ri-user-settings-line"></i></a>
    </nav>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, collection, getDocs, setDoc, addDoc, query, orderBy, limit, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI", authDomain: "black-terminal-f2c91.firebaseapp.com", projectId: "black-terminal-f2c91", storageBucket: "black-terminal-f2c91.appspot.com", messagingSenderId: "552489994197", appId: "1:552489994197:web:7662331264c334ffbadf5c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const student = localStorage.getItem("studentName") || "Guest";

        // --- Core Logic ---
        window.triggerChallenge = async () => {
            const uRef = doc(db, "students", student);
            const uSnap = await getDoc(uRef);
            if(uSnap.data().xp < 50) return alert("Low XP!");
            
            const q = query(collection(db, "students"), orderBy("xp", "desc"), limit(10));
            const snap = await getDocs(q);
            let pool = []; snap.forEach(d => { if(d.id !== student) pool.push(d.id); });
            const target = pool[Math.floor(Math.random() * pool.length)];
            const tRef = doc(db, "students", target);
            const tSnap = await getDoc(tRef);

            if(tSnap.data().focusWall > 0) {
                await updateDoc(tRef, { focusWall: increment(-1) });
                await updateDoc(uRef, { xp: increment(-50) });
                alert(`BLOCKED! ${target} had a shield.`);
            } else {
                const stolen = Math.floor(Math.random() * 50) + 30;
                await updateDoc(uRef, { xp: increment(stolen - 50) });
                await updateDoc(tRef, { xp: increment(-stolen) });
                await setDoc(doc(db, "interactions", "raid_news"), { attacker: student, target, stolen, time: Date.now() });
                alert(`STOLE ${stolen} XP from ${target}!`);
            }
        };

        window.buyFocusWall = async () => {
            const uRef = doc(db, "students", student);
            const snap = await getDoc(uRef);
            if(snap.data().xp < 150) return alert("Need 150 XP!");
            await updateDoc(uRef, { xp: increment(-150), focusWall: increment(1) });
            alert("SHIELD ACTIVE!");
        };

        window.sendSignal = async () => {
            const val = document.getElementById("shoutInput").value;
            if(!val.trim()) return;
            const uRef = doc(db, "students", student);
            const snap = await getDoc(uRef);
            if(snap.data().xp < 50) return alert("Need 50 XP!");
            const data = { user: student, text: val, avatar: snap.data().photo || "", time: Date.now() };
            await setDoc(doc(db, "interactions", "shoutout"), data);
            await updateDoc(uRef, { xp: increment(-50) });
            document.getElementById("shoutInput").value = "";
        };

        // --- Realtime Sync ---
        function startSync() {
            // User Data
            onSnapshot(doc(db, "students", student), (s) => {
                if(s.exists()){
                    const d = s.data(); const xp = d.xp || 0;
                    document.getElementById("uName").innerText = student;
                    document.getElementById("uNameXP").innerText = student;
                    document.getElementById("streakVal").innerText = "🔥 " + (d.streak || 0);
                    document.getElementById("xpVal").innerText = xp;
                    document.getElementById("uAvatar").src = d.photo || `https://api.dicebear.com/7.x/avataaars/svg?seed=${student}`;
                    document.getElementById("xpBar").style.width = (xp % 1000) / 10 + "%";
                    document.getElementById("uLevelBadge").innerText = "PROTOCOL " + (Math.floor(xp/1000)+1);
                    document.getElementById("wallStatus").innerText = (d.focusWall || 0) > 0 ? d.focusWall + " Active" : "Offline";
                    document.getElementById("shieldIcon").style.color = (d.focusWall || 0) > 0 ? "var(--success)" : "#52525b";
                }
            });

            // Shoutouts
            onSnapshot(doc(db, "interactions", "shoutout"), (s) => {
                if(s.exists()){
                    const d = s.data(); const b = document.getElementById("shoutoutBubble");
                    document.getElementById("bUser").innerText = d.user;
                    document.getElementById("bMsg").innerText = d.text;
                    document.getElementById("bAvatar").src = d.avatar || `https://api.dicebear.com/7.x/bottts/svg?seed=${d.user}`;
                    b.classList.add("active");
                    setTimeout(() => b.classList.remove("active"), 5000);
                }
            });

            // Raid Alerts
            onSnapshot(doc(db, "interactions", "raid_news"), (s) => {
                if(s.exists()){
                    const d = s.data(); const b = document.getElementById("shoutoutBubble");
                    document.getElementById("bUser").innerText = "BATTLE ALERT";
                    document.getElementById("bMsg").innerText = `${d.attacker} raided ${d.target} [-${d.stolen} XP]`;
                    document.getElementById("bAvatar").src = "https://cdn-icons-png.flaticon.com/512/8030/8030132.png";
                    b.classList.add("active");
                    setTimeout(() => b.classList.remove("active"), 6000);
                }
            });

            // Slider
            onSnapshot(doc(db, "settings", "slider"), (s) => {
                if(s.exists()){
                    const urls = s.data().images.split(",");
                    const track = document.getElementById("sliderTrack");
                    track.innerHTML = "";
                    urls.forEach(u => track.innerHTML += `<div class="slide"><img src="${u.trim()}"></div>`);
                    document.getElementById("sliderRoot").style.display = "block";
                }
            });
        }

        startSync();
    </script>
</body>
</html>
