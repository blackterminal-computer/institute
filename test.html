<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL v3 | Hyper Elite Gold</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #00f2ff; --bg: #05070a;
            --card-bg: rgba(15, 23, 42, 0.4); --glass: rgba(255, 255, 255, 0.03);
            --gold: #ffb800; --danger: #ff2d55; --success: #00ffa3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; padding-bottom: 120px; overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.15), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.1), transparent 40%);
        }

        /* --- Header & Rank --- */
        .header-elite { padding: 40px 20px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .profile-hex { position: relative; width: 70px; height: 70px; padding: 3px; background: linear-gradient(45deg, var(--primary), var(--accent)); border-radius: 22px; transform: rotate(-5deg); }
        .profile-hex img { width: 100%; height: 100%; object-fit: cover; border-radius: 19px; border: 3px solid var(--bg); }
        .rank-pill { font-size: 9px; font-weight: 800; background: rgba(0, 242, 255, 0.1); color: var(--accent); padding: 4px 12px; border-radius: 100px; border: 1px solid rgba(0, 242, 255, 0.3); display: inline-block; }

        /* --- BUTTERY SMOOTH SLIDER --- */
        .slider-wrap { margin: 15px 20px; }
        .slider-inner { border-radius: 30px; overflow: hidden; border: 1px solid var(--glass); aspect-ratio: 16/9; position: relative; background: #000; }
        .slider-track { 
            display: flex; 
            height: 100%; 
            width: 100%;
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1); /* Apple-style ease */
            will-change: transform;
        }
        .slide { min-width: 100%; height: 100%; flex-shrink: 0; }
        .slide img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* --- MARQUEE BOX --- */
        .marquee-box { 
            background: rgba(255,255,255,0.02); 
            border-radius: 100px; 
            padding: 10px 20px; 
            border: 1px solid var(--glass); 
            margin: 0 20px 10px;
            overflow: hidden;
        }
        #marqueeMsg { font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: 1px; }

        /* --- XP CARD & PROGRESS --- */
        .xp-master-card { margin: 15px 20px; background: var(--card-bg); border: 1px solid var(--glass); border-radius: 35px; padding: 25px; position: relative; overflow: hidden; }
        .progress-container { position: relative; height: 12px; background: rgba(255,255,255,0.03); border-radius: 100px; margin: 20px 0; border: 1px solid var(--glass); }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 100px; width: 0%; box-shadow: 0 0 15px var(--accent); transition: 1.2s ease-out; }

        /* --- BENTO GRID --- */
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .bento-box { background: var(--card-bg); border: 1px solid var(--glass); border-radius: 30px; padding: 20px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bento-box:active { transform: scale(0.92); }
        .bento-box.wide { grid-column: span 2; }

        /* --- NOTIFICATION BUBBLE --- */
        #shoutoutBubble {
            position: fixed; top: 20px; left: 15px; right: 15px; z-index: 10000;
            background: rgba(10, 15, 25, 0.95); border: 1px solid var(--accent);
            border-radius: 24px; padding: 15px; display: flex; align-items: center; gap: 15px;
            backdrop-filter: blur(20px); transform: translateY(-150%); transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #shoutoutBubble.active { transform: translateY(0); }

        /* --- NAV DOCK --- */
        .nav-dock { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(10, 15, 25, 0.8); backdrop-filter: blur(20px); border: 1px solid var(--glass); border-radius: 35px; display: flex; justify-content: space-around; padding: 15px; z-index: 9999; }
        .nav-item { color: #52525b; font-size: 24px; transition: 0.3s; }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); }

    </style>
</head>
<body>

    <div id="shoutoutBubble">
        <img src="" id="bAvatar" style="width: 45px; height: 45px; border-radius: 13px; background: var(--accent);">
        <div style="flex:1">
            <p id="bUser" style="font-size: 10px; color: var(--accent); font-weight: 800;"></p>
            <p id="bMsg" style="font-size: 14px; font-weight: 600; color: #fff;"></p>
        </div>
    </div>

    <header class="header-elite">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="profile-hex"><img id="uAvatar" src=""></div>
            <div>
                <div id="rankBadge" class="rank-pill">SYNCING...</div>
                <h2 id="uName" style="font-family: 'Syncopate'; font-size: 16px;">User</h2>
            </div>
        </div>
        <div id="streakDisplay" style="text-align: right;">
            <p style="font-size: 8px; opacity: 0.5;">STREAK</p>
            <h3 id="streakVal" style="color: #ff6400; font-family: 'Syncopate';">🔥 0</h3>
        </div>
    </header>

    <div class="marquee-box">
        <marquee scrollamount="6" id="marqueeMsg">INITIALIZING NEURAL BROADCAST...</marquee>
    </div>

    <div class="slider-wrap" id="sliderRoot" style="display: none;">
        <div class="slider-inner">
            <div class="slider-track" id="sliderTrack"></div>
        </div>
    </div>

    <div class="xp-master-card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 id="uNameXP" style="font-size: 20px; font-weight: 800;">Elite</h3>
            <span id="xpVal" style="font-family: 'Syncopate'; color: var(--accent);">0</span>
        </div>
        <div class="progress-container"><div class="progress-bar" id="xpBar"></div></div>
        <div style="display: flex; justify-content: space-between; font-size: 9px; opacity: 0.5;">
            <span id="instRank">RANK #--</span>
            <span id="uLevel">LEVEL 1</span>
        </div>
    </div>

    <div class="bento-grid">
        <a href="tournament.html" class="bento-box wide" style="background: linear-gradient(90deg, #6366f1, #00f2ff); padding: 2px; text-decoration: none;">
            <div style="background: var(--bg); border-radius: 28px; padding: 20px; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="color: #fff;">TOURNAMENT</h3>
                <i class="ri-trophy-fill" style="color: var(--gold); font-size: 30px;"></i>
            </div>
        </a>
        <div class="bento-box" onclick="triggerChallenge()"><i class="ri-sword-fill" style="color: var(--danger);"></i><h3>RAID</h3></div>
        <div class="bento-box" onclick="buyFocusWall()"><i id="shieldIcon" class="ri-shield-flash-fill"></i><h3>SHIELD</h3></div>
        
        <div class="bento-box wide" style="display: flex; gap: 10px;">
            <input type="text" id="shoutInput" placeholder="Broadcast message..." style="background: none; border: none; color: #fff; flex: 1; outline: none;">
            <button onclick="sendSignal()" style="background: var(--accent); border: none; padding: 8px 15px; border-radius: 12px; font-weight: 900; font-size: 10px;">SEND</button>
        </div>
    </div>

    <nav class="nav-dock">
        <a href="index.html" class="nav-item active"><i class="ri-home-5-fill"></i></a>
        <a href="battle.html" class="nav-item"><i class="ri-sword-line"></i></a>
        <a href="chat.html" class="nav-item"><i class="ri-message-3-line"></i></a>
        <a href="profile.html" class="nav-item"><i class="ri-user-line"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, collection, getDocs, setDoc, addDoc, query, orderBy, limit, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI", authDomain: "black-terminal-f2c91.firebaseapp.com", projectId: "black-terminal-f2c91", storageBucket: "black-terminal-f2c91.appspot.com", messagingSenderId: "552489994197", appId: "1:552489994197:web:7662331264c334ffbadf5c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const student = localStorage.getItem("studentName");
        if (!student) { window.location.href = "login.html"; }

        let currentSlide = 0;
        let totalSlides = 0;

        // --- BUTTERY SLIDER ENGINE ---
        function startSlider() {
            setInterval(() => {
                if (totalSlides > 1) {
                    currentSlide = (currentSlide + 1) % totalSlides;
                    const track = document.getElementById("sliderTrack");
                    track.style.transform = `translateX(-${currentSlide * 100}%)`;
                }
            }, 5000); // 5 seconds per slide
        }

        // --- CORE SYNC ---
        async function init() {
            // 1. Marquee Admin Sync (Document: content/marquee, Field: text)
            onSnapshot(doc(db, "content", "marquee"), (snap) => {
                if(snap.exists()) {
                    document.getElementById("marqueeMsg").innerText = snap.data().text || "SYSTEM READY";
                }
            });

            // 2. Slider Sync
            onSnapshot(doc(db, "settings", "slider"), (snap) => {
                if(snap.exists()){
                    const urls = snap.data().images ? snap.data().images.split(",") : [];
                    const track = document.getElementById("sliderTrack");
                    track.innerHTML = "";
                    totalSlides = urls.length;
                    if(totalSlides > 0) {
                        document.getElementById("sliderRoot").style.display = "block";
                        urls.forEach(url => {
                            track.innerHTML += `<div class="slide"><img src="${url.trim()}"></div>`;
                        });
                        startSlider();
                    }
                }
            });

            // 3. User Stats Sync
            onSnapshot(doc(db, "students", student), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    document.getElementById("uName").innerText = student;
                    document.getElementById("uNameXP").innerText = student;
                    document.getElementById("streakVal").innerText = `🔥 ${d.streak || 0}`;
                    document.getElementById("xpVal").innerText = d.xp || 0;
                    document.getElementById("uAvatar").src = d.photo || `https://api.dicebear.com/7.x/avataaars/svg?seed=${student}`;
                    document.getElementById("xpBar").style.width = ((d.xp % 1000) / 10) + "%";
                    document.getElementById("uLevel").innerText = "LEVEL " + (Math.floor((d.xp||0)/1000)+1);
                    
                    const shield = d.focusWall || 0;
                    document.getElementById("shieldIcon").style.color = shield > 0 ? "var(--success)" : "#52525b";
                    
                    const badge = document.getElementById("rankBadge");
                    badge.innerText = d.xp >= 5000 ? "ULTRA ELITE" : "NEURAL TRAINEE";
                    badge.style.color = d.xp >= 5000 ? "var(--gold)" : "var(--accent)";
                }
            });

            // 4. Shoutout Bubble
            onSnapshot(doc(db, "interactions", "shoutout"), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    const b = document.getElementById("shoutoutBubble");
                    document.getElementById("bUser").innerText = d.user;
                    document.getElementById("bMsg").innerText = d.text;
                    document.getElementById("bAvatar").src = d.avatar || `https://api.dicebear.com/7.x/bottts/svg?seed=${d.user}`;
                    b.classList.add("active");
                    setTimeout(() => b.classList.remove("active"), 5000);
                }
            });
        }

        // Global functions for buttons
        window.sendSignal = async () => {
            const msg = document.getElementById("shoutInput").value;
            if(!msg) return;
            const uRef = doc(db, "students", student);
            const snap = await getDoc(uRef);
            if(snap.data().xp < 50) return alert("Low XP!");
            await setDoc(doc(db, "interactions", "shoutout"), { 
                user: student, text: msg, avatar: snap.data().photo || "", time: Date.now() 
            });
            await updateDoc(uRef, { xp: increment(-50) });
            document.getElementById("shoutInput").value = "";
        };

        init();
    </script>
</body>
</html>
