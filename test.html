<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Hyper-Elite</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #00f2ff; --bg: #020617;
            --glass: rgba(15, 23, 42, 0.6); 
            --glass-border: rgba(255, 255, 255, 0.1);
            --gold: #facc15; --success: #22c55e; --danger: #ff4757;
            --neon-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        /* Animated Mesh Background */
        body { 
            background: var(--bg); color: #f8fafc; 
            padding-bottom: 120px; overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.15) 0%, transparent 50%);
            background-attachment: fixed;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* --- 500% Visual Impact Headers --- */
        .premium-header { 
            padding: 30px 20px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(180deg, rgba(2,6,23,1) 0%, rgba(2,6,23,0) 100%);
        }

        .avatar-box { 
            width: 60px; height: 60px; border-radius: 18px; 
            padding: 3px; background: linear-gradient(45deg, var(--primary), var(--accent));
            box-shadow: var(--neon-shadow); transform: rotate(-3deg);
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; transform: rotate(3deg); background: var(--bg); }

        /* --- Floating Attendance Button (Upgraded) --- */
        .float-att { 
            position: fixed; top: 110px; right: -10px; z-index: 9999; 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
            padding: 12px 25px 12px 15px; border-radius: 30px 0 0 30px;
            border: 1px solid var(--glass-border); border-right: none;
            display: flex; align-items: center; gap: 10px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .float-att i { font-size: 22px; color: var(--accent); text-shadow: var(--neon-shadow); }
        .float-att.done { background: rgba(34, 197, 94, 0.15); border-color: var(--success); }

        /* --- Dynamic XP Card --- */
        .xp-card { 
            margin: 15px 20px; background: var(--glass); border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 28px; backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .progress-track { height: 10px; background: rgba(255,255,255,0.03); border-radius: 20px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.05); }
        .progress-fill { 
            height: 100%; border-radius: 20px;
            background: linear-gradient(90deg, #6366f1, #00f2ff, #6366f1);
            background-size: 200% 100%; animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% 0; } }

        /* --- Card Grid (Premium Look) --- */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .card { 
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border: 1px solid var(--glass-border); padding: 25px 20px; border-radius: 24px;
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top left, rgba(0, 242, 255, 0.1), transparent);
            opacity: 0; transition: 0.3s;
        }
        .card:active { transform: translateY(5px) scale(0.96); }
        .card:active::before { opacity: 1; }
        .card i { font-size: 32px; margin-bottom: 12px; color: var(--accent); display: block; filter: drop-shadow(0 0 8px var(--accent)); }

        /* --- Bottom Nav (Cyberpunk Style) --- */
        .bottom-nav { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; 
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(25px);
            border-radius: 25px; display: flex; justify-content: space-around; 
            padding: 15px; border: 1px solid var(--glass-border); z-index: 10000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-link { color: #64748b; text-decoration: none; transition: 0.3s; }
        .nav-link.active { color: var(--accent); transform: translateY(-5px); text-shadow: 0 0 10px var(--accent); }

        /* --- Custom Badges --- */
        .rank-badge { font-family: 'Orbitron'; letter-spacing: 1px; padding: 4px 12px; border-radius: 8px; font-size: 9px; }
        .badge-gold { background: rgba(250, 204, 21, 0.1); color: var(--gold); border: 1px solid var(--gold); box-shadow: 0 0 10px rgba(250, 204, 21, 0.2); }

        /* --- Shoutout Bubble --- */
        #shoutoutBubble {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-150%);
            z-index: 11000; width: 90%; background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--accent); border-radius: 20px; padding: 15px;
            display: flex; align-items: center; gap: 15px; backdrop-filter: blur(20px);
            transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        #shoutoutBubble.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    </body>
</html>
