<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Elite Ultra Final</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #7c3aed; --accent: #00ffff; --bg: #02040a;
            --glass: rgba(255, 255, 255, 0.05);
            --neon: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #f1f5f9; min-height: 100vh; padding-bottom: 120px; overflow-x: hidden; }

        /* --- Header --- */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(2,4,10,0.9); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass); }
        .u-avatar { width: 55px; height: 55px; border-radius: 12px; border: 2px solid var(--accent); object-fit: cover; }

        /* --- Elite Spotlight (Admin Dynamic Slider) --- */
        .spotlight-area { margin: 20px; border-radius: 25px; overflow: hidden; height: 180px; position: relative; border: 1px solid var(--glass); }
        #adminSlider { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; }
        .spotlight-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }

        /* --- Word of the Day Section --- */
        .word-box { margin: 15px 20px; padding: 15px; background: var(--glass); border-radius: 20px; border-left: 4px solid var(--accent); display: none; }

        /* --- Tournament Card --- */
        .tourney-card { margin: 20px; padding: 25px; border-radius: 25px; background: linear-gradient(135deg, #7c3aed22, #00ffff11); border: 2px solid #fbbf24; position: relative; text-decoration: none; color: white; display: block; }
        .live-tag { background: #ef4444; color: white; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 900; position: absolute; top: 15px; left: 15px; }
        .trophy { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 50px; color: #fbbf24; }

        /* --- Broadcast & Archive --- */
        .broadcast-zone { margin: 20px; display: flex; gap: 10px; background: #0f172a; padding: 12px; border-radius: 15px; align-items: center; }
        .broadcast-zone input { background: transparent; border: none; color: #fff; flex: 1; outline: none; }
        .archive-icon { color: var(--accent); font-size: 24px; cursor: pointer; }

        /* --- XP Display --- */
        .xp-section { margin: 20px; padding: 25px; background: var(--glass); border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .progress-bg { height: 10px; background: rgba(255,255,255,0.05); border-radius: 50px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: 1s; }

        /* --- Action Grid (Final Layout) --- */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .action-card { background: rgba(255,255,255,0.03); border: 1px solid var(--glass); padding: 20px; border-radius: 25px; text-decoration: none; color: white; }
        .action-card i { font-size: 26px; color: var(--accent); margin-bottom: 8px; display: block; }
        .locked { opacity: 0.5; filter: grayscale(1); }

        /* --- Floating Attendance --- */
        #attBtn { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: var(--neon); z-index: 999; }

        /* --- Archive Panel --- */
        #archivePanel { position: fixed; inset: 0; background: var(--bg); z-index: 2000; transform: translateX(100%); transition: 0.4s; padding: 20px; overflow-y: auto; }
        #archivePanel.active { transform: translateX(0); }

        /* --- Bottom Nav --- */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(10, 10, 20, 0.95); border-radius: 25px; padding: 12px; display: flex; justify-content: space-around; border: 1px solid var(--glass); z-index: 1000; }
        .nav-link { color: #64748b; text-decoration: none; text-align: center; font-size: 10px; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <img id="uAvatar" class="u-avatar" src="">
            <div>
                <h2 id="uName" style="font-size: 18px; font-family: 'Orbitron';">USER</h2>
                <p id="uLevel" style="font-size: 10px; color: var(--accent); font-weight: 800;">BRONZE TRAINEE</p>
            </div>
        </div>
        <div style="color: #fbbf24; font-weight: 800;">🔥 <span id="sCount">0</span></div>
    </header>

    <div id="wordSection" class="word-box">
        <h3 id="wordTitle" style="font-family:'Orbitron'; color:var(--accent); font-size:16px;"></h3>
        <p id="wordDesc" style="font-size:13px; opacity:0.8; margin-top:5px;"></p>
    </div>

    <div class="spotlight-area">
        <img id="adminSlider" src="">
        <div class="spotlight-overlay">
            <h3 id="sliderTitle" style="font-family:'Orbitron'; font-size:16px;">Elite Spotlight</h3>
        </div>
    </div>

    <a href="tournament.html" class="tourney-card">
        <span class="live-tag">LIVE</span>
        <h2 style="font-family:'Orbitron'; margin-top:15px;">Tournament</h2>
        <i class="ri-trophy-fill trophy"></i>
    </a>

    <div class="broadcast-zone">
        <input type="text" id="shoutInput" placeholder="Broadcast signal... (50 XP)">
        <i class="ri-history-line archive-icon" onclick="toggleArchive()"></i>
        <button onclick="sendSignal()" style="background:var(--accent); border:none; padding:8px 15px; border-radius:8px; font-weight:900;">SEND</button>
    </div>

    <section class="xp-section">
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 id="uXP" style="font-size: 38px; font-family: 'Orbitron';">0 XP</h1>
                <p style="font-size: 10px; color: var(--accent);">NEXT LEVEL: 1000 XP</p>
            </div>
            <div style="text-align: right;">
                <p style="font-size: 10px; opacity: 0.5;">RANK</p>
                <h2 id="uRank" style="color: var(--accent); font-family: 'Orbitron'; font-size: 24px;">#--</h2>
            </div>
        </div>
        <div class="progress-bg"><div id="xpBar" class="progress-fill"></div></div>
    </section>

    <div class="action-grid">
        <a href="exams.html" class="action-card"><i class="ri-terminal-box-line"></i><h3>Exams</h3></a>
        <a href="battle.html" class="action-card"><i class="ri-fire-line"></i><h3>Battle</h3></a>
        <a href="flash.html" class="action-card"><i class="ri-flashlight-line"></i><h3>Flash</h3></a>
        <a href="courses.html" class="action-card"><i class="ri-video-line"></i><h3>Courses</h3></a>
        <div class="action-card" onclick="triggerRaid()" style="border-left: 4px solid #ef4444;"><i class="ri-sword-fill" style="color:#ef4444"></i><h3>XP Raid</h3></div>
        <div class="action-card locked" id="unitTestCard"><i class="ri-lock-line"></i><h3>Unit Test</h3><p style="font-size:9px;">5000 XP</p></div>
    </div>

    <div id="archivePanel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-family:'Orbitron'; color:var(--accent)">Signal Archive</h2>
            <i class="ri-close-line" onclick="toggleArchive()" style="font-size:30px;"></i>
        </div>
        <div id="archiveContent" style="margin-top:20px;"></div>
    </div>

    <div id="attBtn" onclick="markAttendance()"><i class="ri-fingerprint-fill"></i></div>

    <nav class="nav-bar">
        <a href="#" class="nav-link active"><i class="ri-home-7-fill" style="font-size:24px; display:block;"></i>Home</a>
        <a href="exams.html" class="nav-link"><i class="ri-edit-box-line" style="font-size:24px; display:block;"></i>Exams</a>
        <a href="chat.html" class="nav-link"><i class="ri-chat-3-line" style="font-size:24px; display:block;"></i>Chat</a>
        <a href="profile.html" class="nav-link"><i class="ri-user-line" style="font-size:24px; display:block;"></i>Profile</a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, orderBy, limit, getDoc, updateDoc, increment, setDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const studentName = localStorage.getItem("studentName") || "Guest";

        window.toggleArchive = () => document.getElementById("archivePanel").classList.toggle("active");

        function initSync() {
            // 1. User Data & Rank
            onSnapshot(doc(db, "students", studentName), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    const xp = d.xp || 0;
                    document.getElementById("uName").innerText = studentName;
                    document.getElementById("uXP").innerText = xp + " XP";
                    document.getElementById("sCount").innerText = d.streak || 0;
                    document.getElementById("uAvatar").src = d.photo || `https://api.dicebear.com/7.x/bottts/svg?seed=${studentName}`;
                    document.getElementById("xpBar").style.width = (xp % 1000) / 10 + "%";
                    
                    if(xp >= 5000) {
                        document.getElementById("unitTestCard").classList.remove("locked");
                        document.getElementById("unitTestCard").onclick = () => window.location.href="unit-test.html";
                    }
                }
            });

            // 2. Spotlight Slider
            onSnapshot(collection(db, "admin_slides"), (snap) => {
                let slides = []; snap.forEach(doc => slides.push(doc.data()));
                if(slides.length > 0) {
                    let i = 0;
                    setInterval(() => {
                        document.getElementById("adminSlider").src = slides[i].url;
                        document.getElementById("sliderTitle").innerText = slides[i].title;
                        i = (i + 1) % slides.length;
                    }, 5000);
                }
            });

            // 3. Word of Day
            onSnapshot(doc(db, "content", "dailyWord"), (snap) => {
                if(snap.exists()){
                    document.getElementById("wordSection").style.display = "block";
                    document.getElementById("wordTitle").innerText = snap.data().word;
                    document.getElementById("wordDesc").innerText = snap.data().description;
                }
            });

            // 4. Signal Archive
            const q = query(collection(db, "shoutouts"), orderBy("time", "desc"), limit(20));
            onSnapshot(q, (snap) => {
                const cont = document.getElementById("archiveContent");
                cont.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    cont.innerHTML += `<div style="background:var(--glass); padding:12px; border-radius:12px; margin-bottom:10px;">
                        <p style="color:var(--accent); font-weight:800; font-size:12px;">${d.user}</p>
                        <p style="font-size:14px;">${d.text}</p>
                    </div>`;
                });
            });
        }

        initSync();
    </script>
</body>
</html>
