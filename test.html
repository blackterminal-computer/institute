<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Elite v3.2</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #7c3aed; --accent: #00ffff; --bg: #02040a;
            --glass: rgba(255, 255, 255, 0.05);
            --neon: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: #f1f5f9; min-height: 100vh; padding-bottom: 120px; overflow-x: hidden; }

        /* --- Header --- */
        header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(2,4,10,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass); }
        .u-avatar { width: 65px; height: 65px; border-radius: 18px; border: 2px solid var(--accent); object-fit: cover; background: #000; box-shadow: var(--neon); }

        /* --- Marquee (Missing fixed) --- */
        .marquee-container { background: rgba(0, 255, 255, 0.05); padding: 10px 0; border-bottom: 1px solid var(--glass); overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: scroll 20s linear infinite; color: var(--accent); font-weight: 800; font-size: 14px; text-transform: uppercase; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* --- Broadcast Section (Missing fixed) --- */
        .broadcast-box { margin: 20px; padding: 15px 20px; background: #0f172a; border: 1px solid var(--glass); border-radius: 20px; display: flex; gap: 12px; align-items: center; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }
        .broadcast-box input { background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 16px; font-weight: 600; }
        .broadcast-box button { background: var(--accent); color: #000; border: none; padding: 8px 18px; border-radius: 12px; font-family: 'Orbitron'; font-weight: 900; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .broadcast-box button:active { transform: scale(0.9); }

        /* --- XP Card --- */
        .xp-card { margin: 20px; padding: 25px; background: var(--glass); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .bar-bg { height: 12px; background: rgba(255,255,255,0.05); border-radius: 50px; margin: 15px 0; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: 1.5s ease-out; box-shadow: var(--neon); }

        /* --- Grid --- */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--glass); padding: 20px; border-radius: 25px; text-decoration: none; color: #fff; }
        .card i { font-size: 28px; color: var(--accent); display: block; margin-bottom: 8px; }

        /* --- Nav --- */
        .nav-dock { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(10, 10, 20, 0.95); border-radius: 25px; padding: 15px; display: flex; justify-content: space-around; border: 1px solid var(--glass); z-index: 10000; }
        .nav-link { color: #64748b; text-decoration: none; text-align: center; font-size: 11px; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:15px;">
            <img id="uAvatar" class="u-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=Guest">
            <div>
                <h2 id="uName" style="font-size: 20px; font-family: 'Orbitron';">SYNCING...</h2>
                <p style="font-size: 11px; color: var(--accent); font-weight: 800;">ELITE AGENT</p>
            </div>
        </div>
        <div style="color: #fbbf24; font-size: 18px; font-weight: 800;">🔥 <span id="sCount">0</span></div>
    </header>

    <div class="marquee-container">
        <div id="marqueeMsg" class="marquee-text">ESTABLISHING SECURE CONNECTION TO TERMINAL...</div>
    </div>

    <div class="broadcast-box">
        <input type="text" id="shoutInput" placeholder="Broadcast a signal... (50 XP)">
        <button onclick="sendSignal()">SEND</button>
    </div>

    <section class="xp-card">
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <span id="uLevelBadge" style="background:var(--primary); color:white; padding:4px 10px; border-radius:6px; font-size:10px; font-weight:900; font-family:'Orbitron';">BRONZE TRAINEE</span>
                <h1 id="uXPDisplay" style="font-size: 35px; font-family: 'Orbitron'; margin-top: 5px;">0 XP</h1>
            </div>
            <div style="text-align: right;">
                <p style="font-size: 10px; opacity: 0.5;">RANK</p>
                <h2 id="uRank" style="color: var(--accent); font-family: 'Orbitron'; font-size: 24px;">#--</h2>
            </div>
        </div>
        <div class="bar-bg"><div id="xpBar" class="bar-fill"></div></div>
    </section>

    <div class="grid">
        <div class="card" onclick="triggerChallenge()">
            <i class="ri-sword-fill" style="color:#ff4444"></i>
            <h3>Challenge</h3>
            <p style="font-size:10px; opacity:0.5;">Steal XP</p>
        </div>
        <div class="card" onclick="buyShield()">
            <i class="ri-shield-flash-fill" style="color:#00ff88"></i>
            <h3>Focus Wall</h3>
            <p id="wallStatus" style="font-size:10px; opacity:0.5;">0 Layers</p>
        </div>
        <a href="exams.html" class="card"><i class="ri-terminal-box-line"></i><h3>Exams</h3></a>
        <a href="battle.html" class="card"><i class="ri-fire-line"></i><h3>Battle</h3></a>
    </div>

    <nav class="nav-dock">
        <a href="#" class="nav-link active"><i class="ri-home-7-fill" style="font-size:24px; display:block;"></i>Home</a>
        <a href="exams.html" class="nav-link"><i class="ri-edit-line" style="font-size:24px; display:block;"></i>Exams</a>
        <a href="chat.html" class="nav-link"><i class="ri-chat-3-line" style="font-size:24px; display:block;"></i>Chat</a>
        <a href="profile.html" class="nav-link"><i class="ri-user-line" style="font-size:24px; display:block;"></i>Profile</a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, setDoc, addDoc, collection, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const studentName = localStorage.getItem("studentName") || "Guest";

        // --- BROADCAST LOGIC ---
        window.sendSignal = async () => {
            const msg = document.getElementById("shoutInput").value.trim();
            if(!msg || studentName === "Guest") return;
            
            const userRef = doc(db, "students", studentName);
            // Deduct 50 XP and send
            await updateDoc(userRef, { xp: increment(-50) });
            await setDoc(doc(db, "interactions", "shoutout"), {
                user: studentName,
                text: msg,
                time: Date.now()
            });
            document.getElementById("shoutInput").value = "";
        };

        // --- REALTIME DATA FETCH ---
        function syncTerminal() {
            // Fetch User Image & Stats
            onSnapshot(doc(db, "students", studentName), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    document.getElementById("uName").innerText = studentName;
                    document.getElementById("uXPDisplay").innerText = (d.xp || 0) + " XP";
                    document.getElementById("sCount").innerText = d.streak || 0;
                    document.getElementById("wallStatus").innerText = (d.focusWall || 0) + " Layers Active";
                    
                    // IMAGE FETCH FIX:
                    if(d.photo) { document.getElementById("uAvatar").src = d.photo; }
                    
                    // Level Logic
                    const xp = d.xp || 0;
                    if(xp >= 1000) document.getElementById("uLevelBadge").innerText = "SILVER AGENT";
                    
                    document.getElementById("xpBar").style.width = (xp % 1000) / 10 + "%";
                }
            });

            // Fetch Marquee (News)
            onSnapshot(doc(db, "settings", "marquee"), (snap) => {
                if(snap.exists()) {
                    document.getElementById("marqueeMsg").innerText = snap.data().msg;
                }
            });

            // Fetch Rank
            const q = query(collection(db, "students"), orderBy("xp", "desc"));
            onSnapshot(q, (snap) => {
                let players = [];
                snap.forEach(doc => players.push(doc.id));
                document.getElementById("uRank").innerText = "#" + (players.indexOf(studentName) + 1);
            });
        }

        syncTerminal();
    </script>
</body>
</html>
