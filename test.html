<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Final Elite</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #7c3aed; --accent: #00ffff; --bg: #02040a;
            --glass: rgba(255, 255, 255, 0.05);
            --neon: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #f1f5f9; min-height: 100vh; padding-bottom: 140px; }

        /* --- Header --- */
        header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; background: rgba(2,4,10,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass); }
        .u-avatar { width: 60px; height: 60px; border-radius: 15px; border: 2px solid var(--accent); object-fit: cover; box-shadow: var(--neon); }

        /* --- Tournament Section (As per Image 1) --- */
        .tournament-card { 
            margin: 20px; padding: 25px; 
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(0, 255, 255, 0.1));
            border-radius: 25px; border: 2px solid #ff8c00; 
            position: relative; overflow: hidden;
            text-decoration: none; color: white; display: block;
        }
        .live-tag { background: #ef4444; color: white; padding: 4px 12px; border-radius: 6px; font-size: 10px; font-weight: 900; position: absolute; top: 15px; left: 15px; }
        .tournament-card i.trophy { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 60px; color: #fbbf24; opacity: 0.8; }

        /* --- Spotlight Image Slider (Admin Images) --- */
        .spotlight-container { margin: 0 20px 20px; height: 180px; border-radius: 25px; overflow: hidden; position: relative; border: 1px solid var(--glass); }
        #adminSlider { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .spotlight-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }

        /* --- Stats Card --- */
        .xp-card { margin: 20px; padding: 25px; background: var(--glass); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .bar-bg { height: 10px; background: rgba(255,255,255,0.05); border-radius: 50px; margin-top: 15px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: 1.5s; box-shadow: var(--neon); }

        /* --- Grid Layout --- */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--glass); padding: 20px; border-radius: 25px; text-decoration: none; color: #fff; }
        .card i { font-size: 28px; color: var(--accent); margin-bottom: 8px; display: block; }

        /* --- Bottom Nav --- */
        .nav-dock { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(10, 10, 20, 0.95); border-radius: 25px; padding: 15px; display: flex; justify-content: space-around; border: 1px solid var(--glass); z-index: 10000; }
        .nav-link { color: #64748b; text-decoration: none; font-size: 11px; text-align: center; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:15px;">
            <img id="uAvatar" class="u-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=Guest">
            <div>
                <h2 id="uName" style="font-size: 20px; font-family: 'Orbitron';">SYNCING...</h2>
                <span id="uLevelBadge" style="font-size: 10px; color: var(--accent); font-weight: 800;">BRONZE TRAINEE</span>
            </div>
        </div>
        <div style="color: #fbbf24; font-weight: 800;">🔥 <span id="sCount">0</span></div>
    </header>

    <a href="tournament.html" class="tournament-card">
        <span class="live-tag">LIVE</span>
        <h2 style="font-family:'Orbitron'; font-size: 22px; margin-top: 25px;">Tournament</h2>
        <p style="font-size: 12px; opacity: 0.7;">Join the elite warzone</p>
        <i class="ri-trophy-fill trophy"></i>
    </a>

    <div class="spotlight-container">
        <img id="adminSlider" src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800">
        <div class="spotlight-overlay">
            <span style="background:var(--accent); color:#000; padding:2px 8px; border-radius:5px; font-size:10px; font-weight:900;">FEATURED</span>
            <h3 id="sliderTitle" style="font-family:'Orbitron'; margin-top:5px; font-size: 16px;">Elite Spotlight</h3>
        </div>
    </div>

    <section class="xp-card">
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 id="uXPDisplay" style="font-size: 35px; font-family: 'Orbitron';">0 XP</h1>
                <p style="font-size: 11px; color: var(--accent);">NEXT LEVEL: 1000 XP</p>
            </div>
            <div style="text-align: right;">
                <p style="font-size: 10px; opacity: 0.5;">RANK</p>
                <h2 id="uRank" style="color: var(--accent); font-family: 'Orbitron'; font-size: 24px;">#--</h2>
            </div>
        </div>
        <div class="bar-bg"><div id="xpBar" class="bar-fill"></div></div>
    </section>

    <div class="grid">
        <div class="card" onclick="triggerRaid()" style="border-left: 4px solid #ef4444;">
            <i class="ri-sword-fill" style="color:#ef4444"></i>
            <h3>XP Raid</h3>
            <p style="font-size:10px; opacity:0.6;">Attack others</p>
        </div>
        <div class="card" onclick="buyShield()" style="border-left: 4px solid #10b981;">
            <i class="ri-shield-flash-fill" style="color:#10b981"></i>
            <h3>Shield</h3>
            <p id="wallStatus" style="font-size:10px; opacity:0.6;">0 Layers Active</p>
        </div>
        <a href="exams.html" class="card"><i class="ri-terminal-box-line"></i><h3>Exams</h3></a>
        <a href="battle.html" class="card"><i class="ri-fire-line"></i><h3>Battle</h3></a>
    </div>

    <nav class="nav-dock">
        <a href="#" class="nav-link active"><i class="ri-home-7-fill" style="font-size:24px; display:block;"></i>Home</a>
        <a href="exams.html" class="nav-link"><i class="ri-edit-line" style="font-size:24px; display:block;"></i>Exams</a>
        <a href="chat.html" class="nav-link"><i class="ri-chat-3-line" style="font-size:24px; display:block;"></i>Chat</a>
        <a href="profile.html" class="nav-link"><i class="ri-user-line" style="font-size:24px; display:block;"></i>Profile</a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const studentName = localStorage.getItem("studentName") || "Guest";

        function init() {
            // 1. Fetch Admin Images (Slider)
            onSnapshot(collection(db, "admin_slides"), (snap) => {
                let slides = [];
                snap.forEach(d => slides.push(d.data()));
                if(slides.length > 0) {
                    let i = 0;
                    setInterval(() => {
                        document.getElementById("adminSlider").src = slides[i].url;
                        document.getElementById("sliderTitle").innerText = slides[i].title || "Elite Spotlight";
                        i = (i + 1) % slides.length;
                    }, 4000);
                }
            });

            // 2. Fetch User Stats
            onSnapshot(doc(db, "students", studentName), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    const xp = d.xp || 0;
                    document.getElementById("uName").innerText = studentName;
                    document.getElementById("uXPDisplay").innerText = xp + " XP";
                    document.getElementById("sCount").innerText = d.streak || 0;
                    document.getElementById("wallStatus").innerText = (d.focusWall || 0) + " Layers Active";
                    if(d.photo) document.getElementById("uAvatar").src = d.photo;

                    // Bronze Trainee Logic
                    document.getElementById("uLevelBadge").innerText = xp < 1000 ? "BRONZE TRAINEE" : "SILVER AGENT";
                    document.getElementById("xpBar").style.width = (xp % 1000) / 10 + "%";
                }
            });

            // 3. Fetch Rank
            const q = query(collection(db, "students"), orderBy("xp", "desc"));
            onSnapshot(q, (snap) => {
                let players = [];
                snap.forEach(doc => players.push(doc.id));
                document.getElementById("uRank").innerText = "#" + (players.indexOf(studentName) + 1);
            });
        }

        init();
    </script>
</body>
</html>
