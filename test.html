<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Pro Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #7c3aed; --accent: #00ffff; --bg: #02040a; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--bg); color: #f1f5f9; padding-bottom: 120px; }
        
        /* Layout Styles */
        .tourney-card { margin: 20px; padding: 25px; border-radius: 25px; border: 2px solid #ff8c00; background: linear-gradient(135deg, #7c3aed22, #00ffff11); position: relative; text-decoration: none; color: white; display: block; }
        .spotlight { margin: 20px; height: 190px; border-radius: 25px; overflow: hidden; position: relative; border: 1px solid var(--glass); }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
        .card { background: var(--glass); padding: 20px; border-radius: 22px; text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.05); }
        .card i { font-size: 26px; color: var(--accent); margin-bottom: 5px; display: block; }
        
        /* Floating Button */
        #attBtn { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 999; box-shadow: 0 0 15px var(--accent); }
        
        /* Archive Panel */
        #archive { position: fixed; inset: 0; background: var(--bg); z-index: 2000; transform: translateX(100%); transition: 0.4s; padding: 20px; }
        #archive.open { transform: translateX(0); }
    </style>
</head>
<body>

    <header style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
        <div style="display:flex; align-items:center; gap:12px;">
            <img id="uAvatar" style="width:55px; height:55px; border-radius:12px; border:2px solid var(--accent);">
            <div>
                <h2 id="uName" style="font-family:'Orbitron'; font-size:18px;">...</h2>
                <p id="uLevelBadge" style="font-size:10px; color:var(--accent); font-weight:800;">BRONZE TRAINEE</p>
            </div>
        </div>
        <div style="color:#fbbf24; font-weight:800;">🔥 <span id="sCount">0</span></div>
    </header>

    <div id="wordBox" style="margin:20px; padding:15px; background:var(--glass); border-radius:15px; border-left:4px solid var(--accent); display:none;">
        <h4 id="wordTitle" style="color:var(--accent); font-family:'Orbitron';"></h4>
        <p id="wordDesc" style="font-size:13px; opacity:0.8;"></p>
    </div>

    <div class="spotlight">
        <img id="adminSlider" style="width:100%; height:100%; object-fit:cover;">
        <div style="position:absolute; bottom:0; padding:15px; background:linear-gradient(transparent, #000);">
            <h3 id="sliderTitle" style="font-family:'Orbitron'; font-size:15px;">Elite Spotlight</h3>
        </div>
    </div>

    <a href="tournament.html" class="tourney-card">
        <span style="background:red; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:900;">LIVE</span>
        <h2 style="font-family:'Orbitron'; margin-top:15px;">Tournament</h2>
        <i class="ri-trophy-fill" style="position:absolute; right:20px; top:50%; transform:translateY(-50%); font-size:45px; color:#fbbf24;"></i>
    </a>

    <div class="action-grid">
        <a href="exams.html" class="card"><i class="ri-edit-box-line"></i><h3>Exams</h3></a>
        <a href="battle.html" class="card"><i class="ri-fire-line"></i><h3>Battle</h3></a>
        <a href="flash.html" class="card"><i class="ri-flashlight-line"></i><h3>Flash</h3></a>
        <a href="courses.html" class="card"><i class="ri-video-line"></i><h3>Courses</h3></a>
        <div class="card" id="rankBtn"><i class="ri-bar-chart-line"></i><h3>Ranks</h3><p id="uRank" style="font-size:10px; color:var(--accent);">#--</p></div>
        <div class="card" id="unitTestBtn" style="opacity:0.5;"><i class="ri-lock-line"></i><h3>Unit Test</h3><p style="font-size:9px;">5000 XP</p></div>
    </div>

    <div style="margin:20px; text-align:right;">
        <i class="ri-history-line" onclick="toggleArchive()" style="font-size:24px; color:var(--accent);"></i>
    </div>

    <div id="archive">
        <i class="ri-close-line" onclick="toggleArchive()" style="font-size:30px;"></i>
        <h2 style="font-family:'Orbitron'; margin:20px 0;">Signal Archive</h2>
        <div id="archiveLogs"></div>
    </div>

    <div id="attBtn" onclick="markAttendance()"><i class="ri-fingerprint-fill"></i></div>

    <script type="module">
        // Firebase Logic and Sync (Same as before with added Archive and Word of Day listeners)
        // ... (Include your Firebase Import and Init here)
    </script>
</body>
</html>
