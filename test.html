<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL v3 | Omni Edition</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #00f2ff; --bg: #05070a;
            --card-bg: rgba(15, 23, 42, 0.4); --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gold: #ffb800; --danger: #ff2d55; --success: #00ffa3;
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; padding-bottom: 120px; overflow-x: hidden; background-image: radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.15), transparent 40%), radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.1), transparent 40%); }

        /* --- Components --- */
        .header-elite { padding: 40px 20px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .profile-hex { position: relative; width: 65px; height: 65px; padding: 3px; background: linear-gradient(45deg, var(--primary), var(--accent)); border-radius: 20px; transform: rotate(-5deg); }
        .profile-hex img { width: 100%; height: 100%; object-fit: cover; border-radius: 17px; border: 3px solid var(--bg); }
        
        #shoutoutBubble { position: fixed; top: 20px; left: 15px; right: 15px; z-index: 10000; background: rgba(10, 15, 25, 0.95); border: 1px solid var(--accent); border-radius: 24px; padding: 12px; display: flex; align-items: center; gap: 12px; backdrop-filter: blur(20px); transform: translateY(-150%); transition: 0.7s cubic-bezier(0.19, 1, 0.22, 1); box-shadow: var(--neon-glow); }
        #shoutoutBubble.active { transform: translateY(0); }

        /* Activity Panel */
        #activityPanel { position: fixed; bottom: -100%; left: 0; right: 0; height: 75vh; background: #080b14; border-top: 2px solid var(--accent); border-radius: 30px 30px 0 0; z-index: 20000; transition: 0.5s ease; padding: 25px 20px; overflow-y: auto; }
        #activityPanel.open { bottom: 0; }
        .log-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px; border-radius: 20px; margin-bottom: 12px; }
        .react-btn { background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.2); color: var(--accent); padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; }

        /* Slider */
        .slider-wrap { margin: 10px 20px; border-radius: 25px; overflow: hidden; border: 1px solid var(--glass-border); position: relative; aspect-ratio: 16/8; }
        .slider-track { display: flex; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* XP Card */
        .xp-master-card { margin: 15px 20px; background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 30px; padding: 25px; backdrop-filter: blur(10px); }
        .progress-container { height: 10px; background: rgba(255,255,255,0.05); border-radius: 100px; margin: 15px 0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 100px; width: 0%; transition: 1.5s; }

        /* Bento Grid */
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .bento-box { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 25px; padding: 20px; text-decoration: none; color: white; transition: 0.3s; }
        .bento-box.wide { grid-column: span 2; }
        .bento-box i { font-size: 28px; color: var(--accent); margin-bottom: 8px; display: block; }

        .float-att { position: fixed; top: 115px; right: 20px; z-index: 999; background: #fff; color: #000; padding: 8px 16px; border-radius: 100px; font-weight: 800; font-size: 10px; text-decoration: none; display: flex; align-items: center; gap: 6px; }
        .float-att.done { background: var(--success); }
        .shout-trigger { position: fixed; bottom: 100px; right: 20px; z-index: 999; background: var(--accent); color: #000; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--neon-glow); }
        
        .nav-dock { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(10, 15, 25, 0.9); backdrop-filter: blur(20px); border-radius: 30px; display: flex; justify-content: space-around; padding: 15px; z-index: 9999; border: 1px solid var(--glass-border); }
        .nav-item { color: #52525b; font-size: 24px; transition: 0.3s; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="shoutoutBubble">
        <img src="" id="bAvatar" style="width: 45px; height: 45px; border-radius: 12px; border: 1px solid var(--accent);">
        <div style="flex:1">
            <p id="bUser" style="font-size: 9px; color: var(--accent); font-weight: 900; text-transform: uppercase;"></p>
            <p id="bMsg" style="font-size: 13px; font-weight: 600;"></p>
        </div>
    </div>

    <div id="activityPanel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="font-family:'Orbitron'; color:var(--accent); font-size:14px;">SIGNAL_ARCHIVE</h3>
            <i class="ri-close-circle-fill" onclick="togglePanel()" style="font-size:24px; color:var(--danger);"></i>
        </div>
        <div id="logList"></div>
    </div>

    <div class="shout-trigger" onclick="togglePanel()"><i class="ri-history-line"></i></div>
    <a href="attendence.html" id="att-pill" class="float-att"><i class="ri-fingerprint-line"></i> <span id="att-pill-text">Verify Link</span></a>

    <header class="header-elite">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="profile-hex"><img id="uAvatar" src=""></div>
            <div>
                <div id="rankBadge" style="font-size:8px; background:rgba(0,242,255,0.1); color:var(--accent); padding:2px 8px; border-radius:4px; font-weight:900;">SYNCING...</div>
                <h2 id="uName" style="font-family: 'Syncopate'; font-size: 18px; margin-top:4px;">Elite</h2>
            </div>
        </div>
        <div id="sCount" style="text-align: right;">
            <p style="font-size: 9px; opacity: 0.5;">STREAK</p>
            <h3 style="color: #ff6400; font-family: 'Syncopate';">🔥 0</h3>
        </div>
    </header>

    <div class="slider-wrap" id="sliderRoot" style="display:none;">
        <div class="slider-track" id="sliderTrack"></div>
    </div>

    <div id="wordSection" style="margin: 15px 20px; display:none;">
        <div style="background: var(--card-bg); border-left: 4px solid var(--accent); padding: 15px; border-radius: 20px; border: 1px solid var(--glass-border);">
            <p style="font-size: 8px; font-weight: 900; color: var(--accent);">DAILY_LOG</p>
            <h3 id="wordText" style="font-family:'Orbitron'; font-size:16px; margin: 5px 0;"></h3>
            <p id="wordDesc" style="font-size: 11px; opacity: 0.7;"></p>
        </div>
    </div>

    <div class="xp-master-card">
        <div style="display: flex; justify-content: space-between;">
            <div><p id="uLevelBadge" style="font-size: 9px; color: var(--accent); font-weight: 900;">LEVEL 1</p><h3 id="uNameXP">User</h3></div>
            <div style="text-align: right;"><h3 id="xpVal" style="font-family:'Syncopate';">0</h3><p style="font-size:8px; opacity:0.4;">TOTAL XP</p></div>
        </div>
        <div class="progress-container"><div class="progress-bar" id="xpBar"></div></div>
        <p id="xpTip" style="font-size: 9px; opacity: 0.6;">NEXT PROTOCOL: 1000 XP</p>
    </div>

    <div style="margin: 0 20px 20px;">
        <div style="background: rgba(0,242,255,0.05); border: 1px solid rgba(0,242,255,0.2); border-radius: 15px; padding: 10px; display: flex; gap: 10px;">
            <input type="text" id="shoutInput" placeholder="Broadcast signal... (50 XP)" style="background:none; border:none; color:#fff; flex:1; font-weight:600; outline:none; font-size:12px;">
            <button onclick="sendSignal()" style="background:var(--accent); color:#000; border:none; padding:5px 15px; border-radius:10px; font-weight:900; font-size:10px;">SEND</button>
        </div>
    </div>

    <div class="bento-grid">
        <a href="tournament.html" class="bento-box wide" style="background: linear-gradient(90deg, var(--primary), var(--accent)); padding: 2px;">
            <div style="background: var(--bg); border-radius: 23px; padding: 18px; display: flex; justify-content: space-between; align-items: center;">
                <div><span style="background:var(--danger); font-size:8px; padding:2px 8px; border-radius:4px;">LIVE</span><h3 style="margin-top:5px;">TOURNAMENT</h3></div>
                <i class="ri-trophy-fill" style="color:var(--gold); font-size:32px; margin:0;"></i>
            </div>
        </a>
        <div class="bento-box" onclick="triggerChallenge()"><i class="ri-sword-fill" style="color:var(--danger);"></i><h3>RAID</h3><p style="font-size:10px; opacity:0.5;">Steal XP</p></div>
        <div class="bento-box" onclick="buyFocusWall()"><i id="shieldIcon" class="ri-shield-flash-line"></i><h3>SHIELD</h3><p id="wallStatus" style="font-size:10px; opacity:0.5;">Inactive</p></div>
        <a href="daily-test.html" class="bento-box"><i class="ri-terminal-window-line"></i><h3>EXAMS</h3></a>
        <a href="leaderboard.html" class="bento-box"><i class="ri-medal-fill" style="color:var(--gold);"></i><h3 id="instRank">#--</h3></a>
    </div>

    <nav class="nav-dock">
        <a href="index.html" class="nav-item active"><i class="ri-home-smile-2-fill"></i></a>
        <a href="battle.html" class="nav-item"><i class="ri-sword-line"></i></a>
        <a href="chat.html" class="nav-item"><i class="ri-message-3-line"></i></a>
        <a href="profile.html" class="nav-item"><i class="ri-user-line"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, collection, getDocs, setDoc, addDoc, query, orderBy, limit, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI", authDomain: "black-terminal-f2c91.firebaseapp.com", projectId: "black-terminal-f2c91", storageBucket: "black-terminal-f2c91.appspot.com", messagingSenderId: "552489994197", appId: "1:552489994197:web:7662331264c334ffbadf5c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const student = localStorage.getItem("studentName");

        window.togglePanel = () => document.getElementById('activityPanel').classList.toggle('open');

        // Functions
        window.sendSignal = async () => {
            const msg = document.getElementById("shoutInput").value.trim();
            if(!msg) return;
            const uRef = doc(db, "students", student);
            const snap = await getDoc(uRef);
            if(snap.data().xp < 50) return alert("Need 50 XP!");
            const data = { user: student, text: msg, avatar: snap.data().photo || "", time: Date.now(), likes: 0 };
            await setDoc(doc(db, "interactions", "shoutout"), data);
            await addDoc(collection(db, "shoutouts"), data);
            await updateDoc(uRef, { xp: increment(-50) });
            document.getElementById("shoutInput").value = "";
        };

        window.sendReaction = async (id) => {
            await updateDoc(doc(db, "shoutouts", id), { likes: increment(1) });
        };

        window.triggerChallenge = async () => {
            const uRef = doc(db, "students", student);
            const snap = await getDoc(uRef);
            if(snap.data().xp < 50) return alert("RAID costs 50 XP!");
            const q = query(collection(db, "students"), orderBy("xp", "desc"), limit(10));
            const allS = await getDocs(q);
            let ts = []; allS.forEach(d => { if(d.id !== student) ts.push(d.id); });
            const target = ts[Math.floor(Math.random() * ts.length)];
            const tRef = doc(db, "students", target);
            const tSnap = await getDoc(tRef);
            if(tSnap.data().focusWall > 0) {
                await updateDoc(tRef, { focusWall: increment(-1) });
                await updateDoc(uRef, { xp: increment(-50) });
                alert(`FAILED! ${target} had a Shield.`);
            } else {
                const stolen = Math.floor(Math.random() * 41) + 40;
                await updateDoc(uRef, { xp: increment(stolen - 50) });
                await updateDoc(tRef, { xp: increment(-stolen) });
                alert(`SUCCESS! Stole ${stolen} XP from ${target}.`);
            }
        };

        window.buyFocusWall = async () => {
            const uRef = doc(db, "students", student);
            const snap = await getDoc(uRef);
            if(snap.data().xp < 150) return alert("Shield costs 150 XP!");
            await updateDoc(uRef, { xp: increment(-150), focusWall: increment(1) });
            alert("SHIELD DEPLOYED!");
        };

        // Real-time Sync
        function sync() {
            onSnapshot(doc(db, "students", student), (snap) => {
                if(snap.exists()){
                    const d = snap.data(); const xp = d.xp || 0;
                    document.getElementById("uName").innerText = student;
                    document.getElementById("uNameXP").innerText = student;
                    document.getElementById("xpVal").innerText = xp;
                    document.getElementById("uAvatar").src = d.photo || `https://api.dicebear.com/7.x/avataaars/svg?seed=${student}`;
                    document.getElementById("sCount").innerHTML = `🔥 ${d.streak || 0}`;
                    document.getElementById("xpBar").style.width = (xp % 1000) / 10 + "%";
                    document.getElementById("uLevelBadge").innerText = `LEVEL ${Math.floor(xp/1000)+1}`;
                    const walls = d.focusWall || 0;
                    document.getElementById("wallStatus").innerText = walls > 0 ? `${walls} Active` : "Inactive";
                    document.getElementById("shieldIcon").style.color = walls > 0 ? "var(--success)" : "var(--accent)";
                    document.getElementById("rankBadge").innerText = xp >= 5000 ? "ULTRA ELITE" : "NEURAL TRAINEE";
                }
            });

            onSnapshot(doc(db, "settings", "slider"), (snap) => {
                if(snap.exists()){
                    const urls = snap.data().images.split(',');
                    const track = document.getElementById("sliderTrack"); track.innerHTML = "";
                    urls.forEach(u => track.innerHTML += `<div class="slide"><img src="${u.trim()}"></div>`);
                    document.getElementById("sliderRoot").style.display = "block";
                }
            });

            onSnapshot(query(collection(db, "shoutouts"), orderBy("time", "desc"), limit(15)), (snap) => {
                const list = document.getElementById("logList"); list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<div class="log-card">
                        <div style="display:flex; gap:10px;">
                            <img src="${data.avatar}" style="width:30px; height:30px; border-radius:5px;">
                            <div style="flex:1">
                                <p style="font-size:10px; color:var(--accent); font-weight:900;">${data.user}</p>
                                <p style="font-size:12px;">${data.text}</p>
                                <div class="react-btn" onclick="sendReaction('${d.id}')">🔥 ${data.likes || 0}</div>
                            </div>
                        </div>
                    </div>`;
                });
            });

            onSnapshot(doc(db, "content", "dailyWord"), (s) => {
                if(s.exists()){
                    document.getElementById("wordSection").style.display="block";
                    document.getElementById("wordText").innerText = s.data().word;
                    document.getElementById("wordDesc").innerText = s.data().description;
                }
            });

            onSnapshot(doc(db, "interactions", "shoutout"), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    const b = document.getElementById("shoutoutBubble");
                    document.getElementById("bUser").innerText = d.user;
                    document.getElementById("bMsg").innerText = d.text;
                    document.getElementById("bAvatar").src = d.avatar;
                    b.classList.add("active");
                    setTimeout(() => b.classList.remove("active"), 5000);
                }
            });
        }

        let cur = 0;
        setInterval(() => {
            const track = document.getElementById("sliderTrack");
            if(track && track.children.length > 1) {
                cur = (cur + 1) % track.children.length;
                track.style.transform = `translateX(-${cur * 100}%)`;
            }
        }, 4000);

        sync();
    </script>
</body>
</html>
