<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Ultra Elite</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #7c3aed; --accent: #00ffff; --bg: #02040a;
            --glass: rgba(255, 255, 255, 0.05);
            --neon-border: 0 0 15px rgba(0, 255, 255, 0.4);
            --card-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #f1f5f9; 
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(124, 58, 237, 0.15), transparent),
                radial-gradient(circle at 90% 90%, rgba(0, 255, 255, 0.1), transparent);
            min-height: 100vh; padding-bottom: 120px;
        }

        /* --- High Visibility Header --- */
        header {
            padding: 25px 20px; background: rgba(2, 4, 10, 0.9);
            backdrop-filter: blur(20px); border-bottom: 2px solid var(--glass);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 5000;
        }

        .u-info { display: flex; align-items: center; gap: 15px; }
        .u-avatar {
            width: 60px; height: 60px; border-radius: 18px;
            border: 2px solid var(--accent); box-shadow: var(--neon-border);
            object-fit: cover; background: #000;
        }

        /* --- Shoutout Notification (Fixed & Visible) --- */
        #shoutoutBubble {
            position: fixed; top: 100px; left: 15px; right: 15px;
            background: rgba(10, 15, 30, 0.95); border: 2px solid var(--accent);
            border-radius: 20px; padding: 18px; display: flex; align-items: center; gap: 15px;
            z-index: 9999; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            transform: scale(0.8) translateY(-200%); opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #shoutoutBubble.active { transform: scale(1) translateY(0); opacity: 1; }

        /* --- Ultra XP Dashboard --- */
        .xp-engine {
            margin: 20px; padding: 25px; background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px;
            position: relative; overflow: hidden; box-shadow: var(--card-shadow);
        }
        .xp-engine::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent); box-shadow: var(--neon-border);
        }

        .lvl-badge { 
            font-family: 'Orbitron'; font-size: 12px; color: var(--accent); 
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; display: block;
        }

        .bar-container {
            height: 14px; background: rgba(255,255,255,0.05);
            border-radius: 50px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1);
        }
        .bar-fill {
            height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%; transition: width 1s ease; border-radius: 50px;
            box-shadow: 0 0 15px var(--primary);
        }

        /* --- Enhanced Action Cards --- */
        .grid-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        
        .mega-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.1); padding: 25px 20px;
            border-radius: 28px; text-decoration: none; color: #fff;
            transition: 0.3s; display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .mega-card:active { transform: translateY(5px); background: rgba(255,255,255,0.1); }
        .mega-card i { font-size: 32px; margin-bottom: 12px; color: var(--accent); text-shadow: var(--neon-border); }
        .mega-card h3 { font-family: 'Orbitron'; font-size: 14px; letter-spacing: 1px; }

        .featured {
            grid-column: span 2; background: linear-gradient(90deg, #4c1d95, #7c3aed);
            border: none; position: relative; overflow: hidden;
        }

        /* --- Marquee --- */
        .news-bar {
            background: rgba(124, 58, 237, 0.1); border-y: 1px solid var(--primary);
            padding: 10px 0; margin-bottom: 20px; overflow: hidden;
        }
        .news-text {
            display: inline-block; white-space: nowrap; font-weight: 700;
            color: var(--accent); animation: scroll 15s linear infinite; font-size: 14px;
        }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* --- Bottom Menu --- */
        .dock {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: rgba(10, 10, 20, 0.9); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(25px); border-radius: 25px; padding: 15px;
            display: flex; justify-content: space-around; z-index: 10000;
        }
        .dock-item { color: #64748b; text-decoration: none; font-size: 11px; font-weight: 800; text-align: center; }
        .dock-item.active { color: var(--accent); }
        .dock-item i { font-size: 26px; display: block; }

        #activityPanel {
            position: fixed; inset: 0; background: var(--bg); z-index: 20000;
            padding: 30px 20px; transform: translateX(100%); transition: 0.4s;
        }
        #activityPanel.active { transform: translateX(0); }

        .shout-btn {
            position: fixed; bottom: 120px; right: 20px; width: 65px; height: 65px;
            background: var(--accent); color: #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 28px;
            box-shadow: var(--neon-border); z-index: 9000;
        }
    </style>
</head>
<body>

    <div id="shoutoutBubble">
        <img src="" id="bAvatar" style="width: 50px; height: 50px; border-radius: 12px; border: 1px solid var(--accent);">
        <div>
            <span id="bUser" style="color: var(--accent); font-weight: 800; font-size: 12px; font-family: 'Orbitron';">SIGNAL</span>
            <p id="bMsg" style="font-size: 15px; font-weight: 600; color: #fff; margin-top: 3px;"></p>
        </div>
    </div>

    <header>
        <div class="u-info">
            <img id="uAvatar" class="u-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=Guest">
            <div>
                <p style="font-size: 12px; opacity: 0.6; font-weight: 700;">AGENT STATUS</p>
                <h2 id="uName" style="font-size: 20px; font-family: 'Orbitron';">Syncing...</h2>
            </div>
        </div>
        <div id="sCount" style="background: rgba(255,165,0,0.1); color: orange; padding: 10px 15px; border-radius: 15px; font-weight: 800; border: 1px solid orange;">🔥 0</div>
    </header>

    <div class="news-bar">
        <div class="news-text" id="marqueeMsg">ESTABLISHING ENCRYPTED UPLINK...</div>
    </div>

    <section class="xp-engine">
        <span id="uLevelBadge" class="lvl-badge">LEVEL 01</span>
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <h1 id="uNameXP" style="font-size: 35px; font-family: 'Orbitron';">0 XP</h1>
            <div style="text-align: right;">
                <p style="font-size: 10px; opacity: 0.5;">WORLD RANK</p>
                <h2 id="instRank" style="color: var(--accent); font-family: 'Orbitron';">#--</h2>
            </div>
        </div>
        <div class="bar-container"><div id="xpBar" class="bar-fill"></div></div>
        <p id="xpTip" style="font-size: 12px; color: var(--accent); font-weight: 700;"></p>
    </section>

    <div style="padding: 0 20px 20px;">
        <div style="background: rgba(255,255,255,0.03); border: 2px solid var(--glass); border-radius: 20px; padding: 12px 20px; display: flex; gap: 10px;">
            <input type="text" id="shoutInput" placeholder="Broadcast to Terminal..." style="background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 16px; font-weight: 600;">
            <button onclick="sendSignal()" style="background: var(--accent); border: none; padding: 8px 20px; border-radius: 12px; font-weight: 800; font-family: 'Orbitron'; font-size: 12px;">SEND</button>
        </div>
    </div>

    <div class="grid-layout">
        <a href="tournament.html" class="mega-card featured">
            <i class="ri-trophy-fill" style="color: #fff;"></i>
            <h3>ELITE TOURNAMENT</h3>
            <p style="font-size: 12px; opacity: 0.8;">LIVE ACCESS GRANTED</p>
        </a>

        <div class="mega-card" onclick="triggerChallenge()" style="border-color: rgba(255,0,0,0.2);">
            <i class="ri-sword-fill" style="color: #ff4444;"></i>
            <h3>XP RAID</h3>
        </div>

        <div class="mega-card" onclick="buyFocusWall()" style="border-color: rgba(0,255,0,0.2);">
            <i id="shieldIcon" class="ri-shield-flash-fill" style="color: #00ff88;"></i>
            <h3 id="wallTitle">SHIELD</h3>
        </div>

        <a href="daily-test.html" class="mega-card">
            <i class="ri-terminal-box-fill"></i>
            <h3>EXAMS</h3>
        </a>

        <a href="leaderboard.html" class="mega-card">
            <i class="ri-bar-chart-2-fill"></i>
            <h3>RANKS</h3>
        </a>

        <a href="courses.html" class="mega-card">
            <i class="ri-vidicon-fill"></i>
            <h3>LECTURES</h3>
        </a>

        <div id="unitCard" class="mega-card locked" style="opacity: 0.5;">
            <i class="ri-lock-fill"></i>
            <h3>UNIT TEST</h3>
        </div>
    </div>

    <a href="attendence.html" id="att-pill" class="shout-btn">
        <i class="ri-fingerprint-fill"></i>
    </a>

    <nav class="dock">
        <a href="index.html" class="dock-item active"><i class="ri-home-smile-2-fill"></i><span>CORE</span></a>
        <a href="daily-test.html" class="dock-item"><i class="ri-keyboard-fill"></i><span>TESTS</span></a>
        <a href="battle.html" class="dock-item"><i class="ri-fire-fill"></i><span>BATTLE</span></a>
        <a href="chat.html" class="dock-item"><i class="ri-message-3-fill"></i><span>CHAT</span></a>
        <a href="profile.html" class="dock-item"><i class="ri-user-settings-fill"></i><span>DATA</span></a>
    </nav>

    <div id="activityPanel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="font-family:'Orbitron'; color:var(--accent)">ARCHIVE</h2>
            <i class="ri-close-circle-fill" onclick="togglePanel()" style="font-size:35px; color:#ff4444;"></i>
        </div>
        <div id="logList"></div>
    </div>

    <div onclick="togglePanel()" style="position:fixed; top:180px; left:0; background:var(--accent); color:#000; padding:10px; border-radius:0 10px 10px 0; z-index:1000; box-shadow: var(--neon-border);">
        <i class="ri-history-line" style="font-size: 20px; font-weight: 800;"></i>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, collection, getDocs, setDoc, addDoc, query, orderBy, limit, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const student = localStorage.getItem("studentName");
        if (!student) { window.location.href = "login.html"; }

        window.togglePanel = () => document.getElementById('activityPanel').classList.toggle('active');

        // --- SIGNAL LOGIC FIXED ---
        window.sendSignal = async () => {
            const msg = document.getElementById("shoutInput").value.trim();
            if(!msg || student === "Guest") return;
            const userRef = doc(db, "students", student);
            const snap = await getDoc(userRef);
            if(snap.exists() && (snap.data().xp || 0) >= 50) {
                const data = {
                    user: student,
                    text: msg,
                    avatar: snap.data().photo || `https://api.dicebear.com/7.x/bottts/svg?seed=${student}`,
                    time: Date.now()
                };
                // Immediate update for everyone
                await setDoc(doc(db, "interactions", "shoutout"), data);
                await addDoc(collection(db, "shoutouts"), data);
                await updateDoc(userRef, { xp: increment(-50) });
                document.getElementById("shoutInput").value = "";
            } else { alert("NEEDS 50 XP!"); }
        };

        // UI Real-time Listeners
        function syncData() {
            // High Priority Shoutout Listener
            let bTimer;
            onSnapshot(doc(db, "interactions", "shoutout"), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    const bubble = document.getElementById("shoutoutBubble");
                    document.getElementById("bUser").innerText = d.user.toUpperCase();
                    document.getElementById("bMsg").innerText = d.text;
                    document.getElementById("bAvatar").src = d.avatar;
                    
                    bubble.classList.add("active");
                    clearTimeout(bTimer);
                    bTimer = setTimeout(() => bubble.classList.remove("active"), 5000);
                }
            });

            // XP and Stats Listener
            onSnapshot(doc(db, "students", student), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    document.getElementById("uName").innerText = student;
                    document.getElementById("uNameXP").innerText = (d.xp || 0) + " XP";
                    document.getElementById("uAvatar").src = d.photo || `https://api.dicebear.com/7.x/bottts/svg?seed=${student}`;
                    document.getElementById("sCount").innerText = "🔥 " + (d.streak || 0);
                    
                    const xp = d.xp || 0;
                    const lvl = Math.floor(xp / 1000) + 1;
                    document.getElementById("uLevelBadge").innerText = "LEVEL " + (lvl < 10 ? "0"+lvl : lvl);
                    document.getElementById("xpBar").style.width = (xp % 1000) / 10 + "%";
                    document.getElementById("xpTip").innerText = `NEXT LEVEL: ${(lvl * 1000) - xp} XP NEEDED`;
                }
            });

            // Global Rank
            getDocs(collection(db, "students")).then(q => {
                let all = []; q.forEach(s => all.push({id:s.id, xp:s.data().xp||0}));
                all.sort((a,b)=>b.xp-a.xp);
                const r = all.findIndex(s=>s.id === student) + 1;
                document.getElementById("instRank").innerText = "#" + r;
            });

            onSnapshot(doc(db, "settings", "marquee"), snap => {
                if(snap.exists()) document.getElementById("marqueeMsg").innerText = snap.data().msg;
            });
        }

        syncData();
    </script>
</body>
</html>
