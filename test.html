<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL v3 | Hyper Elite</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #00f2ff; --bg: #05070a;
            --card-bg: rgba(15, 23, 42, 0.4); --glass: rgba(255, 255, 255, 0.03);
            --gold: #ffb800; --danger: #ff2d55; --success: #00ffa3;
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; padding-bottom: 120px; overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.15), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.1), transparent 40%);
        }

        /* --- Header --- */
        .header-elite { padding: 40px 20px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .profile-hex { position: relative; width: 65px; height: 65px; padding: 3px; background: linear-gradient(45deg, var(--primary), var(--accent)); border-radius: 20px; transform: rotate(-5deg); transition: 0.3s; }
        .profile-hex img { width: 100%; height: 100%; object-fit: cover; border-radius: 17px; border: 3px solid var(--bg); }
        
        .user-info h2 { font-family: 'Syncopate', sans-serif; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }
        .rank-pill { font-size: 8px; font-weight: 800; background: rgba(0, 242, 255, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 100px; border: 1px solid rgba(0, 242, 255, 0.3); display: inline-block; }

        /* --- Shoutout Notification --- */
        #shoutoutBubble {
            position: fixed; top: 20px; left: 15px; right: 15px; z-index: 10000;
            background: rgba(10, 15, 25, 0.9); border: 1px solid var(--accent);
            border-radius: 24px; padding: 12px; display: flex; align-items: center; gap: 12px;
            backdrop-filter: blur(20px); transform: translateY(-150%); transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: var(--neon-glow);
        }
        #shoutoutBubble.active { transform: translateY(0); }

        /* --- XP Master Card --- */
        .xp-master-card { margin: 15px 20px; background: var(--card-bg); border: 1px solid var(--glass); border-radius: 35px; padding: 25px; position: relative; overflow: hidden; }
        .xp-master-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, transparent, var(--accent), transparent); animation: rotate 8s linear infinite; opacity: 0.1; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        .progress-container { position: relative; height: 10px; background: rgba(255,255,255,0.05); border-radius: 100px; margin: 15px 0; border: 1px solid var(--glass); }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 100px; width: 0%; box-shadow: 0 0 10px var(--accent); transition: 1s ease; }

        /* --- Bento Grid --- */
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 20px; }
        .bento-box { background: var(--card-bg); border: 1px solid var(--glass); border-radius: 28px; padding: 18px; position: relative; transition: 0.3s; text-decoration: none; color: #fff; }
        .bento-box:active { transform: scale(0.96); background: rgba(255,255,255,0.05); }
        .bento-box i { font-size: 24px; color: var(--accent); display: block; margin-bottom: 8px; }
        .bento-box h3 { font-size: 14px; font-weight: 700; }
        .bento-box p { font-size: 9px; opacity: 0.5; font-weight: 600; text-transform: uppercase; }
        .bento-box.wide { grid-column: span 2; }
        .bento-box.gold { border-color: rgba(255, 184, 0, 0.3); }

        /* --- Floating Action --- */
        .float-att { position: fixed; top: 110px; right: 20px; z-index: 999; background: #fff; color: #000; padding: 8px 16px; border-radius: 100px; font-weight: 800; font-size: 10px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s; }
        .float-att.done { background: var(--success); }

        /* --- Nav Dock --- */
        .nav-dock { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(10, 15, 25, 0.85); backdrop-filter: blur(20px); border: 1px solid var(--glass); border-radius: 30px; display: flex; justify-content: space-around; padding: 12px; z-index: 9999; }
        .nav-item { color: #52525b; text-decoration: none; transition: 0.3s; font-size: 22px; }
        .nav-item.active { color: var(--accent); }

        /* --- Slider --- */
        .slider-wrap { padding: 0 20px; margin-bottom: 20px; }
        .slider-inner { border-radius: 30px; overflow: hidden; border: 1px solid var(--glass); aspect-ratio: 16/8; position: relative; }
        .slider-track { display: flex; transition: 0.6s ease-in-out; height: 100%; }
        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="shoutoutBubble">
        <img src="" id="bAvatar" style="width: 40px; height: 40px; border-radius: 12px; object-fit: cover;">
        <div style="flex:1">
            <p id="bUser" style="font-size: 8px; color: var(--accent); font-weight: 900;"></p>
            <p id="bMsg" style="font-size: 12px; font-weight: 600;"></p>
        </div>
    </div>

    <a href="attendence.html" id="att-pill" class="float-att">
        <i class="ri-fingerprint-fill"></i> <span id="att-pill-text">Verify Link</span>
    </a>

    <header class="header-elite">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="profile-hex"><img id="uAvatar" src=""></div>
            <div class="user-info">
                <div id="rankBadge" class="rank-pill">SYNCING...</div>
                <h2 id="uName">Loading</h2>
            </div>
        </div>
        <div id="sCount" style="text-align: right;">
            <p style="font-size: 8px; opacity: 0.5; font-weight: 800;">STREAK</p>
            <h3 style="color: #ff6400; font-family: 'Syncopate'; font-size: 18px;">🔥 0</h3>
        </div>
    </header>

    <div style="padding: 0 20px; margin-bottom: 10px;">
        <div style="background: rgba(255,255,255,0.02); border-radius: 100px; padding: 8px 18px; border: 1px solid var(--glass);">
            <marquee scrollamount="5" id="marqueeMsg" style="font-size: 9px; font-weight: 800; color: var(--accent);">CONNECTING TO TERMINAL NODES...</marquee>
        </div>
    </div>

    <div class="xp-master-card">
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <p id="uLevelBadge" style="font-size: 9px; font-weight: 800; color: var(--accent);">LEVEL 01</p>
                <h3 id="uNameXP" style="font-size: 20px; font-weight: 800;">User</h3>
            </div>
            <div style="text-align: right;">
                <h3 id="xpVal" style="font-family: 'Syncopate'; font-size: 18px;">0</h3>
                <p style="font-size: 8px; opacity: 0.4;">TOTAL XP</p>
            </div>
        </div>
        <div class="progress-container"><div class="progress-bar" id="xpBar"></div></div>
        <p id="xpTip" style="font-size: 8px; font-weight: 800; opacity: 0.5;">NEXT GOAL: 1000 XP</p>
    </div>

    <div class="slider-wrap" id="sliderRoot" style="display: none;">
        <div class="slider-inner"><div class="slider-track" id="sliderTrack"></div></div>
    </div>

    <div class="bento-grid">
        <div class="bento-box wide" style="background: linear-gradient(90deg, #6366f1, #00f2ff); padding: 2px;">
            <a href="tournament.html" style="background: var(--bg); border-radius: 26px; padding: 18px; display: flex; justify-content: space-between; align-items: center; text-decoration: none;">
                <div><span style="background: var(--danger); font-size: 7px; padding: 2px 6px; border-radius: 4px; font-weight: 900;">LIVE</span><h3 style="color:#fff; font-size: 18px;">TOURNAMENT</h3></div>
                <i class="ri-trophy-fill" style="font-size: 32px; color: var(--gold);"></i>
            </a>
        </div>

        <div class="bento-box wide" style="display:flex; gap:12px; align-items:center;">
            <input type="text" id="shoutInput" placeholder="Broadcast signal (50 XP)..." style="background:none; border:none; color:#fff; flex:1; font-size: 12px; outline: none;">
            <button onclick="sendSignal()" style="background:var(--accent); color:#000; border:none; padding:8px 15px; border-radius:12px; font-weight:900; font-size:9px;">SEND</button>
        </div>

        <div class="bento-box" onclick="triggerChallenge()">
            <i class="ri-sword-fill" style="color: var(--danger);"></i>
            <h3>RAID</h3>
            <p>Extract XP</p>
        </div>
        <div class="bento-box" onclick="buyFocusWall()">
            <i id="shieldIcon" class="ri-shield-flash-fill"></i>
            <h3>SHIELD</h3>
            <p id="wallStatus">Inactive</p>
        </div>

        <a href="daily-test.html" class="bento-box"><i class="ri-edit-box-line"></i><h3>EXAMS</h3><p>Daily Tests</p></a>
        <a href="battle.html" class="bento-box"><i class="ri-pulse-line" style="color:var(--danger)"></i><h3>ARENA</h3><p>PvP Sync</p></a>
        <a href="leaderboard.html" class="bento-box gold"><i class="ri-medal-fill" style="color:var(--gold)"></i><h3>RANKS</h3><p id="instRank">#-- Global</p></a>
        <div id="unitCard" class="bento-box" style="opacity: 0.3;"><i id="unitIcon" class="ri-lock-line"></i><h3>UNIT</h3><p id="unitMsg">Locked</p></div>
    </div>

    <nav class="nav-dock">
        <a href="index.html" class="nav-item active"><i class="ri-home-5-fill"></i></a>
        <a href="daily-test.html" class="nav-item"><i class="ri-edit-line"></i></a>
        <a href="battle.html" class="nav-item"><i class="ri-sword-line"></i></a>
        <a href="chat.html" class="nav-item"><i class="ri-chat-3-line"></i></a>
        <a href="profile.html" class="nav-item"><i class="ri-user-line"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, collection, getDocs, setDoc, addDoc, query, orderBy, limit, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Configuration
        const firebaseConfig = { apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI", authDomain: "black-terminal-f2c91.firebaseapp.com", projectId: "black-terminal-f2c91", storageBucket: "black-terminal-f2c91.appspot.com", messagingSenderId: "552489994197", appId: "1:552489994197:web:7662331264c334ffbadf5c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const student = localStorage.getItem("studentName") || "Guest";

        let currentSlide = 0, totalSlides = 0;

        // Features
        window.sendSignal = async () => {
            const input = document.getElementById("shoutInput");
            const msg = input.value.trim();
            if(!msg || student === "Guest") return;
            const uRef = doc(db, "students", student);
            const snap = await getDoc(uRef);
            if(snap.data().xp >= 50) {
                await addDoc(collection(db, "shoutouts"), { user: student, text: msg, avatar: snap.data().photo || "", time: Date.now() });
                await setDoc(doc(db, "interactions", "shoutout"), { user: student, text: msg, avatar: snap.data().photo || "", time: Date.now() });
                await updateDoc(uRef, { xp: increment(-50) });
                input.value = "";
            } else alert("Need 50 XP!");
        };

        window.triggerChallenge = async () => {
            if(student === "Guest") return;
            const uRef = doc(db, "students", student);
            const uSnap = await getDoc(uRef);
            if(uSnap.data().xp < 50) return alert("Min 50 XP needed to Raid!");
            
            const q = query(collection(db, "students"), orderBy("xp", "desc"), limit(10));
            const snap = await getDocs(q);
            let targets = []; snap.forEach(d => { if(d.id !== student) targets.push(d.id); });
            const targetId = targets[Math.floor(Math.random() * targets.length)];
            const tRef = doc(db, "students", targetId);
            const tSnap = await getDoc(tRef);

            if(tSnap.data().focusWall > 0) {
                await updateDoc(tRef, { focusWall: increment(-1) });
                await updateDoc(uRef, { xp: increment(-50) });
                alert(`FAIL! ${targetId} had a Shield active.`);
            } else {
                const stolen = Math.floor(Math.random() * 40) + 40;
                await updateDoc(uRef, { xp: increment(stolen - 50) });
                await updateDoc(tRef, { xp: increment(-stolen) });
                await setDoc(doc(db, "interactions", "shoutout"), { user: "RAID", text: `${student} extracted ${stolen} XP from ${targetId}!`, avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Raid", time: Date.now() });
                alert(`SUCCESS! Stole ${stolen} XP.`);
            }
        };

        window.buyFocusWall = async () => {
            const uRef = doc(db, "students", student);
            const snap = await getDoc(uRef);
            if(snap.data().xp < 150) return alert("Need 150 XP for Shield!");
            await updateDoc(uRef, { xp: increment(-150), focusWall: increment(1) });
            alert("SHIELD ACTIVE!");
        };

        // Real-time Sync
        function initSync() {
            // Identity & XP
            onSnapshot(doc(db, "students", student), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    document.getElementById("uName").innerText = student;
                    document.getElementById("uNameXP").innerText = student;
                    document.getElementById("uAvatar").src = d.photo || `https://api.dicebear.com/7.x/avataaars/svg?seed=${student}`;
                    document.getElementById("xpVal").innerText = d.xp || 0;
                    document.getElementById("sCount").innerHTML = `<p style="font-size: 8px; opacity: 0.5; font-weight: 800;">STREAK</p><h3 style="color: #ff6400; font-family: 'Syncopate'; font-size: 18px;">🔥 ${d.streak || 0}</h3>`;
                    
                    const xp = d.xp || 0;
                    document.getElementById("uLevelBadge").innerText = "PROTOCOL LEVEL " + (Math.floor(xp/1000)+1);
                    document.getElementById("xpBar").style.width = (xp % 1000) / 10 + "%";
                    
                    document.getElementById("wallStatus").innerText = (d.focusWall || 0) > 0 ? d.focusWall + " Active" : "Inactive";
                    document.getElementById("shieldIcon").style.color = (d.focusWall || 0) > 0 ? "var(--success)" : "#52525b";
                    
                    if(xp >= 5000) {
                        const uc = document.getElementById("unitCard");
                        uc.style.opacity = "1";
                        document.getElementById("unitIcon").className = "ri-shield-check-fill";
                        document.getElementById("unitMsg").innerText = "Unlocked";
                        uc.onclick = () => window.location.href = "unit-test.html";
                    }

                    const badge = document.getElementById("rankBadge");
                    badge.innerText = xp >= 5000 ? "ULTRA ELITE" : "NEURAL TRAINEE";
                    badge.style.color = xp >= 5000 ? "var(--gold)" : "var(--accent)";
                }
            });

            // Shoutouts
            onSnapshot(doc(db, "interactions", "shoutout"), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    const b = document.getElementById("shoutoutBubble");
                    document.getElementById("bUser").innerText = d.user;
                    document.getElementById("bMsg").innerText = d.text;
                    document.getElementById("bAvatar").src = d.avatar || `https://api.dicebear.com/7.x/bottts/svg?seed=${d.user}`;
                    b.classList.add("active");
                    setTimeout(() => b.classList.remove("active"), 5000);
                }
            });

            // Marquee
            onSnapshot(doc(db, "settings", "marquee"), (snap) => {
                if(snap.exists()) document.getElementById("marqueeMsg").innerText = snap.data().msg;
            });

            // Slider
            onSnapshot(doc(db, "settings", "slider"), (snap) => {
                if(snap.exists()){
                    const urls = snap.data().images ? snap.data().images.split(",") : [];
                    const track = document.getElementById("sliderTrack");
                    track.innerHTML = ""; totalSlides = urls.length;
                    if(totalSlides > 0) {
                        document.getElementById("sliderRoot").style.display = "block";
                        urls.forEach(u => track.innerHTML += `<div class="slide"><img src="${u.trim()}"></div>`);
                    }
                }
            });

            // Attendance
            const today = new Date().toISOString().split('T')[0];
            onSnapshot(doc(db, "attendance", `${student}_${today}`), (snap) => {
                const p = document.getElementById("att-pill");
                if(snap.exists()){
                    p.classList.add("done");
                    document.getElementById("att-pill-text").innerText = "Linked";
                    p.href = "javascript:void(0)";
                }
            });
        }

        setInterval(() => {
            if(totalSlides > 1) {
                currentSlide = (currentSlide + 1) % totalSlides;
                document.getElementById("sliderTrack").style.transform = `translateX(-${currentSlide * 100}%)`;
            }
        }, 4000);

        initSync();
    </script>
</body>
</html>
