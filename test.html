<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Elite Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --gold: #facc15; --success: #22c55e; --danger: #ef4444;
            --neon-glow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #f8fafc; padding-bottom: 110px; overflow-x: hidden;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent);
        }

        /* Elements from your original CSS */
        #shoutoutBubble {
            position: fixed; top: 20px; right: 20px; z-index: 11000;
            max-width: 260px; background: rgba(15, 23, 42, 0.95);
            border: 1.5px solid var(--accent); border-radius: 18px;
            padding: 10px; display: flex; align-items: center; gap: 10px;
            box-shadow: var(--neon-glow); backdrop-filter: blur(15px);
            transform: translateX(150%); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #shoutoutBubble.active { transform: translateX(0); }
        .b-av { width: 35px; height: 35px; border-radius: 10px; border: 1px solid var(--accent); object-fit: cover; }

        #activityPanel {
            position: fixed; bottom: -100%; left: 0; right: 0; height: 75vh;
            background: #0b0f1a; border-top: 3px solid var(--accent);
            border-radius: 30px 30px 0 0; z-index: 20000;
            transition: 0.5s ease; padding: 25px 20px; overflow-y: auto;
        }
        #activityPanel.open { bottom: 0; }
        #overlay-blur { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 15000; backdrop-filter: blur(4px); }

        .slider-section { width: 100%; margin: 10px 0 15px 0; overflow: hidden; }
        .carousel-track { display: flex; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; }
        .banner-card { min-width: 100%; padding: 0 20px; box-sizing: border-box; text-decoration: none; display: block; }
        .banner-inner { position: relative; border-radius: 24px; overflow: hidden; border: 1px solid var(--glass-border); background: #0f172a; aspect-ratio: 16 / 8; width: 100%; }
        .slide-img { width: 100%; height: 100%; object-fit: cover; }

        .xp-card { margin: 10px 20px; background: var(--glass); border: 1px solid var(--glass-border); padding: 18px; border-radius: 24px; }
        .progress-track { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: 1s ease-in-out; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 20px; }
        .card { background: var(--glass); border: 1px solid var(--glass-border); padding: 22px; border-radius: 24px; text-decoration: none; color: white; position: relative; }
        .card.locked { opacity: 0.5; }
        
        .bottom-nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(15, 23, 42, 0.95); border-radius: 22px; display: flex; justify-content: space-around; padding: 12px; border: 1px solid var(--glass-border); z-index: 10000; }
        .nav-link { color: #64748b; text-decoration: none; text-align: center; font-size: 10px; font-weight: 700; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>
    <div id="shoutoutBubble">
        <img src="" id="bAvatar" class="b-av">
        <div><span style="font-size:8px; color:var(--accent); font-weight:900;" id="bUser">SYSTEM</span><p style="font-size:11px; font-weight:600;" id="bMsg">Waiting...</p></div>
    </div>

    <div id="overlay-blur" onclick="togglePanel()"></div>
    <div id="activityPanel">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h3 style="font-family:'Orbitron'; font-size:14px; color:var(--accent);">SIGNAL ARCHIVE</h3>
            <i class="ri-close-line" onclick="togglePanel()" style="font-size:24px; color:var(--danger);"></i>
        </div>
        <div id="logList"></div>
    </div>

    <div class="shout-trigger" onclick="togglePanel()" style="position:fixed; bottom:100px; left:20px; z-index:9998; background:var(--accent); width:45px; height:45px; border-radius:50%; display:flex; align-items:center; justify-content:center;"><i class="ri-history-line"></i></div>

    <header style="padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); overflow: hidden;"><img id="uAvatar" src="" style="width:100%; height:100%;"></div>
            <div>
                <div id="rankBadge" class="rank-badge" style="font-size: 8px; font-weight: 900; padding: 2px 8px; border-radius: 4px; text-transform: uppercase;">Syncing...</div>
                <h2 id="uName" style="font-size: 18px; font-weight: 800;">Student</h2>
            </div>
        </div>
        <div id="sCount" style="background:rgba(255,100,0,0.1); color:#ff6400; padding:8px 15px; border-radius:15px; font-weight:800; font-size:12px;">🔥 0 Days</div>
    </header>

    <div style="background: rgba(99, 102, 241, 0.05); padding: 8px 0; overflow: hidden; white-space: nowrap; border-bottom: 1px solid var(--glass-border); margin-bottom: 10px;">
        <div id="marqueeMsg" style="display: inline-block; padding-left: 100%; font-size: 10px; font-weight: 700; color: var(--accent);">Syncing terminal...</div>
    </div>

    <div id="wordDisplaySection" style="margin: 20px; display: none;">
        <div class="card" style="border-left: 4px solid var(--accent); padding: 20px;">
            <h2 id="wordText" style="font-family: 'Orbitron'; font-size: 18px; text-transform: uppercase;">LOADING...</h2>
            <p id="wordDesc" style="font-size: 13px; opacity: 0.8; margin-top: 10px;">Fetching definition...</p>
        </div>
    </div>

    <div class="xp-card" style="background: rgba(6,182,212,0.05);">
        <div style="display:flex; gap:10px;">
            <input type="text" id="shoutInput" placeholder="Broadcast signal (50 XP)" style="background:transparent; border:none; color:white; font-size:12px; flex:1; outline:none;" maxlength="45">
            <button onclick="sendSignal()" style="background:var(--accent); border:none; padding:6px 12px; border-radius:8px; font-weight:900;">SEND</button>
        </div>
    </div>

    <div class="slider-section" id="sliderRoot" style="display: none;">
        <div class="carousel-container"><div class="carousel-track" id="sliderTrack"></div></div>
        <div class="dots-container" id="sliderDots" style="display:flex; justify-content:center; gap:6px; margin-top:10px;"></div>
    </div>

    <div class="xp-card">
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div><span id="uLevelBadge" style="background:var(--primary); font-size:9px; padding:2px 8px; border-radius:4px;">Level 1</span><h3 id="uNameXP" style="font-weight:800;">Loading...</h3></div>
            <span id="xpVal" style="color:var(--accent); font-weight:800;">0 XP</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="xpBar"></div></div>
    </div>

    <div class="grid" style="margin-top:20px;">
        <div class="card" onclick="triggerChallenge()" style="border-color: rgba(239, 68, 68, 0.2);"><i class="ri-sword-fill" style="color:var(--danger)"></i><h4>RAID</h4><p style="font-size:9px;">Steal XP (50)</p></div>
        <div class="card" onclick="buyFocusWall()" style="border-color: rgba(34, 197, 94, 0.2);"><i id="shieldIcon" class="ri-shield-flash-line" style="color:var(--success)"></i><h4>SHIELD</h4><p id="wallStatus" style="font-size:9px;">Inactive</p></div>
        
        <a href="tournament.html" class="card" style="grid-column: span 2; background: linear-gradient(90deg, #facc15, #ef4444); color:black;"><h3>🏆 Tournament</h3></a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link active"><i class="ri-home-5-fill"></i><span>Home</span></a>
        <a href="daily-test.html" class="nav-link"><i class="ri-edit-line"></i><span>Exams</span></a>
        <a href="chat.html" class="nav-link"><i class="ri-chat-3-line"></i><span>Chat</span></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-line"></i><span>Profile</span></a>
    </nav>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, collection, getDocs, setDoc, addDoc, query, orderBy, limit, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI", authDomain: "black-terminal-f2c91.firebaseapp.com", projectId: "black-terminal-f2c91", storageBucket: "black-terminal-f2c91.appspot.com", messagingSenderId: "552489994197", appId: "1:552489994197:web:7662331264c334ffbadf5c" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        const student = localStorage.getItem("studentName");
        if (!student) { window.location.href = "login.html"; }

        // Core Functions from original
        window.togglePanel = () => {
            const panel = document.getElementById('activityPanel');
            panel.classList.toggle('open');
            document.getElementById('overlay-blur').style.display = panel.classList.contains('open') ? 'block' : 'none';
        };

        window.sendSignal = async () => {
            const msg = document.getElementById("shoutInput").value.trim();
            if(!msg || student === "Guest") return;
            const userRef = doc(db, "students", student);
            const snap = await getDoc(userRef);
            if(snap.exists() && (snap.data().xp || 0) >= 50) {
                const data = { user: student, text: msg, avatar: snap.data().photo || "", time: Date.now(), likes: 0 };
                await setDoc(doc(db, "interactions", "shoutout"), data);
                await addDoc(collection(db, "shoutouts"), data);
                await updateDoc(userRef, { xp: increment(-50) });
                document.getElementById("shoutInput").value = "";
            } else { alert("Need 50 XP!"); }
        };

        window.triggerChallenge = async () => {
            const uRef = doc(db, "students", student); const uSnap = await getDoc(uRef);
            if(uSnap.data().xp < 50) return alert("Costs 50 XP!");
            const q = query(collection(db, "students"), orderBy("xp", "desc"), limit(10));
            const snap = await getDocs(q); let targets = [];
            snap.forEach(d => { if(d.id !== student) targets.push(d.id); });
            const targetId = targets[Math.floor(Math.random() * targets.length)];
            const tRef = doc(db, "students", targetId); const tSnap = await getDoc(tRef);
            
            if(tSnap.data().focusWall > 0) {
                await updateDoc(tRef, { focusWall: increment(-1) });
                await updateDoc(uRef, { xp: increment(-50) });
                alert("Attack Blocked by Shield!");
            } else {
                const stolen = Math.floor(Math.random() * 41) + 40;
                await updateDoc(uRef, { xp: increment(stolen - 50) });
                await updateDoc(tRef, { xp: increment(-stolen) });
                alert(`Stole ${stolen} XP!`);
            }
        };

        window.buyFocusWall = async () => {
            const uRef = doc(db, "students", student); const uSnap = await getDoc(uRef);
            if(uSnap.data().xp < 150) return alert("Need 150 XP!");
            await updateDoc(uRef, { xp: increment(-150), focusWall: increment(1) });
            alert("Shield Active!");
        };

        // Initialize Realtime Listeners
        function init() {
            // Slider Logic
            onSnapshot(doc(db, "settings", "slider"), (snap) => {
                if(snap.exists()){
                    const d = snap.data(); const urls = d.images.split(',');
                    const track = document.getElementById('sliderTrack');
                    document.getElementById('sliderRoot').style.display = 'block';
                    track.innerHTML = urls.map(url => `<div class="banner-card"><div class="banner-inner"><img src="${url}" class="slide-img"></div></div>`).join('');
                }
            });

            // Student Sync
            onSnapshot(doc(db, "students", student), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    document.getElementById("uName").innerText = student;
                    document.getElementById("uNameXP").innerText = student;
                    document.getElementById("xpVal").innerText = (d.xp || 0) + " XP";
                    document.getElementById("xpBar").style.width = ((d.xp % 1000) / 1000 * 100) + "%";
                    document.getElementById("wallStatus").innerText = (d.focusWall || 0) > 0 ? "SHIELD ON" : "Inactive";
                }
            });

            // Attendance Auto-XP logic
            const todayISO = new Date().toISOString().split('T')[0];
            onSnapshot(doc(db, "attendance", `${student}_${todayISO}`), async (snap) => {
                if(snap.exists() && !localStorage.getItem(`att_xp_${todayISO}`)) {
                    await updateDoc(doc(db, "students", student), { xp: increment(100) });
                    localStorage.setItem(`att_xp_${todayISO}`, "true");
                }
            });

            // Word of the Day
            onSnapshot(doc(db, "content", "dailyWord"), (snap) => {
                if(snap.exists()) {
                    document.getElementById('wordDisplaySection').style.display = 'block';
                    document.getElementById('wordText').innerText = snap.data().word;
                    document.getElementById('wordDesc').innerText = snap.data().description;
                }
            });
        }
        init();
    </script>
</body>
</html>
