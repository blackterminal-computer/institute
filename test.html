<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Elite Ultra Final</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #7c3aed; --accent: #00ffff; --bg: #02040a;
            --glass: rgba(255, 255, 255, 0.05);
            --neon: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #f1f5f9; min-height: 100vh; padding-bottom: 140px; overflow-x: hidden; }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 0px; }

        /* --- Header --- */
        header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(2,4,10,0.9); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass); }
        .u-avatar { width: 65px; height: 65px; border-radius: 18px; border: 2px solid var(--accent); object-fit: cover; box-shadow: var(--neon); background: #000; }

        /* --- Notification Overlay --- */
        #shoutOverlay { position: fixed; top: 110px; left: 15px; right: 15px; background: rgba(10,15,30,0.98); border: 2px solid var(--accent); border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 15px; z-index: 9999; transform: translateY(-250%); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 30px rgba(0,255,255,0.3); }
        #shoutOverlay.show { transform: translateY(0); }

        /* --- Monthly Fee Banner --- */
        .fee-status { margin: 15px 20px; padding: 12px 20px; background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }

        /* --- Image Slider --- */
        .slider-container { margin: 20px; height: 180px; border-radius: 25px; overflow: hidden; position: relative; border: 1px solid var(--glass); }
        .slide { width: 100%; height: 100%; object-fit: cover; position: absolute; opacity: 0; transition: 1s; }
        .slide.active { opacity: 1; }

        /* --- Marquee --- */
        .marquee-box { background: rgba(0, 255, 255, 0.05); padding: 10px 0; border-bottom: 1px solid var(--glass); overflow: hidden; }
        .marquee-content { display: inline-block; white-space: nowrap; animation: scroll 25s linear infinite; color: var(--accent); font-weight: 800; font-size: 13px; text-transform: uppercase; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* --- Broadcast & Archive --- */
        .broadcast-area { margin: 20px; padding: 15px; background: #0f172a; border-radius: 20px; border: 1px solid var(--glass); display: flex; gap: 10px; }
        .broadcast-area input { background: transparent; border: none; color: #fff; flex: 1; outline: none; font-size: 16px; }
        .archive-trigger { padding: 10px; color: var(--accent); font-size: 24px; }

        /* --- XP Dashboard --- */
        .xp-card { margin: 20px; padding: 25px; background: var(--glass); border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); }
        .progress-container { height: 12px; background: rgba(255,255,255,0.05); border-radius: 50px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: 1.5s; box-shadow: var(--neon); }

        /* --- Action Grid --- */
        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .action-card { background: rgba(255,255,255,0.03); border: 1px solid var(--glass); padding: 22px; border-radius: 28px; text-decoration: none; color: #fff; position: relative; }
        .action-card i { font-size: 30px; color: var(--accent); display: block; margin-bottom: 8px; }
        .locked { opacity: 0.5; filter: grayscale(1); }

        /* --- Attendance Floating Button --- */
        #attBtn { position: fixed; bottom: 100px; right: 20px; width: 65px; height: 65px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: var(--neon); z-index: 999; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* --- Archive Panel --- */
        #archivePanel { position: fixed; inset: 0; background: var(--bg); z-index: 20000; padding: 25px; transform: translateX(100%); transition: 0.4s; overflow-y: auto; }
        #archivePanel.active { transform: translateX(0); }
        .log-item { background: var(--glass); padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }

        /* --- Nav --- */
        .bottom-nav { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(10, 10, 20, 0.95); border-radius: 25px; padding: 15px; display: flex; justify-content: space-around; border: 1px solid var(--glass); z-index: 10000; backdrop-filter: blur(10px); }
        .nav-item { color: #64748b; text-decoration: none; text-align: center; font-size: 11px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 24px; display: block; }
    </style>
</head>
<body>

    <div id="shoutOverlay">
        <img id="shoutImg" src="" style="width: 50px; height: 50px; border-radius: 12px;">
        <div style="flex:1">
            <span id="shoutUser" style="color: var(--accent); font-weight: 800; font-family: 'Orbitron'; font-size:12px;">SYSTEM</span>
            <p id="shoutMsg" style="font-size: 15px; font-weight: 600; color: #fff;"></p>
        </div>
    </div>

    <div id="archivePanel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-family:'Orbitron'; color:var(--accent)">SIGNAL ARCHIVE</h2>
            <i class="ri-close-line" onclick="toggleArchive()" style="font-size:30px;"></i>
        </div>
        <div id="archiveContent"></div>
    </div>

    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <img id="uAvatar" class="u-avatar" src="">
            <div>
                <h2 id="uName" style="font-size: 20px; font-family: 'Orbitron';">USER</h2>
                <p id="uLevelBadge" style="font-size: 10px; color: var(--accent); font-weight: 800; letter-spacing: 1px;">BRONZE TRAINEE</p>
            </div>
        </div>
        <div id="sCount" style="color: #fbbf24; font-size: 18px; font-weight: 800; background:rgba(251,191,36,0.1); padding:8px 12px; border-radius:12px; border:1px solid #fbbf24;">🔥 0</div>
    </header>

    <div class="fee-status">
        <div style="display:flex; align-items:center; gap:10px;">
            <i class="ri-checkbox-circle-fill" style="color:#10b981; font-size:20px;"></i>
            <span style="font-weight:700; font-size:14px;">Monthly Fee Status</span>
        </div>
        <span style="background:#10b981; color:#fff; padding:3px 10px; border-radius:6px; font-size:10px; font-weight:900;">COMPLETED</span>
    </div>

    <div class="slider-container" id="mainSlider">
        <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800" class="slide active">
        <img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc48?w=800" class="slide">
        <img src="https://images.unsplash.com/photo-1563986768609-322da13575f3?w=800" class="slide">
    </div>

    <div class="marquee-box">
        <div id="marqueeMsg" class="marquee-content">WELCOME TO BLACK TERMINAL ELITE DASHBOARD...</div>
    </div>

    <div id="wordBox" style="margin:20px; padding:20px; background:var(--glass); border-radius:20px; border-left:4px solid var(--accent); display:none;">
        <h3 id="wordTitle" style="font-family:'Orbitron'; color:var(--accent); font-size:18px;"></h3>
        <p id="wordDesc" style="font-size:14px; opacity:0.8; margin-top:5px;"></p>
    </div>

    <div class="broadcast-area">
        <input type="text" id="shoutInput" placeholder="Broadcast signal (50 XP)">
        <i class="ri-history-line archive-trigger" onclick="toggleArchive()"></i>
        <button onclick="sendSignal()" style="background:var(--accent); border:none; padding:8px 15px; border-radius:10px; font-weight:900; font-family:'Orbitron'; font-size:10px;">SEND</button>
    </div>

    <section class="xp-card">
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 id="uXPDisplay" style="font-size: 38px; font-family: 'Orbitron';">0 XP</h1>
                <p id="xpMilestone" style="font-size: 11px; color: var(--accent); font-weight: 800;">NEXT LEVEL: 1000 XP</p>
            </div>
            <div style="text-align: right;">
                <p style="font-size: 10px; opacity: 0.5;">RANK</p>
                <h2 id="uRank" style="color: var(--accent); font-family: 'Orbitron'; font-size: 24px;">#--</h2>
            </div>
        </div>
        <div class="progress-container"><div id="xpBar" class="progress-bar"></div></div>
    </section>

    <div class="action-grid">
        <div class="action-card" onclick="triggerRaid()" style="border-left:4px solid #ff4444;">
            <i class="ri-sword-fill" style="color:#ff4444"></i>
            <h3>XP Raid</h3>
            <p style="font-size:10px; opacity:0.5;">Attack others</p>
        </div>
        <div class="action-card" onclick="buyShield()" style="border-left:4px solid #00ff88;">
            <i class="ri-shield-flash-fill" style="color:#00ff88"></i>
            <h3>Shield</h3>
            <p id="wallStatus" style="font-size:10px; opacity:0.5;">0 Layers</p>
        </div>
        <a href="exams.html" class="action-card"><i class="ri-terminal-box-line"></i><h3>Exams</h3></a>
        <a href="battle.html" class="action-card"><i class="ri-fire-line"></i><h3>Battle</h3></a>
        <a href="flash.html" class="action-card"><i class="ri-flashlight-fill"></i><h3>Flash</h3></a>
        <div id="unitTestCard" class="action-card locked">
            <i class="ri-lock-password-fill"></i>
            <h3>Unit Test</h3>
            <p style="font-size:10px; opacity:0.5;">Unlock @ 5000 XP</p>
        </div>
    </div>

    <div id="attBtn" onclick="markAttendance()">
        <i class="ri-fingerprint-fill"></i>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i class="ri-home-7-fill"></i>Home</a>
        <a href="daily-test.html" class="nav-item"><i class="ri-keyboard-box-line"></i>Exams</a>
        <a href="chat.html" class="nav-item"><i class="ri-message-3-line"></i>Chat</a>
        <a href="profile.html" class="nav-item"><i class="ri-user-line"></i>Profile</a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, setDoc, collection, query, orderBy, getDoc, getDocs, limit, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const studentName = localStorage.getItem("studentName") || "Guest";

        // --- UI UTILS ---
        window.toggleArchive = () => document.getElementById('archivePanel').classList.toggle('active');

        function showNotify(msg, user = "SYSTEM", img = "https://api.dicebear.com/7.x/bottts/svg?seed=Sys") {
            const overlay = document.getElementById("shoutOverlay");
            document.getElementById("shoutMsg").innerText = msg;
            document.getElementById("shoutUser").innerText = user;
            document.getElementById("shoutImg").src = img;
            overlay.classList.add("show");
            setTimeout(() => overlay.classList.remove("show"), 5000);
        }

        // --- ATTENDANCE (100 XP) ---
        window.markAttendance = async () => {
            if(studentName === "Guest") return;
            const uRef = doc(db, "students", studentName);
            const snap = await getDoc(uRef);
            const today = new Date().toDateString();

            if(snap.data().lastAtt === today) {
                alert("Attendance already marked for today!");
            } else {
                await updateDoc(uRef, { 
                    xp: increment(100),
                    lastAtt: today 
                });
                showNotify("Attendance Marked! +100 XP added to terminal.", "ATTENDANCE");
            }
        };

        // --- BROADCAST ---
        window.sendSignal = async () => {
            const msg = document.getElementById("shoutInput").value.trim();
            if(!msg || studentName === "Guest") return;
            const uRef = doc(db, "students", studentName);
            const snap = await getDoc(uRef);
            if(snap.data().xp < 50) return alert("Need 50 XP!");

            await updateDoc(uRef, { xp: increment(-50) });
            const shoutData = {
                user: studentName,
                text: msg,
                photo: snap.data().photo || `https://api.dicebear.com/7.x/bottts/svg?seed=${studentName}`,
                time: Date.now(),
                likes: 0
            };
            await setDoc(doc(db, "interactions", "shoutout"), shoutData);
            await addDoc(collection(db, "shoutouts"), shoutData);
            document.getElementById("shoutInput").value = "";
        };

        // --- RAID & NOTIFICATION ---
        window.triggerRaid = async () => {
            const uRef = doc(db, "students", studentName);
            const uSnap = await getDoc(uRef);
            if(uSnap.data().xp < 50) return alert("Need 50 XP!");

            const q = query(collection(db, "students"), orderBy("xp", "desc"), limit(10));
            const snap = await getDocs(q);
            let players = []; snap.forEach(d => { if(d.id !== studentName) players.push(d.id); });
            const target = players[Math.floor(Math.random() * players.length)];
            
            const tRef = doc(db, "students", target);
            const tSnap = await getDoc(tRef);
            
            if(tSnap.data().focusWall > 0) {
                await updateDoc(tRef, { focusWall: increment(-1) });
                await updateDoc(uRef, { xp: increment(-50) });
                await setDoc(doc(db, "interactions", "shoutout"), {
                    user: "SECURITY",
                    text: `${studentName}'s RAID on ${target} was BLOCKED by Shield!`,
                    photo: "https://cdn-icons-png.flaticon.com/512/559/559341.png",
                    time: Date.now()
                });
            } else {
                const amt = Math.floor(Math.random() * 50) + 50;
                await updateDoc(uRef, { xp: increment(amt - 50) });
                await updateDoc(tRef, { xp: increment(-amt) });
                await setDoc(doc(db, "interactions", "shoutout"), {
                    user: "RAID ALERT",
                    text: `${studentName} stole ${amt} XP from ${target}!`,
                    photo: "https://cdn-icons-png.flaticon.com/512/1322/1322239.png",
                    time: Date.now()
                });
            }
        };

        // --- REALTIME SYNC ---
        function sync() {
            onSnapshot(doc(db, "students", studentName), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    const xp = d.xp || 0;
                    document.getElementById("uName").innerText = studentName;
                    document.getElementById("uXPDisplay").innerText = xp + " XP";
                    document.getElementById("sCount").innerText = d.streak || 0;
                    document.getElementById("wallStatus").innerText = (d.focusWall || 0) + " Layers";
                    document.getElementById("uAvatar").src = d.photo || `https://api.dicebear.com/7.x/bottts/svg?seed=${studentName}`;
                    
                    // Level & Unit Test Unlock
                    if(xp >= 5000) {
                        document.getElementById("unitTestCard").classList.remove("locked");
                        document.getElementById("unitTestCard").onclick = () => window.location.href="unit-test.html";
                    }
                    document.getElementById("uLevelBadge").innerText = xp < 1000 ? "BRONZE TRAINEE" : (xp < 3000 ? "SILVER AGENT" : "GOLD ELITE");
                    document.getElementById("xpBar").style.width = (xp % 1000) / 10 + "%";
                }
            });

            // Signal Archive Sync
            const qS = query(collection(db, "shoutouts"), orderBy("time", "desc"), limit(20));
            onSnapshot(qS, snap => {
                const cont = document.getElementById("archiveContent");
                cont.innerHTML = "";
                snap.forEach(s => {
                    const data = s.data();
                    cont.innerHTML += `
                        <div class="log-item">
                            <div style="display:flex; gap:10px; align-items:center;">
                                <img src="${data.photo}" style="width:35px; height:35px; border-radius:8px;">
                                <div>
                                    <p style="font-weight:800; color:var(--accent); font-size:12px;">${data.user}</p>
                                    <p style="font-size:14px;">${data.text}</p>
                                </div>
                            </div>
                        </div>`;
                });
            });

            // Notification Listener
            onSnapshot(doc(db, "interactions", "shoutout"), snap => {
                if(snap.exists()) {
                    const d = snap.data();
                    showNotify(d.text, d.user, d.photo);
                }
            });

            onSnapshot(doc(db, "content", "dailyWord"), snap => {
                if(snap.exists()) {
                    document.getElementById("wordBox").style.display = "block";
                    document.getElementById("wordTitle").innerText = snap.data().word;
                    document.getElementById("wordDesc").innerText = snap.data().description;
                }
            });

            onSnapshot(doc(db, "settings", "marquee"), snap => {
                if(snap.exists()) document.getElementById("marqueeMsg").innerText = snap.data().msg;
            });
        }

        // Slider Logic
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 4000);

        sync();
    </script>
</body>
</html>
