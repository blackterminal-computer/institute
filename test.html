<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Ultra Elite v2</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #7c3aed; --accent: #00ffff; --bg: #02040a;
            --glass: rgba(255, 255, 255, 0.05);
            --neon: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #f1f5f9; 
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b, transparent);
            min-height: 100vh; padding-bottom: 120px;
        }

        /* --- Header --- */
        header {
            padding: 25px 20px; background: rgba(2, 4, 10, 0.95);
            backdrop-filter: blur(20px); border-bottom: 2px solid var(--glass);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 5000;
        }
        .u-avatar { width: 65px; height: 65px; border-radius: 18px; border: 2px solid var(--accent); box-shadow: var(--neon); }

        /* --- Global Shoutout Bubble --- */
        #shoutoutBubble {
            position: fixed; top: 110px; left: 15px; right: 15px;
            background: rgba(10, 15, 30, 0.98); border: 2px solid var(--accent);
            border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 15px;
            z-index: 9999; box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            transform: translateY(-250%); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #shoutoutBubble.active { transform: translateY(0); }

        /* --- Word of the Day (Restored & Enhanced) --- */
        .word-box {
            margin: 20px; padding: 25px; background: linear-gradient(135deg, rgba(124, 58, 237, 0.1), rgba(0, 255, 255, 0.05));
            border-radius: 25px; border: 1px solid var(--glass); border-left: 5px solid var(--accent);
        }

        /* --- XP Dashboard --- */
        .xp-card {
            margin: 20px; padding: 30px; background: var(--glass);
            border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .bar-bg { height: 16px; background: rgba(255,255,255,0.05); border-radius: 50px; margin: 15px 0; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: 1s; box-shadow: var(--neon); }

        /* --- Grid Layout --- */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass);
            padding: 30px 20px; border-radius: 30px; text-decoration: none; color: #fff;
            text-align: center; transition: 0.3s;
        }
        .card:active { transform: scale(0.95); background: rgba(255,255,255,0.08); }
        .card i { font-size: 35px; color: var(--accent); display: block; margin-bottom: 10px; text-shadow: var(--neon); }
        .featured { grid-column: span 2; background: linear-gradient(90deg, #4c1d95, #7c3aed); border: none; }

        /* --- Archive / Log List --- */
        .log-item {
            background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px;
            margin-bottom: 15px; border: 1px solid var(--glass); display: flex; gap: 12px;
        }
        .like-btn {
            margin-top: 10px; background: rgba(0, 255, 255, 0.1); border: 1px solid var(--accent);
            color: var(--accent); padding: 5px 15px; border-radius: 10px; font-weight: 800; font-size: 12px;
        }

        /* --- Navigation --- */
        .nav-dock {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: rgba(10, 10, 20, 0.95); border-radius: 25px; padding: 15px;
            display: flex; justify-content: space-around; border: 1px solid var(--glass); z-index: 10000;
        }
        .nav-link { color: #64748b; text-decoration: none; text-align: center; font-size: 11px; font-weight: 700; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 26px; display: block; }

        #activityPanel {
            position: fixed; inset: 0; background: var(--bg); z-index: 20000;
            padding: 30px 20px; transform: translateX(100%); transition: 0.4s; overflow-y: auto;
        }
        #activityPanel.active { transform: translateX(0); }
    </style>
</head>
<body>

    <div id="shoutoutBubble">
        <img src="" id="bAvatar" style="width: 55px; height: 55px; border-radius: 15px; border: 2px solid var(--accent);">
        <div style="flex:1">
            <span id="bUser" style="color: var(--accent); font-weight: 800; font-size: 12px; font-family: 'Orbitron';">TERMINAL</span>
            <p id="bMsg" style="font-size: 16px; font-weight: 600; color: #fff; margin-top: 4px;"></p>
        </div>
    </div>

    <header>
        <div style="display:flex; align-items:center; gap:15px;">
            <img id="uAvatar" class="u-avatar" src="">
            <div>
                <p style="font-size: 12px; opacity: 0.6; font-weight: 800;">ELITE AGENT</p>
                <h2 id="uName" style="font-size: 22px; font-family: 'Orbitron';">Syncing...</h2>
            </div>
        </div>
        <div id="sCount" style="color: #fbbf24; font-size: 18px; font-weight: 800; background: rgba(251, 191, 36, 0.1); padding: 8px 15px; border-radius: 15px; border: 1px solid #fbbf24;">🔥 0</div>
    </header>

    <div style="background: rgba(0, 255, 255, 0.05); padding: 12px 0; overflow: hidden; border-bottom: 1px solid var(--glass);">
        <div style="display:inline-block; white-space:nowrap; animation: scroll 20s linear infinite; color:var(--accent); font-weight:700; font-size:14px;" id="marqueeMsg">CONNECTING TO GLOBAL DATABASE...</div>
    </div>

    <div id="wordDisplaySection" class="word-box" style="display: none;">
        <span style="font-size: 11px; color: var(--accent); font-weight: 800; letter-spacing: 2px;">CORE_LEARNING_LOG</span>
        <h1 id="wordText" style="font-family: 'Orbitron'; font-size: 24px; color: #fff; margin: 5px 0;"></h1>
        <p id="wordDesc" style="font-size: 15px; opacity: 0.8; line-height: 1.5; color: #cbd5e1;"></p>
    </div>

    <section class="xp-card">
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <span id="uLevelBadge" style="background:var(--primary); color:white; padding:4px 12px; border-radius:8px; font-size:12px; font-weight:900; font-family:'Orbitron';">LEVEL 01</span>
                <h1 id="uNameXP" style="font-size: 40px; font-family: 'Orbitron'; margin-top: 10px;">0 XP</h1>
            </div>
            <div style="text-align: right;">
                <p style="font-size: 10px; opacity: 0.5; font-weight:800;">GLOBAL RANK</p>
                <h2 id="instRank" style="color: var(--accent); font-family: 'Orbitron'; font-size: 28px;">#--</h2>
            </div>
        </div>
        <div class="bar-bg"><div id="xpBar" class="bar-fill"></div></div>
        <p id="xpTip" style="font-size: 13px; color: var(--accent); font-weight: 700;"></p>
    </section>

    <div style="padding: 0 20px 20px;">
        <div style="background: #0f172a; border: 2px solid var(--glass); border-radius: 20px; padding: 15px 20px; display: flex; gap: 12px; align-items: center;">
            <input type="text" id="shoutInput" placeholder="Broadcast a signal (50 XP)..." style="background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 16px; font-weight: 600;">
            <button onclick="sendSignal()" style="background: var(--accent); border: none; padding: 10px 20px; border-radius: 12px; font-weight: 900; font-family: 'Orbitron'; font-size: 12px; color: #000;">SEND</button>
        </div>
    </div>

    <div class="grid">
        <a href="tournament.html" class="card featured">
            <i class="ri-trophy-fill" style="color: #fff;"></i>
            <h3 style="font-family: 'Orbitron'; font-size: 20px;">TOURNAMENT</h3>
        </a>

        <div class="card" onclick="triggerChallenge()" style="border-color: rgba(255,0,0,0.2);">
            <i class="ri-sword-fill" style="color: #ff4444;"></i>
            <h3 style="font-size: 15px;">XP RAID</h3>
            <p style="font-size: 10px; opacity: 0.5;">Steal XP (Cost 50)</p>
        </div>

        <div class="card" onclick="buyFocusWall()" style="border-color: rgba(0,255,0,0.2);">
            <i id="shieldIcon" class="ri-shield-flash-fill" style="color: #00ff88;"></i>
            <h3 id="wallTitle" style="font-size: 15px;">SHIELD</h3>
            <p id="wallStatus" style="font-size: 10px; opacity: 0.5;">Inactive</p>
        </div>

        <a href="daily-test.html" class="card"><i class="ri-terminal-window-fill"></i><h3 style="font-size: 15px;">EXAMS</h3></a>
        <a href="leaderboard.html" class="card"><i class="ri-bar-chart-fill"></i><h3 style="font-size: 15px;">RANKS</h3></a>
        <a href="courses.html" class="card"><i class="ri-vidicon-fill"></i><h3 style="font-size: 15px;">LECTURES</h3></a>
        <div id="unitCard" class="card" style="opacity: 0.5;"><i class="ri-lock-fill"></i><h3 style="font-size: 15px;">UNIT TEST</h3></div>
    </div>

    <a href="attendence.html" id="att-pill" style="position:fixed; bottom:120px; right:20px; width:70px; height:70px; background:var(--accent); color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px; box-shadow:var(--neon); z-index:9000;">
        <i class="ri-fingerprint-fill"></i>
    </a>

    <nav class="nav-dock">
        <a href="index.html" class="nav-link active"><i class="ri-home-7-fill"></i><span>CORE</span></a>
        <a href="daily-test.html" class="nav-link"><i class="ri-keyboard-fill"></i><span>TESTS</span></a>
        <a href="battle.html" class="nav-link"><i class="ri-sword-line"></i><span>BATTLE</span></a>
        <a href="chat.html" class="nav-link"><i class="ri-message-3-fill"></i><span>CHAT</span></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-settings-fill"></i><span>DATA</span></a>
    </nav>

    <div id="activityPanel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; position:sticky; top:0; background:var(--bg); padding:10px 0;">
            <h2 style="font-family:'Orbitron'; color:var(--accent)">SIGNAL ARCHIVE</h2>
            <i class="ri-close-circle-fill" onclick="togglePanel()" style="font-size:40px; color:#ff4444;"></i>
        </div>
        <div id="logList"></div>
    </div>

    <div onclick="togglePanel()" style="position:fixed; top:200px; left:0; background:var(--accent); color:#000; padding:12px; border-radius:0 12px 12px 0; z-index:1000; box-shadow: var(--neon);">
        <i class="ri-history-line" style="font-size: 24px;"></i>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, collection, getDocs, setDoc, addDoc, query, orderBy, limit, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const student = localStorage.getItem("studentName");
        if (!student) { window.location.href = "login.html"; }

        window.togglePanel = () => document.getElementById('activityPanel').classList.toggle('active');

        // Send Signal
        window.sendSignal = async () => {
            const msg = document.getElementById("shoutInput").value.trim();
            if(!msg || student === "Guest") return;
            const userRef = doc(db, "students", student);
            const snap = await getDoc(userRef);
            if(snap.exists() && (snap.data().xp || 0) >= 50) {
                const data = {
                    user: student,
                    text: msg,
                    avatar: snap.data().photo || `https://api.dicebear.com/7.x/bottts/svg?seed=${student}`,
                    time: Date.now(),
                    likes: 0
                };
                await setDoc(doc(db, "interactions", "shoutout"), data);
                await addDoc(collection(db, "shoutouts"), data);
                await updateDoc(userRef, { xp: increment(-50) });
                document.getElementById("shoutInput").value = "";
            } else { alert("NEEDS 50 XP!"); }
        };

        // Like Signal Function
        window.sendReaction = async (docId) => {
            const logRef = doc(db, "shoutouts", docId);
            await updateDoc(logRef, { likes: increment(1) });
        };

        // RAID & SHIELD LOGIC FIXED
        window.triggerChallenge = async () => {
            const uRef = doc(db, "students", student);
            const uSnap = await getDoc(uRef);
            if(uSnap.data().xp < 50) return alert("Needs 50 XP!");
            
            const q = query(collection(db, "students"), orderBy("xp", "desc"), limit(20));
            const snap = await getDocs(q);
            let targets = []; snap.forEach(d => { if(d.id !== student) targets.push(d.id); });
            const targetId = targets[Math.floor(Math.random() * targets.length)];
            
            const tRef = doc(db, "students", targetId);
            const tSnap = await getDoc(tRef);
            const tData = tSnap.data();

            if(tData.focusWall > 0) {
                await updateDoc(tRef, { focusWall: increment(-1) });
                await updateDoc(uRef, { xp: increment(-50) });
                alert(`RAID FAILED! ${targetId}'s Shield blocked you.`);
            } else {
                const stolen = Math.floor(Math.random() * 40) + 40;
                await updateDoc(uRef, { xp: increment(stolen - 50) });
                await updateDoc(tRef, { xp: increment(-stolen) });
                alert(`RAID SUCCESS! Stole ${stolen} XP from ${targetId}`);
            }
        };

        window.buyFocusWall = async () => {
            const uRef = doc(db, "students", student);
            const uSnap = await getDoc(uRef);
            if(uSnap.data().xp < 150) return alert("Needs 150 XP for Shield!");
            await updateDoc(uRef, { xp: increment(-150), focusWall: increment(1) });
            alert("Shield Deployed!");
        };

        // Real-time Sync
        function syncData() {
            // Word of the Day Sync
            onSnapshot(doc(db, "content", "dailyWord"), snap => {
                if(snap.exists()){
                    document.getElementById("wordDisplaySection").style.display = "block";
                    document.getElementById("wordText").innerText = snap.data().word;
                    document.getElementById("wordDesc").innerText = snap.data().description;
                }
            });

            // Signal Archive Sync (With Like Button)
            const qH = query(collection(db, "shoutouts"), orderBy("time", "desc"), limit(15));
            onSnapshot(qH, (snap) => {
                const list = document.getElementById("logList");
                list.innerHTML = "";
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    list.innerHTML += `
                        <div class="log-item">
                            <img src="${d.avatar}" style="width:45px; height:45px; border-radius:10px;">
                            <div style="flex:1">
                                <span style="color:var(--accent); font-weight:800; font-size:12px;">${d.user}</span>
                                <p style="font-size:15px; font-weight:600;">${d.text}</p>
                                <button class="like-btn" onclick="sendReaction('${docSnap.id}')">
                                    <i class="ri-fire-fill"></i> ${d.likes || 0}
                                </button>
                            </div>
                        </div>`;
                });
            });

            // Shoutout Bubble
            onSnapshot(doc(db, "interactions", "shoutout"), snap => {
                if(snap.exists()){
                    const d = snap.data();
                    const bubble = document.getElementById("shoutoutBubble");
                    document.getElementById("bUser").innerText = d.user.toUpperCase();
                    document.getElementById("bMsg").innerText = d.text;
                    document.getElementById("bAvatar").src = d.avatar;
                    bubble.classList.add("active");
                    setTimeout(() => bubble.classList.remove("active"), 5000);
                }
            });

            // User Profile & Shield Status
            onSnapshot(doc(db, "students", student), snap => {
                if(snap.exists()){
                    const d = snap.data();
                    document.getElementById("uName").innerText = student;
                    document.getElementById("uNameXP").innerText = (d.xp || 0) + " XP";
                    document.getElementById("uAvatar").src = d.photo || `https://api.dicebear.com/7.x/bottts/svg?seed=${student}`;
                    document.getElementById("sCount").innerText = "🔥 " + (d.streak || 0);
                    
                    const xp = d.xp || 0;
                    document.getElementById("xpBar").style.width = (xp % 1000) / 10 + "%";
                    document.getElementById("uLevelBadge").innerText = "LEVEL " + (Math.floor(xp/1000)+1);
                    
                    const walls = d.focusWall || 0;
                    document.getElementById("wallStatus").innerText = walls > 0 ? `${walls} Layers Active` : "Inactive";
                    document.getElementById("wallTitle").style.color = walls > 0 ? "#00ff88" : "#fff";
                }
            });

            onSnapshot(doc(db, "settings", "marquee"), snap => {
                if(snap.exists()) document.getElementById("marqueeMsg").innerText = snap.data().msg;
            });
        }

        syncData();
    </script>
</body>
</html>
