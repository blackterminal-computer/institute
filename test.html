<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL v3 | Fixed Elite</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #00f2ff; --bg: #05070a;
            --card-bg: rgba(15, 23, 42, 0.4); --glass: rgba(255, 255, 255, 0.03);
            --gold: #ffb800; --danger: #ff2d55; --success: #00ffa3;
            --bronze: #cd7f32; --neon-glow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; padding-bottom: 120px; overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.15), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.1), transparent 40%);
        }

        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* --- Fixed Profile & Header --- */
        .header-elite { padding: 40px 20px 10px; display: flex; justify-content: space-between; align-items: flex-start; }
        .profile-container { position: relative; width: 70px; height: 75px; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); background: linear-gradient(45deg, var(--primary), var(--accent)); padding: 3px; }
        .profile-hex { width: 100%; height: 100%; background: var(--bg); clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .profile-hex img { width: 100%; height: 100%; object-fit: cover; }
        
        .rank-tag { font-size: 8px; font-weight: 800; color: var(--bronze); text-transform: uppercase; letter-spacing: 1px; }
        .user-info h2 { font-family: 'Syncopate', sans-serif; font-size: 16px; margin-top: 2px; }

        /* --- XP Master Card (Fixed at Top) --- */
        .xp-master-card { margin: 15px 20px; background: var(--card-bg); border: 1px solid var(--glass); border-radius: 30px; padding: 20px; position: relative; overflow: hidden; }
        .progress-container { height: 8px; background: rgba(255,255,255,0.05); border-radius: 100px; margin-top: 15px; border: 1px solid var(--glass); overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: 1s ease; box-shadow: 0 0 10px var(--accent); }

        /* --- Bento & Cards --- */
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 20px; }
        .bento-box { background: var(--card-bg); border: 1px solid var(--glass); border-radius: 28px; padding: 18px; text-decoration: none; color: #fff; transition: 0.2s; }
        .bento-box i { font-size: 24px; color: var(--accent); margin-bottom: 8px; display: block; }
        .bento-box.wide { grid-column: span 2; }

        /* --- Marquee --- */
        .marquee-box { margin: 0 20px 15px; background: rgba(0, 242, 255, 0.05); border-radius: 100px; padding: 8px 20px; border: 1px solid rgba(0, 242, 255, 0.2); overflow: hidden; }
        .marquee-content { display: inline-block; animation: scroll 15s linear infinite; font-size: 10px; font-weight: 700; color: var(--accent); white-space: nowrap; }

        /* --- Global Rank (Small Badge) --- */
        .global-badge { background: var(--glass); padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 900; color: var(--accent); border: 1px solid rgba(0,242,255,0.2); margin-top: 5px; display: inline-block; }

        .nav-dock { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(10, 15, 25, 0.9); backdrop-filter: blur(20px); border: 1px solid var(--glass); border-radius: 30px; display: flex; justify-content: space-around; padding: 12px; z-index: 9999; }
        .nav-item { color: #52525b; text-decoration: none; font-size: 22px; text-align: center; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <header class="header-elite">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="profile-container">
                <div class="profile-hex"><img id="uAvatar" src=""></div>
            </div>
            <div class="user-info">
                <span id="rankTitle" class="rank-tag">BRONZE TRAINEE</span>
                <h2 id="uName">User</h2>
                <div id="globalRankBadge" class="global-badge">#-- Global</div>
            </div>
        </div>
        <div style="text-align: right;">
            <p style="font-size: 8px; opacity: 0.5; font-weight: 800;">STREAK</p>
            <h3 style="color: #ff6400; font-family: 'Syncopate'; font-size: 18px;">🔥 <span id="streakDays">0</span></h3>
        </div>
    </header>

    <div class="xp-master-card">
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div><p style="font-size: 9px; font-weight: 800; color: var(--accent);">LEVEL 01</p><h3 style="font-size: 20px; font-weight: 800;">TOTAL XP</h3></div>
            <div style="text-align: right;"><h3 id="xpVal" style="font-family: 'Syncopate'; font-size: 18px;">0</h3><p style="font-size: 8px; opacity: 0.4;">Current Progress</p></div>
        </div>
        <div class="progress-container"><div class="progress-bar" id="xpBar"></div></div>
    </div>

    <div class="marquee-box"><div class="marquee-content" id="marqueeMsg">SYSTEM ONLINE // TERMINAL SYNC ACTIVE...</div></div>

    <div class="bento-grid">
        <div class="bento-box wide" style="display: flex; gap: 10px; align-items: center; padding: 12px 18px;">
            <input type="text" id="shoutInput" placeholder="Broadcast signal (50 XP)..." style="background:none; border:none; color:#fff; flex:1; outline:none; font-size:12px;">
            <button onclick="sendSignal()" style="background:var(--accent); color:#000; border:none; padding:8px 15px; border-radius:12px; font-weight:900; font-size:9px;">SEND</button>
        </div>

        <div class="bento-box" onclick="triggerAttack()"><i class="ri-sword-fill" style="color: var(--danger);"></i><h3>ATTACK</h3><p>Extract XP</p></div>
        <div class="bento-box" onclick="toggleShield()"><i id="shieldIcon" class="ri-shield-flash-fill"></i><h3>SHIELD</h3><p id="wallStatus">Inactive</p></div>

        <a href="tournament.html" class="bento-box wide" style="background: linear-gradient(90deg, rgba(99,102,241,0.2), transparent); border-left: 4px solid var(--primary);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div><span style="background: var(--danger); font-size: 7px; padding: 2px 6px; border-radius: 4px; font-weight: 900;">LIVE</span><h3 style="margin-top:5px;">TOURNAMENT</h3></div>
                <i class="ri-trophy-fill" style="font-size: 28px; color: var(--gold);"></i>
            </div>
        </a>

        <a href="flashcards.html" class="bento-box"><i class="ri-flashlight-fill" style="color: var(--gold);"></i><h3>FLASH</h3><p>Revision</p></a>
        <a href="daily-test.html" class="bento-box"><i class="ri-edit-box-line"></i><h3>EXAMS</h3><p>Daily Test</p></a>
    </div>

    <nav class="nav-dock">
        <a href="index.html" class="nav-item active"><i class="ri-home-5-fill"></i></a>
        <a href="exams.html" class="nav-item"><i class="ri-edit-line"></i></a>
        <a href="battle.html" class="nav-item"><i class="ri-sword-line"></i></a>
        <a href="profile.html" class="nav-item"><i class="ri-user-line"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, collection, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI", authDomain: "black-terminal-f2c91.firebaseapp.com", projectId: "black-terminal-f2c91", storageBucket: "black-terminal-f2c91.appspot.com", messagingSenderId: "552489994197", appId: "1:552489994197:web:7662331264c334ffbadf5c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const student = localStorage.getItem("studentName") || "Guest";

        // --- Core Logic ---
        function init() {
            onSnapshot(doc(db, "students", student), (snap) => {
                if(snap.exists()){
                    const d = snap.data(); const xp = d.xp || 0;
                    document.getElementById("uName").innerText = student;
                    document.getElementById("uAvatar").src = d.photo || `https://api.dicebear.com/7.x/avataaars/svg?seed=${student}`;
                    document.getElementById("xpVal").innerText = xp;
                    document.getElementById("streakDays").innerText = d.streak || 0;
                    document.getElementById("xpBar").style.width = (xp % 1000) / 10 + "%";

                    // Rank Logic
                    const rt = document.getElementById("rankTitle");
                    if(xp < 1000) { rt.innerText = "BRONZE TRAINEE"; rt.style.color = "#cd7f32"; }
                    else if(xp < 3000) { rt.innerText = "SILVER ELITE"; rt.style.color = "#c0c0c0"; }
                    else { rt.innerText = "GOLD MASTER"; rt.style.color = "#ffb800"; }

                    // Shield Status
                    document.getElementById("wallStatus").innerText = (d.focusWall || 0) > 0 ? d.focusWall + " Layers Active" : "Inactive";
                    document.getElementById("shieldIcon").style.color = (d.focusWall || 0) > 0 ? "var(--success)" : "#52525b";
                }
            });

            // Global Rank
            onSnapshot(collection(db, "students"), (snap) => {
                let all = []; snap.forEach(s => all.push({id: s.id, xp: s.data().xp || 0}));
                all.sort((a,b) => b.xp - a.xp);
                const r = all.findIndex(x => x.id === student) + 1;
                document.getElementById("globalRankBadge").innerText = "#" + (r > 0 ? r : "--") + " Global";
            });
        }

        // --- Actions ---
        window.triggerAttack = async () => {
            alert("Scanning for targets..."); 
            // Add your Attack logic / redirect here
        };

        window.toggleShield = async () => {
            const uRef = doc(db, "students", student);
            const snap = await getDoc(uRef);
            if(snap.data().xp >= 200) {
                await updateDoc(uRef, { xp: increment(-200), focusWall: increment(1) });
                alert("Shield Layer Activated!");
            } else alert("Need 200 XP!");
        };

        window.sendSignal = async () => {
            const val = document.getElementById("shoutInput").value;
            if(!val) return;
            const uRef = doc(db, "students", student);
            const snap = await getDoc(uRef);
            if(snap.data().xp >= 50) {
                await setDoc(doc(db, "interactions", "shoutout"), { user: student, text: val, time: Date.now() });
                await updateDoc(uRef, { xp: increment(-50) });
                document.getElementById("shoutInput").value = "";
            } else alert("Need 50 XP!");
        };

        init();
    </script>
</body>
</html>
