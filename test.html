<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Elite</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #00f2ff; --bg: #020617;
            --glass: rgba(15, 23, 42, 0.7); 
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        /* Full Screen Background Fix */
        body { 
            background: var(--bg); color: #f8fafc; 
            margin: 0; padding-bottom: 120px;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b, transparent);
            min-height: 100vh;
        }

        /* --- Loading Overlay --- */
        #main-loader {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 99999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.5s;
        }
        .loader-ring {
            width: 60px; height: 60px; border: 4px solid var(--glass-border);
            border-top: 4px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; box-shadow: var(--neon);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Header & Layout Refinement --- */
        .premium-header { padding: 40px 20px 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .avatar-container {
            position: relative; padding: 4px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border-radius: 20px; box-shadow: var(--neon);
        }
        .avatar-box { width: 55px; height: 55px; border-radius: 17px; overflow: hidden; background: var(--bg); }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        /* --- New: Glass XP Card --- */
        .xp-card {
            margin: 0 20px 20px; padding: 20px; border-radius: 30px;
            background: var(--glass); border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .progress-track { height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* --- Navigation --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px);
            border-radius: 25px; padding: 15px; display: flex; justify-content: space-around;
            border: 1px solid var(--glass-border); z-index: 10000;
        }
        .nav-link { color: #64748b; text-decoration: none; font-size: 24px; transition: 0.3s; }
        .nav-link.active { color: var(--accent); transform: translateY(-5px); filter: drop-shadow(0 0 8px var(--accent)); }
    </style>
</head>
<body>

    <div id="main-loader">
        <div class="loader-ring"></div>
        <p style="margin-top: 20px; font-family: 'Orbitron'; font-size: 10px; letter-spacing: 2px; color: var(--accent);">INITIALIZING TERMINAL...</p>
    </div>

    <header class="premium-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="avatar-container">
                <div class="avatar-box"><img id="uAvatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=user"></div>
            </div>
            <div>
                <div id="rankBadge" class="badge-gold" style="font-size: 8px; padding: 2px 8px; border-radius: 5px; font-weight: 900; text-transform: uppercase;">Elite Player</div>
                <h2 id="uName" style="font-size: 20px; font-weight: 800; margin-top: 2px;">Syncing...</h2>
            </div>
        </div>
        <div id="sCount" style="background: rgba(255,100,0,0.1); color: #ff6400; padding: 10px 15px; border-radius: 20px; font-weight: 800; border: 1px solid rgba(255,100,0,0.2);">🔥 0</div>
    </header>

    <nav class="bottom-nav">
        <a href="#" class="nav-link active"><i class="ri-home-5-fill"></i></a>
        <a href="#" class="nav-link"><i class="ri-rocket-fill"></i></a>
        <a href="#" class="nav-link"><i class="ri-sword-fill"></i></a>
        <a href="#" class="nav-link"><i class="ri-user-6-fill"></i></a>
    </nav>

    <script>
        // Loader hatane ke liye function
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('main-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('main-loader').style.display = 'none', 500);
            }, 1500); // 1.5 seconds wait karega
        });
    </script>
</body>
</html>
