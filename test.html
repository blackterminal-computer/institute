<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Ultra Elite</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #00f2ff; --bg: #020617;
            --glass: rgba(15, 23, 42, 0.6); --glass-border: rgba(255, 255, 255, 0.08);
            --gold: #facc15; --success: #10b981; --danger: #f43f5e;
            --neon: 0 0 20px rgba(0, 242, 255, 0.3);
            --panel-bg: #0b0f1a;
        }

        /* --- Global Reset & Luxury Scroll --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; }
        
        body { 
            background: var(--bg); color: #f1f5f9; 
            padding-bottom: 120px; overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.1) 0%, transparent 40%);
        }

        /* --- 1. Top Header: Cyber Avatar Style --- */
        .premium-header { padding: 35px 20px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(10px); }
        .avatar-glow {
            position: relative; padding: 3px; border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            box-shadow: var(--neon);
        }
        .avatar-box { width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--bg); overflow: hidden; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* --- 2. Interactive Components --- */
        #shoutoutBubble {
            position: fixed; top: 90px; left: 20px; right: 20px; z-index: 11000;
            background: rgba(15, 23, 42, 0.9); border: 1px solid var(--glass-border);
            border-left: 4px solid var(--accent); border-radius: 16px;
            padding: 12px; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(20px);
            transform: translateY(-200%); transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #shoutoutBubble.active { transform: translateY(0); }

        /* --- 3. XP & Progression: The "Power Card" --- */
        .xp-card { 
            margin: 15px 20px; padding: 22px; border-radius: 28px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border: 1px solid var(--glass-border); position: relative; overflow: hidden;
        }
        .xp-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%); z-index: 0; }
        
        .progress-track { height: 10px; background: rgba(0,0,0,0.3); border-radius: 20px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); box-shadow: 0 0 15px var(--accent); border-radius: 20px; width: 0%; transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); }

        /* --- 4. Grid System: Neumorphic Glass --- */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .card { 
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 24px 18px; border-radius: 24px; text-decoration: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .card:active { transform: scale(0.92); background: rgba(255,255,255,0.08); }
        .card i { font-size: 32px; margin-bottom: 12px; background: linear-gradient(var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- 5. Tournament: Animated Border --- */
        .tournament-wrapper { 
            grid-column: span 2; position: relative; padding: 2px; border-radius: 26px;
            background: linear-gradient(90deg, #ff0055, #00f2ff, #ff0055);
            background-size: 200% auto; animation: gradientMove 3s linear infinite;
        }
        @keyframes gradientMove { to { background-position: 200% center; } }
        .tournament-card { background: #0b0f1a; border-radius: 24px; padding: 22px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white; }

        /* --- 6. Navigation: Floating Island --- */
        .bottom-nav { 
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(25px);
            border-radius: 30px; display: flex; justify-content: space-around;
            padding: 18px 10px; border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); z-index: 10000;
        }
        .nav-link { color: #64748b; text-decoration: none; transition: 0.3s; position: relative; }
        .nav-link.active { color: var(--accent); }
        .nav-link.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
        .nav-link i { font-size: 26px; }

        /* --- Attendance & Animations --- */
        .float-att { position: fixed !important; bottom: 120px; right: 20px; z-index: 9999; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .pulse { animation: neonPulse 2s infinite; background: var(--accent); color: #000; }
        @keyframes neonPulse { 0% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 242, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); } }
    </style>
</head>
<body>

    <div id="shoutoutBubble">
        <img src="" id="bAvatar" style="width: 42px; height: 42px; border-radius: 12px; border: 1px solid var(--accent);">
        <div style="flex: 1;">
            <div id="bUser" style="font-size: 10px; font-weight: 900; color: var(--accent); letter-spacing: 1px; text-transform: uppercase;">System</div>
            <p id="bMsg" style="font-size: 13px; font-weight: 600; color: #fff; margin-top: 2px;">Establishing connection...</p>
        </div>
    </div>

    <a href="attendence.html" id="att-pill" class="float-att pulse">
        <div style="display: flex; align-items: center; gap: 8px;">
            <i class="ri-fingerprint-fill" style="font-size: 18px;"></i>
            <span id="att-pill-text">Check-In</span>
        </div>
    </a>

    <header class="premium-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="avatar-glow">
                <div class="avatar-box"><img id="uAvatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=user"></div>
            </div>
            <div>
                <div id="rankBadge" class="badge-bronze" style="font-size: 9px; font-weight: 900; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); width: fit-content; margin-bottom: 4px;">Syncing...</div>
                <h2 id="uName" style="font-size: 18px; font-weight: 900; letter-spacing: -0.5px;">Student_Name</h2>
            </div>
        </div>
        <div id="sCount" style="background: rgba(255, 100, 0, 0.1); border: 1px solid rgba(255, 100, 0, 0.3); color: #ff6400; padding: 8px 16px; border-radius: 20px; font-weight: 900; font-size: 12px;">🔥 0</div>
    </header>

    <div style="padding: 10px 0; border-bottom: 1px solid var(--glass-border); overflow: hidden; white-space: nowrap;">
        <div id="marqueeMsg" style="display: inline-block; padding-left: 100%; font-size: 11px; font-weight: 700; color: var(--accent); animation: scroll 15s linear infinite;">Terminal Online - Systems Optimal</div>
    </div>

    <div class="xp-card">
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <span id="uLevelBadge" style="background: var(--primary); color: white; font-size: 9px; padding: 3px 10px; border-radius: 6px; font-weight: 900; text-transform: uppercase;">Level 1</span>
                <h3 id="uNameXP" style="font-size: 20px; font-weight: 900; margin-top: 8px;">User</h3>
            </div>
            <div style="text-align: right;">
                <p style="font-size: 10px; opacity: 0.5; font-weight: 800;">TOTAL POWER</p>
                <h2 id="xpVal" style="font-size: 24px; color: var(--accent); font-family: 'Orbitron'; font-weight: 900;">0 XP</h2>
            </div>
        </div>
        <div class="progress-track"><div class="progress-fill" id="xpBar"></div></div>
        <p id="xpTip" style="font-size: 10px; margin-top: 12px; font-weight: 700; color: #64748b;"><i class="ri-flashlight-fill" style="color:var(--gold)"></i> Loading milestone...</p>
    </div>

    <div class="grid">
        <div class="tournament-wrapper">
            <a href="tournament.html" class="tournament-card">
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div style="font-size: 32px;">🏆</div>
                    <div>
                        <span style="background:#ef4444; font-size:8px; padding:2px 8px; border-radius:6px; font-weight:900;">ACTIVE NOW</span>
                        <h3 style="font-size: 18px; font-weight: 900; margin-top: 2px;">Global Tournament</h3>
                    </div>
                </div>
                <i class="ri-arrow-right-s-line" style="font-size: 24px; opacity: 0.5;"></i>
            </a>
        </div>

        <a href="daily-test.html" class="card"><i class="ri-terminal-window-fill"></i><h3>Exams</h3><p style="font-size: 9px; opacity: 0.5;">Daily Challenges</p></a>
        <a href="battle.html" class="card"><i class="ri-sword-fill" style="color:var(--danger)"></i><h3>Battle</h3><p style="font-size: 9px; opacity: 0.5;">PvP Combat</p></a>
        <a href="leaderboard.html" class="card"><i class="ri-bar-chart-2-fill" style="color:var(--gold)"></i><h3>Ranks</h3><p style="font-size: 9px; opacity: 0.5;">Global Elite</p></a>
        <a href="courses.html" class="card"><i class="ri-code-s-slash-line"></i><h3>Courses</h3><p style="font-size: 9px; opacity: 0.5;">Tech Library</p></a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link active"><i class="ri-home-heart-fill"></i></a>
        <a href="daily-test.html" class="nav-link"><i class="ri-book-3-fill"></i></a>
        <a href="battle.html" class="nav-link"><i class="ri-sword-fill"></i></a>
        <a href="chat.html" class="nav-link"><i class="ri-message-3-fill"></i></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-settings-fill"></i></a>
    </nav>

</body>
</html>
