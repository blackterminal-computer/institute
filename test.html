<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Elite Dashboard Final</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --gold: #facc15; --success: #22c55e; --danger: #ef4444;
            --neon-glow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #f8fafc; padding-bottom: 110px; overflow-x: hidden; background-image: radial-gradient(circle at top right, #1e1b4b, transparent); }

        /* --- MARQUEE SYSTEM --- */
        .marquee-container { background: rgba(99, 102, 241, 0.05); padding: 10px 0; overflow: hidden; border-bottom: 1px solid var(--glass-border); margin-bottom: 10px; }
        #marqueeMsg { font-size: 11px; font-weight: 800; color: var(--accent); white-space: nowrap; display: inline-block; padding-left: 100%; animation: scroll 15s linear infinite; text-transform: uppercase; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* --- BUTTERY SMOOTH SLIDER --- */
        .slider-section { width: 100%; margin: 10px 0 15px 0; overflow: hidden; display: none; }
        .carousel-track { display: flex; transition: transform 0.7s cubic-bezier(0.65, 0, 0.35, 1); will-change: transform; width: 100%; }
        .banner-card { min-width: 100%; padding: 0 20px; box-sizing: border-box; text-decoration: none; display: block; }
        .banner-inner { position: relative; border-radius: 24px; overflow: hidden; border: 1px solid var(--glass-border); background: #0f172a; aspect-ratio: 16 / 8; }
        .slide-img { width: 100%; height: 100%; object-fit: cover; }
        .banner-text-bar { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(15, 23, 42, 0.9)); padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; }

        /* --- UI COMPONENTS (Attendance, XP, Bento) --- */
        .float-att { position: fixed; top: 100px; right: 15px; z-index: 9999; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); padding: 8px 14px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: white; display: flex; align-items: center; gap: 6px; }
        .xp-card { margin: 10px 20px; background: var(--glass); border: 1px solid var(--glass-border); padding: 18px; border-radius: 24px; }
        .progress-track { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: 1s ease-out; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 20px; }
        .card { background: var(--glass); border: 1px solid var(--glass-border); padding: 22px; border-radius: 24px; text-decoration: none; color: white; }
        .bottom-nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); border-radius: 22px; display: flex; justify-content: space-around; padding: 12px; border: 1px solid var(--glass-border); z-index: 10000; }
        
        .shimmer { background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .pulse { animation: soft-pulse 2s infinite; }
        @keyframes soft-pulse { 0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); } }
    </style>
</head>
<body>

    <a href="attendence.html" id="att-pill" class="float-att pulse"><i class="ri-fingerprint-fill"></i><span>Attendance</span></a>

    <header style="padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); overflow: hidden;"><img id="uAvatar" src="" style="width:100%; height:100%; object-fit:cover;"></div>
            <div>
                <p id="greetText" style="font-size: 10px; opacity: 0.5; font-weight: 800;">SYNCING...</p>
                <h2 id="uName" style="font-size: 18px; font-weight: 800;">Student</h2>
            </div>
        </div>
        <div id="sCount" style="background:rgba(255,100,0,0.1); color:#ff6400; padding:8px 15px; border-radius:15px; font-weight:800; font-size:12px;">🔥 0 Days</div>
    </header>

    <div class="marquee-container">
        <div id="marqueeMsg">INITIALIZING SECURE TERMINAL LINK...</div>
    </div>

    <div class="slider-section" id="sliderRoot">
        <div class="carousel-container"><div class="carousel-track" id="sliderTrack"></div></div>
    </div>

    <div class="xp-card">
        <div style="display:flex; justify-content:space-between;">
            <span id="uLevelBadge" style="background:var(--primary); font-size:9px; padding:2px 8px; border-radius:4px; font-weight:900;">Level 1</span>
            <span id="xpVal" style="color:var(--accent); font-weight:800;">0 XP</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="xpBar"></div></div>
    </div>

    <div class="grid">
        <a href="tournament.html" class="card" style="grid-column: span 2; background: linear-gradient(90deg, #6366f1, #06b6d4); display: flex; justify-content: space-between; align-items: center;">
            <h3 style="font-size: 18px;">TOURNAMENT</h3><i class="ri-trophy-fill" style="font-size: 30px; color: var(--gold);"></i>
        </a>
        <a href="battle.html" class="card"><i class="ri-sword-line" style="color:var(--danger)"></i><h3>Battle</h3><p>PvP 1vs1</p></a>
        <a href="leaderboard.html" class="card"><i class="ri-bar-chart-fill" style="color:var(--accent)"></i><h3>Ranks</h3><p>Global Top</p></a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" style="color:var(--accent); text-align:center; text-decoration:none;"><i class="ri-home-5-fill" style="font-size:22px; display:block;"></i><span style="font-size:10px;">Home</span></a>
        <a href="chat.html" style="color:#64748b; text-align:center; text-decoration:none;"><i class="ri-chat-3-line" style="font-size:22px; display:block;"></i><span style="font-size:10px;">Chat</span></a>
        <a href="profile.html" style="color:#64748b; text-align:center; text-decoration:none;"><i class="ri-user-line" style="font-size:22px; display:block;"></i><span style="font-size:10px;">Profile</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI", authDomain: "black-terminal-f2c91.firebaseapp.com", projectId: "black-terminal-f2c91", storageBucket: "black-terminal-f2c91.appspot.com", messagingSenderId: "552489994197", appId: "1:552489994197:web:7662331264c334ffbadf5c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const student = localStorage.getItem("studentName");

        // 1. ADMIN MARQUEE (settings/marquee -> msg)
        onSnapshot(doc(db, "settings", "marquee"), (snap) => {
            if(snap.exists()) document.getElementById("marqueeMsg").innerText = snap.data().msg || "TERMINAL ACTIVE";
        });

        // 2. ULTRA SLIDER (settings/slider -> images, titles, links)
        let currentSlide = 0;
        let total = 0;
        onSnapshot(doc(db, "settings", "slider"), (snap) => {
            if(snap.exists()){
                const d = snap.data();
                const urls = d.images ? d.images.split(",") : [];
                const track = document.getElementById("sliderTrack");
                track.innerHTML = ""; total = urls.length;
                if(total > 0) {
                    document.getElementById("sliderRoot").style.display = "block";
                    urls.forEach(url => {
                        track.innerHTML += `<div class="banner-card"><div class="banner-inner shimmer"><img src="${url.trim()}" class="slide-img" onload="this.parentElement.classList.remove('shimmer')"></div></div>`;
                    });
                }
            }
        });

        setInterval(() => {
            if(total > 1) {
                currentSlide = (currentSlide + 1) % total;
                document.getElementById("sliderTrack").style.transform = `translateX(-${currentSlide * 100}%)`;
            }
        }, 4000);

        // 3. USER REALTIME STATS
        onSnapshot(doc(db, "students", student), (snap) => {
            if(snap.exists()){
                const d = snap.data();
                document.getElementById("uName").innerText = student;
                document.getElementById("uAvatar").src = d.photo || `https://api.dicebear.com/7.x/avataaars/svg?seed=${student}`;
                document.getElementById("xpVal").innerText = (d.xp || 0) + " XP";
                document.getElementById("xpBar").style.width = ((d.xp % 1000) / 10) + "%";
                document.getElementById("uLevelBadge").innerText = "Level " + (Math.floor((d.xp||0)/1000)+1);
                document.getElementById("sCount").innerText = "🔥 " + (d.streak || 0) + " Days";
            }
        });
    </script>
</body>
</html>
