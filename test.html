<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TERMINAL v5 | Hyper Elite Ultimate</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--primary:#6366f1;
--accent:#00f2ff;
--bg:#05070a;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.1);
--gold:#ffb800;
--success:#00ffa3;
--danger:#ff2d55;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent;}
body{
background:var(--bg);
color:#fff;
padding-bottom:120px;
overflow-x:hidden;
background-image:
radial-gradient(circle at 10% 10%, rgba(99,102,241,0.15), transparent 40%),
radial-gradient(circle at 90% 90%, rgba(0,242,255,0.1), transparent 40%);
}

/* HEADER */
.header{
padding:30px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.user-meta{display:flex;align-items:center;gap:15px;}
.avatar{
width:60px;height:60px;border-radius:20px;
padding:3px;
background:linear-gradient(45deg,var(--primary),var(--accent));
}
.avatar img{
width:100%;height:100%;border-radius:17px;
border:3px solid var(--bg);
object-fit:cover;
}

.rank-pill{
font-size:9px;font-weight:800;
padding:4px 10px;border-radius:100px;
border:1px solid var(--accent);
color:var(--accent);
}

#streak{
font-family:'Syncopate';
color:#ff6400;
}

/* MARQUEE */
.marquee{
margin:0 20px 15px;
background:var(--glass);
padding:8px 15px;
border-radius:100px;
border:1px solid var(--border);
overflow:hidden;
}
.marquee span{
display:inline-block;
white-space:nowrap;
animation:scroll 15s linear infinite;
font-size:10px;font-weight:800;color:var(--accent);
}
@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* XP CARD */
.xp-card{
margin:0 20px 20px;
padding:20px;
border-radius:30px;
background:var(--glass);
border:1px solid var(--border);
}
.progress{
height:10px;border-radius:100px;
background:rgba(255,255,255,0.05);
margin-top:15px;overflow:hidden;
}
.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--primary),var(--accent));
transition:1s;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:0 20px;
}
.card{
background:var(--glass);
border:1px solid var(--border);
padding:20px;
border-radius:25px;
text-align:left;
transition:.3s;
}
.card:active{transform:scale(.95)}
.card i{font-size:26px;color:var(--accent);}
.card h3{margin-top:10px;font-size:14px}
.card p{font-size:10px;opacity:.5}

/* NAV */
.nav{
position:fixed;
bottom:20px;
left:15px;right:15px;
background:rgba(10,15,25,0.9);
border-radius:30px;
display:flex;
justify-content:space-around;
padding:12px;
border:1px solid var(--border);
}
.nav a{color:#555;text-decoration:none;font-size:22px}
.nav a.active{color:var(--accent)}

/* SHOUT BUBBLE */
#bubble{
position:fixed;
top:20px;
left:15px;right:15px;
background:rgba(0,0,0,0.9);
border:1px solid var(--accent);
padding:15px;
border-radius:20px;
display:none;
z-index:9999;
}
#bubble.active{display:flex;gap:10px;align-items:center}

/* DAILY WORD */
#dailyWordBox{
margin:20px;
padding:20px;
border-radius:20px;
background:rgba(0,242,255,0.05);
border:1px solid var(--accent);
display:none;
}

</style>
</head>
<body>

<div id="bubble">
<img id="bAvatar" width="40" height="40" style="border-radius:12px">
<div>
<div id="bUser" style="font-size:10px;font-weight:800;color:var(--accent)"></div>
<div id="bMsg" style="font-size:13px;font-weight:600"></div>
</div>
</div>

<header class="header">
<div class="user-meta">
<div class="avatar"><img id="uAvatar"></div>
<div>
<div id="rankBadge" class="rank-pill">SYNCING...</div>
<h2 id="uName">User</h2>
</div>
</div>
<div id="streak">🔥 0</div>
</header>

<div class="marquee"><span id="marqueeText">SYSTEM ONLINE...</span></div>

<div id="dailyWordBox">
<h3 id="wordTitle" style="font-family:'Syncopate';font-size:14px;color:var(--accent)"></h3>
<p id="wordDesc" style="margin-top:10px;font-size:13px;opacity:.8"></p>
</div>

<div class="xp-card">
<div style="display:flex;justify-content:space-between">
<div>
<p id="levelBadge" style="font-size:10px;color:var(--accent)">LEVEL 1</p>
<h3 id="xpName">User</h3>
</div>
<div id="xpValue" style="font-family:'Syncopate'">0</div>
</div>
<div class="progress"><div class="progress-bar" id="xpBar"></div></div>
</div>

<div class="grid">
<div class="card" onclick="triggerRaid()">
<i class="ri-sword-fill" style="color:var(--danger)"></i>
<h3>Raid</h3>
<p>Steal XP</p>
</div>

<div class="card" onclick="buyShield()">
<i class="ri-shield-flash-fill" style="color:var(--success)" id="shieldIcon"></i>
<h3>Shield</h3>
<p id="shieldStatus">Inactive</p>
</div>

<div class="card" onclick="sendSignal()">
<i class="ri-message-3-line"></i>
<h3>Broadcast</h3>
<p>Costs 50 XP</p>
</div>

<div class="card" onclick="window.location='leaderboard.html'">
<i class="ri-medal-fill" style="color:var(--gold)"></i>
<h3>Ranks</h3>
<p id="globalRank">#--</p>
</div>
</div>

<nav class="nav">
<a href="index.html" class="active"><i class="ri-home-5-fill"></i></a>
<a href="battle.html"><i class="ri-sword-line"></i></a>
<a href="chat.html"><i class="ri-message-3-line"></i></a>
<a href="profile.html"><i class="ri-user-line"></i></a>
</nav>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, onSnapshot, collection, getDocs, setDoc, addDoc, query, orderBy, limit, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
authDomain:"black-terminal-f2c91.firebaseapp.com",
projectId:"black-terminal-f2c91",
storageBucket:"black-terminal-f2c91.appspot.com",
messagingSenderId:"552489994197",
appId:"1:552489994197:web:7662331264c334ffbadf5c"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const student=localStorage.getItem("studentName");
if(!student) window.location="login.html";

/* USER SYNC */
onSnapshot(doc(db,"students",student),snap=>{
if(!snap.exists())return;
const d=snap.data();
document.getElementById("uName").innerText=student;
document.getElementById("xpName").innerText=student;
document.getElementById("uAvatar").src=d.photo||`https://api.dicebear.com/7.x/avataaars/svg?seed=${student}`;
document.getElementById("xpValue").innerText=d.xp||0;
document.getElementById("xpBar").style.width=((d.xp%1000)/10)+"%";
document.getElementById("levelBadge").innerText="LEVEL "+(Math.floor(d.xp/1000)+1);
document.getElementById("streak").innerText="🔥 "+(d.streak||0);
document.getElementById("shieldStatus").innerText=d.focusWall>0?d.focusWall+" Active":"Inactive";

if(d.xp>=5000){
document.getElementById("rankBadge").innerText="ULTRA ELITE";
document.getElementById("rankBadge").style.color="var(--gold)";
}else{
document.getElementById("rankBadge").innerText="NEURAL TRAINEE";
}
});

/* RAID */
window.triggerRaid=async()=>{
const ref=doc(db,"students",student);
const snap=await getDoc(ref);
if((snap.data().xp||0)<50)return alert("Need 50 XP");
await updateDoc(ref,{xp:increment(-50)});
alert("Raid Attempted");
};

/* SHIELD */
window.buyShield=async()=>{
const ref=doc(db,"students",student);
const snap=await getDoc(ref);
if((snap.data().xp||0)<150)return alert("Need 150 XP");
await updateDoc(ref,{xp:increment(-150),focusWall:increment(1)});
alert("Shield Activated");
};

/* SIGNAL */
window.sendSignal=async()=>{
const msg=prompt("Enter message");
if(!msg)return;
await setDoc(doc(db,"interactions","shoutout"),{
user:student,text:msg,
avatar:`https://api.dicebear.com/7.x/bottts/svg?seed=${student}`,
time:Date.now()
});
};

/* SHOUT LISTENER */
onSnapshot(doc(db,"interactions","shoutout"),snap=>{
if(!snap.exists())return;
const d=snap.data();
const b=document.getElementById("bubble");
document.getElementById("bUser").innerText=d.user;
document.getElementById("bMsg").innerText=d.text;
document.getElementById("bAvatar").src=d.avatar;
b.classList.add("active");
setTimeout(()=>b.classList.remove("active"),5000);
});

/* DAILY WORD */
onSnapshot(doc(db,"content","dailyWord"),snap=>{
if(!snap.exists())return;
const d=snap.data();
document.getElementById("dailyWordBox").style.display="block";
document.getElementById("wordTitle").innerText=d.word;
document.getElementById("wordDesc").innerText=d.description;
});

/* GLOBAL RANK */
(async()=>{
const snap=await getDocs(collection(db,"students"));
let arr=[];
snap.forEach(s=>arr.push({id:s.id,xp:s.data().xp||0}));
arr.sort((a,b)=>b.xp-a.xp);
const r=arr.findIndex(s=>s.id===student)+1;
if(r>0) document.getElementById("globalRank").innerText="#"+r;
})();

</script>
</body>
</html>
