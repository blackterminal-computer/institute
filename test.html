<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Elite v2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #06b6d4; --bg: #020617; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08); --gold: #facc15; --success: #22c55e; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #f8fafc; padding-bottom: 120px; overflow-x: hidden; }

        /* UI Components */
        .card { background: var(--glass); border: 1px solid var(--glass-border); padding: 20px; border-radius: 24px; backdrop-filter: blur(20px); transition: 0.3s; }
        .card:active { transform: scale(0.97); border-color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 0 20px; }
        
        /* HUD & Vitals */
        .tactical-bar { display: flex; justify-content: space-around; padding: 15px; background: rgba(255,255,255,0.02); margin: 0 20px 20px; border-radius: 16px; border: 1px solid var(--glass-border); }
        .stat-item { text-align: center; }
        .stat-val { font-family: 'Orbitron'; font-size: 14px; color: white; display: block; }
        .stat-label { font-size: 8px; opacity: 0.4; text-transform: uppercase; }

        /* Attendance Pill */
        #att-pill { position: fixed; bottom: 100px; right: 20px; z-index: 999; background: var(--accent); color: #000; padding: 12px 20px; border-radius: 50px; font-weight: 800; font-size: 12px; text-decoration: none; box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); }
        .att-done { background: var(--success) !important; color: white !important; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border-radius: 22px; display: flex; justify-content: space-around; padding: 15px; border: 1px solid var(--glass-border); z-index: 10000; }
        .nav-link { color: #64748b; text-decoration: none; text-align: center; font-size: 10px; font-weight: 700; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <header style="padding: 30px 20px;">
        <div style="display:flex; align-items:center; gap:15px;">
            <div style="width:50px; height:50px; border-radius:50%; border:2px solid var(--accent); overflow:hidden;"><img id="uAvatar" src="" style="width:100%; height:100%; object-fit:cover;"></div>
            <div>
                <h2 id="uName" style="font-weight: 800;">Student</h2>
                <p id="greetText" style="font-size: 10px; opacity: 0.5;">Syncing Terminal...</p>
            </div>
        </div>
    </header>

    <div class="tactical-bar">
        <div class="stat-item"><span class="stat-val" id="stat-online">--</span><span class="stat-label">Active</span></div>
        <div class="stat-item"><span class="stat-val" id="stat-battles">--</span><span class="stat-label">Battles</span></div>
        <div class="stat-item"><span class="stat-val" id="stat-xp">99%</span><span class="stat-label">Sync</span></div>
    </div>

    <div class="card" style="margin: 0 20px 20px; border-left: 4px solid var(--gold);">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h4 style="font-size: 10px; color: var(--gold); text-transform: uppercase;">Neural-Link Task</h4>
                <p style="font-size: 13px; font-weight: 700; margin-top: 2px;">Complete Daily Review</p>
            </div>
            <button onclick="this.innerText='CLAIMED'; this.style.opacity='0.5';" style="background:transparent; border:1px solid var(--gold); color:var(--gold); padding:5px 12px; border-radius:8px; font-size:10px; font-weight:800;">+150 XP</button>
        </div>
    </div>

    <div class="grid">
        <a href="tournament.html" class="card" style="grid-column: span 2; display:flex; justify-content:space-between; align-items:center;">
            <div><span style="font-size:8px; background:var(--danger); padding:2px 8px; border-radius:10px;">LIVE</span><h3 style="margin-top:5px;">Tournament</h3></div>
            <i class="ri-trophy-fill" style="font-size:24px; color:var(--gold);"></i>
        </a>
        <a href="daily-test.html" class="card"><i class="ri-edit-box-line" style="font-size:20px; color:var(--accent);"></i><h3>Exams</h3></a>
        <a href="battle.html" class="card"><i class="ri-sword-line" style="font-size:20px; color:var(--danger);"></i><h3>Battle</h3></a>
    </div>

    <a href="attendence.html" id="att-pill">Attendance</a>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link active"><i class="ri-home-5-fill"></i></a>
        <a href="daily-test.html" class="nav-link"><i class="ri-edit-line"></i></a>
        <a href="battle.html" class="nav-link"><i class="ri-sword-line"></i></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-line"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const app = initializeApp({ /* Your Config Here */ });
        const db = getFirestore(app);
        const student = localStorage.getItem("studentName") || "Guest";

        // Real-time Tactical HUD
        onSnapshot(collection(db, "students"), (snap) => {
            document.getElementById("stat-online").innerText = snap.size;
            document.getElementById("stat-battles").innerText = Math.floor(Math.random() * 50);
        });

        // UI Initialization
        document.getElementById("uName").innerText = student;
    </script>
</body>
</html>
