<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL v3 | FINAL</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #00f2ff; --bg: #05070a;
            --card-bg: rgba(15, 23, 42, 0.4); --glass: rgba(255, 255, 255, 0.03);
            --gold: #ffb800; --danger: #ff2d55; --success: #00ffa3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; padding-bottom: 120px; overflow-x: hidden; }

        /* --- MARQUEE BOX (ADMIN SYNC) --- */
        .marquee-box { 
            background: rgba(255,255,255,0.02); border-radius: 100px; 
            padding: 10px 20px; border: 1px solid var(--glass); 
            margin: 20px 20px 10px; overflow: hidden;
        }
        #marqueeMsg { font-size: 10px; font-weight: 800; color: var(--accent); white-space: nowrap; }

        /* --- ULTRA SMOOTH SLIDER --- */
        .slider-wrap { margin: 15px 20px; display: none; }
        .slider-inner { border-radius: 30px; overflow: hidden; border: 1px solid var(--glass); aspect-ratio: 16/9; position: relative; background: #000; }
        .slider-track { 
            display: flex; height: 100%; width: 100%;
            transition: transform 0.8s cubic-bezier(0.45, 0, 0.55, 1); /* Apple-like smoothness */
            will-change: transform;
        }
        .slide { min-width: 100%; height: 100%; flex-shrink: 0; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* --- STATS CARD --- */
        .xp-card { margin: 15px 20px; background: var(--card-bg); border-radius: 30px; padding: 20px; border: 1px solid var(--glass); }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: 1.5s cubic-bezier(0.17, 0.85, 0.32, 1.27); }

        /* --- BENTO GRID --- */
        .bento-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .bento-box { background: var(--card-bg); border-radius: 25px; padding: 20px; border: 1px solid var(--glass); text-decoration: none; color: #fff; }
        .wide { grid-column: span 2; }

        /* --- NAV DOCK --- */
        .nav-dock { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(10, 15, 25, 0.8); backdrop-filter: blur(20px); border-radius: 30px; display: flex; justify-content: space-around; padding: 15px; z-index: 1000; border: 1px solid var(--glass); }
        .nav-item { color: #52525b; font-size: 24px; transition: 0.3s; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div class="marquee-box">
        <marquee scrollamount="6" id="marqueeMsg">INITIALIZING NEURAL LINK...</marquee>
    </div>

    <div class="slider-wrap" id="sliderRoot">
        <div class="slider-inner">
            <div class="slider-track" id="sliderTrack"></div>
        </div>
    </div>

    <div class="xp-card">
        <div style="display: flex; justify-content: space-between;">
            <h3 id="uName" style="font-family: 'Syncopate'; font-size: 14px;">USER</h3>
            <span id="xpVal" style="color: var(--accent); font-weight: 800;">0 XP</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="xpBar"></div></div>
    </div>

    <div class="bento-grid">
        <a href="tournament.html" class="bento-box wide" style="background: linear-gradient(90deg, #6366f1, #00f2ff); padding: 2px;">
            <div style="background: var(--bg); border-radius: 23px; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
                <h3>TOURNAMENT</h3>
                <i class="ri-trophy-fill" style="color: var(--gold); font-size: 24px;"></i>
            </div>
        </a>
        <div class="bento-box" onclick="triggerRaid()"><h3>RAID</h3><p style="font-size: 10px; opacity: 0.5;">Loot XP</p></div>
        <div class="bento-box" onclick="buyShield()"><h3>SHIELD</h3><p id="shieldStatus" style="font-size: 10px; opacity: 0.5;">Offline</p></div>
    </div>

    <nav class="nav-dock">
        <a href="index.html" class="nav-item active"><i class="ri-home-fill"></i></a>
        <a href="battle.html" class="nav-item"><i class="ri-sword-line"></i></a>
        <a href="chat.html" class="nav-item"><i class="ri-message-3-line"></i></a>
        <a href="profile.html" class="nav-item"><i class="ri-user-line"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI", authDomain: "black-terminal-f2c91.firebaseapp.com", projectId: "black-terminal-f2c91", storageBucket: "black-terminal-f2c91.appspot.com", messagingSenderId: "552489994197", appId: "1:552489994197:web:7662331264c334ffbadf5c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const student = localStorage.getItem("studentName");

        // --- 1. ADMIN MARQUEE SYNC ---
        onSnapshot(doc(db, "content", "marquee"), (snap) => {
            if(snap.exists()) {
                document.getElementById("marqueeMsg").innerText = snap.data().text || "SYSTEM ONLINE";
            }
        });

        // --- 2. ULTRA SMOOTH SLIDER ---
        let currentSlide = 0;
        let totalSlides = 0;
        let sliderTimer;

        onSnapshot(doc(db, "settings", "slider"), (snap) => {
            if(snap.exists()){
                const urls = snap.data().images ? snap.data().images.split(",") : [];
                const track = document.getElementById("sliderTrack");
                track.innerHTML = "";
                totalSlides = urls.length;
                
                if(totalSlides > 0) {
                    document.getElementById("sliderRoot").style.display = "block";
                    urls.forEach(url => {
                        track.innerHTML += `<div class="slide"><img src="${url.trim()}"></div>`;
                    });
                    
                    if(sliderTimer) clearInterval(sliderTimer);
                    sliderTimer = setInterval(() => {
                        currentSlide = (currentSlide + 1) % totalSlides;
                        track.style.transform = `translateX(-${currentSlide * 100}%)`;
                    }, 4000);
                }
            }
        });

        // --- 3. USER DATA ---
        onSnapshot(doc(db, "students", student), (snap) => {
            if(snap.exists()){
                const d = snap.data();
                document.getElementById("uName").innerText = student;
                document.getElementById("xpVal").innerText = (d.xp || 0) + " XP";
                document.getElementById("xpBar").style.width = ((d.xp % 1000) / 10) + "%";
                document.getElementById("shieldStatus").innerText = (d.focusWall || 0) > 0 ? "ACTIVE" : "OFFLINE";
            }
        });
    </script>
</body>
</html>
