<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Black Terminal | Arena</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .arena-card { background: #0f172a; padding: 20px; border-radius: 20px; margin: 20px; border: 1px solid #1e293b; }
        #winnersRoot { display: none; margin: 20px; padding: 20px; background: rgba(250, 204, 21, 0.05); border: 1px solid #facc15; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="arena-card">
        <h3 id="arenaTitle">LOADING...</h3>
        <p id="arenaStatus">Syncing with server...</p>
        <button id="arenaBtn" onclick="location.href='weekly-exam.html'" style="display:none; background: #06b6d4; border:none; padding:12px 25px; border-radius:12px; color:white; font-weight:bold; cursor:pointer;">ENTER TOURNAMENT</button>
    </div>

    <div id="winnersRoot">
        <p style="color:#facc15; font-weight:bold;">🏆 LAST WEEK'S CHAMPIONS</p>
        <div id="winnerList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, updateDoc, collection, query, orderBy, limit, getDocs, increment, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const firebaseConfig = { /* APKA CONFIG YAHAN DAALEIN */ };
        const db = getFirestore(initializeApp(firebaseConfig));

        function checkArena() {
            const now = new Date();
            const h = now.getHours();
            const d = now.getDay();
            
            const btn = document.getElementById('arenaBtn');
            const title = document.getElementById('arenaTitle');
            const status = document.getElementById('arenaStatus');

            // Monday 8 PM to 9 PM Window
            if (d === 1 && h >= 20 && h < 21) {
                title.innerText = "TOURNAMENT IS LIVE!";
                status.innerText = "30 True/False Questions • Ends 9:00 PM";
                btn.style.display = "block";
            } 
            // 9 PM ke baad Auto-Winner Process
            else if (d === 1 && h >= 21) {
                title.innerText = "TOURNAMENT CLOSED";
                status.innerText = "Results Processing...";
                btn.style.display = "none";
                processResults();
            } else {
                title.innerText = "TOURNAMENT LOCKED";
                status.innerText = "Opens Monday @ 8:00 PM";
            }
        }

        async function processResults() {
            const q = query(collection(db, "students"), orderBy("lastWeeklyScore", "desc"), limit(10));
            const snap = await getDocs(q);
            let participants = snap.docs.map(d => ({ id: d.id, ...d.data() }));

            // Bot Filler: Minimum 10 entries required
            while(participants.length < 10) participants.push({ id: "Bot_"+Math.random(), lastWeeklyScore: 0 });

            participants.forEach(async (p, i) => {
                let xp = (i==0) ? 3000 : (i==1) ? 2000 : (i==2) ? 1000 : 100;
                if(!p.id.startsWith("Bot_")) {
                    await updateDoc(doc(db, "students", p.id), { xp: increment(xp), lastWeeklyScore: 0 });
                    await addDoc(collection(db, "messages"), { to: p.id, msg: `You won ${xp} XP in the Tournament!`, time: new Date() });
                }
            });
            document.getElementById('winnersRoot').style.display = "block";
        }

        setInterval(checkArena, 1000);
        checkArena();
    </script>
</body>
</html>
