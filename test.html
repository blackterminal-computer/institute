<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Elite Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@600&display=swap" rel="stylesheet">

    <style>
        /* UI Styles exactly as you provided */
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --gold: #facc15; --success: #22c55e; --danger: #ef4444;
            --neon-glow: 0 0 15px rgba(6, 182, 212, 0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #f8fafc; padding-bottom: 110px; overflow-x: hidden; background-image: radial-gradient(circle at top right, #1e1b4b, transparent); }
        
        /* [Keeping all your specific CSS classes like .shoutoutBubble, .slider-section, .xp-card etc.] */
        #shoutoutBubble { position: fixed; top: 20px; right: 20px; z-index: 11000; max-width: 260px; background: rgba(15, 23, 42, 0.95); border: 1.5px solid var(--accent); border-radius: 18px; padding: 10px; display: flex; align-items: center; gap: 10px; box-shadow: var(--neon-glow); backdrop-filter: blur(15px); transform: translateX(150%); transition: 0.5s; }
        #shoutoutBubble.active { transform: translateX(0); }
        .b-av { width: 35px; height: 35px; border-radius: 10px; border: 1px solid var(--accent); object-fit: cover; }
        #activityPanel { position: fixed; bottom: -100%; left: 0; right: 0; height: 75vh; background: #0b0f1a; border-top: 3px solid var(--accent); border-radius: 30px 30px 0 0; z-index: 20000; transition: 0.5s ease; padding: 25px 20px; overflow-y: auto; }
        #activityPanel.open { bottom: 0; }
        #overlay-blur { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 15000; backdrop-filter: blur(4px); }
        .log-card { display: flex; gap: 12px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 20px; margin-bottom: 12px; border: 1px solid var(--glass-border); }
        .log-user { font-size: 10px; font-weight: 900; color: var(--accent); }
        .log-msg { font-size: 13px; color: #cbd5e1; }
        .react-btn { background: rgba(6, 182, 212, 0.1); border: 1px solid rgba(6, 182, 212, 0.2); color: var(--accent); padding: 5px 12px; border-radius: 10px; font-size: 10px; font-weight: 800; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .slider-section { width: 100%; margin: 10px 0 15px 0; overflow: hidden; }
        .carousel-track { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; }
        .banner-card { min-width: 100%; padding: 0 20px; box-sizing: border-box; }
        .banner-inner { border-radius: 24px; overflow: hidden; position: relative; aspect-ratio: 16/8; border: 1px solid var(--glass-border); }
        .slide-img { width: 100%; height: 100%; object-fit: cover; }
        .dots-container { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); }
        .dot.active { background: var(--accent); width: 18px; border-radius: 10px; }
        /* ... Other CSS as provided ... */
        .marquee-container { background: rgba(99, 102, 241, 0.05); padding: 8px 0; overflow: hidden; white-space: nowrap; border-bottom: 1px solid var(--glass-border); margin-bottom: 10px; }
        .marquee-content { display: inline-block; padding-left: 100%; font-size: 10px; font-weight: 700; color: var(--accent); animation: scroll 15s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .xp-card { margin: 10px 20px; background: var(--glass); border: 1px solid var(--glass-border); padding: 18px; border-radius: 24px; }
        .progress-track { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: 1s; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 20px; }
        .card { background: var(--glass); border: 1px solid var(--glass-border); padding: 22px; border-radius: 24px; text-decoration: none; color: white; }
        .bottom-nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); border-radius: 22px; display: flex; justify-content: space-around; padding: 12px; border: 1px solid var(--glass-border); z-index: 10000; }
        .nav-link { color: #64748b; text-decoration: none; text-align: center; font-size: 10px; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="shoutoutBubble">
        <img src="" id="bAvatar" class="b-av">
        <div><span style="font-size:8px; color:var(--accent); font-weight:900;" id="bUser">SYSTEM</span><p style="font-size:11px; font-weight:600;" id="bMsg">Waiting...</p></div>
    </div>

    <div id="overlay-blur" onclick="togglePanel()"></div>
    <div id="activityPanel">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h3 style="font-family:'Orbitron'; font-size:14px; color:var(--accent);">SIGNAL ARCHIVE</h3>
            <i class="ri-close-line" onclick="togglePanel()" style="font-size:24px; color:var(--danger);"></i>
        </div>
        <div id="logList"></div>
    </div>

    <div class="shout-trigger" onclick="togglePanel()"><i class="ri-history-line"></i></div>

    <header class="premium-header">
        </header>

    <div class="marquee-container"><div class="marquee-content" id="marqueeMsg">Syncing...</div></div>

    <div id="wordDisplaySection" style="margin: 20px; display: none;">
        <p class="label-tag">DAILY_LEARNING_LOG</p>
        <div class="card" style="border-left: 4px solid var(--accent);">
            <h2 id="wordText" style="font-family:'Orbitron'; font-size:18px;"></h2>
            <p id="wordDesc" style="font-size:13px; opacity:0.8; margin-top:8px;"></p>
        </div>
    </div>

    <div class="xp-card" style="margin-bottom:15px; background:rgba(6,182,212,0.05);">
        <div style="display:flex; gap:10px;">
            <input type="text" id="shoutInput" placeholder="Broadcast signal (50 XP)" style="background:transparent; border:none; color:white; flex:1; outline:none; font-size:12px;">
            <button onclick="sendSignal()" style="background:var(--accent); border:none; padding:6px 15px; border-radius:8px; font-weight:900; font-size:10px;">SEND</button>
        </div>
    </div>

    <div class="slider-section" id="sliderRoot" style="display:none;">
        <p class="label-tag">Elite Spotlight</p>
        <div class="carousel-container"><div class="carousel-track" id="sliderTrack"></div></div>
        <div class="dots-container" id="sliderDots"></div>
    </div>

    <div class="xp-card">
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div><span id="uLevelBadge" style="background:var(--primary); font-size:9px; padding:2px 8px; border-radius:4px; font-weight:900;">LEVEL 1</span><h3 id="uNameXP">User</h3></div>
            <span id="xpVal" style="color:var(--accent); font-weight:800;">0 XP</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="xpBar"></div></div>
    </div>

    <div class="grid" style="margin: 15px 0;">
        <div class="card" onclick="triggerChallenge()" style="background:rgba(239,68,68,0.05);"><i class="ri-sword-fill" style="color:var(--danger)"></i><h4>RAID</h4><p>Steal XP</p></div>
        <div class="card" onclick="buyFocusWall()" style="background:rgba(34,197,94,0.05);"><i id="shieldIcon" class="ri-shield-flash-line"></i><h4 id="wallTitle">SHIELD</h4><p id="wallStatus">Inactive</p></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, collection, getDocs, setDoc, addDoc, query, orderBy, limit, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI", authDomain: "black-terminal-f2c91.firebaseapp.com", projectId: "black-terminal-f2c91", storageBucket: "black-terminal-f2c91.appspot.com", messagingSenderId: "552489994197", appId: "1:552489994197:web:7662331264c334ffbadf5c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const student = localStorage.getItem("studentName");

        // --- CORE FUNCTIONS ---
        window.togglePanel = () => {
            const panel = document.getElementById('activityPanel');
            panel.classList.toggle('open');
            document.getElementById('overlay-blur').style.display = panel.classList.contains('open') ? 'block' : 'none';
        };

        window.sendSignal = async () => {
            const msg = document.getElementById("shoutInput").value.trim();
            if(!msg || student === "Guest") return;
            const uRef = doc(db, "students", student);
            const snap = await getDoc(uRef);
            if(snap.exists() && snap.data().xp >= 50) {
                const data = { user: student, text: msg, avatar: snap.data().photo || "", time: Date.now(), likes: 0 };
                await setDoc(doc(db, "interactions", "shoutout"), data);
                await addDoc(collection(db, "shoutouts"), data);
                await updateDoc(uRef, { xp: increment(-50) });
                document.getElementById("shoutInput").value = "";
            } else { alert("Insufficient XP!"); }
        };

        window.sendReaction = async (id) => {
            await updateDoc(doc(db, "shoutouts", id), { likes: increment(1) });
        };

        window.triggerChallenge = async () => {
            const uRef = doc(db, "students", student);
            const snap = await getDoc(uRef);
            if(snap.data().xp < 50) return alert("RAID costs 50 XP!");
            const q = query(collection(db, "students"), orderBy("xp", "desc"), limit(10));
            const allS = await getDocs(q);
            let ts = []; allS.forEach(d => { if(d.id !== student) ts.push(d.id); });
            const target = ts[Math.floor(Math.random() * ts.length)];
            const tRef = doc(db, "students", target);
            const tSnap = await getDoc(tRef);
            if(tSnap.data().focusWall > 0) {
                await updateDoc(tRef, { focusWall: increment(-1) });
                await updateDoc(uRef, { xp: increment(-50) });
                await setDoc(doc(db, "interactions", "shoutout"), { user: "SYSTEM", text: `${target}'s Shield blocked ${student}'s RAID!`, avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Shield", time: Date.now() });
            } else {
                const stolen = Math.floor(Math.random() * 41) + 40;
                await updateDoc(uRef, { xp: increment(stolen - 50) });
                await updateDoc(tRef, { xp: increment(-stolen) });
                await setDoc(doc(db, "interactions", "shoutout"), { user: "RAID", text: `🔥 ${student} stole ${stolen} XP from ${target}!`, avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Raid", time: Date.now() });
            }
        };

        window.buyFocusWall = async () => {
            const uRef = doc(db, "students", student);
            const snap = await getDoc(uRef);
            if(snap.data().xp < 150) return alert("Shield costs 150 XP!");
            await updateDoc(uRef, { xp: increment(-150), focusWall: increment(1) });
            alert("SHIELD ACTIVATED!");
        };

        // --- REAL-TIME SYNC ---
        function initSync() {
            // Slider Logic
            onSnapshot(doc(db, "settings", "slider"), (snap) => {
                if(snap.exists()){
                    const track = document.getElementById("sliderTrack");
                    const dots = document.getElementById("sliderDots");
                    const urls = snap.data().images.split(',');
                    track.innerHTML = ""; dots.innerHTML = "";
                    urls.forEach((url, i) => {
                        track.innerHTML += `<div class="banner-card"><div class="banner-inner"><img src="${url.trim()}" class="slide-img"></div></div>`;
                        dots.innerHTML += `<div class="dot ${i===0?'active':''}"></div>`;
                    });
                    document.getElementById("sliderRoot").style.display = "block";
                }
            });

            // Signal Archive (Panel)
            onSnapshot(query(collection(db, "shoutouts"), orderBy("time", "desc"), limit(15)), (snap) => {
                const list = document.getElementById("logList");
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<div class="log-card">
                        <img src="${data.avatar}" class="b-av">
                        <div style="flex:1">
                            <span class="log-user">${data.user}</span>
                            <p class="log-msg">${data.text}</p>
                            <div class="react-btn" onclick="sendReaction('${d.id}')">🔥 ${data.likes || 0}</div>
                        </div>
                    </div>`;
                });
            });

            // Student Data
            onSnapshot(doc(db, "students", student), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    const xp = d.xp || 0;
                    document.getElementById("uNameXP").innerText = student;
                    document.getElementById("xpVal").innerText = xp + " XP";
                    document.getElementById("xpBar").style.width = (xp % 1000) / 10 + "%";
                    document.getElementById("uLevelBadge").innerText = "LEVEL " + (Math.floor(xp/1000)+1);
                    const walls = d.focusWall || 0;
                    document.getElementById("wallStatus").innerText = walls > 0 ? `${walls} Layers` : "Inactive";
                    document.getElementById("shieldIcon").style.color = walls > 0 ? "var(--success)" : "var(--accent)";
                }
            });

            // Shoutout Bubble
            let bTimer;
            onSnapshot(doc(db, "interactions", "shoutout"), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    const b = document.getElementById("shoutoutBubble");
                    document.getElementById("bUser").innerText = d.user;
                    document.getElementById("bMsg").innerText = d.text;
                    document.getElementById("bAvatar").src = d.avatar;
                    b.classList.add("active");
                    clearTimeout(bTimer); bTimer = setTimeout(()=>b.classList.remove("active"), 5000);
                }
            });
        }

        // Slider Auto-play
        let cur = 0;
        setInterval(() => {
            const track = document.getElementById("sliderTrack");
            const dots = document.querySelectorAll(".dot");
            if(track && track.children.length > 1){
                cur = (cur + 1) % track.children.length;
                track.style.transform = `translateX(-${cur * 100}%)`;
                dots.forEach((d, i) => d.classList.toggle('active', i === cur));
            }
        }, 4000);

        initSync();
    </script>
</body>
</html>
