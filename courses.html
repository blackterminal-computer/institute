<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Learning</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --gold: #fbbf24; --success: #10b981; --whatsapp: #25d366; --danger: #f43f5e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: #f1f5f9; padding-bottom: 220px; background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%); min-height: 100vh; overflow-x: hidden; }

        /* --- STICKY HEADER --- */
        .sticky-top { position: sticky; top: 0; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(20px); z-index: 1000; padding: 15px 20px; border-bottom: 1px solid var(--glass-border); }
        .search-box { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px 18px; border-radius: 18px; display: flex; align-items: center; gap: 12px; margin-top: 15px; }
        .search-box input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 14px; }

        /* --- CERTIFICATE VALIDATION CARD --- */
        .cert-card {
            margin: 15px 20px;
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.1), rgba(255, 255, 255, 0.03));
            border: 1px solid rgba(251, 191, 36, 0.2);
            padding: 18px; border-radius: 24px;
            display: flex; align-items: center; gap: 15px;
            text-decoration: none; color: white;
            backdrop-filter: blur(10px);
        }
        .cert-card i.main-icon { font-size: 32px; color: var(--gold); filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.4)); }
        .cert-card h3 { font-size: 14px; font-weight: 800; margin-bottom: 2px; }
        .cert-card p { font-size: 10px; opacity: 0.6; font-weight: 600; }

        /* --- REFER FLOATING BAR --- */
        .refer-float-bar { 
            margin: 0 20px 15px;
            background: linear-gradient(90deg, #1e1b4b, #312e81); 
            border: 1px solid rgba(99, 102, 241, 0.3); 
            border-radius: 20px; padding: 15px 20px; 
            display: flex; justify-content: space-between; 
            align-items: center; text-decoration: none; 
        }
        .refer-text b { color: var(--gold); font-size: 15px; display: block; }
        .refer-text span { font-size: 9px; color: #94a3b8; font-weight: 800; letter-spacing: 0.5px; }

        /* --- CATEGORY CHIPS --- */
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 5px 20px 20px; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .chip { padding: 9px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 50px; font-size: 11px; font-weight: 800; white-space: nowrap; cursor: pointer; color: #94a3b8; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- COURSE CARDS --- */
        .course-grid { padding: 0 20px; display: grid; gap: 22px; }
        .course-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 24px; border-radius: 30px; position: relative; }
        
        .badge-tag { position: absolute; top: -10px; right: 20px; padding: 6px 14px; border-radius: 10px; font-size: 10px; font-weight: 900; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .b-hot { background: var(--danger); } .b-new { background: var(--primary); } .b-free { background: var(--success); }

        .refer-container { background: rgba(0,0,0,0.3); border: 1px dashed rgba(251, 191, 36, 0.3); border-radius: 18px; padding: 12px 15px; margin: 18px 0; }
        .refer-container label { font-size: 9px; font-weight: 800; color: var(--gold); display: block; margin-bottom: 4px; }
        .refer-container input { width: 100%; background: none; border: none; color: white; font-size: 13px; font-weight: 700; outline: none; }

        .syllabus-link { display: flex; align-items: center; justify-content: space-between; background: rgba(37, 211, 102, 0.05); padding: 14px; border-radius: 15px; text-decoration: none; color: var(--whatsapp); font-size: 12px; font-weight: 800; margin-bottom: 15px; border: 1px solid rgba(37, 211, 102, 0.1); }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--glass-border); padding-top: 18px; }
        .price-info h2 { font-size: 26px; font-weight: 800; color: #fff; }
        .price-info span { font-size: 12px; opacity: 0.4; text-decoration: line-through; }

        .enroll-btn { background: white; color: black; padding: 14px 24px; border-radius: 16px; font-weight: 800; font-size: 13px; border: none; cursor: pointer; }

        /* --- BOTTOM NAV --- */
        .bottom-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(25px); border-radius: 25px; display: flex; justify-content: space-around; padding: 15px; border: 1px solid var(--glass-border); z-index: 1000; }
        .nav-link { color: #64748b; text-decoration: none; text-align: center; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 22px; display: block; }
    </style>
</head>
<body>

    <div class="sticky-top">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-size: 22px; font-weight: 800;">Elite <span style="color:var(--accent)">Learning</span></h2>
            <a href="profile.html" style="width:42px; height:42px; background:var(--glass); border-radius:14px; display:flex; align-items:center; justify-content:center; color:white; border: 1px solid var(--glass-border);"><i class="ri-user-3-line"></i></a>
        </div>
        <div class="search-box">
            <i class="ri-search-2-line" style="color:var(--accent)"></i>
            <input type="text" id="courseSearch" placeholder="Search for skills, coding, etc..." onkeyup="filterCourses()">
        </div>
    </div>

    <a href="http://www.nbcsmindia.in/certificateVerification" target="_blank" class="cert-card">
        <i class="ri-medal-2-fill main-icon"></i>
        <div>
            <h3>Official Validation</h3>
            <p>Verify your ISO 9001:2015 Diploma online</p>
        </div>
        <i class="ri-external-link-line" style="margin-left:auto; opacity:0.4;"></i>
    </a>

    <a href="refer.html" class="refer-float-bar">
        <div class="refer-text">
            <span>TERMINAL REWARDS 🎁</span>
            <b>Earn ₹<span id="nav-refer-amt">0</span> / Student</b>
        </div>
        <div style="width:38px; height:38px; background:var(--gold); border-radius:12px; display:flex; align-items:center; justify-content:center; color:black;"><i class="ri-share-forward-fill" style="font-size: 20px;"></i></div>
    </a>

    <div class="categories">
        <div class="chip active" onclick="filterCategory('all', this)">All Courses</div>
        <div class="chip" onclick="filterCategory('hot', this)">Hot 🔥</div>
        <div class="chip" onclick="filterCategory('free', this)">Free 🎁</div>
        <div class="chip" onclick="filterCategory('trending', this)">Trending</div>
    </div>

    <div id="no-results" style="text-align:center; padding:50px; display:none; opacity:0.3;">
        <i class="ri-search-eye-line" style="font-size: 40px;"></i>
        <p>No matches found</p>
    </div>

    <div class="course-grid" id="course-grid">
        <div style="padding:40px; text-align:center; opacity:0.5; font-weight:700;">Connecting to Terminal...</div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link"><i class="ri-home-5-line"></i></a>
        <a href="daily-test.html" class="nav-link"><i class="ri-code-box-line"></i></a>
        <a href="battle.html" class="nav-link"><i class="ri-sword-line"></i></a>
        <a href="courses.html" class="nav-link active"><i class="ri-macbook-fill"></i></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-line"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allCourses = [];

        onSnapshot(doc(db, "settings", "referral"), (d) => {
            if(d.exists()) document.getElementById('nav-refer-amt').innerText = d.data().amount;
        });

        window.handlePurchase = (courseName, price, isFree, docId) => {
            const referCode = document.getElementById(`ref-${docId}`)?.value || "NONE";
            if(isFree) {
                window.location.href = `https://wa.me/917008186187?text=Claiming FREE: *${courseName}*`;
            } else {
                window.location.href = `upi://pay?pa=7008186187@ybl&pn=BlackTerminal&am=${price}&tn=Ref-${referCode}&cu=INR`;
            }
        };

        onSnapshot(collection(db, "courses"), (snap) => {
            allCourses = [];
            snap.forEach(d => allCourses.push({ id: d.id, ...d.data() }));
            renderCourses(allCourses);
        });

        function renderCourses(data) {
            const grid = document.getElementById('course-grid');
            grid.innerHTML = "";
            if(data.length === 0) { document.getElementById('no-results').style.display = "block"; return; }
            document.getElementById('no-results').style.display = "none";

            data.forEach(c => {
                const isFree = Number(c.newPrice) === 0;
                const badge = (c.tag && c.tag !== 'none') ? `<div class="badge-tag b-${c.tag.toLowerCase()}">${c.tag}</div>` : '';
                
                grid.innerHTML += `
                    <div class="course-card">
                        ${badge}
                        <div style="display:flex; gap:18px; align-items:center;">
                            <div style="width:55px; height:55px; background:rgba(255,255,255,0.05); border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:26px; color:var(--accent); border:1px solid var(--glass-border);"><i class="${c.icon || 'ri-terminal-box-fill'}"></i></div>
                            <div>
                                <h3 style="font-size:17px; font-weight:800;">${c.name}</h3>
                                <div style="font-size:11px; color:#94a3b8; font-weight:700; margin-top:2px;">⭐ 4.9 • Official ISO</div>
                            </div>
                        </div>

                        ${!isFree ? `
                        <div class="refer-container">
                            <label>COUPON / REFERRAL</label>
                            <input type="text" id="ref-${c.id}" placeholder="Enter code for cashback">
                        </div>` : ''}

                        <a href="https://wa.me/917008186187?text=Syllabus for ${c.name}" class="syllabus-link">
                            <span>Get Syllabus Details</span>
                            <i class="ri-whatsapp-fill" style="font-size:18px;"></i>
                        </a>

                        <div class="price-row">
                            <div class="price-info">
                                <span>₹${c.oldPrice}</span>
                                <h2>${isFree ? 'FREE' : '₹'+c.newPrice}</h2>
                            </div>
                            <button class="enroll-btn" onclick="handlePurchase('${c.name}', '${c.newPrice}', ${isFree}, '${c.id}')">
                                ${isFree ? 'CLAIM' : 'ENROLL'}
                            </button>
                        </div>
                    </div>`;
            });
        }

        window.filterCourses = () => {
            const q = document.getElementById('courseSearch').value.toLowerCase();
            renderCourses(allCourses.filter(c => c.name.toLowerCase().includes(q) || c.tag?.toLowerCase().includes(q)));
        };

        window.filterCategory = (cat, el) => {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderCourses(cat === 'all' ? allCourses : allCourses.filter(c => c.tag?.toLowerCase() === cat));
        };
    </script>
</body>
</html>
