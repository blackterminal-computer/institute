<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Learning</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --gold: #fbbf24; --success: #10b981; --whatsapp: #25d366; --danger: #f43f5e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: #f1f5f9; padding-bottom: 220px; background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%); min-height: 100vh; overflow-x: hidden; }

        /* --- STICKY HEADER & SEARCH --- */
        .sticky-top { position: sticky; top: 0; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(20px); z-index: 1000; padding: 20px; border-bottom: 1px solid var(--glass-border); }
        
        .search-box { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px 20px; border-radius: 18px; display: flex; align-items: center; gap: 12px; margin-top: 15px; transition: 0.3s; }
        .search-box:focus-within { border-color: var(--primary); box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }
        .search-box input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 14px; font-weight: 500; }

        /* --- CATEGORY CHIPS --- */
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .chip { padding: 8px 18px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 50px; font-size: 12px; font-weight: 700; white-space: nowrap; cursor: pointer; transition: 0.3s; color: #94a3b8; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- COURSE CARDS --- */
        .course-grid { padding: 0 20px; display: grid; gap: 20px; }
        .course-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 20px; border-radius: 28px; position: relative; transition: 0.3s; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .badge-tag { position: absolute; top: 15px; right: 15px; padding: 5px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .b-hot { background: var(--danger); } .b-new { background: var(--primary); } .b-free { background: var(--success); }

        .stats-row { display: flex; gap: 15px; margin: 12px 0; font-size: 11px; font-weight: 700; color: #94a3b8; }
        .stats-row span { display: flex; align-items: center; gap: 4px; }
        .stats-row i { color: var(--gold); }

        /* --- REFERRAL SECTION --- */
        .refer-container { background: rgba(251, 191, 36, 0.05); border: 1px dashed rgba(251, 191, 36, 0.3); border-radius: 18px; padding: 12px; margin: 15px 0; }
        .refer-container label { font-size: 9px; font-weight: 800; color: var(--gold); letter-spacing: 1px; }
        .refer-container input { width: 100%; background: none; border: none; color: white; font-size: 13px; font-weight: 700; outline: none; padding: 5px 0; }

        /* --- ACTION BUTTONS --- */
        .syllabus-link { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 12px 18px; border-radius: 15px; text-decoration: none; color: #cbd5e1; font-size: 12px; font-weight: 700; margin-bottom: 15px; border: 1px solid var(--glass-border); }
        .syllabus-link i { color: var(--whatsapp); font-size: 18px; }

        .price-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--glass-border); pt: 15px; margin-top: 5px; padding-top: 15px;}
        .price-info h2 { font-size: 24px; font-weight: 800; }
        .price-info span { font-size: 12px; opacity: 0.4; text-decoration: line-through; }

        .enroll-btn { background: white; color: black; padding: 14px 25px; border-radius: 18px; font-weight: 800; font-size: 13px; border: none; cursor: pointer; transition: 0.3s; }
        .enroll-btn:active { transform: scale(0.95); }

        /* --- NAV & FLOATING --- */
        .bottom-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-radius: 25px; display: flex; justify-content: space-around; padding: 15px; border: 1px solid var(--glass-border); z-index: 1000; }
        .nav-link { color: #64748b; text-decoration: none; text-align: center; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 22px; display: block; }

        /* No results */
        #no-results { text-align: center; padding: 40px; display: none; }
    </style>
</head>
<body>

    <div class="sticky-top">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <h2 style="font-size: 20px; font-weight: 800;">Elite <span style="color:var(--accent)">Learning</span></h2>
                <p style="font-size: 11px; opacity:0.5;">Aapki digital pragati ka rasta</p>
            </div>
            <a href="profile.html" style="width:40px; height:40px; background:var(--glass); border-radius:12px; display:flex; align-items:center; justify-content:center; color:white; border: 1px solid var(--glass-border);"><i class="ri-user-heart-line"></i></a>
        </div>

        <div class="search-box">
            <i class="ri-search-2-line" style="color:var(--accent)"></i>
            <input type="text" id="courseSearch" placeholder="Search courses, skills or tags..." onkeyup="filterCourses()">
        </div>
    </div>

    <div class="categories">
        <div class="chip active" onclick="filterCategory('all', this)">All Courses</div>
        <div class="chip" onclick="filterCategory('hot', this)">Hot 🔥</div>
        <div class="chip" onclick="filterCategory('free', this)">Free 🎁</div>
        <div class="chip" onclick="filterCategory('new', this)">New Arrival</div>
        <div class="chip" onclick="filterCategory('trending', this)">Trending</div>
    </div>

    <div id="no-results">
        <i class="ri-search-eye-line" style="font-size: 40px; color: var(--glass-border)"></i>
        <p style="margin-top:10px; opacity:0.5">No courses found matching your search.</p>
    </div>

    <div class="course-grid" id="course-grid">
        <div style="padding:40px; text-align:center; opacity:0.5;">Terminal syncing...</div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link"><i class="ri-home-5-line"></i></a>
        <a href="daily-test.html" class="nav-link"><i class="ri-code-box-line"></i></a>
        <a href="battle.html" class="nav-link"><i class="ri-sword-line"></i></a>
        <a href="courses.html" class="nav-link active"><i class="ri-macbook-fill"></i></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-line"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allCourses = [];

        // Purchase Logic
        window.handlePurchase = (courseName, price, isFree, docId) => {
            const referCode = document.getElementById(`ref-${docId}`)?.value || "NONE";
            if(isFree) {
                window.location.href = `https://wa.me/917008186187?text=Hi! Claiming FREE course: *${courseName}*`;
            } else {
                window.location.href = `upi://pay?pa=7008186187@ybl&pn=BlackTerminal&am=${price}&tn=Ref-${referCode}&cu=INR`;
            }
        };

        // Real-time Data Sync
        onSnapshot(collection(db, "courses"), (snap) => {
            allCourses = [];
            snap.forEach(d => allCourses.push({ id: d.id, ...d.data() }));
            renderCourses(allCourses);
        });

        function renderCourses(data) {
            const grid = document.getElementById('course-grid');
            const noRes = document.getElementById('no-results');
            grid.innerHTML = "";
            
            if(data.length === 0) { noRes.style.display = "block"; return; }
            noRes.style.display = "none";

            data.forEach(c => {
                const isFree = Number(c.newPrice) === 0;
                const badge = (c.tag && c.tag !== 'none') ? `<div class="badge-tag b-${c.tag.toLowerCase()}">${c.tag}</div>` : '';
                
                grid.innerHTML += `
                    <div class="course-card" data-name="${c.name.toLowerCase()}" data-tag="${c.tag?.toLowerCase() || ''}">
                        ${badge}
                        <div style="display:flex; gap:15px; align-items:center;">
                            <div style="width:50px; height:50px; background:rgba(255,255,255,0.05); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--accent);"><i class="${c.icon || 'ri-terminal-box-fill'}"></i></div>
                            <div>
                                <h3 style="font-size:16px; font-weight:800;">${c.name}</h3>
                                <div class="stats-row">
                                    <span><i class="ri-star-fill"></i> 4.9</span>
                                    <span><i class="ri-group-fill" style="color:#94a3b8"></i> 1.2k+ Students</span>
                                </div>
                            </div>
                        </div>

                        ${!isFree ? `
                        <div class="refer-container">
                            <label>COUPON / REFERRAL CODE</label>
                            <input type="text" id="ref-${c.id}" placeholder="Enter for cashback rewards">
                        </div>` : ''}

                        <a href="https://wa.me/917008186187?text=Syllabus for ${c.name}" class="syllabus-link">
                            <span><i class="ri-file-list-3-line"></i> View Curriculum</span>
                            <i class="ri-arrow-right-s-line"></i>
                        </a>

                        <div class="price-row">
                            <div class="price-info">
                                <span>₹${c.oldPrice}</span>
                                <h2>${isFree ? 'FREE' : '₹'+c.newPrice}</h2>
                            </div>
                            <button class="enroll-btn" onclick="handlePurchase('${c.name}', '${c.newPrice}', ${isFree}, '${c.id}')">
                                ${isFree ? 'Claim Access' : 'Enroll Now'}
                            </button>
                        </div>
                    </div>`;
            });
        }

        // --- FILTER LOGIC ---
        window.filterCourses = () => {
            const query = document.getElementById('courseSearch').value.toLowerCase();
            const filtered = allCourses.filter(c => 
                c.name.toLowerCase().includes(query) || (c.tag && c.tag.toLowerCase().includes(query))
            );
            renderCourses(filtered);
        };

        window.filterCategory = (cat, el) => {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            
            if(cat === 'all') {
                renderCourses(allCourses);
            } else {
                const filtered = allCourses.filter(c => c.tag?.toLowerCase() === cat);
                renderCourses(filtered);
            }
        };
    </script>
</body>
</html>
