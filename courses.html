<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Terminal Learning</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.07);
            --gold: #fbbf24; --success: #10b981; --danger: #f43f5e;
            --neon-glow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #f1f5f9; padding-bottom: 120px; 
            min-height: 100vh; overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 0% 50%, rgba(6, 182, 212, 0.1) 0%, transparent 40%);
        }

        /* --- PREMIUM ANIMATED BANNER --- */
        .hero-banner {
            margin: 20px; height: 180px; border-radius: 32px;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            position: relative; overflow: hidden; padding: 25px;
            display: flex; flex-direction: column; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: var(--neon-glow);
        }
        .hero-banner::after {
            content: ''; position: absolute; top: -50%; right: -10%;
            width: 200px; height: 200px; background: var(--accent);
            filter: blur(80px); opacity: 0.3; border-radius: 50%;
        }
        .hero-banner h1 { font-size: 24px; font-weight: 800; line-height: 1.1; margin-bottom: 8px; z-index: 1; }
        .hero-banner p { font-size: 11px; font-weight: 600; opacity: 0.7; max-width: 60%; line-height: 1.4; z-index: 1; }
        .hero-badge {
            position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1);
            padding: 6px 12px; border-radius: 12px; font-size: 10px; font-weight: 800;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        .hero-img { position: absolute; bottom: -10px; right: -10px; font-size: 100px; opacity: 0.2; transform: rotate(-15deg); }

        /* --- STICKY NAV & SEARCH --- */
        .header-nav { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .search-container { padding: 0 20px 20px; }
        .search-wrapper { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            padding: 14px 20px; border-radius: 20px; display: flex; align-items: center; gap: 12px;
            transition: 0.3s;
        }
        .search-wrapper:focus-within { border-color: var(--primary); background: rgba(255,255,255,0.05); }
        .search-wrapper input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 14px; font-weight: 600; }

        /* --- CATEGORIES --- */
        .categories { display: flex; gap: 12px; overflow-x: auto; padding: 0 20px 25px; scrollbar-width: none; }
        .chip { 
            padding: 10px 22px; background: var(--glass); border: 1px solid var(--glass-border); 
            border-radius: 16px; font-size: 11px; font-weight: 800; white-space: nowrap; 
            color: #94a3b8; transition: 0.3s;
        }
        .chip.active { background: white; color: black; border-color: white; transform: translateY(-2px); }

        /* --- COURSE CARDS PREMIUM --- */
        .course-grid { padding: 0 20px; display: grid; gap: 20px; }
        .course-card { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid var(--glass-border); 
            padding: 24px; border-radius: 32px; position: relative;
            transition: 0.3s; backdrop-filter: blur(10px);
        }
        .course-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); }
        
        .badge-tag { 
            position: absolute; top: 20px; right: 20px; padding: 5px 12px; 
            border-radius: 10px; font-size: 9px; font-weight: 900; text-transform: uppercase;
        }
        .b-hot { background: linear-gradient(to right, #f43f5e, #fb7185); color: white; }
        .b-new { background: linear-gradient(to right, #6366f1, #a855f7); color: white; }
        .b-free { background: linear-gradient(to right, #10b981, #34d399); color: white; }

        .icon-box { 
            width: 60px; height: 60px; background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border-radius: 20px; display: flex; align-items: center; justify-content: center; 
            font-size: 28px; color: var(--accent); border: 1px solid var(--glass-border);
            margin-bottom: 18px;
        }

        .refer-box {
            background: rgba(0,0,0,0.2); border-radius: 16px; padding: 12px 15px; 
            margin: 15px 0; border: 1px dashed rgba(255,255,255,0.1);
        }
        .refer-box label { font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .refer-box input { background: none; border: none; color: var(--gold); font-size: 14px; font-weight: 800; outline: none; width: 100%; }

        .syllabus-btn {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 18px; background: rgba(255,255,255,0.03); border-radius: 16px;
            text-decoration: none; color: #94a3b8; font-size: 12px; font-weight: 700;
            margin-bottom: 20px; border: 1px solid var(--glass-border);
        }
        .syllabus-btn i { color: var(--success); }

        .price-container { display: flex; justify-content: space-between; align-items: center; }
        .price-text p { font-size: 11px; opacity: 0.4; text-decoration: line-through; font-weight: 600; }
        .price-text h2 { font-size: 28px; font-weight: 800; color: white; letter-spacing: -1px; }
        
        .enroll-btn { 
            background: white; color: black; padding: 15px 30px; border-radius: 18px; 
            font-weight: 800; font-size: 14px; border: none; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1); transition: 0.3s;
        }
        .enroll-btn:active { transform: scale(0.95); }

        /* --- BOTTOM NAV --- */
        .bottom-nav { 
            position: fixed; bottom: 25px; left: 25px; right: 25px; 
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); 
            border-radius: 24px; display: flex; justify-content: space-around; 
            padding: 18px; border: 1px solid var(--glass-border); z-index: 1000;
        }
        .nav-link { color: #4b5563; text-decoration: none; font-size: 24px; }
        .nav-link.active { color: var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }

    </style>
</head>
<body>

    <div class="header-nav">
        <h2 style="font-weight: 900; font-size: 20px; letter-spacing: -0.5px;">BLACK <span style="color:var(--accent)">TERMINAL</span></h2>
        <a href="profile.html" style="color:white; font-size: 22px;"><i class="ri-user-smile-line"></i></a>
    </div>

    <div class="hero-banner">
        <div class="hero-badge">PRO ACADEMY</div>
        <h1>Master The <br><span style="color:var(--accent)">Digital Future.</span></h1>
        <p>ISO Certified Professional Diplomas with Industry-Standard Curriculum.</p>
        <i class="ri-code-s-slash-line hero-img"></i>
    </div>

    <div class="search-container">
        <div class="search-wrapper">
            <i class="ri-search-line" style="color:var(--accent)"></i>
            <input type="text" id="courseSearch" placeholder="Search Skill (e.g. Python, Design)" onkeyup="filterCourses()">
        </div>
    </div>

    <div class="categories">
        <div class="chip active" onclick="filterCategory('all', this)">All Programs</div>
        <div class="chip" onclick="filterCategory('hot', this)">Trending 🔥</div>
        <div class="chip" onclick="filterCategory('free', this)">Open Source 🎁</div>
        <div class="chip" onclick="filterCategory('trending', this)">Most Popular</div>
    </div>

    <div id="no-results" style="text-align:center; padding:50px; display:none; opacity:0.3;">
        <i class="ri-compass-3-line" style="font-size: 40px;"></i>
        <p>Resource not found</p>
    </div>

    <div class="course-grid" id="course-grid">
        <div style="padding:40px; text-align:center; color: #4b5563; font-weight: 700; letter-spacing: 2px;">LOADING TERMINAL...</div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link"><i class="ri-home-5-line"></i></a>
        <a href="daily-test.html" class="nav-link"><i class="ri-shield-flash-line"></i></a>
        <a href="battle.html" class="nav-link"><i class="ri-sword-line"></i></a>
        <a href="courses.html" class="nav-link active"><i class="ri-macbook-fill"></i></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-3-line"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allCourses = [];

        onSnapshot(collection(db, "courses"), (snap) => {
            allCourses = [];
            snap.forEach(d => allCourses.push({ id: d.id, ...d.data() }));
            renderCourses(allCourses);
        });

        function renderCourses(data) {
            const grid = document.getElementById('course-grid');
            grid.innerHTML = "";
            if(data.length === 0) { document.getElementById('no-results').style.display = "block"; return; }
            document.getElementById('no-results').style.display = "none";

            data.forEach(c => {
                const isFree = Number(c.newPrice) === 0;
                const badge = (c.tag && c.tag !== 'none') ? `<div class="badge-tag b-${c.tag.toLowerCase()}">${c.tag}</div>` : '';
                
                grid.innerHTML += `
                    <div class="course-card">
                        ${badge}
                        <div class="icon-box"><i class="${c.icon || 'ri-terminal-box-line'}"></i></div>
                        
                        <h3 style="font-size:18px; font-weight:800; margin-bottom:4px;">${c.name}</h3>
                        <p style="font-size:11px; color:#64748b; font-weight:700; margin-bottom:15px;">Official ISO 9001:2015 Certification</p>

                        ${!isFree ? `
                        <div class="refer-box">
                            <label>Elite Referral / Coupon</label>
                            <input type="text" id="ref-${c.id}" placeholder="Type here for 10% instant cashback">
                        </div>` : ''}

                        <a href="https://wa.me/917008186187?text=Hi, I want Syllabus for ${c.name}" class="syllabus-btn">
                            <span>View Syllabus & Curriculum</span>
                            <i class="ri-whatsapp-line"></i>
                        </a>

                        <div class="price-container">
                            <div class="price-text">
                                <p>₹${c.oldPrice}</p>
                                <h2>${isFree ? 'FREE' : '₹'+c.newPrice}</h2>
                            </div>
                            <button class="enroll-btn" onclick="handlePurchase('${c.name}', '${c.newPrice}', ${isFree}, '${c.id}')">
                                ${isFree ? 'CLAIM' : 'ENROLL'}
                            </button>
                        </div>
                    </div>`;
            });
        }

        window.handlePurchase = (courseName, price, isFree, docId) => {
            const referCode = document.getElementById(`ref-${docId}`)?.value || "DIRECT_ELITE";
            if(isFree) {
                window.location.href = `https://wa.me/917008186187?text=Sir, I want to Claim Free Course: *${courseName}*`;
            } else {
                window.location.href = `upi://pay?pa=7008186187@ybl&pn=BlackTerminal&am=${price}&tn=Course-${courseName}-Ref-${referCode}&cu=INR`;
            }
        };

        window.filterCourses = () => {
            const q = document.getElementById('courseSearch').value.toLowerCase();
            renderCourses(allCourses.filter(c => c.name.toLowerCase().includes(q)));
        };

        window.filterCategory = (cat, el) => {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderCourses(cat === 'all' ? allCourses : allCourses.filter(c => c.tag?.toLowerCase() === cat));
        };
    </script>
</body>
</html>
