<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Terminal v3</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #010409;
            --glass: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.08);
            --gold: #facc15; --success: #10b981; --danger: #f43f5e; --whatsapp: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #f1f5f9; padding-bottom: 120px; 
            min-height: 100vh; overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
        }

        /* --- PREMIUM HEADER --- */
        .app-bar {
            padding: 25px 20px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 2000; background: rgba(1, 4, 9, 0.8); backdrop-filter: blur(20px);
        }
        .brand { font-weight: 800; font-size: 20px; letter-spacing: -1px; display: flex; align-items: center; gap: 8px; }
        .brand span { color: var(--accent); text-shadow: 0 0 15px rgba(6, 182, 212, 0.5); }
        .user-pill { width: 40px; height: 40px; border-radius: 14px; background: var(--glass); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; }

        /* --- HERO SECTION --- */
        .hero-banner {
            margin: 10px 20px 25px; height: 160px; border-radius: 32px;
            background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
            position: relative; overflow: hidden; padding: 25px;
            display: flex; flex-direction: column; justify-content: center;
            border: 1px solid var(--glass-border);
        }
        .hero-banner h1 { font-size: 22px; font-weight: 800; line-height: 1.2; z-index: 2; color: #fff; }
        .hero-banner p { font-size: 11px; color: #94a3b8; margin-top: 5px; z-index: 2; font-weight: 600; }
        .hero-banner i { position: absolute; right: -20px; bottom: -20px; font-size: 140px; color: var(--primary); opacity: 0.1; }

        /* --- SEARCH & FILTERS --- */
        .search-container { padding: 0 20px 20px; }
        .search-wrapper { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            padding: 12px 18px; border-radius: 18px; display: flex; align-items: center; gap: 10px;
            transition: 0.3s;
        }
        .search-wrapper:focus-within { border-color: var(--accent); background: rgba(255,255,255,0.05); }
        .search-wrapper input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 14px; }
        
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px 30px; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .chip { padding: 10px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; font-size: 11px; font-weight: 700; color: #64748b; white-space: nowrap; transition: 0.3s; cursor: pointer; }
        .chip.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

        /* --- MODERN COURSE CARDS --- */
        .course-grid { padding: 0 20px; display: grid; gap: 25px; }
        .course-card { 
            background: linear-gradient(165deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%); 
            border: 1px solid var(--glass-border); 
            border-radius: 38px; position: relative; overflow: hidden;
            backdrop-filter: blur(15px); transition: 0.3s; animation: slideUp 0.6s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .course-img-container { width: 100%; height: 190px; position: relative; background: #0f172a; overflow: hidden; }
        .course-img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .course-card:hover .course-img-container img { transform: scale(1.08); }
        .img-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(1, 4, 9, 0.8)); }

        .yt-play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 54px; height: 54px; border-radius: 50%; background: #fff; color: #000;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 5;
        }

        /* --- ULTRA MODERN GLOWING BADGES --- */
        .m-badge {
            position: absolute; top: 18px; left: 18px; font-size: 9px; font-weight: 800;
            padding: 6px 14px; border-radius: 12px; text-transform: uppercase; z-index: 10;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); letter-spacing: 0.5px;
        }
        .bg-hot { background: rgba(244, 63, 94, 0.3); color: #fff; border-color: #f43f5e; box-shadow: 0 0 15px rgba(244, 63, 94, 0.4); }
        .bg-new { background: rgba(99, 102, 241, 0.3); color: #fff; border-color: #6366f1; box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
        .bg-trend { background: rgba(6, 182, 212, 0.3); color: #fff; border-color: #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .bg-free { background: rgba(16, 185, 129, 0.3); color: #fff; border-color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }

        /* --- WHATSAPP SHARE BUTTON --- */
        .share-btn {
            position: absolute; top: 18px; right: 18px; width: 42px; height: 42px;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 20px; z-index: 10; cursor: pointer; transition: 0.3s;
        }
        .share-btn:hover { background: rgba(37, 211, 102, 0.2); color: var(--whatsapp); border-color: var(--whatsapp); }

        .card-body { padding: 22px 25px 28px; }
        .timer-strip {
            background: rgba(250, 204, 21, 0.05); color: var(--gold);
            padding: 10px; text-align: center; font-size: 10px; font-weight: 800;
            border-radius: 14px; margin-bottom: 18px; border: 1px solid rgba(250, 204, 21, 0.1);
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        .course-title { font-size: 19px; font-weight: 800; line-height: 1.3; color: #fff; margin-bottom: 20px; }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; }
        .price-info span { font-size: 12px; opacity: 0.4; text-decoration: line-through; display: block; margin-bottom: 2px; }
        .price-info h2 { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -1px; }

        .enroll-btn { 
            background: #fff; color: #000; padding: 14px 28px; border-radius: 20px; 
            font-weight: 800; font-size: 13px; border: none; box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        /* --- BOTTOM NAV --- */
        .bottom-nav { 
            position: fixed; bottom: 25px; left: 25px; right: 25px; 
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); 
            border-radius: 35px; display: flex; justify-content: space-around; 
            padding: 18px; border: 1px solid var(--glass-border); z-index: 1000;
        }
        .nav-link { color: rgba(255,255,255,0.2); font-size: 24px; transition: 0.3s; }
        .nav-link.active { color: #fff; text-shadow: 0 0 15px #fff; }
    </style>
</head>
<body>

    <div class="app-bar">
        <div class="brand">ELITE <span>TERMINAL</span></div>
        <div class="user-pill"><i class="ri-user-6-line"></i></div>
    </div>

    <div class="hero-banner">
        <h1>Level Up Your <br>Career Today.</h1>
        <p>Expert-Led Industry Recognized Courses</p>
        <i class="ri-shield-check-line"></i>
    </div>

    <div class="search-container">
        <div class="search-wrapper">
            <i class="ri-search-2-line" style="color:var(--accent)"></i>
            <input type="text" id="courseSearch" placeholder="Search elite programs..." onkeyup="filterCourses()">
        </div>
    </div>

    <div class="categories" id="cat-chips">
        <div class="chip active" onclick="filterCategory('all', this)">Everything</div>
        <div class="chip" onclick="filterCategory('hot', this)">Hot 🔥</div>
        <div class="chip" onclick="filterCategory('new', this)">New Arrival ✨</div>
        <div class="chip" onclick="filterCategory('trending', this)">Trending 📈</div>
    </div>

    <div class="course-grid" id="course-grid"></div>

    <nav class="bottom-nav">
        <a href="#" class="nav-link active"><i class="ri-home-5-fill"></i></a>
        <a href="#" class="nav-link"><i class="ri-compass-3-fill"></i></a>
        <a href="#" class="nav-link"><i class="ri-user-settings-fill"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allCourses = [];

        onSnapshot(collection(db, "courses"), (snap) => {
            allCourses = [];
            snap.forEach(d => allCourses.push({ id: d.id, ...d.data() }));
            renderCourses(allCourses);
        });

        window.shareOnWhatsapp = (name, price) => {
            const text = `*🔥 ELITE PROGRAM ENROLLMENT OPEN*%0A%0A*Course:* ${name}%0A*Price:* ₹${price}%0A*Link:* ${window.location.href}%0A%0A_Unlock your digital potential with Elite Terminal!_`;
            window.open(`https://wa.me/?text=${text}`, '_blank');
        };

        function getBadgeClass(tag) {
            if(!tag) return "";
            const t = tag.toUpperCase();
            if(t.includes("HOT")) return "bg-hot";
            if(t.includes("NEW")) return "bg-new";
            if(t.includes("TRENDING")) return "bg-trend";
            if(t.includes("FREE")) return "bg-free";
            return "";
        }

        function renderCourses(data) {
            const grid = document.getElementById('course-grid');
            grid.innerHTML = data.map((c, index) => {
                const bClass = getBadgeClass(c.tag);
                const hasTimer = c.expiryDate ? `<div class="timer-strip" id="timer-${c.id}"><i class="ri-time-line"></i> Loading...</div>` : '';
                
                if(c.expiryDate) startTimer(c.expiryDate, `timer-${c.id}`);

                return `
                    <div class="course-card" style="animation-delay: ${index * 0.1}s">
                        ${c.tag ? `<div class="m-badge ${bClass}">${c.tag}</div>` : ''}
                        
                        <div class="share-btn" onclick="shareOnWhatsapp('${c.name}', '${c.newPrice}')">
                            <i class="ri-whatsapp-line"></i>
                        </div>

                        <div class="course-img-container">
                            ${c.image ? `<img src="${c.image}">` : `<div style="height:100%; display:flex; align-items:center; justify-content:center; font-size:50px; color:var(--accent); opacity:0.2;"><i class="ri-terminal-box-line"></i></div>`}
                            <div class="img-overlay"></div>
                            ${c.ytLink ? `<div class="yt-play-btn" onclick="window.open('${c.ytLink}')"><i class="ri-play-mini-fill"></i></div>` : ''}
                        </div>

                        <div class="card-body">
                            ${hasTimer}
                            <h3 class="course-title">${c.name}</h3>
                            <div class="price-row">
                                <div class="price-info">
                                    <span>₹${c.oldPrice}</span>
                                    <h2>₹${c.newPrice}</h2>
                                </div>
                                <button class="enroll-btn">Enroll Now</button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function startTimer(expiry, elementId) {
            setInterval(() => {
                const dist = new Date(expiry).getTime() - new Date().getTime();
                const el = document.getElementById(elementId);
                if(!el) return;
                if (dist < 0) { el.innerHTML = "OFFER EXPIRED"; return; }
                const h = Math.floor((dist % (1000*60*60*24)) / (1000*60*60));
                const m = Math.floor((dist % (1000*60*60)) / (1000*60));
                const s = Math.floor((dist % (1000*60)) / 1000);
                el.innerHTML = `<i class="ri-time-line"></i> Closing in: ${h}h ${m}m ${s}s`;
            }, 1000);
        }

        window.filterCourses = () => {
            const q = document.getElementById('courseSearch').value.toLowerCase();
            renderCourses(allCourses.filter(c => c.name.toLowerCase().includes(q)));
        };

        window.filterCategory = (cat, el) => {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderCourses(cat === 'all' ? allCourses : allCourses.filter(c => c.tag?.toLowerCase().includes(cat)));
        };
    </script>
</body>
</html>
