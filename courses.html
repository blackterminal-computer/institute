<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Terminal v3</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #030712;
            --glass: rgba(255, 255, 255, 0.02); --glass-border: rgba(255, 255, 255, 0.06);
            --gold: #fbbf24; --success: #10b981; --danger: #f43f5e; --whatsapp: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #f1f5f9; padding-bottom: 120px; 
            min-height: 100vh; overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(99, 102, 241, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
        }

        .hero-banner {
            margin: 20px; height: 180px; border-radius: 35px;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            position: relative; overflow: hidden; padding: 30px;
            display: flex; flex-direction: column; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hero-banner h1 { font-size: 24px; font-weight: 800; line-height: 1.1; z-index: 2; }

        .course-grid { padding: 0 20px; display: grid; gap: 20px; }
        
        /* --- MODERN CARD UPGRADE --- */
        .course-card { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            border-radius: 35px; position: relative; overflow: hidden;
            backdrop-filter: blur(15px); transition: 0.3s;
        }
        
        .course-img-container { width: 100%; height: 160px; background: #1e293b; position: relative; }
        .course-img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .yt-play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50px; height: 50px; background: rgba(255,0,0,0.8); color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; border: 3px solid white;
        }

        .card-body { padding: 20px 25px 25px; }

        /* --- MODERN BADGES --- */
        .m-badge {
            position: absolute; top: 15px; left: 15px; font-size: 9px; font-weight: 800;
            padding: 5px 12px; border-radius: 10px; text-transform: uppercase; z-index: 10;
        }
        .bg-hot { background: linear-gradient(45deg, #f43f5e, #fb7185); color: white; box-shadow: 0 4px 10px rgba(244,63,94,0.4); }
        .bg-new { background: linear-gradient(45deg, #6366f1, #818cf8); color: white; }
        .bg-trend { background: linear-gradient(45deg, #06b6d4, #22d3ee); color: white; }
        .bg-free { background: linear-gradient(45deg, #10b981, #34d399); color: white; }

        /* --- TIMER STYLE --- */
        .timer-strip {
            background: rgba(250, 204, 21, 0.1); color: var(--gold);
            padding: 8px; text-align: center; font-size: 11px; font-weight: 800;
            border-radius: 12px; margin-bottom: 15px; border: 1px dashed var(--gold);
        }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .price-info h2 { font-size: 24px; font-weight: 800; color: white; }
        .price-info span { font-size: 12px; opacity: 0.4; text-decoration: line-through; }

        .enroll-btn { 
            background: white; color: black; padding: 12px 22px; border-radius: 15px; 
            font-weight: 800; font-size: 13px; border: none;
        }

        /* Standard search & categories styles remain same... */
        .search-container { padding: 10px 20px 20px; }
        .search-wrapper { background: var(--glass); border: 1px solid var(--glass-border); padding: 14px 20px; border-radius: 20px; display: flex; gap: 10px; }
        .search-wrapper input { background: none; border: none; color: white; width: 100%; outline: none; }
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px 25px; scrollbar-width: none; }
        .chip { padding: 8px 18px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 50px; font-size: 11px; font-weight: 700; color: #94a3b8; white-space: nowrap; }
        .chip.active { background: white; color: black; }

        .bottom-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(15,23,42,0.9); backdrop-filter: blur(20px); border-radius: 25px; display: flex; justify-content: space-around; padding: 15px; border: 1px solid var(--glass-border); z-index: 1000; }
    </style>
</head>
<body>

    <div style="padding: 20px 25px; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="font-weight: 900; font-size: 22px;">ELITE <span style="color:var(--accent)">TERMINAL</span></h2>
        <div style="width:40px; height:40px; background:var(--glass); border-radius:12px; display:flex; align-items:center; justify-content:center; border:1px solid var(--glass-border);">
            <i class="ri-notification-3-line"></i>
        </div>
    </div>

    <div class="hero-banner">
        <h1>Unlock Your <br>Digital Potential.</h1>
        <p style="font-size:12px; opacity:0.7; margin-top:8px;">ISO Certified Training Programs</p>
        <i class="ri-shining-line" style="position:absolute; right:20px; font-size:80px; opacity:0.1;"></i>
    </div>

    <div class="search-container">
        <div class="search-wrapper">
            <i class="ri-search-line" style="color:var(--accent)"></i>
            <input type="text" id="courseSearch" placeholder="Search courses..." onkeyup="filterCourses()">
        </div>
    </div>

    <div class="categories">
        <div class="chip active" onclick="filterCategory('all', this)">All</div>
        <div class="chip" onclick="filterCategory('hot', this)">Hot 🔥</div>
        <div class="chip" onclick="filterCategory('new', this)">New ✨</div>
        <div class="chip" onclick="filterCategory('trending', this)">Trending 📈</div>
    </div>

    <div class="course-grid" id="course-grid"></div>

    <div class="modal-overlay" id="checkoutModal">
        </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-link active" style="color:var(--accent); font-size:24px;"><i class="ri-home-5-fill"></i></a>
        <a href="#" class="nav-link" style="color:#4b5563; font-size:24px;"><i class="ri-book-open-line"></i></a>
        <a href="#" class="nav-link" style="color:#4b5563; font-size:24px;"><i class="ri-user-line"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allCourses = [];

        onSnapshot(collection(db, "courses"), (snap) => {
            allCourses = [];
            snap.forEach(d => allCourses.push({ id: d.id, ...d.data() }));
            renderCourses(allCourses);
        });

        function getBadgeClass(tag) {
            if(!tag) return "";
            if(tag.includes("HOT")) return "bg-hot";
            if(tag.includes("NEW")) return "bg-new";
            if(tag.includes("TRENDING")) return "bg-trend";
            if(tag.includes("FREE")) return "bg-free";
            return "";
        }

        function renderCourses(data) {
            const grid = document.getElementById('course-grid');
            grid.innerHTML = data.map(c => {
                const badgeClass = getBadgeClass(c.tag);
                const hasTimer = c.expiryDate ? `<div class="timer-strip" id="timer-${c.id}">Loading Timer...</div>` : '';
                
                // Start Timer if exists
                if(c.expiryDate) startTimer(c.expiryDate, `timer-${c.id}`);

                return `
                    <div class="course-card">
                        ${c.tag ? `<div class="m-badge ${badgeClass}">${c.tag}</div>` : ''}
                        
                        <div class="course-img-container">
                            ${c.image ? `<img src="${c.image}">` : `<div style="height:100%; display:flex; align-items:center; justify-content:center; font-size:50px; color:var(--accent);"><i class="${c.icon}"></i></div>`}
                            ${c.ytLink ? `<div class="yt-play-btn" onclick="window.open('${c.ytLink}')"><i class="ri-play-fill"></i></div>` : ''}
                        </div>

                        <div class="card-body">
                            ${hasTimer}
                            <h3 style="font-size:18px; font-weight:800;">${c.name}</h3>
                            <div class="price-row">
                                <div class="price-info">
                                    <span>₹${c.oldPrice}</span>
                                    <h2>₹${c.newPrice}</h2>
                                </div>
                                <button class="enroll-btn" onclick="openEnroll('${c.name}', '${c.newPrice}')">ENROLL</button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function startTimer(expiry, elementId) {
            setInterval(() => {
                const now = new Date().getTime();
                const distance = new Date(expiry).getTime() - now;
                const el = document.getElementById(elementId);
                if(!el) return;

                if (distance < 0) {
                    el.innerHTML = "OFFER EXPIRED";
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((distance % (1000 * 60)) / 1000);

                el.innerHTML = `⏱️ Offer Ends: ${days}d ${hours}h ${mins}m ${secs}s`;
            }, 1000);
        }

        // Search and Filter Functions same as your code...
        window.filterCourses = () => {
            const q = document.getElementById('courseSearch').value.toLowerCase();
            renderCourses(allCourses.filter(c => c.name.toLowerCase().includes(q)));
        };

        window.filterCategory = (cat, el) => {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderCourses(cat === 'all' ? allCourses : allCourses.filter(c => c.tag?.toLowerCase().includes(cat)));
        };
    </script>
</body>
</html>
