<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Terminal v3</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #030712;
            --glass: rgba(255, 255, 255, 0.02); --glass-border: rgba(255, 255, 255, 0.06);
            --gold: #fbbf24; --success: #10b981; --danger: #f43f5e; --whatsapp: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #f1f5f9; padding-bottom: 120px; 
            min-height: 100vh; overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(99, 102, 241, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
        }

        /* --- PREMIUM HERO --- */
        .hero-banner {
            margin: 20px; height: 200px; border-radius: 35px;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            position: relative; overflow: hidden; padding: 30px;
            display: flex; flex-direction: column; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .hero-banner h1 { font-size: 26px; font-weight: 800; line-height: 1.1; margin-bottom: 10px; z-index: 2; color: #fff; }
        .hero-banner p { font-size: 12px; font-weight: 500; opacity: 0.7; max-width: 65%; z-index: 2; line-height: 1.5; }
        .hero-banner i { position: absolute; bottom: -20px; right: -10px; font-size: 150px; opacity: 0.1; transform: rotate(-15deg); }

        /* --- SEARCH & FILTERS --- */
        .search-container { padding: 10px 20px 25px; }
        .search-wrapper { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            padding: 16px 22px; border-radius: 22px; display: flex; align-items: center; gap: 12px;
            backdrop-filter: blur(10px);
        }
        .search-wrapper input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 15px; }

        .categories { display: flex; gap: 12px; overflow-x: auto; padding: 0 20px 25px; scrollbar-width: none; }
        .chip { 
            padding: 10px 22px; background: var(--glass); border: 1px solid var(--glass-border); 
            border-radius: 50px; font-size: 11px; font-weight: 800; white-space: nowrap; 
            color: #94a3b8; transition: 0.4s;
        }
        .chip.active { background: white; color: black; border-color: white; box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

        /* --- COURSE CARDS --- */
        .course-grid { padding: 0 20px; display: grid; gap: 24px; }
        .course-card { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            padding: 28px; border-radius: 38px; position: relative;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(15px);
        }
        
        .badge-tag { position: absolute; top: 25px; left: 28px; padding: 5px 12px; border-radius: 10px; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .b-hot { background: #f43f5e; color: white; }
        .b-new { background: #6366f1; color: white; }
        .b-free { background: #10b981; color: white; }

        .share-btn { 
            position: absolute; top: 25px; right: 28px; width: 40px; height: 40px; 
            background: rgba(37, 211, 102, 0.1); border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; color: var(--whatsapp);
            border: 1px solid rgba(37, 211, 102, 0.2); font-size: 20px;
        }

        .icon-box { 
            width: 65px; height: 65px; background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent);
            border-radius: 22px; display: flex; align-items: center; justify-content: center; 
            font-size: 30px; color: var(--accent); border: 1px solid var(--glass-border);
            margin: 30px 0 20px;
        }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; border-top: 1px solid var(--glass-border); padding-top: 20px; }
        .price-info h2 { font-size: 30px; font-weight: 800; color: white; }
        .price-info span { font-size: 12px; opacity: 0.4; text-decoration: line-through; }

        .enroll-btn { 
            background: white; color: black; padding: 15px 32px; border-radius: 20px; 
            font-weight: 800; font-size: 14px; border: none; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        /* --- PREMIUM MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 3000; padding: 20px;
        }
        .modal-content {
            background: #0f172a; border: 1px solid var(--glass-border);
            width: 100%; max-width: 400px; padding: 35px; border-radius: 40px;
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalPop { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .input-box { margin-bottom: 18px; }
        .input-box label { display: block; font-size: 10px; font-weight: 800; color: var(--accent); margin-bottom: 8px; letter-spacing: 1px; }
        .input-box input { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 18px; color: white; font-weight: 600; outline: none;
        }

        /* --- BOTTOM NAV --- */
        .bottom-nav { 
            position: fixed; bottom: 25px; left: 25px; right: 25px; 
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(25px); 
            border-radius: 28px; display: flex; justify-content: space-around; 
            padding: 18px; border: 1px solid var(--glass-border); z-index: 1000;
        }
        .nav-link { color: #4b5563; text-decoration: none; font-size: 24px; }
        .nav-link.active { color: var(--accent); filter: drop-shadow(0 0 10px var(--accent)); }
    </style>
</head>
<body>

    <div style="padding: 20px 25px; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="font-weight: 900; font-size: 22px; letter-spacing: -1px;">ELITE <span style="color:var(--accent)">TERMINAL</span></h2>
        <a href="profile.html" style="color:white; font-size: 24px;"><i class="ri-user-6-line"></i></a>
    </div>

    <div class="hero-banner">
        <h1>Level Up Your <br>Digital Skills.</h1>
        <p>Advanced Certification Courses with Industry-Grade Real World Projects.</p>
        <i class="ri-terminal-window-line"></i>
    </div>

    <div class="search-container">
        <div class="search-wrapper">
            <i class="ri-search-2-line" style="color:var(--accent)"></i>
            <input type="text" id="courseSearch" placeholder="Search for Skills..." onkeyup="filterCourses()">
        </div>
    </div>

    <div class="categories">
        <div class="chip active" onclick="filterCategory('all', this)">All Courses</div>
        <div class="chip" onclick="filterCategory('hot', this)">Hot 🔥</div>
        <div class="chip" onclick="filterCategory('free', this)">Free 🎁</div>
        <div class="chip" onclick="filterCategory('trending', this)">Trending</div>
    </div>

    <div class="course-grid" id="course-grid">
        <div style="text-align:center; padding:50px; opacity:0.3;">Initializing Terminal...</div>
    </div>

    <div class="modal-overlay" id="checkoutModal">
        <div class="modal-content">
            <h2 style="margin-bottom:5px;">Join Program</h2>
            <p id="modalCourseName" style="font-size:12px; color:var(--accent); font-weight:700; margin-bottom:25px;"></p>
            
            <div class="input-box">
                <label>FULL NAME</label>
                <input type="text" id="uName" placeholder="Enter your full name">
            </div>
            <div class="input-box">
                <label>WHATSAPP NUMBER</label>
                <input type="tel" id="uPhone" placeholder="Ex: 7008186187">
            </div>
            <div class="input-box">
                <label>FULL ADDRESS</label>
                <input type="text" id="uAddress" placeholder="City, State, Pincode">
            </div>

            <button class="enroll-btn" style="width:100%; margin-top:10px;" onclick="sendOrder()">CONFIRM ENROLLMENT</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#64748b; font-size:12px; margin-top:15px; font-weight:700; cursor:pointer;">Not now, cancel</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link"><i class="ri-home-5-line"></i></a>
        <a href="daily-test.html" class="nav-link"><i class="ri-shield-flash-line"></i></a>
        <a href="battle.html" class="nav-link"><i class="ri-sword-line"></i></a>
        <a href="courses.html" class="nav-link active"><i class="ri-macbook-fill"></i></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-3-line"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allCourses = [];
        let selected = {};

        // Fetch Courses
        onSnapshot(collection(db, "courses"), (snap) => {
            allCourses = [];
            snap.forEach(d => allCourses.push({ id: d.id, ...d.data() }));
            renderCourses(allCourses);
        });

        function renderCourses(data) {
            const grid = document.getElementById('course-grid');
            grid.innerHTML = data.map(c => {
                const isFree = Number(c.newPrice) === 0;
                const badge = c.tag && c.tag !== 'none' ? `<div class="badge-tag b-${c.tag.toLowerCase()}">${c.tag}</div>` : '';
                
                return `
                    <div class="course-card">
                        ${badge}
                        <div class="share-btn" onclick="shareCourse('${c.name}', '${c.newPrice}')"><i class="ri-whatsapp-line"></i></div>
                        <div class="icon-box"><i class="${c.icon || 'ri-terminal-box-line'}"></i></div>
                        <h3 style="font-size:19px; font-weight:800;">${c.name}</h3>
                        <p style="font-size:11px; opacity:0.5; font-weight:600; margin-top:4px;">Official ISO 9001:2015 Certification</p>
                        
                        <div class="price-row">
                            <div class="price-info">
                                <span>₹${c.oldPrice}</span>
                                <h2>${isFree ? 'FREE' : '₹'+c.newPrice}</h2>
                            </div>
                            <button class="enroll-btn" onclick="openEnroll('${c.name}', '${c.newPrice}', ${isFree}, '${c.id}')">
                                ${isFree ? 'CLAIM' : 'ENROLL'}
                            </button>
                        </div>
                    </div>`;
            }).join('');
        }

        // Enrollment Logic
        window.openEnroll = (name, price, isFree, id) => {
            selected = { name, price, isFree, id };
            document.getElementById('modalCourseName').innerText = "Course: " + name;
            document.getElementById('checkoutModal').style.display = "flex";
        };

        window.closeModal = () => document.getElementById('checkoutModal').style.display = "none";

        window.sendOrder = () => {
            const name = document.getElementById('uName').value;
            const phone = document.getElementById('uPhone').value;
            const addr = document.getElementById('uAddress').value;

            if(!name || !phone || !addr) return alert("All fields are mandatory!");

            const msg = `*NEW ENROLLMENT REQUEST*%0A` +
                        `*Student:* ${name}%0A` +
                        `*Course:* ${selected.name}%0A` +
                        `*Contact:* ${phone}%0A` +
                        `*Address:* ${addr}%0A` +
                        `--------------------------%0A` +
                        `_Order from BT Elite Terminal_`;

            if(!selected.isFree) {
                window.location.href = `upi://pay?pa=7008186187@ybl&pn=BlackTerminal&am=${selected.price}&tn=Enroll-${selected.name}&cu=INR`;
                setTimeout(() => { window.location.href = `https://wa.me/917008186187?text=${msg}`; }, 3000);
            } else {
                window.location.href = `https://wa.me/917008186187?text=${msg}`;
            }
        };

        // Share Status Logic
        window.shareCourse = (name, price) => {
            const banner = `https://dummyimage.com/1200x630/1e1b4b/ffffff&text=${name}+@+Rs.${price}`;
            const text = `*Check this out!*%0A🔥 *${name}* course is now available on Black Terminal at ₹${price}.%0A🎁 ISO Certification included!%0A%0AEnroll Now: ${window.location.href}`;
            window.location.href = `https://wa.me/?text=${text}`;
        };

        window.filterCourses = () => {
            const q = document.getElementById('courseSearch').value.toLowerCase();
            renderCourses(allCourses.filter(c => c.name.toLowerCase().includes(q)));
        };

        window.filterCategory = (cat, el) => {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderCourses(cat === 'all' ? allCourses : allCourses.filter(c => c.tag?.toLowerCase() === cat));
        };
    </script>
</body>
</html>
