<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Terminal v3</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #010409;
            --glass: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.08);
            --gold: #facc15; --success: #10b981; --danger: #f43f5e; --whatsapp: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #f1f5f9; padding-bottom: 120px; 
            min-height: 100vh; overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
        }

        /* --- PREMIUM HEADER --- */
        .app-bar {
            padding: 25px 20px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; background: rgba(1, 4, 9, 0.8); backdrop-filter: blur(20px);
        }
        .brand { font-weight: 800; font-size: 20px; letter-spacing: -1px; display: flex; align-items: center; gap: 8px; }
        .brand span { color: var(--accent); text-shadow: 0 0 15px rgba(6, 182, 212, 0.5); }
        .user-pill { width: 40px; height: 40px; border-radius: 14px; background: var(--glass); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; }

        /* --- CAROUSEL SYSTEM --- */
        .carousel-container {
            margin: 10px 20px 20px;
            position: relative;
            overflow: hidden;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            height: 180px;
        }
        .carousel-track {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            height: 100%;
        }
        .carousel-slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .slide-1 { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
        .slide-2 { background: linear-gradient(135deg, #064e3b 0%, #065f46 100%); }
        .slide-3 { background: linear-gradient(135deg, #4c1d95 0%, #5b21b6 100%); }
        
        .carousel-slide h2 { font-size: 22px; font-weight: 800; color: #fff; line-height: 1.2; z-index: 2; }
        .carousel-slide p { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 8px; z-index: 2; }
        .carousel-slide i { position: absolute; right: -10px; bottom: -10px; font-size: 120px; opacity: 0.1; color: #fff; }

        .carousel-dots {
            position: absolute; bottom: 15px; left: 25px;
            display: flex; gap: 6px; z-index: 10;
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: 0.3s; }
        .dot.active { width: 20px; border-radius: 10px; background: #fff; }

        /* --- SEARCH & FILTERS --- */
        .search-container { padding: 0 20px 20px; }
        .search-wrapper { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            padding: 12px 18px; border-radius: 18px; display: flex; align-items: center; gap: 10px;
        }
        .search-wrapper input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 14px; }
        
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px 30px; scrollbar-width: none; }
        .chip { padding: 10px 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; font-size: 11px; font-weight: 700; color: #64748b; white-space: nowrap; transition: 0.3s; cursor: pointer; }
        .chip.active { background: #fff; color: #000; border-color: #fff; }

        /* --- MODERN COURSE CARDS --- */
        .course-grid { padding: 0 20px; display: grid; gap: 25px; }
        .course-card { 
            background: linear-gradient(165deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%); 
            border: 1px solid var(--glass-border); 
            border-radius: 38px; position: relative; overflow: hidden;
            backdrop-filter: blur(15px); transition: 0.3s; animation: slideUp 0.6s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .course-img-container { width: 100%; height: 190px; position: relative; background: #0f172a; overflow: hidden; }
        .slide-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; display: block; transition: opacity 0.8s ease-in-out; }
        .slide-img.active { opacity: 1; }
        .img-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(1, 4, 9, 0.8)); }

        .m-badge {
            position: absolute; top: 18px; left: 18px; font-size: 9px; font-weight: 800;
            padding: 6px 14px; border-radius: 12px; text-transform: uppercase; z-index: 10;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
        }
        .bg-hot { background: rgba(244, 63, 94, 0.3); color: #fff; border-color: #f43f5e; box-shadow: 0 0 15px rgba(244, 63, 94, 0.4); }
        .bg-new { background: rgba(99, 102, 241, 0.3); color: #fff; border-color: #6366f1; box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
        .bg-trend { background: rgba(6, 182, 212, 0.3); color: #fff; border-color: #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }

        .card-body { padding: 22px 25px 28px; }
        .duration-info {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.05); padding: 5px 12px;
            border-radius: 10px; font-size: 11px; font-weight: 600;
            color: var(--accent); border: 1px solid var(--glass-border);
            margin-bottom: 12px;
        }

        .timer-strip {
            background: rgba(250, 204, 21, 0.05); color: var(--gold);
            padding: 10px; text-align: center; font-size: 10px; font-weight: 800;
            border-radius: 14px; margin-bottom: 18px; border: 1px solid rgba(250, 204, 21, 0.1);
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        .course-title { font-size: 19px; font-weight: 800; color: #fff; margin-bottom: 20px; }
        .price-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .price-info h2 { font-size: 26px; font-weight: 900; color: #fff; line-height: 1; }
        
        .old-price-pill { 
            font-size: 10px; font-weight: 800; color: #fff;
            padding: 4px 10px; border-radius: 8px; text-decoration: line-through;
            background: rgba(244, 63, 94, 0.2); border: 1px solid rgba(244, 63, 94, 0.3);
        }

        .action-group { display: flex; align-items: center; gap: 8px; }
        .enroll-btn { background: #fff; color: #000; padding: 12px 22px; border-radius: 16px; font-weight: 800; border: none; cursor: pointer; font-size: 13px; }
        .video-play-btn { width: 44px; height: 44px; background: rgba(255, 0, 0, 0.1); border: 1px solid rgba(255, 0, 0, 0.2); border-radius: 14px; color: #ff4d4d; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        /* --- VIDEO MODAL --- */
        .video-modal { position: fixed; inset: 0; background: #000; z-index: 4000; display: none; flex-direction: column; }
        .video-header { padding: 20px; display: flex; align-items: center; gap: 15px; background: #010409; }
        .video-container { flex: 1; display: flex; align-items: center; justify-content: center; }
        .video-container iframe { width: 100%; aspect-ratio: 16/9; border: none; }

        /* --- MODAL --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
        .modal-card { background: #0f172a; border: 1px solid var(--glass-border); border-radius: 35px; width: 100%; max-width: 400px; padding: 30px; }
        .submit-btn { width: 100%; background: var(--whatsapp); color: #fff; border: none; padding: 16px; border-radius: 18px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .bottom-nav { position: fixed; bottom: 25px; left: 25px; right: 25px; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border-radius: 35px; display: flex; justify-content: space-around; padding: 18px; border: 1px solid var(--glass-border); z-index: 1000; }
        .nav-link { color: rgba(255,255,255,0.2); font-size: 24px; }
        .nav-link.active { color: #fff; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="enrollModal">
        <div class="modal-card">
            <h2 style="margin-bottom:20px; color:var(--accent)">Secure Your Seat 🚀</h2>
            <input type="text" id="userName" placeholder="Full Name" style="width:100%; padding:14px; background:var(--glass); border:1px solid var(--glass-border); border-radius:12px; color:white; margin-bottom:15px">
            <input type="tel" id="userPhone" placeholder="WhatsApp Number" style="width:100%; padding:14px; background:var(--glass); border:1px solid var(--glass-border); border-radius:12px; color:white; margin-bottom:15px">
            <button class="submit-btn" onclick="sendToWhatsapp()"><i class="ri-whatsapp-fill"></i> Send Request</button>
            <p onclick="closeModal()" style="text-align:center; margin-top:15px; font-size:12px; color:#64748b; cursor:pointer;">Close</p>
        </div>
    </div>

    <div class="video-modal" id="videoModal">
        <div class="video-header"><i class="ri-arrow-left-line" style="font-size:24px" onclick="closeVideo()"></i> <span id="videoTitle">Elite Lecture</span></div>
        <div class="video-container" id="ytPlayerContainer"></div>
    </div>

    <div class="app-bar">
        <div class="brand">ELITE <span>TERMINAL</span></div>
        <div class="user-pill"><i class="ri-user-6-line"></i></div>
    </div>

    <div class="carousel-container">
        <div class="carousel-track" id="carouselTrack">
            <div class="carousel-slide slide-1">
                <h2>Premium Tech <br>Developer Program</h2>
                <p>Learn from industry experts</p>
                <i class="ri-code-s-slash-line"></i>
            </div>
            <div class="carousel-slide slide-2">
                <h2>Master Modern <br>Cyber Security</h2>
                <p>Protect the digital frontier</p>
                <i class="ri-shield-check-line"></i>
            </div>
            <div class="carousel-slide slide-3">
                <h2>Elite Trading <br>Algorithms</h2>
                <p>Market mastery awaits</p>
                <i class="ri-stock-line"></i>
            </div>
        </div>
        <div class="carousel-dots" id="carouselDots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="search-container">
        <div class="search-wrapper">
            <i class="ri-search-2-line" style="color:var(--accent)"></i>
            <input type="text" id="courseSearch" placeholder="Search elite programs..." onkeyup="filterCourses()">
        </div>
    </div>

    <div class="course-grid" id="course-grid"></div>

    <nav class="bottom-nav">
        <a href="#" class="nav-link active"><i class="ri-home-5-fill"></i></a>
        <a href="#" class="nav-link"><i class="ri-compass-3-fill"></i></a>
        <a href="#" class="nav-link"><i class="ri-user-settings-fill"></i></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allCourses = [];

        // TOP CAROUSEL LOGIC
        let currentSlide = 0;
        const track = document.getElementById('carouselTrack');
        const dots = document.querySelectorAll('.dot');
        
        setInterval(() => {
            currentSlide = (currentSlide + 1) % 3;
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
            dots.forEach((d, i) => d.className = i === currentSlide ? 'dot active' : 'dot');
        }, 4000);

        function extractYouTubeId(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        window.playVideo = (title, videoId) => {
            document.getElementById('videoTitle').innerText = title;
            document.getElementById('ytPlayerContainer').innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            document.getElementById('videoModal').style.display = 'flex';
        };

        window.closeVideo = () => {
            document.getElementById('ytPlayerContainer').innerHTML = '';
            document.getElementById('videoModal').style.display = 'none';
        };

        window.openEnroll = (name) => { document.getElementById('enrollModal').style.display = 'flex'; };
        window.closeModal = () => { document.getElementById('enrollModal').style.display = 'none'; };

        onSnapshot(collection(db, "courses"), (snap) => {
            allCourses = [];
            snap.forEach(d => allCourses.push({ id: d.id, ...d.data() }));
            renderCourses(allCourses);
        });

        function renderCourses(data) {
            const grid = document.getElementById('course-grid');
            grid.innerHTML = data.map((c, index) => {
                const videoId = extractYouTubeId(c.ytLink); 
                const bClass = c.tag?.toLowerCase().includes('hot') ? 'bg-hot' : c.tag?.toLowerCase().includes('new') ? 'bg-new' : 'bg-trend';
                const images = c.image ? c.image.split(',') : [];

                return `
                    <div class="course-card">
                        ${c.tag ? `<div class="m-badge ${bClass}">${c.tag}</div>` : ''}
                        <div class="course-img-container" id="slider-${c.id}">
                            ${images.map((img, i) => `<img src="${img.trim()}" class="slide-img ${i === 0 ? 'active' : ''}">`).join('')}
                            <div class="img-overlay"></div>
                        </div>
                        <div class="card-body">
                            <h3 class="course-title">${c.name}</h3>
                            <div class="price-row">
                                <div class="price-info">
                                    ${c.oldPrice ? `<div class="old-price-pill">₹${c.oldPrice}</div>` : ''}
                                    <h2>₹${c.newPrice}</h2>
                                </div>
                                <div class="action-group">
                                    ${videoId ? `<div class="video-play-btn" onclick="playVideo('${c.name}', '${videoId}')"><i class="ri-play-fill"></i></div>` : ''}
                                    <button class="enroll-btn" onclick="openEnroll('${c.name}')">Enroll Now</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            }).join('');

            data.forEach(c => {
                const imgs = c.image ? c.image.split(',') : [];
                if(imgs.length > 1) startMiniSlider(`slider-${c.id}`);
            });
        }

        function startMiniSlider(containerId) {
            let current = 0;
            setInterval(() => {
                const container = document.getElementById(containerId);
                if(!container) return;
                const imgs = container.querySelectorAll('.slide-img');
                imgs[current].classList.remove('active');
                current = (current + 1) % imgs.length;
                imgs[current].classList.add('active');
            }, 3000);
        }

        window.filterCourses = () => {
            const q = document.getElementById('courseSearch').value.toLowerCase();
            renderCourses(allCourses.filter(c => c.name.toLowerCase().includes(q)));
        };
    </script>
</body>
</html>
