<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Student Management</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body {
            background: #020617;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .student-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .student-info { flex-grow: 1; }
        .student-info h4 { margin: 0 0 10px 0; font-size: 16px; color: #6366f1; }
        
        /* New Edit Group Styles */
        .edit-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 10px; color: #94a3b8; text-transform: uppercase; }
        
        .admin-input { 
            background: #020617; 
            border: 1px solid #1e293b; 
            color: white; 
            padding: 6px 10px; 
            border-radius: 6px; 
            font-size: 13px;
        }
        .xp-input { width: 70px; color: #fbbf24; font-weight: bold; }
        .name-input { width: 140px; }
        .phone-input { width: 130px; }

        .save-all-btn { 
            background: #22c55e; 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: bold;
            margin-top: 15px;
        }
        .save-all-btn:hover { background: #16a34a; }

        .actions { display: flex; flex-direction: column; gap: 10px; align-items: flex-end; margin-left: 20px; }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .delete-btn:hover { background: #dc2626; }
        
        .loading { text-align: center; margin-top: 50px; color: #6366f1; }
    </style>
</head>
<body>

    <div class="header">
        <h2><i class="ri-admin-line"></i> Student Admin</h2>
        <span id="count" style="background: #1e293b; padding: 5px 12px; border-radius: 20px; font-size: 12px;">0 Students</span>
    </div>

    <div id="studentList">
        <div class="loading">Loading students...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, deleteDoc, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. Real-time Students Fetching (Updated to include Name & Phone inputs)
        function loadStudents() {
            onSnapshot(collection(db, "students"), (snapshot) => {
                const listDiv = document.getElementById("studentList");
                listDiv.innerHTML = ""; 
                document.getElementById("count").innerText = `${snapshot.size} Students`;

                if (snapshot.empty) {
                    listDiv.innerHTML = "<p style='text-align:center; opacity:0.5;'>No students found.</p>";
                    return;
                }

                snapshot.forEach((studentDoc) => {
                    const data = studentDoc.data();
                    const studentId = studentDoc.id;

                    const card = document.createElement("div");
                    card.className = "student-card";
                    card.innerHTML = `
                        <div class="student-info">
                            <h4>ID: ${studentId}</h4>
                            <div class="edit-row">
                                <div class="input-group">
                                    <label>Name</label>
                                    <input type="text" id="name-${studentId}" class="admin-input name-input" value="${data.name || ''}" placeholder="Student Name">
                                </div>
                                <div class="input-group">
                                    <label>Phone</label>
                                    <input type="text" id="phone-${studentId}" class="admin-input phone-input" value="${data.phoneNumber || ''}" placeholder="Phone Number">
                                </div>
                                <div class="input-group">
                                    <label>XP</label>
                                    <input type="number" id="xp-${studentId}" class="admin-input xp-input" value="${data.xp || 0}">
                                </div>
                            </div>
                            <button class="save-all-btn" onclick="updateStudent('${studentId}')">
                                <i class="ri-save-line"></i> Save Changes
                            </button>
                        </div>
                        <div class="actions">
                            <p style="font-size:11px; color:#94a3b8;">🔥 Streak: ${data.streak || 0}</p>
                            <button class="delete-btn" onclick="deleteStudent('${studentId}')">
                                <i class="ri-delete-bin-line"></i> Delete
                            </button>
                        </div>
                    `;
                    listDiv.appendChild(card);
                });
            });
        }

        // 2. Delete Logic (Intact)
        window.deleteStudent = async (id) => {
            const confirmDelete = confirm(`Are you sure you want to delete ${id}? This cannot be undone!`);
            if (confirmDelete) {
                try {
                    await deleteDoc(doc(db, "students", id));
                    alert("Student deleted successfully!");
                } catch (error) {
                    alert("Failed to delete student.");
                }
            }
        };

        // 3. Updated Save Logic (Handles Name, Phone, and XP)
        window.updateStudent = async (id) => {
            const newName = document.getElementById(`name-${id}`).value;
            const newPhone = document.getElementById(`phone-${id}`).value;
            const newXP = parseInt(document.getElementById(`xp-${id}`).value);
            
            if(isNaN(newXP)) return alert("Please enter a valid number for XP");
            
            try {
                await updateDoc(doc(db, "students", id), { 
                    name: newName,
                    phoneNumber: newPhone,
                    xp: newXP 
                });
                alert(`Data updated for ${id}!`);
            } catch (e) {
                alert("Error updating: " + e.message);
            }
        };

        loadStudents();
    </script>
</body>
</html>
