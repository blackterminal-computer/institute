<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin V2.0 | Black Terminal</title>
    <style>
        :root { --bg: #020617; --accent: #6366f1; --glass: #0f172a; --danger: #ef4444; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid #334155; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #020617; border: 1px solid #334155; color: white; border-radius: 10px; box-sizing: border-box; }
        button { padding: 12px; border: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .blog-item { background: #1e293b; padding: 15px; border-radius: 15px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Admin V2.0</h2>
        <input id="title" placeholder="Blog Title">
        <input id="tags" placeholder="Tags (e.g. Coding, Firebase)">
        <div id="paraContainer"><textarea class="para" rows="3" placeholder="Paragraph 1"></textarea></div>
        <button onclick="addPara()" style="background:#334155;">+ Add Paragraph</button>
        <input type="datetime-local" id="scheduleDate">
        <button onclick="publish('published')" style="background:var(--accent);">PUBLISH LIVE</button>
        <button onclick="publish('draft')" style="background:#475569;">SAVE DRAFT</button>
        <div id="adminBlogList"></div>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        // --- Auto-Save V2.0 ---
        const titleInput = document.getElementById('title');
        titleInput.addEventListener('input', () => localStorage.setItem('tempTitle', titleInput.value));
        window.onload = () => { if(localStorage.getItem('tempTitle')) titleInput.value = localStorage.getItem('tempTitle'); };

        window.addPara = () => {
            const ta = document.createElement('textarea'); ta.className = 'para'; ta.rows = 3; ta.placeholder = "Next Paragraph..."; 
            document.getElementById('paraContainer').appendChild(ta);
        };

        window.publish = async (status) => {
            const title = titleInput.value;
            const content = Array.from(document.querySelectorAll('.para')).map(t => t.value).filter(v => v !== "");
            const tags = document.getElementById("tags").value.split(',').map(t => t.trim()).filter(t => t !== "");
            const schedule = document.getElementById("scheduleDate").value;
            
            await addDoc(collection(db, "blogs"), { 
                title, content, tags, status, 
                views: 0, // V2.0 Performance Tracker
                publishAt: new Date(schedule || new Date()), 
                createdAt: new Date() 
            });
            localStorage.removeItem('tempTitle');
            alert("Blog status: " + status); location.reload();
        };

        window.toggleVisibility = async (id, currentStatus) => {
            await updateDoc(doc(db, "blogs", id), { status: (currentStatus === 'published' ? 'draft' : 'published') });
        };

        window.deleteBlog = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "blogs", id)); };

        onSnapshot(query(collection(db, "blogs"), orderBy("createdAt", "desc")), (snap) => {
            const list = document.getElementById("adminBlogList"); list.innerHTML = "";
            snap.forEach(doc => {
                const b = doc.data();
                list.innerHTML += `<div class="blog-item">
                    <span>${b.title} <b>(${b.status})</b></span>
                    <div>
                        <button onclick="toggleVisibility('${doc.id}', '${b.status}')" style="background:${b.status==='published'?'#22c55e':'#64748b'}; font-size:10px;">${b.status==='published'?'HIDE':'SHOW'}</button>
                        <button onclick="deleteBlog('${doc.id}')" style="background:#ef4444; font-size:10px;">DEL</button>
                    </div>
                </div>`;
            });
        });
    </script>
</body>
</html>
