<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin V2.1 | Black Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; padding: 40px 20px; }
        .box { max-width: 500px; margin: auto; background: var(--glass); backdrop-filter: blur(20px); padding: 30px; border-radius: 24px; border: 1px solid var(--border); }
        
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 25px; }
        input, textarea { width: 100%; padding: 14px; margin: 8px 0; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; border-radius: 12px; box-sizing: border-box; outline: none; }
        button { padding: 12px; border: none; color: white; border-radius: 12px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 8px; transition: 0.3s; }
        
        .blog-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 16px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .btn-small { width: auto; padding: 6px 12px; font-size: 10px; margin-left: 5px; }
        .bulk-section { margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="box">
        <h2>Admin Console v2.1</h2>
        <input id="title" placeholder="Blog Title">
        <input id="tags" placeholder="Tags (e.g. Coding, Firebase)">
        <div id="paraContainer"><textarea class="para" rows="3" placeholder="Paragraph 1"></textarea></div>
        <button onclick="addPara()" style="background:#1e293b;">+ Add Paragraph</button>
        <input type="datetime-local" id="scheduleDate">
        <button onclick="publish('published')" style="background:#6366f1;">PUBLISH LIVE</button>
        <button onclick="publish('draft')" style="background:#334155;">SAVE DRAFT</button>
        
        <div class="bulk-section">
            <input id="bulkTagInput" placeholder="Tag to toggle all posts...">
            <button onclick="bulkToggle()" style="background:#ef4444;">TOGGLE ALL BY TAG</button>
        </div>

        <div id="adminBlogList"></div>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        // --- Auto-Save V2.0 ---
        const titleInput = document.getElementById('title');
        titleInput.addEventListener('input', () => localStorage.setItem('tempTitle', titleInput.value));
        window.onload = () => { if(localStorage.getItem('tempTitle')) titleInput.value = localStorage.getItem('tempTitle'); };

        window.addPara = () => {
            const ta = document.createElement('textarea'); ta.className = 'para'; ta.rows = 3; ta.placeholder = "Next Paragraph..."; 
            document.getElementById('paraContainer').appendChild(ta);
        };

        window.publish = async (status) => {
            const title = titleInput.value;
            const content = Array.from(document.querySelectorAll('.para')).map(t => t.value).filter(v => v !== "");
            const tags = document.getElementById("tags").value.split(',').map(t => t.trim()).filter(t => t !== "");
            const schedule = document.getElementById("scheduleDate").value;
            
            await addDoc(collection(db, "blogs"), { 
                title, content, tags, status, 
                views: 0, 
                publishAt: new Date(schedule || new Date()), 
                createdAt: new Date() 
            });
            localStorage.removeItem('tempTitle');
            alert("Blog status: " + status); location.reload();
        };

        // --- Bulk Toggle Logic ---
        window.bulkToggle = async () => {
            const tag = document.getElementById("bulkTagInput").value.trim();
            if(!tag) return alert("Enter a tag!");
            const snapshot = await getDocs(query(collection(db, "blogs")));
            const batch = writeBatch(db);
            let count = 0;
            snapshot.forEach((doc) => {
                const data = doc.data();
                if(data.tags && data.tags.includes(tag)) {
                    batch.update(doc.ref, { status: data.status === 'published' ? 'draft' : 'published' });
                    count++;
                }
            });
            await batch.commit();
            alert(`Toggled ${count} posts for tag: ${tag}`);
            location.reload();
        };

        window.toggleVisibility = async (id, currentStatus) => {
            await updateDoc(doc(db, "blogs", id), { status: (currentStatus === 'published' ? 'draft' : 'published') });
        };

        window.deleteBlog = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "blogs", id)); };

        onSnapshot(query(collection(db, "blogs"), orderBy("createdAt", "desc")), (snap) => {
            const list = document.getElementById("adminBlogList"); list.innerHTML = "";
            snap.forEach(doc => {
                const b = doc.data();
                list.innerHTML += `<div class="blog-item">
                    <span style="font-size:12px;">${b.title} <b>(${b.status})</b></span>
                    <div>
                        <button class="btn-small" onclick="toggleVisibility('${doc.id}', '${b.status}')" style="background:${b.status==='published'?'#22c55e':'#64748b'};">H/S</button>
                        <button class="btn-small" onclick="deleteBlog('${doc.id}')" style="background:#ef4444;">DEL</button>
                    </div>
                </div>`;
            });
        });
    </script>
</body>
</html>
