<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Terminal | Mobile</title>
    <style>
        :root { --primary: #6366f1; --danger: #ef4444; --bg: #020617; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        input, textarea { width: 100%; padding: 15px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: var(--primary); border: none; color: white; border-radius: 12px; font-weight: 800; font-size: 14px; margin-top: 10px; cursor: pointer; }
        .blog-item { background: #1e293b; padding: 15px; border-radius: 16px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: var(--danger); width: auto; padding: 10px 15px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="font-size: 20px;">Admin Panel</h2>
        <input id="title" placeholder="Blog Title">
        <div id="paraContainer"><textarea class="para" rows="3" placeholder="Paragraph 1"></textarea></div>
        <button onclick="addPara()" style="background:#334155;">+ Add Paragraph</button>
        <button onclick="publish()">PUBLISH POST</button>
        
        <h3 style="margin-top: 30px;">Manage Logs</h3>
        <div id="adminBlogList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Firebase Init
        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        window.addPara = () => {
            const ta = document.createElement('textarea');
            ta.className = 'para'; ta.rows = 3; ta.placeholder = "Next Paragraph...";
            document.getElementById('paraContainer').appendChild(ta);
        };

        window.publish = async () => {
            const title = document.getElementById("title").value;
            const content = Array.from(document.querySelectorAll('.para')).map(t => t.value).filter(v => v !== "");
            if(!title) return alert("Title daalo!");
            await addDoc(collection(db, "blogs"), { title, content, createdAt: serverTimestamp() });
            alert("Published!"); location.reload();
        };

        window.deleteBlog = async (id) => {
            if(confirm("Delete karna hai?")) await deleteDoc(doc(db, "blogs", id));
        };

        const q = query(collection(db, "blogs"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById("adminBlogList");
            list.innerHTML = "";
            snap.forEach(doc => {
                const b = doc.data();
                list.innerHTML += `<div class="blog-item">
                    <span style="font-size:14px; font-weight:600;">${b.title}</span>
                    <button class="del-btn" onclick="deleteBlog('${doc.id}')">DELETE</button>
                </div>`;
            });
        });
    </script>
</body>
</html>
