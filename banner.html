<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Admin Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #06b6d4; --bg: #020617; --card: rgba(255,255,255,0.03); }
        body { background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .admin-card { width: 100%; max-width: 500px; background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; max-width: 500px; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: var(--card); color: white; cursor: pointer; font-weight: 700; font-size: 10px; text-transform: uppercase; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); border-color: var(--primary); }
        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 10px; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 14px; box-sizing: border-box; outline: none; }
        textarea { height: 70px; resize: none; }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .save-btn { background: var(--primary); }
        .slider-btn { background: #f59e0b; }
        .xp-btn { background: #22c55e; }
        #statusMsg { margin-top: 20px; font-size: 13px; text-align: center; font-weight: 800; text-transform: uppercase; }
        .hidden { display: none; }
    </style>
</head>
<body>

<h2 style="margin-bottom: 25px; font-weight: 800;"><i class="ri-shield-user-line"></i> SYSTEM ADMIN</h2>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('slider')">Slider</button>
    <button class="tab-btn" onclick="showTab('banner')">Banner</button>
    <button class="tab-btn" onclick="showTab('system')">News</button>
    <button class="tab-btn" onclick="showTab('students')">XP Boost</button>
</div>

<div id="sliderTab" class="admin-card">
    <div class="input-group"><label>Slider Images (URLs)</label><textarea id="sliderUrls" placeholder="url1, url2..."></textarea></div>
    <div class="input-group"><label>Slider Titles</label><textarea id="sliderTitles" placeholder="title1, title2..."></textarea></div>
    <div class="input-group"><label>Slider Links</label><textarea id="sliderLinks" placeholder="link1.html, link2.html..."></textarea></div>
    <button class="slider-btn" id="saveSlider">UPDATE SLIDER</button>
</div>

<div id="bannerTab" class="admin-card hidden">
    <div class="input-group"><label>Banner Status</label><select id="status"><option value="on">Active</option><option value="off">Inactive</option></select></div>
    <div class="input-group"><label>Image URL</label><input type="text" id="imgUrl"></div>
    <div class="input-group"><label>Main Title</label><input type="text" id="title"></div>
    <div class="input-group"><label>Tag</label><input type="text" id="tag"></div>
    <div class="input-group"><label>Link</label><input type="text" id="link"></div>
    <button class="save-btn" id="saveBanner">UPDATE DASHBOARD</button>
</div>

<div id="systemTab" class="admin-card hidden">
    <div class="input-group"><label>Marquee Message</label><input type="text" id="marqueeText"></div>
    <button class="save-btn" id="saveMarquee">UPDATE NEWSFEED</button>
</div>

<div id="studentsTab" class="admin-card hidden">
    <div class="input-group"><label>Select Student</label><select id="targetStudent"><option>Loading...</option></select></div>
    <div class="input-group"><label>XP Amount</label><input type="number" id="xpAmount"></div>
    <button class="xp-btn" id="saveXP">GIVE XP REWARD ⚡</button>
</div>

<div id="statusMsg"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const msg = document.getElementById('statusMsg');

    window.showTab = (tab) => {
        document.querySelectorAll('.admin-card').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.remove('hidden');
        event.currentTarget.classList.add('active');
        msg.innerText = "";
    };

    async function loadData() {
        const qSnap = await getDocs(collection(db, "students"));
        const studentSelect = document.getElementById('targetStudent');
        studentSelect.innerHTML = '<option value="">-- Choose --</option>';
        qSnap.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.id; opt.innerText = d.id;
            studentSelect.appendChild(opt);
        });

        const sSnap = await getDoc(doc(db, "settings", "slider"));
        if(sSnap.exists()){
            const d = sSnap.data();
            document.getElementById('sliderUrls').value = d.images || '';
            document.getElementById('sliderTitles').value = d.titles || '';
            document.getElementById('sliderLinks').value = d.links || '';
        }

        const bSnap = await getDoc(doc(db, "settings", "offer"));
        if(bSnap.exists()){
            const d = bSnap.data();
            document.getElementById('status').value = d.status || 'off';
            document.getElementById('imgUrl').value = d.image || '';
            document.getElementById('title').value = d.title || '';
            document.getElementById('tag').value = d.tag || '';
            document.getElementById('link').value = d.link || '';
        }

        const mSnap = await getDoc(doc(db, "settings", "marquee"));
        if(mSnap.exists()) document.getElementById('marqueeText').value = mSnap.data().msg;
    }

    function showConfirm(text, isError = false) {
        msg.innerText = text;
        msg.style.color = isError ? "#ef4444" : "#22c55e";
        setTimeout(() => { msg.innerText = ""; }, 3000);
    }

    document.getElementById('saveSlider').onclick = async () => {
        msg.innerText = "Syncing Slider...";
        try {
            await setDoc(doc(db, "settings", "slider"), {
                images: document.getElementById('sliderUrls').value,
                titles: document.getElementById('sliderTitles').value,
                links: document.getElementById('sliderLinks').value
            });
            showConfirm("✅ SLIDER UPDATED");
        } catch(e) { showConfirm("❌ ERROR", true); }
    };

    document.getElementById('saveBanner').onclick = async () => {
        try {
            await setDoc(doc(db, "settings", "offer"), {
                status: document.getElementById('status').value,
                image: document.getElementById('imgUrl').value,
                title: document.getElementById('title').value,
                tag: document.getElementById('tag').value,
                link: document.getElementById('link').value
            });
            showConfirm("✅ BANNER UPDATED");
        } catch(e) { showConfirm("❌ ERROR", true); }
    };

    document.getElementById('saveMarquee').onclick = async () => {
        try {
            await setDoc(doc(db, "settings", "marquee"), { msg: document.getElementById('marqueeText').value });
            showConfirm("✅ NEWS UPDATED");
        } catch(e) { showConfirm("❌ FAILED", true); }
    };

    document.getElementById('saveXP').onclick = async () => {
        const s = document.getElementById('targetStudent').value;
        const a = parseInt(document.getElementById('xpAmount').value);
        if(!s || !a) return showConfirm("Fill All Fields", true);
        try {
            await updateDoc(doc(db, "students", s), { xp: increment(a) });
            showConfirm(`✅ ${a} XP GIVEN`);
        } catch(e) { showConfirm("❌ FAILED", true); }
    };

    loadData();
</script>
</body>
</html>
