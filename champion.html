<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Battleground</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        body { background: #0f172a; color: white; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .hero { text-align: center; margin: 40px 0; }
        .participate-btn { background: #06b6d4; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        .participate-btn:hover { background: #0891b2; transform: scale(1.05); }

        .list-container { width: 100%; max-width: 400px; margin-top: 30px; }
        .player-card { display: flex; align-items: center; background: #1e293b; padding: 10px 20px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #334155; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 15px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>BATTLE ARENA</h1>
        <button class="participate-btn" onclick="joinArena()">I WANT TO PARTICIPATE</button>
    </div>

    <div class="list-container" id="participant-list">
        </div>

    <script>
        function joinArena() {
            const name = prompt("Enter your Warrior Name:");
            if (!name) return;

            // Create new participant HTML elements
            const list = document.getElementById('participant-list');
            const card = document.createElement('div');
            card.className = 'player-card';

            const imgUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=06b6d4&color=fff`;
            
            card.innerHTML = `
                <img src="${imgUrl}" class="avatar">
                <span>${name}</span>
            `;

            list.appendChild(card);
        }
    </script>
</body>
</html>
