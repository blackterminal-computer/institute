<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        :root { --neon: #06b6d4; --bg: #020617; --card: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; padding: 20px; }
        .card { background: var(--card); border: 1px solid #1e293b; border-radius: 20px; padding: 30px; text-align: center; }
        .enter-btn { background: var(--neon); color: #000; padding: 20px 40px; border-radius: 15px; font-weight: 900; font-size: 1.2rem; cursor: pointer; border: none; }
        .hidden { display: none; }
        
        /* Lobby Grid */
        .lobby-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 20px; }
        .player-card { background: #1e293b; padding: 10px; border-radius: 12px; text-align: center; }
        .player-card img { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 5px; border: 2px solid var(--neon); }
    </style>
</head>
<body>

    <div id="start-screen" class="card">
        <h1>ARENA LEGEND</h1>
        <button class="enter-btn" onclick="startArena()">ENTER ARENA</button>
    </div>

    <div id="game-ui" class="hidden">
        <div class="card">
            <h3>ACTIVE WARRIORS</h3>
            <div id="lobby-list" class="lobby-grid"></div>
        </div>
        <div class="card" style="margin-top:20px;">
            <div id="q-box" style="font-size:1.3rem;"></div>
            <div id="opt-box" style="display:grid; gap:10px; margin-top:20px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.x/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.x/firebase-firestore.js";

        const app = initializeApp({/* Firebase Config Here */});
        const db = getFirestore(app);

        window.startArena = () => {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            loadLobby();
        };

        function loadLobby() {
            onSnapshot(doc(db, "tournaments", "active_arena"), (snap) => {
                const data = snap.data();
                if(data && data.participants) {
                    document.getElementById('lobby-list').innerHTML = data.participants.map(p => `
                        <div class="player-card">
                            <img src="${p.photoUrl || 'https://via.placeholder.com/60'}" alt="profile">
                            <div style="font-size:0.9rem;">${p.name}</div>
                        </div>
                    `).join('');
                }
            });
        }
    </script>
</body>
</html>
