<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Arena Battleground</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        body { background: #020617; color: white; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .hero { text-align: center; margin-bottom: 20px; }
        .list-container, .chat-container { width: 100%; max-width: 400px; background: rgba(30, 41, 59, 0.5); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .player-card { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #334155; }
        .xp-badge { color: #fbbf24; font-weight: 900; margin-left: auto; }
        #chat-box { height: 150px; overflow-y: scroll; margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>BATTLE ARENA</h1>
        <button onclick="joinArena()" style="padding: 15px 30px; border-radius: 30px; border:none; background:#06b6d4; color:white; font-weight:900;">JOIN BATTLE</button>
    </div>

    <div class="list-container">
        <h3>Leaderboard</h3>
        <div id="participant-list"></div>
    </div>

    <div class="chat-container">
        <h3>Live Arena Chat</h3>
        <div id="chat-box"></div>
        <input type="text" id="chat-input" placeholder="Say something..." style="width: 70%; padding: 8px;">
        <button onclick="sendMessage()">Send</button>
    </div>

    

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = { /* APKA FIREBASE CONFIG YAHAN DALEIN */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        // Join Logic
        window.joinArena = async () => {
            const name = prompt("Enter your Warrior Name:");
            if (!name) return;
            localStorage.setItem('warriorName', name);
            await addDoc(collection(db, "participants"), { name, xp: 0, timestamp: Date.now() });
        };

        // Chat Logic
        window.sendMessage = () => {
            const msg = document.getElementById('chat-input').value;
            const name = localStorage.getItem('warriorName') || "Guest";
            push(ref(rtdb, 'chats'), { name, msg });
            document.getElementById('chat-input').value = "";
        };

        // Sync Chat
        onValue(ref(rtdb, 'chats'), (snapshot) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snapshot.forEach(child => {
                const data = child.val();
                box.innerHTML += `<p><b>${data.name}:</b> ${data.msg}</p>`;
            });
        });
    </script>
</body>
</html>
