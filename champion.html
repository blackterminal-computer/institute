<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Arena Legend</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        :root { --gold: #fbbf24; --silver: #94a3b8; --bronze: #b45309; --neon: #06b6d4; }
        
        body { background: radial-gradient(circle at center, #1e1b4b, #020617); color: white; font-family: 'Outfit', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* Festival Podium */
        .podium-container { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin: 40px 0; width: 100%; max-width: 400px; }
        .podium-box { background: rgba(255,255,255,0.08); border-radius: 15px; padding: 15px; text-align: center; flex: 1; border: 1px solid rgba(255,255,255,0.1); }
        .p-1 { height: 160px; border-bottom: 5px solid var(--gold); }
        .p-2 { height: 120px; border-bottom: 5px solid var(--silver); }
        .p-3 { height: 90px; border-bottom: 5px solid var(--bronze); }
        .avatar { width: 55px; height: 55px; border-radius: 50%; border: 3px solid var(--neon); margin-bottom: 10px; }

        /* Action Card */
        .action-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid var(--neon); padding: 30px; border-radius: 30px; text-align: center; width: 90%; max-width: 350px; }
        .enter-btn { background: linear-gradient(to right, #06b6d4, #3b82f6); color: white; padding: 18px 40px; font-weight: 900; font-size: 1.2rem; border-radius: 50px; border: none; cursor: pointer; transition: 0.3s; width: 100%; }
        
        /* Participant List */
        .list-container { width: 90%; max-width: 350px; margin-top: 30px; }
        .player-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 20px; margin-bottom: 10px; }
        .xp-tag { color: var(--gold); font-weight: 900; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1 style="color: var(--neon); text-align: center;">WEEKLY FESTIVAL</h1>

    <div class="podium-container">
        <div class="podium-box p-2">🥈<br><img class="avatar" src="https://via.placeholder.com/60"></div>
        <div class="podium-box p-1">🥇<br><img class="avatar" src="https://via.placeholder.com/60"></div>
        <div class="podium-box p-3">🥉<br><img class="avatar" src="https://via.placeholder.com/60"></div>
    </div>

    <div class="action-card">
        <button class="enter-btn">ENTER NOW</button>
        <p style="margin-top:20px; font-size: 0.8rem; opacity: 0.7;">Weekly Prize Pool: 6000 XP</p>
    </div>

    <div class="list-container">
        <h3 style="margin-bottom: 15px;">Live Participants</h3>
        <div class="player-row">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://via.placeholder.com/40" style="border-radius:50%">
                <span>Warrior Name</span>
            </div>
            <div class="xp-tag">+100 XP</div>
        </div>
    </div>

</body>
</html>
