<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Legend Festival</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        :root { --gold: #fbbf24; --silver: #94a3b8; --bronze: #b45309; --neon: #06b6d4; --glass: rgba(255, 255, 255, 0.08); }
        
        body { background: #020617; color: white; font-family: 'Outfit', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }

        /* Podium Layout - Responsive */
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 10px; margin: 30px 0; width: 100%; max-width: 400px; }
        .p-box { background: var(--glass); backdrop-filter: blur(10px); padding: 15px; border-radius: 15px; text-align: center; flex: 1; }
        .p-1 { border-bottom: 4px solid var(--gold); height: 160px; }
        .p-2 { border-bottom: 4px solid var(--silver); height: 120px; }
        .p-3 { border-bottom: 4px solid var(--bronze); height: 90px; }

        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--neon); margin-bottom: 8px; }

        /* Winner Cards */
        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 20px; width: 90%; max-width: 350px; margin-bottom: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .enter-btn { background: linear-gradient(to right, #06b6d4, #3b82f6); color: white; padding: 18px 40px; border-radius: 50px; font-weight: 900; border: none; cursor: pointer; width: 100%; }

        .reward-tag { background: var(--neon); color: black; padding: 4px 12px; border-radius: 20px; font-weight: 900; font-size: 0.8rem; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>

    <h1 style="color: var(--neon); margin: 20px 0;">WEEKLY ARENA</h1>

    <div class="podium">
        <div class="p-box p-2">🥈<br><img class="avatar" src="https://via.placeholder.com/50"><br>User 2</div>
        <div class="p-box p-1">🥇<br><img class="avatar" src="https://via.placeholder.com/50"><br>User 1</div>
        <div class="p-box p-3">🥉<br><img class="avatar" src="https://via.placeholder.com/50"><br>User 3</div>
    </div>

    <button class="enter-btn">ENTER NOW</button>

    <h3 style="margin: 30px 0 15px 0;">Live Warriors</h3>
    
    <div class="card">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="https://via.placeholder.com/50" class="avatar" style="width:40px; height:40px;">
                <span>Warrior Name</span>
            </div>
            <div class="reward-tag">3000 XP</div>
        </div>
    </div>

</body>
</html>
