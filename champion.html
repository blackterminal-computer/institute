<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        :root { --neon: #06b6d4; --bg: #020617; --card: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; padding: 20px; }
        .card { background: var(--card); border: 1px solid #1e293b; border-radius: 20px; padding: 30px; text-align: center; }
        .enter-btn { background: var(--neon); color: #000; padding: 20px 40px; border-radius: 15px; font-weight: 900; font-size: 1.2rem; cursor: pointer; border: none; }
        .hidden { display: none; }
        #game-ui { display: grid; gap: 20px; }
        .btn { background: #1e293b; border: 1px solid var(--neon); color: white; padding: 15px; border-radius: 10px; cursor: pointer; }
        .btn:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body>

    <div id="start-screen" class="card">
        <h1>ARENA LEGEND</h1>
        <button class="enter-btn" onclick="startArena()">ENTER ARENA</button>
    </div>

    <div id="game-ui" class="hidden">
        <div class="card">
            <div id="q-box" style="font-size:1.3rem; margin-bottom:20px;"></div>
            <div id="opt-box" style="display:grid; gap:10px;"></div>
        </div>
    </div>

    <script type="module">
        // Firebase Config (Replace with your actual keys)
        const questions = [
            { q: "Computer ka brain kise kaha jata hai?", opts: ["CPU", "RAM"], a: "CPU" },
            { q: "HTML web page banane ke liye hota hai?", opts: ["True", "False"], a: "True" }
        ];

        let level = 0;

        window.startArena = () => {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            renderQuestion();
        };

        function renderQuestion() {
            const data = questions[level];
            document.getElementById('q-box').innerText = data.q;
            const optBox = document.getElementById('opt-box');
            optBox.innerHTML = "";
            data.opts.forEach(o => {
                const b = document.createElement('button');
                b.className = "btn";
                b.innerText = o;
                b.onclick = () => {
                    if(o === data.a) {
                        level++;
                        if(level < questions.length) renderQuestion();
                        else alert("ARENA CONQUERED!");
                    } else { alert("WRONG!"); }
                };
                optBox.appendChild(b);
            });
        }
    </script>
</body>
</html>
