<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Arena Royale</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        :root { --neon: #06b6d4; --bg: #020617; --glass: rgba(30, 41, 59, 0.7); }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* High-End Glass Cards */
        .card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 20px; width: 100%; max-width: 400px; margin-bottom: 20px; text-align: center; }
        .btn { background: linear-gradient(90deg, #06b6d4, #3b82f6); border: none; padding: 15px 30px; border-radius: 50px; color: white; font-weight: 900; cursor: pointer; width: 100%; }
        
        /* Participant List Style */
        .player-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--neon); }
        .status-tag { font-size: 0.75rem; padding: 4px 8px; border-radius: 6px; background: rgba(6, 182, 212, 0.2); }
        .eliminated { color: #f43f5e; background: rgba(244, 63, 94, 0.2); }
    </style>
</head>
<body>

    <div class="card">
        <h1 style="color: var(--neon);">BATTLE ARENA</h1>
        <button id="start-btn" class="btn" onclick="startBattle()">JOIN BATTLE</button>
        <div id="game-box" style="display:none;">
            <p id="q-box" style="font-size: 1.1rem;"></p>
            <input type="text" id="ans-box" style="width: 80%; padding: 10px; border-radius: 8px; border: none; margin-bottom: 10px;">
            <button class="btn" onclick="checkAnswer()">SUBMIT</button>
        </div>
    </div>

    <div class="card">
        <h3 style="color: var(--neon);">WARRIOR LEADERBOARD</h3>
        <div id="list-box"></div>
    </div>

    

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            projectId: "black-terminal-f2c91",
            // ... (baki config same rahegi)
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        let strikes = 0, qIndex = 0, userId = "";

        const questions = [
            {q: "Binary 10 is decimal 2?", a: "true"}, {q: "Convert 16 (decimal) to binary.", a: "10000"},
            // ... Add baki 18 questions
        ];

        window.startBattle = async () => {
            const name = prompt("Enter your name:");
            const d = await addDoc(collection(db, "participants"), { name, status: "Active" });
            userId = d.id;
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('game-box').style.display = 'block';
            nextQ();
        };

        function nextQ() {
            if(strikes >= 2) { 
                updateDoc(doc(db, "participants", userId), { status: "ELIMINATED" });
                alert("Game Over!"); location.reload(); 
            }
            document.getElementById('q-box').innerText = questions[qIndex].q;
        }

        window.checkAnswer = () => {
            if(document.getElementById('ans-box').value !== questions[qIndex].a) strikes++;
            qIndex++;
            nextQ();
        };

        onSnapshot(collection(db, "participants"), (snap) => {
            const list = document.getElementById('list-box');
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `
                    <div class="player-item">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="https://ui-avatars.com/api/?name=${p.name}" class="avatar">
                            <span>${p.name}</span>
                        </div>
                        <span class="status-tag ${p.status === 'ELIMINATED' ? 'eliminated' : ''}">${p.status}</span>
                    </div>`;
            });
        });
    </script>
</body>
</html>
