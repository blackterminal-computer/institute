<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Battle Royale Quiz</title>
    <style>
        body { background: #020617; color: white; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e293b; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        .btn { background: #06b6d4; border: none; padding: 15px; color: white; border-radius: 30px; cursor: pointer; width: 100%; margin-top: 10px; }
        .eliminated { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card" id="game-ui">
        <h1>BATTLE ARENA</h1>
        <div id="quiz-box" style="display:none;">
            <p id="question"></p>
            <div id="options"></div>
        </div>
        <button id="start-btn" class="btn" onclick="startBattle()">JOIN & START BATTLE</button>
        <p id="status"></p>
    </div>

    

    <script>
        let strikes = 0;
        let qCount = 0;
        const totalQuestions = 20;

        const questions = [
            { q: "Binary 10 is decimal 2?", type: "TF", a: "true" },
            { q: "Convert 101 to decimal", a: "5" },
            // Add 18 more questions here...
        ];

        function startBattle() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('quiz-box').style.display = 'block';
            nextQuestion();
        }

        function nextQuestion() {
            if (qCount >= totalQuestions || strikes >= 2) {
                endGame();
                return;
            }
            let current = questions[qCount];
            document.getElementById('question').innerText = current.q;
            document.getElementById('options').innerHTML = `<input id="ans" type="text"><button onclick="check()">Submit</button>`;
        }

        function check() {
            let userAns = document.getElementById('ans').value.toLowerCase();
            if (userAns !== questions[qCount].a) {
                strikes++;
                alert("Wrong! Strikes: " + strikes + "/2");
            }
            qCount++;
            nextQuestion();
        }

        function endGame() {
            document.getElementById('quiz-box').innerHTML = "<h3>Battle Ended</h3>";
            if (strikes < 2) {
                document.getElementById('status').innerHTML = "You survived! Prize Tier: 1st (3000 XP)";
            } else {
                document.getElementById('status').innerHTML = "<span class='eliminated'>ELIMINATED!</span>";
            }
        }
    </script>
</body>
</html>
