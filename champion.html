<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Arena Legend</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        :root { --gold: #fbbf24; --silver: #94a3b8; --bronze: #b45309; --neon: #06b6d4; }
        
        body { background: radial-gradient(circle at center, #1e1b4b, #020617); color: white; font-family: 'Outfit', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        h1 { color: var(--neon); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-size: 1.8rem; }

        /* Podium Design */
        .podium-container { display: flex; justify-content: center; align-items: flex-end; gap: 12px; margin-bottom: 40px; width: 100%; max-width: 400px; }
        .podium-box { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 10px; text-align: center; flex: 1; border: 1px solid rgba(255,255,255,0.1); }
        .p-1 { height: 160px; border-bottom: 4px solid var(--gold); }
        .p-2 { height: 120px; border-bottom: 4px solid var(--silver); }
        .p-3 { height: 90px; border-bottom: 4px solid var(--bronze); }
        
        .medal { font-size: 1rem; display: block; margin-bottom: 5px; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--neon); background: #0f172a; }

        /* Action Card */
        .action-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid var(--neon); padding: 25px; border-radius: 30px; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 0 20px rgba(6, 182, 212, 0.2); }
        .enter-btn { background: linear-gradient(to right, #06b6d4, #3b82f6); color: white; padding: 15px 30px; font-weight: 900; font-size: 1.1rem; border-radius: 50px; border: none; cursor: pointer; width: 100%; box-shadow: 0 5px 15px rgba(6, 182, 212, 0.3); }
        
        /* Participant List */
        .list-container { width: 90%; max-width: 350px; margin-top: 30px; }
        .player-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 20px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .mini-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--neon); }
        .xp-tag { color: var(--gold); font-weight: 900; font-size: 0.85rem; }
    </style>
</head>
<body>

    <h1>WEEKLY FESTIVAL</h1>

    <div class="podium-container">
        <div class="podium-box p-2"><span class="medal">🥈</span><img class="avatar" src="https://ui-avatars.com/api/?name=Silver+Warrior&background=94a3b8&color=fff"></div>
        <div class="podium-box p-1"><span class="medal">🥇</span><img class="avatar" src="https://ui-avatars.com/api/?name=Gold+Champion&background=fbbf24&color=fff"></div>
        <div class="podium-box p-3"><span class="medal">🥉</span><img class="avatar" src="https://ui-avatars.com/api/?name=Bronze+Hero&background=b45309&color=fff"></div>
    </div>

    <div class="action-card">
        <button class="enter-btn">ENTER NOW</button>
        <p style="margin-top:15px; font-size: 0.75rem; opacity: 0.7;">Weekly Prize Pool: 6000 XP</p>
    </div>

    <div class="list-container">
        <h3 style="margin-bottom: 15px; color: var(--neon); font-size: 1.1rem;">Live Participants</h3>
        <div class="player-row">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://ui-avatars.com/api/?name=Warrior+X&background=06b6d4&color=fff" class="mini-avatar">
                <span style="font-size: 0.9rem;">Warrior Name</span>
            </div>
            <div class="xp-tag">+100 XP</div>
        </div>
    </div>

</body>
</html>
