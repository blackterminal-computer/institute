<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        :root { --glass: rgba(255, 255, 255, 0.1); --neon: #06b6d4; }
        
        body { background: #020617; color: white; font-family: 'Outfit', sans-serif; padding: 20px; }

        /* Modern Card View */
        .card-container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 400px;
            margin: auto;
            text-align: center;
        }

        .avatar { 
            width: 80px; height: 80px; border-radius: 20px; 
            border: 4px solid var(--neon); margin-bottom: 15px; 
            object-fit: cover;
        }

        .prize-tag { 
            background: var(--neon); color: black; 
            padding: 5px 15px; border-radius: 50px; 
            font-weight: 900; font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <img src="avatar.jpg" class="avatar" alt="Winner">
        <h2 style="margin:0;">Legendary Warrior</h2>
        <p style="color:#94a3b8;">Weekly Rank: #1</p>
        <div class="prize-tag">PRIZE: 3000 XP</div>
    </div>

</body>
</html>
