<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Royale Arena</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        :root { --neon: #06b6d4; --glass: rgba(30, 41, 59, 0.6); }
        body { background: #020617; color: white; font-family: 'Outfit', sans-serif; padding: 20px; }
        
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 20px; margin-bottom: 20px; }
        
        /* List Style */
        .player-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #334155; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h3 style="color: var(--neon);">LIVE WARRIORS</h3>
        <div id="participants-list">
            </div>
    </div>

    

    <script type="module">
        // Firebase Imports (Firestore)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = { /* APKA CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fetching and Rendering Live Users
        onSnapshot(query(collection(db, "participants"), orderBy("xp", "desc")), (snapshot) => {
            const list = document.getElementById('participants-list');
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const p = doc.data();
                list.innerHTML += `
                    <div class="player-item">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="https://ui-avatars.com/api/?name=${p.name}" class="avatar">
                            <span>${p.name}</span>
                        </div>
                        <div style="text-align:right;">
                            <div class="status-dot"></div>
                            <small>${p.xp} XP</small>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
