<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Festival Arena</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        :root { --gold: #fbbf24; --silver: #94a3b8; --bronze: #b45309; --neon: #06b6d4; --glass: rgba(255, 255, 255, 0.05); }
        body { background: radial-gradient(circle at top, #1e1b4b, #020617); color: white; font-family: 'Outfit', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        h1 { color: var(--neon); text-transform: uppercase; letter-spacing: 3px; font-size: 1.8rem; margin-bottom: 30px; }

        .podium-container { display: flex; justify-content: center; align-items: flex-end; gap: 10px; margin-bottom: 40px; width: 100%; max-width: 400px; }
        .p-box { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 15px; text-align: center; flex: 1; border: 1px solid rgba(255,255,255,0.1); }
        .p-1 { height: 180px; border-bottom: 5px solid var(--gold); }
        .p-2 { height: 140px; border-bottom: 5px solid var(--silver); }
        .p-3 { height: 110px; border-bottom: 5px solid var(--bronze); }
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--neon); background: #0f172a; display: flex; align-items: center; justify-content: center; font-weight: 900; margin-top: 5px; }

        .action-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid var(--neon); padding: 25px; border-radius: 30px; text-align: center; width: 90%; max-width: 350px; margin-bottom: 30px; }
        .enter-btn { background: linear-gradient(to right, #06b6d4, #3b82f6); color: white; padding: 18px 40px; font-weight: 900; font-size: 1.2rem; border-radius: 50px; border: none; cursor: pointer; width: 100%; transition: 0.3s; }

        .list-container { width: 90%; max-width: 350px; }
        .player-row { display: flex; align-items: center; justify-content: space-between; background: var(--glass); padding: 12px 20px; border-radius: 20px; margin-bottom: 10px; }
        .mini-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon); }
        .xp-tag { color: var(--gold); font-weight: 900; }
    </style>
</head>
<body>

    <h1>WEEKLY FESTIVAL</h1>

    <div class="podium-container">
        <div class="p-box p-2">🥈<img src="https://ui-avatars.com/api/?name=SW&background=94a3b8" class="avatar"></div>
        <div class="p-box p-1">🥇<img src="https://ui-avatars.com/api/?name=GC&background=fbbf24" class="avatar"></div>
        <div class="p-box p-3">🥉<img src="https://ui-avatars.com/api/?name=BH&background=b45309" class="avatar"></div>
    </div>

    <div class="action-card">
        <button id="main-btn" class="enter-btn" onclick="showQuestion()">ENTER NOW</button>
        
        <div id="quiz-area" style="display:none; text-align:center;">
            <p id="q-text" style="margin-bottom: 15px; font-weight: 600;">Which language powers this arena?</p>
            <input type="text" id="answer-input" placeholder="Type answer..." style="width: 80%; padding: 10px; border-radius: 20px; border: none; margin-bottom: 15px; text-align: center; color: black;">
            <br>
            <button onclick="checkAnswer()" style="background: var(--neon); border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: bold;">Submit</button>
        </div>
        
        <p id="prize-text" style="margin-top:15px; font-size: 0.8rem; opacity: 0.7;">Weekly Prize Pool: 6000 XP</p>
    </div>

    <div class="list-container">
        <h3 style="color: var(--neon);">Live Participants</h3>
        <div class="player-row">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://ui-avatars.com/api/?name=WX&background=06b6d4" class="mini-avatar">
                <span>Warrior Name</span>
            </div>
            <div class="xp-tag">+100 XP</div>
        </div>
    </div>

    <script>
        const correctAnswer = "javascript";

        function showQuestion() {
            document.getElementById('main-btn').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
        }

        function checkAnswer() {
            const input = document.getElementById('answer-input').value.toLowerCase().trim();
            const btn = document.getElementById('main-btn');
            
            if (input === correctAnswer) {
                document.getElementById('quiz-area').style.display = 'none';
                btn.style.display = 'block';
                btn.style.background = "#22c55e";
                btn.innerText = "YOU WON +100 XP!";
                btn.style.cursor = "default";
            } else {
                alert("Incorrect! Hint: The script tag uses this language.");
            }
        }
    </script>
</body>
</html>
