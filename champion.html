<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        :root { --gold: #fbbf24; --silver: #94a3b8; --bronze: #b45309; --neon: #06b6d4; }
        body { background: radial-gradient(circle, #1e293b, #020617); color: white; font-family: 'Outfit', sans-serif; padding: 20px; }
        
        /* Podium Style */
        .podium-container { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin-bottom: 50px; }
        .podium-box { text-align: center; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .rank-1 { height: 180px; border-bottom: 5px solid var(--gold); }
        .rank-2 { height: 140px; border-bottom: 5px solid var(--silver); }
        .rank-3 { height: 100px; border-bottom: 5px solid var(--bronze); }
        
        .avatar { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--neon); }
        
        /* Festival Entry */
        .festival-card { background: linear-gradient(135deg, #0f172a, #1e1b4b); border: 2px solid var(--neon); padding: 40px; border-radius: 30px; text-align: center; box-shadow: 0 0 50px rgba(6, 182, 212, 0.3); }
        .btn-enter { background: linear-gradient(to right, #06b6d4, #3b82f6); color: white; padding: 20px 60px; font-size: 1.5rem; font-weight: 900; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        
        /* Reward Ribbon */
        .rewards { display: flex; justify-content: center; gap: 40px; margin-top: 30px; font-weight: 600; color: var(--gold); }
    </style>
</head>
<body>

    <div class="festival-card" id="home">
        <h1 style="font-size: 3rem; margin: 0;">WEEKLY ARENA FESTIVAL</h1>
        <div class="rewards">
            <span>🥇 3000 XP</span> <span>🥈 2000 XP</span> <span>🥉 1000 XP</span>
        </div>
        <br><br>
        <button class="btn-enter" onclick="startArena()">ENTER NOW</button>
    </div>

    <div id="arena-content" style="display:none;">
        <div class="podium-container">
            <div class="podium-box rank-2">🥈<br><img class="avatar" src="p2.jpg"><br>User 2</div>
            <div class="podium-box rank-1">🥇<br><img class="avatar" src="p1.jpg"><br>User 1</div>
            <div class="podium-box rank-3">🥉<br><img class="avatar" src="p3.jpg"><br>User 3</div>
        </div>
        <h3>All Participants</h3>
        <div id="all-players" style="display:grid; grid-template-columns: repeat(auto-fill, 100px); gap:15px;"></div>
    </div>

    <script>
        function startArena() {
            document.getElementById('home').style.display = 'none';
            document.getElementById('arena-content').style.display = 'block';
        }
    </script>
</body>
</html>
