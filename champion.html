<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAMPION ARENA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        :root { --neon: #06b6d4; --bg: #020617; --glass: rgba(30, 41, 59, 0.5); }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Glassmorphism Cards */
        .main-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 30px; width: 100%; max-width: 450px; text-align: center; }
        
        .leaderboard-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .player-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 3px solid var(--neon); }
        
        .btn-start { background: linear-gradient(135deg, #06b6d4, #3b82f6); border: none; padding: 20px; width: 100%; border-radius: 20px; color: white; font-weight: 900; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-card">
        <h1 style="margin: 0; color: var(--neon);">CHAMPION ARENA</h1>
        <p>Last Man Standing Takes It All</p>
        <button class="btn-start" onclick="joinArena()">JOIN & START BATTLE</button>
        
        <div id="game-ui" style="display:none; margin-top: 20px;">
            <p id="question-text" style="font-size: 1.3rem;"></p>
            <div id="options-grid" style="display:grid; gap: 10px;"></div>
        </div>
    </div>

    <div class="main-card" style="margin-top: 20px;">
        <h3 style="color: var(--neon);">LIVE LEADERBOARD</h3>
        <div id="live-list" class="leaderboard-list"></div>
    </div>

    

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI", projectId: "black-terminal-f2c91", storageBucket: "black-terminal-f2c91.firebasestorage.app", appId: "1:552489994197:web:7662331264c334ffbadf5c" };
        const db = getFirestore(initializeApp(firebaseConfig));

        // Logic: Winner Prize Distribution
        const prizes = { 1: 3000, 2: 2000, 3: 1000 };

        window.joinArena = async () => {
            const name = prompt("Enter your Warrior Name:");
            await addDoc(collection(db, "participants"), { name, score: 0, strikes: 0, status: "Active" });
            document.querySelector('.btn-start').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
        };

        // Render Live Data
        onSnapshot(query(collection(db, "participants"), orderBy("score", "desc")), (snap) => {
            const list = document.getElementById('live-list');
            list.innerHTML = "";
            snap.forEach((doc, index) => {
                const p = doc.data();
                list.innerHTML += `
                    <div class="player-row">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <img src="https://ui-avatars.com/api/?name=${p.name}" class="avatar">
                            <div>
                                <b>${p.name}</b><br>
                                <small>${p.score} XP | ${p.status}</small>
                            </div>
                        </div>
                        <span style="color:var(--neon); font-weight:900;">#${index + 1}</span>
                    </div>`;
            });
        });
    </script>
</body>
</html>
