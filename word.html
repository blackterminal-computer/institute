<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Admin Panel</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .admin-card { width: 90%; max-width: 400px; background: #0b0f1a; padding: 30px; border-radius: 20px; border: 1px solid #1e293b; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #334155; background: #020617; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #6366f1; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>Deploy Learning Log</h2>
        <input type="text" id="wordInput" placeholder="Topic Title">
        <textarea id="descInput" placeholder="Enter explanation..." rows="4"></textarea>
        <button id="updateBtn">DEPLOY TO TERMINAL</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // APNA FIREBASE CONFIG YAHAN PASTE KAREIN
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        document.getElementById('updateBtn').onclick = async () => {
            const title = document.getElementById('wordInput').value.trim();
            const content = document.getElementById('descInput').value.trim();
            const btn = document.getElementById('updateBtn');

            if(!title || !content) return alert("Fields are empty!");
            
            btn.innerText = "DEPLOYING...";
            try {
                // 'addDoc' har baar naya document create karega
                await addDoc(collection(db, "daily_logs"), {
                    title: title,
                    content: content,
                    timestamp: Date.now()
                });
                alert("Log deployed successfully!");
                document.getElementById('wordInput').value = "";
                document.getElementById('descInput').value = "";
            } catch (e) { alert("Error: " + e.message); }
            btn.innerText = "DEPLOY TO TERMINAL";
        };
    </script>
</body>
</html>
