<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Admin Word Control</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #06b6d4; --bg: #020617; }
        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center; 
        }
        .admin-card {
            width: 100%; max-width: 500px; background: rgba(255,255,255,0.03); 
            padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
        }
        h2 { font-size: 18px; color: var(--accent); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 15px; color: white; margin-bottom: 15px; outline: none; box-sizing: border-box;
        }
        button {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2><i class="ri-terminal-window-line"></i> Update Daily Log</h2>
        <input type="text" id="wordInput" placeholder="Enter Topic / Word">
        <textarea id="descInput" placeholder="Enter detailed explanation..." rows="5"></textarea>
        <button id="updateBtn">DEPLOY TO TERMINAL</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('updateBtn').onclick = async () => {
            const word = document.getElementById('wordInput').value.trim();
            const desc = document.getElementById('descInput').value.trim();
            const btn = document.getElementById('updateBtn');

            if(!word || !desc) return alert("Fields are empty!");

            btn.innerText = "SYNCING...";
            try {
                await setDoc(doc(db, "content", "dailyWord"), {
                    word: word,
                    description: desc,
                    updatedAt: Date.now()
                });
                alert("Homepage Updated!");
                document.getElementById('wordInput').value = "";
                document.getElementById('descInput').value = "";
            } catch (e) { alert("Error: " + e.message); }
            btn.innerText = "DEPLOY TO TERMINAL";
        };
    </script>
</body>
</html>
