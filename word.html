<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BT | Admin</title>
    </head>
<body>
    <div class="admin-card">
        <h2>Update Daily Log</h2>
        <input type="text" id="wordInput" placeholder="Title">
        <textarea id="descInput" placeholder="Content..."></textarea>
        <button id="updateBtn">DEPLOY TO TERMINAL</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { /* APKA CONFIG YAHAN RAKHEIN */ };
        const db = getFirestore(initializeApp(firebaseConfig));

        document.getElementById('updateBtn').onclick = async () => {
            const title = document.getElementById('wordInput').value.trim();
            const content = document.getElementById('descInput').value.trim();
            if(!title || !content) return alert("Empty!");
            
            await addDoc(collection(db, "daily_logs"), {
                title: title,
                content: content,
                timestamp: Date.now()
            });
            alert("Updated!");
        };
    </script>
</body>
</html>
