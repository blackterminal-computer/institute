<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Admin Panel</title>
    <style>
        /* CSS yahan daala hai taaki style miss na ho */
        body { 
            background: #020617; color: white; font-family: sans-serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center; 
            align-items: center; min-height: 100vh; 
        }
        .admin-card { 
            width: 100%; max-width: 400px; background: #0b0f1a; 
            padding: 30px; border-radius: 20px; border: 1px solid #1e293b; 
        }
        input, textarea { 
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; 
            border: 1px solid #334155; background: #020617; color: white; box-sizing: border-box; 
        }
        button { 
            width: 100%; padding: 12px; background: #6366f1; border: none; 
            border-radius: 10px; color: white; font-weight: bold; cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>Deploy Log</h2>
        <input type="text" id="wordInput" placeholder="Topic Title">
        <textarea id="descInput" placeholder="Explanation..." rows="4"></textarea>
        <button id="updateBtn">DEPLOY TO TERMINAL</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Apna Config Yahan Paste Karein
        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        document.getElementById('updateBtn').onclick = async () => {
            const title = document.getElementById('wordInput').value.trim();
            const content = document.getElementById('descInput').value.trim();
            if(!title || !content) return alert("Fields empty!");
            
            try {
                await addDoc(collection(db, "daily_logs"), {
                    title: title,
                    content: content,
                    timestamp: Date.now()
                });
                alert("Deployed Successfully!");
            } catch (e) { alert("Error: " + e.message); }
        };
    </script>
</body>
</html>
