<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Multi-Color Cyber Standings</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #02040a;
            --surface: rgba(13, 18, 30, 0.45);
            --glass-border: rgba(255, 255, 255, 0.06);
            
            /* High-End Immersive Multi-Color Neon Gradients */
            --gold-row: linear-gradient(135deg, rgba(255, 170, 0, 0.22) 0%, rgba(255, 69, 0, 0.06) 100%);
            --silver-row: linear-gradient(135deg, rgba(0, 242, 254, 0.18) 0%, rgba(79, 172, 254, 0.04) 100%);
            --bronze-row: linear-gradient(135deg, rgba(243, 85, 218, 0.18) 0%, rgba(112, 0, 255, 0.04) 100%);
            --me-grad: linear-gradient(90deg, rgba(16, 185, 129, 0.15) 0%, rgba(34, 211, 238, 0.03) 100%);
            --sticky-grad: linear-gradient(135deg, #090d16, #14112e);
            
            --neon-green: #10b981;
            --muted: #4b5563;
            --text-secondary: #94a3b8;
        }

        /* Smooth hardware-accelerated global configurations */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background: var(--bg); color: #fff; min-height: 100vh; padding: 24px 20px;
            background-image: 
                radial-gradient(circle at 5% 10%, rgba(255, 69, 0, 0.12), transparent 40%),
                radial-gradient(circle at 95% 25%, rgba(0, 242, 254, 0.12), transparent 40%),
                radial-gradient(circle at 50% 70%, rgba(112, 0, 255, 0.08), transparent 50%);
            overflow-x: hidden; padding-bottom: 190px;
            scroll-behavior: smooth;
        }

        /* Stats Overview Header */
        .stats-overview { display: flex; gap: 14px; margin-bottom: 24px; }
        .stat-card {
            flex: 1; background: var(--surface); border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 24px; backdrop-filter: blur(30px);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.03), 0 12px 30px rgba(0,0,0,0.4);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card span { display: block; font-size: 10px; color: var(--text-secondary); font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 4px; }
        .stat-card h3 { font-size: 17px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        #king-name { color: #ffaa00; text-shadow: 0 0 15px rgba(255, 170, 0, 0.4); }
        #total-xp { color: var(--neon-green); text-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }

        /* Smooth Glassmorphic Search Terminal Input */
        .utility-bar { margin-bottom: 24px; }
        .search-wrapper { position: relative; display: flex; align-items: center; }
        .search-wrapper i { position: absolute; left: 20px; color: var(--text-secondary); font-size: 19px; transition: color 0.3s; }
        .search-input {
            width: 100%; background: rgba(255, 255, 255, 0.01); border: 1px solid var(--glass-border);
            padding: 16px 16px 16px 56px; border-radius: 24px; color: #fff; font-size: 14px;
            font-weight: 600; outline: none; backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .search-input:focus { 
            border-color: #00f2fe; background: rgba(255, 255, 255, 0.03); 
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.15), inset 0 1px 2px rgba(255,255,255,0.05); 
        }
        .search-input:focus + i { color: #00f2fe; }
        .search-input::placeholder { color: #3b4252; }

        .list-header { font-size: 11px; font-weight: 900; color: var(--text-secondary); margin-left: 14px; margin-bottom: 16px; letter-spacing: 1.5px; text-transform: uppercase; }

        /* Core High-Performance Row Physics Engine */
        .player-row {
            background: var(--surface); border: 1px solid var(--glass-border); border-radius: 26px; padding: 16px 22px; margin-bottom: 14px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); position: relative; overflow: hidden;
            will-change: transform, border-color, background;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        border-color 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        background 0.4s cubic-bezier(0.25, 1, 0.5, 1),
                        box-shadow 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .player-row:hover { 
            border-color: rgba(255,255,255,0.12); 
            background: rgba(255,255,255,0.03); 
            transform: translateY(-4px) scale(1.015);
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
        }
        
        /* Multi-Color Rows Distinction Styling */
        .player-row.rank-1-row { border-color: rgba(255, 170, 0, 0.4); background: var(--gold-row); box-shadow: 0 6px 20px rgba(255, 69, 0, 0.12); }
        .player-row.rank-1-row:hover { border-color: #ffaa00; box-shadow: 0 12px 30px rgba(255, 170, 0, 0.25); }
        .player-row.rank-1-row .r-num { color: #ffaa00; font-size: 22px; font-weight: 900; text-shadow: 0 0 12px rgba(255, 170, 0, 0.5); }
        .player-row.rank-1-row .p-avatar { border: 2px solid #ffaa00; box-shadow: 0 0 14px rgba(255, 170, 0, 0.3); }
        .player-row.rank-1-row .p-name { color: #fff; font-weight: 800; font-size: 16px; }
        .player-row.rank-1-row .xp-num { color: #ffaa00; text-shadow: 0 0 10px rgba(255, 170, 0, 0.3); }

        .player-row.rank-2-row { border-color: rgba(0, 242, 254, 0.3); background: var(--silver-row); box-shadow: 0 6px 20px rgba(0, 242, 254, 0.1); }
        .player-row.rank-2-row:hover { border-color: #00f2fe; box-shadow: 0 12px 30px rgba(0, 242, 254, 0.22); }
        .player-row.rank-2-row .r-num { color: #00f2fe; font-size: 19px; text-shadow: 0 0 12px rgba(0, 242, 254, 0.5); }
        .player-row.rank-2-row .p-avatar { border: 2px solid #00f2fe; box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }
        .player-row.rank-2-row .xp-num { color: #00f2fe; }

        .player-row.rank-3-row { border-color: rgba(243, 85, 218, 0.3); background: var(--bronze-row); box-shadow: 0 6px 20px rgba(112, 0, 255, 0.1); }
        .player-row.rank-3-row:hover { border-color: #f355da; box-shadow: 0 12px 30px rgba(243, 85, 218, 0.22); }
        .player-row.rank-3-row .r-num { color: #f355da; font-size: 18px; text-shadow: 0 0 12px rgba(243, 85, 218, 0.5); }
        .player-row.rank-3-row .p-avatar { border: 2px solid #f355da; box-shadow: 0 0 10px rgba(243, 85, 218, 0.2); }
        .player-row.rank-3-row .xp-num { color: #f355da; }

        /* Standard Users Styling Configuration */
        .player-row.is-me { border-color: var(--neon-green) !important; background: var(--me-grad); box-shadow: 0 8px 25px rgba(16, 185, 129, 0.15) !important; }
        .player-row.is-me-glow { animation: smooth-border-pulse 2.5s infinite alternate ease-in-out; }
        @keyframes smooth-border-pulse { 0% { border-color: rgba(255,255,255,0.15); } 100% { border-color: rgba(255,255,255,0.7); box-shadow: 0 0 20px rgba(255,255,255,0.1); } }

        .p-info { display: flex; align-items: center; gap: 16px; min-width: 0; }
        .r-num { font-weight: 800; font-size: 15px; width: 35px; flex-shrink: 0; text-align: center; color: var(--muted); }
        .p-avatar { width: 46px; height: 46px; border-radius: 18px; background: #080c14; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.04); transition: transform 0.3s; }
        .player-row:hover .p-avatar { transform: scale(1.05) rotate(2deg); }
        .p-name { font-weight: 700; font-size: 15px; color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .is-me .p-name { color: #fff; font-weight: 800; }

        /* Points Metrics Layout */
        .p-xp { text-align: right; flex-shrink: 0; }
        .xp-num { color: var(--neon-green); font-weight: 800; font-size: 16px; display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
        .xp-label { font-size: 9px; font-weight: 600; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-top: 1px; }

        /* Liquid Soft Floating Target HUD Tracker */
        .sticky-my-status {
            position: fixed; bottom: 105px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 400px;
            background: var(--sticky-grad); border: 1px solid rgba(34, 211, 238, 0.3); border-radius: 26px;
            padding: 14px 22px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.85), inset 0 1px 2px rgba(255,255,255,0.08); 
            z-index: 99; backdrop-filter: blur(24px);
            will-change: transform, opacity;
            animation: smoothSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes smoothSlideUp { from { transform: translate(-50%, 60px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

        /* Elegant Shimmer Skeleton Grid System */
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.01) 25%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.01) 75%);
            background-size: 200% 100%; animation: soft-shimmer 1.8s infinite linear; color: transparent !important;
        }
        @keyframes soft-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Liquid Navigation Console Dock */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 400px;
            background: rgba(6, 9, 16, 0.82); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px;
            padding: 16px; display: flex; justify-content: space-around; z-index: 100; 
            box-shadow: 0 25px 55px rgba(0,0,0,0.75), inset 0 1px 1px rgba(255,255,255,0.04);
        }
        .nav-btn { color: #323945; text-decoration: none; font-size: 25px; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); position: relative; }
        .nav-btn:hover { color: var(--text-secondary); transform: translateY(-2px); }
        .nav-btn.active { color: #00f2fe; filter: drop-shadow(0 0 12px rgba(0, 242, 254, 0.6)); }
        .nav-btn.active::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            width: 6px; height: 6px; background: #00f2fe; border-radius: 50%; box-shadow: 0 0 12px #00f2fe;
        }
    </style>
</head>
<body>

    <div class="stats-overview">
        <div class="stat-card">
            <span>👑 Server King</span>
            <h3 id="king-name" class="shimmer">Loading...</h3>
        </div>
        <div class="stat-card">
            <span>⚡ Global XP</span>
            <h3 id="total-xp" class="shimmer">000,000</h3>
        </div>
    </div>

    <div class="utility-bar">
        <div class="search-wrapper">
            <input type="text" id="search-bar" class="search-input" placeholder="Search terminal hacker...">
            <i class="ri-search-2-line"></i>
        </div>
    </div>

    <h2 class="list-header">Live Standings</h2>
    <div id="list-root">
        <!-- Optimized Initial State Shimmer Layout Grid -->
        <div class="player-row"><div class="shimmer" style="width:100%; height:22px; border-radius:12px;"></div></div>
        <div class="player-row"><div class="shimmer" style="width:100%; height:22px; border-radius:12px;"></div></div>
        <div class="player-row"><div class="shimmer" style="width:100%; height:22px; border-radius:12px;"></div></div>
    </div>

    <div id="sticky-root"></div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-btn"><i class="ri-terminal-box-line"></i></a>
        <a href="#" class="nav-btn active"><i class="ri-trophy-fill"></i></a>
        <a href="#" class="nav-btn" onclick="location.reload()"><i class="ri-refresh-line"></i></a>
        <a href="#" class="nav-btn"><i class="ri-settings-4-line"></i></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let globalPlayersDataset = [];
        const currentUser = (localStorage.getItem("studentName") || "").trim();

        const getPic = (name) => `https://api.dicebear.com/7.x/pixel-art/png?seed=${encodeURIComponent(name || 'default')}&size=150`;

        function renderUI(data, filterQuery = "") {
            if (!data || data.length === 0) return;
            
            document.getElementById("king-name").classList.remove("shimmer");
            document.getElementById("total-xp").classList.remove("shimmer");

            document.getElementById("king-name").innerText = data[0]?.name || "N/A";
            const totalXP = data.reduce((sum, p) => sum + (p.xp || 0), 0);
            document.getElementById("total-xp").innerText = totalXP.toLocaleString();

            const filteredDataset = data.filter(p => p.name.toLowerCase().includes(filterQuery.toLowerCase()));

            document.getElementById("list-root").innerHTML = filteredDataset.map((p) => {
                const trueRankIndex = data.findIndex(origin => origin.name === p.name) + 1;
                
                let multiColorRowClass = "";
                let medalBadgeToken = "";
                
                if (trueRankIndex === 1) { multiColorRowClass = "rank-1-row"; medalBadgeToken = "🥇 "; }
                else if (trueRankIndex === 2) { multiColorRowClass = "rank-2-row"; medalBadgeToken = "🥈 "; }
                else if (trueRankIndex === 3) { multiColorRowClass = "rank-3-row"; medalBadgeToken = "🥉 "; }

                const isMeClass = p.name === currentUser ? 'is-me' : '';
                const isMeGlow = (p.name === currentUser && trueRankIndex <= 3) ? 'is-me-glow' : '';

                return `
                    <div class="player-row ${multiColorRowClass} ${isMeClass} ${isMeGlow}">
                        <div class="p-info">
                            <span class="r-num">${medalBadgeToken || '#' + trueRankIndex}</span>
                            <img class="p-avatar" src="${p.photo || getPic(p.name)}" loading="lazy" alt="Hacker">
                            <span class="p-name">${p.name} ${p.name === currentUser ? '<span style="color:#22d3ee; font-size:11px; margin-left:5px; font-weight:800;">(YOU)</span>' : ''}</span>
                        </div>
                        <div class="p-xp">
                            <div class="xp-num">
                                ${trueRankIndex > 3 ? '<i class="ri-flashlight-fill" style="opacity:0.7;"></i>' : ''} 
                                ${(p.xp || 0).toLocaleString()}
                            </div>
                            <div class="xp-label">Points</div>
                        </div>
                    </div>
                `;
            }).join('');

            // Sticky Tracker Computations Loop Setup
            const myIndex = data.findIndex(p => p.name === currentUser);
            const stickyTargetNode = document.getElementById("sticky-root");
            
            if (myIndex > 2) { 
                const myData = data[myIndex];
                const rivalData = data[myIndex - 1]; 
                const xpNeeded = (rivalData.xp || 0) - (myData.xp || 0);

                stickyTargetNode.innerHTML = `
                    <div class="sticky-my-status">
                        <div style="display:flex; flex-direction:column; min-width:0;">
                            <span style="font-size:12px; font-weight:800; color:#22d3ee; display:flex; align-items:center; gap:5px;">
                                #${myIndex + 1} YOU
                            </span>
                            <span style="font-size:10px; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px;">
                                🎯 Need <b>${xpNeeded.toLocaleString()} XP</b> to crush #${myIndex}
                            </span>
                        </div>
                        <span style="font-weight:900; font-size:15px; color:#fff; flex-shrink:0;">
                            ${(myData.xp || 0).toLocaleString()} <span style="font-size:9px; color:var(--neon-green)">XP</span>
                        </span>
                    </div>
                `;
            } else {
                stickyTargetNode.innerHTML = ""; 
            }
        }

        document.getElementById("search-bar").addEventListener("input", (e) => {
            renderUI(globalPlayersDataset, e.target.value);
        });

        // Local Offline Cache Initialization Block
        const localCache = localStorage.getItem("bt_leaderboard_cache");
        if (localCache) {
            try { 
                globalPlayersDataset = JSON.parse(localCache);
                renderUI(globalPlayersDataset); 
            } catch(e) { console.error("Cache system failure reset", e); }
        }

        // Firebase Sync Event Node Stream Pipeline
        const q = query(collection(db, "students"), orderBy("xp", "desc"));
        onSnapshot(q, (snap) => {
            globalPlayersDataset = snap.docs.map(doc => ({ name: doc.id, ...doc.data() }));
            localStorage.setItem("bt_leaderboard_cache", JSON.stringify(globalPlayersDataset));
            const currentSearchQuery = document.getElementById("search-bar").value;
            renderUI(globalPlayersDataset, currentSearchQuery);
        });
    </script>
</body>
</html>
