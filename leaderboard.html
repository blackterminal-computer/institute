<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Global Terminal Standings</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --accent: #22d3ee;
            --bg: #030712;
            --surface: rgba(15, 23, 42, 0.45);
            --glass-border: rgba(255, 255, 255, 0.07);
            
            /* Premium Row Gradients */
            --gold-row: linear-gradient(95deg, rgba(255, 204, 0, 0.15) 0%, rgba(255, 69, 0, 0.03) 100%);
            --silver-row: linear-gradient(95deg, rgba(0, 242, 254, 0.12) 0%, rgba(76, 172, 254, 0.02) 100%);
            --bronze-row: linear-gradient(95deg, rgba(243, 85, 218, 0.12) 0%, rgba(112, 0, 255, 0.02) 100%);
            --me-grad: linear-gradient(90deg, rgba(34, 211, 238, 0.12) 0%, rgba(99, 102, 241, 0.03) 100%);
            --sticky-grad: linear-gradient(135deg, #0f172a, #1e1b4b);
            
            --neon-green: #10b981;
            --muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); color: #fff; min-height: 100vh; padding: 24px 20px;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.15), transparent 45%),
                radial-gradient(circle at 90% 30%, rgba(34, 211, 238, 0.12), transparent 45%),
                radial-gradient(circle at 50% 80%, rgba(243, 85, 218, 0.08), transparent 50%);
            overflow-x: hidden; padding-bottom: 180px;
        }

        /* Stats Bar */
        .stats-overview { display: flex; gap: 14px; margin-bottom: 24px; }
        .stat-card {
            flex: 1; background: var(--surface); border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 24px; backdrop-filter: blur(20px);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.05), 0 10px 25px rgba(0,0,0,0.3);
        }
        .stat-card span { display: block; font-size: 10px; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .stat-card h3 { font-size: 17px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        #king-name { color: #ffcc00; text-shadow: 0 0 12px rgba(255, 204, 0, 0.3); }
        #total-xp { color: var(--neon-green); text-shadow: 0 0 12px rgba(16, 185, 129, 0.3); }

        /* Glassmorphic Search Bar Layout */
        .utility-bar { margin-bottom: 24px; }
        .search-wrapper { position: relative; display: flex; align-items: center; }
        .search-wrapper i { position: absolute; left: 18px; color: var(--muted); font-size: 19px; }
        .search-input {
            width: 100%; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--glass-border);
            padding: 16px 16px 16px 52px; border-radius: 22px; color: #fff; font-size: 14px;
            font-weight: 600; outline: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .search-input:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.05); box-shadow: 0 0 20px rgba(34, 211, 238, 0.15); }
        .search-input::placeholder { color: #334155; }

        /* Unified List Header */
        .list-header { font-size: 11px; font-weight: 900; color: var(--muted); margin-left: 12px; margin-bottom: 16px; letter-spacing: 1px; text-transform: uppercase; }

        /* Core Row Architecture */
        .player-row {
            background: var(--surface); border: 1px solid var(--glass-border); border-radius: 26px; padding: 16px 22px; margin-bottom: 14px;
            display: flex; align-items: center; justify-content: space-between; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); position: relative; overflow: hidden;
        }
        .player-row:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); transform: translateY(-3px); }
        .player-row.is-me { border-color: var(--accent) !important; box-shadow: 0 8px 25px rgba(34, 211, 238, 0.15) !important; }
        .player-row.is-me-glow { animation: pulse-border 2s infinite alternate; }
        @keyframes pulse-border { 0% { border-color: rgba(255,255,255,0.2); } 100% { border-color: rgba(255,255,255,0.7); } }

        .p-info { display: flex; align-items: center; gap: 16px; min-width: 0; }
        .r-num { font-weight: 900; font-size: 16px; width: 35px; flex-shrink: 0; text-align: center; }
        
        /* Premium Top 3 Row Specific Designs */
        .player-row.rank-1-row { background: var(--gold-row); border: 1px solid #ffcc00; box-shadow: 0 6px 20px rgba(255, 69, 0, 0.15); }
        .player-row.rank-1-row .r-num { color: #ffcc00; font-size: 20px; text-shadow: 0 0 10px rgba(255, 204, 0, 0.6); }
        .player-row.rank-1-row .p-avatar { border: 2px solid #ffcc00; box-shadow: 0 0 12px rgba(255, 204, 0, 0.4); }
        .player-row.rank-1-row .p-name { color: #fff; font-weight: 800; font-size: 16px; }

        .player-row.rank-2-row { background: var(--silver-row); border: 1px solid #00f2fe; box-shadow: 0 6px 20px rgba(0, 242, 254, 0.12); }
        .player-row.rank-2-row .r-num { color: #00f2fe; font-size: 18px; text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }
        .player-row.rank-2-row .p-avatar { border: 2px solid #00f2fe; }

        .player-row.rank-3-row { background: var(--bronze-row); border: 1px solid #f355da; box-shadow: 0 6px 20px rgba(112, 0, 255, 0.12); }
        .player-row.rank-3-row .r-num { color: #f355da; font-size: 17px; text-shadow: 0 0 10px rgba(243, 85, 218, 0.5); }
        .player-row.rank-3-row .p-avatar { border: 2px solid #f355da; }

        /* Regular Contenders Styling */
        .player-row .r-num:not(.rank-1-row .r-num, .rank-2-row .r-num, .rank-3-row .r-num) { color: #475569; }
        .p-avatar { width: 46px; height: 46px; border-radius: 18px; background: #0f172a; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.05); }
        .p-name { font-weight: 700; font-size: 15px; color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* XP System Styling */
        .p-xp { text-align: right; flex-shrink: 0; }
        .xp-num { color: var(--neon-green); font-weight: 800; font-size: 16px; display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
        .rank-1-row .xp-num { color: #ffcc00; }
        .xp-label { font-size: 9px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-top: 1px; }

        /* Floating Target Tracker HUD */
        .sticky-my-status {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 400px;
            background: var(--sticky-grad); border: 1px solid rgba(34, 211, 238, 0.35); border-radius: 26px;
            padding: 14px 22px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 1px 2px rgba(255,255,255,0.1); 
            z-index: 99; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); backdrop-filter: blur(20px);
        }
        @keyframes slideUp { from { transform: translate(-50%, 50px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

        /* Skeleton Loading Styles */
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.02) 75%);
            background-size: 200% 100%; animation: loading-shimmer 1.6s infinite linear; color: transparent !important;
        }
        @keyframes loading-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Bottom Menu Bar Dock */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 400px;
            background: rgba(8, 12, 24, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 32px;
            padding: 16px; display: flex; justify-content: space-around; z-index: 100; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .nav-btn { color: #3b4252; text-decoration: none; font-size: 25px; transition: all 0.2s; position: relative; }
        .nav-btn:hover { color: #64748b; }
        .nav-btn.active { color: #00f2fe; filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.5)); }
        .nav-btn.active::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            width: 6px; height: 6px; background: #00f2fe; border-radius: 50%; box-shadow: 0 0 10px #00f2fe;
        }
    </style>
</head>
<body>

    <div class="stats-overview">
        <div class="stat-card">
            <span>👑 Server King</span>
            <h3 id="king-name" class="shimmer">Loading...</h3>
        </div>
        <div class="stat-card">
            <span>⚡ Global XP</span>
            <h3 id="total-xp" class="shimmer">000,000</h3>
        </div>
    </div>

    <div class="utility-bar">
        <div class="search-wrapper">
            <i class="ri-search-2-line"></i>
            <input type="text" id="search-bar" class="search-input" placeholder="Search terminal hacker...">
        </div>
    </div>

    <h2 class="list-header">Live Standings</h2>
    <div id="list-root">
        <div class="player-row"><div class="shimmer" style="width:100%; height:22px; border-radius:12px;"></div></div>
        <div class="player-row"><div class="shimmer" style="width:100%; height:22px; border-radius:12px;"></div></div>
        <div class="player-row"><div class="shimmer" style="width:100%; height:22px; border-radius:12px;"></div></div>
    </div>

    <div id="sticky-root"></div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-btn"><i class="ri-terminal-box-line"></i></a>
        <a href="#" class="nav-btn active"><i class="ri-trophy-fill"></i></a>
        <a href="#" class="nav-btn" onclick="location.reload()"><i class="ri-refresh-line"></i></a>
        <a href="#" class="nav-btn"><i class="ri-settings-4-line"></i></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let globalPlayersDataset = [];
        const currentUser = (localStorage.getItem("studentName") || "").trim();

        const getPic = (name) => `https://api.dicebear.com/7.x/pixel-art/png?seed=${encodeURIComponent(name || 'default')}&size=150`;

        function renderUI(data, filterQuery = "") {
            if (!data || data.length === 0) return;
            
            document.getElementById("king-name").classList.remove("shimmer");
            document.getElementById("total-xp").classList.remove("shimmer");

            // Global Statistics calculations
            document.getElementById("king-name").innerText = data[0]?.name || "N/A";
            const totalXP = data.reduce((sum, p) => sum + (p.xp || 0), 0);
            document.getElementById("total-xp").innerText = totalXP.toLocaleString();

            // Row Generation Engine (Includes Row-Wise Top 3 layout styling)
            const filteredDataset = data.filter(p => p.name.toLowerCase().includes(filterQuery.toLowerCase()));

            document.getElementById("list-root").innerHTML = filteredDataset.map((p) => {
                // Find index to maintain true database placement rank indicators during active search queries
                const trueRankIndex = data.findIndex(origin => origin.name === p.name) + 1;
                
                let premiumRowClass = "";
                let medalIcon = "";
                
                if (trueRankIndex === 1) { premiumRowClass = "rank-1-row"; medalIcon = "👑 "; }
                else if (trueRankIndex === 2) { premiumRowClass = "rank-2-row"; medalIcon = "🥈 "; }
                else if (trueRankIndex === 3) { premiumRowClass = "rank-3-row"; medalIcon = "🥉 "; }

                const isMeClass = p.name === currentUser ? 'is-me' : '';
                const isMeGlow = (p.name === currentUser && trueRankIndex <= 3) ? 'is-me-glow' : '';

                return `
                    <div class="player-row ${premiumRowClass} ${isMeClass} ${isMeGlow}">
                        <div class="p-info">
                            <span class="r-num">${medalIcon || '#' + trueRankIndex}</span>
                            <img class="p-avatar" src="${p.photo || getPic(p.name)}" loading="lazy">
                            <span class="p-name">${p.name} ${p.name === currentUser ? '<span style="color:var(--accent); font-size:11px; margin-left:4px;">(YOU)</span>' : ''}</span>
                        </div>
                        <div class="p-xp">
                            <div class="xp-num">
                                ${trueRankIndex > 1 ? '<i class="ri-flashlight-fill"></i>' : ''} 
                                ${(p.xp || 0).toLocaleString()}
                            </div>
                            <div class="xp-label">Points</div>
                        </div>
                    </div>
                `;
            }).join('');

            // Bottom Floating Tracker HUD calculations
            const myIndex = data.findIndex(p => p.name === currentUser);
            const stickyTargetNode = document.getElementById("sticky-root");
            
            if (myIndex > 2) { 
                const myData = data[myIndex];
                const rivalData = data[myIndex - 1]; 
                const xpNeeded = (rivalData.xp || 0) - (myData.xp || 0);

                stickyTargetNode.innerHTML = `
                    <div class="sticky-my-status">
                        <div style="display:flex; flex-direction:column; min-width:0;">
                            <span style="font-size:12px; font-weight:800; color:#22d3ee; display:flex; align-items:center; gap:5px;">
                                #${myIndex + 1} YOU
                            </span>
                            <span style="font-size:10px; color:#94a3b8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px;">
                                🎯 Need <b>${xpNeeded.toLocaleString()} XP</b> to beat #${myIndex}
                            </span>
                        </div>
                        <span style="font-weight:900; font-size:15px; color:#fff; flex-shrink:0;">
                            ${(myData.xp || 0).toLocaleString()} <span style="font-size:9px; color:var(--neon-green)">XP</span>
                        </span>
                    </div>
                `;
            } else {
                stickyTargetNode.innerHTML = ""; 
            }
        }

        // Live Dynamic Filtering Execution Block
        document.getElementById("search-bar").addEventListener("input", (e) => {
            renderUI(globalPlayersDataset, e.target.value);
        });

        // Fast Load Cache Handshake
        const localCache = localStorage.getItem("bt_leaderboard_cache");
        if (localCache) {
            try { 
                globalPlayersDataset = JSON.parse(localCache);
                renderUI(globalPlayersDataset); 
            } catch(e) { console.error("Cache handshake failure tracking", e); }
        }

        // Realtime Database Event Binding Pipeline
        const q = query(collection(db, "students"), orderBy("xp", "desc"));
        onSnapshot(q, (snap) => {
            globalPlayersDataset = snap.docs.map(doc => ({ name: doc.id, ...doc.data() }));
            localStorage.setItem("bt_leaderboard_cache", JSON.stringify(globalPlayersDataset));
            const currentSearchQuery = document.getElementById("search-bar").value;
            renderUI(globalPlayersDataset, currentSearchQuery);
        });
    </script>
</body>
</html>
