<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --success: #22c55e; --danger: #ef4444;
        }

        body { 
            background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            /* Buttons ke liye niche jagah chhodi hai */
            padding-bottom: 160px; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%);
        }

        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; box-sizing: border-box; }

        /* --- Header Section --- */
        .profile-header { text-align: center; margin-bottom: 20px; position: relative; }
        .avatar-wrapper { position: relative; width: 115px; height: 115px; margin: 0 auto 12px; }
        .avatar { 
            width: 100%; height: 100%; border-radius: 35px; object-fit: cover;
            border: 2px solid var(--accent); padding: 3px; background: var(--glass);
        }
        .level-tag {
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 4px 12px;
            border-radius: 10px; font-weight: 800; font-size: 10px; white-space: nowrap;
        }

        /* --- Stats Grid --- */
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px 5px; border-radius: 20px; text-align: center; }
        .stat-val { font-size: 18px; font-weight: 800; color: var(--accent); display: block; }
        .stat-lbl { font-size: 8px; opacity: 0.5; text-transform: uppercase; margin-top: 4px; }

        /* --- Status Row --- */
        .status-row { display: grid; grid-template-columns: 1.2fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 22px; padding: 15px; display: flex; align-items: center; gap: 10px; }
        .circle-ui { width: 40px; height: 40px; border-radius: 50%; border: 3px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: var(--accent); }

        /* --- Progress Bar --- */
        .xp-container { background: rgba(255,255,255,0.05); height: 6px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1px solid var(--glass-border); }
        .xp-fill { background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; height: 100%; transition: 1s ease; }

        /* --- Info Cards --- */
        .info-panel { background: var(--glass); border-radius: 24px; padding: 20px; border: 1px solid var(--glass-border); margin-bottom: 15px; }
        .label-ui { color: var(--accent); font-size: 9px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .h-title { font-size: 20px; font-weight: 800; margin: 0; }
        .h-sub { font-size: 11px; opacity: 0.5; margin-top: 4px; display: block; }

        /* --- Inputs --- */
        input { width: 100%; background: #0f172a; border: 1px solid var(--glass-border); padding: 14px; border-radius: 15px; color: white; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        .btn-gradient { width: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); color: white; border: none; padding: 15px; border-radius: 16px; font-weight: 800; cursor: pointer; }

        /* --- FIXED NAVIGATION BAR --- */
        .nav-fixed-container {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            padding: 20px;
            background: linear-gradient(transparent, var(--bg) 40%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-sizing: border-box;
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 12px;
            border-radius: 18px;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .btn-home {
            background: #fff;
            color: #000;
            padding: 16px;
            border-radius: 20px;
            text-align: center;
            font-weight: 800;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-header">
        <div class="avatar-wrapper">
            <img id="photo" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" onclick="document.getElementById('file').click()">
            <div class="level-tag" id="lvl-txt">LVL 1 STUDENT</div>
            <input type="file" id="file" hidden>
        </div>
        <h2 id="showName" style="margin: 0; font-size: 24px;">---</h2>
        <p id="showBio" style="font-size: 12px; opacity: 0.5; margin-top: 4px;">Connected to Terminal</p>
    </div>

    <div class="grid-3">
        <div class="stat-card"><span class="stat-val" id="xp">0</span><span class="stat-lbl">XP</span></div>
        <div class="stat-card"><span class="stat-val" id="rank">#--</span><span class="stat-lbl">Rank</span></div>
        <div class="stat-card"><span class="stat-val" id="streak">0</span><span class="stat-lbl">Streak</span></div>
    </div>

    <div class="status-row">
        <div class="status-card">
            <div class="circle-ui" id="attCircle">0%</div>
            <div style="font-size: 10px;"><b>Attendance</b><br><span id="attDays" style="opacity:0.5">0/0 Days</span></div>
        </div>
        <div class="status-card">
            <div style="font-size: 10px; width: 100%;">
                <b>Course Ends In</b><br>
                <span id="expiryText" style="color:var(--danger); font-size: 15px; font-weight:800">-- Days</span>
            </div>
            <i class="ri-time-line" style="opacity: 0.3;"></i>
        </div>
    </div>

    <div class="xp-container">
        <div class="xp-fill" id="xpFill"></div>
    </div>

    <div class="info-panel">
        <div class="label-ui"><i class="ri-shield-check-line"></i> Current Program</div>
        <h3 class="h-title" id="showCourse">PGDCA</h3>
        <span class="h-sub" id="showJoinDate">Admission: 2026-01-02</span>
        <span class="h-sub" id="showPlan" style="color:var(--success); font-weight:700">Course Plan: 6 Months</span>
    </div>

    <div class="info-panel">
        <div class="label-ui"><i class="ri-user-settings-line"></i> Update Profile Name</div>
        <input type="text" id="nameInput" placeholder="Enter new name...">
        <button class="btn-gradient" onclick="updateName()">Update Name</button>
    </div>
</div>

<div class="nav-fixed-container">
    <div class="btn-logout" onclick="logout()">
        <i class="ri-logout-circle-line"></i> Secure Logout
    </div>
    <a href="index.html" class="btn-home">
        <i class="ri-home-4-fill"></i> Return to Terminal
    </a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, getDocs, collection, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let studentID = localStorage.getItem("studentName");

    function startLiveSync() {
        if(!studentID) { window.location.href = "login.html"; return; }

        onSnapshot(doc(db, "students", studentID), (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById("showName").innerText = studentID;
                document.getElementById("xp").innerText = data.xp || 0;
                document.getElementById("streak").innerText = data.streak || 0;
                if(data.photo) document.getElementById("photo").src = data.photo;
                
                // XP & Level
                let xp = data.xp || 0;
                let lvl = Math.floor(xp / 1000) + 1;
                let prg = ((xp % 1000) / 1000) * 100;
                document.getElementById("lvl-txt").innerText = "LVL " + lvl + " STUDENT";
                document.getElementById("xpFill").style.width = prg + "%";

                // Attendance
                const att = data.attendedDays || 0;
                const total = data.totalDays || 0;
                const perc = total > 0 ? Math.round((att/total)*100) : 0;
                document.getElementById("attCircle").innerText = perc + "%";
                document.getElementById("attDays").innerText = `${att}/${total} Days`;

                // Course Expiry
                if(data.admissionDate && data.coursePlanMonths) {
                    const adm = new Date(data.admissionDate);
                    const exp = new Date(adm);
                    exp.setMonth(exp.getMonth() + parseInt(data.coursePlanMonths));
                    const diff = Math.ceil((exp - new Date()) / (1000 * 60 * 60 * 24));
                    document.getElementById("expiryText").innerText = (diff > 0 ? diff : 0) + " Days";
                }
            }
        });
        updateRank();
    }

    async function updateRank() {
        const snap = await getDocs(collection(db, "students"));
        let arr = []; snap.forEach(s => arr.push({id: s.id, xp: s.data().xp || 0}));
        arr.sort((a,b) => b.xp - a.xp);
        document.getElementById("rank").innerText = "#" + (arr.findIndex(x => x.id === studentID) + 1 || "--");
    }

    window.logout = () => {
        if(confirm("Are you sure you want to logout?")) {
            localStorage.removeItem("studentName");
            window.location.href = "login.html";
        }
    };

    window.updateName = async () => {
        let n = document.getElementById("nameInput").value.trim();
        if(!n || n === studentID) return;
        if(confirm(`Lock profile name as "${n}"?`)) {
            const oldRef = doc(db, "students", studentID);
            const d = (await getDoc(oldRef)).data();
            await setDoc(doc(db, "students", n), d);
            localStorage.setItem("studentName", n);
            window.location.reload();
        }
    };

    document.getElementById("file").onchange = e => {
        let r = new FileReader();
        r.onload = async () => {
            document.getElementById("photo").src = r.result;
            await updateDoc(doc(db, "students", studentID), { photo: r.result });
        };
        r.readAsDataURL(e.target.files[0]);
    };

    window.onload = startLiveSync;
</script>
</body>
</html>
