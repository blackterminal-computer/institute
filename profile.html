<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --primary: #6366f1;
            --accent: #06b6d4;
            --bg: #030712;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --danger: #f43f5e;
            --warning: #f59e0b;
        }

        body { 
            background: var(--bg);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; 
            margin: 0;
            padding-bottom: 200px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(6, 182, 212, 0.1) 0%, transparent 40%);
        }

        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 24px; box-sizing: border-box; }

        .profile-header { text-align: center; margin-bottom: 35px; position: relative; animation: fadeIn 0.8s ease-out; }
        .avatar-wrapper { position: relative; width: 130px; height: 130px; margin: 0 auto 20px; }
        .avatar { 
            width: 100%; height: 100%; border-radius: 44px; object-fit: cover;
            border: 2.5px solid var(--accent); padding: 5px; background: var(--card-bg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .avatar:active { transform: scale(0.95); }
        .level-tag {
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); color: #000; padding: 6px 16px;
            border-radius: 50px; font-weight: 800; font-size: 10px; white-space: nowrap;
            letter-spacing: 0.5px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .stat-card { 
            background: var(--card-bg); border: 1px solid var(--card-border); 
            padding: 16px 8px; border-radius: 24px; text-align: center; backdrop-filter: blur(12px);
        }
        .stat-num { font-size: 20px; font-weight: 800; color: #fff; display: block; }
        .stat-lbl { font-size: 9px; opacity: 0.4; text-transform: uppercase; margin-top: 5px; font-weight: 700; letter-spacing: 0.5px; }

        .academic-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 32px; padding: 24px; border: 1px solid var(--card-border); margin-bottom: 25px;
            backdrop-filter: blur(20px);
        }
        .card-label { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; letter-spacing: 1px; }
        
        .attendance-card {
            background: rgba(255, 255, 255, 0.02);
            padding: 24px; border-radius: 32px; border: 1px solid var(--card-border); 
            margin-bottom: 20px; backdrop-filter: blur(20px);
        }
        .att-main { display: flex; align-items: center; gap: 20px; margin-bottom: 18px; }
        .progress-ring { position: relative; width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; }
        .progress-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .progress-ring circle { fill: none; stroke-width: 7; stroke-linecap: round; }
        .ring-bg { stroke: rgba(255, 255, 255, 0.05); }
        .ring-fill { stroke: var(--accent); stroke-dasharray: 201; stroke-dashoffset: 201; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .perc-txt { position: absolute; font-size: 15px; font-weight: 800; color: #fff; }

        .badge-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .badge-scroll::-webkit-scrollbar { display: none; }

        textarea, input[type="text"], input[type="number"], select { 
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--card-border); 
            padding: 15px; border-radius: 16px; color: white; outline: none; font-size: 14px;
            box-sizing: border-box; transition: 0.3s;
        }

        .history-box { background: var(--card-bg); border-radius: 32px; padding: 24px; border: 1px solid var(--card-border); margin-bottom: 25px; }
        .update-btn { width: 100%; background: #fff; color: #000; border: none; padding: 16px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .nav-group { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 380px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; }
        .home-nav { background: #fff; color: #000; padding: 18px; border-radius: 24px; text-align: center; font-weight: 800; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logout-btn { background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid rgba(244, 63, 94, 0.2); padding: 14px; border-radius: 20px; text-align: center; font-weight: 700; cursor: pointer; font-size: 13px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-header">
        <div class="avatar-wrapper">
            <img id="photo" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" onclick="document.getElementById('file').click()">
            <div class="level-tag" id="lvl-txt">LVL 1 STUDENT</div>
            <input type="file" id="file" accept="image/*" hidden>
        </div>
        <h2 id="showName" style="margin: 0; font-size: 28px; letter-spacing: -1px;">---</h2>
        <p id="showBio" style="font-size: 15px; opacity: 0.5; margin-top: 6px;">Syncing profile...</p>
    </div>

    <div class="stats-row">
        <div class="stat-card"><span class="stat-num" id="xp">0</span><span class="stat-lbl">XP Points</span></div>
        <div class="stat-card"><span class="stat-num" id="rank">#--</span><span class="stat-lbl">Global Rank</span></div>
        <div class="stat-card"><span class="stat-num" id="streak">0</span><span class="stat-lbl">🔥 Streak</span></div>
    </div>

    <div class="academic-card" style="padding: 15px;">
        <div class="card-label"><i class="ri-radar-line"></i> Technical Mastery</div>
        <canvas id="skillChart" style="max-height: 250px;"></canvas>
    </div>

    <div class="history-box">
        <div class="card-label"><i class="ri-medal-line"></i> Unlocked Achievements</div>
        <div id="badgeContainer" class="badge-scroll"></div>
    </div>

    <div class="attendance-card">
        <div class="att-main">
            <div class="progress-ring">
                <svg><circle class="ring-bg" cx="37.5" cy="37.5" r="33"></circle><circle id="ringFill" class="ring-fill" cx="37.5" cy="37.5" r="33"></circle></svg>
                <span class="perc-txt" id="attPerc">0%</span>
            </div>
            <div class="att-info">
                <span id="courseEndStatus" style="font-size: 12px; opacity: 0.5; font-weight: 600;">Calculating...</span><br>
                <span id="attDaysText" style="font-size: 18px; font-weight: 800; color: #fff;">0 / -- Days</span>
            </div>
        </div>
    </div>

    <div class="academic-card">
        <div class="card-label"><i class="ri-shield-check-fill"></i> Enrollment Status</div>
        <h3 id="showCourse" style="font-size: 22px; font-weight: 800; margin: 0;">Loading...</h3>
        <span id="showDuration" style="font-size: 14px; color: #94a3b8; display: block; margin: 8px 0;">Duration: --</span>
        <div id="feeStatusBadge" style="font-size: 10px; padding: 6px 14px; border-radius: 10px; font-weight: 700; display: inline-block;">Status: --</div>
    </div>

    <div class="edit-box" style="margin-bottom: 25px;">
        <div class="card-label"><i class="ri-user-smile-line"></i> Profile Settings</div>
        <input type="text" id="nameInput" placeholder="Update full name" style="margin-bottom: 12px;">
        <textarea id="bioInput" rows="2" placeholder="Write a short bio..." style="margin-bottom: 12px;"></textarea>
        <button class="update-btn" onclick="updateProfile()">Save Changes</button>
    </div>
</div>

<div class="nav-group">
    <div class="logout-btn" onclick="logout()"><i class="ri-logout-circle-line"></i> Secure Logout</div>
    <a href="index.html" class="home-nav"><i class="ri-home-4-fill"></i> Return Home</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let studentID = localStorage.getItem("studentName");
    let skillChart;

    if(!studentID) window.location.href = "login.html";

    // Chart Setup
    function updateSkillChart(skills = {}) {
        const ctx = document.getElementById('skillChart').getContext('2d');
        const data = {
            labels: ['Logic', 'UI/UX', 'Database', 'Speed', 'Clean Code', 'Security'],
            datasets: [{
                data: [skills.logic || 60, skills.design || 70, skills.db || 50, skills.speed || 80, skills.code || 65, skills.sec || 40],
                backgroundColor: 'rgba(99, 102, 241, 0.2)',
                borderColor: '#6366f1',
                pointBackgroundColor: '#06b6d4',
            }]
        };

        if (skillChart) skillChart.destroy();
        skillChart = new Chart(ctx, {
            type: 'radar',
            data: data,
            options: {
                scales: { r: { angleLines: { color: 'rgba(255,255,255,0.05)' }, grid: { color: 'rgba(255,255,255,0.05)' }, pointLabels: { color: '#94a3b8', font: { size: 10 } }, ticks: { display: false }, suggestedMin: 0, suggestedMax: 100 } },
                plugins: { legend: { display: false } }
            }
        });
    }

    // Badge Setup
    function renderBadges(xp) {
        const container = document.getElementById('badgeContainer');
        const badges = [
            { name: 'Seed', xp: 0, icon: 'ri-seedling-line', col: '#10b981' },
            { name: 'Coder', xp: 1000, icon: 'ri-terminal-box-line', col: '#6366f1' },
            { name: 'Elite', xp: 5000, icon: 'ri-vip-diamond-line', col: '#06b6d4' },
            { name: 'Pro', xp: 10000, icon: 'ri-shield-flash-line', col: '#f59e0b' }
        ];
        container.innerHTML = badges.map(b => `
            <div style="min-width:70px; text-align:center; opacity:${xp >= b.xp ? 1 : 0.2}">
                <div style="background:${b.col}; width:45px; height:45px; border-radius:14px; display:flex; align-items:center; justify-content:center; margin:0 auto 5px; color:#fff; font-size:20px;">
                    <i class="${b.icon}"></i>
                </div>
                <div style="font-size:9px; font-weight:800;">${b.name}</div>
            </div>
        `).join('');
    }

    function startSync() {
        onSnapshot(doc(db, "students", studentID), (snap) => {
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById("showName").innerText = studentID;
                document.getElementById("showBio").innerText = d.bio || "Elite Member";
                document.getElementById("xp").innerText = d.xp || 0;
                document.getElementById("streak").innerText = d.streak || 0;
                if(d.photo) document.getElementById("photo").src = d.photo;

                renderBadges(d.xp || 0);
                updateSkillChart(d.skills);

                let level = Math.floor((d.xp || 0) / 1000) + 1;
                document.getElementById("lvl-txt").innerText = "LVL " + level + " STUDENT";
                document.getElementById("showCourse").innerText = d.currentCourse || "Unassigned";
                
                const badge = document.getElementById("feeStatusBadge");
                badge.innerText = d.paymentStatus === "Paid" ? "BILLING: ACTIVE" : "BILLING: OVERDUE";
                badge.style.background = d.paymentStatus === "Paid" ? "rgba(16, 185, 129, 0.1)" : "rgba(244, 63, 94, 0.1)";
                badge.style.color = d.paymentStatus === "Paid" ? "var(--success)" : "var(--danger)";
            }
        });
    }

    window.updateProfile = async () => {
        const nBio = document.getElementById("bioInput").value.trim();
        const nName = document.getElementById("nameInput").value.trim();
        if(nBio || nName) {
            const updates = {};
            if(nBio) updates.bio = nBio;
            await updateDoc(doc(db, "students", studentID), updates);
            alert("Profile Synced!");
        }
    };

    window.logout = () => { if(confirm("Logout?")) { localStorage.clear(); window.location.href="login.html"; }};

    window.onload = startSync;
</script>
</body>
</html>
