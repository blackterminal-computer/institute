<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Elite Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --bg: #030712; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding-bottom: 100px; }
        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        
        .avatar-wrapper { text-align: center; padding: 40px 0; }
        .avatar { width: 120px; height: 120px; border-radius: 32px; border: 3px solid #6366f1; padding: 4px; object-fit: cover; }
        
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 28px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(10px); }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--glass); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--border); }
        .stat-num { font-size: 18px; font-weight: 800; color: #fff; display: block; }
        .stat-lbl { font-size: 9px; opacity: 0.5; text-transform: uppercase; }
        
        .update-btn { width: 100%; background: #fff; color: #000; border: none; padding: 16px; border-radius: 16px; font-weight: 800; cursor: pointer; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 15px; border-radius: 16px; color: white; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar-wrapper">
        <img id="photo" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
    </div>
    <div style="text-align: center; margin-bottom: 25px;">
        <h2 id="showName" style="margin:0;">---</h2>
        <p id="showBio" style="opacity: 0.5; margin-top:5px;">Syncing...</p>
    </div>

    <div class="stats-row">
        <div class="stat-card"><span class="stat-num" id="xp">0</span><span class="stat-lbl">XP</span></div>
        <div class="stat-card"><span class="stat-num" id="rank">#--</span><span class="stat-lbl">Rank</span></div>
        <div class="stat-card"><span class="stat-num" id="streak">0</span><span class="stat-lbl">Streak</span></div>
    </div>

    <div class="card">
        <div id="courseEndStatus" style="font-size: 12px; opacity: 0.5;">Attendance</div>
        <div id="attDaysText" style="font-size: 20px; font-weight: 800;">0 / 0 Days</div>
    </div>

    <div class="card">
        <div style="font-size: 12px; opacity: 0.5;">Enrollment</div>
        <div id="showCourse" style="font-weight: 800; font-size: 18px;">---</div>
    </div>

    <div class="card">
        <input type="text" id="nameInput" placeholder="Update Name">
        <button class="update-btn" onclick="updateName()">Update Profile</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { /* YOUR CONFIG HERE */ };
    const db = getFirestore(initializeApp(firebaseConfig));
    let studentID = localStorage.getItem("studentName");

    if(!studentID) window.location.href = "login.html";

    onSnapshot(doc(db, "students", studentID), (snap) => {
        if (snap.exists()) {
            const d = snap.data();
            document.getElementById("showName").innerText = studentID;
            document.getElementById("showBio").innerText = d.bio || "Member of Black Terminal";
            document.getElementById("xp").innerText = d.xp || 0;
            document.getElementById("streak").innerText = d.streak || 0;
            document.getElementById("showCourse").innerText = d.currentCourse || "Unassigned";
            if(d.photo) document.getElementById("photo").src = d.photo;
        } else {
            document.getElementById("showBio").innerText = "Profile not found.";
        }
    });

    window.updateName = async () => {
        const newName = document.getElementById("nameInput").value;
        if(newName) {
            await updateDoc(doc(db, "students", studentID), { bio: newName });
            alert("Updated!");
        }
    };
</script>
</body>
</html>
