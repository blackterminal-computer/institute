<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Elite Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root {
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --accent-grad: linear-gradient(135deg, #6366f1, #06b6d4);
        }
        body { 
            background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding-bottom: 120px;
            background-image: radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
        }
        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        
        /* Glassmorphism Cards */
        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 32px; padding: 24px; margin-bottom: 20px; }
        
        .avatar-wrapper { text-align: center; margin-bottom: 25px; position: relative; }
        .avatar { 
            width: 130px; height: 130px; border-radius: 40px; border: 4px solid transparent; 
            background: linear-gradient(var(--bg), var(--bg)) padding-box, var(--accent-grad) border-box;
            padding: 4px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .stat-card { background: var(--glass); padding: 16px; border-radius: 24px; text-align: center; border: 1px solid var(--border); }
        .stat-num { font-size: 18px; font-weight: 800; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .progress-ring { width: 70px; height: 70px; }
        .ring-fill { stroke: #06b6d4; stroke-width: 6; stroke-linecap: round; fill: none; transition: 1.5s; }
        
        input, select, textarea { background: rgba(0,0,0,0.4); border: 1px solid var(--border); padding: 15px; border-radius: 16px; color: white; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .update-btn { background: #fff; color: #000; font-weight: 800; border: none; padding: 16px; border-radius: 16px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar-wrapper">
        <img id="photo" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" onclick="document.getElementById('file').click()">
        <input type="file" id="file" hidden>
    </div>
    <div style="text-align: center; margin-bottom: 25px;">
        <h2 id="showName" style="margin:0; font-size: 24px;">---</h2>
        <p id="showBio" style="opacity: 0.5; font-size: 14px;">Syncing...</p>
    </div>

    <div class="stats-row">
        <div class="stat-card"><span class="stat-num" id="xp">0</span><div style="font-size:9px; opacity:0.5">XP</div></div>
        <div class="stat-card"><span class="stat-num" id="rank">#--</span><div style="font-size:9px; opacity:0.5">RANK</div></div>
        <div class="stat-card"><span class="stat-num" id="streak">0</span><div style="font-size:9px; opacity:0.5">STREAK</div></div>
    </div>

    <div class="card">
        <div style="display:flex; align-items:center; gap:20px;">
            <div class="progress-ring">
                <svg><circle cx="35" cy="35" r="30" stroke="rgba(255,255,255,0.1)" stroke-width="6" fill="none"/><circle id="ringFill" class="ring-fill" cx="35" cy="35" r="30" stroke-dasharray="188" stroke-dashoffset="188"/></svg>
            </div>
            <div>
                <div id="courseEndStatus" style="font-size: 11px; color: #06b6d4; font-weight: 800;">---</div>
                <div id="attDaysText" style="font-size: 18px; font-weight: 800;">0 / 0 Days</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; font-size: 16px;">Enrollment</h3>
        <p id="showCourse" style="font-weight: 800; font-size: 20px; margin: 5px 0;">---</p>
        <span id="feeStatusBadge" style="font-size: 10px; padding: 4px 10px; border-radius: 8px; background: rgba(255,255,255,0.1);">---</span>
    </div>

    <div class="card">
        <input type="text" id="nameInput" placeholder="New Display Name">
        <button class="update-btn" onclick="updateName()">Update Profile</button>
    </div>
</div>

<script type="module">
    // ... (Your existing Firebase imports and logic remain here)
    // Note: The UI logic in startRealTimeSync() will now automatically populate these classes.
</script>

</body>
</html>
