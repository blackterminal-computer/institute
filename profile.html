<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --success: #22c55e; --danger: #ef4444; --gold: #facc15;
        }

        body { 
            background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding-bottom: 180px; overflow-x: hidden;
            background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%);
        }

        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; box-sizing: border-box; }

        /* --- Profile Header --- */
        .profile-header { text-align: center; margin-bottom: 30px; position: relative; }
        .avatar-wrapper { position: relative; width: 125px; height: 125px; margin: 0 auto 15px; }
        .avatar { 
            width: 100%; height: 100%; border-radius: 40px; object-fit: cover;
            border: 2px solid var(--accent); padding: 4px; background: var(--glass);
        }
        .level-tag {
            position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 5px 15px;
            border-radius: 12px; font-weight: 800; font-size: 11px; white-space: nowrap;
        }

        /* --- Stats & Attendance --- */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .stat-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px 5px; border-radius: 20px; text-align: center; }
        .stat-num { font-size: 18px; font-weight: 800; color: var(--accent); display: block; }
        .stat-lbl { font-size: 9px; opacity: 0.5; text-transform: uppercase; margin-top: 4px; }

        /* --- Attendance & Expiry --- */
        .elite-row { display: flex; gap: 10px; margin-bottom: 25px; }
        .attendance-box { flex: 1; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 15px; display: flex; align-items: center; gap: 12px; }
        .att-circle { width: 45px; height: 45px; border-radius: 50%; border: 3px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }
        
        .expiry-card { flex: 1; background: rgba(244, 63, 94, 0.1); border: 1px solid rgba(244, 63, 94, 0.2); border-radius: 24px; padding: 15px; text-align: center; }
        .expiry-days { color: var(--danger); font-size: 18px; font-weight: 900; display: block; }

        /* --- QR ID Card Modal --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .id-card { background: #fff; width: 100%; max-width: 300px; border-radius: 20px; padding: 20px; color: #000; text-align: center; }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; }

        /* --- Purana CSS (Same rakha gaya hai) --- */
        .academic-card { background: linear-gradient(145deg, rgba(99,102,241,0.15) 0%, rgba(15,23,42,1) 100%); border-radius: 28px; padding: 22px; border: 1px solid var(--glass-border); margin-bottom: 25px; }
        .card-label { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .update-btn { width: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer; margin-top: 10px;}
        .history-box { background: var(--glass); border-radius: 28px; padding: 22px; border: 1px solid var(--glass-border); margin-bottom: 25px; }
        .paid-label { background: rgba(34, 197, 94, 0.15); color: var(--success); font-size: 9px; padding: 2px 8px; border-radius: 6px; border: 1px solid rgba(34, 197, 94, 0.2); text-transform: uppercase; }
        .nav-group { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .home-nav { background: #fff; color: #000; padding: 16px; border-radius: 22px; text-align: center; font-weight: 800; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .id-btn { background: var(--glass); color: #fff; border: 1px solid var(--glass-border); padding: 12px; border-radius: 15px; font-size: 12px; font-weight: 700; width: 100%; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;}
    </style>
</head>
<body>

<div class="container">
    <div class="profile-header">
        <div class="avatar-wrapper">
            <img id="photo" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <div class="level-tag" id="lvl-txt">LVL 1 STUDENT</div>
        </div>
        <h2 id="showName" style="margin: 0; font-size: 26px;">---</h2>
        <p id="showBio" style="font-size: 14px; opacity: 0.6; margin-top: 8px;">Syncing...</p>
    </div>

    <button class="id-btn" onclick="showIDCard()"><i class="ri-qr-code-line"></i> Show My ID Card</button>

    <div class="stats-row">
        <div class="stat-card"><span class="stat-num" id="xp">0</span><span class="stat-lbl">XP Points</span></div>
        <div class="stat-card"><span class="stat-num" id="rank">#--</span><span class="stat-lbl">Global Rank</span></div>
        <div class="stat-card"><span class="stat-num" id="streak">0</span><span class="stat-lbl">🔥 Streak</span></div>
    </div>

    <div class="elite-row">
        <div class="attendance-box">
            <div class="att-circle" id="attCircle">0%</div>
            <div style="font-size: 11px;"><b>Attendance</b><br><span id="attDays">0/0 Days</span></div>
        </div>
        <div class="expiry-card">
            <span style="font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Access Ends In</span>
            <span class="expiry-days" id="expiryText">-- Days</span>
        </div>
    </div>

    <div class="academic-card">
        <div class="card-label"><i class="ri-shield-check-fill"></i> Enrollment Details</div>
        <h3 id="showCourse" style="font-size: 20px; font-weight: 800;">Loading Course...</h3>
        <span id="showJoinDate" style="font-size: 13px; color: #94a3b8; display: block; margin-top: 5px;">Joined: --</span>
        <div id="feeStatusBadge" class="paid-label" style="margin-top: 10px; display: inline-block;">Status: --</div>
    </div>

    <button class="update-btn" id="checkInBtn" onclick="markAttendance()"><i class="ri-map-pin-user-fill"></i> Mark Today's Attendance</button>

    <div class="history-box" style="margin-top: 25px;">
        <div class="card-label"><i class="ri-history-line"></i> Payment History</div>
        <div id="historyList"><p style="font-size: 12px; opacity: 0.4; text-align: center;">No records.</p></div>
    </div>
</div>

<div class="modal" id="idModal" onclick="this.style.display='none'">
    <div class="id-card" onclick="event.stopPropagation()">
        <h3 style="margin:0; font-size: 14px; letter-spacing: 2px;">ELITE TERMINAL ID</h3>
        <div id="qrcode"></div>
        <p id="qrID" style="font-weight: 800; font-size: 18px; margin: 10px 0 5px;"></p>
        <p style="font-size: 10px; color: #666;">Verified Student Profile</p>
    </div>
</div>

<div class="nav-group">
    <a href="index.html" class="home-nav"><i class="ri-home-4-fill"></i> Return to Terminal</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let studentID = localStorage.getItem("studentName");

    if(!studentID) window.location.href = "login.html";

    function startSync() {
        onSnapshot(doc(db, "students", studentID), (snap) => {
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById("showName").innerText = studentID;
                document.getElementById("showBio").innerText = d.bio || "Student at Black Terminal";
                document.getElementById("xp").innerText = d.xp || 0;
                document.getElementById("streak").innerText = d.streak || 0;
                if(d.photo) document.getElementById("photo").src = d.photo;
                document.getElementById("showCourse").innerText = d.currentCourse || "Not Assigned";
                document.getElementById("showJoinDate").innerText = "Joined: " + (d.admissionDate || "--");

                // --- ATTENDANCE SYNC ---
                const att = d.attendedDays || 0;
                const total = d.totalDays || 1;
                const percent = Math.round((att/total)*100);
                document.getElementById("attCircle").innerText = percent + "%";
                document.getElementById("attDays").innerText = `${att}/${total} Days`;

                // --- EXPIRY LOGIC (Assume 90 days total if not set) ---
                if(d.admissionDate) {
                    const joinDate = new Date(d.admissionDate);
                    const expiryDate = new Date(joinDate.getTime() + (90 * 24 * 60 * 60 * 1000));
                    const today = new Date();
                    const diff = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
                    document.getElementById("expiryText").innerText = diff > 0 ? diff + " Days" : "Expired";
                }

                // --- CHECK-IN BUTTON STATE ---
                const lastCheck = d.lastCheckIn || 0;
                const isToday = new Date(lastCheck).toDateString() === new Date().toDateString();
                const btn = document.getElementById("checkInBtn");
                if(isToday) {
                    btn.innerText = "Check-in Complete ✓";
                    btn.style.opacity = "0.5";
                    btn.disabled = true;
                }
            }
        });
    }

    // --- QR ID CARD ---
    window.showIDCard = () => {
        document.getElementById("idModal").style.display = 'flex';
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: studentID, width: 150, height: 150 });
        document.getElementById("qrID").innerText = studentID;
    };

    // --- ATTENDANCE CHECK-IN ---
    window.markAttendance = async () => {
        const ref = doc(db, "students", studentID);
        const snap = await getDoc(ref);
        const d = snap.data();
        
        const now = Date.now();
        await updateDoc(ref, {
            attendedDays: (d.attendedDays || 0) + 1,
            totalDays: (d.totalDays || 0) + 1,
            xp: (d.xp || 0) + 50, // Reward XP
            lastCheckIn: now
        });
        alert("Attendance Marked! +50 XP 🚀");
    };

    window.onload = startSync;
</script>
</body>
</html>
