<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Profile Final</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --success: #22c55e; --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding-bottom: 120px; overflow-x: hidden;
            background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%);
        }

        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; }

        /* --- Header & Stats --- */
        .profile-header { text-align: center; margin-bottom: 25px; }
        .avatar-wrapper { position: relative; width: 120px; height: 120px; margin: 0 auto 15px; }
        .avatar { width: 100%; height: 100%; border-radius: 38px; object-fit: cover; border: 2px solid var(--accent); padding: 4px; background: var(--glass); }
        .level-tag { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 4px 12px; border-radius: 10px; font-weight: 800; font-size: 10px; white-space: nowrap; }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px 5px; border-radius: 20px; text-align: center; }
        .stat-num { font-size: 18px; font-weight: 800; color: var(--accent); display: block; }

        /* --- Dynamic Metrics --- */
        .metric-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .metric-box { flex: 1; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 15px; display: flex; align-items: center; gap: 10px; }
        .att-circle { width: 42px; height: 42px; border-radius: 50%; border: 3px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; }
        
        .id-btn { background: var(--glass); color: #fff; border: 1px solid var(--glass-border); padding: 14px; border-radius: 18px; width: 100%; margin-bottom: 20px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .checkin-btn { width: 100%; background: #fff; color: #000; border: none; padding: 16px; border-radius: 18px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .checkin-btn:disabled { background: var(--glass); color: #64748b; box-shadow: none; cursor: not-allowed; }

        /* --- Modal & Nav --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .id-card-ui { background: #fff; width: 300px; border-radius: 25px; padding: 25px; color: #000; text-align: center; }
        #qrcode { margin: 15px auto; display: flex; justify-content: center; }
        .nav-group { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; }
        .home-nav { background: #fff; color: #000; padding: 16px; border-radius: 22px; text-align: center; font-weight: 800; text-decoration: none; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-header">
        <div class="avatar-wrapper">
            <img id="photo" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <div class="level-tag" id="lvl-txt">LVL 1 STUDENT</div>
        </div>
        <h2 id="showName">---</h2>
        <p id="showBio" style="font-size: 13px; opacity: 0.6;">Syncing with Terminal...</p>
    </div>

    <button class="id-btn" onclick="openID()"><i class="ri-qr-code-line"></i> Generate Elite ID Card</button>

    <div class="stats-row">
        <div class="stat-card"><span class="stat-num" id="xp">0</span><span style="font-size:9px">XP</span></div>
        <div class="stat-card"><span class="stat-num" id="rank">#--</span><span style="font-size:9px">RANK</span></div>
        <div class="stat-card"><span class="stat-num" id="streak">0</span><span style="font-size:9px">STREAK</span></div>
    </div>

    <div class="metric-row">
        <div class="metric-box">
            <div class="att-circle" id="attCircle">0%</div>
            <div style="font-size: 11px;"><b>Attendance</b><br><span id="attDays">0/0</span></div>
        </div>
        <div class="metric-box" style="border-color: rgba(239, 68, 68, 0.2);">
            <div style="font-size: 11px;"><b>Course Ends In</b><br><span id="expiryText" style="color:var(--danger); font-weight:800; font-size:14px;">-- Days</span></div>
        </div>
    </div>

    <div style="background: var(--glass); padding: 20px; border-radius: 25px; margin-bottom: 20px; border: 1px solid var(--glass-border);">
        <p style="font-size: 10px; color: var(--accent); font-weight: 800;">CURRENT PROGRAM</p>
        <h3 id="showCourse" style="margin: 5px 0;">Loading...</h3>
        <p id="showJoinDate" style="font-size: 11px; opacity: 0.5;">Admission: --</p>
        <p id="courseInfo" style="font-size: 10px; color: var(--success); margin-top: 5px; font-weight: 700;"></p>
    </div>

    <button class="checkin-btn" id="checkInBtn" onclick="markAttendance()">Mark Today's Attendance</button>
</div>

<div class="modal" id="idModal" onclick="this.style.display='none'">
    <div class="id-card-ui" onclick="event.stopPropagation()">
        <p style="font-size: 10px; font-weight: 800; color: #64748b;">ELITE TERMINAL ID</p>
        <div id="qrcode"></div>
        <h3 id="qrName">STUDENT</h3>
        <p id="qrCourse" style="font-size: 12px; color: #64748b;"></p>
        <div style="background:#dcfce7; color:#15803d; padding:5px; border-radius:10px; font-size:10px; font-weight:800; margin-top:10px;">VERIFIED PROFILE</div>
    </div>
</div>

<div class="nav-group">
    <a href="index.html" class="home-nav">Return to Terminal</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let studentID = localStorage.getItem("studentName");

    function startSync() {
        onSnapshot(doc(db, "students", studentID), (snap) => {
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById("showName").innerText = studentID;
                document.getElementById("qrName").innerText = studentID;
                document.getElementById("xp").innerText = d.xp || 0;
                document.getElementById("streak").innerText = d.streak || 0;
                document.getElementById("showCourse").innerText = d.currentCourse || "Not Assigned";
                document.getElementById("qrCourse").innerText = d.currentCourse || "Not Assigned";
                document.getElementById("showJoinDate").innerText = "Admission: " + (d.admissionDate || "--");
                if(d.photo) document.getElementById("photo").src = d.photo;

                // --- DYNAMIC DURATION LOGIC ---
                const durationMonths = d.courseDurationMonths || 6; // Admin se set kiya hua month
                document.getElementById("courseInfo").innerText = `Total Duration: ${durationMonths} Months`;

                if(d.admissionDate) {
                    const start = new Date(d.admissionDate);
                    const expiryDate = new Date(start);
                    expiryDate.setMonth(expiryDate.getMonth() + parseInt(durationMonths));

                    const today = new Date();
                    let workingDays = 0;
                    let tempDate = new Date(today);

                    // Skip Saturdays (6) and Sundays (0)
                    while (tempDate <= expiryDate) {
                        const day = tempDate.getDay();
                        if (day !== 0 && day !== 6) workingDays++;
                        tempDate.setDate(tempDate.getDate() + 1);
                    }
                    document.getElementById("expiryText").innerText = workingDays + " Days";
                }

                // Attendance
                const att = d.attendedDays || 0;
                const total = d.totalDays || 1;
                document.getElementById("attCircle").innerText = Math.round((att/total)*100) + "%";
                document.getElementById("attDays").innerText = `${att}/${total} Days`;

                // Button State
                const isToday = new Date(d.lastCheckIn || 0).toDateString() === new Date().toDateString();
                document.getElementById("checkInBtn").disabled = isToday;
                if(isToday) document.getElementById("checkInBtn").innerText = "Checked In ✓";
            }
        });
        updateRank();
    }

    async function updateRank() {
        const snap = await getDocs(collection(db, "students"));
        let arr = []; snap.forEach(s => arr.push({id: s.id, xp: s.data().xp || 0}));
        arr.sort((a,b) => b.xp - a.xp);
        document.getElementById("rank").innerText = "#" + (arr.findIndex(x => x.id === studentID) + 1);
    }

    window.openID = () => {
        document.getElementById("idModal").style.display = 'flex';
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: `BT-ELITE-VERIFIED:${studentID}`, width: 150, height: 150 });
    };

    window.markAttendance = async () => {
        const ref = doc(db, "students", studentID);
        const d = (await getDoc(ref)).data();
        await updateDoc(ref, {
            attendedDays: (d.attendedDays || 0) + 1,
            totalDays: (d.totalDays || 0) + 1,
            xp: (d.xp || 0) + 50,
            lastCheckIn: Date.now()
        });
    };

    window.onload = startSync;
</script>
</body>
</html>
