<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Profile Sync</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --success: #22c55e; --danger: #ef4444;
        }
        body { 
            background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding-bottom: 150px; overflow-x: hidden;
            background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%);
        }
        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .profile-header { text-align: center; margin-bottom: 30px; }
        .avatar-wrapper { position: relative; width: 120px; height: 120px; margin: 0 auto 15px; }
        .avatar { width: 100%; height: 100%; border-radius: 35px; object-fit: cover; border: 2px solid var(--accent); padding: 3px; background: var(--glass); }
        .level-tag { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 4px 12px; border-radius: 10px; font-weight: 800; font-size: 10px; white-space: nowrap; }
        
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .stat-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px 5px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); }
        .stat-num { font-size: 18px; font-weight: 800; color: var(--accent); display: block; }
        .stat-lbl { font-size: 9px; opacity: 0.5; text-transform: uppercase; margin-top: 4px; }

        .sync-box { background: rgba(99, 102, 241, 0.05); border: 1px dashed var(--primary); border-radius: 25px; padding: 20px; margin-bottom: 25px; }
        .card-label { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .input-style { width: 100%; background: #0f172a; border: 1px solid var(--glass-border); padding: 14px; border-radius: 15px; color: white; outline: none; margin-bottom: 12px; box-sizing: border-box; font-size: 14px; }
        
        .academic-card { background: linear-gradient(145deg, rgba(99,102,241,0.1) 0%, #0f172a 100%); border-radius: 25px; padding: 20px; border: 1px solid var(--glass-border); margin-bottom: 25px; }
        .course-title { font-size: 20px; font-weight: 800; margin: 0; color: #fff; }
        .history-box { background: var(--glass); border-radius: 25px; padding: 20px; border: 1px solid var(--glass-border); }
        
        .update-btn { width: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .update-btn:active { transform: scale(0.95); }

        .nav-group { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 8px; }
        .home-nav { background: #fff; color: #000; padding: 16px; border-radius: 20px; text-align: center; font-weight: 800; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-header">
        <div class="avatar-wrapper">
            <img id="photo" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" onclick="document.getElementById('file').click()">
            <div class="level-tag" id="lvl-txt">LVL 1 STUDENT</div>
            <input type="file" id="file" accept="image/*" hidden>
        </div>
        <h2 id="showName" style="margin: 0; font-size: 24px;">---</h2>
        <p id="showBio" style="font-size: 13px; opacity: 0.6; margin-top: 5px;">Syncing data...</p>
    </div>

    <div class="stats-row">
        <div class="stat-card"><span class="stat-num" id="xp">0</span><span class="stat-lbl">XP</span></div>
        <div class="stat-card"><span class="stat-num" id="rank">#--</span><span class="stat-lbl">Rank</span></div>
        <div class="stat-card"><span class="stat-num" id="streak">0</span><span class="stat-lbl">Streak</span></div>
    </div>

    <div class="sync-box">
        <div class="card-label"><i class="ri-refresh-line"></i> Sync with Name</div>
        <input type="text" id="newNameInput" class="input-style" placeholder="Enter name to sync...">
        <button class="update-btn" onclick="renameAndSync()">Sync Profile</button>
    </div>

    <div class="academic-card">
        <div class="card-label"><i class="ri-medal-line"></i> Course Details</div>
        <h3 class="course-title" id="showCourse">Loading...</h3>
        <p id="showDuration" style="font-size: 13px; color: #94a3b8; margin: 5px 0;">Duration: --</p>
        <div id="feeStatusBadge" style="font-size: 11px; font-weight: 800; text-transform: uppercase;">Status: --</div>
    </div>

    <div class="history-box">
        <div class="card-label"><i class="ri-history-line"></i> Payment Records</div>
        <div id="historyList"><p style="font-size: 11px; opacity: 0.4; text-align: center;">No history found.</p></div>
    </div>
</div>

<div class="nav-group">
    <a href="index.html" class="home-nav"><i class="ri-home-line"></i> Back to Terminal</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let studentID = localStorage.getItem("studentName");

    if(!studentID) window.location.href = "login.html";

    // Real-time Data Sync
    function startSync() {
        onSnapshot(doc(db, "students", studentID), (snap) => {
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById("showName").innerText = studentID;
                document.getElementById("showBio").innerText = d.bio || "Student at Black Terminal";
                document.getElementById("xp").innerText = d.xp || 0;
                document.getElementById("streak").innerText = d.streak || 0;
                if(d.photo) document.getElementById("photo").src = d.photo;
                document.getElementById("lvl-txt").innerText = "LVL " + (Math.floor((d.xp || 0)/1000)+1) + " STUDENT";
                document.getElementById("showCourse").innerText = d.currentCourse || "Not Assigned";
                document.getElementById("showDuration").innerText = "Duration: " + (d.courseDuration || "--");
                
                const badge = document.getElementById("feeStatusBadge");
                badge.innerText = "Current Status: " + (d.paymentStatus || "Pending");
                badge.style.color = d.paymentStatus === "Paid" ? "#22c55e" : "#ef4444";

                const hList = document.getElementById("historyList");
                if (d.paymentHistory && d.paymentHistory.length > 0) {
                    hList.innerHTML = d.paymentHistory.map(p => `
                        <div style="background:rgba(255,255,255,0.03); padding:12px; border-radius:15px; margin-bottom:8px; border:1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center;">
                            <div><div style="font-weight:800; font-size:13px;">${p.month}</div><div style="font-size:10px; opacity:0.5;">${p.date} • ₹${p.amount}</div></div>
                            <div style="color:var(--success); font-size:10px; font-weight:800;">PAID</div>
                        </div>`).join('');
                }
            }
        });
        updateRank();
    }

    // Rename & Sync Feature
    window.renameAndSync = async () => {
        const newName = document.getElementById("newNameInput").value.trim();
        if(!newName || newName === studentID) return alert("Please enter a valid name!");

        try {
            const newRef = doc(db, "students", newName);
            const newSnap = await getDoc(newRef);

            if(newSnap.exists()) {
                // Agar naam pehle se hai toh sirf sync/login hoga
                if(confirm(`"${newName}" database mein maujood hai. Kya aap iska data SYNC karna chahte hain?`)) {
                    localStorage.setItem("studentName", newName);
                    window.location.reload();
                }
            } else {
                // Agar naya naam hai toh data copy hoga
                if(confirm(`"${newName}" naya hai. Kya aap apna current data isme SYNC karna chahte hain?`)) {
                    const oldSnap = await getDoc(doc(db, "students", studentID));
                    if(oldSnap.exists()) {
                        await setDoc(newRef, oldSnap.data());
                        localStorage.setItem("studentName", newName);
                        alert("Data Migrated Successfully!");
                        window.location.reload();
                    }
                }
            }
        } catch (e) { alert("Error: " + e.message); }
    };

    async function updateRank() {
        const snap = await getDocs(collection(db, "students"));
        let arr = [];
        snap.forEach(s => arr.push({id: s.id, xp: s.data().xp || 0}));
        arr.sort((a,b) => b.xp - a.xp);
        document.getElementById("rank").innerText = "#" + (arr.findIndex(x => x.id === studentID) + 1 || "--");
    }

    document.getElementById("file").onchange = e => {
        let reader = new FileReader();
        reader.onload = async () => {
            document.getElementById("photo").src = reader.result;
            await updateDoc(doc(db, "students", studentID), { photo: reader.result });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    window.onload = startSync;
</script>
</body>
</html>
