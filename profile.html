<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --success: #22c55e; --danger: #ef4444;
        }

        body { 
            background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding-bottom: 120px; overflow-x: hidden;
            background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%);
        }

        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; box-sizing: border-box; }

        /* --- Level & Profile Fix --- */
        .profile-header { text-align: center; margin-bottom: 30px; position: relative; }
        .avatar-wrapper { position: relative; width: 120px; height: 120px; margin: 0 auto 15px; }
        .avatar { 
            width: 100%; height: 100%; border-radius: 35px; object-fit: cover;
            border: 2px solid var(--accent); padding: 4px; background: var(--glass);
        }
        .level-tag {
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, var(--primary), #818cf8); color: white; 
            padding: 4px 14px; border-radius: 10px; font-weight: 800; font-size: 10px; 
            white-space: nowrap; box-shadow: 0 4px 12px rgba(99,102,241,0.4);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* --- Stats Row --- */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .stat-card { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            padding: 15px 5px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px);
        }
        .stat-num { font-size: 18px; font-weight: 800; color: var(--accent); display: block; }
        .stat-lbl { font-size: 9px; opacity: 0.5; text-transform: uppercase; margin-top: 4px; }

        /* --- Academic Card --- */
        .academic-card {
            background: linear-gradient(145deg, rgba(99,102,241,0.1) 0%, rgba(15,23,42,1) 100%);
            border-radius: 28px; padding: 22px; border: 1px solid var(--glass-border); margin-bottom: 25px;
        }
        .card-label { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .course-title { font-size: 20px; font-weight: 800; margin: 0; color: #fff; }
        .duration-text { font-size: 13px; color: #94a3b8; margin: 6px 0 10px 0; display: block; }

        /* --- Premium History Design --- */
        .history-box { background: var(--glass); border-radius: 28px; padding: 22px; border: 1px solid var(--glass-border); margin-bottom: 25px; }
        .history-item { 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.03); padding: 14px 18px; border-radius: 20px;
            margin-bottom: 12px; border: 1px solid var(--glass-border);
        }
        .h-info { display: flex; flex-direction: column; gap: 3px; }
        .h-month { font-size: 14px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 6px; }
        .paid-tag { background: rgba(34, 197, 94, 0.15); color: var(--success); font-size: 8px; padding: 2px 6px; border-radius: 5px; text-transform: uppercase; border: 1px solid rgba(34, 197, 94, 0.2); }
        .h-amt { font-size: 11px; color: #94a3b8; font-weight: 600; }
        
        .dl-btn { 
            background: var(--primary); color: white; border: none;
            width: 38px; height: 38px; border-radius: 12px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; font-size: 18px;
            box-shadow: 0 4px 10px rgba(99,102,241,0.3); transition: 0.2s;
        }
        .dl-btn:active { transform: scale(0.9); }

        .home-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; background: #fff; color: #000;
            padding: 16px; border-radius: 22px; text-align: center; font-weight: 800;
            text-decoration: none; box-shadow: 0 15px 35px rgba(0,0,0,0.5); z-index: 1000;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-header">
        <div class="avatar-wrapper">
            <img id="photo" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" onclick="document.getElementById('file').click()">
            <div class="level-tag" id="lvl-txt">LVL 1 STUDENT</div>
            <input type="file" id="file" accept="image/*" hidden>
        </div>
        <h2 id="showName" style="margin: 0; font-size: 24px; letter-spacing: -0.5px;">---</h2>
        <p id="showBio" style="font-size: 13px; opacity: 0.5; margin-top: 5px;">Fetching details...</p>
    </div>

    <div class="stats-row">
        <div class="stat-card"><span class="stat-num" id="xp">0</span><span class="stat-lbl">XP Points</span></div>
        <div class="stat-card"><span class="stat-num" id="rank">#--</span><span class="stat-lbl">Global Rank</span></div>
        <div class="stat-card"><span class="stat-num" id="streak">0</span><span class="stat-lbl">🔥 Streak</span></div>
    </div>

    <div class="academic-card">
        <div class="card-label"><i class="ri-shield-check-fill"></i> Enrollment Details</div>
        <h3 class="course-title" id="showCourse">Loading...</h3>
        <span class="duration-text" id="showDuration">Duration: --</span>
        <div id="statusBadge" style="display:inline-block; font-size:10px; font-weight:800; background:rgba(34,197,94,0.1); color:var(--success); padding:5px 12px; border-radius:8px; border:1px solid rgba(34,197,94,0.2);">CURRENT: PAID</div>
    </div>

    <div class="history-box">
        <div class="card-label"><i class="ri-history-line"></i> Payment History</div>
        <div id="historyList">
            <p style="font-size: 11px; opacity: 0.3; text-align: center; padding: 10px;">No transaction records.</p>
        </div>
    </div>
</div>

<a href="index.html" class="home-nav"><i class="ri-home-4-fill"></i> Return to Terminal</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let studentID = localStorage.getItem("studentName");

    function startRealTimeSync() {
        onSnapshot(doc(db, "students", studentID), (snap) => {
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById("showName").innerText = studentID;
                document.getElementById("showBio").innerText = d.bio || "Keep Grinding!";
                document.getElementById("xp").innerText = d.xp || 0;
                document.getElementById("streak").innerText = d.streak || 0;
                if(d.photo) document.getElementById("photo").src = d.photo;
                
                // Level Logic Fix: Dashboard ki tarah Level 2 lane ke liye logic match kiya
                let level = Math.floor((d.xp || 0) / 500) + 1;
                document.getElementById("lvl-txt").innerText = "LVL " + level + " STUDENT";

                document.getElementById("showCourse").innerText = d.currentCourse || "Not Assigned";
                document.getElementById("showDuration").innerText = "Course Duration: " + (d.courseDuration || "N/A");

                const hList = document.getElementById("historyList");
                if (d.paymentHistory && d.paymentHistory.length > 0) {
                    hList.innerHTML = "";
                    d.paymentHistory.forEach(p => {
                        hList.innerHTML += `
                            <div class="history-item">
                                <div class="h-info">
                                    <div class="h-month">${p.month} <span class="paid-tag">Paid</span></div>
                                    <div class="h-amt">INR ${p.amount} • ${p.date}</div>
                                </div>
                                <button class="dl-btn" onclick="downloadPremiumInvoice('${p.month}', '${p.amount}', '${p.date}', '${d.courseDuration || 'N/A'}', '${d.currentCourse || 'N/A'}')">
                                    <i class="ri-download-cloud-2-line"></i>
                                </button>
                            </div>`;
                    });
                }
            }
        });
        updateRank();
    }

    window.downloadPremiumInvoice = (month, amt, date, duration, course) => {
        const htmlContent = `
            <html>
            <body style="font-family:sans-serif; padding:40px; background:#f4f7fe; display:flex; justify-content:center;">
                <div style="background:white; padding:40px; border-radius:30px; width:400px; border:1px solid #e2e8f0; box-shadow:0 10px 30px rgba(0,0,0,0.05);">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h1 style="color:#6366f1; margin:0; font-size:24px;">BLACK TERMINAL</h1>
                        <div style="font-size:10px; background:#dcfce7; color:#15803d; padding:4px 10px; border-radius:5px; font-weight:800;">OFFICIAL</div>
                    </div>
                    <p style="font-size:12px; color:#64748b; margin:5px 0 20px 0;">Payment Receipt - ${month}</p>
                    <div style="font-size:14px; color:#1e293b; line-height:2;">
                        <div style="display:flex; justify-content:space-between; border-bottom:1px dashed #eee;"><span>Student:</span> <b>${studentID}</b></div>
                        <div style="display:flex; justify-content:space-between; border-bottom:1px dashed #eee;"><span>Course:</span> <b>${course}</b></div>
                        <div style="display:flex; justify-content:space-between; border-bottom:1px dashed #eee;"><span>Duration:</span> <b>${duration}</b></div>
                        <div style="display:flex; justify-content:space-between; border-bottom:1px dashed #eee;"><span>Paid Amount:</span> <b>INR ${amt}</b></div>
                        <div style="display:flex; justify-content:space-between;"><span>Date:</span> <b>${date}</b></div>
                    </div>
                    <div style="margin-top:30px; text-align:center; font-size:10px; color:#94a3b8;">Thank you for being part of Black Terminal.</div>
                </div>
            </body>
            </html>`;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `Receipt_${month}.html`;
        link.click();
    };

    async function updateRank() {
        const snap = await getDocs(collection(db, "students"));
        let arr = [];
        snap.forEach(s => arr.push({id: s.id, xp: s.data().xp || 0}));
        arr.sort((a,b) => b.xp - a.xp);
        document.getElementById("rank").innerText = "#" + (arr.findIndex(x => x.id === studentID) + 1 || "--");
    }

    document.getElementById("file").onchange = e => {
        let reader = new FileReader();
        reader.onload = async () => {
            document.getElementById("photo").src = reader.result;
            await updateDoc(doc(db, "students", studentID), { photo: reader.result });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    window.onload = startRealTimeSync;
</script>
</body>
</html>
