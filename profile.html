<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --success: #22c55e; --danger: #ef4444;
        }

        body { 
            background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding-bottom: 120px; overflow-x: hidden;
            background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%);
        }

        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; box-sizing: border-box; }

        /* --- Profile Header (As per your Screenshot) --- */
        .profile-header { text-align: center; margin-bottom: 25px; position: relative; }
        .avatar-wrapper { position: relative; width: 120px; height: 120px; margin: 0 auto 15px; }
        .avatar { 
            width: 100%; height: 100%; border-radius: 35px; object-fit: cover;
            border: 2px solid var(--accent); padding: 3px; background: var(--glass);
        }
        .level-tag {
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: #6366f1; color: white; padding: 4px 12px;
            border-radius: 10px; font-weight: 800; font-size: 10px; white-space: nowrap;
            box-shadow: 0 4px 12px rgba(99,102,241,0.4);
        }

        /* --- Attendance & Course Access Row --- */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .info-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 18px; display: flex; align-items: center; gap: 12px; }
        .circle-stat { width: 42px; height: 42px; border-radius: 50%; border: 3px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: var(--accent); }

        /* --- Stats Bar --- */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px 5px; border-radius: 20px; text-align: center; }
        .stat-val { font-size: 18px; font-weight: 800; color: var(--accent); display: block; }
        .stat-lab { font-size: 8px; opacity: 0.5; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.5px; }

        /* --- XP Progress Bar --- */
        .progress-bar { background: rgba(255,255,255,0.05); height: 6px; border-radius: 10px; margin-bottom: 25px; overflow: hidden; border: 1px solid var(--glass-border); }
        .progress-fill { background: linear-gradient(90deg, #6366f1, #06b6d4); width: 0%; height: 100%; transition: 1s ease; }

        /* --- Action Buttons --- */
        .action-btn { width: 100%; background: var(--glass); border: 1px solid var(--glass-border); color: #fff; padding: 14px; border-radius: 18px; font-weight: 700; font-size: 13px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
        
        /* --- Program Card --- */
        .program-card { background: var(--glass); border-radius: 24px; padding: 22px; border: 1px solid var(--glass-border); margin-bottom: 20px; }
        .prog-label { color: var(--accent); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        .prog-title { font-size: 22px; font-weight: 800; margin: 0; }
        .prog-detail { font-size: 12px; opacity: 0.6; margin-top: 5px; display: block; }

        /* --- Controls --- */
        .control-box { background: var(--glass); border-radius: 24px; padding: 20px; border: 1px solid var(--glass-border); margin-bottom: 15px; }
        input { width: 100%; background: #0f172a; border: 1px solid var(--glass-border); padding: 14px; border-radius: 15px; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .blue-btn { width: 100%; background: linear-gradient(90deg, #6366f1, #06b6d4); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 800; }

        /* --- Bottom Nav --- */
        .nav-fixed { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
        .return-btn { background: #fff; color: #000; padding: 16px; border-radius: 22px; text-align: center; font-weight: 800; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-header">
        <div class="avatar-wrapper">
            <img id="photo" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" onclick="document.getElementById('file').click()">
            <div class="level-tag" id="lvl-txt">LVL 1 STUDENT</div>
            <input type="file" id="file" hidden>
        </div>
        <h2 id="showName" style="margin: 0; font-size: 26px;">---</h2>
        <p id="showBio" style="font-size: 13px; opacity: 0.6; margin-top: 5px;">Connected to Terminal</p>
    </div>

    <button class="action-btn"><i class="ri-qr-code-line"></i> Generate Elite ID Card</button>

    <div class="stats-row">
        <div class="stat-box"><span class="stat-val" id="xp">0</span><span class="stat-lab">XP</span></div>
        <div class="stat-box"><span class="stat-val" id="rank">#--</span><span class="stat-lab">RANK</span></div>
        <div class="stat-box"><span class="stat-val" id="streak">0</span><span class="stat-lab">STREAK</span></div>
    </div>

    <div class="grid-2">
        <div class="info-card">
            <div class="circle-stat" id="attCircle">0%</div>
            <div style="font-size: 11px;"><b>Attendance</b><br><span id="attDays" style="opacity:0.5">0/0 Days</span></div>
        </div>
        <div class="info-card">
            <div style="font-size: 11px; width: 100%;">
                <b>Course Ends In</b><br>
                <span id="expiryText" style="color:var(--danger); font-size: 16px; font-weight:800">-- Days</span>
            </div>
            <i class="ri-time-line" style="opacity: 0.3; font-size: 20px;"></i>
        </div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="xpFill"></div>
    </div>

    <div class="program-card">
        <div class="prog-label"><i class="ri-shield-check-line"></i> Current Program</div>
        <h3 class="prog-title" id="showCourse">Loading...</h3>
        <span class="prog-detail" id="showJoinDate">Admission: --</span>
        <span class="prog-detail" id="showPlan" style="color:var(--success); font-weight:700">Course Plan: --</span>
    </div>

    <div class="control-box">
        <div class="prog-label"><i class="ri-user-settings-line"></i> Update Profile Name</div>
        <input type="text" id="nameInput" placeholder="Enter new name...">
        <button class="blue-btn" onclick="updateName()">Update Name</button>
    </div>
</div>

<div class="nav-fixed">
    <a href="index.html" class="return-btn"><i class="ri-home-4-fill"></i> Return to Terminal</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, getDocs, collection, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let studentID = localStorage.getItem("studentName");

    function startSync() {
        onSnapshot(doc(db, "students", studentID), (snap) => {
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById("showName").innerText = studentID;
                document.getElementById("xp").innerText = d.xp || 0;
                document.getElementById("streak").innerText = d.streak || 0;
                if(d.photo) document.getElementById("photo").src = d.photo;
                
                // XP Progress Logic
                let xp = d.xp || 0;
                let lvl = Math.floor(xp / 1000) + 1;
                let prg = ((xp % 1000) / 1000) * 100;
                document.getElementById("lvl-txt").innerText = "LVL " + lvl + " STUDENT";
                document.getElementById("xpFill").style.width = prg + "%";

                // Attendance Logic (Fetched from Firebase)
                const att = d.attendedDays || 0;
                const total = d.totalDays || 0;
                const perc = total > 0 ? Math.round((att/total)*100) : 0;
                document.getElementById("attCircle").innerText = perc + "%";
                document.getElementById("attDays").innerText = `${att}/${total} Days`;

                // Course Expiry Logic (Fixing the 88 vs 1 day error)
                if(d.admissionDate && d.coursePlanMonths) {
                    const adm = new Date(d.admissionDate);
                    const exp = new Date(adm);
                    exp.setMonth(exp.getMonth() + parseInt(d.coursePlanMonths));
                    
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    
                    let diff = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));
                    document.getElementById("expiryText").innerText = (diff > 0 ? diff : 0) + " Days";
                }

                document.getElementById("showCourse").innerText = d.currentCourse || "N/A";
                document.getElementById("showJoinDate").innerText = "Admission: " + (d.admissionDate || "--");
                document.getElementById("showPlan").innerText = "Course Plan: " + (d.coursePlanMonths || "6") + " Months";
            }
        });
        updateRank();
    }

    async function updateRank() {
        const snap = await getDocs(collection(db, "students"));
        let arr = []; snap.forEach(s => arr.push({id: s.id, xp: s.data().xp || 0}));
        arr.sort((a,b) => b.xp - a.xp);
        document.getElementById("rank").innerText = "#" + (arr.findIndex(x => x.id === studentID) + 1 || "--");
    }

    window.updateName = async () => {
        let nName = document.getElementById("nameInput").value.trim();
        if(!nName || nName === studentID) return;
        if(confirm(`Change name to ${nName}?`)) {
            const oldRef = doc(db, "students", studentID);
            const data = (await getDoc(oldRef)).data();
            await setDoc(doc(db, "students", nName), data);
            localStorage.setItem("studentName", nName);
            window.location.reload();
        }
    };

    document.getElementById("file").onchange = e => {
        let reader = new FileReader();
        reader.onload = async () => {
            document.getElementById("photo").src = reader.result;
            await updateDoc(doc(db, "students", studentID), { photo: reader.result });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    window.onload = startSync;
</script>
</body>
</html>
