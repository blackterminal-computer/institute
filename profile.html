<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --success: #22c55e; --danger: #ef4444;
        }

        body { 
            background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding-bottom: 120px; overflow-x: hidden;
            background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%);
        }

        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; box-sizing: border-box; }

        /* --- Profile Header --- */
        .profile-header { text-align: center; margin-bottom: 30px; position: relative; }
        .avatar-wrapper { position: relative; width: 125px; height: 125px; margin: 0 auto 15px; }
        .avatar { 
            width: 100%; height: 100%; border-radius: 40px; object-fit: cover;
            border: 2px solid var(--accent); padding: 4px; background: var(--glass);
            transition: 0.3s ease;
        }
        .level-tag {
            position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 5px 15px;
            border-radius: 12px; font-weight: 800; font-size: 11px; white-space: nowrap;
            box-shadow: 0 5px 15px rgba(99,102,241,0.4);
        }

        /* --- Stats Row --- */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .stat-card { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            padding: 15px 5px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px);
        }
        .stat-num { font-size: 18px; font-weight: 800; color: var(--accent); display: block; }
        .stat-lbl { font-size: 9px; opacity: 0.5; text-transform: uppercase; margin-top: 4px; }

        /* --- Academic Card (Admin Sync) --- */
        .academic-card {
            background: linear-gradient(145deg, rgba(99,102,241,0.15) 0%, rgba(15,23,42,1) 100%);
            border-radius: 28px; padding: 22px; border: 1px solid var(--glass-border); margin-bottom: 25px;
            position: relative; overflow: hidden;
        }
        .card-label { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .course-title { font-size: 20px; font-weight: 800; margin: 0; color: #fff; }
        .duration-text { font-size: 13px; color: #94a3b8; margin: 6px 0 18px 0; display: block; }
        
        .status-flex { display: flex; gap: 10px; flex-wrap: wrap; }
        .status-badge { 
            background: rgba(255,255,255,0.03); padding: 7px 14px; border-radius: 12px; 
            font-size: 12px; font-weight: 700; border: 1px solid var(--glass-border); 
            transition: 0.3s;
        }

        /* --- Edit Section --- */
        .edit-box { background: var(--glass); border-radius: 28px; padding: 22px; border: 1px solid var(--glass-border); }
        input, textarea { 
            width: 100%; background: #0f172a; border: 1px solid var(--glass-border); 
            padding: 14px; border-radius: 15px; color: white; font-size: 14px; margin-bottom: 12px; outline: none; box-sizing: border-box;
        }
        .update-btn { 
            width: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); 
            color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer;
        }

        /* --- Floating Home --- */
        .home-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; background: #fff; color: #000;
            padding: 16px; border-radius: 22px; text-align: center; font-weight: 800;
            text-decoration: none; box-shadow: 0 15px 35px rgba(0,0,0,0.5); z-index: 1000;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-header">
        <div class="avatar-wrapper">
            <img id="photo" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" onclick="document.getElementById('file').click()">
            <div class="level-tag" id="lvl-txt">LVL 1 STUDENT</div>
            <input type="file" id="file" accept="image/*" hidden>
        </div>
        <h2 id="showName" style="margin: 0; font-size: 26px;">---</h2>
        <p id="showBio" style="font-size: 14px; opacity: 0.6; margin-top: 8px;">Syncing with database...</p>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <span class="stat-num" id="xp">0</span>
            <span class="stat-lbl">XP Points</span>
        </div>
        <div class="stat-card">
            <span class="stat-num" id="rank">#--</span>
            <span class="stat-lbl">Global Rank</span>
        </div>
        <div class="stat-card">
            <span class="stat-num" id="streak">0</span>
            <span class="stat-lbl">🔥 Streak</span>
        </div>
    </div>

    <div class="academic-card">
        <div class="card-label"><i class="ri-shield-check-fill"></i> Enrollment Details</div>
        <h3 class="course-title" id="showCourse">Loading Course...</h3>
        <span class="duration-text" id="showDuration">Duration: --</span>
        
        <div class="status-flex">
            <div class="status-badge" id="feeStatus">Fees: --</div>
            <div class="status-badge" id="lastMonth">Month: --</div>
        </div>
    </div>

    <div class="edit-box">
        <div class="card-label"><i class="ri-user-settings-line"></i> Customize Profile</div>
        <textarea id="bioInput" rows="2" placeholder="Tell the world about yourself..."></textarea>
        <button class="update-btn" onclick="updateProfile()">Update Profile</button>
    </div>
</div>

<a href="index.html" class="home-nav"><i class="ri-home-4-fill"></i> Return to Terminal</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let studentID = localStorage.getItem("studentName") || "Guest";

    // --- REAL-TIME ENGINE ---
    function startRealTimeSync() {
        if(studentID === "Guest") {
            document.getElementById("showName").innerText = "Guest User";
            return;
        }

        // Yeh function bina refresh kiye data update karega
        onSnapshot(doc(db, "students", studentID), (snap) => {
            if (snap.exists()) {
                const d = snap.data();
                
                // Text Updates
                document.getElementById("showName").innerText = studentID;
                document.getElementById("showBio").innerText = d.bio || "Student at Black Terminal";
                document.getElementById("xp").innerText = d.xp || 0;
                document.getElementById("streak").innerText = d.streak || 0;
                if(d.photo) document.getElementById("photo").src = d.photo;

                // Admin Updates
                document.getElementById("showCourse").innerText = d.currentCourse || "Not Assigned Yet";
                document.getElementById("showDuration").innerText = "Course Duration: " + (d.courseDuration || "TBD");
                
                const feeBox = document.getElementById("feeStatus");
                const status = d.paymentStatus || "Pending";
                feeBox.innerText = "Payment: " + status;
                
                // Color Switching Logic
                if(status === "Paid") {
                    feeBox.style.color = "#22c55e";
                    feeBox.style.borderColor = "rgba(34,197,94,0.4)";
                    feeBox.style.background = "rgba(34,197,94,0.05)";
                } else {
                    feeBox.style.color = "#ef4444";
                    feeBox.style.borderColor = "rgba(239,68,68,0.4)";
                    feeBox.style.background = "rgba(239,68,68,0.05)";
                }

                document.getElementById("lastMonth").innerText = "Billing: " + (d.lastPaymentMonth || "None");

                // Dynamic Leveling
                let level = Math.floor((d.xp || 0) / 500) + 1;
                document.getElementById("lvl-txt").innerText = "LVL " + level + " STUDENT";
            }
        });

        updateRank();
    }

    async function updateRank() {
        const snap = await getDocs(collection(db, "students"));
        let arr = [];
        snap.forEach(s => arr.push({id: s.id, xp: s.data().xp || 0}));
        arr.sort((a,b) => b.xp - a.xp);
        let rank = arr.findIndex(x => x.id === studentID) + 1;
        document.getElementById("rank").innerText = "#" + rank;
    }

    window.updateProfile = async () => {
        let nBio = document.getElementById("bioInput").value.trim();
        if(!nBio) return alert("Write something first!");
        
        await updateDoc(doc(db, "students", studentID), {
            bio: nBio
        });
        alert("Profile Bio Updated! ✨");
    };

    // Photo Upload (Base64)
    document.getElementById("file").onchange = e => {
        let file = e.target.files[0];
        let reader = new FileReader();
        reader.onload = async () => {
            const b64 = reader.result;
            document.getElementById("photo").src = b64;
            await updateDoc(doc(db, "students", studentID), { photo: b64 });
        };
        reader.readAsDataURL(file);
    };

    window.onload = startRealTimeSync;
</script>
</body>
</html>
