<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Profile v3</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --success: #22c55e; --danger: #ef4444; --gold: #facc15;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding-bottom: 120px; overflow-x: hidden;
            background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%);
        }

        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; }

        /* --- Profile Header --- */
        .profile-header { text-align: center; margin-bottom: 25px; position: relative; }
        .avatar-wrapper { position: relative; width: 120px; height: 120px; margin: 0 auto 15px; }
        .avatar { 
            width: 100%; height: 100%; border-radius: 38px; object-fit: cover;
            border: 2px solid var(--accent); padding: 4px; background: var(--glass);
        }
        .level-tag {
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 4px 12px;
            border-radius: 10px; font-weight: 800; font-size: 10px; white-space: nowrap;
            box-shadow: 0 4px 12px rgba(99,102,241,0.4);
        }

        /* --- Stats Row --- */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px 5px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); }
        .stat-num { font-size: 18px; font-weight: 800; color: var(--accent); display: block; }
        .stat-lbl { font-size: 9px; opacity: 0.5; text-transform: uppercase; margin-top: 4px; }

        /* --- Elite Metrics (Attendance & Expiry) --- */
        .elite-metrics { display: flex; gap: 10px; margin-bottom: 20px; }
        .metric-box { 
            flex: 1; background: var(--glass); border: 1px solid var(--glass-border); 
            border-radius: 24px; padding: 15px; display: flex; align-items: center; gap: 12px; 
        }
        .att-circle { 
            width: 42px; height: 42px; border-radius: 50%; border: 3px solid var(--accent); 
            display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900;
            background: rgba(6, 182, 212, 0.05);
        }
        .expiry-box { background: rgba(239, 68, 68, 0.05); border-color: rgba(239, 68, 68, 0.1); }
        .expiry-val { color: var(--danger); font-size: 16px; font-weight: 900; }

        /* --- ID Button --- */
        .id-btn { 
            background: var(--glass); color: #fff; border: 1px solid var(--glass-border); 
            padding: 14px; border-radius: 18px; font-size: 13px; font-weight: 700; 
            width: 100%; margin-bottom: 20px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
        }
        .id-btn:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }

        /* --- Action Card --- */
        .academic-card { 
            background: linear-gradient(145deg, rgba(99,102,241,0.1) 0%, rgba(1,4,9,1) 100%); 
            border-radius: 28px; padding: 22px; border: 1px solid var(--glass-border); margin-bottom: 20px; 
        }
        .card-label { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        
        /* --- Check-In Button --- */
        .checkin-btn { 
            width: 100%; background: #fff; color: #000; border: none; padding: 16px; 
            border-radius: 18px; font-weight: 800; cursor: pointer; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .checkin-btn:disabled { background: var(--glass); color: #64748b; border: 1px solid var(--glass-border); box-shadow: none; cursor: not-allowed; }

        /* --- QR Modal --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(15px); }
        .id-card-ui { 
            background: #fff; width: 100%; max-width: 320px; border-radius: 25px; 
            padding: 25px; color: #000; text-align: center; position: relative;
        }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; border: 8px solid #f8fafc; border-radius: 15px; }
        .verified-badge { background: #dcfce7; color: #15803d; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; display: inline-block; margin-top: 10px; }

        /* --- History --- */
        .history-box { background: var(--glass); border-radius: 28px; padding: 22px; border: 1px solid var(--glass-border); }

        /* --- Nav --- */
        .nav-group { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; z-index: 1000; }
        .home-nav { background: #fff; color: #000; padding: 16px; border-radius: 22px; text-align: center; font-weight: 800; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-header">
        <div class="avatar-wrapper">
            <img id="photo" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <div class="level-tag" id="lvl-txt">LVL 1 STUDENT</div>
        </div>
        <h2 id="showName" style="margin: 0; font-size: 24px; font-weight: 800;">---</h2>
        <p id="showBio" style="font-size: 13px; opacity: 0.6; margin-top: 6px;">Connecting to terminal...</p>
    </div>

    <button class="id-btn" onclick="openID()"><i class="ri-qr-code-line"></i> Generate Elite ID Card</button>

    <div class="stats-row">
        <div class="stat-card"><span class="stat-num" id="xp">0</span><span class="stat-lbl">XP Earned</span></div>
        <div class="stat-card"><span class="stat-num" id="rank">#--</span><span class="stat-lbl">Global Rank</span></div>
        <div class="stat-card"><span class="stat-num" id="streak">0</span><span class="stat-lbl">🔥 Streak</span></div>
    </div>

    <div class="elite-metrics">
        <div class="metric-box">
            <div class="att-circle" id="attCircle">0%</div>
            <div style="font-size: 11px; line-height: 1.3;"><b>Attendance</b><br><span id="attDays" style="opacity: 0.6;">0/0 Days</span></div>
        </div>
        <div class="metric-box expiry-box">
            <div style="font-size: 11px; line-height: 1.3;"><b>Course Access</b><br><span class="expiry-val" id="expiryText">-- Days</span></div>
            <i class="ri-time-line" style="color: var(--danger); font-size: 20px; margin-left: auto;"></i>
        </div>
    </div>

    <div class="academic-card">
        <div class="card-label"><i class="ri-shield-check-fill"></i> Current Program</div>
        <h3 id="showCourse" style="margin:0; font-size: 18px;">Syncing Course...</h3>
        <p id="showJoinDate" style="font-size: 12px; color: #94a3b8; margin: 5px 0 0 0;">Admission: --</p>
    </div>

    <button class="checkin-btn" id="checkInBtn" onclick="markAttendance()">
        <i class="ri-map-pin-user-fill"></i> Mark Today's Attendance
    </button>

    <div class="history-box" style="margin-top: 20px;">
        <div class="card-label"><i class="ri-history-line"></i> Billing History</div>
        <div id="historyList"><p style="font-size: 11px; opacity: 0.3; text-align: center;">No records found.</p></div>
    </div>
</div>

<div class="modal" id="idModal" onclick="this.style.display='none'">
    <div class="id-card-ui" onclick="event.stopPropagation()">
        <p style="font-size: 10px; font-weight: 800; letter-spacing: 3px; color: #64748b; margin: 0;">BLACK TERMINAL</p>
        <div id="qrcode"></div>
        <h3 id="qrName" style="margin: 10px 0 5px; font-size: 20px;">STUDENT</h3>
        <p id="qrCourse" style="font-size: 12px; color: #64748b; margin: 0;">Program: Elite Dev</p>
        <div class="verified-badge">VERIFIED STUDENT</div>
    </div>
</div>

<div class="nav-group">
    <a href="index.html" class="home-nav"><i class="ri-home-4-fill"></i> Return to Terminal</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let studentID = localStorage.getItem("studentName");

    if(!studentID) window.location.href = "login.html";

    function startSync() {
        onSnapshot(doc(db, "students", studentID), (snap) => {
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById("showName").innerText = studentID;
                document.getElementById("qrName").innerText = studentID;
                document.getElementById("showBio").innerText = d.bio || "Active Student";
                document.getElementById("xp").innerText = d.xp || 0;
                document.getElementById("streak").innerText = d.streak || 0;
                if(d.photo) document.getElementById("photo").src = d.photo;
                
                const course = d.currentCourse || "Not Assigned";
                document.getElementById("showCourse").innerText = course;
                document.getElementById("qrCourse").innerText = "Program: " + course;
                document.getElementById("showJoinDate").innerText = "Admission: " + (d.admissionDate || "--");

                // Attendance Logic
                const att = d.attendedDays || 0;
                const total = d.totalDays || 1;
                const percent = Math.round((att/total)*100);
                document.getElementById("attCircle").innerText = percent + "%";
                document.getElementById("attDays").innerText = `${att}/${total} Days`;

                // Expiry Logic (90 Days standard)
                if(d.admissionDate) {
                    const start = new Date(d.admissionDate);
                    const expiry = new Date(start.getTime() + (90 * 24 * 60 * 60 * 1000));
                    const diff = Math.ceil((expiry - new Date()) / (1000 * 60 * 60 * 24));
                    document.getElementById("expiryText").innerText = diff > 0 ? diff + " Days" : "Expired";
                }

                // Rank Sync
                updateRank();

                // Button State
                const lastCheck = d.lastCheckIn || 0;
                const isToday = new Date(lastCheck).toDateString() === new Date().toDateString();
                const btn = document.getElementById("checkInBtn");
                if(isToday) {
                    btn.innerText = "Check-in Complete ✓";
                    btn.disabled = true;
                }
            }
        });
    }

    async function updateRank() {
        const snap = await getDocs(collection(db, "students"));
        let arr = [];
        snap.forEach(s => arr.push({id: s.id, xp: s.data().xp || 0}));
        arr.sort((a,b) => b.xp - a.xp);
        const myRank = arr.findIndex(x => x.id === studentID) + 1;
        document.getElementById("rank").innerText = "#" + (myRank || "--");
    }

    window.openID = () => {
        document.getElementById("idModal").style.display = 'flex';
        document.getElementById("qrcode").innerHTML = "";
        const verifyData = `BT-VERIFIED: ${studentID} | Program: ${document.getElementById("showCourse").innerText}`;
        new QRCode(document.getElementById("qrcode"), { text: verifyData, width: 160, height: 160, colorDark : "#000000", colorLight : "#ffffff" });
    };

    window.markAttendance = async () => {
        const ref = doc(db, "students", studentID);
        const snap = await getDoc(ref);
        const d = snap.data();
        
        await updateDoc(ref, {
            attendedDays: (d.attendedDays || 0) + 1,
            totalDays: (d.totalDays || 0) + 1,
            xp: (d.xp || 0) + 50,
            lastCheckIn: Date.now()
        });
        alert("Attendance Marked! You earned +50 XP 🚀");
    };

    window.onload = startSync;
</script>
</body>
</html>
