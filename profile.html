<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap');
        
        :root {
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.04);
            --border: 1px solid rgba(255, 255, 255, 0.1);
            --gradient: linear-gradient(135deg, #6366f1, #06b6d4, #f43f5e);
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding-bottom: 150px; background-attachment: fixed;
        }

        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; }

        /* Modern Avatar */
        .avatar-wrapper { position: relative; width: 130px; height: 130px; margin: 40px auto 20px; }
        .avatar { 
            width: 100%; height: 100%; border-radius: 36px; object-fit: cover; 
            border: 4px solid transparent; background: var(--bg); padding: 4px;
            background-clip: padding-box, border-box; background-image: linear-gradient(var(--bg), var(--bg)), var(--gradient);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Glass Cards */
        .card { background: var(--glass); backdrop-filter: blur(20px); border: var(--border); border-radius: 30px; padding: 20px; margin-bottom: 20px; }
        
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--glass); border: var(--border); padding: 15px; border-radius: 22px; text-align: center; }
        .stat-num { font-size: 18px; font-weight: 800; display: block; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-lbl { font-size: 8px; opacity: 0.5; text-transform: uppercase; font-weight: 800; }

        /* Buttons & Inputs */
        .update-btn { width: 100%; background: #fff; color: #000; border: none; padding: 14px; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        input, select, textarea { background: rgba(0,0,0,0.2); border: var(--border); padding: 14px; border-radius: 14px; color: white; width: 100%; box-sizing: border-box; margin-bottom: 10px; }

        /* Navigation */
        .nav-group { position: fixed; bottom: 20px; left: 5%; width: 90%; z-index: 100; }
        .logout-btn { background: rgba(244, 63, 94, 0.1); color: #f43f5e; padding: 14px; border-radius: 16px; text-align: center; font-weight: 700; cursor: pointer; margin-bottom: 10px; border: 1px solid rgba(244, 63, 94, 0.2); }
        .home-nav { background: #fff; color: #000; padding: 16px; border-radius: 16px; text-align: center; font-weight: 800; display: block; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar-wrapper">
        <img id="photo" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" onclick="document.getElementById('file').click()">
        <input type="file" id="file" accept="image/*" hidden>
    </div>
    <div style="text-align: center; margin-bottom: 30px;">
        <h2 id="showName" style="margin: 0; font-size: 26px;">---</h2>
        <p id="showBio" style="font-size: 14px; opacity: 0.5;">Loading details...</p>
    </div>

    <div class="stats-row">
        <div class="stat-card"><span class="stat-num" id="xp">0</span><span class="stat-lbl">XP</span></div>
        <div class="stat-card"><span class="stat-num" id="rank">#--</span><span class="stat-lbl">RANK</span></div>
        <div class="stat-card"><span class="stat-num" id="streak">0</span><span class="stat-lbl">STREAK</span></div>
    </div>

    <div class="card" id="penaltyBox" style="display:none; border-left: 4px solid #f43f5e;">
        <span style="color: #f43f5e; font-size: 12px; font-weight: 800;"><i class="ri-error-warning-fill"></i> LOW ATTENDANCE</span>
        <div style="margin-top: 10px;">
            <select id="waiverReason" onchange="toggleCustomInput(this.value)">
                <option value="Medical">Medical Emergency</option>
                <option value="Marriage">Family Marriage</option>
                <option value="Other">Other</option>
            </select>
            <input type="number" id="holidayDuration" placeholder="Days of leave?">
            <button class="update-btn" onclick="document.getElementById('waiverFile').click()">Submit Proof</button>
            <input type="file" id="waiverFile" hidden onchange="uploadWaiverProof(this)">
        </div>
    </div>

    <div class="card">
        <div style="font-size: 9px; opacity: 0.5; font-weight: 800;">ENROLLMENT</div>
        <h3 id="showCourse" style="margin: 5px 0;">---</h3>
        <span id="feeStatusBadge" style="font-size: 9px; padding: 4px 8px; border-radius: 6px; background: rgba(255,255,255,0.1);">---</span>
    </div>

    <div class="card">
        <input type="text" id="nameInput" placeholder="Update Name">
        <button class="update-btn" onclick="updateName()">Update Name</button>
    </div>
</div>

<div class="nav-group">
    <div class="logout-btn" onclick="logout()">Logout</div>
    <a href="index.html" class="home-nav">Return Home</a>
</div>

</body>
</html>
