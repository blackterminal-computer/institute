<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --success: #22c55e; --danger: #ef4444;
        }

        body { 
            background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding-bottom: 180px; overflow-x: hidden;
            background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%);
        }

        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; box-sizing: border-box; }

        /* --- Profile Header --- */
        .profile-header { text-align: center; margin-bottom: 30px; position: relative; }
        .avatar-wrapper { position: relative; width: 125px; height: 125px; margin: 0 auto 15px; }
        .avatar { 
            width: 100%; height: 100%; border-radius: 40px; object-fit: cover;
            border: 2px solid var(--accent); padding: 4px; background: var(--glass);
        }
        .level-tag {
            position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 5px 15px;
            border-radius: 12px; font-weight: 800; font-size: 11px; white-space: nowrap;
            box-shadow: 0 5px 15px rgba(99,102,241,0.3);
        }

        /* --- Stats --- */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .stat-card { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            padding: 15px 5px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px);
        }
        .stat-num { font-size: 18px; font-weight: 800; color: var(--accent); display: block; }
        .stat-lbl { font-size: 9px; opacity: 0.5; text-transform: uppercase; margin-top: 4px; }

        /* --- Academic Card --- */
        .academic-card {
            background: linear-gradient(145deg, rgba(99,102,241,0.15) 0%, rgba(15,23,42,1) 100%);
            border-radius: 28px; padding: 22px; border: 1px solid var(--glass-border); margin-bottom: 25px;
        }
        .card-label { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .course-title { font-size: 20px; font-weight: 800; margin: 0; color: #fff; }
        .duration-text { font-size: 13px; color: #94a3b8; margin: 6px 0 10px 0; display: block; }
        .admission-tag { font-size: 11px; color: var(--primary); font-weight: 700; margin-bottom: 15px; display: block; }

        /* --- Payment History --- */
        .history-box { background: var(--glass); border-radius: 28px; padding: 22px; border: 1px solid var(--glass-border); margin-bottom: 25px; }
        .history-item { 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.03); padding: 14px 18px; border-radius: 20px;
            margin-bottom: 12px; border: 1px solid var(--glass-border);
        }
        .h-info { display: flex; flex-direction: column; gap: 4px; }
        .h-month { font-size: 14px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; }
        .paid-label { 
            background: rgba(34, 197, 94, 0.15); color: var(--success); 
            font-size: 9px; padding: 2px 8px; border-radius: 6px; 
            border: 1px solid rgba(34, 197, 94, 0.2); text-transform: uppercase;
        }
        .h-amt { font-size: 12px; color: #94a3b8; font-weight: 600; }
        
        .dl-btn { 
            background: var(--primary); color: white; border: none;
            width: 40px; height: 40px; border-radius: 12px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            box-shadow: 0 4px 10px rgba(99,102,241,0.3);
        }

        /* --- Edit Boxes --- */
        .edit-box { background: var(--glass); border-radius: 28px; padding: 22px; border: 1px solid var(--glass-border); margin-bottom: 15px; }
        textarea, input[type="text"] { width: 100%; background: #0f172a; border: 1px solid var(--glass-border); padding: 14px; border-radius: 15px; color: white; outline: none; resize: none; margin-bottom: 10px; box-sizing: border-box; }
        .update-btn { width: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer; }

        /* --- Navigation Buttons --- */
        .nav-group {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }

        .home-nav {
            background: #fff; color: #000; padding: 16px; border-radius: 22px; 
            text-align: center; font-weight: 800; text-decoration: none; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 14px; border-radius: 20px; text-align: center; font-weight: 800;
            cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-header">
        <div class="avatar-wrapper">
            <img id="photo" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" onclick="document.getElementById('file').click()">
            <div class="level-tag" id="lvl-txt">LVL 1 STUDENT</div>
            <input type="file" id="file" accept="image/*" hidden>
        </div>
        <h2 id="showName" style="margin: 0; font-size: 26px;">---</h2>
        <p id="showBio" style="font-size: 14px; opacity: 0.6; margin-top: 8px;">Syncing...</p>
    </div>

    <div class="stats-row">
        <div class="stat-card"><span class="stat-num" id="xp">0</span><span class="stat-lbl">XP Points</span></div>
        <div class="stat-card"><span class="stat-num" id="rank">#--</span><span class="stat-lbl">Global Rank</span></div>
        <div class="stat-card"><span class="stat-num" id="streak">0</span><span class="stat-lbl">🔥 Streak</span></div>
    </div>

    <div class="edit-box">
        <div class="card-label"><i class="ri-user-smile-line"></i> Update Profile Name</div>
        <input type="text" id="nameInput" placeholder="Enter new name...">
        <button class="update-btn" onclick="updateName()">Update Name</button>
        <p id="cooldownMsg" style="font-size: 10px; color: var(--danger); margin-top: 8px; display: none; text-align: center; font-weight: 600;"></p>
    </div>

    <div class="academic-card">
        <div class="card-label"><i class="ri-shield-check-fill"></i> Enrollment Details</div>
        <h3 class="course-title" id="showCourse">Loading Course...</h3>
        <span class="duration-text" id="showDuration">Duration: --</span>
        <span class="admission-tag" id="showJoinDate">Joined: --</span>
        <div id="feeStatusBadge" class="paid-label" style="display:inline-block; font-size:11px; padding:5px 12px;">Status: --</div>
    </div>

    <div class="history-box">
        <div class="card-label"><i class="ri-history-line"></i> Payment History</div>
        <div id="historyList">
            <p style="font-size: 12px; opacity: 0.4; text-align: center; padding: 10px;">No records.</p>
        </div>
    </div>

    <div class="edit-box">
        <div class="card-label"><i class="ri-user-settings-line"></i> Customize Bio</div>
        <textarea id="bioInput" rows="2" placeholder="Write bio..."></textarea>
        <button class="update-btn" onclick="updateProfile()">Update Profile</button>
    </div>
</div>

<div class="nav-group">
    <div class="logout-btn" onclick="logout()"><i class="ri-logout-circle-line"></i> Secure Logout</div>
    <a href="index.html" class="home-nav"><i class="ri-home-4-fill"></i> Return to Terminal</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, getDocs, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let studentID = localStorage.getItem("studentName");

    if(!studentID) window.location.href = "login.html";

    function startRealTimeSync() {
        onSnapshot(doc(db, "students", studentID), (snap) => {
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById("showName").innerText = studentID;
                document.getElementById("showBio").innerText = d.bio || "Student at Black Terminal";
                document.getElementById("xp").innerText = d.xp || 0;
                document.getElementById("streak").innerText = d.streak || 0;
                if(d.photo) document.getElementById("photo").src = d.photo;
                
                let level = Math.floor((d.xp || 0) / 1000) + 1; 
                document.getElementById("lvl-txt").innerText = "LVL " + level + " STUDENT";

                document.getElementById("showCourse").innerText = d.currentCourse || "Not Assigned";
                document.getElementById("showDuration").innerText = "Course Duration: " + (d.courseDuration || "TBD");
                document.getElementById("showJoinDate").innerText = "Joined: " + (d.admissionDate || "--");
                
                const badge = document.getElementById("feeStatusBadge");
                badge.innerText = "Current: " + (d.paymentStatus || "Pending");
                badge.style.color = d.paymentStatus === "Paid" ? "#22c55e" : "#ef4444";

                const hList = document.getElementById("historyList");
                if (d.paymentHistory && d.paymentHistory.length > 0) {
                    hList.innerHTML = "";
                    d.paymentHistory.forEach(p => {
                        hList.innerHTML += `
                            <div class="history-item">
                                <div class="h-info">
                                    <div class="h-month">${p.month} <span class="paid-label">Paid</span></div>
                                    <div class="h-amt">INR ${p.amount} • ${p.date}</div>
                                </div>
                                <button class="dl-btn" onclick="downloadPremiumInvoice('${p.month}', '${p.amount}', '${p.date}', '${d.courseDuration || 'N/A'}', '${d.currentCourse || 'N/A'}')">
                                    <i class="ri-download-cloud-2-line"></i>
                                </button>
                            </div>`;
                    });
                }
            }
        });
        updateRank();
    }

    window.logout = () => {
        if(confirm("Are you sure you want to logout?")) {
            localStorage.removeItem("studentName");
            window.location.href = "login.html";
        }
    };

    window.downloadPremiumInvoice = (month, amt, date, duration, course) => {
        const htmlContent = `
            <html>
            <body style="font-family:sans-serif; padding:40px; background:#f4f7fe;">
                <div style="background:white; padding:40px; border-radius:30px; max-width:500px; margin:auto; border:1px solid #e2e8f0;">
                    <h1 style="color:#6366f1; margin:0;">BLACK TERMINAL</h1>
                    <p style="font-size:12px; color:#64748b; border-bottom:1px dashed #eee; padding-bottom:15px;">Official Payment Receipt</p>
                    <div style="margin:20px 0; font-size:14px;">
                        <p><strong>Student:</strong> ${studentID}</p>
                        <p><strong>Course:</strong> ${course}</p>
                        <p><strong>Duration:</strong> ${duration}</p>
                        <p><strong>Month:</strong> ${month}</p>
                        <p><strong>Amount:</strong> INR ${amt}.00</p>
                        <p><strong>Date:</strong> ${date}</p>
                    </div>
                    <div style="text-align:center; background:#dcfce7; color:#15803d; padding:10px; border-radius:10px; font-weight:800;">PAYMENT SUCCESSFUL</div>
                </div>
            </body>
            </html>`;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `BT_Receipt_${month}.html`;
        link.click();
    };

    async function updateRank() {
        const snap = await getDocs(collection(db, "students"));
        let arr = [];
        snap.forEach(s => arr.push({id: s.id, xp: s.data().xp || 0}));
        arr.sort((a,b) => b.xp - a.xp);
        document.getElementById("rank").innerText = "#" + (arr.findIndex(x => x.id === studentID) + 1 || "--");
    }

    // Name Update with 30-day Lock Feature
    window.updateName = async () => {
        let newName = document.getElementById("nameInput").value.trim();
        const msgBox = document.getElementById("cooldownMsg");
        
        if(!newName || newName === studentID) {
            alert("Please enter a valid new name.");
            return;
        }

        try {
            const oldRef = doc(db, "students", studentID);
            const oldSnap = await getDoc(oldRef);

            if (oldSnap.exists()) {
                const data = oldSnap.data();
                const now = Date.now();
                const lastChange = data.lastNameChange || 0;
                const daysPassed = (now - lastChange) / (1000 * 60 * 60 * 24);

                // Check for 30-day Cooldown
                if (daysPassed < 30) {
                    const daysLeft = Math.ceil(30 - daysPassed);
                    msgBox.innerText = `⚠️ You can change your name again in ${daysLeft} days.`;
                    msgBox.style.display = "block";
                    return;
                }

                if(confirm(`Update profile name to "${newName}"? (Note: You won't be able to change it for 30 days)`)) {
                    const newRef = doc(db, "students", newName);
                    
                    // Duplicate check for the new name
                    const checkNewSnap = await getDoc(newRef);
                    if(checkNewSnap.exists()) {
                        alert("This name is already taken by another student.");
                        return;
                    }

                    // Sync data and set timestamp
                    let updatedData = { ...data, lastNameChange: now };
                    await setDoc(newRef, updatedData);
                    
                    localStorage.setItem("studentName", newName);
                    alert("Profile Name Updated Successfully! 🚀");
                    window.location.reload();
                }
            }
        } catch (e) {
            alert("Error: " + e.message);
        }
    };

    window.updateProfile = async () => {
        let nBio = document.getElementById("bioInput").value.trim();
        if(!nBio) return;
        await updateDoc(doc(db, "students", studentID), { bio: nBio });
        alert("Bio Updated! ✨");
    };

    document.getElementById("file").onchange = e => {
        let reader = new FileReader();
        reader.onload = async () => {
            document.getElementById("photo").src = reader.result;
            await updateDoc(doc(db, "students", studentID), { photo: reader.result });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    window.onload = startRealTimeSync;
</script>
</body>
</html>
