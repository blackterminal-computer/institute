<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Active Logs | Present Students</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --apple-green: #30D158;
            --apple-blue: #0A84FF;
            --apple-orange: #FF9500;
            --apple-red: #FF453A;
            --bg: #050508;
            --glass: rgba(18, 18, 26, 0.75);
            --border: rgba(255, 255, 255, 0.06);
            --text-main: #FFFFFF;
            --text-sec: #AEAEB2;
            --text-muted: #6E6E73;
            --accent-glow: radial-gradient(circle at 50% -10%, rgba(48, 209, 88, 0.15) 0%, transparent 70%);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg); background-image: var(--accent-glow); background-attachment: fixed;
            color: var(--text-main); margin: 0; padding: 24px 16px; -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 450px; margin: auto; }
        .back-nav { display: flex; align-items: center; gap: 8px; color: var(--apple-green); font-size: 14px; font-weight: 700; text-transform: uppercase; cursor: pointer; text-decoration: none; margin-bottom: 20px; width: max-content; transition: all 0.2s ease; }
        .back-nav:hover { opacity: 0.8; transform: translateX(-2px); }
        
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-panel h1 { font-size: 28px; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .counter-pill { background: rgba(48, 209, 88, 0.12); border: 1px solid rgba(48, 209, 88, 0.25); padding: 6px 14px; border-radius: 20px; color: var(--apple-green); font-weight: 700; font-size: 14px; }
        
        /* Search & Filter Controls */
        .controls-wrapper { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .search-box { position: relative; width: 100%; }
        .search-box input { width: 100%; background: var(--glass); border: 1px solid var(--border); padding: 12px 16px 12px 40px; border-radius: 14px; color: #fff; font-size: 14px; box-sizing: border-box; outline: none; transition: all 0.2s; }
        .search-box input:focus { border-color: var(--apple-green); box-shadow: 0 0 10px rgba(48, 209, 88, 0.2); }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
        
        .filter-tabs { display: flex; gap: 8px; }
        .filter-btn { flex: 1; background: var(--glass); border: 1px solid var(--border); padding: 8px; border-radius: 10px; color: var(--text-sec); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
        .filter-btn.active { background: rgba(48, 209, 88, 0.15); border-color: var(--apple-green); color: var(--apple-green); }

        .list-wrapper { display: flex; flex-direction: column; gap: 12px; }
        
        /* Grid-Locked Card Layout with Progress Bar */
        .att-item { 
            background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border);
            padding: 16px; border-radius: 18px; 
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: all 0.25s ease;
        }
        .att-item:hover { transform: translateY(-2px); border-color: rgba(255, 255, 255, 0.12); }
        
        /* Visual Bottom Progress Track */
        .progress-track { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.03); }
        .progress-bar { height: 100%; width: 0%; background: var(--apple-blue); transition: width 0.5s ease, background-color 0.5s ease; }
        
        .student-meta { display: grid; gap: 4px; }
        .att-name { font-size: 15px; font-weight: 600; color: #FFF; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .att-time { font-size: 11px; color: var(--text-muted); font-weight: 500; display: grid; gap: 2px; }
        .elapsed-time { color: var(--apple-blue); font-weight: 700; font-size: 12px; }
        
        .action-group { 
            display: grid;
            grid-template-columns: auto auto auto;
            align-items: center;
            gap: 8px; 
        }
        
        /* Communication Circular Buttons */
        .action-btn { width: 36px; height: 36px; border-radius: 50%; display: grid; place-items: center; cursor: pointer; transition: all 0.2s ease; font-size: 14px; text-decoration: none; box-sizing: border-box; }
        .wa-btn { background: rgba(48, 209, 88, 0.1); color: var(--apple-green); border: 1px solid rgba(48, 209, 88, 0.15); }
        .wa-btn:hover { background: var(--apple-green); color: #fff; box-shadow: 0 4px 12px rgba(48, 209, 88, 0.25); transform: scale(1.05); }
        .call-btn { background: rgba(10, 132, 255, 0.1); color: var(--apple-blue); border: 1px solid rgba(10, 132, 255, 0.15); }
        .call-btn:hover { background: var(--apple-blue); color: #fff; box-shadow: 0 4px 12px rgba(10, 132, 255, 0.25); transform: scale(1.05); }
        
        .status-badge { 
            font-size: 11px; color: var(--apple-green); font-weight: 700; background: rgba(48, 209, 88, 0.1); 
            padding: 6px 12px; border-radius: 12px; border: 1px solid rgba(48, 209, 88, 0.15); 
            min-width: 80px; text-align: center; letter-spacing: 0.3px; 
        }
        .status-badge.ended { color: var(--apple-red); background: rgba(255, 69, 58, 0.1); border-color: rgba(255, 69, 58, 0.15); }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-nav"><i class="fas fa-arrow-left"></i> Terminal</a>
    
    <div class="header-panel">
        <h1>Live Attendance</h1>
        <div class="counter-pill"><span id="active-count">0</span> PRESENT</div>
    </div>

    <div class="controls-wrapper">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Search student name..." oninput="filterLogs()">
        </div>
        <div class="filter-tabs">
            <div class="filter-btn active" id="tab-all" onclick="setFilter('all')">All</div>
            <div class="filter-btn" id="tab-active" onclick="setFilter('active')">Active</div>
            <div class="filter-btn" id="tab-ended" onclick="setFilter('ended')">Ended</div>
        </div>
    </div>

    <div id="students-log-container" class="list-wrapper">
        <p style="text-align:center; font-size:13px; opacity:0.5; color: var(--text-sec);">Connecting to servers...</p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    
    firebase.initializeApp(firebaseConfig);
    const fs = firebase.firestore(); 

    let studentPhoneCache = JSON.parse(sessionStorage.getItem('bt_phone_cache') || '{}');
    let timerInterval = null;
    let currentFilter = 'all'; // Global state tracking

    async function prefetchStudentRegistry() {
        if (Object.keys(studentPhoneCache).length > 0) return;
        try {
            const allSnap = await fs.collection("students").get();
            allSnap.forEach(doc => {
                const data = doc.data();
                const phone = data.phoneNumber || data.phone || "";
                if (phone) studentPhoneCache[doc.id] = phone;
            });
            sessionStorage.setItem('bt_phone_cache', JSON.stringify(studentPhoneCache));
        } catch (e) { console.error("Cache prefetch bypassed", e); }
    }

    function formatDateTimeToString(dateObj) {
        let hours = dateObj.getHours();
        const minutes = dateObj.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12; 
        return `${hours}:${minutes} ${ampm}`;
    }

    function calculateLiveTimeDifference(timestampMs) {
        const diffMins = Math.floor((new Date().getTime() - timestampMs) / 60000);
        let pct = Math.min(Math.floor((diffMins / 60) * 100), 100);
        
        if (diffMins >= 60) {
            return { text: "Duration: 1 hr+", isEnded: true, mins: diffMins, percent: pct };
        } else {
            return { text: `Active: ${diffMins} min${diffMins !== 1 ? 's' : ''} ago`, isEnded: false, mins: diffMins, percent: pct };
        }
    }

    window.sendWhatsAppAlert = function(cleanPhone, displayName, timestampMs) {
        const timeData = calculateLiveTimeDifference(timestampMs);
        const customMsg = timeData.isEnded 
            ? `Hi ${displayName}, your 1 hour class is completed. You can leave now.`
            : `Hi ${displayName}, your current class duration is ${timeData.mins} mins.`;
        window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(customMsg)}`, '_blank');
    };

    function updateLiveTimers() {
        document.querySelectorAll('.att-item').forEach(item => {
            const docTimestamp = parseInt(item.getAttribute('data-timestamp'));
            if (!docTimestamp) return;

            const timeData = calculateLiveTimeDifference(docTimestamp);
            const elapsedSpan = item.querySelector('.elapsed-time');
            const badgeSpan = item.querySelector('.status-badge');
            const bar = item.querySelector('.progress-bar');
            
            // Core dynamic update rules
            if (elapsedSpan) elapsedSpan.innerText = timeData.text;
            if (bar) {
                bar.style.width = timeData.percent + "%";
                if (timeData.mins >= 60) bar.style.backgroundColor = "var(--apple-red)";
                else if (timeData.mins >= 30) bar.style.backgroundColor = "var(--apple-orange)";
                else bar.style.backgroundColor = "var(--apple-blue)";
            }

            if (badgeSpan) {
                if (timeData.isEnded) {
                    if (elapsedSpan) elapsedSpan.style.color = "var(--apple-red)";
                    badgeSpan.innerText = "CLASS ENDED";
                    badgeSpan.classList.add('ended');
                    item.setAttribute('data-state', 'ended');
                } else {
                    if (elapsedSpan) elapsedSpan.style.color = "var(--apple-blue)";
                    badgeSpan.innerText = "PRESENT";
                    badgeSpan.classList.remove('ended');
                    item.setAttribute('data-state', 'active');
                }
            }
        });
        filterLogs(); // Re-apply visibility filtering logic post data update
    }

    window.setFilter = function(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${type}`).classList.add('active');
        filterLogs();
    };

    window.filterLogs = function() {
        const query = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.att-item').forEach(item => {
            const name = item.getAttribute('data-name');
            const state = item.getAttribute('data-state');
            
            const matchesSearch = name.includes(query);
            const matchesFilter = (currentFilter === 'all') || (currentFilter === state);
            
            if(matchesSearch && matchesFilter) {
                item.style.display = 'grid';
            } else {
                item.style.display = 'none';
            }
        });
    };

    function loadLivePresentLogs() {
        const todayStr = new Date().toISOString().split('T')[0];
        const container = document.getElementById('students-log-container');
        const countSpan = document.getElementById('active-count');

        prefetchStudentRegistry();

        fs.collection("attendance").where("date", "==", todayStr).onSnapshot(async (snapshot) => {
            countSpan.innerText = snapshot.size;
            if (snapshot.empty) {
                container.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.5;"><p style="font-size:13px; color:var(--text-muted);">No logs documented for today.</p></div>';
                if(timerInterval) clearInterval(timerInterval);
                return;
            }

            let htmlContent = "";
            let i = 1;

            snapshot.docs.forEach(doc => {
                const data = doc.data();
                const displayName = data.userName || data.studentName || "Unknown Student";
                
                let logDateObj = new Date(); 
                if (data.timestamp) { 
                    logDateObj = data.timestamp.toDate ? data.timestamp.toDate() : new Date(data.timestamp);
                } else if (doc._document && doc._document.createTime) {
                    logDateObj = doc._document.createTime.timestamp.toDate();
                } else if (data.time && data.time !== "Logged" && data.time.match(/(\d+):(\d+)\s*(AM|PM)/i)) {
                    const timeParts = data.time.match(/(\d+):(\d+)\s*(AM|PM)/i);
                    let h = parseInt(timeParts[1]);
                    const m = parseInt(timeParts[2]);
                    if (timeParts[3].toUpperCase() === "PM" && h < 12) h += 12;
                    if (timeParts[3].toUpperCase() === "AM" && h === 12) h = 0;
                    logDateObj.setHours(h, m, 0, 0);
                }

                const finalTimestampMs = logDateObj.getTime();
                const displayPunchTime = formatDateTimeToString(logDateObj);
                const timeData = calculateLiveTimeDifference(finalTimestampMs);

                let phone = data.userPhone || data.phoneNumber || data.phone || studentPhoneCache[displayName] || "";
                const cleanPhone = phone.toString().replace(/\D/g, '');
                
                let waBtnHtml = "", callBtnHtml = "";
                if(cleanPhone.length >= 10) {
                    const finalNum = cleanPhone.startsWith('91') ? cleanPhone : '91' + cleanPhone;
                    waBtnHtml = `<div class="action-btn wa-btn" onclick="window.sendWhatsAppAlert('${finalNum}', '${displayName}', ${finalTimestampMs})"><i class="fab fa-whatsapp"></i></div>`;
                    callBtnHtml = `<a href="tel:+${finalNum}" class="action-btn call-btn"><i class="fas fa-phone-alt"></i></a>`;
                } else { 
                    waBtnHtml = `<div class="action-btn wa-btn" style="opacity:0.25; cursor:not-allowed;"><i class="fab fa-whatsapp"></i></div>`; 
                    callBtnHtml = `<div class="action-btn call-btn" style="opacity:0.25; cursor:not-allowed;"><i class="fas fa-phone-alt"></i></div>`; 
                }

                const cardState = timeData.isEnded ? "ended" : "active";
                const badgeClass = timeData.isEnded ? "status-badge ended" : "status-badge";
                const badgeText = timeData.isEnded ? "CLASS ENDED" : "PRESENT";
                const elapsedStyle = timeData.isEnded ? "color: var(--apple-red);" : "color: var(--apple-blue);";
                
                let barColor = "var(--apple-blue)";
                if (timeData.mins >= 60) barColor = "var(--apple-red)";
                else if (timeData.mins >= 30) barColor = "var(--apple-orange)";

                htmlContent += `
                    <div class="att-item animate__animated animate__fadeIn" data-timestamp="${finalTimestampMs}" data-name="${displayName.toLowerCase()}" data-state="${cardState}">
                        <div class="student-meta">
                            <span class="att-name">${i}. ${displayName}</span>
                            <div class="att-time">
                                <span><i class="far fa-clock"></i> Punch: ${displayPunchTime}</span>
                                <span class="elapsed-time" style="${elapsedStyle}">${timeData.text}</span>
                            </div>
                        </div>
                        <div class="action-group">
                            ${callBtnHtml}
                            ${waBtnHtml}
                            <span class="${badgeClass}">${badgeText}</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-bar" style="width: ${timeData.percent}%; background-color: ${barColor};"></div>
                        </div>
                    </div>`;
                i++;
            });
            
            container.innerHTML = htmlContent;
            filterLogs(); // Sync initial view filtering metrics instantly

            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateLiveTimers, 15000);
        });
    }

    loadLivePresentLogs();
</script>
</body>
</html>
