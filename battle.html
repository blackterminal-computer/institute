<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Battle Arena ULTIMATE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --danger: #ef4444;
            --success: #22c55e;
            --bg: #020617;
            --gold: #fbbf24;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #f8fafc; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            background-image: radial-gradient(circle at center, #1e1b4b, #020617);
            overflow-x: hidden; padding-top: 40px;
        }

        /* Animations */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.2s ease-in-out 2; }
        
        .searching-box { text-align: center; margin-top: 80px; transition: 0.5s; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .radar {
            width: 100px; height: 100px; border: 2px solid var(--primary);
            border-radius: 50%; margin: 20px auto; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .radar::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            border: 2px solid var(--primary); border-radius: 50%;
            animation: ripple 1.5s linear infinite;
        }
        @keyframes ripple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.2); opacity: 0; } }

        .vs-container {
            display: flex; align-items: center; justify-content: space-around;
            width: 100%; max-width: 450px; margin-bottom: 25px;
        }
        .player-card { text-align: center; width: 40%; transition: 0.5s; }
        
        .avatar {
            width: 65px; height: 65px; background: var(--glass); 
            border: 2px solid var(--primary); border-radius: 50%;
            margin: 0 auto 8px; overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .vs-badge {
            background: var(--danger); color: white; padding: 4px 10px;
            border-radius: 6px; font-weight: 900; font-size: 12px;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .battle-card {
            width: 92%; max-width: 420px; background: var(--glass);
            border: 1px solid var(--glass-border); border-radius: 28px;
            padding: 22px; backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin: 0 auto;
        }

        .option {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            padding: 15px; border-radius: 16px; margin-top: 10px;
            cursor: pointer; transition: 0.2s; font-weight: 600; font-size: 15px;
        }
        .option:active { transform: scale(0.96); }

        .timer-bar { width: 100%; height: 5px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        #timer-fill { height: 100%; width: 100%; background: var(--success); transition: 1s linear; }

        .score-footer {
            margin-top: 20px; display: flex; justify-content: space-between;
            border-top: 1px solid var(--glass-border); padding-top: 15px;
        }

        .btn-home {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white; border: none; padding: 14px 35px; border-radius: 18px;
            font-weight: 800; margin-top: 20px; cursor: pointer; width: 100%;
        }

        .recent-section { width: 92%; max-width: 420px; margin-top: 25px; }
        .match-row {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 18px; padding: 10px 15px; margin-bottom: 8px;
            display: flex; align-items: center; justify-content: space-between;
        }
    </style>
</head>
<body>

    <div id="game-ui" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div id="loader" class="searching-box">
            <div class="radar"><i class="ri-sword-fill" style="font-size: 35px; color: var(--primary);"></i></div>
            <h2 id="loader-text" class="pulse">FINDING OPPONENT...</h2>
            <p id="timer-text" style="opacity: 0.5; font-size: 12px; margin-top: 8px;">ETA: 8s</p>
        </div>

        <div id="battle-area" style="display: none; width: 100%;">
            <div class="vs-container">
                <div class="player-card">
                    <div class="avatar"><img id="p1-img" src=""></div>
                    <p id="p1-name" style="font-size: 11px; font-weight: 800; text-transform: uppercase;"></p>
                </div>
                <div class="vs-badge">VS</div>
                <div class="player-card">
                    <div class="avatar" style="border-color: var(--danger);"><img id="p2-img" src=""></div>
                    <p id="p2-name" style="font-size: 11px; font-weight: 800; text-transform: uppercase;"></p>
                </div>
            </div>

            <div class="battle-card" id="main-card">
                <div class="timer-bar"><div id="timer-fill"></div></div>
                <h3 id="question" style="font-size: 17px; margin-bottom: 10px;">Loading Question...</h3>
                <div id="options-box"></div>
                
                <div class="score-footer">
                    <div style="text-align:left"><small style="opacity:0.5; font-size:9px">YOU</small><br><b id="my-score" style="color:var(--success)">0</b></div>
                    <div style="text-align:center"><small id="q-count" style="opacity:0.5; font-size:11px">Q 1/20</small></div>
                    <div style="text-align:right"><small style="opacity:0.5; font-size:9px">OPPONENT</small><br><b id="opp-score" style="color:var(--danger)">0</b></div>
                </div>
            </div>
        </div>

        <div class="recent-section" id="recent-box">
            <div id="match-history-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, getDoc, deleteDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let student = localStorage.getItem("studentName") || prompt("Enter your Name");
        if(!student) student = "Guest" + Math.floor(Math.random()*100);
        localStorage.setItem("studentName", student);

        let roomId = "", opponent = "Cyber Bot", isAI = false, i = 0, score = 0, oppScore = 0, timer;
        const questions = [
            {q:"Shortcut for Refresh?", a:"F2", b:"F5", c:"F7", d:"F10", ans:"b"},
            {q:"First computer name?", a:"ENIAC", b:"DELL", c:"HP", d:"IBM", ans:"a"},
            {q:"Volatile memory is?", a:"ROM", b:"RAM", c:"SSD", d:"HDD", ans:"b"},
            {q:"Google is a?", a:"Browser", b:"Search Engine", c:"OS", d:"Software", ans:"b"},
            {q:"Binary digit is?", a:"0 & 1", b:"1 & 2", c:"9 & 0", d:"All", ans:"a"},
            {q:"Brain of PC?", a:"Monitor", b:"CPU", c:"UPS", d:"RAM", ans:"b"},
            {q:"1MB is?", a:"1024KB", b:"1000KB", c:"512KB", d:"100KB", ans:"a"},
            {q:"USB full form?", a:"Universal Serial Bus", b:"Unit Serial Bus", c:"Ultra Smart Bus", d:"None", ans:"a"},
            {q:"Input device?", a:"Printer", b:"Keyboard", c:"Monitor", d:"Speaker", ans:"b"},
            {q:"PDF full form?", a:"Portable Doc Format", b:"Print Doc File", c:"Private Data File", d:"None", ans:"a"},
            {q:"WWW stands for?", a:"World Wide Web", b:"World Web Wide", c:"Web World Wide", d:"None", ans:"a"},
            {q:"Shortcut to Copy?", a:"Ctrl+X", b:"Ctrl+V", c:"Ctrl+C", d:"Ctrl+Z", ans:"c"},
            {q:"Father of Computer?", a:"Bill Gates", b:"Charles Babbage", c:"Newton", d:"Elon Musk", ans:"b"},
            {q:"Which is an OS?", a:"MS Word", b:"Windows", c:"Chrome", d:"Tally", ans:"b"},
            {q:"1 Byte = ?", a:"4 Bits", b:"8 Bits", c:"16 Bits", d:"1024 Bits", ans:"b"},
            {q:"Permanent memory?", a:"RAM", b:"ROM", c:"Cache", d:"Virtual", ans:"b"},
            {q:"Shortcut to Undo?", a:"Ctrl+U", b:"Ctrl+Y", c:"Ctrl+Z", d:"Ctrl+N", ans:"c"},
            {q:"Main page of website?", a:"Back page", b:"Home page", c:"First page", d:"Main page", ans:"b"},
            {q:"HTTP full form?", a:"Hypertext Protocol", b:"Hypertext Transfer Protocol", c:"Hard Transfer Protocol", d:"None", ans:"b"},
            {q:"Extension of Notepad?", a:".docx", b:".jpg", c:".txt", d:".pdf", ans:"c"}
        ];

        async function matchmake() {
            let found = false;
            let waitTime = 8;
            
            const aiTimeout = setInterval(() => {
                waitTime--;
                document.getElementById("timer-text").innerText = `ETA: ${waitTime}s`;
                if(waitTime <= 0 && !found) {
                    clearInterval(aiTimeout);
                    startWithAI();
                }
            }, 1000);

            const rooms = await getDocs(collection(db, "battle_rooms"));
            for (let r of rooms.docs) {
                if (r.data().status === "waiting" && r.data().player1 !== student) {
                    found = true; roomId = r.id;
                    await updateDoc(doc(db, "battle_rooms", roomId), { player2: student, status: "start", [student]: 0 });
                    initBattle(); return;
                }
            }

            const ref = await addDoc(collection(db, "battle_rooms"), { player1: student, player2: "", status: "waiting", [student]: 0 });
            roomId = ref.id;
            onSnapshot(doc(db, "battle_rooms", roomId), (snap) => {
                if(snap.data()?.status === "start") { found = true; initBattle(); }
            });
        }

        function startWithAI() {
            isAI = true; opponent = "Cyber Bot";
            initBattle();
        }

        async function initBattle() {
            document.getElementById("loader-text").innerText = "MATCH FOUND!";
            setTimeout(async () => {
                document.getElementById("loader").style.display = "none";
                document.getElementById("battle-area").style.display = "block";
                
                let p1 = student, p2 = opponent;
                let img1 = `https://api.dicebear.com/7.x/avataaars/svg?seed=${p1}`;
                let img2 = `https://api.dicebear.com/7.x/bottts/svg?seed=${p2}`;

                if(!isAI) {
                    const d = (await getDoc(doc(db, "battle_rooms", roomId))).data();
                    p1 = d.player1; p2 = d.player2;
                    opponent = (student === p1) ? p2 : p1;
                    img1 = `https://api.dicebear.com/7.x/avataaars/svg?seed=${p1}`;
                    img2 = `https://api.dicebear.com/7.x/avataaars/svg?seed=${p2}`;
                    
                    onSnapshot(doc(db, "battle_rooms", roomId), (s) => {
                        if(s.data()) document.getElementById("opp-score").innerText = s.data()[opponent] || 0;
                    });
                } else {
                    simulateAIScore();
                }

                document.getElementById("p1-name").innerText = p1;
                document.getElementById("p2-name").innerText = p2;
                document.getElementById("p1-img").src = img1;
                document.getElementById("p2-img").src = img2;
                loadQuestion();
            }, 1500);
        }

        function simulateAIScore() {
            setInterval(() => {
                if(Math.random() > 0.7 && i < 20) {
                    oppScore++;
                    document.getElementById("opp-score").innerText = oppScore;
                }
            }, 4500);
        }

        function loadQuestion() {
            if (i >= 20) { finishMatch(); return; }
            const q = questions[i];
            document.getElementById("q-count").innerText = `Q ${i+1}/20`;
            document.getElementById("question").innerText = q.q;
            document.getElementById("options-box").innerHTML = ['a','b','c','d'].map(opt => 
                `<div class="option" onclick="checkAns(this, '${opt}')">${q[opt]}</div>`
            ).join('');

            let t = 10;
            document.getElementById("timer-fill").style.transition = "none";
            document.getElementById("timer-fill").style.width = "100%";
            setTimeout(() => { 
                document.getElementById("timer-fill").style.transition = "10s linear"; 
                document.getElementById("timer-fill").style.width = "0%"; 
            }, 50);

            clearInterval(timer);
            timer = setInterval(() => { t--; if(t<=0) { i++; loadQuestion(); } }, 1000);
        }

        window.checkAns = async (el, choice) => {
            clearInterval(timer);
            const correct = choice === questions[i].ans;
            const options = document.querySelectorAll('.option');
            options.forEach(o => o.style.pointerEvents = "none");

            if(correct) {
                score++;
                el.style.background = "var(--success)";
                document.getElementById("my-score").innerText = score;
            } else {
                el.style.background = "var(--danger)";
                document.getElementById("main-card").classList.add("shake");
                setTimeout(() => document.getElementById("main-card").classList.remove("shake"), 400);
            }

            if(!isAI) await updateDoc(doc(db, "battle_rooms", roomId), { [student]: score });

            setTimeout(() => { i++; loadQuestion(); }, 800);
        }

        async function finishMatch() {
            document.getElementById("battle-area").innerHTML = `<h2 class="pulse" style="margin-top:100px">CALCULATING POWER...</h2>`;
            
            setTimeout(async () => {
                let enemyScore = isAI ? oppScore : 0;
                if(!isAI) {
                    const d = (await getDoc(doc(db, "battle_rooms", roomId))).data();
                    enemyScore = d[opponent] || 0;
                }

                const win = score > enemyScore;
                const draw = score === enemyScore;

                document.getElementById("game-ui").innerHTML = `
                    <div class="battle-card" style="text-align:center; margin-top:80px">
                        <h1 style="color:${win ? 'var(--gold)' : 'var(--danger)'}; font-size:40px">
                            ${draw ? 'DRAW' : (win ? 'VICTORY' : 'DEFEAT')}
                        </h1>
                        <p style="margin:15px 0; opacity:0.6">Your Score: ${score} | Enemy: ${enemyScore}</p>
                        <button class="btn-home" onclick="location.reload()">REMATCH</button>
                    </div>`;
                
                if(!isAI) {
                    await addDoc(collection(db, "recent_battles"), {
                        p1: student, p2: opponent, 
                        winner: draw ? 'Draw' : (win ? student : opponent),
                        time: Date.now()
                    });
                }
            }, 2000);
        }

        matchmake();
    </script>
</body>
</html>
