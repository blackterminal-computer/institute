<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Battle Arena ULTIMATE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #0f172a, #1e1b4b, #312e81);
            --accent-1: #38bdf8; /* Sky Blue */
            --accent-2: #c026d3; /* Vibrant Purple */
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-grad); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            background-attachment: fixed; overflow-x: hidden; padding-top: 40px; color: #fff;
        }

        .battle-card {
            width: 92%; max-width: 420px; background: var(--glass);
            border: 1px solid var(--glass-border); border-radius: 30px;
            padding: 25px; backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.05);
            margin: 0 auto;
        }

        .option {
            background: rgba(255,255,255,0.05); border: 2px solid transparent;
            background-image: linear-gradient(var(--glass), var(--glass)), linear-gradient(to right, var(--accent-1), var(--accent-2));
            background-origin: border-box; background-clip: padding-box, border-box;
            padding: 15px; border-radius: 16px; margin-top: 15px;
            cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .option:hover { background-image: linear-gradient(to right, var(--accent-1), var(--accent-2)); }

        .vs-badge {
            background: linear-gradient(45deg, var(--accent-1), var(--accent-2));
            padding: 4px 15px; border-radius: 6px; font-weight: 900; font-size: 12px;
        }

        .timer-bar { width: 100%; height: 8px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #timer-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); box-shadow: 0 0 10px var(--accent-1); }

        .btn-home {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            color: white; border: none; padding: 14px 35px; border-radius: 50px;
            font-weight: 800; margin-top: 20px; cursor: pointer; width: 100%; transition: 0.3s;
        }

        .avatar {
            width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 8px;
            border: 3px solid transparent; background-origin: border-box; background-clip: padding-box, border-box;
            background-image: linear-gradient(#1e1b4b, #1e1b4b), linear-gradient(45deg, var(--accent-1), var(--accent-2));
        }

        /* Animations */
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body>

    <div id="game-ui" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div id="loader" style="text-align: center; margin-top: 80px;">
            <div style="font-size: 50px; color: var(--accent-1);" class="pulse"><i class="ri-sword-fill"></i></div>
            <h2 id="loader-text" class="pulse">FINDING OPPONENT...</h2>
        </div>

        <div id="battle-area" style="display: none; width: 100%;">
            <div class="vs-container" style="display: flex; align-items: center; justify-content: space-around; width: 100%; max-width: 450px; margin-bottom: 25px;">
                <div style="text-align: center;"><div class="avatar"><img id="p1-img" style="width:100%; border-radius:50%"></div><p id="p1-name" style="font-size:11px; font-weight:800;"></p></div>
                <div class="vs-badge">VS</div>
                <div style="text-align: center;"><div class="avatar"><img id="p2-img" style="width:100%; border-radius:50%"></div><p id="p2-name" style="font-size:11px; font-weight:800;"></p></div>
            </div>

            <div class="battle-card" id="main-card">
                <div class="timer-bar"><div id="timer-fill"></div></div>
                <h3 id="question" style="font-size: 17px; margin-bottom: 10px;">Loading...</h3>
                <div id="options-box"></div>
                <div style="margin-top:20px; display:flex; justify-content:space-between;">
                    <b id="my-score" style="color:var(--accent-1)">YOU: 0</b>
                    <b id="opp-score" style="color:var(--accent-2)">OPP: 0</b>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let student = localStorage.getItem("studentName") || prompt("Enter your Name") || "Guest";
        localStorage.setItem("studentName", student);

        let roomId = "", score = 0, oppScore = 0, i = 0, timer;
        const questions = [
            {q:"Shortcut for Refresh?", a:"F2", b:"F5", c:"F7", d:"F10", ans:"b"},
            {q:"Brain of PC?", a:"Monitor", b:"CPU", c:"UPS", d:"RAM", ans:"b"},
            {q:"1MB is?", a:"1024KB", b:"1000KB", c:"512KB", d:"100KB", ans:"a"},
            {q:"Father of Computer?", a:"Bill Gates", b:"Charles Babbage", c:"Newton", d:"Elon Musk", ans:"b"}
        ];

        async function initBattle() {
            document.getElementById("loader").style.display = "none";
            document.getElementById("battle-area").style.display = "block";
            document.getElementById("p1-name").innerText = student;
            document.getElementById("p1-img").src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${student}`;
            loadQuestion();
        }

        function loadQuestion() {
            if (i >= questions.length) { alert("Game Over! Score: " + score); location.reload(); return; }
            const q = questions[i];
            document.getElementById("question").innerText = q.q;
            document.getElementById("options-box").innerHTML = ['a','b','c','d'].map(opt => 
                `<div class="option" onclick="window.checkAns('${opt}')">${q[opt]}</div>`
            ).join('');
        }

        window.checkAns = (choice) => {
            if(choice === questions[i].ans) score++;
            document.getElementById("my-score").innerText = "YOU: " + score;
            i++; loadQuestion();
        }

        setTimeout(initBattle, 2000); // Auto start for demo
    </script>
</body>
</html>
