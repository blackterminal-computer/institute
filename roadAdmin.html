<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Terminal | Admin v3.0</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg: #050810;
            --card: rgba(15, 23, 42, 0.6);
            --accent: #00d2ff;
            --primary: #6366f1;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg);
            color: #e2e8f0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar: Student Selection */
        .sidebar {
            width: 300px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
        }

        .side-header {
            padding: 25px;
            border-bottom: 1px solid var(--border);
        }

        .side-header h2 { font-size: 18px; margin: 0; color: var(--accent); letter-spacing: 1px; }

        .student-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .student-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .student-item:hover { background: rgba(255,255,255,0.03); }
        .student-item input[type="checkbox"] { accent-color: var(--accent); width: 18px; height: 18px; }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            max-width: 1100px;
        }

        .glass-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .glass-card h3 { margin-top: 0; font-size: 16px; display: flex; align-items: center; gap: 10px; opacity: 0.8; }

        /* Form Elements */
        input, textarea, select {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: white;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-family: inherit;
            outline: none;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 210, 255, 0.1); }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-blue { background: linear-gradient(90deg, #00d2ff, #3a7bd5); color: white; }
        .btn-purple { background: linear-gradient(90deg, #6366f1, #a855f7); color: white; }
        .btn:active { transform: scale(0.98); }

        /* Scrollbar Fix */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="side-header">
            <h2><i class="ri-command-fill"></i> TERMINAL</h2>
            <p style="font-size: 10px; opacity: 0.5; margin: 5px 0 0;">MANAGE 30+ STUDENTS</p>
            <button onclick="toggleAll()" style="background:none; border:1px solid var(--accent); color:var(--accent); font-size:10px; margin-top:15px; padding:5px 10px; border-radius:5px; cursor:pointer;">Select All</button>
        </div>
        <div class="student-list" id="sList">
            </div>
    </div>

    <div class="main-content">
        <div class="grid-layout">
            
            <div class="glass-card">
                <h3><i class="ri-folder-add-line" style="color: var(--primary);"></i> Global Module Creator</h3>
                <p style="font-size: 12px; opacity: 0.6; margin-bottom: 20px;">This will add the module to every student's roadmap.</p>
                
                <input type="text" id="mTitle" placeholder="Module Title (e.g., Advanced React)">
                <textarea id="mDesc" rows="4" placeholder="Description of topics covered..."></textarea>
                
                <button class="btn btn-purple" onclick="addModuleBulk()">
                    <i class="ri-send-plane-fill"></i> Publish Module
                </button>
            </div>

            <div class="glass-card">
                <h3><i class="ri-shield-flash-line" style="color: var(--accent);"></i> Quick Status Sync</h3>
                <p style="font-size: 12px; opacity: 0.6; margin-bottom: 20px;">Change status for all selected students at once.</p>
                
                <label style="font-size: 11px; opacity: 0.5;">SELECT MODULE</label>
                <select id="targetMod">
                    <option>Loading Modules...</option>
                </select>

                <label style="font-size: 11px; opacity: 0.5;">TARGET STATUS</label>
                <select id="targetStatus">
                    <option value="locked">🔒 Locked</option>
                    <option value="progress">⚡ In Progress</option>
                    <option value="completed">✅ Completed</option>
                </select>
                
                <button class="btn btn-blue" onclick="updateStatusBulk()">
                    <i class="ri-refresh-line"></i> Sync Terminal
                </button>
                <div id="log" style="text-align: center; font-size: 12px; margin-top: 15px; color: #22c55e;"></div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, setDoc, arrayUnion, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        }));

        async function init() {
            // Load Students to Sidebar
            const sSnap = await getDocs(collection(db, "students"));
            const sList = document.getElementById('sList');
            sList.innerHTML = "";
            sSnap.forEach(d => {
                sList.innerHTML += `
                    <div class="student-item">
                        <input type="checkbox" class="s-check" value="${d.id}">
                        <span style="font-weight:600; font-size:14px;">${d.id}</span>
                    </div>`;
            });

            // Load Global Modules to Dropdown
            const mSnap = await getDoc(doc(db, "settings", "roadmapConfig"));
            const targetMod = document.getElementById('targetMod');
            targetMod.innerHTML = '<option value="">-- Choose Module --</option>';
            if(mSnap.exists()){
                mSnap.data().modules.forEach(m => {
                    targetMod.innerHTML += `<option value="${m.id}">${m.title}</option>`;
                });
            }
        }
        init();

        window.toggleAll = () => {
            const checks = document.querySelectorAll('.s-check');
            const all = Array.from(checks).every(c => c.checked);
            checks.forEach(c => c.checked = !all);
        };

        window.addModuleBulk = async () => {
            const title = document.getElementById('mTitle').value;
            const desc = document.getElementById('mDesc').value;
            if(!title) return alert("Title missing!");
            const mId = "mod_" + Date.now();
            await setDoc(doc(db, "settings", "roadmapConfig"), {
                modules: arrayUnion({ id: mId, title, desc })
            }, { merge: true });
            alert("Module added to Database!");
            init();
        };

        window.updateStatusBulk = async () => {
            const selected = Array.from(document.querySelectorAll('.s-check:checked')).map(c => c.value);
            const mId = document.getElementById('targetMod').value;
            const status = document.getElementById('targetStatus').value;
            if(selected.length === 0 || !mId) return alert("Select students & module first!");

            const batch = writeBatch(db);
            selected.forEach(sId => {
                const ref = doc(db, "students", sId);
                const path = {}; path[`roadmapStatus.${mId}`] = status;
                batch.update(ref, path);
            });
            await batch.commit();
            document.getElementById('log').innerText = `Successfully synced ${selected.length} terminals.`;
            setTimeout(() => document.getElementById('log').innerText = "", 3000);
        };
    </script>
</body>
</html>
