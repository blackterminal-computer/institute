<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Roadmap Master</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: rgba(25, 30, 50, 0.6);
            --accent-blue: #00d2ff;
            --accent-green: #22c55e;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 20px;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent);
        }

        .admin-container { max-width: 600px; margin: auto; }
        
        /* Select Student Styling */
        .selector-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(15px);
        }

        select {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            padding: 15px;
            border-radius: 12px;
            outline: none;
            font-weight: 600;
        }

        /* Module List Styling (Same as Screenshot) */
        .module-list {
            position: relative;
            padding-left: 45px;
        }

        .module-list::before {
            content: '';
            position: absolute;
            left: 20px; top: 0; bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--accent-blue), #1e293b);
        }

        .module-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
        }

        /* Timeline Icons */
        .status-marker {
            position: absolute;
            left: -48px; top: 25px;
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            z-index: 2;
        }

        .module-card.active-mod { border-color: var(--accent-blue); box-shadow: 0 0 20px rgba(0, 210, 255, 0.1); }
        .module-card.done-mod .status-marker { border-color: var(--accent-green); color: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
        .module-card.prog-mod .status-marker { border-color: var(--accent-blue); color: var(--accent-blue); box-shadow: 0 0 10px var(--accent-blue); }

        .m-tag { color: var(--accent-blue); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .m-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; }

        /* Status Controls */
        .controls { display: flex; gap: 10px; margin-top: 15px; }
        .st-btn {
            flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
            background: rgba(0,0,0,0.2); color: #64748b; font-size: 10px; font-weight: 800;
            cursor: pointer; transition: 0.3s; text-align: center;
        }

        .st-btn.active[data-val="completed"] { background: rgba(34, 197, 94, 0.1); color: var(--accent-green); border-color: var(--accent-green); }
        .st-btn.active[data-val="progress"] { background: rgba(0, 210, 255, 0.1); color: var(--accent-blue); border-color: var(--accent-blue); }
        .st-btn.active[data-val="locked"] { color: white; border-color: white; opacity: 1; }

        .save-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: white; padding: 16px 40px; border-radius: 50px; border: none;
            font-weight: 800; box-shadow: 0 10px 30px rgba(0, 210, 255, 0.3);
            cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="selector-card">
        <h3 style="margin-top:0; font-size:14px; opacity:0.6;">COMMAND CENTER</h3>
        <select id="studentSelect">
            <option value="">-- Choose Student --</option>
        </select>
    </div>

    <div class="module-list" id="dynamicList">
        </div>
</div>

<button class="save-btn" onclick="saveAll()">SYNC TERMINAL</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    }));

    // Load Students
    const sSelect = document.getElementById('studentSelect');
    const sSnap = await getDocs(collection(db, "students"));
    sSnap.forEach(d => {
        let opt = document.createElement('option');
        opt.value = d.id; opt.innerText = d.id;
        sSelect.appendChild(opt);
    });

    // Load Modules & Student Status
    sSelect.onchange = async () => {
        const sId = sSelect.value;
        if(!sId) return;

        const configSnap = await getDoc(doc(db, "settings", "roadmapConfig"));
        const studentSnap = await getDoc(doc(db, "students", sId));
        
        const modules = configSnap.data().modules || [];
        const statusData = studentSnap.data().roadmapStatus || {};
        
        const list = document.getElementById('dynamicList');
        list.innerHTML = "";

        modules.forEach((m, index) => {
            const current = statusData[m.id] || 'locked';
            const card = document.createElement('div');
            card.className = `module-card ${current === 'completed' ? 'done-mod' : current === 'progress' ? 'prog-mod active-mod' : ''}`;
            
            let icon = current === 'completed' ? 'ri-check-line' : current === 'progress' ? 'ri-play-fill' : 'ri-lock-2-line';
            
            card.innerHTML = `
                <div class="status-marker"><i class="${icon}"></i></div>
                <span class="m-tag">Module 0${index + 1}</span>
                <div class="m-title">${m.title}</div>
                <div class="controls" data-mid="${m.id}">
                    <div class="st-btn ${current === 'locked' ? 'active' : ''}" data-val="locked">LOCKED</div>
                    <div class="st-btn ${current === 'progress' ? 'active' : ''}" data-val="progress">PROGRESS</div>
                    <div class="st-btn ${current === 'completed' ? 'active' : ''}" data-val="completed">DONE</div>
                </div>
            `;
            list.appendChild(card);
        });

        // Toggle logic
        document.querySelectorAll('.st-btn').forEach(btn => {
            btn.onclick = function() {
                this.parentElement.querySelectorAll('.st-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            }
        });
    };

    window.saveAll = async () => {
        const sId = sSelect.value;
        if(!sId) return alert("Student select karein!");

        const roadmapStatus = {};
        document.querySelectorAll('.controls').forEach(ctrl => {
            roadmapStatus[ctrl.dataset.mid] = ctrl.querySelector('.active').dataset.val;
        });

        await updateDoc(doc(db, "students", sId), { roadmapStatus });
        alert("✅ Terminal Synced!");
    };
</script>
</body>
</html>
