<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Path | Black Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: rgba(21, 26, 48, 0.8);
            --accent-blue: #00d2ff;
            --accent-green: #22c55e;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 20px;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent);
            min-height: 100vh;
        }

        .header-section { text-align: center; margin-top: 40px; margin-bottom: 50px; }
        .header-section p { font-size: 12px; letter-spacing: 2px; opacity: 0.5; text-transform: uppercase; margin-bottom: 10px; }
        .header-section h1 { font-size: 32px; font-weight: 800; margin: 0; background: linear-gradient(to bottom, #fff, var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Timeline Logic */
        .roadmap-container { position: relative; max-width: 500px; margin: auto; padding-left: 45px; }
        .roadmap-container::before {
            content: ''; position: absolute; left: 20px; top: 0; bottom: 0;
            width: 2px; background: rgba(255,255,255,0.1);
        }

        /* Module Card Styling */
        .module-wrapper { position: relative; margin-bottom: 40px; }
        
        /* Status Dot/Icon on Timeline */
        .status-marker {
            position: absolute; left: -48px; top: 30px;
            width: 32px; height: 32px; border-radius: 50%;
            background: var(--bg); border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            z-index: 5; transition: 0.3s;
        }

        .module-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 28px; padding: 25px; backdrop-filter: blur(10px);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Dynamic Classes based on Status */
        .status-completed .status-marker { border-color: var(--accent-green); color: var(--accent-green); box-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
        .status-progress .status-marker { border-color: var(--accent-blue); color: var(--accent-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
        .status-progress .module-card { border-color: var(--accent-blue); box-shadow: 0 0 25px rgba(0, 210, 255, 0.1); }
        .status-locked { opacity: 0.4; pointer-events: none; }

        .m-id { color: var(--accent-blue); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .m-title { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
        .m-desc { font-size: 13px; color: var(--text-dim); line-height: 1.6; }

        /* Badges */
        .badge {
            display: inline-block; padding: 6px 14px; border-radius: 50px;
            font-size: 11px; font-weight: 800; margin-top: 15px;
        }
        .badge-completed { background: rgba(34, 197, 94, 0.1); color: var(--accent-green); }
        .badge-progress { background: rgba(0, 210, 255, 0.1); color: var(--accent-blue); }

        /* Loader */
        #loader { text-align: center; padding: 50px; opacity: 0.5; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header-section">
        <p>Your Learning Path</p>
        <h1>Full Stack Mastery</h1>
    </div>

    <div class="roadmap-container" id="roadmapList">
        <div id="loader">Fetching your progress...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get Current Student from LocalStorage
        const studentId = localStorage.getItem("studentName");
        if(!studentId) window.location.href = "login.html";

        async function renderRoadmap() {
            const list = document.getElementById('roadmapList');

            // 1. Fetch Global Modules
            const configSnap = await getDoc(doc(db, "settings", "roadmapConfig"));
            if(!configSnap.exists()) return list.innerHTML = "No modules found.";
            const globalModules = configSnap.data().modules || [];

            // 2. Listen to Student Progress in Real-time
            onSnapshot(doc(db, "students", studentId), (snap) => {
                if(!snap.exists()) return;
                const progress = snap.data().roadmapStatus || {};
                
                list.innerHTML = ""; // Clear loader

                globalModules.forEach((m, index) => {
                    const status = progress[m.id] || 'locked';
                    const wrapper = document.createElement('div');
                    wrapper.className = `module-wrapper status-${status}`;

                    let icon = '<i class="ri-lock-2-line"></i>';
                    let badge = '';

                    if(status === 'completed') {
                        icon = '<i class="ri-check-line"></i>';
                        badge = '<div class="badge badge-completed">Completed</div>';
                    } else if(status === 'progress') {
                        icon = '<i class="ri-play-fill"></i>';
                        badge = '<div class="badge badge-progress">In Progress</div>';
                    }

                    wrapper.innerHTML = `
                        <div class="status-marker">${icon}</div>
                        <div class="module-card">
                            <span class="m-id">MODULE 0${index + 1}</span>
                            <div class="m-title">${m.title}</div>
                            <div class="m-desc">${m.desc}</div>
                            ${badge}
                        </div>
                    `;
                    list.appendChild(wrapper);
                });
            });
        }

        renderRoadmap();
    </script>
</body>
</html>
