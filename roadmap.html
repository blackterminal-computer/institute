<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Path | Black Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.css">
    
    <style>
        :root { --bg: #030508; --card: rgba(255, 255, 255, 0.04); --accent: #ff3e3e; --success: #2ecc71; --info: #3498db; --border: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .module-wrapper { position: relative; margin-bottom: 25px; padding-left: 30px; }
        .module-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
        .status-marker { position: absolute; left: -10px; top: 20px; width: 12px; height: 12px; border-radius: 50%; background: #333; }
        .status-completed .status-marker { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .status-progress .status-marker { background: var(--info); box-shadow: 0 0 10px var(--info); }
        .m-id { font-size: 10px; color: var(--accent); font-weight: 800; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin-bottom: 40px;">LEARNING PATH</h2>
    <div id="roadmapList">
        <div style="text-align:center; opacity:0.5;">Loading modules...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    firebase.initializeApp(firebaseConfig);
    const fs = firebase.firestore();

    // 1. Student Name check
    const studentName = localStorage.getItem("studentName") || "Demo Student";

    async function loadRoadmap() {
        const list = document.getElementById('roadmapList');
        
        try {
            // Fetch Modules Config
            const configDoc = await fs.collection("settings").doc("roadmapConfig").get();
            if (!configDoc.exists) return list.innerHTML = "Config not found!";
            const modules = configDoc.data().modules || [];

            // Listen to Student Progress
            fs.collection("students").doc(studentName).onSnapshot(snap => {
                const progress = snap.exists ? (snap.data().roadmapStatus || {}) : {};
                list.innerHTML = "";

                modules.forEach((m, index) => {
                    const status = progress[m.id] || 'locked';
                    const div = document.createElement('div');
                    div.className = `module-wrapper status-${status}`;
                    div.innerHTML = `
                        <div class="status-marker"></div>
                        <div class="module-card">
                            <span class="m-id">MODULE 0${index + 1}</span>
                            <div style="font-weight:700; margin:5px 0;">${m.title}</div>
                            <div style="font-size:12px; opacity:0.6;">${m.desc}</div>
                        </div>
                    `;
                    list.appendChild(div);
                });
            });
        } catch (e) {
            console.error(e);
            list.innerHTML = "Error loading data.";
        }
    }

    loadRoadmap();
</script>
</body>
</html>
