<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Learning Path | BT</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');
        
        :root {
            --bg: #000000;
            --card-bg: rgba(28, 28, 30, 0.8);
            --text-main: #ffffff;
            --text-sub: #98989d;
            --accent: #0A84FF; /* iOS Blue */
        }

        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            margin: 0; padding: 20px; 
        }
        
        .container { max-width: 450px; margin: auto; }
        
        .title { font-size: 34px; font-weight: 700; margin: 40px 0 20px; letter-spacing: -0.5px; }

        .module-wrapper { position: relative; margin-bottom: 16px; padding-left: 20px; }
        
        /* iOS Style Card */
        .module-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px; 
            padding: 20px; 
            border: 0.5px solid rgba(255,255,255,0.1);
            transition: transform 0.2s ease;
        }
        .module-card:active { transform: scale(0.98); }

        .status-marker { 
            position: absolute; left: -6px; top: 32px; 
            width: 10px; height: 10px; border-radius: 50%; 
            background: #3a3a3c;
        }

        /* iOS Color States */
        .status-completed .status-marker { background: #32d74b; }
        .status-progress .status-marker { background: var(--accent); }
        
        .m-id { font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .m-title { font-weight: 600; font-size: 17px; margin-bottom: 4px; }
        .m-desc { font-size: 14px; color: var(--text-sub); line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <div class="title">Learning Path</div>
    <div id="roadmapList">
        <div style="text-align:center; opacity:0.5; margin-top: 50px;">Loading path...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.appspot.com",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    firebase.initializeApp(firebaseConfig);
    const fs = firebase.firestore();
    const studentName = localStorage.getItem("studentName") || "Demo Student";

    async function loadRoadmap() {
        const list = document.getElementById('roadmapList');
        try {
            const configDoc = await fs.collection("settings").doc("roadmapConfig").get();
            const modules = configDoc.data().modules || [];

            fs.collection("students").doc(studentName).onSnapshot(snap => {
                const progress = snap.exists ? (snap.data().roadmapStatus || {}) : {};
                list.innerHTML = "";

                modules.forEach((m, index) => {
                    const status = progress[m.id] || 'locked';
                    const div = document.createElement('div');
                    div.className = `module-wrapper status-${status}`;
                    div.innerHTML = `
                        <div class="status-marker"></div>
                        <div class="module-card">
                            <span class="m-id">Module 0${index + 1}</span>
                            <div class="m-title">${m.title}</div>
                            <div class="m-desc">${m.desc}</div>
                        </div>
                    `;
                    list.appendChild(div);
                });
            });
        } catch (e) {
            list.innerHTML = "Unable to connect.";
        }
    }

    loadRoadmap();
</script>
</body>
</html>
