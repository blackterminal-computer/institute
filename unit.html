<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT | Online Examination System</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --primary: #6366f1; --bg: #030712; --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08); --success: #10b981; --danger: #f43f5e; --warn: #f59e0b;
        }

        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }

        /* Floating Animation */
        .floating-text { position: fixed; pointer-events: none; font-weight: 800; font-size: 22px; animation: floatUp 0.8s ease-out forwards; z-index: 10000; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-70px); opacity: 0; } }

        .header-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 10px; z-index: 100; backdrop-filter: blur(10px); }
        .timer { color: var(--danger); font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 5px; }

        .q-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .opt-label { display: block; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-top: 8px; cursor: pointer; transition: 0.2s; }
        .opt-label:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }
        input[type="radio"] { margin-right: 10px; accent-color: var(--primary); }

        .leaderboard { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-top: 30px; width: 100%; box-sizing: border-box; }
        .l-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .l-table td, .l-table th { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
        .rank { background: var(--primary); padding: 2px 8px; border-radius: 5px; font-weight: 800; }

        .btn-submit { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 15px; color: #fff; font-weight: 800; cursor: pointer; margin-top: 10px; font-size: 16px; }
        #result-screen { display: none; text-align: center; padding: 40px 20px; }
    </style>
</head>
<body>

<div class="container" id="exam-screen">
    <div class="header-card">
        <div><h2 style="margin:0; font-size:18px;">Class Test v2</h2><p style="margin:0; font-size:10px; opacity:0.5;">20 QUESTIONS • REAL-TIME</p></div>
        <div class="timer"><i class="ri-time-fill"></i> <span id="time-left">10:00</span></div>
    </div>

    <div id="questions-box"></div>
    <button class="btn-submit" onclick="window.submitExam(event)">Finish & Save Score</button>
</div>

<div class="container" id="result-screen">
    <i class="ri-medal-fill" style="font-size: 60px; color: var(--warn);"></i>
    <h1>Test Submitted!</h1>
    <div style="font-size: 40px; font-weight: 800; color: var(--success);" id="final-perc">0%</div>
    <p id="score-summary"></p>
    <button class="btn-submit" onclick="location.reload()">Restart Test</button>
</div>

<div class="container leaderboard">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;"><i class="ri- trophy-line"></i> Top Performers</h3>
        <span id="p-count" style="font-size:10px; color:var(--success);">SYNCING...</span>
    </div>
    <table class="l-table">
        <thead><tr><th>Rank</th><th>Agent</th><th>Score</th></tr></thead>
        <tbody id="l-body"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const questions = [
    /* 1-4 Decimal Conversions (Max 50) */
    { q: "Convert Decimal (45) to Binary:", a: "101101", o: ["101101", "110001", "101010", "111011"] },
    { q: "Convert Decimal (29) to Hexadecimal:", a: "1D", o: ["1C", "1D", "2A", "1B"] },
    { q: "Convert Decimal (48) to Octal:", a: "60", o: ["50", "60", "70", "55"] },
    { q: "What is the Hexadecimal value of Decimal (15)?", a: "F", o: ["E", "F", "10", "A"] },
    
    /* 5-8 Binary Conversions */
    { q: "Convert Binary (11111) to Decimal:", a: "31", o: ["15", "31", "32", "63"] },
    { q: "Convert Binary (10101) to Hexadecimal:", a: "15", o: ["15", "A1", "1A", "21"] },
    { q: "Convert Binary (11010) to Octal:", a: "32", o: ["26", "32", "34", "42"] },
    { q: "Binary Calculation: 10110 + 01010 equals (in Binary):", a: "100000", o: ["11111", "100000", "11011", "101010"] },

    /* 9-12 Octal & Hexa Complex */
    { q: "Convert Octal (45) to Hexadecimal:", a: "25", o: ["1D", "25", "2D", "35"] },
    { q: "Convert Octal (12) to Binary:", a: "001010", o: ["1010", "1100", "1001", "1111"] },
    { q: "Convert Hexadecimal (2A) to Octal:", a: "52", o: ["42", "52", "62", "72"] },
    { q: "Convert Hexadecimal (1C) to Binary:", a: "11100", o: ["11100", "10110", "11011", "11111"] },

    /* 13-22 Command Prompt (CMD) Hard Syntax */
    { q: "Which command creates a hidden, read-only system folder?", a: "attrib +h +r +s [folder]", o: ["attrib +h", "attrib +h +r +s [folder]", "hide /system", "set folder=hidden"] },
    { q: "Command to delete a non-empty directory structure in CMD?", a: "rmdir /s", o: ["rmdir", "del /all", "rmdir /s", "erase /dir"] },
    { q: "Which command displays all hidden files in the current directory?", a: "dir /ah", o: ["dir /s", "dir /ah", "show hidden", "ls -a"] },
    { q: "Command to change the CMD text to Light Green and Background to Black?", a: "color 0a", o: ["color a", "color 0a", "text green", "color 2"] },
    { q: "How to abort a scheduled shutdown command?", a: "shutdown /a", o: ["shutdown /stop", "shutdown /a", "abort", "ctrl+c"] },
    { q: "CMD command to see the IP configuration and MAC address?", a: "ipconfig /all", o: ["ipconfig", "ipconfig /all", "netstat", "ifconfig"] },
    { q: "Command to change the name of a folder via CMD?", a: "ren", o: ["move", "name", "ren", "cd"] },
    { q: "Which command clears the CMD buffer and screen?", a: "cls", o: ["clear", "cls", "reset", "wipe"] },
    { q: "Command to force close a process named 'notepad.exe'?", a: "taskkill /f /im notepad.exe", o: ["stop notepad", "taskkill /f /im notepad.exe", "kill -9", "end process"] },
    { q: "Command to display the directory tree structure?", a: "tree", o: ["dir /tree", "show tree", "tree", "map"] },

    /* 23-30 Computer Fundamentals & Fullforms */
    { q: "Correct Full Form of Computer:", a: "Commonly Operated Machine Particularly Used for Technical and Educational Research", o: ["Commonly Operated Machine Particularly Used for Technical and Educational Research", "Commonly Oriented Machine Part Used for Trade and Education", "Central Operating Machine Particularly Under Technical Education", "None"] },
    { q: "ASCII value of 'A' and 'a' respectively:", a: "65, 97", o: ["64, 96", "65, 97", "97, 65", "48, 65"] },
    { q: "Which component of the CPU performs logic comparisons?", a: "ALU", o: ["CU", "MU", "ALU", "Register"] },
    { q: "What is the capacity of a standard Single-Layer DVD?", a: "4.7 GB", o: ["700 MB", "4.7 GB", "8.5 GB", "25 GB"] },
    { q: "Which bus carries signals to report the status of a device?", a: "Control Bus", o: ["Data Bus", "Address Bus", "Control Bus", "System Bus"] },
    { q: "How many nibbles are in 2 bytes of data?", a: "4", o: ["2", "4", "8", "16"] },
    { q: "What is the base of the Hexadecimal number system?", a: "16", o: ["8", "10", "16", "2"] },
    { q: "Which registers hold the address of the next instruction?", a: "Program Counter", o: ["Accumulator", "Program Counter", "Instruction Register", "Memory Address Register"] }
];

    // --- RENDER QUESTIONS ---
    const qBox = document.getElementById('questions-box');
    questions.forEach((item, i) => {
        qBox.innerHTML += `
            <div class="q-card">
                <div style="font-weight:700; margin-bottom:10px;">${i+1}. ${item.q}</div>
                ${item.o.map(opt => `
                    <label class="opt-label">
                        <input type="radio" name="q${i}" value="${opt}"> ${opt}
                    </label>
                `).join('')}
            </div>
        `;
    });

    // --- FLOATING TEXT ---
    window.showFloat = (e, text, color) => {
        const el = document.createElement("span");
        el.className = "floating-text";
        el.innerText = text;
        el.style.left = `${e.clientX}px`; el.style.top = `${e.clientY}px`;
        el.style.color = color;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    };

    // --- TIMER ---
    let time = 600;
    const timerInt = setInterval(() => {
        let m = Math.floor(time / 60); let s = time % 60;
        document.getElementById('time-left').innerText = `${m}:${s<10?'0':''}${s}`;
        if (time <= 0) { clearInterval(timerInt); window.submitExam(); }
        time--;
    }, 1000);

    // --- SUBMIT EXAM ---
    window.submitExam = async (e) => {
        if(e) window.showFloat(e, "SAVING...", "var(--success)");
        const name = prompt("Enter Name for Leaderboard:");
        if(!name) return alert("Name is required!");

        let correct = 0;
        questions.forEach((item, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            if(sel && sel.value === item.a) correct++;
        });

        const score = Math.round((correct / 20) * 100);
        await addDoc(collection(db, "exam_results"), { name, score, time: Date.now() });

        document.getElementById('exam-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-perc').innerText = score + "%";
        document.getElementById('score-summary').innerText = `You got ${correct} out of 20 correct.`;
        clearInterval(timerInt);
    };

    // --- SYNC LEADERBOARD ---
    const q = query(collection(db, "exam_results"), orderBy("score", "desc"), limit(10));
    onSnapshot(q, (snap) => {
        const body = document.getElementById('l-body');
        body.innerHTML = "";
        let rank = 1;
        snap.forEach(doc => {
            const d = doc.data();
            body.innerHTML += `<tr><td><span class="rank">${rank++}</span></td><td>${d.name}</td><td style="color:var(--primary); font-weight:800;">${d.score}%</td></tr>`;
        });
        document.getElementById('p-count').innerText = `${snap.size} PARTICIPANTS`;
    });

</script>
</body>
</html>
