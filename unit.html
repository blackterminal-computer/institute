<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BT | Elite Gamified Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --primary: #6366f1; --bg: #020617; --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08); --success: #10b981; --danger: #f43f5e; --xp: #fbbf24;
        }

        /* Responsive Global Styles */
        body { 
            background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 650px; box-sizing: border-box; }

        /* Sticky Mobile Header */
        .header-card { 
            background: var(--card); border: 1px solid var(--border); padding: clamp(12px, 4vw, 20px); 
            border-radius: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; 
            align-items: center; position: sticky; top: 10px; z-index: 1000; backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-info h2 { font-size: clamp(14px, 4vw, 18px); margin: 0; letter-spacing: -0.5px; }
        .header-info p { font-size: 9px; margin: 2px 0 0 0; opacity: 0.5; font-weight: 700; }

        .timer { 
            color: var(--danger); font-weight: 800; font-size: clamp(12px, 3.5vw, 16px); 
            display: flex; align-items: center; gap: 6px; background: rgba(244, 63, 94, 0.1); 
            padding: 6px 12px; border-radius: 10px; border: 1px solid rgba(244, 63, 94, 0.2);
        }

        /* Question Cards */
        .q-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
            padding: clamp(15px, 5vw, 25px); margin-bottom: 15px; transition: 0.3s;
        }
        
        .opt-label { 
            display: flex; align-items: center; background: rgba(255,255,255,0.02); 
            border: 1px solid var(--border); padding: clamp(12px, 4vw, 16px); border-radius: 14px; 
            margin-top: 10px; cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        .opt-label:hover { background: rgba(99, 102, 241, 0.1); border-color: var(--primary); }
        input[type="radio"] { margin-right: 12px; accent-color: var(--primary); transform: scale(1.2); }

        /* Review Colors */
        .correct-ans { border-left: 5px solid var(--success) !important; background: rgba(16, 185, 129, 0.05) !important; }
        .wrong-ans { border-left: 5px solid var(--danger) !important; background: rgba(244, 63, 94, 0.05) !important; }
        .explanation { display: none; margin-top: 15px; padding: 12px; border-radius: 12px; font-size: 12px; line-height: 1.5; background: rgba(255,255,255,0.05); border: 1px dashed var(--border); }

        /* Results Screen */
        #result-screen { display: none; text-align: center; padding: 40px 10px; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .xp-counter { font-size: clamp(40px, 12vw, 65px); font-weight: 900; color: var(--xp); text-shadow: 0 0 25px rgba(251, 191, 36, 0.3); margin: 10px 0; }
        .rank-badge { display: inline-block; padding: 4px 15px; border-radius: 50px; font-weight: 800; font-size: 11px; border: 1px solid currentColor; margin-bottom: 10px; }

        .btn-submit { 
            width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 18px; 
            color: #fff; font-weight: 800; cursor: pointer; margin-top: 20px; font-size: 16px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); transition: 0.2s;
        }
        .btn-submit:active { transform: scale(0.98); }

        /* Leaderboard Mobile Fix */
        .leaderboard { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-top: 40px; }
        .l-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .l-table td { padding: 12px 8px; border-bottom: 1px solid var(--border); font-size: 13px; }

        @media (max-width: 480px) {
            .q-card { border-radius: 16px; }
            .opt-label { border-radius: 12px; }
        }
    </style>
</head>
<body>

<div class="container" id="exam-screen">
    <div class="header-card">
        <div class="header-info"><h2>Terminal Assessment</h2><p>30 QUESTIONS • SHUFFLED • XP MODE</p></div>
        <div class="timer"><i class="ri-timer-flash-fill"></i> <span id="time-left">30:00</span></div>
    </div>
    <div id="questions-box"></div>
    <button class="btn-submit" onclick="window.submitExam()">SUBMIT & CALCULATE XP</button>
</div>

<div class="container" id="result-screen">
    <div id="rank-display" class="rank-badge">RANK: ROOKIE</div>
    <div class="xp-counter"><span id="final-xp">0</span> <small style="font-size:20px;">XP</small></div>
    <h1 style="margin:5px 0; font-size: 24px;">Verification Complete</h1>
    <p id="score-summary" style="opacity:0.7; font-size: 14px; margin-bottom:20px;"></p>
    <button class="btn-submit" onclick="location.reload()" style="background:rgba(255,255,255,0.05); margin-bottom:40px;">RE-TAKE ASSESSMENT</button>
    <div id="review-box" style="text-align:left;"></div>
</div>

<div class="container leaderboard">
    <h3 style="margin:0; font-size: 16px;"><i class="ri- trophy-fill" style="color:var(--xp)"></i> Global Hall of Fame</h3>
    <table class="l-table"><tbody id="l-body"></tbody></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI", authDomain: "black-terminal-f2c91.firebaseapp.com", projectId: "black-terminal-f2c91", appId: "1:552489994197:web:7662331264c334ffbadf5c" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const questions = [
        { q: "Convert Decimal (43) to Binary:", a: "101011", o: ["101011", "110101", "101101", "100111"], e: "43 / 2 leaves remainders 1,1,0,1,0,1. Reading bottom-up gives 101011." },
        { q: "Decimal (37) in Hexadecimal is:", a: "25", o: ["25", "1B", "2A", "21"], e: "37 divided by 16 is 2 with a remainder of 5. Result: 25 Hex." },
        { q: "What is Decimal (49) in Octal system?", a: "61", o: ["51", "61", "71", "49"], e: "49 / 8 = 6 with remainder 1. Result: 61 Octal." },
        { q: "Binary '11001' is which Decimal number?", a: "25", o: ["23", "25", "27", "29"], e: "16 + 8 + 0 + 0 + 1 = 25 Decimal." },
        { q: "Hexadecimal '2B' converts to Decimal:", a: "43", o: ["41", "43", "45", "37"], e: "(2*16) + (11) = 32 + 11 = 43." },
        { q: "Octal '52' is equivalent to Decimal:", a: "42", o: ["40", "42", "52", "48"], e: "(5*8) + (2) = 40 + 2 = 42." },
        { q: "Convert Binary '10110' to Hexadecimal:", a: "16", o: ["16", "22", "1A", "14"], e: "10110 is 22 in decimal, which equals 16 in hex." },
        { q: "Binary '1111' + '1' equals:", a: "10000", o: ["1112", "10000", "11111", "10001"], e: "15 + 1 = 16. In binary, 16 is 10000." },
        { q: "Hexadecimal value of Decimal (15)?", a: "F", o: ["E", "F", "10", "16"], e: "Hex uses A-F for 10-15. 15 is F." },
        { q: "Convert Octal '10' to Hexadecimal:", a: "8", o: ["8", "10", "A", "16"], e: "Octal 10 is Decimal 8, which is Hex 8." },
        { q: "CMD command for 'System, Hidden, Read-only'?", a: "attrib +s +h +r", o: ["attrib /hide", "attrib +s +h +r", "set hidden", "attrib +a +b"], e: "+s=System, +h=Hidden, +r=Read-only." },
        { q: "Delete non-empty folder structure?", a: "rmdir /s", o: ["del /all", "rmdir /s", "erase /root", "rmdir /q"], e: "/s deletes the directory and all files/subfolders within it." },
        { q: "Reveal 'attrib +h' hidden files?", a: "dir /ah", o: ["dir /s", "show hidden", "dir /ah", "attrib -v"], e: "/a=attribute, h=hidden." },
        { q: "CMD color: Green text, Black background?", a: "color 02", o: ["color 20", "color 02", "set-color green", "color 0a"], e: "0=Black bg, 2=Green text." },
        { q: "Stop a scheduled shutdown?", a: "shutdown /a", o: ["shutdown /s", "shutdown /a", "abort", "cls"], e: "/a = Abort." },
        { q: "MAC and IP details command?", a: "ipconfig /all", o: ["ipconfig", "netstat", "ipconfig /all", "ping 127.0.0.1"], e: "/all shows the Physical (MAC) address and IP details." },
        { q: "Rename a file/folder in CMD?", a: "ren", o: ["rename /f", "mv", "ren", "name"], e: "REN is the standardized command for renaming." },
        { q: "Clear CMD screen buffer?", a: "cls", o: ["clear", "cls", "reset", "wipe"], e: "CLS = Clear Screen." },
        { q: "CMD directory tree structure?", a: "tree", o: ["dir /tree", "tree", "map", "ls -R"], e: "Tree graphically displays folder structure." },
        { q: "Force close app via CMD?", a: "taskkill /f /im", o: ["stop process", "taskkill /f /im", "end task", "kill -9"], e: "/f=Force, /im=Image Name." },
        { q: "Full Form of COMPUTER?", a: "Commonly Operated Machine Particularly Used for Technical and Educational Research", o: ["Commonly Operated Machine Particularly Used for Technical and Educational Research", "Commonly Oriented Machine Part Used for Trade and Education", "Central Operating Machine Particularly Under Technical Education", "None"], e: "Standard technical acronym." },
        { q: "ASCII value of Uppercase 'B'?", a: "66", o: ["65", "66", "97", "98"], e: "A=65, B=66." },
        { q: "Logic Decisions unit in CPU?", a: "ALU", o: ["CU", "MU", "ALU", "Input Unit"], e: "ALU handles all logic and math." },
        { q: "Capacity of a standard CD-ROM?", a: "700 MB", o: ["4.7 GB", "700 MB", "1.44 MB", "25 GB"], e: "CD=700MB, DVD=4.7GB." },
        { q: "Bus that determines RAM capacity?", a: "Address Bus", o: ["Data Bus", "Control Bus", "Address Bus", "Expansion Bus"], e: "Bus width defines memory address space." },
        { q: "Computer's 'Nervous System'?", a: "Control Unit", o: ["ALU", "Control Unit", "RAM", "Register"], e: "CU coordinates all hardware units." },
        { q: "Bits in a 'Double Word' (DWord)?", a: "32 Bits", o: ["8 Bits", "16 Bits", "32 Bits", "64 Bits"], e: "DWord = 32 bits." },
        { q: "ASCII stands for?", a: "American Standard Code for Information Interchange", o: ["American Standard Code for Information Interchange", "All Standard Code for Info Input", "American Scientific Code for Interchange", "None"], e: "Character encoding standard." },
        { q: "Register for next instruction address?", a: "Program Counter (PC)", o: ["Accumulator", "Instruction Register", "Program Counter (PC)", "Stack Pointer"], e: "PC points to the next execution address." },
        { q: "Base of Octal system?", a: "8", o: ["2", "8", "10", "16"], e: "Octal is base-8." }
    ];

    // Shuffling & Rendering
    const shuffled = questions.sort(() => Math.random() - 0.5);
    const qBox = document.getElementById('questions-box');
    shuffled.forEach((item, i) => {
        qBox.innerHTML += `
            <div class="q-card" id="wrap-${i}">
                <div style="font-weight:800; color:var(--primary); font-size:10px; margin-bottom:10px;">Q${i+1} / 30</div>
                <div style="font-size:15px; font-weight:600; margin-bottom:15px; line-height:1.4;">${item.q}</div>
                <div id="opts-${i}">
                    ${item.o.map(opt => `<label class="opt-label"><input type="radio" name="q${i}" value="${opt}"><span>${opt}</span></label>`).join('')}
                </div>
                <div class="explanation" id="exp-${i}"><b>Exclamation:</b> ${item.e}</div>
            </div>`;
    });

    // Timer Logic
    let time = 1800;
    const timerInt = setInterval(() => {
        let m = Math.floor(time / 60); let s = time % 60;
        document.getElementById('time-left').innerText = `${m}:${s<10?'0':''}${s}`;
        if(time-- <= 0) { clearInterval(timerInt); window.submitExam(); }
    }, 1000);

    // Results & XP Logic
    window.submitExam = async () => {
        const name = prompt("Enter Name for Global Ranking:");
        if(!name) return;

        let correct = 0;
        const reviewBox = document.getElementById('review-box');
        reviewBox.innerHTML = "<h3 style='font-size:16px; margin-bottom:15px; color:var(--primary);'>Detailed Performance Review:</h3>";

        shuffled.forEach((item, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            const isCorrect = sel && sel.value === item.a;
            if(isCorrect) correct++;

            const card = document.getElementById(`wrap-${i}`).cloneNode(true);
            card.classList.add(isCorrect ? 'correct-ans' : 'wrong-ans');
            card.querySelector(`#exp-${i}`).style.display = "block";
            reviewBox.appendChild(card);
        });

        const xp = correct * 500;
        let rank = "ROOKIE"; let rColor = "#94a3b8";
        if(xp >= 10000) { rank = "ELITE AGENT"; rColor = "#60a5fa"; }
        if(xp >= 14000) { rank = "GRANDMASTER"; rColor = "#f87171"; }

        await addDoc(collection(db, "exam_results"), { name, score: xp, rank, time: Date.now() });

        document.getElementById('exam-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('rank-display').innerText = `RANK: ${rank}`;
        document.getElementById('rank-display').style.color = rColor;
        document.getElementById('score-summary').innerText = `Scored ${correct}/30 Correct hits.`;

        let count = 0; const step = Math.ceil(xp/40);
        const countInt = setInterval(() => {
            count += step; if(count >= xp) { count = xp; clearInterval(countInt); }
            document.getElementById('final-xp').innerText = count.toLocaleString();
        }, 30);

        clearInterval(timerInt); window.scrollTo(0,0);
    };

    // Leaderboard
    onSnapshot(query(collection(db, "exam_results"), orderBy("score", "desc"), limit(10)), (snap) => {
        const body = document.getElementById('l-body'); body.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            body.innerHTML += `<tr><td><b>${d.name}</b><br><small style="opacity:0.5">${d.rank || 'AGENT'}</small></td><td style="text-align:right; color:var(--xp); font-weight:800;">${d.score.toLocaleString()} XP</td></tr>`;
        });
    });
</script>
</body>
</html>
