<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body { background: #020617; color: white; padding: 20px; font-family: sans-serif; }
        .box { max-width: 400px; margin: auto; background: #0f172a; padding: 20px; border-radius: 15px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #22c55e; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h2>Update Offer</h2>
    <input type="text" id="imgUrl" placeholder="Image URL">
    <input type="text" id="title" placeholder="Offer Title">
    <button onclick="saveData()">PUBLISH</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    window.saveData = async () => {
        const img = document.getElementById('imgUrl').value;
        const title = document.getElementById('title').value;
        
        await setDoc(doc(db, "settings", "courseOffer"), {
            imageUrl: img,
            title: title,
            active: true
        });
        alert("Published Successfully!");
    };
</script>

</body>
</html>
