<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | iOS Elite Login</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { 
            --ios-blue: #007af5;
            --ios-pink: #ff2d55;
            --ios-purple: #5856d6;
            --card-bg: rgba(25, 25, 30, 0.55);
            --input-bg: rgba(255, 255, 255, 0.06);
        }
        
        body { 
            background: #000; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Premium iOS Dynamic Ambient Background */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            z-index: 0;
            animation: floatGlow 12s infinite alternate ease-in-out;
        }
        body::before {
            background: linear-gradient(135deg, var(--ios-purple), var(--ios-blue));
            top: -10%; left: -10%;
        }
        body::after {
            background: linear-gradient(135deg, var(--ios-pink), var(--ios-purple));
            bottom: -10%; right: -10%;
            animation-delay: -6s;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.2); }
        }

        /* Fluid iOS Entrance Animation */
        @keyframes iosReveal {
            0% { opacity: 0; transform: scale(0.92) translateY(30px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        .login-card { 
            background: var(--card-bg); 
            padding: 45px 35px; 
            border-radius: 38px; 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            width: 90%; 
            max-width: 360px; 
            text-align: center; 
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            animation: iosReveal 0.9s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 1;
        }

        h1 { 
            font-size: 28px; 
            font-weight: 700; 
            margin: 0 0 6px 0; 
            letter-spacing: -0.5px;
            color: #ffffff;
        }
        
        p { 
            font-size: 13px; 
            opacity: 0.4; 
            margin: 0 0 35px 0; 
            font-weight: 500;
            letter-spacing: -0.1px;
        }
        
        /* Sleek iOS Fields */
        .input-group {
            position: relative;
            margin-bottom: 14px;
        }

        input { 
            width: 100%; 
            padding: 16px 16px 16px 16px; 
            border-radius: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            background: var(--input-bg); 
            color: white; 
            outline: none; 
            font-size: 16px; /* iOS standard size to prevent auto-zoom */
            font-weight: 400;
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-sizing: border-box;
        }
        
        input:focus { 
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
        }

        /* Apple Style Toggle Switch Container */
        .switch-container {
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            margin: 22px 4px 30px 4px; 
            font-size: 14px; 
            color: rgba(255, 255, 255, 0.7);
            user-select: none;
            cursor: pointer;
        }

        /* The Switch (Outer Track) */
        .ios-switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 26px;
            background: rgba(255, 255, 255, 0.16);
            border-radius: 13px;
            transition: background 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Hidden standard checkbox */
        .switch-container input { display: none; }

        /* The Switch Knob (Thumb) */
        .ios-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: white;
            top: 2px; left: 2px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Checked State Styling via CSS relation */
        .switch-container input:checked + .ios-switch {
            background: #34c759; /* Apple iOS Green */
        }

        .switch-container input:checked + .ios-switch::after {
            transform: translateX(20px);
        }

        /* Solid Apple Premium Button */
        button { 
            width: 100%; 
            padding: 16px; 
            border-radius: 16px; 
            border: none; 
            background: #ffffff;
            color: #000000; 
            font-size: 16px;
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            letter-spacing: -0.2px;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
        }
        
        button:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }
        
        /* Haptic Spring Effect on click */
        button:active { 
            transform: scale(0.96); 
            background: rgba(255, 255, 255, 0.85);
        }

        /* iOS-style Banner Alert for Errors */
        @keyframes iosAlert {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        #errorMsg { 
            color: #ff453a; /* Apple iOS Red */
            font-size: 13px; 
            margin-top: 20px; 
            display: none; 
            font-weight: 500; 
            background: rgba(255, 69, 58, 0.12);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 69, 58, 0.15);
            animation: iosAlert 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Student Login</h1>
        <p>Enter Elite Credentials</p>
        
        <div class="input-group">
            <input type="text" id="userName" placeholder="Full Name (e.g. Abhinav)" required>
        </div>
        <div class="input-group">
            <input type="tel" id="userMobile" placeholder="Mobile Number" maxlength="10" required>
        </div>
        
        <label class="switch-container">
            <span>I agree to terms & conditions</span>
            <input type="checkbox" id="agreeCheck">
            <div class="ios-switch"></div>
        </label>

        <button onclick="handleLogin()">Access Terminal</button>
        <div id="errorMsg"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        if(localStorage.getItem("studentName")) {
            window.location.href = "index.html";
        }

        function showiOSAlert(msg) {
            const error = document.getElementById('errorMsg');
            error.innerText = msg;
            error.style.display = "block";
            
            error.style.animation = 'none';
            error.offsetHeight; 
            error.style.animation = 'iosAlert 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
        }

        window.handleLogin = async () => {
            const name = document.getElementById('userName').value.trim();
            const mobile = document.getElementById('userMobile').value.trim();
            const agreed = document.getElementById('agreeCheck').checked;
            const error = document.getElementById('errorMsg');

            error.style.display = "none";

            if(!agreed) {
                showiOSAlert("⚠️ Please agree to the terms & conditions.");
                return;
            }

            if(!name || mobile.length < 10) {
                showiOSAlert("⚠️ Enter valid Name and 10-digit Mobile Number.");
                return;
            }

            try {
                const docRef = doc(db, "students", name);
                const docSnap = await getDoc(docRef);

                if(docSnap.exists()) {
                    const data = docSnap.data();
                    if(data.phoneNumber === mobile || data.mobile === mobile) {
                        saveAndRedirect(name);
                    } else {
                        showiOSAlert("❌ Name exists with a different number.");
                    }
                } else {
                    const q = query(collection(db, "students"), where("phoneNumber", "==", mobile));
                    const querySnapshot = await getDocs(q);

                    if (!querySnapshot.empty) {
                        showiOSAlert("❌ This Mobile Number is already registered.");
                    } else {
                        await setDoc(doc(db, "students", name), {
                            phoneNumber: mobile,
                            mobile: mobile,
                            xp: 0,
                            streak: 1,
                            paymentStatus: "Pending",
                            joinedAt: new Date().toISOString()
                        });
                        saveAndRedirect(name);
                    }
                }
            } catch (e) {
                showiOSAlert("❌ Connection Error. Try again.");
            }
        };

        function saveAndRedirect(name) {
            localStorage.setItem("studentName", name);
            window.location.href = "index.html"; 
        }
    </script>
</body>
</html>
