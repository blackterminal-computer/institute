<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Terminal | Elite Login</title>
    <!-- Remix Icons For Beautiful UI Elements -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { 
            --primary: #8b5cf6; 
            --accent: #06b6d4; 
            --pink: #ec4899;
            --bg: #020617; 
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(236, 72, 153, 0.08) 0%, transparent 50%);
            background-size: 200% 200%;
            animation: moveBg 12s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes moveBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes cardReveal {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .login-card { 
            background: rgba(255, 255, 255, 0.01); 
            padding: 40px 30px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.7), 
                        0 0 50px rgba(139, 92, 246, 0.1);
            animation: cardReveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 10;
        }

        /* Top Glowing Line */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--pink), var(--primary), var(--accent));
            border-radius: 24px 24px 0 0;
        }

        h1 { 
            font-size: 32px; 
            font-weight: 800; 
            margin: 0 0 5px 0; 
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        p { 
            font-size: 11px; 
            margin: 0 0 35px 0; 
            text-transform: uppercase; 
            letter-spacing: 2.5px;
            background: linear-gradient(90deg, var(--accent), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        /* Input Container For Icons */
        .input-group {
            position: relative;
            margin: 16px 0;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 18px;
            transition: 0.3s;
            pointer-events: none;
        }
        
        input { 
            width: 100%; 
            padding: 16px 16px 16px 48px; 
            border-radius: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.06); 
            background: rgba(255, 255, 255, 0.02); 
            color: white; 
            outline: none; 
            font-size: 14px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }
        
        input:focus { 
            border-color: var(--accent); 
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.15);
        }

        .input-group input:focus + i {
            color: var(--accent);
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

        .terms-container {
            display: flex; 
            align-items: center; 
            margin: 15px 0 25px 5px; 
            font-size: 13px; 
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: color 0.2s;
            user-select: none;
        }
        .terms-container:hover { color: rgba(255, 255, 255, 0.8); }
        .terms-container input { width: 18px; height: 18px; margin: 0 12px 0 0; accent-color: var(--accent); cursor: pointer; padding: 0;}

        /* Button & Loader styles */
        button { 
            width: 100%; 
            padding: 16px; 
            border-radius: 14px; 
            border: none; 
            background: linear-gradient(90deg, var(--pink), var(--primary), var(--accent)); 
            background-size: 200% auto;
            color: white; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.4s ease;
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        button:hover {
            background-position: right center;
            box-shadow: 0 6px 25px rgba(6, 182, 212, 0.35);
            transform: translateY(-2px);
        }
        
        button:active { transform: scale(0.98) translateY(0); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        #errorMsg { 
            color: #ff4b5c; 
            font-size: 13px; 
            margin-top: 18px; 
            display: none; 
            font-weight: 600; 
            background: rgba(255, 75, 92, 0.08);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 75, 92, 0.15);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Student Login</h1>
        <p>Enter Elite Credentials</p>
        
        <div class="input-group">
            <input type="text" id="userName" placeholder="Full Name (e.g. Abhinav)" required>
            <i class="ri-user-3-line"></i>
        </div>
        
        <div class="input-group">
            <input type="tel" id="userMobile" placeholder="Mobile Number" maxlength="10" required>
            <i class="ri-phone-line"></i>
        </div>
        
        <label class="terms-container">
            <input type="checkbox" id="agreeCheck">
            I agree to the terms & conditions
        </label>

        <button id="loginBtn" onclick="handleLogin()">
            <span id="btnText">Access Terminal</span>
            <div class="spinner" id="btnSpinner"></div>
        </button>
        
        <div id="errorMsg"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
            authDomain: "black-terminal-f2c91.firebaseapp.com",
            projectId: "black-terminal-f2c91",
            storageBucket: "black-terminal-f2c91.appspot.com",
            messagingSenderId: "552489994197",
            appId: "1:552489994197:web:7662331264c334ffbadf5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        if(localStorage.getItem("studentName")) {
            window.location.href = "index.html";
        }

        function showError(msg) {
            const error = document.getElementById('errorMsg');
            const card = document.querySelector('.login-card');
            error.innerText = msg;
            error.style.display = "block";
            
            // Card Shake Animation Trigger
            card.style.animation = 'none';
            card.offsetHeight; 
            card.style.animation = 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both';
        }

        window.handleLogin = async () => {
            const name = document.getElementById('userName').value.trim();
            const mobile = document.getElementById('userMobile').value.trim();
            const agreed = document.getElementById('agreeCheck').checked;
            const error = document.getElementById('errorMsg');
            
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            error.style.display = "none";

            if(!agreed) {
                showError("⚠️ Please agree to the terms & conditions.");
                return;
            }

            if(!name || mobile.length < 10) {
                showError("⚠️ Enter valid Name and 10-digit Mobile Number.");
                return;
            }

            // Set Loading State
            loginBtn.disabled = true;
            btnText.innerText = "Verifying...";
            btnSpinner.style.display = "block";

            try {
                const docRef = doc(db, "students", name);
                const docSnap = await getDoc(docRef);

                if(docSnap.exists()) {
                    const data = docSnap.data();
                    if(data.phoneNumber === mobile || data.mobile === mobile) {
                        saveAndRedirect(name);
                    } else {
                        showError("❌ Name exists with a different number.");
                    }
                } else {
                    const q = query(collection(db, "students"), where("phoneNumber", "==", mobile));
                    const querySnapshot = await getDocs(q);

                    if (!querySnapshot.empty) {
                        showError("❌ This Mobile Number is already registered.");
                    } else {
                        await setDoc(doc(db, "students", name), {
                            phoneNumber: mobile,
                            mobile: mobile,
                            xp: 0,
                            streak: 1,
                            paymentStatus: "Pending",
                            joinedAt: new Date().toISOString()
                        });
                        saveAndRedirect(name);
                    }
                }
            } catch (e) {
                showError("❌ Connection Error. Try again.");
            } finally {
                // Reset Loading State if it fails
                loginBtn.disabled = false;
                btnText.innerText = "Access Terminal";
                btnSpinner.style.display = "none";
            }
        };

        function saveAndRedirect(name) {
            localStorage.setItem("studentName", name);
            window.location.href = "index.html"; 
        }
    </script>
</body>
</html>
