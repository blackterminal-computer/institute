<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control | Black Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #ff3e3e; --bg: #05070a; --glass: rgba(255, 255, 255, 0.03); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        h2 { color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; font-size: 0.9rem; }
        th { color: var(--accent); }

        input, select, textarea { background: #111; border: 1px solid #333; color: white; padding: 8px; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-save { background: #2ecc71; color: white; }
        .btn-wa { background: #25d366; color: white; text-decoration: none; display: inline-block; font-size: 0.8rem; }
        .btn-task { background: var(--accent); color: white; margin-top: 10px; }
        
        .flex { display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>ADMIN CONTROL PANEL</h1>

    <div class="card">
        <h2>Staff List & Salary</h2>
        <table id="staff-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Joined Date</th>
                    <th>Per Day (₹)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="staff-body"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>Leads & WhatsApp</h2>
        <table id="lead-table">
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Course</th>
                    <th>Staff Name</th>
                    <th>WhatsApp</th>
                </tr>
            </thead>
            <tbody id="lead-body"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>Assign Task to Staff</h2>
        <select id="task-staff-select"><option>Select Staff</option></select>
        <textarea id="task-desc" placeholder="Write task details here..." rows="3" style="margin-top:10px;"></textarea>
        <button class="btn btn-task" onclick="sendTask()">SEND TASK</button>
    </div>

    <div class="card">
        <h2>Holiday Management</h2>
        <p style="font-size: 0.8rem; opacity: 0.6;">Select dates to disable attendance (No Holiday Dates)</p>
        <div class="flex">
            <input type="date" id="holiday-date">
            <button class="btn btn-save" onclick="addHoliday()">ADD HOLIDAY</button>
        </div>
        <div id="holiday-list" style="margin-top:10px; font-size: 0.8rem;"></div>
    </div>
</div>

<script>
    // Same Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Fetch Staff
    db.ref('staff').on('value', snap => {
        const tbody = document.getElementById('staff-body');
        const select = document.getElementById('task-staff-select');
        tbody.innerHTML = "";
        select.innerHTML = "<option>Select Staff</option>";

        snap.forEach(child => {
            const user = child.val();
            const date = new Date(user.joinedOn).toLocaleDateString();
            
            tbody.innerHTML += `
                <tr>
                    <td>${user.name}</td>
                    <td>${date}</td>
                    <td><input type="number" id="wage-${child.key}" value="${user.perDayWage || 500}" style="width:80px"></td>
                    <td><button class="btn btn-save" onclick="updateWage('${child.key}')">Update</button></td>
                </tr>
            `;
            select.innerHTML += `<option value="${child.key}">${user.name}</option>`;
        });
    });

    function updateWage(id) {
        const newWage = document.getElementById('wage-'+id).value;
        db.ref(`staff/${id}/perDayWage`).set(parseInt(newWage))
        .then(() => alert("Salary Updated!"));
    }

    // 2. Fetch Leads
    db.ref('leads').on('value', snap => {
        const tbody = document.getElementById('lead-body');
        tbody.innerHTML = "";
        snap.forEach(child => {
            const lead = child.val();
            const waLink = `https://wa.me/91${lead.phone}?text=Hello%20${lead.name},%20we%20received%20your%20interest%20for%20${lead.course}`;
            tbody.innerHTML += `
                <tr>
                    <td>${lead.name}</td>
                    <td>${lead.course}</td>
                    <td>${lead.staff || 'N/A'}</td>
                    <td><a href="${waLink}" target="_blank" class="btn btn-wa">WhatsApp</a></td>
                </tr>
            `;
        });
    });

    // 3. Send Task
    function sendTask() {
        const staffId = document.getElementById('task-staff-select').value;
        const desc = document.getElementById('task-desc').value;
        if(staffId === "Select Staff" || !desc) return alert("Fill details!");

        db.ref(`tasks/${staffId}`).push({
            task: desc,
            status: "Pending",
            date: Date.now()
        }).then(() => {
            alert("Task Sent!");
            document.getElementById('task-desc').value = "";
        });
    }

    // 4. Holiday Management
    function addHoliday() {
        const date = document.getElementById('holiday-date').value;
        if(!date) return;
        db.ref('holidays').push(date).then(() => alert("Holiday Added!"));
    }

    db.ref('holidays').on('value', snap => {
        const list = document.getElementById('holiday-list');
        list.innerHTML = "Holidays: ";
        snap.forEach(child => {
            list.innerHTML += `<span style="background:#333; padding:3px 8px; margin-right:5px; border-radius:3px;">${child.val()}</span>`;
        });
    });
</script>
</body>
</html>
