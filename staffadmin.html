<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin | Black Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root { 
            --accent: #ff3e3e; 
            --bg: #030508; 
            --card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --success: #2ecc71;
            --info: #3498db;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: #e0e0e0; 
            margin: 0; 
            padding: 15px; 
            line-height: 1.4;
        }

        .header-flex { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px;
            margin-bottom: 25px; 
            text-align: center;
        }
        
        h1 { font-size: 1.2rem; letter-spacing: 3px; font-weight: 800; margin: 0; }
        h1 span { color: var(--accent); }

        .card { 
            background: var(--card); 
            padding: 18px; 
            border-radius: 22px; 
            border: 1px solid var(--border); 
            margin-bottom: 20px;
            width: 100%;
        }

        h2 { font-size: 0.95rem; color: #fff; margin-top: 0; display: flex; align-items: center; gap: 8px; margin-bottom: 15px; }

        .table-container { 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
        }
        
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th { text-align: left; font-size: 0.65rem; text-transform: uppercase; opacity: 0.5; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.02); }

        input, select, textarea { 
            background: rgba(0,0,0,0.5); 
            border: 1px solid var(--border); 
            color: white; 
            padding: 12px; 
            border-radius: 12px; 
            width: 100%; 
            font-size: 16px;
            margin-bottom: 10px;
        }

        .btn { 
            padding: 12px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 0.8rem; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            gap: 6px;
            width: 100%;
        }
        
        .btn-update { background: var(--success); color: black; }
        .btn-remove { background: rgba(255, 62, 62, 0.1); color: var(--accent); border: 1px solid rgba(255, 62, 62, 0.2); }
        .btn-wa { background: #25d366; color: black; text-decoration: none; width: auto; padding: 8px 12px; }
        .btn-task { background: white; color: black; }

        .action-btns { display: flex; gap: 8px; }
        .action-btns .btn { width: 45px; height: 40px; }

        .holiday-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .holiday-tag { background: #1a1a1a; padding: 6px 12px; border-radius: 10px; font-size: 0.7rem; border: 1px solid var(--border); }

        /* Attendance List Styling */
        .att-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
            margin-bottom: 8px;
            border-left: 3px solid var(--success);
        }

        @media (min-width: 768px) {
            .container { max-width: 1000px; margin: auto; }
            .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
            .header-flex { flex-direction: row; justify-content: space-between; text-align: left; }
            .btn { width: auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h1>BLACK<span>TERMINAL</span> ADMIN</h1>
        <div style="display:flex; gap:10px;">
            <div id="att-count" style="font-size: 0.6rem; background: var(--info); color: white; padding: 5px 12px; border-radius: 15px; font-weight: 800;">PRESENT: 0</div>
            <div id="status-tag" style="font-size: 0.6rem; background: var(--success); color: black; padding: 5px 12px; border-radius: 15px; font-weight: 800;">ONLINE</div>
        </div>
    </div>

    <div class="grid">
        <div class="left-col">
            <div class="card">
                <h2><i class="fas fa-users"></i> Staff Payroll</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Staff Name</th>
                                <th>Rate</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="staff-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h2><i class="fas fa-headset"></i> Recent Leads</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>Course</th>
                                <th>WhatsApp</th>
                            </tr>
                        </thead>
                        <tbody id="lead-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="card">
                <h2><i class="fas fa-fingerprint"></i> Today's Attendance</h2>
                <div id="attendance-list" style="max-height: 250px; overflow-y: auto; font-size: 0.8rem;">
                    <p style="opacity: 0.5; text-align: center;">Waiting for data...</p>
                </div>
            </div>

            <div class="card">
                <h2><i class="fas fa-bolt"></i> Quick Actions</h2>
                <select id="task-staff-select"></select>
                <textarea id="task-desc" placeholder="Assign task details..." rows="2"></textarea>
                <button class="btn btn-task" onclick="sendTask()"><i class="fas fa-paper-plane"></i> SEND TASK</button>
                
                <div style="margin-top: 25px;">
                    <h2><i class="fas fa-calendar-alt"></i> Set Holiday</h2>
                    <div style="display: flex; gap: 10px;">
                        <input type="date" id="holiday-date" style="margin-bottom:0;">
                        <button class="btn btn-update" style="width: 50px;" onclick="addHoliday()"><i class="fas fa-plus"></i></button>
                    </div>
                    <div id="holiday-list" class="holiday-list"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Staff names map for attendance lookup
    let staffNames = {};

    // Fetch Staff
    db.ref('staff').on('value', snap => {
        const tbody = document.getElementById('staff-body');
        const select = document.getElementById('task-staff-select');
        tbody.innerHTML = "";
        select.innerHTML = "<option>Select Staff</option>";
        staffNames = {}; // Reset map

        snap.forEach(child => {
            const user = child.val();
            staffNames[child.key] = user.name; // ID to Name mapping

            tbody.innerHTML += `
                <tr>
                    <td><b>${user.name}</b></td>
                    <td><input type="number" id="wage-${child.key}" value="${user.perDayWage || 500}" style="width:65px; padding:5px; margin:0;"></td>
                    <td>
                        <div class="action-btns">
                            <button class="btn btn-update" onclick="updateWage('${child.key}')"><i class="fas fa-save"></i></button>
                            <button class="btn btn-remove" onclick="removeStaff('${child.key}', '${user.name}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `;
            select.innerHTML += `<option value="${child.key}">${user.name}</option>`;
        });
    });

    // Attendance Logic
    const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
    db.ref('attendance').on('value', snap => {
        const attList = document.getElementById('attendance-list');
        const attCountDisplay = document.getElementById('att-count');
        attList.innerHTML = "";
        let count = 0;

        snap.forEach(staffChild => {
            const staffId = staffChild.key;
            const dates = staffChild.val();
            
            if(dates[today]) {
                count++;
                const name = staffNames[staffId] || staffId;
                attList.innerHTML += `
                    <div class="att-item">
                        <span><b>${name}</b></span>
                        <span style="color:var(--success); font-weight:bold;">${dates[today].time}</span>
                    </div>
                `;
            }
        });

        attCountDisplay.innerText = "PRESENT: " + count;
        if(count === 0) attList.innerHTML = "<p style='opacity: 0.5; text-align: center;'>No one present today</p>";
    });

    function updateWage(id) {
        const newWage = document.getElementById('wage-'+id).value;
        db.ref(`staff/${id}/perDayWage`).set(parseInt(newWage)).then(() => alert("Saved!"));
    }

    function removeStaff(id, name) {
        if(confirm(`Delete ${name}?`)) {
            db.ref(`staff/${id}`).remove();
        }
    }

    // Fetch Leads
    db.ref('leads').on('value', snap => {
        const tbody = document.getElementById('lead-body');
        tbody.innerHTML = "";
        snap.forEach(child => {
            const lead = child.val();
            const waLink = `https://wa.me/91${lead.phone}?text=Hello%20${lead.name}`;
            tbody.innerHTML += `
                <tr>
                    <td>${lead.name}</td>
                    <td><span style="color:var(--accent)">${lead.course}</span></td>
                    <td><a href="${waLink}" target="_blank" class="btn btn-wa"><i class="fab fa-whatsapp"></i> Chat</a></td>
                </tr>
            `;
        });
    });

    function sendTask() {
        const sid = document.getElementById('task-staff-select').value;
        const desc = document.getElementById('task-desc').value;
        if(sid === "Select Staff" || !desc) return alert("Missing Info");
        db.ref(`tasks/${sid}`).push({ task: desc, date: Date.now() }).then(() => {
            alert("Task Sent!");
            document.getElementById('task-desc').value = "";
        });
    }

    function addHoliday() {
        const d = document.getElementById('holiday-date').value;
        if(d) db.ref('holidays').push(d);
    }

    db.ref('holidays').on('value', snap => {
        const list = document.getElementById('holiday-list');
        list.innerHTML = "";
        snap.forEach(child => {
            list.innerHTML += `<span class="holiday-tag">${child.val()}</span>`;
        });
    });
</script>
</body>
</html>
