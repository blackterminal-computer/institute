<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Mobile Control | BlackTerminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00d4ff; --bg: #05070a; --card: #12161d; --text: #ffffff; --accent: #ffaa00; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        /* Top Header */
        .top-bar { background: #0a0c10; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .top-bar h2 { margin: 0; font-size: 1.2rem; color: var(--primary); }

        /* Container */
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        h3 { margin: 0 0 15px 0; font-size: 1.1rem; color: var(--primary); display: flex; justify-content: space-between; align-items: center; }
        
        /* Staff List */
        .list-item { background: #1c222b; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
        .list-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .staff-info { flex: 1; }
        .staff-info div { font-weight: bold; font-size: 0.9rem; }
        .staff-info small { color: #888; font-size: 0.75rem; }

        /* Buttons */
        button { background: linear-gradient(135deg, var(--primary), #0072ff); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .btn-small { padding: 6px 10px; font-size: 0.75rem; background: #333; }
        .btn-approve { background: #28a745; }

        /* Inquiry Box */
        .inquiry-box { border-left: 3px solid var(--accent); background: #1c222b; padding: 12px; border-radius: 0 10px 10px 0; margin-bottom: 10px; }
        .inquiry-box strong { display: block; color: var(--accent); margin-bottom: 3px; }
        
        /* Bottom Navigation (Mobile Friendly) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a0c10; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-item { color: #888; font-size: 0.7rem; text-align: center; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.2rem; display: block; }

        input { background: #1c222b; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="top-bar">
    <h2>BT Admin 👑</h2>
    <div id="pending-badge" style="background: red; color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; display: none;">New KYC</div>
</div>

<div class="container">
    <div class="card">
        <h3>Staff Approvals</h3>
        <div id="pending-list"><p style="color:#555; font-size:0.8rem;">Checking for new staff...</p></div>
    </div>

    <div class="card">
        <h3>Today's Task for Staff</h3>
        <input type="text" id="taskInput" placeholder="Write task here...">
        <button style="width: 100%;" onclick="updateTask()">Update Task</button>
    </div>

    <div class="card">
        <h3>Recent Student Leads</h3>
        <div id="inquiry-list"></div>
    </div>

    <div class="card">
        <h3>Staff Salary & Payroll</h3>
        <div id="active-staff-list"></div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active"><span class="nav-icon">📊</span>Home</div>
    <div class="nav-item"><span class="nav-icon">📩</span>Leads</div>
    <div class="nav-item"><span class="nav-icon">👤</span>Staff</div>
    <div class="nav-item"><span class="nav-icon">⚙️</span>Settings</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Listen to Staff Data
    db.ref('staff').on('value', snap => {
        const staffData = snap.val();
        let pList = "";
        let aList = "";
        let hasPending = false;

        for (let key in staffData) {
            const s = staffData[key];
            if (s.status === "pending") {
                hasPending = true;
                pList += `
                    <div class="list-item">
                        <img src="${s.photo}">
                        <div class="staff-info">
                            <div>${s.name}</div>
                            <small>ID: ${s.id}</small>
                        </div>
                        <button class="btn-approve" onclick="approveStaff('${key}')">Approve</button>
                    </div>`;
            } else {
                aList += `
                    <div class="list-item">
                        <img src="${s.photo}">
                        <div class="staff-info">
                            <div>${s.name}</div>
                            <small>Sal: ₹${s.salary} | Bonus: ₹${s.bonus || 0}</small>
                        </div>
                        <button class="btn-small" onclick="editSal('${key}')">Edit</button>
                    </div>`;
            }
        }
        document.getElementById('pending-list').innerHTML = pList || "<p style='color:#555;font-size:0.8rem;'>No pending approvals</p>";
        document.getElementById('active-staff-list').innerHTML = aList;
        document.getElementById('pending-badge').style.display = hasPending ? 'block' : 'none';
    });

    function approveStaff(id) {
        db.ref('staff/' + id).update({ status: 'active' });
        alert("Staff activated!");
    }

    function editSal(id) {
        const amt = prompt("Enter new base salary:");
        if(amt) db.ref('staff/' + id).update({ salary: parseInt(amt) });
    }

    function updateTask() {
        const val = document.getElementById('taskInput').value;
        if(val) {
            db.ref('institute/current_task').set(val);
            alert("Task Updated!");
        }
    }

    // Load Inquiries
    db.ref('inquiries').limitToLast(5).on('value', snap => {
        let html = "";
        snap.forEach(child => {
            const inq = child.val();
            html = `
                <div class="inquiry-box">
                    <strong>${inq.name}</strong>
                    <span style="font-size:0.85rem">📞 ${inq.phone}</span><br>
                    <small style="color:#666; font-size:0.7rem;">By ${inq.from} on ${inq.date}</small>
                </div>` + html;
        });
        document.getElementById('inquiry-list').innerHTML = html || "No inquiries today.";
    });
</script>

</body>
</html>
