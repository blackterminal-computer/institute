<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT Admin | Master Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00d4ff; --bg: #05070a; --glass: rgba(255,255,255,0.03); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px 15px 100px 15px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.08); padding: 20px; border-radius: 25px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; outline: none; }
        .btn { width: 100%; padding: 14px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; background: var(--accent); color: #000; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: rgba(10,15,20,0.95); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(20px); }
        .nav-item { text-align: center; color: #555; flex: 1; font-size: 0.7rem; }
        .nav-item.active { color: var(--accent); }
        .section { display: none; } .section.active { display: block; }
    </style>
</head>
<body>

    <div id="staff" class="section active">
        <h1>Staff Setup</h1>
        <div class="card">
            <h3>Add New Staff</h3>
            <input type="text" id="s-name" placeholder="Staff Name">
            <input type="tel" id="s-phone" placeholder="Phone Number">
            <input type="password" id="s-pass" placeholder="Set Login Passcode">
            <button class="btn" onclick="addStaff()">REGISTER STAFF</button>
        </div>
        <div id="staff-list"></div>
    </div>

    <div id="controls" class="section">
        <h1>Broadcasting</h1>
        <div class="card">
            <h3>Marquee Text</h3>
            <input type="text" id="m-text" placeholder="Admin message...">
            <button class="btn" onclick="updateMarquee()">UPDATE</button>
        </div>
        <div class="card">
            <h3>No-Leave Dates</h3>
            <input type="text" id="h-dates" placeholder="e.g., May 10, June 15">
            <button class="btn" onclick="updateHolidays()">LOCK DATES</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="tab('staff', this)"><i class="fas fa-users"></i><br>STAFF</div>
        <div class="nav-item" onclick="tab('controls', this)"><i class="fas fa-bullhorn"></i><br>CONTROL</div>
    </nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function tab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function addStaff() {
        const name = document.getElementById('s-name').value;
        const phone = document.getElementById('s-phone').value;
        const pass = document.getElementById('s-pass').value;
        if(name && phone && pass) {
            db.ref('staff').push({ name, phone, passcode: pass });
            alert("Staff Added! Now they can login.");
        }
    }

    function updateMarquee() { db.ref('admin/marquee').set(document.getElementById('m-text').value); }
    function updateHolidays() { db.ref('admin/restricted_dates').set(document.getElementById('h-dates').value); }
</script>
</body>
</html>
