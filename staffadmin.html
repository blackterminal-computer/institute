<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard | BlackTerminal Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00d4ff; --bg: #05070a; --card: #12161d; --text: #ffffff; --accent: #ffaa00; --danger: #ff4d4d; --success: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        
        .top-bar { background: #0a0c10; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .top-bar h2 { margin: 0; font-size: 1.2rem; color: var(--primary); }

        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #1c222b; padding: 15px; border-radius: 15px; text-align: center; border-bottom: 3px solid var(--primary); }
        .stat-box small { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .stat-box div { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }

        h3 { margin: 0 0 15px 0; font-size: 1rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        
        /* Attendance List */
        .log-item { background: #1c222b; padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 3px solid var(--success); font-size: 0.85rem; position: relative;}
        .log-late { border-left-color: var(--danger); }
        .log-time { color: var(--primary); font-weight: bold; }
        .log-fine { color: var(--danger); font-weight: bold; float: right; }

        .list-item { background: #1c222b; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
        .list-item img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
        .staff-info { flex: 1; }
        
        button { background: linear-gradient(135deg, var(--primary), #0072ff); color: white; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: linear-gradient(135deg, #ff4d4d, #b30000); }
        
        input { background: #1c222b; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a0c10; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
    </style>
</head>
<body>

<div class="top-bar">
    <h2>Admin Dashboard 👑</h2>
    <div id="pending-badge" style="background: red; color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; display: none;">New Staff</div>
</div>

<div class="container">
    <div class="stats-grid">
        <div class="stat-box"><small>Total Payroll</small><div id="total-payroll">₹0</div></div>
        <div class="stat-box" style="border-color: var(--danger);"><small>Late Fines</small><div id="total-fines-collected">₹0</div></div>
    </div>

    <div class="card">
        <h3>📍 Live Punch-In Log (Today)</h3>
        <div id="attendance-log-container">
            <small style="color:#444">Awaiting data...</small>
        </div>
    </div>

    <div class="card">
        <h3>⏰ Set Batch Timings</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input type="text" id="mText" placeholder="Morning (e.g. 09:00)">
            <input type="text" id="eText" placeholder="Evening (e.g. 16:00)">
        </div>
        <button style="width:100%" onclick="updateBatches()">Save Timings</button>
    </div>

    <div class="card"><h3>👥 Staff Performance</h3><div id="active-staff-list"></div></div>
    <div class="card"><h3>🚨 Verification Queue</h3><div id="pending-list"></div></div>
    
    <div class="card">
        <h3>📩 Student Leads</h3>
        <div id="inquiry-list"></div>
    </div>
</div>

<div class="bottom-nav">
    <div style="text-align:center; color:var(--primary); font-size:0.7rem;">🏠<br>Home</div>
    <div style="text-align:center; color:#555; font-size:0.7rem;" onclick="location.reload()">🔄<br>Sync</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCEYfwfZv2Ckpg-uFLRvJkMBRlXA2w_WpI",
        authDomain: "black-terminal-f2c91.firebaseapp.com",
        databaseURL: "https://black-terminal-f2c91-default-rtdb.firebaseio.com",
        projectId: "black-terminal-f2c91",
        storageBucket: "black-terminal-f2c91.firebasestorage.app",
        messagingSenderId: "552489994197",
        appId: "1:552489994197:web:7662331264c334ffbadf5c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Live Attendance Tracking
    db.ref('attendance').limitToLast(15).on('value', snap => {
        let html = "";
        let totalFines = 0;
        const today = new Date().toLocaleDateString();

        snap.forEach(child => {
            const att = child.val();
            const time = new Date(att.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const isToday = new Date(att.timestamp).toLocaleDateString() === today;
            
            if(att.fine) totalFines += att.fine;

            if(isToday && att.type === 'in') {
                html = `
                <div class="log-item ${att.fine ? 'log-late' : ''}">
                    <span class="log-fine">${att.fine ? 'Fine: ₹'+att.fine : 'On Time'}</span>
                    <span class="log-time">${time}</span> | <b>${att.staff.toUpperCase()}</b><br>
                    <small style="color:#8b949e">📍 Baripada Branch (Verified)</small>
                </div>` + html;
            }
        });
        document.getElementById('attendance-log-container').innerHTML = html || "<small style='color:#444'>No punch-ins today.</small>";
        document.getElementById('total-fines-collected').innerText = "₹" + totalFines;
    });

    // 2. Staff Management
    db.ref('staff').on('value', snap => {
        let pList = "", aList = "", totalPay = 0, hasPending = false;
        snap.forEach(child => {
            const s = child.val(); const key = child.key;
            if (s.status === "pending") {
                hasPending = true;
                pList += `<div class="list-item"><img src="${s.photo}"><div class="staff-info"><b>${s.name}</b><br><small>Pass: ${s.id}</small></div>
                <button onclick="approveStaff('${key}')">Approve</button></div>`;
            } else {
                totalPay += (s.salary || 0);
                aList += `<div class="list-item"><img src="${s.photo}"><div class="staff-info"><b>${s.name}</b><br><small>Pay: ₹${s.salary}</small></div>
                <button class="btn-danger" onclick="deleteItem('staff/${key}')">🗑️</button></div>`;
            }
        });
        document.getElementById('pending-list').innerHTML = pList || "<small>Clear</small>";
        document.getElementById('active-staff-list').innerHTML = aList || "<small>No Staff</small>";
        document.getElementById('pending-badge').style.display = hasPending ? 'block' : 'none';
        document.getElementById('total-payroll').innerText = "₹" + totalPay;
    });

    // 3. Update Batches
    function updateBatches() {
        const m = document.getElementById('mText').value;
        const e = document.getElementById('eText').value;
        db.ref('institute/batches').set({ morning: m, evening: e }).then(() => alert("Timings Updated!"));
    }

    // 4. Lead Management
    db.ref('inquiries').on('value', snap => {
        let html = "";
        snap.forEach(child => {
            const inq = child.val();
            html = `<div class="list-item" style="background:#0d1117; border-left:3px solid var(--primary)">
                <div class="staff-info"><b>${inq.student}</b><br><small>📞 ${inq.phone}</small></div>
                <a href="https://wa.me/91${inq.phone}" style="text-decoration:none; padding:8px; background:var(--success); border-radius:8px;">💬</a>
            </div>` + html;
        });
        document.getElementById('inquiry-list').innerHTML = html || "<small>No Leads</small>";
    });

    function approveStaff(id) { db.ref('staff/' + id).update({ status: 'active', salary: 12000, joinDate: Date.now() }); }
    function deleteItem(path) { if(confirm("Confirm Deletion?")) db.ref(path).remove(); }
</script>
</body>
</html>
